body:
  text: 春秋本義卷三元程端學撰隱公七年春王三月叔姬歸于紀康侯胡氏曰叔姬伯姬之妹非夫人也存耕趙氏曰書叔姬為歸于酅起也胡氏曰春秋不書媵為其賤者也此何以書莊三十年葬叔姬故起而書之存耕趙氏曰伯姬歸紀踰五年而叔姬歸焉卒之紀侯去其國而伯姬葬于齊紀季以酅入于齊而叔姬歸于酅二姬皆不得其所終春秋之法有其終必有以見其始也又曰春秋録紀事何詳也二年書逆女書伯姬歸今書叔姬歸桓五年書如紀六年書會成書來朝庶魯之能救也八年書逆王后于紀九年書季薑歸京師庶天王之足依也魯不能救王不足依此紀所以終困于齊也故終伯姬葬叔姬歸酅書其卒葬以見魯不存紀而二姬失所也愚案二説皆一義也大義又在王政不綱強吞弱衆暴寡滅國絶世而無所忌憚也各詳見於後滕侯卒孔氏曰滕姬姓文王子錯叔繡之後武王封之於滕自叔繡至宣公十七世乃見春秋杜氏曰在沛國公邱縣東南張氏曰徐州滕縣也程子曰卒不名史闕也愚謂凡此不書葬而亦書卒者蓋因其卒而書之可以考其凡以事見於春秋者實為某侯也觀其書名可見矣而此則又為桓二年滕子來朝起文也康侯胡氏曰滕侯書卒何以不葬怠於禮弱其君而不葬者滕侯宿男之類是已古者邦交有常制不以國之強弱而有謹慢也不以情之踈密而有厚薄也春秋之時則異於是晉北國也楚南邦也地非同盟而親往俟其葬滕鄰境也宿同盟也赴告雖及而魯不之恤豈非以其壤地褊小乎無其事而闕其文此魯史之舊也聖人無加損焉存其卒闕其葬義自見矣愚謂如胡氏説則其後晉侯書卒而不書葬者豈當時魯專事齊而不事晉歟然春秋以實書其事見義者多以不書其事見義者少故未敢必然其説也夏城中丘程子曰凡書城者完舊也中邱杜氏曰在琅邪臨沂縣東北張氏曰即沂川臨沂縣公羊曰內邑也何以書以重書也程子曰為民立君所以養之也養民之道在愛其力民力足則生養遂生養遂則教化行而風俗美故為政以民力為重也春秋凡用民力必書其所興作不時害義固為罪也雖時且義必書見勞民為重事也後之人君知此義則知慎重於民力矣城中邱使民不以時非人君之心也後倣此孫氏曰城邑宫室髙下大小皆有王制不可妄作是故城一邑新一廏作一門築一囿時與不時皆詳而録之然得其時者其惡小非其時者其惡大此聖人愛民力重興作懲僭忒之深旨也葉氏曰城郭雖立以為國非恃以守國故先王嵗因農隙修之於無事之時而城多出於畏齊畏晉畏邾畏莒不然則大夫強而自城其邑或過其度未有無故而為也既不能愛恤其民以時舉其政事至而旋為之備以奪其時此經之所以書也程子曰有用民力之大而不書者為教之意深矣僖公修泮宫復閟宫非不用民力也然而不書二者復古興廢之大事為國之先務如是而用民乃所當用也人君知此義則知為政之先後輕重矣愚謂春秋不書常事觀程子之説益驗齊侯使其弟年來聘趙氏曰禮以通好曰聘孔氏曰聘禮使者執圭以致命束帛加璧以致享左氏曰齊使夷仲年來聘結艾之盟也趙氏曰將國命大夫之事此譏弟也張氏曰聘者諸侯遣大夫通好與國見於儀禮之篇詳矣然古者諸侯間於天子之事則有邦交殷聘之禮自隱公即位以來未嘗朝聘于天子以魯推之則諸侯蓋可知矣而齊僖因艾之盟遽遣使於魯以結好忘君臣之大義植同列之私黨故觀年之聘則凡春秋書聘可以例推矣書其弟又著齊侯寵愛之私也親親之道尊其位重其祿非賢則不及以政齊僖公愛其弟聘魯致女交政鄰國一一使之愛之之過遂致亂嫡庶之辨以啓年之子無知篡弒之禍聖人以其過於溺愛之私而失親親之義以著後日之禍始於僖公之不早辨也後凡書聘倣此而此又兼使其弟之一義耳愚案諸侯雖世繼然其國非所得私也大夫士皆天子之官各司其職不可侵也兄之愛弟秉彛之心人倫之至也使齊侯之弟賢則將請命天子而為大夫矣如其不賢當如舜之處象祿之而不任以政愛弟之道也今僖公過寵其弟使聘鄰國若庶人使其子弟幹父兄之蠱者任使失道而僭亂作書此亦為他日見弒起也同甫陳氏曰此及鄭伯使其弟語來盟諸侯以國事為家事而聖人以國事為王事木訥趙氏曰弟之書於經者十有二不奔則叛不叛則弒惟齊侯之弟年不叛不奔而年之子無知亦弒襄公而亂齊寵而私之果有益乎秋公伐邾公羊曰君將不言帥師書其重者也髙氏曰君行師從不待言也後倣此獻可杜氏曰詩曰君子屢盟亂是用長言盟適足以長亂耳公于元年為蔑之盟至此而伐之其義自見義又見二年鄭伐衛此則諸侯伐人之國也冬天王使凡伯來聘天王桓王也凡伯公羊曰天子之大夫也杜氏曰周卿士凡國伯爵也汲郡共縣東南有凡城張氏曰濬州黎陽縣之境聘見前程子曰周禮大行人時聘以結諸侯之好王法之行時加聘問以懷撫諸侯乃常禮也春秋諸侯不修臣職朝覲之禮廢絶王法所當治也不能正典刑而反聘之又不見答失道甚矣孫氏曰桓王不能興衰振治統制四海以復文武之業反同列國之君使凡伯來聘桓王之為天子可知也木訥趙氏曰春秋書天王下聘者凡八責諸侯不朝而坐受天子之聘也隱在位十一年而天王聘魯者二亦何有一介之使如京師以答天王之勤哉愚謂所謂君不君臣不臣者也戎伐凡伯于楚丘以歸張氏曰戎見隱二年或曰此戎州已氏之戎本昆吾氏之别種周衰入居中國者也楚邱今拱州之楚邱縣漢為梁國已氏縣此非衛之楚邱杜注衛地非也愚謂以僖二年城楚邱推之當是魯邑耳以歸以凡伯歸于戎也程子曰伐見其以衆左氏曰初戎朝于周發幣於公卿凡伯弗賓冬王使凡伯來聘還戎伐之楚邱以歸未詳信否邦衡胡氏曰桓王不能以信交於下區區聘魯威令不行戎伐其使先王盛時諸侯翊戴天子以隆中國之勢四裔請命不暇雖樵蘇不敢犯況敢伐天子之使乎今至於襲浮王人無所忌憚是中國不能攘正外域張氏曰天子之使入境而不衛地主之罪大矣孫氏曰録以歸者惡凡伯不死位也黃氏曰凡皆直書而意自明白木訥趙氏曰古者王臣涖事事畢衛以出境單襄公適陳以聘楚侯不在疆宰不致膳單子知陳之將亡今凡伯來聘而魯不加衛戎得伐之以歸所謂司冦詰姦之法安在乎愚謂聖王之馭外域羈縻分别使各安其所而已朝聘所不及也今使之居于內地固天子方伯不能壤斥之過魯隱又從而會之盟之引為同類致使驕矜犯分以伐天子之使書之一見王政之不行二見諸侯之衰弱三見外域之縱恣四見地主之不敬王使五見周無死節之臣六見魯之盟戎適所以致冦片言而六義見嗚呼兹其為春秋乎八年春宋公衛侯遇于垂衛侯宣公也杜氏曰垂衛地濟隂句陽縣東北有垂亭劉氏曰魯近邑也前説近是義見四年遇于清三月鄭伯使宛來歸祊庚寅我入祊宛於阮切祊必彭切公羊穀梁作邴宛鄭大夫祊杜氏曰鄭桓公周宣王之母弟封鄭有助祭太山湯沐邑在琅邪費縣東南張氏曰沂州之屬縣也入者使吏治其地政而主有之也愚謂凡言我者魯也內辭也孫氏曰祊天子所封非魯土地鄭不可歸魯不可入也鄭人歸之魯人受之其罪一也髙氏曰鄭以天子不復巡狩而祊為無用且欲急得魯援故使宛來歸焉自入祊之後繼好尋盟史不絶書入郜入防悉歸於我終隱之世無釁可觀來歸之意斷可識矣愚謂祊者先王所封先祖所受而與人為締交之具可以見王政衰諸侯恣鄭姦魯貪而宛從君之欲聖人書之為後世戒深矣夏六月己亥蔡侯考父卒義見三年宋公卒辛亥宿男卒吕氏曰不名史失之大意見七年滕侯卒秋七月庚午宋公齊侯衛侯盟于瓦屋杜氏曰瓦屋周地存耕趙氏曰入王畿而為盟諸侯無忌憚之甚義又見元年盟于蔑張氏曰此宋衛欲成於齊而齊侯與之盟也春秋之初皆離盟至此三君共要質於神以示明信然宋殤王者之後齊僖東方之大國衛亦北州之大國夫民無信不立而三君合以要言冝可因此以率諸侯為講信修睦之事成鳩民息肩之圗而明年齊魯會防之後齊侯遂從魯以黨鄭又明年與二國伐宋取邑視今日盟誓之言不復顧忌比諸小人平時指天日為誓而他日臨小利害不一引手救反擠之又下石者正相似也嗚呼春秋於瓦屋之盟所以謹世變之甚悼人理之失者可勝言哉君舉陳氏曰春秋之初宋魯衛陳蔡一黨也齊鄭一黨也鄭輸平於魯齊亦為艾之盟以平魯為瓦屋之盟以平宋衛是成三國也東諸侯之交盛矣八月葬蔡宣公宣諡也杜氏曰三月而葬速程子曰諸侯五月而葬不及期簡也義又見三年葬宋穆公九月辛卯公及莒人盟于浮來浮公羊穀梁作包此稱人與元年盟于宿同杜氏曰浮來紀邑東莞縣北有邳鄉邳鄉西有公來山號曰邳來張氏曰莒地沂州沂水縣有浮來山張説近是義見元年盟于蔑螟義見五年案三年復螟見人道悖亂而災害復出民之窮困可知矣冬十有二月無駭卒譏世卿也大意見元年益師卒九年春天王使南季來聘穀梁曰南氏姓也季字也劉氏曰曷為字下大夫也天子之下大夫四命義見七年凡伯來聘存耕趙氏曰魯隱得國不請命朝聘不至於京師時事不歸於宰旅周室之罪人也王使求賻而不恤王之喪凡伯來聘而不救戎之伐冝加貶削之罰矣南季來聘何可已而不巳歟用見王室衰微威柄已去惟持福惠以結人張氏曰隱公十年之間宰咺凡伯南季三至魯庭以魯為周公之胄而欲親之也公不明尊王之義以正其國而朝聘之禮不復行于王室於是諸侯視效而王靈竭臣子則象而篡弒萌春秋詳王使之來以待讀者之自考愚謂兩譏之然本義譏天王之意多而宰咺凡伯南季之為臣亦可知矣三月癸酉大雨震電庚辰大雨雪電徒練切雨雪之雨于付切髙氏曰大者非常之辭説文曰震霹靂震物者雷之甚者也電隂陽激曜雷之光也雨雪之雨孔氏曰自上下者榖梁曰八日之間再有大變隂陽錯行黃氏曰三月而有大雪又見於大雷之後書之記異也程子曰隂陽運動有常而無忒凡失其度皆人為感之也康侯胡氏曰雷已出電已見則雪不當復降而大雨雪此隂氣縱也春秋災異必書雖不言其事而事應具存惟明于天人相感之際響應之理則見聖人所書之意矣挾卒挾檄頰切公羊穀梁作俠穀梁曰挾者所俠也愚謂譏世卿也大意見元年益師卒夏城郎杜氏曰郎魯邑髙平方與東南有郁郎亭張氏曰郎魯近邑義見七年城中邱許氏曰七年書城中邱而後伐邾九年書城郎而後伐宋皆公不務崇德修政以戒蕭牆而念外人之有干非時勤衆恃城守國亦巳末矣秋七月冬公會齊侯于防公羊作邴此會與二年會戎之會同與六年公會齊侯之會異義後倣此杜氏曰防魯地在琅邪華縣東南張氏曰密州諸城縣有防城存耕趙氏曰魯有東西防此乃魯之北鄙近于齊者也程子曰謀伐宋也常山劉氏曰古者諸侯奉天子之命以守疆土治人民其朝聘有時出入有度無非禮者自王綱不振諸侯無法以自守大者糾合其黨以逞其欲小者附從不暇以救其危故列國之會紛然于天下聖人一以王法正之凡書會者皆譏也若夫彼善于此惡有輕重則各存乎其事其意則直罪其非王事相會聚耳後倣此存耕趙氏曰是會也為鄭會齊將合謀以病宋也魯既與宋絶則與鄭為親齊鄭一黨也前輸平則為艾之盟今受祊而為防之會盟艾魯鄭猶未厚也自會防而後魯惟鄭之命矣伐宋敗宋皆鄭所使一祊之利足以動魯若此愚謂齊僖前年方與宋有瓦屋之盟今復會魯以謀伐宋齊僖之無信猶魯隱也十年春王二月公會齊侯鄭伯于中丘中邱見七年義見會于防孫氏曰公末年出入無度不顧憂患于內數會諸侯于外夏翬帥師會齊人鄭人伐宋程子曰三國先遣將致伐義見二年鄭伐衛劉氏曰伐宋敗宋取郜取防滕侯薛侯來朝入許隱公之所以弒也德薄而多大功慮淺而數得意也備其四境禍反在內可不哀歟孔子曰人無逺慮必有近憂不在顓臾而在蕭牆也六月壬戌公敗宋師于菅古頑切杜氏曰菅宋地葉氏曰前未有言戰者此何以敗宋師內辭也愚謂亦有他國敗他國之師者蓋多責敗之者之罪也後倣此上言翬帥師而此言公敗宋師者時公後至于師以重書也不言齊鄭獨魯敗之也諸侯擅興師伐人之國而敗其師雖僥幸于一時王法所當誅也辛未取郜辛巳取防郜古報切張氏曰郜防宋二邑杜氏曰濟隂成武縣東南有郜城髙平昌邑縣西南有西防城義見三年莒取牟婁此則十日取二邑其罪尤大故書其實以見義焉秋宋人衛人入鄭左氏曰鄭師入郊猶在郊宋人衛人入鄭程子曰鄭勞民以務外而不知守其國故二國入之髙氏曰宋殤公方喪邑敗師而連兵不已殤公之民于是乎不堪命愚謂鄭結齊魯以伐宋宋結衛以入鄭報復不已由乎王政不綱諸侯放肆此春秋之時所以為大亂聖人所以傷世變也義又見二年莒入向存耕趙氏曰齊魯鄭伐宋從中邱之謀宋衛入鄭則從垂之謀宋人蔡人衛人伐戴鄭伯伐取之戴公羊穀梁作載存耕趙氏曰戴鄭之附庸杜氏曰陳留外黃縣張氏曰在開封府考城縣孔氏曰地志云梁國災縣古戴國應劭曰章帝改為考城公羊曰因宋人蔡人衛人之力也孫氏曰三國之師既退鄭伯見利忘義乘戴之弊而取之其惡甚矣劉氏曰其言鄭伯伐取何甚之之辭也利人之暴乘人之危是以無親于天下冬十月壬午齊人鄭人入郕公羊作盛義見二年莒入向十有一年春滕侯薛侯來朝孔氏曰薛任姓侯爵黃帝之苗裔奚仲封為薛侯遷于邳仲虺居薛為湯左相武王復以其胄為薛侯小國無紀世不可知杜氏曰薛魯國薛縣張氏曰國都在徐州滕縣啖氏曰人君相見曰朝受之于廟以重禮也他國來魯朝聘皆書曰朝以朝禮相見也愚謂纍數之同日來朝也張氏曰周禮凡諸侯之邦交殷相聘也世相朝也此乃間于天子之事而講之程子曰諸侯雖有相朝之禮而當時諸侯于天子未嘗朝覲獨相率以朝魯得為禮乎劉氏曰其兼言之何旅見也非天子不旅見諸侯諸侯相旅見非禮也趙氏曰諸侯必有婚姻之好疆埸之理故王者不絶其交焉春秋之代則多自于黨仇矣皆國之大事故君子志之其邪正則存乎其文孫氏曰諸侯朝諸侯斯皆周室不競干戈日尋以大陵小小國不得已而為之耳是故齊晉宋衛未嘗朝魯者齊晉盛也宋衛敵也滕薛邾杞奔走而不暇者土地狹陋兵衆寡弱不能與魯伉也春秋之法非王事不得踰境凡書朝皆惡之也夏五月公會鄭伯于時來左氏無五月二字時來公羊作祁黎杜氏曰時來郲也滎陽縣東有釐城鄭地張氏曰屬鄭州左氏曰公會鄭伯于郲謀伐許也義見九年會于防秋七月壬午公及齊侯鄭伯入許孔氏曰許薑姓男爵與齊同祖伯夷之後武王封其苗裔文叔于許十一世莊公始見春秋杜氏曰許潁川許昌縣張氏曰潁昌府長社縣左氏曰公會齊侯鄭伯伐許庚辰傅于許瑕叔盈取鄭伯之旗蝥弧以先登周麾而呼曰君登矣鄭師畢登壬午遂入許齊侯以許讓公公曰君謂許不共故從君討之許既伏其罪矣雖君有命寡人弗敢與聞乃與鄭人鄭伯使許大夫百里奉許叔以居許東偏乃使公孫獲處許西偏戴氏曰鄭處許叔于東偏後十五年復國故書入不書滅俱未詳是否義見二年莒入向吕氏曰隱公有蕭牆之變而不知方且及齊侯鄭伯入人之國其不明如是死固宜也康侯胡氏曰隱公即位十一年天子遣使者再而未嘗朝于京師平王崩不奔喪會葬以致求賻擅興甲兵伐邾忽天子封守入祊取郜取防今又入人之國此五不韙者人臣之大惡也然則不善之殃豈特成於桓而隱之積亦不可掩矣故春秋所載是非善惡之迹施設于前而成敗吉凶之效見于後不可不察也冬十有一月壬辰公薨杜氏曰實弒書薨又不地者史策所諱也公羊曰不忍言也左氏曰羽父請殺桓公將以求太宰公曰為其少故也吾將授之矣使營菟裘吾將老焉羽父反譖公于桓公而請弒之公之為公子也與鄭人戰于狐壤止焉鄭人囚諸尹氏賂尹氏而禱于其主鍾巫遂與尹氏歸而立其主十一月公祭鍾巫齊于社囿館于寪氏壬辰羽父使賊弒公于寪氏立桓公而討寪氏有死者義見四年衛州吁事程子曰人君終于路寢見卿大夫而終乃正終也薨于燕寢不正其終也薨不書地弒也莘老孫氏曰春秋之法外言弒內不言弒所以别內外逺凶變養忠孝也左氏曰不書葬不成喪也愚謂大夫專兵擅政未有不弒其君而奪其國者其有存焉者幸而免耳春秋兩書翬帥師于前著隱公被弒于後所以戒後世權不可下移也若魯隱讓桓之事則未詳信否春秋本義卷三
