body:
  text: 春秋本義卷二十一元程端學撰襄公十年春公㑹晉侯宋公曹伯莒子邾子滕子薛伯把伯小邾子齊世子光㑹吳于柤莊加切㑹吳見㑹于鍾離柤張氏曰後漢彭城國𫝊陽縣有柤水左氏曰㑹于柤㑹吳子壽夢也髙氏曰左傳昭公六年楚公子棄疾如晉過鄭鄭伯勞諸柤則柤者鄭地而楚人所由之道也吳在柤諸侯因往與吳㑹以謀楚焉然吳人者名謀楚而實窺中國者也而晉合諸侯從之與鍾離之㑹同然鍾離之㑹諸侯之大夫往從吳至戚之㑹吳來從諸侯今柤之㑹則諸侯復親往從吳矣義又見成十五年㑹吳于鍾離貫道王氏曰晉方患楚欲通吳而吳道多阻今於彭城之柤㑹吳道其來路也悼公以十一國之君賔吳吳始橫矣爭長之漸兆矣夏五月甲午遂滅逼陽逼榖梁作傅杜氏曰因柤㑹而滅之故曰遂逼陽妘姓國彭城傅陽縣也張氏曰即徐州沛縣左氏曰晉荀偃士丐請伐逼陽而封宋向戌焉荀罃曰城小而固勝之不武弗勝為笑固請丙寅圍之弗克諸侯之師久於逼陽荀偃士丐請於荀罃曰水潦將降懼不能歸請班師知伯怒投之以機出於其閒曰女成二事而後告余余恐亂命以不女違女既勤君而與諸侯牽帥老夫以至於此既無武守而又欲易余罪曰是實班師不然克矣余羸老也可重任乎七日不克必爾乎取之五月庚寅荀偃士丐帥卒攻逼陽親受矢石甲午滅之書曰遂滅逼陽言自㑹也以與向戌向戌辭曰君若猶辱鎮撫宋國而以逼陽光啓寡君羣臣安矣其何貺如之若專賜臣是臣興諸侯以自封也其何罪大焉敢以死請乃豫宋公未詳信否許氏曰晉之威德未能服逺躬率諸侯㑹吳而因道用師滅人之國恃衆剽利無復伯討則中國之禮義盡矣義又見莊十年齊滅談存耕趙氏曰㑹吳非矣滅逼陽何哉古之人行一不義殺一不辜雖得天下不為悼公欲通吳之道而滅逼陽以亂易亂也莘老孫氏曰若晉者所謂因諸侯而為利名恤災救患而實自封殖者也公至自㑹義見桓二年公至自唐楚公子貞鄭公孫輒帥師伐宋二大夫皆帥師省文耳左氏曰楚子囊鄭子耳伐宋師于訾母髙氏曰鄭背盟主而即楚又與楚人同伐與國罪不容誅也義又見莊十年荆敗蔡師晉師伐秦左氏曰九年秦景公使士雃乞師於楚將以伐晉楚子許之子囊曰不可當今吾不能與晉爭晉君類能而使之舉不失選官不易方其卿讓於善其大夫不失守其士競於教其庶人力於農穡商工皂𨽻不知遷業韓厥老矣知罃稟焉以為政范丐少於中行偃而上之使佐中軍韓起少於欒黶士魴上之使佐上軍魏絳多功以趙武為賢而為之佐君明臣忠上讓下競當是時也晉不可敵事之而後可君其圖之王曰吾既許之矣雖不及晉必將出師秋楚子師於武城以為秦援秦人侵晉晉饑弗能報也十年晉荀罃伐秦報其侵也未詳信否朩訥趙氏曰楚既得鄭則兵及於宋勢也楚鄭伐宋晉不救宋而伐秦非所以伯也秋莒人伐我東鄙左氏曰莒人閒諸侯之有事也故伐我東鄙義見隱二年鄭伐衛髙氏曰魯國卿大夫唯私室之務則公室之不競冝矣且去年同盟于戲今年又㑹于柤又方同㑹伐鄭退受莒兵而不能禦魯必有以取之也公會晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯把伯小邾子伐鄭吕氏曰齊世子光序諸侯上主㑹者為之也春秋不改所以示譏言上下之無禮文專以強弱事勢為先後也愚謂薛杞二伯序於諸子之下亦然此亦功過之舉義又見隱二年鄭伐衛冬盜殺鄭公子騑公子發公孫輒騑公羊穀梁作斐陸氏曰據字子駟冝為騑騑子駟發子國輒子耳也孫氏曰盜者微賤之稱左氏曰初子駟與尉止有爭將禦諸侯之師而黜其車尉止獲又與之爭子駟抑尉止曰爾車非禮也遂弗使獻初子駟為田洫司氏堵氏侯氏子師氏皆喪田焉故五族聚羣不逞之人因公子之徒以作亂於是子駟當國子國為司馬子耳為司空子孔為司徒尉止司臣侯晉堵女父子師僕帥賊以入晨攻執政於西宫之朝殺子駟子國子耳劫鄭伯以如北宫子孔知之故不死書曰盜言無大夫焉子西聞盜不警而出尸而追盜盜入於北宫乃歸授甲臣妾多逃器用多喪子産聞盜為門者庀羣司閉府庫愼閉藏完守備成列而後出兵車十七乘尸而攻盜於北宫子蟜帥國人助之殺尉止子師僕盜衆盡死侯晉奔晉堵女父司臣尉翩司齊奔宋子孔當國為載書以位序聽政辟大夫諸司門子弗順將誅之子産止之請為之焚書子孔不可曰為書以定國衆怒而焚之是衆為政也國不亦難乎子産曰衆怒難犯專欲難成合二難以安國危之道也不如焚書以安衆子得所欲衆亦得安不亦可乎專欲無成犯衆興禍子必從之乃焚書於倉門之外衆而後定髙氏曰為大夫而見殺於盜則其所以在人上者可知也孫氏曰盜一日而殺三卿鄭伯失刑政也康侯胡氏曰卿大夫者君之陪二政之本也本強則精神折衝聞有偃息談笑而郤敵國之兵勝千里之難者矣乃至於身不能保而盜得殺之於朝安在其為陪二乎邦衡胡氏曰盜乘釁而至者也茍無釁隙盜豈敢犯哉三子者不能佐時憂國日尋干戈何異負販小人而乘君子之器乎如此則盜之招也殺之何悔哉戍鄭虎牢不言諸侯戍之者蒙上諸侯伐鄭之文也城虎牢不言鄭而戍言鄭未詳案左氏言鄭及晉平豈為鄭戍之歟然下書楚救鄭次年鄭復侵宋則左氏之說又可疑姑闕以俟知者張氏曰前年戍陳不能制楚以保陳矣又踵前轍而勞諸侯以戍守罷敝中國豈伯主服人之道乎愚謂亦以見晉之眷鄭如此而鄭之反覆如彼也義又見五年戍陳案成湯東征西夷怨南征北狄怨武王克商通道於九夷八蠻今晉之伯區區與楚爭鄭戍鄭雖足以少戢問鼎之氣而功烈之卑如此王伯之道厥效較然有天下者可以知所擇矣楚公子貞帥師救鄭左氏曰楚子囊救鄭十一月諸侯之師還鄭而南至於陽陵楚師不退知武子欲退曰今我逃楚楚必驕驕則可與戰矣欒黶曰逃楚晉之恥也合諸侯以益恥不如死我將獨進師遂進己亥與楚師夾潁而軍子蟜曰諸侯既有成行必不戰矣從之將退不從亦退退楚必圍我猶將退也不如從楚亦以退之宵涉潁與楚人盟欒黶欲伐鄭師荀罃不可曰我實不能禦楚又不能庇鄭鄭何罪不如致怨焉而還今伐其師楚必救之戰而不克為諸侯笑克不可命不如還也丁未諸侯之師侵鄭北鄙而歸楚人亦還愚謂春秋凡書救皆彼善於此者也此書楚救鄭非許之也見楚人之強而敢與中國爭衡也楚强而與中國爭衡則足反居上首顧居下王綱墜人道亂矣義又見莊十年荆敗蔡師公至自伐鄭義見桓二年公至自唐十有一年春王正月作三軍杜氏曰萬二千五百人為軍增立中軍左氏曰季武子將作三軍告叔孫穆子曰請為三軍各征其軍穆子曰政將及子子必不能武子固請之穆子曰然則盟諸乃盟諸僖閎詛諸五父之衢正月作三軍三分公室而各有其一三子各毁其乘季氏使其乘之人以其役邑入者無征不入者倍征孟氏使半為臣若子若弟叔孫氏使盡為臣不然不舍孔氏曰往前民皆屬公國家自有二軍若非征伐不屬三子故三子自以其邑之民以為己之私乘今既三分公室所分得者即是已有不須更立私乘故三家各自壞舊時車乘部伍分以足成三軍也役謂供官力役即唐之丁也邑謂賦稅若唐之租調也季氏使所分得國內三分有一之人以其役與邑皆來入季氏者則無公征若不以入季氏者則使公家倍征之設利害以懼民驅之使入己耳民畏倍征則盡歸季氏所分得者無一入公也叔孫氏臣其子弟不臣其父兄謂取二分而二歸公也孟氏取其半又如叔孫所取其中止取其半又以半歸公取一分而三分歸公也故昭五年傳云季氏盡征之叔孫臣其子弟孟氏取其半焉劉氏曰至襄而作三軍也明襄之前未有三軍也及其舍之也又曰舍中軍明二軍猶在也孫氏曰古者天子六軍大國三軍次國二軍小國一軍魯次國而作三軍亂聖王之制也莘老孫氏曰蓋三桓而欲弱公室強私家不量其力之可否而頓作一軍春秋以為亂王制竭民力書曰作三軍也髙氏曰所謂大國三軍次國二軍小國一軍乃兵數之大率如此其實皆藏於農歲役不過三日此先王之法也魯次國也雖合二軍必天子以牙璋起之然後取之於農耳亦何俟於作哉三分公室各取其一而作為三軍王法所不容也故不書作中軍而云作三軍者雖二軍亦不可作所以罪三桓也夏四月四卜郊不從乃不郊義見成十年此但四卜少殊耳鄭公孫舍之帥師侵宋左氏曰鄭人患晉楚之故諸大夫曰不從晉國幾亡楚弱於晉晉不吾疾也晉疾楚將辟之何為而使晉師致死於我楚不敢敵而後可固與也子展曰與宋為惡諸侯必至吾從之盟楚師至吾又從之則晉怒甚矣晉能驟來楚將不能吾乃固與晉大夫說之使疆埸之司惡於宋宋向戌侵鄭大獲子展曰師而伐宋可矣若我伐宋則諸侯之伐我必疾吾乃聽命焉且告於楚楚師至吾乃與之盟而重賂晉師乃免矣夏鄭子展侵宋未詳信否獻可杜氏曰甚哉鄭之不道也介於晉楚不能以尊中國為心以致二國交伐不已今復侵宋以起諸侯之伐義又見莊十年公侵宋公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭左氏曰諸侯伐鄭己亥齊大子光宋向戌先至於鄭門於東門其莫晉荀罃至於西郊東侵舊許衛孫林父侵其北鄙六月諸侯會於北林師於向右還次於鎖圍鄭觀兵於南門西濟於濟隧髙氏曰齊光十年在滕子薛伯上已為僭矣此會又在莒子邾子上於是為甚見世子之益驕貫道王氏曰悼公進光不以禮光亦不自安於禮卒之見弒冝也愚謂此亦功過之舉義又見隱二年鄭伐衛秋七月己未同盟于亳城北亳公羊榖梁作京葉氏曰當從二傳京鄭邑太叔所封也未詳孰是杜氏曰亳城鄭地任氏曰偃師也故湯都左氏曰鄭人懼乃行成同盟于亳范宣子曰不愼必失諸侯諸侯道敝而無成能無二乎乃盟載書曰凡我同盟毋藴年毋壅利毋保姦毋留慝救災患恤禍亂同好惡奬王室或閒茲命司愼司盟名山名川羣神羣祀先王先公七姓十二國之祖明神殛之俾失其民隊命亡民踣其國家義見莊十六年師氏曰案去年秋諸侯伐鄭者晉悼之初駕今伐鄭而盟于亳城北者再駕也伐鄭而㑹于蕭魚者三駕也左氏謂晉侯謀所以急民三駕而楚不能爭者此也公至自伐鄭義見桓二年公至自唐葉氏曰前出而伐鄭者未知鄭服而盟也告伐鄭而已今雖盟而非其出告之事故復以伐鄭致也楚子鄭伯伐宋鄭至是與楚人三伐宋罪自見也義又見莊十年荆敗蔡師公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭會于蕭魚杜氏曰蕭魚鄭地鄭服而諸侯會左氏曰諸侯悉師以復伐鄭鄭人使良霄大宰石㚟如楚告將服於晉曰孤以社稷之故不能懷君君若能以玉帛綏晉不然則武震以攝威之孤之願也楚人執之諸侯之師觀兵於鄭東門鄭人使王子伯駢行成晉趙武入盟鄭伯鄭子展出盟晉侯會于蕭魚赦鄭囚皆禮而歸之納斥候禁侵掠晉侯使叔肸告於諸侯蘇氏曰鄭與會也自八年後晉楚爭鄭三年之閒晉人四以諸侯伐鄭楚輒救之晉用知罃之謀未嘗與楚人戰至是楚不能應遂全師以服鄭於是鄭固與晉二十餘年楚不能爭程子曰鄭不可信而晉悼公推誠以待人信之不疑至哉誠之能感人也邦衡胡氏曰所謂彼善於此者也其郤楚之功亦庶幾召陵城濮之風焉義又見隱二年鄭伐衛黃氏曰案左氏所載鄭之侵宋者鄭子展謀欲從晉故伐宋以致諸侯之師而後與之也諸侯伐鄭而同盟于亳城北者時鄭方行成故盟諸侯使毋二也楚子鄭伯又伐宋者楚未知鄭之隂已附晉尚率鄭以伐宋而鄭姑從之也晉又會諸侯伐鄭而會于蕭魚者鄭於是始決於從晉也楚執行人良霄者鄭已從晉使告於楚楚無以制之而姑執其行人以泄憤也夫鄭自公子騑公子發公子輒三人決於從楚故鄭歲受晉楚迭至之兵三子既為盜所殺子展當國改謀從晉知所向背矣然不即安於晉必伐宋致師待晉師再伐已而後藉以絶楚恐非謀國之要策若晉悼極力求鄭卒成蕭魚之㑹則伯功之盛也公至自會程子曰兵不加鄭故書至自會竊疑魯大蕭魚之功出雖以伐鄭告而歸以會告爾然不敢質也義見桓二年公至自㑹楚人執鄭行人良霄音消榖梁作宵杜氏曰良霄公孫輒之子伯有也左氏傳見上文髙氏曰此著晉之所以得鄭也鄭伯使良霄告絶於楚楚人怒而執之雖執之亦不伐鄭是不能得鄭也不能得鄭者勢分於吳也勢分於吳無如之何故執良霄以舒其憤悶不平之氣自是不復出師以與晉爭斯見楚力盡於此矣鄭於是乎堅從晉也冬秦人伐晉報去年伐秦之役也晉無故伐秦秦又報復之皆憤兵也義見隱七年戎伐凡伯十有二年春王三月莒人伐我東鄙圍台季孫宿帥師救台遂入鄆台榖梁作邰台杜氏曰琅邪費縣南有台亭鄆東鄆也見成九年孫氏曰莒背蕭魚之㑹伐我東鄙圍台公羊曰大夫無遂事此其言遂事何公不得為政爾榖梁曰受命而救台不受命而入鄆惡季孫宿也康侯胡氏曰台在邦域之中而專行之非有無君之心者不敢為也昭公逐定無正夫豈一朝一夕之故哉其所由來者漸矣義又見隱二年鄭伐衛莒入向貫道王氏曰魯自鄫亡而莒實為鄰伐魯東鄙屢矣小國既滅鄫又求多於魯台費之境也故宿出救而入鄆他時取鄆疆鄆田而季氏之費廣袤踰封君則實自宿始強也夏晉侯使士魴來聘左氏曰晉士魴來聘且拜師義見隱七年齊來聘秋九月吳子乘卒存耕趙氏曰吳前此不書卒自戚之會列於諸侯故乘以死赴於中國義見文十八年秦伯卒冬楚公子貞帥師侵宋義見莊十年荆敗蔡師公如晉義見僖十年公如齊十有三年春公至自晉髙氏曰見公在外不朝正於廟也義又見桓二年公至自唐夏取邿音詩公羊作詩滅而言取見宣九年杜氏曰邿小國任城亢父縣有邿亭義見莊十年齊滅談秋九月庚辰楚子審卒髙氏曰楚共王也義見文十八年秦伯卒冬城防朩訥趙氏曰魯有二防一近宋隱十年伐宋取防是也一近齊隱九年公會齊侯于防是也魯既事晉而外齊懼有齊師故城防以備之明年齊卒有圍成之役髙氏曰厥後齊髙厚伐我北鄙圍防則城防者畏齊也義見隱七年城中丘貫道王氏曰自季氏城費而後各城其私邑防臧氏之邑所謂以防求為後於魯者也武仲據邑以請非以其城池之固乎未詳是否十有四年春王正月季孫宿叔老會晉士丐齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人會吳于向蠆敕蘧切公羊作蠆下同叔老公孫嬰齊子叔老齊子也書人微者也杜氏曰向鄭地邦衡胡氏曰春秋書內大夫出會未有兩卿同行者此言季孫叔老見襄公失政小人之用事者衆矣義又見成十五年會吳于鍾離髙氏曰四卿帥師自成公始二卿列會自襄公始邦衡胡氏曰兩卿出會大夫既見於襄兩卿及盟諸侯又見於哀以戒後世小人不可使至衆衆必亂邦矣三月乙未朔日有食之義見隱三年夏四月叔孫豹會晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人伐秦括公羊作結左氏曰諸侯之大夫從晉侯伐秦以報櫟之役也晉侯待於竟使六卿帥諸侯之師以進及涇不濟叔向見叔孫穆子穆子賦匏有苦葉叔向退而具舟魯人莒人先濟鄭子蟜見衛北宫懿子曰與人而不固取惡莫甚焉若社稷何懿子說二子見諸侯之師而勸之濟濟涇而次秦人毒涇上流師人多死鄭司馬子蟜帥鄭師以進師皆從之至於棫林不獲成焉荀偃令曰雞鳴而駕塞井夷竈唯余馬首是瞻欒黶曰晉國之命未是有也余馬首欲東乃歸下軍從之左史謂魏莊子曰不待中行伯乎莊子曰夫子命從帥欒伯吾帥也吾將從之從帥所以待夫子也伯游曰吾令實過悔之何及多遺秦禽乃命大還晉人謂之遷延之役未詳是否髙氏曰春夏興師煩擾中國邦衡胡氏曰秦强敵也其與晉交伐久矣十一年又伐晉是好亂也然非不可懷來者晉遽合諸侯之師以伐之而以征伐之權委諸大夫失刑政矣朩訥趙氏曰用諸侯之兵以報已怨罪也然自是一伐秦終春秋之世秦不敢復侵晉己未衛侯衎出奔齊左氏榖梁無衎字葉氏曰闕文也左氏曰衛獻公戒孫文子寧惠子食皆服而朝日旰不召而射鴻於囿二子從之不釋皮冠而與之言二子怒孫文子如戚孫蒯入使公飲之酒使大師歌巧言之卒章大師辭師曹請為之初公有嬖妾使師曹誨之琴師曹鞭之公怒鞭師曹三百故師曹欲歌之以怒孫子以報公公使歌之遂誦之蒯懼告文子文子曰君忌我矣弗先必死并帑於戚而入見蘧伯玉曰君之暴虐子所知也大懼社稷之傾覆將若之何對曰君制其國臣敢奸之雖奸之庸知愈乎遂行從近關出公使子蟜子伯子皮與孫子盟於丘宫孫子皆殺之四月己未子展奔齊公如鄄使子行於孫子孫子又殺之公出奔齊孫氏追之敗公徒於阿澤鄄人執之初尹公他學射於庾公差庾公差學射於公孫丁二子追公公孫丁御公子魚曰射為背師不射為戮射為禮乎射兩軥而還尹公他曰子為師我則逺矣乃反之公孫丁授公轡而射之貫臂子鮮從公及竟公使祝宗告亡且告無罪定姜曰無神何告若有不可誣也有罪若何告無舍大臣而與小臣謀一罪也先君有冢卿以為師保而蔑之二罪也余以巾櫛事先君而暴妾使余三罪也告亡而已無告無罪衛人立公孫剽孫林父寧殖相之以聽命於諸侯師曠侍於晉侯晉侯曰衛人出其君不亦甚乎對曰或者其君實甚良君將賞善而刑淫養民如子蓋之如天容之如地民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆其可出乎夫君神之主也民之望也若困民之主匱神之祀百姓絶望社稷無主將安用之弗去何為天生民而立之君使司牧之勿使失性有君而為之二使師保之勿使過度是故天子有公諸侯有卿卿置側室大夫有二宗士有朋友庶人工商皂隸牧圉皆有親昵以相輔佐也善則賞之過則匡之患則救之失則革之自王以下各有父兄子弟以補察其政史為書瞽為詩工誦針諫大夫規誨士傳言庶人謗商旅於市百工獻藝故夏書曰遒人以朩鐸徇于路官師相規工執藝事以諫正月孟春於是乎有之諫失常也天之愛民甚矣豈其使一人肆於民上以從其淫而棄天地之性必不然矣康侯胡氏曰臣而逐君其罪已眀矣君擅一國之名寵神之主而民之望也何可出也所為見逐無乃肆於民上縱其淫虐以棄天地之性乎春秋端本清源故不書所逐之臣而以自奔為名所以警乎人君者為後世鑒也愚謂自成七年書孫林父出奔晉十四年書孫林父自晉歸於衛又見於鍾離善道之會又來聘而遂盟而終之以衛侯出奔則權臣逆命晉厲黨惡皆可為後世鑒不特衛侯之不君也義又見桓十五年鄭突奔蔡莒人侵我東鄙髙氏曰莒自滅鄫之後凡四伐我矣義見隱二年鄭伐衛秋楚公子貞帥師伐吳義見僖三年徐取舒冬季孫宿會晉士丐宋華閲衛孫林父鄭公孫蠆莒人邾人于戚戚見文元年左氏曰晉侯問衛故於中行獻子對曰不如因而定之衛有君矣伐之未可以得志而勤諸侯君其定衛以待時乎冬會于戚謀定衛也張氏曰前書衛侯之奔此列孫林父於衛足見晉伯主抑君而臣是助具書於策則晉大夫之黨孫林父罪惡自見貫道王氏曰戚林父邑也合列國於孫氏私邑抑君而臣是助非正名之義矣是役列國之大夫為會政在大夫不可反矣髙氏曰剽逐其君而篡其位王法所不容而晉合諸侯以定之無王之甚也義又見文十一年會于承筐黃氏曰荀偃本亦弒賊故為逆賊孫林父謀而成其亂於孫林父之私邑凡今年春列國之會于向者大半不至亦可見人心之公而晉悼坐荀偃之誤不少矣自是至剽賊而衎歸有二君者十年晉實為之也以悼公之賢而有此惜哉蓋公怠矣明年遂薨十有五年春宋公使向戌來聘二月己亥及向戌盟于劉髙氏曰凡因聘而盟者必在國內如成三年晉侯使荀庚來聘衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟十一年晉侯使郤犫來聘己丑及郤犫盟襄七年衛侯使孫林父來聘壬戌及孫林父盟是也劉蓋王畿采地豈有來聘魯而逺盟於劉者乎蓋下文有劉夏傳者因以為春夏之夏與文四年夏逆婦姜于齊同文故誤增于劉二字耳義見成三年晉荀庚來聘劉夏逆王后于齊杜氏曰劉采地夏名也劉夏非卿故書名也任氏曰劉夏書名士也愚謂天子嫁女於諸侯使同姓主之娶后亦使同姓主之故魯史得書於策而春秋因以見義耳常山劉氏曰昏姻者人倫之本王后者天下之母劉夏非三公而逆后是不重人倫之本不尊天下之母禮何以興風化何以成乎莘老孫氏曰天子無親逆之禮逆后則使三公春秋書逆后者二祭公得行禮而又書之者譏遂事也劉夏之逆則以非三公譏之春秋周王十二而逆后者惟二足知非禮則書也夏齊侯伐我北鄙圍成公救成至遇成見桓六年杜氏曰遇魯地左氏曰齊侯圍成二於晉故也公羊曰其言至遇何不敢進也髙氏曰齊於是二晉是時衛侯在齊季孫宿為戚之會以定衛而齊不與齊固有憾於諸國矣而猶懷夫袁婁之恥者也伐我北鄙以此之故魯於是時已三分其民而公室卑弱已不足以當敵故書公救成至遇以見意焉愚謂齊侯伐魯固無王矣然自晉士丐會林父定衛剽而齊始背盟成魯邑也而書救又書至遇則王綱不振襄不能君三家分魯舉形可見自此至十八年齊五伐魯故又為十八年諸侯同圍齊起文也君舉陳氏曰自宣之季年內不言君將於是書救成而不敢進矣無惑乎三家之專魯也季孫宿叔孫豹帥師城成郛成公羊作郕杜氏曰郛郭也髙氏曰成郛壞而以非時城之也此孟孫之邑而季孫叔孫帥師城之者見三家相黨以備齊為名而興役之衆故其城堅固可守卒為魯患而不可墮也定十二年公圍成是也義又見隱七年城中丘邦衡胡氏曰城築二十有九大夫帥師而城者三見文襄之際大夫張矣故帥師而城者皆三家也秋八月丁巳日有食之義見隱三年邾人伐我南鄙左氏曰邾人伐我南鄙使告於晉晉將為會以討邾莒晉侯有疾乃止晉悼公卒遂不克會貫道王氏曰邾屬於齊而黨於莒齊莒來伐故邾亦效尤義見隱二年鄭伐衛許氏曰政在君則民一民一則國强政在臣則民二民二則國弱魯自文襄失政大夫益竊國靈齊與邾莒交伐其國不競甚矣無他民分於桓故也冬十有一月癸亥晉侯周卒義見隱三年宋公卒黃氏曰悼公生十四年而立三十而卒其經營楚鄭時方二十四五功視桓文而德過之嗚呼盛哉朩訥趙氏曰晉室中僨三郤誅厲公弒悼公以公族自外入繼即位之初慨然思復文公之業一為宋圍彭城而得諸侯再奪鄭虎牢而得陳鄭外抗強楚蕭魚之會不戰不盟楚不敢爭鄭不忍叛雖召陵之役不是過也其功業直將俎豆文公於百載之上襄成靈厲有慙德矣以傳觀之所以成伯業者抑亦內外兩治者歟其為國也施舍已責逮鰥寡振廢滯康乏困救災患禁淫慝薄賦斂宥罪戾舉不失職官不易方爵不踰德師不陵正旅不逼官民無謗言所以復伯業若傳果無溢美則悼公直出桓文之上餘見僖三十二年晉侯重耳卒十有六年春王正月葬晉悼公髙氏曰三月而葬簡也義又見隱三年葬宋穆公存耕趙氏曰平公彪欲合諸侯以為榮不待期而葬父使下從大夫之禮無人心矣三月公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于湨梁戊寅大夫盟湨古闃切蘇氏曰衛侯剽也二十五年衛侯入於夷儀衎也二君皆稱衛侯猶鄭突及儀皆稱鄭伯也孫氏曰湨梁晉地杜氏曰湨水出河內軹縣東南至溫入河雞澤會重序諸侯今此閒無異事即諸侯大夫可知左氏曰平公即位羊舌肸為傅張君臣為中軍司馬祈奚韓襄欒盈士鞅為公族大夫虞丘書為乘馬御改服修宫蒸於曲沃警守而下會于湨梁命歸侵田公羊曰諸侯在是其言大夫盟何信在大夫也君若贅旒然榖梁曰湨梁之會諸侯失正矣義又見隱元年盟于蔑髙氏曰為討邾莒也邾莒連伐魯魯使告於晉晉悼公將為會以討之遇疾乃止平公即位遂成父志夫居喪而出會失盟主之禮矣是時齊有崔髙衛有孫寧六卿分晉三家柄魯祿去公室浸以衰微聖人因此盟以著喪亂之階康侯胡氏曰上二年春會于向十有四國之大夫也夏會伐秦十有三國之大夫也冬會于戚七國之大夫也此三會皆國之大事也使大夫專之而諸侯不與焉是列國之君不自為政弗躬弗親禮樂征伐已自大夫出矣況悼公既沒晉平初立無先公之明也君若贅旒而大夫張亦宜矣夫豈一朝一夕之故哉善惡積於至微而不可掩常情忽於未兆而弗預謀趙籍韓䖍魏斯為諸侯之勢見矣有國者謹於禮而不敢忽此春秋以待後世之意也晉人執莒子邾子以歸左氏曰以我故執邾宣公莒犂比公且曰通齊楚之使劉氏曰邾莒交伐魯將討焉而悼公卒平公即位知莒子邾子之可以討矣而未知己之不可以討也用亂治亂用不肖治不肖禍乃始作非正本之意也孟子曰惟天吏則可以伐之夫孟子可謂知本矣何氏曰諸侯有罪當歸京師不得自治之録以歸惡其專也齊侯伐我北鄙義見隱二年鄭伐衛亦為諸侯同圍齊起文也夏公至自會義見桓二年公至自唐貫道王氏曰書至於齊伐之後見諸侯之會未散而齊己抗矣五月甲子地震義見文九年叔老會鄭伯晉荀偃衛寧殖宋人伐許髙氏曰晉卿主兵而先鄭伯者臣不可過君也宋稱人微者也宋當在諸國之上今列衛寧殖下故知微者也愚謂二者皆魯史之文也邦衡胡氏曰衛寧殖出其君其惡大矣鄭伯荀偃會之伐許是黨惡也義又見隱二年鄭伐衛秋齊侯伐我北鄙圍成公羊作郕成見桓六年義見隱二年鄭伐衛亦為諸侯同圍齊起文也大雩義見桓五年冬叔孫豹如晉左氏曰穆叔如晉聘且言齊故晉人曰以寡君之未禘祀與民之未息不然不敢忘穆叔曰以齊人之朝夕釋憾於敝邑之地是以大請敝邑之急朝不及夕引領西望曰庶幾乎比執事之閒恐無及也見中行獻子賦圻父獻子曰偃知罪矣敢不從執事以同恤社稷而使魯及此見范宣子賦鴻鴈之卒章宣子曰丐在此敢使魯無鳩乎義見隱七年齊來聘春秋本義卷二十一
