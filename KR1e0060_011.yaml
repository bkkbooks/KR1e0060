body:
  text: 春秋本義卷十一元程端學撰僖公九年春王三月丁丑宋公御説卒御公羊穀梁作禦左氏曰桓公卒愚謂此為宋子出會葵邱起也髙氏曰不書葬者宋子出會諸侯故諸侯併與天王之葬皆不會也夏公會宰周公齊侯宋子衛侯鄭伯許男曹伯于葵邱張氏曰宰冢宰周公名孔王之三公食來於周扶風雍縣東北周城是也康侯胡氏曰宰周公者以冢宰兼三公也古者三公無其人則以六卿之有道者兼師保之任冢宰或闕則以三公下行端揆之職左氏曰宋桓公卒未葬而襄公會諸侯故曰子趙氏曰凡諸侯在喪而出以喪行者稱子以吉行者稱爵志惡之淺深也杜氏曰陳留外黃縣東有葵邱張氏曰即開封雍邱縣也劉氏曰七年左氏所云惠王崩襄王惡大叔帶之難懼不立不發喪而告難於齊者實八年十二月事也八年盟于洮謀王室者實今葵邱事也理或然也髙氏曰惠王方崩諸侯不會其喪襄王在諒暗之中百官總己方聽於冢宰而齊侯既不帥諸侯朝之反相會以致天子之宰以天子之宰反來下會諸侯大義乖矣夫君子不奪人之喪齊侯為伯主當遏密之時大會諸侯又使宋子與會然則所仗大義果安在哉榖梁曰禮􅦮在堂孤無外事今背殯而出會以宋子為無哀矣義又見隱九年會于防存耕趙氏曰襄王之立非惠王意也惠后猶在王雖立恐諸侯之或二也故桓請王命以盟諸侯而王亦出重臣以臨之齊雖忠於周而周以齊而輕矣案首止桓以定世子之位今襄王已立雖有子帶之慮桓若率諸侯以朝王而聽命焉則一正君而國定矣桓公管仲學不知此狃首止之殊盟而亦用之周公徒偃蹇於外以聲勢足以震蕩諸侯天子亦依以為一日之安爾秋七月乙酉伯姬卒伯姬僖公未嫁姊妹也穀梁曰婦人許嫁笄而字之死則以成人之喪治之愚謂禮女子十有五年而笄二十而嫁然則未許嫁者固亦笄而字矣案禮期之喪諸侯絶惟姊妹姪不絶不降則僖公當為之服矣僖公於時不服則無親以凶服臨葵邱之會則吉凶紊矣齊桓奪人之喪而使之盟亦非禮也髙氏曰公自出會聞伯姬之卒不復歸臨其喪無親親之義也莘老孫氏曰春秋內女許嫁而卒惟二爾伯姬子叔姬是也九月戊辰諸侯盟于葵邱陸氏曰盟稱諸侯者前目後凡之義且明周公之不與盟也張氏曰其義與首止同孟子曰五伯桓公為盛葵邱之會諸侯束牲載書而不歃血初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育材以彰有德三命曰敬老慈幼無忘賔旅四命曰士無世官官事無攝取士必得無專殺大夫五命曰無曲防無遏糴無有封而不告曰凡我同盟之人既盟之後言歸於好左氏曰宰孔先歸遇晉侯曰可無會也齊侯不務德而勤逺略北伐山戎南伐楚西為此會也東略之不知西則否矣其在亂乎君務靖亂無勤於行晉侯乃還愚案此盟即會葵邱之事襄王有子帶覬覦之難桓公率諸侯翼戴天子既會冢宰又自為盟使天下知有冢嫡有共主而襄王大位得以粗安齊桓之功亦大矣然不過假尊王之名以適吾之所便故不暇奔惠王之喪聽冢宰之命於朝既致冢宰於葵邱而又自為盟焉遙制朝政權自己出拂君臣之大經此其大罪也大功不可以不與大罪不可以不明故聖人直書以示戒其尊君抑臣貴王賤伯之義顯矣義又見隱元年盟于蔑胡氏曰孟子之言非與桓也當時中國並為十二其亂又甚於春秋其曰五霸三王之罪人今之諸侯五霸之罪人孟子非美齊桓可知張氏曰一命之詞三綱所繫蓋修身正家之要自此以下尊賢敬臣子民柔逺人懷諸侯之意略備其提挈綱領以正率人蓋春秋之所未有雖然大學之道有諸已而後求諸人無諸已而後非諸人桓公於易樹子以妾為妻之禁終不免躬自犯之固無以令諸侯正天下矣况道不足以治心諸侯方服而驕其視夫諸侯大會而作誥謂兹朕未知獲戾于上下栗栗危懼若將隕于深淵以謹造邦匪彞慆淫之戒者何翅霄壤之殊哉甲戌晉侯佹諸卒佹九委切張氏曰左氏穀梁作甲子不應甲子在戊辰之後合從公羊作甲戌佹公穀作詭晉侯獻公也此書卒為奚齊卓子見殺起也不書葬豈魯從齊桓而不會其葬歟冬晉里克殺其君之子奚齊殺公羊作弒里克世子申生之傅也其君之子里克之君之子也非居喪稱子之義奚齊晉獻庶子驪姬所出疑荀息欲立奚齊而諸大夫不從故奚齊未立而里克殺之奚齊既非嫡嗣而又未立則固其君之子也故不書曰弒其君奚齊外傳曰驪姬將殺申生而難太子之傅里克謀於優施飲里克酒為鳥烏集枯之歌以感動里克里克欲中立以免難稱疾不朝驪姬遂得以成其殺申生之謀及獻公卒乃殺奚齊卓子而欲納重耳左氏曰獻公卒里克丕鄭欲納文公故以三公子之徒作亂初獻公使荀息傅奚齊公疾召之曰以是藐諸孤辱在大夫其若之何稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之公曰何謂忠貞對曰公家之利知無不為忠也送往事居耦俱無猜貞也及里克將殺奚齊先告荀息曰三怨將作秦晉輔之子將何如荀息曰將死之里克曰無益也荀叔曰吾與先君言矣不可以二能欲復言而愛身乎雖無益也將焉辟之且人之欲善誰不如我我欲無二而能謂人已乎冬十月里克殺奚齊於次荀息將死之人曰不如立卓子而輔之荀息立公子卓以葬愚謂里克為申生傅當晉獻殺申生時不以死爭而欲中立免難偷生失節矣及晉獻死乃旋為申生報怨而殺奚齊夫奚齊雖庶孽乃其君之子也若不當立宜别立君而處奚齊於一所且殺申生者晉獻也非奚齊也一旦殺奚齊則是臣報君怨非里克殺其君之子而何哉朱子曰里克事只以左傳所書未見其是非國語載驪姬隂託里克之妻其後里克守不定遂有中立之説他當時只難里克里克不變太子可安由是觀之里克之罪明矣又曰他倒了處便在那中立上天下無中立之事自家若排得他便用排退他若奈何不得便用自死今一許驪姬中立他事便了便是他求生避禍十年春王正月公如齊啖氏曰凡公及內卿往他國朝聘皆書曰知愚謂如者往也故上下內外通言之然外諸侯大夫來魯朝聘皆明書之魯往他國朝聘皆但言如者亦內辭而孔子因之也又見桓五年齊鄭如紀蓋魯不朝王而朝齊伯業愈盛而王綱愈墜矣魯然則他國可知趙氏曰所以傷王室之微著諸侯之不臣也義又見隱十一年滕薛來朝張氏曰莊公十三年柯之盟魯已服齊雖莊公因婚姻一再如齊自此魯不朝齊者幾二十年蓋桓公伯業未成不責諸侯以朝禮也今僖公始朝齊見於葵邱之後伯體漸肆諸侯不朝天子而朝伯主自是始矣狄滅溫溫子奔衛杜氏曰蓋中國之狄張氏曰溫即孟州溫縣本周畿內國成王時司寇蘇忿生之邑此見王靈不振畿內諸侯狄得滅之此天王出居鄭之權輿也義又見隱七年戎伐凡伯髙氏曰著狄益熾也伐邢矣入衛矣伐晉矣今又滅溫滅天子之邑而逼逐天子之大臣齊侯可不治諸愚謂王畿有事諸侯奔命狄滅溫桓公若不聞焉其夏乃伐北戎則伯主尊王假而已矣晉里克弒其君卓及其大夫荀息公羊卓下有子字卓驪姬之娣所出者此稱弒其君卓卓已立也事見殺奚齊張氏曰聖人以里克當申生未死之前不能以死正諌而中立以求免坐視太子無罪而死以成驪姬讒賊之謀及其終也而弒二君夫卓子雖庶孽既立乎其位則固里克之君也君臣之分已定而犯上作亂如此故正名其弒君髙氏曰荀息從君於昏固不足言然能後身先義亦可為偷生者之勸矣愚謂卓已立則里克嘗北面事之矣而又殺之非里克弒其君而何哉然奚齊卓子躬無大惡而不得其死者其父致之也晉獻嬖寵孽殺樹子幸免其身卒及臣子晉國大亂後世君人者可以鑒此矣義又見桓二年宋督事康侯胡氏曰里克是謂持祿容身速獻公殺適立庶之禍者正其弒逆之罪雖欲辭而不受其可得乎使克明於君臣大義據經廷諍以動其君執節不二以固太子其濟則國之福也其不濟則死於其職亦無歉矣人臣所明者義於功不貴幸而成所立者節於死不貴幸而免克欲以中立祈免自謂智矣而亦終不能免等死耳不死於世子而死於弒君其亦不知命之蔽哉為人臣而不知春秋之義者必陷篡弒誅死之罪克之謂也朱子曰荀息未見有可取者但始終守節死君之難亦可取爾劉氏曰里克能不聽優施之謀寧喜能不從孫林父之亂陳乞能不隨景公之惑則晉無殺世子之禍衛無逐君之惡齊無嬖孽之變矣患在偷安苟容逢君之惡故春秋正其篡弒之罪也陳平之王吕氏誅少帝也似此皆不明於臣之分者也夏齊侯許男伐北戎杜氏曰北戎山戎也未詳是否薛氏曰當時患有大於戎者狄及晉楚是也晉滅虢滅虞狄嘗入衛逼邢前年伐晉又近滅溫召陵之後楚滅弦圍許豈可置而不圖捨強圖弱守衛果如是乎所謂不務德而勤逺略况許方患楚而驅以伐戎非用人之道也義又見莊三十年伐山戎晉殺其大夫里克左氏曰九年晉郤芮使夷吾重賂秦以求入齊隰朋帥師會秦師納晉惠公十年夏四月周公忌父王子黨會齊隰朋立晉侯晉侯殺里克以説將殺里克公使人謂之曰微子則不及此雖然子弒二君與一大夫為子君者不亦難乎對曰不有廢也君何以興欲加之罪其無辭乎臣聞命矣伏劒而死於是丕鄭聘於秦且謝緩賂故不及穀梁曰里克弒二君與一大夫其殺之不以其罪也里克所為弒者為重耳也夷吾曰是又將殺我乎故殺之不以其罪也莘老孫氏曰春秋之法雖弒君之賊以其罪討之則書之為人不以其罪討之則為專殺里克雖有弒君之罪夷吾嘗命為大夫矣又以已私殺之晉殺其大夫耳非討賊也義又見莊二十六年曹殺大夫康侯胡氏曰若惠公既立謂里克曰先君命大夫為世子傅世子死非其罪而大夫不恤若奚齊者既有先君之命矣而大夫又殺之以及卓大夫雖殺之獨不念先君之命乎則克必再拜而死不復有言矣惠公乃曰又將圖寡人是殺之不以其罪也葉氏曰晉里克衛寧喜皆弒其君者也然不書討賊之辭而與殺大夫一施之何哉所以殺者非討賊也卓死惠公求入里克實迎立焉則惠公固幸卓之死而竊其位者也衛獻公之入立則固與聞乎弒矣是以求復於喜曰苟反政由寧氏祭則寡人此豈可責以討賊者歟及其得國惠公則曰子弒二君一大夫為子君者不亦難乎而後殺克獻公既以政許寧喜而患其專乃與公孫無地公孫臣謀攻寧氏免餘殺喜而尸諸朝其討克與喜者皆畏其害己而除之者也孔子曰名不正則言不順其極至於刑不中無所措手足使惠獻無愧於卓與剽歸正二罪之臣而誅焉春秋如之何不書曰晉人殺里克衛人殺寧喜乎秋七月冬大雨雪雨于付切公羊作雹公羊曰記異也莘老孫氏曰非常則為災故志之爾愚案冬而雨雪常也大雨雪則隂勝陽而極備凶矣春秋書雨雪者三而言大者二十有一年春晉殺其大夫丕鄭父丕普悲切公羊作邳左氏曰十年丕鄭之如秦也言於秦伯曰吕甥郤稱冀芮實為不從若重問以召之臣出晉君君納重耳蔑不濟矣秦伯使泠至報問且召三子郤芮曰幣重而言甘誘我也遂殺丕鄭未詳信否義見莊二十六年曹殺大夫蘇氏曰丕鄭里克之黨也惠公既殺里克丕鄭言於秦伯請出晉君而納重耳鄭則有罪矣然鄭之謀由里克致之也未詳信否夏公及夫人薑氏會齊侯于陽穀葉氏曰薑氏聲薑也陽穀見三年邦衡胡氏曰魯以文薑哀薑亂內外之限連喪三君而僖公不監往轍又與夫人出會則男女之位復不正矣齊桓方務伯業不能以禮屬諸侯而以亂終之所以不振也參譏之張氏曰男女無别則瀆亂生諸侯會伯主而婦人與焉君臣之大義中外之大計凡所當講者必有所不及而般樂瀆亂浸淫日長宜桓公自是以往黃亡不救徐救不力女寵盛行伯業遂衰而魯僖之怠棄國政亦自此始矣可不戒哉秋八月大雩義見桓五年冬楚人伐黃左氏曰黃人不歸楚貢冬楚人伐黃康侯胡氏曰黃人慕義背楚即齊被兵城守更歷三時告命已至而援師不出則失救患分災禦強暴安與國之義矣罪桓公既與盟而又不能救也義又見僖三年徐取舒亦為明年滅黃起也張氏曰中國外裔之勢相為消長而未有不原於心故曰毋怠毋荒四夷來王桓公怠荒之心見於陽榖之會矣楚人占之而遂興伐黃之師也十有二年春王三月庚午日有食之義見隱三年夏楚人滅黃左氏曰黃人恃諸侯之睦於齊也不供楚職曰自郢及我九百里焉能害我夏楚滅黃榖梁曰貫之盟管仲曰江黃逺齊而近楚楚為利之國也若伐而不能救則無以宗諸侯矣桓公不聽遂與之盟管仲死楚伐江滅黃桓公不能救故君子閔之也康侯胡氏曰見荆楚之強諸夏之弱責方伯連帥之不修其職使小國困於強暴不得其所義又見僖三年徐人取舒存耕趙氏曰不言奔上下同力死社稷也愚謂周道衰諸侯橫江黃國小而近楚楚人固已視為几上肉矣然不有齊桓之盟或可緩數年之命未必見滅如是之速也齊桓既與之盟而不救則君子之責有所歸矣夫齊桓未伯其求諸侯如此之勤也伯業既盛而棄江黃如敝屣者何也以德行仁者德愈盛而心愈固以力假仁者力盡志溢則怠矣故貴王賤伯春秋之大義也秋七月冬十有二月丁丑陳侯杵臼卒杵公羊作處義見隱三年宋公卒又為陳侯居喪出會起文也十有三年春狄侵衛義見隱七年戎伐凡伯張氏曰楚既滅黃而齊莫之恤侵衛之師所以肆行也夏四月葬陳宣公義見隱三年葬宋穆公公會齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹杜氏曰鹹衛地東郡濮陽縣東南有鹹城愚謂次年春有諸侯城緣陵事則此會謀城緣陵也義見隱九年會于防秋九月大雩義見桓五年冬公子友如齊義見隱七年齊來聘張氏曰陽穀寧母及鹹之會其後公子友皆如齊蓋伐楚服鄭城緣陵之事魯皆同之足以見友專魯政也十有四年春諸侯城緣陵趙氏曰此即上會鹹之諸侯不列序者前目後凡耳緣陵漢書地理志北海營陵瓚曰春秋謂之緣陵張氏曰即濰州樂昌縣愚案緣陵經不言國未詳何為大意譏諸侯僭天子之權著伯者之功過也夏六月季姬及鄫子遇于防使鄫子來朝鄫似陵切穀梁作繒季姬僖公妹趙氏曰魯未嫁女也張氏曰鄫國禹後姒姓漢屬東海郡晉屬琅邪在沂州承縣東北有鄫故城又有鄫山穀梁曰遇者同謀也公羊曰非使來朝使來請已也何氏曰男不親求女不親許魯不防正其女乃使要遮鄫子淫泆使來請已與禽獸無異存耕趙氏曰夫婦之始不正如此書之以見僖公之不兄鄫子之不夫季姬之不可以為女矣孫氏曰此年六月季姬鄫子遇于防使鄫子來朝明年九月季姬歸于鄫是季姬先與鄫子遇于防而後嫁也此季姬之行不正可知矣秋八月辛卯沙鹿崩杜氏曰沙鹿山名陽平元城縣東有沙鹿土山在晉地穀梁曰沙山名林屬於山為鹿張氏曰漢書元后傳作麓杜説近是劉氏曰山不可以繫國名山大澤不以封公羊曰為天下紀異也莘老孫氏曰王道大壞彞倫一斁而天下之人皆反皇極則天見其變而日食星孛地見其妖而川竭山崩所以召之在於天下沙鹿梁山崩雖在於晉不可以晉言也康侯胡氏曰詩稱百川沸騰山冢崒崩言西周之將亡也沙鹿崩雖不指其事應而事應具存此春秋畏物之反常為異使人恐懼修省其垂戒明矣愚謂日星隕食山川崩竭繫之天下有天下者之責也然諸侯各有民社血脈貫通豈可委之天下而不自省哉夫災異固不可指一事而言然沙鹿崩而天王居鄭其山在晉而晉侯見獲於秦他如齊桓卒而伯業衰楚氛益熾而遂主夏盟此其可見之大略也夫豈天心哉皆人事亂紀以召天地災異而天地災異復為生民害蓋感必有應應復為感有天下國家者在於謹人事慎所感而已狄侵鄭義見隱七年戎伐凡伯冬蔡侯肸卒大意見隱七年滕侯卒十有五年春王正月公如齊義見隱十一年滕薛來朝獻可杜氏曰魯之所朝者惟齊晉楚楚人伐徐義見三年徐取舒三月公會齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘遂次于匡公孫敖帥師及諸侯之大夫救徐穀梁無衛侯二字公羊有之而在陳侯之上帥公羊作率牡丘張氏曰齊地齊語曰築五鹿中牟蓋與牡丘以衛諸夏之地注云四塞諸夏之闕也地譜云與匡近杜氏曰匡衛地在陳留長垣縣西南張氏曰即開封府長垣縣西南杜氏曰公孫敖慶父之子左氏曰楚人伐徐徐即諸夏故也盟于牡丘尋葵丘之盟且救徐也孟穆伯帥師及諸侯之師救徐諸侯次于匡以待之康侯胡氏曰楚都于郢距徐亦逺而舉兵伐徐暴橫憑陵之罪著矣徐在山東與齊密邇非有餽糧越險之難也今書盟于牡丘見諸侯救患之不協矣書次于匡見伯主號令之不嚴矣書大夫帥師而諸侯不行見桓德益衰而禦強暴安中國之志怠矣中庸曰至誠無息不息則久春秋謹始卒欲有國者敦不息之義也義又見莊二十八年救鄭愚案書公孫敖帥師見孟氏之專兵亦為下書楚人敗徐起文也夏五月日有食之不書日闕文也義見隱三年秋七月齊師曹師伐厲杜氏曰厲楚與國義陽隨縣北有厲鄉張氏曰即徐州徐縣在徐楚之間左氏曰伐厲以救徐也十六年夏齊伐厲不克救徐而還未詳信否愚謂於此可見齊之不專於救徐矣義又見隱三年鄭伐衛張氏曰兵法攻所必救謂之竒兵然繼此楚敗徐于婁林則厲在所不必救明年而後不克救而還正所謂未聞巧之久者况同盟不同心而宋已伐同役之曹乎八月螽公羊作􅏑義見桓五年九月公至自會義見桓二年公至自唐髙氏曰公自正月如齊因而會盟暴師於外已踰三時以會致者始於此季姬歸于鄫先書遇于防使來請已而繼書歸于鄫則男女之不正可知髙氏曰去秋與鄫子遇于防因其自請而遂許之所謂不待父母之命媒妁之言而相從者也今公方自會至而季姬遽歸于鄫厥後鄫子所以取禍者甚酷豈無自而然哉存耕趙氏曰魯諸姑之失教由諸嫂始也女之失教由母始也文薑哀薑以淫恣聲薑效之委姬遂狃以為習矣己卯晦震夷伯之廟趙氏曰晦者晦朔之晦公羊曰震之者雷電擊夷伯之廟也杜氏曰夷伯魯大夫展氏之祖父夷諡伯字左氏曰展氏有隱慝焉程子曰夷伯之廟震而言震夷伯之廟天應之也張氏曰天之擊怒每在於惡熟而人不加誅之後君子知天之日監而畏其威所以事天也張子曰凡隂氣凝聚陽在內者不得出則奮擊而為雷霆不善之積蓋亦如此冬宋人伐曹義見隱二年鄭伐衛薛氏曰宋人內叛則桓德之衰襄志之私皆可見矣君舉陳氏曰諸夏之相加兵於是再見宋襄為之也許氏曰同盟始相攻桓不能一矣則何以禁外裔之亂伯德方衰荒服窺夏至是而諸侯浸以二矣威靈之陵夷可不慎哉愚謂齊桓圖伯四十年間諸夏莫爭外裔稍沮其功大矣及其終也人心離二同盟相伐身親見之以力假仁其效如此楚人敗徐于婁林婁力侯切杜氏曰婁林徐地下邳僮縣東南有婁亭張氏曰在泗州臨淮縣左氏曰徐恃救也愚謂以七國之衆不能敵楚千里之孤兵春秋書諸侯之盟之次大夫之帥師於前書齊曹伐厲宋人伐曹於中書楚人敗徐於後則齊桓之無志諸侯之解體救徐之不力其情自見矣此皆以力假仁之效也十有一月壬戌晉侯及秦伯戰于韓獲晉侯秦嬴姓伯爵顓帝之後周孝王時分土為附庸邑秦之六世至襄公將兵救周送平王東遷有功封為諸侯葉氏曰秦伐晉惠公逆而請戰故書晉侯及秦伯言晉之主此戰也張氏曰韓後為韓國即同州韓城縣獲見元年秦舍晉君於外已而歸之故不言以歸也左氏曰晉侯之入也秦穆姬屬賈君焉且曰盡納羣公子晉侯蒸於賈君又不納羣公子是以穆姬怨之晉侯許賂中大夫既而皆背之賂秦伯以河外列城五東盡虢略南及華山內及解梁城既而不與晉飢秦輸之粟秦飢晉閉之糴故秦伯伐晉晉侯謂慶鄭曰冦深矣若之何對曰君實深之可若何公曰不孫卜右慶鄭吉弗使步揚御戎家僕徒為右乘小駟鄭入也慶鄭曰古者大事必乘其産生其水土而知其人心安其教訓而服習其道唯所納之無不如志今乘異産以從戎事及懼而變將與人易亂氣狡憤隂血周作張脈僨與外強中乾進退不可周旋不能君必悔之弗聽九月晉侯逆秦師使韓簡視師復曰師少於我鬬士倍我公曰何故對曰出因其資入用其寵飢食其粟三施而無報是以來也今又擊之我怠秦奮倍猶未也公曰一夫不可狃况國乎遂使請戰韓簡退曰吾幸而得囚壬戌戰於韓原晉戎馬還濘而止公號慶鄭慶鄭曰愎諫違卜固敗是求又何逃焉遂去之梁由靡御韓簡虢射為右輅秦伯將止之鄭以救公誤之遂失秦伯秦獲晉侯以歸晉大夫反首拔舍從之穆姬聞晉侯將至以太子罃𢎞與女簡璧登臺而履薪焉使以免服衰絰逆且告曰上天降災使我兩君匪以玉帛相見而以興戎若晉君朝以入則婢子夕以死夕以入則朝以死唯君裁之乃舍諸靈臺大夫請以入公曰獲晉侯以厚歸也既而喪歸焉用之大夫其何有焉必歸晉君乃許晉平晉隂飴甥會秦伯盟于王城改館晉侯饋七牢焉晉侯歸殺慶鄭而後入是歲晉又飢秦伯又餼之粟於是秦始征河東置官司焉邦衡胡氏曰重耳兄也當立也夷吾弟也不當立也夷吾賂秦伯以求入篡也秦伯不納重耳而納夷吾以徼賂是貪而納篡也晉惠背賂而不與故秦穆興師以伐之厥罪惟均晉侯背施逆諫而失民自取獲之道也愚謂自晉致戎又不自咎而逆戰焉經曰晉侯及秦伯戰則秦晉之曲直罪之重輕皆可見矣書法與桓十七年戰于奚同康侯胡氏曰秦伯伐晉而經不書伐專罪晉也穀梁曰韓之戰晉侯失民矣以其民未敗而君獲也孫氏曰晉侯失道不顧人命以起此戰春伯獲之則又甚矣愚謂以諸侯之尊而至于見獲一則夷吾之罪二則晉獻殺世子之餘孽也後世人主可以鑒此矣春秋本義卷十一
