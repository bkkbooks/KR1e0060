body:
  text: 春秋本義卷十五元程端學撰文公十有一年春楚子伐麇九倫切公羊作圈麇國陸氏曰子爵義見僖三年徐取舒夏叔仲彭生會晉郤缺于承筐彭生公子牙之孫叔仲惠伯也杜氏曰郤缺冀缺承筐宋地在陳留襄邑縣西張氏曰即拱州襄陵縣左氏曰叔仲惠伯會晉郤缺于承筐謀諸侯之從於楚者未詳信否貫道王氏曰大夫擅相為會政在大夫義又見隱九年會于防東萊吕氏曰自文公後大夫擅相為會者多矣春秋詳而志之胡氏曰禮之失也諸侯非王事而自相會也無以正之不自天子出矣然後諸侯與大夫會又無以正之然後大夫與大夫會禮樂亦不自諸侯出矣田氏篡齊六卿分晉三家專魯理固然也不能辨於早後雖欲正之其將能之乎秋曹伯來朝左氏曰曹文公髙氏曰喪畢來朝也存耕趙氏曰喪畢來朝此事天子之禮也曹為文昭於魯宗國習見王命之廢而惴惴依大國以為重也義又見隱十一年滕薛來朝公子遂如宋左氏曰襄仲聘于宋且言司城蕩意諸而復之因賀楚師之不害也未詳信否義見隱七年齊來聘狄侵齊義見隱七年戎伐凡伯冬十月甲午叔孫得臣敗狄于鹹莘老孫氏曰不言帥師將尊師少也杜氏曰鹹魯地愚案僖十三年會于鹹杜氏以為衛地未詳孰是中國衰微外侮踵至魯能敗之此其功也然叔孫得臣以為功是大夫專兵三家僭魯之漸也義又見莊二十年齊伐戎十有二年春王正月郕伯來奔郕公羊作盛不名者闕之也義見桓十五年鄭伯奔蔡末章孫氏曰案莊八年師及齊師圍郕郕降于齊師自是入齊為附庸此而來奔齊所逼耳未詳是否杞伯來朝義見隱十一年滕薛來朝二月庚子子叔姬卒趙氏曰時君之女故曰子以别非先君之女也書卒之義未詳夏楚人圍巢杜氏曰巢吳楚間小國廬江六縣東有居巢城張氏曰即無為軍巢縣左氏曰楚令尹大孫伯卒成嘉為令尹羣舒叛楚夏子孔執舒子平及宗子遂圍巢未詳信否義見僖三年徐取舒秋滕子來朝滕稱子見桓二年左氏曰滕昭公義見隱十一年滕薛來朝秦伯使術來聘術公羊作遂術不氏義亦與隱元年無駭同趙氏曰外大夫來魯再命者皆書名無他義也左氏曰秦伯使西乞術來聘且言將伐晉襄仲辭玉答曰寡君願徼福于周公魯公以事君不腆先君之敝器使下臣致諸執事以為瑞節要結好命所以藉寡君之命結二國之好是以敢致之義見九年楚子使椒來聘木訥趙氏曰九年秦將伐晉則來歸成風之襚今將為河曲之戰則有術之聘冬十有二月戊午晉人秦人戰于河曲趙氏曰凡戰不言及交為主也孫氏曰河曲晉地杜氏曰在河東蒲坂縣南張氏曰河中府河東縣南有河曲公羊曰不言師敗績敵也左氏曰秦為令狐之役故秦伯伐晉取羈馬晉人禦之趙盾將中軍荀林父佐之郤缺將上軍臾駢佐之欒盾將下軍胥甲佐之范無恤御戎以從秦師于河曲臾駢曰秦不能久請深壘固軍以待之從之秦人欲戰秦伯謂士會曰若何而戰對曰趙氏新出其屬曰臾駢必實為此謀將以老我師也趙有側室曰穿晉君之壻也有寵而弱不在軍事好勇而狂且惡臾駢之佐上軍也若使輕者肆焉其可秦伯以璧祈戰於河十二月戊午秦軍掩晉上軍趙穿追之不及反怒曰裹糧坐甲固敵是求敵至不擊將何俟焉軍吏曰將有待也穿曰我不知謀將獨出乃以其屬出宣子曰秦獲穿也獲一卿矣秦以勝歸我何以報乃皆出戰交綏秦行人夜戒晉師曰兩君之士皆未憖也明日請相見也臾駢曰使者目動而言肆懼我也將遁矣薄諸河必敗之胥甲趙穿當軍門呼曰死傷未收而棄之不惠也不待期而薄人於險無勇也乃止秦師夜遁復侵晉入瑕愚案此傳頗詳獨稱秦伯及交戰事與經不合讀者擇焉可也孫氏曰二國之讐既易世矣二國之戰可以已也而秦康晉靈猶尋舊怨殘民以逞是彰父之不德也義又見隱七年戎伐凡伯季孫行父帥師城諸及鄆音運公羊作運諸見莊二十九年書及亦同前鄆西鄆魯邑也即成四年城鄆之鄆杜氏謂莒魯所爭者非是辨見或問王氏曰城未有言帥師者季氏自帥其師專兵久矣二邑近費而介於莒此行父自為封殖之計也獻可杜氏曰聖人重民力凡城築之事皆志之況出師而城乎勞民甚矣邦衡胡氏曰春秋城築二十九獨三言帥師爾此年及襄十五年季孫宿叔孫豹城郛哀三年季孫斯叔孫州仇城啓陽是也帥師者欲因城而遂廣其疆界書此者以見非惟勞民以城又毒衆以爭也十有三年春王正月夏五月壬午陳侯朔卒此為明年陳侯居喪同盟起文也大意又見隱七年滕侯卒邾子蘧蒢卒蘧穀梁作蘧蒢公羊穀梁作篨此為明年正月邾人居喪伐魯與叔彭生伐喪起文也大意又見隱七年滕侯卒自正月不雨至于秋七月義見莊三十年愚案文公時兩遭亢旱其所以修民事奉天時之道可知矣大室屋壞大音泰公羊作世大室杜氏曰大廟之室孔氏曰明堂位曰祀周公於大廟此周公之廟壞也不直言大廟壞而云大室屋壞者大廟之制其簷四阿而下室當其中又拔出為重屋此是大廟當中之室其上之屋壞非大廟全壞也左氏曰大室之屋壞書不共也公羊曰譏久不修也榖梁曰為社稷之主而先君之廟壞志不敬也康侯胡氏曰自正月不雨則無壞道也而先君之廟壞不恭甚矣吕氏曰君子之於宫廟有斯須不敢忘者非以崇孝而厚逺也孝子之於親心固如是也推是心以為政雖不中不逺矣魯之為國至使大室屋壞其能及物乎冬公如晉衛侯會公于沓徒答切公羊會下無公字杜氏曰沓地闕左氏曰公如晉朝且尋盟衛侯會公于沓請平于晉公還鄭伯會公于棐亦請平于晉未詳信否獻可杜氏曰春秋諸侯不朝天子擅相朝會今如晉而衛侯會之其朝與會皆非典禮也愚謂諸侯非王事自相會且不可況因其經過而旋為會豈禮也哉此與莊二十三年公及齊侯會于榖而蕭叔朝公意同義又見僖十年公如齊狄侵衛貫道王氏曰衛出會魯而狄侵衛乘間也義見隱七年戎伐凡伯髙氏曰晉不能為中國禦寇亂使無侵軼而惡諸侯之二此春秋所以矜小國之多虞也十有二月己丑公及晉侯盟義見隱元年盟于蔑公還自晉鄭伯會公于棐芳味切又芳尾切公羊作斐公羊榖梁還上無公字杜氏曰棐鄭地義同會公于沓孫氏曰公本朝晉既朝且盟又貪二國之會皆非天子之事也十有四年春王正月公至自晉髙氏曰公自去冬初如晉則因與衛會既盟晉而還則又因與鄭會久於道路而不朝正書至以見之義又見桓二年公至自唐邾人伐我南鄙叔彭生帥師伐邾余氏曰君喪而伐人與伐人之喪其罪一也義又見隱二年鄭伐衛貫道王氏曰帥師伐邾彭生因事專兵也胡氏曰互興甲兵以相伐其惡可知夏五月乙亥齊侯潘卒齊侯孝公弟昭公此為九月商人弒君起文也大意又見隱七年滕侯卒六月公會宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城趙氏曰他時但就諸侯行盟禮故云某日會某侯盟于某此本行會禮别日又行盟禮故書日杜氏曰新城宋地在梁國榖熟縣西張氏曰即南京應天府也髙氏曰新城鄭地未詳是否左氏曰同盟于新城從於楚者服也黃氏曰從楚者宋鄭許也自楚薦食中國諸侯無所依去年冬衛鄭會魯皇皇然求晉晉趙盾又方有求諸侯之心交相求而適相濟是以同盟貫道王氏曰齊桓之為同盟殷同之義也趙盾不知其義而效為之亦曰同盟晉襄一沒諸夏無主夷氛甚惡鄭衛請平亦足見諸夏之依於晉者重也盾而忠於謀晉則奉十餘歲之君以主諸侯夫豈不可今諸侯無主而求與盾盟以為安以趙盾而尸盟是大夫得專制諸侯也髙氏曰陳侯居喪出盟罪又可知也義又見莊十六年同盟于幽愚案春秋凡書同盟十有六未有大夫主之者而趙盾主盟始於扈中於衡雍至此率天下諸侯舉同盟焉宜其卒至於弒逆也秋七月有星孛入于北斗有與有􅈮有蜚之有同孫氏曰孛彗之屬也偏指曰彗光芒四出曰孛言入于北斗者入于魁中也劉向曰君臣亂於朝政令虧於外則上濁三光之精五星贏縮變色逆行甚則為孛髙氏曰斗有環域而孛星自外入于其中此變之大者天之示人顯矣春秋三書孛皆以謹人君之戒獻可杜氏曰天人相交甚於影響蓋事作於下則象動於上是以人君飭正五事建大中以承天心則七政上齊而譴異不作矣公至自會義見桓二年公至自唐又可見諸侯本為會而旋為同盟也晉人納捷災于邾弗克納捷公羊作接稱晉人將卑師少也弗克納納而不勝之辭也左氏曰邾文公元妃齊薑生定公二妃晉姬生捷災文公卒邾人立定公捷災奔晉愚謂廢置諸侯天子之事若廢嫡立庶雖天子亦不可也趙盾以大夫而廢嫡立庶罪莫大焉雖弗克納其罪一也髙氏曰捷災為人之子藉他國之兵歸篡其兄罪不容誅也九月甲申公孫敖卒于齊左氏曰穆伯之從己氏也魯人立文伯穆伯生二子於莒而求復文伯以為請襄仲使無朝聽命復而不出三年而盡室以復適莒文伯疾而請曰榖之子弱請立難也許之文伯卒立惠叔穆伯請重賂以求復惠叔以為請許之將來九月卒于齊告喪請葬弗許孫氏曰奔大夫不卒此卒者為明年齊人歸其喪起莘老孫氏曰將有其末不得不録其本也愚謂亦以譏世卿也貫道王氏曰敖奉魯侯之命以弔天子之喪不至而復不忠莫大焉忘天屬之尊而奔不義孰甚焉犯二大不韙周有常刑皆僇餘也魯不能討且許其歸欲絶之而不能也明年齊歸其喪許歸者魯而歸其喪者齊也魯道衰矣髙氏曰此著與刑之壞也齊公子商人弒其君舍舍居喪未踰年當稱子今曰弒其君者蓋稱子者緣人子之心也然一日嗣位則舉國臣子固皆戴之為君矣故曰弒其君也左氏曰子叔姬妃齊昭公生舍叔姬無寵舍無威公子商人驟施於國而多聚士盡其家貸於公有司以繼之夏五月昭公卒舍即位齊商人弒舍而讓元元曰爾求之久矣我能事爾爾不可使多蓄憾將免我乎爾為之義見隱四年衛州吁事宋子哀來奔子哀字也命大夫也與齊仲孫王人子突之類同黎氏曰宋公之子經有子同子糾未詳是否義見僖二十八年元咺奔晉韓中甫曰司馬死司城亡大夫奔見昭公之不可為國而見弒之漸也冬單伯如齊齊人執單伯齊人執子叔姬張氏曰單伯大夫之命於天子者自莊公元年至今已七十餘年未必一人或其子若孫歟愚謂凡執人者史當稱人子叔姬文公女不書及者先執單伯後執子叔姬不可以臣及君夫人故兩書齊人無他義也杜氏曰不稱夫人自魯録之也愚謂魯不討商人弒逆之罪而區區為子叔姬之求故兩被執以自取辱又見當時弒逆之賊不少知懼而執其母與諸侯之使則王法不行而天倫絶矣十有五年春季孫行父如晉左氏曰季文子如晉為單伯與子叔姬故也未詳信否義見隱七年齊來聘三月宋司馬華孫來盟左氏曰宋華耦來盟趙氏曰不稱使意與楚屈完齊髙子來盟同愚謂諸侯為盟已干王法況司馬掌一國之兵不能爰整其旅為國長城乃離軍適魯區區求盟失其職矣孔子曰王孫賈治軍旅奚其喪司馬之所務可知矣此亦昭公見弒之漸也康侯胡氏曰稱華孫者自督弒殤公諸侯受賂不討使秉宋政及其後世繼掌兵權春秋所禁者經曰華孫猶季孫叔孫仲孫臧孫之類不書名者義不繫於名也未詳是否夏曹伯來朝義見隱十一年滕薛來朝齊人歸公孫敖之喪左氏曰齊人或為孟氏謀曰魯爾親也飾棺置諸堂阜魯必取之從之卞人以告惠叔猶毁以為請立於朝以待命許之取而殯之齊人送之書曰齊人歸公孫敖之喪為孟氏且國故也葬視共仲孫氏曰敖廢命奔莒罪當誅絶齊歸魯受皆非禮也東萊吕氏曰奔大夫卒皆不書如公子慶父臧孫訖內大夫卒於外皆不至如仲遂公孫嬰齊而公孫敖書卒以齊人歸其喪起也書至以魯人受其喪故也祿去公室三家之子孫盛強雖廢命奔莒而其子文伯惠叔繼立於朝大夫之汰可知以其子之汰請父之喪欲弗許得乎六月辛丑朔日有食之鼓用牲于社義見莊二十五年髙氏曰莊二十五年三十年皆以日食而鼓用牲于社其非禮妄作義已著矣今文公亦復如此皆因陋承誤愚謂創業垂統使可繼者也一有非禮則子孫視為故事弗能改矣春秋慎始正指此類而非漢儒所謂五始者也單伯至自齊書至見此事之終也魯至此又不能討商人弒逆執母之罪亦既踰年幸其見釋而歸則魯之為國單伯之為使從可知矣晉郤缺帥師伐蔡戊申入蔡左氏曰新城之盟蔡人不與晉郤缺以上軍下軍伐蔡曰君弱不可以怠戊申入蔡以城下之盟而還義見隱二年莒入向存耕趙氏曰蔡從楚可伐也入之則己甚矣大夫交政專兵自文公以來帥師伐書陽處父帥師入書郤缺侵書趙穿有書大夫自為戰有書與君戰者秋齊人侵我西鄙商人弒君執母又伐母家不容誅矣亦魯不能討賊而區區請子叔姬以召之也義又見莊十年公侵宋季孫行父如晉左氏曰齊人侵我西鄙故季文子告于晉義見隱七年齊來聘冬十有一月諸侯盟于扈諸侯不序與七年盟于扈同益見史有詳略不可以凡例求矣劉氏曰晉為伯主齊弒其君興諸侯而莫能正晉則固有罪矣諸侯不亦病乎義又見隱元年盟于蔑十有二月齊人來歸子叔姬獻可杜氏曰春秋書內女來歸者三郯伯姬杞伯姬直曰來歸此子叔姬曰齊人來歸蓋譏在齊也商人弒其子又絶其母罪不容誅矣況執之而又來歸乎髙氏曰未有子而黜其母者也愚謂魯於是可討商人弒君執母黜母之罪而又不能焉則魯之為國益可知矣石氏曰子叔姬先書被執次書來歸非郯杞之比夫商人弒君自立又虐其國君之母天子不能討諸侯不能伐季孫行父再如晉諸侯為是盟于扈皆無能為而退徒得單伯之至子叔姬之歸而已而興兵以侵魯者未已也於以見晉伯之不競也於以見諸侯有弒君者而莫之討也於以見齊之橫而魯之弱也齊侯侵我西鄙遂伐曹入其郛郛城外大郭也左氏曰齊侯侵我西鄙謂諸侯不能也遂伐曹入其郛討其來朝也季文子曰齊侯其不免乎己則反天而又以討人難以免矣愚謂商人弒君執母再伐母家入人郛郭罪大惡極不待言矣亦魯不討賊有以召之也義又見莊十年公侵宋隱二年鄭伐衛髙氏曰惡魯及曹非理甚矣夫商人弒君而自立諸侯會于扈而不能討益無顧忌侵我伐曹以肆其暴豈特齊有罪焉亦見諸侯之縱亂矣十有六年春季孫行父會齊侯于陽榖齊侯弗及盟陽榖見僖三年公羊曰其言弗及盟何不見與盟也左氏曰及齊平公有疾使季文子會齊侯于陽榖請盟齊侯不肯曰請俟君間張氏曰文公不能明政刑舉大義以致命使執辱吾女邊鄙被兵與國蒙伐又使大夫自屈以請盟而不見答可謂困心衡慮而無憤悱改圖之心書此以見魯之衰文公之無志也夏五月公四不視朔四不視朔范氏曰自二月不視朔至於五月也髙氏曰朔者天子之所頒也諸侯上稟天子之命下授萬民之時故其奉王朔告於廟則謂之告朔退而視朝以授民則謂之視朔榖梁曰公四不視朔不臣也以公為厭政以甚矣六月戊辰公子遂及齊侯盟于郪丘郪音西乂七西切公羊作犀榖梁作師公羊疏云正本作災杜氏曰郪丘齊地左氏曰公使襄仲納賂于齊故盟于郪丘榖梁曰復行父之盟也愚謂文公不能討商人之罪而區區求盟不得而復之使亂臣賊子肆行於世而三綱於是大壞雖周道陵夷而然亦文公不能為國以自取之也孔子曰能治其國家誰敢侮之陳恆弒其君孔子請討之觀此可以知春秋所書之旨矣義又見隱元年盟于蔑秋八月辛未夫人薑氏薨公羊曰文公母也愚謂此為毁泉臺及葬聲薑起文也毁泉臺杜氏曰毁壞也泉臺臺名左氏曰有蛇自泉宫出入于國如先君之數聲薑薨毁泉臺未詳信否公羊曰毁泉臺何以書譏築之譏毁之譏先祖為之已毁之不如勿居而已矣榖梁曰喪不二事愚謂孔子曰三年無改於父之道可謂孝矣臺作於先君初喪母而即毁之則思親之意蓋藐然矣況在諒暗之中而出令役民乎康侯胡氏曰先祖為之非矣然臺之存毁非安危治亂之所繫也而必毁之是暴揚其失有輕先祖之心此履霜之漸弒父與君之萌春秋之所謹也故書楚人秦人巴人滅庸庸小國也左氏曰楚大飢戎伐其西南至於阜山師於大林又伐其東南至於陽丘以侵訾枝庸人帥羣蠻以叛楚廩人率百濮聚於選將伐楚於是申息之北門不啓楚人謀徙於阪髙蒍賈曰不可我能往寇亦能往不如伐庸夫麇與百濮謂我飢不能師故伐我也若我出師必懼而歸百濮離居將各走其邑誰暇謀人乃出師旬有五日百濮乃罷自廬以往振廩同食次于句澨使廬戢黎侵庸及庸方城庸人遂之囚子揚窗三宿而逸曰庸師衆羣蠻聚焉不如復大師且起王卒合而後進師叔曰不可姑又與之遇以驕之彼驕我怒而後可克先君蚡冒所以服陘隰也又與之遇七遇皆北唯禆鯈魚人實逐之庸人曰楚不足與戰矣遂不設備楚子乘驛會師于臨品分為二隊子越自石溪子貝自仞以伐庸秦人巴人從楚師羣蠻從楚子盟遂滅庸義見僖三年徐取舒張氏曰禦變待敵亦制服之而已夷人宗社豈王法之所容乎冬十有一月宋人弒其君杵臼杵公羊作處孫氏曰稱人微者也名不登於史策劉氏曰弒君者曷為或稱名氏或不稱名氏以氏通者稱氏以名通者稱名名氏不通者稱人貴賤之序也愚謂書曰股肱喜哉元首起哉先書宋人殺其大夫與司馬又司城與子哀來奔司馬華孫來盟則是股肱既剪然後宋公見弒於宋人聖人之垂戒逺矣義又見隱四年衛州吁事十有七年春晉人衛人陳人鄭人伐宋葉氏曰四國稱人微者也愚謂四國伐宋得其伐矣然諸侯不親而使微者行其後又不見討賊之迹則非以討賊舉也此亂臣賊子所以接迹於世而晉靈亦親被其禍大義不明故也程子曰行天討而成其亂失天職也夏四月癸亥葬我小君聲薑聲公羊作聖非也髙氏曰九月而葬緩也不稱僖薑而别為之諡非禮也貫道王氏曰用見文公怠棄國政雖親喪亦不盡心齊侯伐我西鄙貫道王氏曰商人不母其母憑陵外家恃強陵弱必欲服魯而後已此所以繼有榖之盟也愚謂亦魯不能討賊有以召之也義又見隱二年鄭伐衛六月癸未公及齊侯盟于榖榖見莊七年齊魯皆諸侯也文公不能討賊以自取辱至此而遂與弒逆之賊刑牲歃血以為盟其何以臨民哉義又見隱元年盟于蔑邦衡胡氏曰齊侯與遂盟于郪丘是年伐我則盟之無信已可知矣至是又與公盟于榖齊之叛盟固不容誅然公之昏庸不能為國以禮而汲汲以請盟深可恥也文公立十有八年大夫盟會十八九獨此書公盟亦以見大夫之張也諸侯會于扈左氏曰公不與會齊難故也愚謂此會諸侯不序與七年盟于扈同十五年諸侯盟于扈既不能討齊弒君之賊此諸侯復會于扈又不能討宋弒君之賊此三綱大壞而諸侯不可以為國也春秋非特責其不朝天子而自盟會之罪而尤在乎不討賊之事是晉靈不有桓文之功而徒有桓文之罪矣卒之不免也冝義又見隱九年會于防秋公至自榖文公不能自強其國而甘心事賊踰時而返義又見桓二年公至自唐髙氏曰書公至自榖則不會於扈可知矣冬公子遂如齊左氏曰襄仲如齊拜榖之盟髙氏曰公已與齊侯盟而遂復往者政在遂故也且見齊侯以篡弒而諸侯反畏之如此義又見隱七年齊來聘邦衡胡氏曰齊連年伐我而數遣使以聘之魯之君臣豈不謂重幣甘言可以己敵國之難乎嗚呼不知立國區區以國與人雖竭力以事之彼豈以我為德乎十有八年春王二月丁丑公薨于臺下臺下臺之下也穀梁曰臺下非正也莘老孫氏曰人君之薨必於路寢非路寢皆不正也其曰臺下蓋有甚焉崔氏曰臺下者泉臺之下也其臺毁矣而其下屋存焉未詳是否秦伯罃卒秦伯張氏曰康公也何氏曰穆公也案史記張氏近是髙氏曰秦雖伯益之後僻在西夷自秦仲始大至平王時秦襄始有功於周室列於諸侯賜爵為伯及穆公與於城濮之戰自後與中國交聘盟會遂伯西戎九年來歸僖公成風之襚始與魯通好至是遂書其卒而弔其喪也愚謂外域之喪赴於中國而中國往弔焉則夷夏混殽大經紊矣蓋其始也歸成風之襚而不卻使術來聘而受之其赴中國固冝春秋內中國外夷狄而常慎其始先書襚聘於前而終之以此垂戒逺矣夏五月戊戌齊人弒其君商人稱人見十六年髙氏曰春秋之法弒君之賊以弒君討之則以賊書商人弒君自立至於五年冝加討賊之辭而稱齊人弒其君者齊人恬不討賊皆北面事之遂令商人專行無道而自以私怨殺之故曰齊人弒其君也左氏曰齊懿公之為公子也與邴歜之父爭田弗勝及即位乃掘而刖之而使歜僕納閻職之妻而使職驂乘五月公遊於申池二人浴於池歜以撲抶職職怒歜曰人奪汝妻而不怒一抶汝庸何傷職曰與刖其父而弗能病者何如乃謀弒懿公納諸竹中歸舍爵而行齊人立公子元愚聞孔子曰人之生也直罔之生也幸而免弒君而偷生者幸而免者也若商人者蓋不免者也商人弒君黜母惡極罪大幸免天下之誅而不免齊人之弒此天理也故春秋歷書商人之惡而終之以此垂戒逺矣義又見隱四年衛州吁事或曰弒逆之賊而春秋書曰弒其君齊之臣子猶可戴商人為君乎曰篡位天子諸侯與天下之人一日不可待之為齊侯齊之臣子一日不可戴之為齊君苟齊之臣子北面拜之為君而以私怨殺之是弒君也春秋安得不正齊人弒君之罪哉豫讓有言曰委質為臣而求殺之是二心也況以私怨乎齊人弒君之罪不可逃矣此與里克弒君而書晉殺其大夫里克之意同雖君大夫異勢而其不以討賊殺之則一也嗚呼春秋正名此之謂也六月癸酉葬我君文公義見葬桓公秋公子遂叔孫得臣如齊左氏曰文公二妃敬嬴生宣公敬嬴嬖而私事襄仲宣公長而屬諸襄仲襄仲欲立之叔仲不可仲見于齊侯而請之齊侯新立而欲親魯許之康侯胡氏曰禍亂邪謀發於並使之日而公子遂弒立其君之罪著矣義又見隱七年齊來聘葉氏曰聘則何以二卿共使非常聘也其謀立宣公也自僖公以來三桓之子孫漸進四年公孫兹見文元年叔孫得臣見而叔孫氏強矣僖十五年公孫敖見而仲孫氏強矣文公六年季孫行父見而季孫氏強矣終春秋之世而莫之能去也僖之十六年公子友卒公孫兹卒三家子孫列於卿者惟公孫敖一人遂以二十八年得政雖後於敖者然視三家為最親故敖自十五年救徐之後不復用事所往來齊晉楚三大國之間至於入杞伐邾皆遂為之魯之政蓋在遂焉文公立而益專及元年叔孫得臣見六年季孫行父見二氏雖復進而力未能與遂抗故其末年執政遂與叔彭生得臣行父四人彭生既以不從而殺則得臣行父不得不畏而聽此其所以挾得臣與之偕行將以見此魯執政之意而非己之私也齊侯於是許之宣公立季孫行父亦如齊公遂會齊侯于平州以定其位則二人蓋皆與聞乎弒者歟冬十月子卒不名闕文也左氏曰名惡公羊曰名赤未詳孰是弒而書卒義同莊三十二年子般卒左氏曰仲殺惡及視而立宣公書曰子卒諱之也仲以君命召惠伯其宰公冉務人止之曰入必死叔仲曰死君命可也公冉務人曰若君命可死非君命何聽弗聽乃入殺而埋之馬矢之中公冉務人奉其帑以奔蔡既而復叔仲氏康侯胡氏曰何以知其賊乎上書大夫並使下書子卒夫人歸則知罪之在公子遂矣愚謂嗣君之禍由於大夫之專而大夫之專由於文公之暗遂雖得政於僖公之末實張皇於文公之世故春秋歷敘文公之惡遂與得臣行父之罪而終之以此若文公者幸免其身而卒及其嗣大夫之專不至於弒君不已其為鑒戒顯矣張氏曰私事公子遂敬嬴奪嫡之心也然其敢啓是心者嬖故也有夫人太子而嬖寵妾則文公所以怠於事伯急於盟齊簡於視朔者有自來矣人君昏於嬖寵棄忘國政故妾媵大臣相謀弒國嗣而不能察身死之後冢嗣二人遂見戕弒所謂前有讒而不見後有賊而不知者文公之謂矣夫人薑氏歸于齊薑氏杜氏曰惡視之母出薑也趙氏曰文公夫人左氏曰夫人薑氏歸于齊大歸也將行哭而過市曰天乎仲為不道殺嫡立庶市人皆哭魯人謂之哀薑愚謂文公死骨肉未寒而子殺妻歸不得終喪君暗臣專禍至於此春秋書之後世可以鑒矣而亦以著被弒之實也張氏曰嫡庶之亂未有不始於妾上僭夫人失位而致之者是以知文公之首惡也季孫行父如齊許氏曰文子之行告宣公立也前乎子卒書如齊後乎子卒書如齊齊與聞乎故也所以惡齊也沙隨程氏曰遂得臣行父三人皆與謀以其前後如齊而知之也髙氏曰見魯國臣子之罪皆不可勝誅也義又見隱七年齊來聘吕氏曰君死不正而國之大臣恃大國以自免施施肆肆無所忌憚行父名大夫也而猶若是先王之澤盡矣木訥趙氏曰三家之強雖自僖公而僖公之世猶未敢專也至文公之世孟氏則公孫敖為戚之會垂隴之盟叔孫氏則得臣會晉伐沈敗狄于鹹季氏則行父如陳如晉帥師城邑至東門氏則襄仲見於經者凡九非會則盟非盟則如非如則伐其橫尤甚於三家然極其源皆由文公怠惰不君也即位之初伯主之會鄰國之好未嘗親之率以大夫往閏月不告月常月不視朔怠惰庸昏不出寢門何以為國冝諸大夫互結私援外事大國內懷國人公室寖弱而權歸於臣也一身未瞑二子為戮妃妾不能保終春秋之世權不復收而魯遂以微文公不能逭其責也莒弒其君庶其不書弒君之賊未詳或曰闕文也義見隱四年衛州吁事春秋本義卷十五
