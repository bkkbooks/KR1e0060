body:
  text: 春秋本義卷二十七元程端學撰定公名宋襄公子昭公弟元年春王三月晉人執宋仲幾于京師鄱陽張氏曰國未有君而稱元年追書以統月此史法之常也愚謂凡一公之始雖無事當書王正月今不書者亦以定公未立爾無他義也左氏曰孟懿子㑹城成周庚寅栽宋仲幾不受功曰滕薛郳吾役也薛宰曰宋為無道絶我小國於周以我適楚故我常從宋晉文公為踐土之盟曰凡我同盟各復舊職若從踐土若從宋亦唯命仲幾曰踐土固然薛宰曰薛之皇祖奚仲居薛以為夏車正奚仲遷於邳仲虺居薛以為湯左相若復舊職将承王官何故以役諸侯仲幾曰三代各異物薛焉得有舊為宋役亦其職也士彌牟曰晉之從政者新子姑受功歸吾視諸故府仲幾曰縱子忘之山川鬼神其忘諸乎士伯怒謂韓簡子曰薛徴於人宋徴於鬼宋辠大矣且己無辭而抑我以神誣我也啓寵納侮其此之謂矣必以仲幾為戮乃執仲幾三月歸諸京師城三旬而畢乃歸諸侯之戍未詳信否孫氏曰春秋之義諸侯不得專執況大夫乎非天子命執仲幾於天子之側甚矣康侯胡氏曰案周官司肄掌凡囚執人之事屬於司寇凡諸侯之獄訟定以邦典凡卿大夫之獄訟斷以邦法則大司寇之職也不告諸司寇而執人於天子之側故雖以王事討有辠猶不可也皆篡弑之萌履霜之漸每謹於初而禍亂熄矣夏六月癸亥公之喪至自乾侯戊辰公即位陸氏曰凡公即位皆於朔日故不書日定公待昭公喪至既殯而即位故書日左氏曰叔孫成子逆公之喪于乾侯季孫曰子家子亟言於我未嘗不中吾志也吾欲與之從政子必止之且聽命焉子家子不見叔孫易幾而哭叔孫請見子家子子家子辭曰羈未得見而從君以出君不命而薨羈不敢見叔孫使告之曰公行公為實使羣臣不得事君若公子宋主社稷則羣臣之願也凡從君出而可以入者将唯子是聽子家氏未有後季孫願與子從政此皆季孫之願也使不敢以告對曰若立君則有卿士大夫與守龜在羈弗敢知若從君者則貌而出者入可也寇而出者行可也若羈也則君知其出也而未知其入也羈将逃也喪及壊隤公子宋先入從公者皆自壊隤反六月癸亥公之喪至自乾侯戊辰公即位康侯胡氏曰昭公之薨已越葬期猶未得返至於六月癸亥然後喪至而定公即位乃在是月之戊辰蓋遲速進退為意如所制不得專也昭公之薨定公之即位春秋詳書於䇿乃見諸行事為永鑒爾張氏曰季氏親逐其君暴露七月而後返國黜嫡而立不正至於喪歸君立本此以見亂臣擅國定公不正三綱淪斁君子罔不衋傷心此所謂為永鑒也秋七月癸巳葬我君昭公左氏曰季孫使役如闞公氏将溝焉榮駕鵝曰生不能事死又離之以自旌也縱子忍之後必或恥之乃止季孫問於榮駕鵝曰吾欲為君諡使子孫知之對曰生弗能事死又惡之以自信也将焉用之乃止葬昭公於墓道南孔子之為司寇也溝而合諸墓義見葬桓公此又見八月而始得葬也九月大雩義見桓五年立煬宫公羊曰立者何不宜立也煬宫者何煬公之宫也杜氏曰煬公伯禽子也左氏曰昭公出故季平子禱於煬公九月立煬宫未詳信否康侯胡氏曰喪事即逺有進無退宫廟即逺有毁而無立吕氏曰違禮背義言天下之亂無復有綱紀文章也木訥趙氏曰小人為惡内有不安則諂鬼神以要福季氏逐君天地所不容何有於煬宫自煬至昭二十二世矣神靈何在立之所謂媚竈者也宗廟有常制魯之廟已異矣成公立武宫固已違制又立煬宫是魯祀八世也天子七廟而魯之廟八其可訓乎黄氏曰季氏果以私禱而立煬宫未必増附羣公昭穆之廟或者武宫煬宫皆以非禮創立亦同淫祀耳名雖煬而實則非矣未詳孰是冬十月隕霜殺菽隕公羊作霣菽左氏或作叔菽先儒以為豆也以夏正言之此時無菽未詳其義董子曰菽草之強者五行志曰菽草之難殺者也言殺菽則知草皆死矣未詳是否然義則在於隂陽不和而寒極備耳二年春王正月夏五月壬辰雉門及兩觀災觀古亂切范氏曰雉門公宫之南門兩觀闕也孔氏曰明堂位云庫門天子臯門雉門天子應門是魯之雉門公宫南門之中門也釋宫云觀謂之闕郭璞曰宫門雙闕周禮大宰正月之吉縣治象之法于象魏使萬民觀治象鄭衆曰象魏闕也劉熙釋名云闕石門兩旁中央闕然為道兩觀與象魏闕一物而三名兩觀與雉門俱災則兩觀在雉門之旁矣貫道王氏曰子家羈曰設兩觀乗大輅天子之禮也魯僭周天災所以警魯也愚謂亦為十月新作雉門及兩觀起文也秋楚人伐吳左氏曰桐叛楚吳子使舒鳩氏誘楚人曰以師臨我我伐桐為我使之無忌秋楚囊瓦伐吳師於豫章吳人見舟於豫章而潛師於巢冬十月吳軍楚師於豫章敗之未詳信否義見僖三年徐取舒冬十月新作雉門及兩觀此書新作與僖二十年新作南門意不同者彼但譏其侈肆此則譏其僭禮而不畏天譴也康侯胡氏曰書新作者譏僭王制而不能革也劉氏曰習舊而不知其非觀變而不知以為戒無怪於季氏之脅其主矣吕氏曰雉門兩觀僭矣既災而又復作魯之君臣非不知以是為僭也蓋以為無足恤也以為無足恤也者弑父與君所由起也愚謂大室屋壊新宫桓宫僖宫御廩災必新作之皆不書者義所當作常事也雉門兩觀獨書者僭而不改非常也觀乎此則春秋不書常事亦可見矣三年春王正月公如晉至河乃復李氏曰三傳皆無其說不知何故復也義見昭二年二月辛卯邾子穿卒二月公羊榖梁作三月義見隱三年宋公卒此又為仲孫何忌及邾子盟起文也夏四月秋葬邾荘公杜氏曰六月乃葬緩義見隱三年葬宋穆公冬仲孫何忌及邾子盟於拔皮八反公羊作枝杜氏曰拔地闕髙氏曰邾子居喪而以吉禮與魯大夫盟則其微弱可知義又見隱元年盟于蔑邦衡胡氏曰邾荘公卒未踰年而邾君出盟邾固可辠何忌與之盟又甚焉君子不奪人之親亦不可奪親也何忌不顧邾子之喪而與之盟奪人之親邾子當喪而出盟奪親也四年春王二月癸巳陳侯吳卒義見隱三年宋公卒此又為三月陳子侵楚起文也三月公㑹劉子晉侯宋公蔡侯衞侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯把伯小邾子齊國夏于召陵侵楚劉子見昭十三年召陵見僖四年㑹諸侯于召陵侵楚先㑹而後侵也張氏曰書十八國諸侯之衆所以見其勢之足以有為也而終之以侵楚深以辠其志卑而義不勝終之以無能為也而晉自此微矣愚謂陳子背殯出㑹辠亦可知戴氏曰自鄢陵之後晉楚不復有大戰一旦有召陵之役六七十年閒無此大舉也天子之老元戎啓行中國諸侯大抵皆在未有若此其盛者僅侵而退自相盟于臯鼬當是時楚有可亡之勢失此機㑹使吳人乗其後而收入楚之功傾天下之勢折而入於吳中國之伯於是絶矣悲夫夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之公羊作公孫歸姓後同陸氏聞於師曰書滅辠蔡也書以歸辠沈子不死於位也言殺之又辠蔡侯也義又見荘十年齊滅譚吕氏曰蔡公孫姓滅沈至以沈子歸殺之其辠極矣春秋之世諸侯君臣失道至此者皆由不知分義苟力所能制則為之矣此與禽獸奚辨五月公及諸侯盟于臯鼬由又切公羊作浩油黄氏曰即㑹于召陵之諸侯前目後凡故不再序陸氏曰重言諸侯劉子不與盟也杜氏曰繁昌縣東南有城臯亭愚謂以十八國諸侯挾天子之大夫僅一侵楚無功而還此盟雖設諸侯解體可知也義又見隱元年盟于蔑把伯成卒于㑹成公羊作戊貫道王氏曰侵楚無成既盟将散在㑹卒也故不得言卒于師愚謂言卒于㑹紀實事耳非有他義也義見隱三年宋公卒六月葬陳惠公髙氏曰此見陳侯背殯出會也義又見隱三年葬宋穆公許遷于容城任氏曰容城華容縣亦析之近地也髙氏曰自葉遷也至是四遷其微弱可知義又見成十五年貫道王氏曰安土重遷人之常情況有國乎許之四遷蓋以小國而介乎強國之閒日見迫逐雖欲自保其社稷不可得矣終不免於滅也秋七月公至自㑹公始以㑹出故以㑹致踰時矣義又見桓二年公至自唐劉卷卒卷音權公羊曰劉卷者天子之大夫也杜氏曰即劉蚠也貫道王氏曰劉獻公之庶子趙氏曰畿内諸侯不同列國故不言劉子卷卒亦譏來告故書之愚謂不特譏來告亦譏魯卒之又為葬劉文公起也石氏曰天子之大夫外大夫也外大夫不卒不葬春秋卒天子之大夫者三而書葬者一卒尹氏王子虎以其來赴也書劉卷卒又書葬以來赴而又我㑹之也自文公以前王室尚強至此愈微矣大夫之喪而魯有往也昔者周人有喪周人弔魯人不弔以為當親之也今列國不㑹天子之喪而㑹大夫之葬甚矣禮人臣無外交況畿内諸侯乎葬杞悼公義見隱三年葬宋穆公楚人圍蔡義見荘十年荆敗蔡師晉士鞅衞孔圉帥師伐鮮虞圉公羊作圄杜氏曰士鞅即范鞅孔圉孔羈孫貫道王氏曰晉之有事於鮮虞凡幾役矣楚圍蔡而不恤偕衞以伐中山孰輕孰重邪晉業之卑不可望矣義又見昭十二年葬劉文公貫道王氏曰天子畿内諸侯列國不當與行交往之禮今會其葬記非禮也冬十有一月庚午蔡侯以吳子及楚人戰于柏舉楚師敗績柏舉公羊作伯莒今本榖梁作柏舉以見桓十四年杜氏曰柏舉楚地左氏曰伍員為吳行人以謀楚楚之殺郤宛也伯氏之族出伯州犂之孫嚭為吳大宰以謀楚楚自昭王即位無嵗不有吳師蔡侯因之以其子乾與其大夫之子為質於吳冬蔡侯吳子伐楚舍舟於淮汭自豫章與楚夾漢左司馬戍謂子常曰子㳂漢而與之上下我悉方城外以毁其舟還塞大隧直轅冥阨子濟漢而伐之我自後擊之必大敗之既謀而行武城黒謂子常曰吳用木也我用革也不可久也不如速戰史皇謂子常曰楚人惡子而好司馬若司馬毁吳舟於淮塞城口而入是獨克吳也子必速戰不然不免乃濟漢而陳自小别至於大别三戰子常知不可欲奔史皇曰安求其事難而逃之将何所入子必死之初辠必盡說十一月庚午二師陳於柏舉闔廬之弟夫槩王晨請於闔廬曰楚瓦不仁其臣莫有死志先伐之其卒必奔而後大師繼之必克弗許夫槩王曰所謂臣義而行不待命者其此之謂也今日我死楚可入也以其屬五千先擊子常之卒子常之卒奔楚師亂吳師大敗之愚謂周綱既墮諸侯横恣相為盛衰書此見吳伐楚爭伯之由也義又見僖三年徐取舒孫氏曰楚人圍蔡晉師不出故蔡侯去晉求救於吳楚師敗績晉合十八國之君不能伐楚而吳子敢伐之此吳晉之事強弱之勢較然可見矣故自是諸侯大小皆宗於吳楚囊瓦出奔鄭左氏曰子常奔鄭愚謂囊瓦敗其國兵不能死而出奔其辠著矣義又見僖二十八年元咺奔晉庚辰吳入楚左氏作郢陸氏曰誤也左氏曰吳從楚師及清發将擊之夫槩王曰困獸猶鬬況人乎若知不免而致死必敗我若使先濟者知免後者慕之蔑有鬬心矣半濟而後可擊也從之又敗之楚人為食吳人及之奔食而從之敗諸雍澨五戰及郢己卯楚子取其妹季芉畀我以出涉睢鍼尹固與王同舟王使執燧象以奔吳師庚辰吳入郢以班處宫子山處令尹之宫夫槩王欲攻之懼而去之夫槩王入之楚子涉睢濟江入於雲中王寝盜攻之王奔鄖鄖公辛之弟懐将弑王鬬辛與其弟巢以王奔隨吳人從之謂隨人曰周之子孫在漢川者楚實盡之天誘其衷致罰於楚而君又竄之周室何辠君若顧報周室漢陽之田君實有之楚子在公宫之北吳人在其南子期似王逃王而已為王隨人辭吳吳人乃退初伍員與申包胥友其亡也謂申包胥曰我必復楚國申包胥曰勉之子能復之我必能興之及昭王在隨申包胥如秦乞師曰吳為封豕長蛇以荐食上國虐始於楚寡君失守社稷越在草莽使下臣告急曰夷徳無厭若鄰於君疆埸之患也逮吳之未定君其取分焉若楚之遂亡君之土也若以君靈撫之世以事君秦伯使辭焉曰寡人聞命矣子姑就館将圖而告對曰寡君越在草莽未獲所伏下臣何敢即安立依於庭牆而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出五年夏申包胥以秦師至秦子蒲子虎帥車五百乗以救楚子蒲曰吾未知吳道使楚人先與吳人戰而自稷㑹之大敗夫槩王於沂吳人獲薳射於柏舉其子帥奔徒以從子西敗吳師於軍祥吳師敗楚師於雍澨秦師又敗吳師吳師居麇又戰吳師敗又戰於公壻之谿吳師大敗吳子乃歸戴氏曰楚陵犯中國二百年中國不能制假手於吳國幾亡然去楚而吳繼之此聖人之所傷也義又見僖三年徐取舒髙氏曰楚自春秋以來肆禍中國齊桓晉文舉中國之衆止能一盟屈完于召陵一敗得臣于城濮耳二伯既往莫有能與抗者柏舉之戰吳能勝之囊瓦既奔吳人長驅入郢慘烈不道甚於水火蕞爾楚昭僅以身免此吳之盛也自是諸侯大小罔不俛首與吳為㑹中國愈不能抗至黄池之㑹而春秋終矣五年春王三月辛亥朔日有食之三公羊作正義見隱三年夏歸粟于蔡杜氏曰蔡為楚所圍飢乏故魯歸之粟髙氏曰患難相救有無相賙此諸侯之正春秋之世相攻相滅此道不行矣然當是時諸侯不供職貢於天子至使天王有求於下國則知夫魯歸蔡粟非濟其難而賙其無也蓋以蔡與吳相授而敗楚入郢故魯畏而賂之聖人所以追其意而辠之也石氏曰春秋貴義不貴惠小仁施者大仁賊也蔡為楚所辱而不能救今見楚敗吳勝乃歸蔡粟徒畏吳而已無救災之實也小惠不足貴矣於越入吳於越即越也見昭五年莘老孫氏曰越之三見於昭公時者曰越三見於定哀時者曰於越蓋當時越有數種有東越南越閩越甌越昭公時國名為越故經據其號書曰越定公後欲自别於羣越始改號為於越故經據改號書曰於越猶楚初稱荆其後稱楚也左氏曰越入吳吳在楚也愚謂楚伐滅中國而吳入楚吳方入楚而於越入吳據事直書而窮兵黷武之戒昭矣中國不振而南鄙相為盛衰又可見矣義又見僖三年徐取舒六月丙申季孫意如卒譏世卿也貫道王氏曰意如逐君而以大夫卒魯於是不可為矣定公以受國為徳而忘先君之讎也大意又見隱元年益師卒秋七月壬子叔孫不敢辛不敢叔孫婼之子成子也譏世卿也大意又見隱元年益師卒冬晉士鞅帥師圍鮮虞左氏曰三年鮮虞人敗晉師於平中獲晉觀虎恃其勇也五年冬晉士鞅圍鮮虞報觀虎之役也未詳信否許氏曰晉始以土地之故與鮮虞睽咎不在鮮虞也而晉不自反縱兵横加而不能服則又圍之兵益忿義益不勝君子是以惡晉也義又見昭十二年六年春王正月癸亥鄭游速帥師滅許以許男斯歸速公羊作遫後同杜氏曰游速大叔子左氏曰鄭滅許因楚敗也髙氏曰鄭許之怨舊矣許人本恃楚以固其國至於四遷鄭游速一出滅其國而俘其君豈非楚人累敗於吳故鄭因乗許之弱而肆其暴邪任氏曰以大夫而滅人之國又以諸侯歸其惡甚矣愚謂許男不死社稷亦無足道也義又見荘十年齊滅譚張氏曰自哀元年以後許復見者楚又存之也二月公侵鄭邦衡胡氏曰内有強臣之讎而逺去其國以事攻伐此易所謂危行也義又見荘十年公侵宋公至自侵鄭義見桓二年公至自唐夏季孫斯仲孫何忌如晉斯季孫意如子桓子也二卿如晉未詳何為義見隱七年齊來聘左氏曰孟孫立於房外謂范獻子曰陽虎若不能居魯而息肩於晉所不以為中軍司馬者有如先君獻子曰寡君有官将使其人鞅何知焉獻子謂簡子曰魯人患陽虎矣孟孫知其釁以為必適晉故強為之請以取入焉劉氏曰陽虎陪臣也而執國命欲蕩覆公室以自封久矣春秋本其禍之所搆自二子之使夫以二子之力專國擅君而陽虎能制之方復為之請於伯主之國此其無所忌必為亂之效也雖然不介晉權亂亦不得發春秋彰往察來而慎於幾微故因事以宣其指原指以見其變篡君亡國之禍必自其禍之所起矣俱未詳信否秋晉人執宋行人樂祁犂左氏曰宋樂祁言於景公曰諸侯唯我事晉今使不往晉其憾矣樂祁告其宰陳寅陳寅曰必使子往他日公謂樂祁曰唯寡人說子之言子必往陳寅曰子立後而行吾室亦不亡唯君亦以我為知難而行也見溷而行趙簡子逆而飲之酒於緜上獻楊楯六十於簡子陳寅曰昔吾主范氏今子主趙氏又有納焉以楊楯賈禍弗可為也已然子死晉國子孫必得志於宋范獻子言於晉侯曰以君命越疆而使未致使而私飲酒不敬二君不可不討也乃執樂祁未詳信否義見荘十七年齊執鄭詹冬城中城榖梁曰城中城者三家張也貫道王氏曰中城公宫城也成九年城矣諸侯有道守在四鄰魯定不能制三家倚一城以自守是外徹其藩籬而區區欲固其堂奥也其能國乎義又見隱七年城中丘季孫斯仲孫忌帥師圍鄆杜氏曰何忌不言何闕文鄆西鄆見成四年邦衡胡氏曰昭公居鄆鄆潰而歸季氏則鄆為季氏所據久矣今季氏自以兵攻之得非叛季氏乎義見昭十三年圍費愚案十年齊人來歸鄆讙龜隂田則此蓋叛季氏而歸齊也七年春王正月夏四月秋齊侯鄭伯盟于鹹鹹見僖十三年東萊吕氏曰晉自平丘之役不能以徳義結諸侯至於召陵之㑹諸侯皆貳而叛故齊侯鄭伯盟于鹹義又見隱元年盟于蔑齊人執衞行人北宫結以侵衞齊侯求衞而衞不從因執行人以侵衞行人所以通命也齊人執之以侵衞其辠著矣義又見荘十年公侵宋齊侯衞侯盟于沙公羊作沙澤杜氏曰陽平元城縣東南有沙亭張氏曰元城後屬大名府愚謂衞服齊而為此盟也義見隱元年盟干蔑大雩義見桓五年齊國夏帥師伐我西鄙左氏曰齊國夏伐我陽虎御季桓子公斂處父御孟懿子将宵軍齊師齊師聞之墮伏而待之處父曰虎不圖禍而必死苫夷曰虎陷二子於難不待有司余必殺女虎懼乃還不敗貫道王氏曰齊景又欲合魯也許氏曰東夏諸侯惟魯事晉故齊伐之景公乗晉之衰不思惟徳之務以懐諸侯而欲力征經營以定伯統是知時之或可而不知己之不可者也義又見隱二年鄭伐衞九月大雩一時再雩旱甚也義見桓五年冬十月春秋本義卷二十七
