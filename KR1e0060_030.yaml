body:
  text: 春秋本義卷三十元程端學撰哀公八年春王正月宋公入曹以曹伯陽歸義見隱二年莒入向及莊十年以蔡侯歸吳伐我蘇氏曰不言四鄙而直言伐我兵加於國都也左氏曰七年邾茅夷鴻以束帛乘韋自請救於吳曰魯弱晉而逺吳馮恃其衆而背君之盟辟君之執事以陵我小國邾非敢自愛也懼君威之不立君威之不立小國之憂也若夏盟於鄫衍秋而背之成求而不違四方諸侯其何以事君且魯賦八百乘君之二也邾賦六百乘君之私也以私奉二唯君圖之吳子從之八年吳為邾故伐我高氏曰公入人之國俘人之君以致吳人之來討見公不能處已絶亂矣義又見莊十年荆敗蔡師夏齊人取歡及闡闡尺善切公羊作僤下同歡見桓三年闡杜氏曰在東平剛縣北地譜宛丘龔蛇縣也孫氏曰公前年入邾以邾子益來益齊甥也故齊人取歡及闡貫道王氏曰魯執邾子既召吳人之伐又致齊人取歡及闡為國而不義其害國如此夫愚謂邑天子所封非諸侯所得取魯入人之國俘人之君罪不容誅也齊侯苟能告於天子聲罪致討大義庶矣乃因之以為利亦罪也歸邾子益于邾邦衡胡氏曰先書吳伐我又書齊取二邑然後書歸邾子于邾則是畏吳懼齊而歸之也秋七月冬十有二月癸亥把伯過卒義見隱三年宋公卒齊人歸歡及闡孫氏曰公既歸邾子益于邾故齊人歸歡及闡凡土地諸侯取之歸之皆書者惡専恣也愚謂魯之愧辱可知有國家者可以鑒此矣吕氏曰吳之伐我齊之取歡及闡以魯之入邾以邾子歸也歸邾子益于邾魯畏吳齊故也齊人歸歡及闡以我歸邾子也諸侯紛紛如此苟徇目前無一人求出當世規模者日朘月削以至於亡而卒不悟也易曰困于葛藟于臲卼曰動悔有悔征吉能知動悔有悔求出乎是變心易慮惟賢是用改前之為則出乎困矣故曰征吉春秋之世諸國君臣束手待斃其亦不知征吉之理矣九年春王二月葬把僖公杜氏曰三月而葬速義又見隱三年葬宋穆公宋皇瑗帥師取鄭師于雍丘杜氏曰雍丘縣屬陳留張氏曰後屬開封師氏曰鄭人圍宋雍丘宋皇瑗圍之雍丘應於內皇瑗圍於外腹背受敵無以支持而為宋所得故曰取許氏曰春秋之季曰尋干戈詐力相傾竒變滋起於是始志取人之師甚其譎惡其盡也鄭以不義深入敵境此固喪師之道也愚謂鄭有罪矣然不書鄭伐宋而書宋取鄭師者書其甚者也夏楚人伐陳義見莊十年荆敗蔡師秋宋公伐鄭存耕趙氏曰宋嘗侵鄭又取鄭師矣雖曰雍丘之役始於鄭獨不曰侵鄭之役誰實始禍歟佳兵不戢將自焚也嵒之禍基於此矣義又見隱二年鄭伐衛冬十月十年春王二月邾子益來奔高氏曰邾子先為魯所獲而又來奔其不知恥甚矣義又見桓十五年鄭伯奔蔡公㑹吳伐齊常山劉氏曰公㑹吳師伐中國諸侯具文可見其罪三月戊戌齊侯陽生卒義見隱元年宋公卒夏宋人伐鄭許氏曰春取其師秋又伐之明年夏又伐之惡其修怨不己也義又見隱二年鄭伐衛晉趙鞅帥師侵齊許氏曰助吳亂華伐齊之喪具文以見其罪義又見莊十年公侵宋五月公至自伐齊義見桓二年公至自唐葬齊悼公義見隱三年葬宋穆公衛公孟彄自齊歸于衛自齊有奉也彄自定十四年出奔距今十二年倚大國而歸衛當時大夫専恣如此義又見僖二十八年元咺歸衛薛伯夷卒夷公羊作寅義見隱三年宋公卒秋葬薛惠公義見隱三年葬宋穆公冬楚公子結帥師伐陳義見莊十年荆敗蔡師吳救陳此吳楚爭諸侯而為此救見中國之益衰未可以存亡繼絶許之也義又見僖十八年狄救齊十有一年春齊國書帥師伐我伐我見八年左氏曰齊為鄎故國書高無㔻帥師伐我及清季孫謂其宰冉求曰齊師在清必魯故也若之何求曰一子守二子從公禦諸竟季孫曰不能求曰居封疆之閒季孫告二子二子不可求曰若不可則君無出一子帥師背城而戰不屬者非魯人也魯之羣室衆於齊之兵車一室敵車優矣子何患焉二子之不欲戰也宜政在季氏當子之身齊人伐魯而不能戰子之恥也大不列於諸侯矣季孫使從於朝俟於黨氏之溝武叔呼而問戰焉對曰君子有逺慮小人何知懿子強問之對曰小人慮材而言量力而共者也武叔曰是謂我不成丈夫也退而搜乘孟孺子泄帥右師顔羽御邴泄為右冉求帥左師管周父御樊遲為右季孫曰須也弱有子曰就用命焉季氏之甲七千冉有以武城人三百為己徒卒老幼守宫次于雩門之外五日右師從之公叔務人見保者而泣曰事充政重上不能謀士不能死何以治民吾既言之矣敢不勉乎師及齊師戰於郊齊師自稷曲師不踰溝樊遲曰非不能也不信子也請三刻而踰之如之衆從之師入齊軍右師奔齊人從之陳瓘陳莊涉泗孟之側後入以為殿抽矢䇿其馬曰馬不進也林不狃之伍曰走乎不狃曰誰不如曰然則止乎不狃曰惡賢徐步而死師獲甲首八十齊人不能師宵諜曰齊人遁冉有請從之三季孫弗許孟孺子語人曰我不如顔羽而賢於邴泄子羽鋭敏我不欲戰而能默泄曰驅之公為與其嬖僮汪錡乘皆死皆殯孔子曰能執干戈以衛社稷可無殤也冉有用矛於齊師故能入其軍未詳信否邦衡胡氏曰罪魯不能反身罪已而又見伐也孟子謂行有不得者皆反求諸已魯以入邾之故吳齊交伐是我之罪魯不反身自咎又㑹吳伐齊以速國書之兵是不知罪之在我也愚謂齊有喪而伐人罪亦可見義又見隱二年鄭伐衛貫道王氏曰邦分崩離析師至輒入其國都公室卑弱私邑不相能故無復預備也夏陳袁頗出奔鄭袁左氏榖梁作轅左氏曰初袁頗為司徒賦封田以嫁公女有餘以為己大器國人逐之故出道渴其族轅咺進稻醴梁糗腶脯焉喜曰何其給也對曰器成而具曰何不吾諫對曰懼先行未詳信否義見僖二十八年元咺奔晉五月公㑹吳伐齊甲戍齊國書帥師及吳戰于艾陵齊師敗績獲齊國書孫氏曰戰不言公者公與伐不言戰也左氏曰為郊戰故公㑹吳子伐齊五月克博壬申至於嬴中軍從王胥門巢將上軍王子姑曹將下軍展如將右軍齊國書將中軍高無㔻將上軍宗樓將下軍陳僖子謂其弟書爾死我必得志宗子陽與閭丘明相厲也桑掩胥御國子公孫夏曰二子必死將戰公孫夏命其徒歌虞殯陳子行命其徒具含玉公孫揮命其徒曰人尋約吳髮短東郭書曰三戰必死於此三矣使問弦多以琴曰吾不復見子矣陳書曰此行也吾聞鼓而已不聞金矣甲戌戰於艾陵展如敗高子國子敗胥門巢王卒助之大敗齊師獲國書公孫夏閭丘明陳書東郭書革車八百乘甲首三千以獻於公木訥趙氏曰魯再㑹吳伐齊招外寇以攘中國為惡大矣劉氏曰戰而言及之者主之者也猶曰國書為志乎此戰也云爾夫以吳之無道犯閒上國涉數千里之地以伐人之邦固求棄疾於人與之俱靡焉爾國書之用齊也內不能安其君外不能交鄰國而輕與之戰其不愛百姓也不亦甚乎義又見莊十年荆敗蔡師秋七月辛酉滕子虞母卒義見隱三年宋公卒冬十有一月葬滕隱公義見隱三年葬宋穆公衛世叔齊出奔宋左氏曰衛大叔疾出奔宋初疾娶於宋子朝其娣嬖子朝出孔文子使疾出其妻而妻之侍人誘其初妻之娣置於犂而為之一宫如二妻文子怒欲攻之仲尼止之遂奪其妻或淫於外州外州人奪之軒以獻恥是二者故出未詳信否義見僖二十八年元咺奔晉高氏曰春秋書內外大夫出奔者凡五十有八蓋君之股肱治亂所寄故重以書之然春秋之末何其出奔之多也是時政在大夫各欲自専故始則相猜相忌終乃相逐也十有二年春用田賦何氏曰田謂一井之田賦者斂取其財物也言用田賦者若今漢家斂民錢以田為率矣不言井者城郭里巷亦有井嫌悉賦之左氏曰季叔欲以田賦使冉有訪於仲尼仲尼曰丘不識也三發卒曰子為國老待子而行若之何子之不言也仲尼不對而私於冉有曰君子之行也度於禮施取其厚事舉其中斂從其薄如是則以丘亦足矣若不度於禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲苟而行又何訪焉弗聽許氏曰先王之法九夫為井四井為邑井邑未有賦也四邑為丘丘十六井乃有牛馬之賦今以丘賦為不足也於是更用田賦籍井而取之非禮也古者田有稅丘有賦稅以足食賦以足兵朴鄉吕氏曰丘賦者即丘十六井出戎馬一匹牛三頭是賦之常法也所謂以田賦者蓋於兵賦之外又計田而出賦也田出稅丘出賦初稅畝則稅且重矣作丘甲則益兵賦又重矣今曰用田賦則是丘既出賦而田又出賦也然賦有二有軍賦有財賦四丘為甸甸出革車一乘此軍賦也周禮九賦之法此財賦也二者皆賦於民故均謂之賦所謂用田賦者恐是計田而出財賦爾孔子謂計丘而出軍賦矣則又不應計田而出財賦也夏五月甲辰孟子卒公羊曰孟子者何昭公之夫人也其稱孟子者何諱娶同姓蓋吳女也康侯胡氏曰禮娶妻不娶同姓厚男女之别也同姓從宗合族屬異姓主名治際㑹名著男女有别矣昭公不謹於禮欲結好強吳忍娶同姓以混男女之别典禮之本喪矣其失國也宜故陳司敗問昭公知禮乎子曰知禮子退揖巫馬期而進之曰吾聞君子不黨君子亦黨乎君娶於吳為同姓謂之吳孟子君而知禮孰不知禮巫馬期以告子曰丘也幸苟有過人必知之書孟子卒雖曰為君隱而實亦不可掩矣吕氏曰魯之君豈苟為無禮亂男女之别哉迫於強吳之威而欲自固其國也欲自固其國而不知以禮自防以義為上徇目前之急忘長久之慮遂至忍于蔑姓亂類而不辭也公㑹吳于橐臯橐章夜切一音託杜氏曰橐臯在淮南逡遒縣東南張氏曰吳地地譜云逡遒故城在廬州愼縣東南左氏曰公㑹吳于橐臯吳子使大宰嚭請尋盟公不欲使子貢對曰盟所以周信也故心以制之玉帛以奉之言以結之明神以要之寡君以為苟有盟焉弗可改也已若猶可改日盟何益今吾子曰必尋盟若可尋也亦可寒也乃不尋盟師氏曰往年㑹于鄫今又㑹于橐臯一之為甚其可再乎詳書者譏公之失所從也義又見成十五年㑹吳于鍾離秋公㑹衛侯宋皇瑗于鄖公羊作運鄖音云杜氏曰鄖發陽也廣陵海陵縣東南有發繇亭地譜吳海陵即泰州城下義見隱九年㑹于防木訥趙氏曰吳夫差躬敗齊師于艾陵魯故也魯以為惠故㑹吳于橐臯修鄫之好也鄖在今泰州吳地公既睦於吳而吳將圖伯故為之㑹宋衛于鄖合宋衛以從吳也齊固晉之仇今魯宋衛亦折而從吳晉其殆哉故明年為黃池之㑹晉好於吳非爭伯也紓吳患也然晉之屈吳之雄諸侯東向事吳者皆魯為之也四書公㑹吳繼書公㑹宋衛明年公㑹晉侯及吳于黃池則魯之罪著矣未詳是否宋向巢帥師伐鄭左氏曰宋鄭之閒有隙地焉曰彌作頃丘玉暢嵒戈錫子産與宋人為成曰勿有是及宋平原之族自蕭奔鄭鄭人為之城嵒戈錫九月宋向巢伐鄭取錫殺元公之孫遂圍嵒十二月鄭罕達救嵒丙申圍宋師未詳信否義見隱二年鄭伐衛木訥趙氏曰宋鄭之怨於是十有三歲矣雖其兵端啓於鄭罕達然六年之閒宋四伐鄭明年鄭罕達遂取宋師于嵒逞兵不戢亦可戒哉冬十有二月螽公羊作􅏑公羊曰何以書記異也何異爾不時也愚謂十二月螽雖不害榖災異蓋甚於常時夫百蟲既蟄而惡氣殄君臣蠧民逆天隂陽變常之象也義又見桓五年十有三年春鄭罕達帥師取宋師于嵒五咸切罕公羊作軒孫氏曰宋向巢帥師伐鄭鄭罕達帥師取宋師于嵒報雍丘之師也案九年宋皇瑗帥師取鄭師于雍丘二國復師以相償報其惡如此義又見九年宋取鄭師夏許男成卒成公羊作戍義見隱三年宋公卒公㑹晉侯及吳子于黃池黎氏曰經書及皆內及外尊及卑之辭故凡中國之侯伯與楚戰或盟㑹必書及今書公㑹晉侯及吳子于黃池是亦內及外之辭也謂之㑹兩伯似非經意黃池杜氏曰陳留封丘縣有黃亭近濟水張氏曰晉地地譜東京開封縣有黃池木訥趙氏曰晉侯􅑱然在㑹諸侯無一介從之亦才得魯而已何以伯為晉之所以㑹吳者非以為伯忌吳之強也吳之所以㑹晉者亦非為伯也交中國爾愚謂晉主中國㑹盟百有餘年自柏舉之戰晉侯不見者二十四年至此遂與吳㑹而晉侯從之中國不復有伯世變至此極矣此春秋之終也楚公子申帥師伐陳義見莊十年荆敗蔡師於越入吳孫氏曰於越入吳者吳子方㑹乘其無備也康侯胡氏曰吳自柏舉以來憑陵中國黃池之㑹遂與晉敵可謂強矣而春秋繼書於越入吳所謂因事屬辭垂戒後世而見深切著明之義也曽子曰戒之戒之出乎爾者反乎爾老子曰佳兵不祥之器其事好還吳嘗破越遂有輕楚之心及其破楚又有驕齊之志既勝齊師復與晉人爭衡自謂莫之敵也而越已入其國春秋初書吳入楚在柏舉之後再書於越入吳在黃池之後皆因事屬辭垂戒後世深切著明之義也義又見僖三年徐取舒秋公至自會義見桓二年公至自唐晉魏曼多帥師侵衛公羊無曼字陸氏曰脫也義見莊十年公侵宋葬許元公義見隱三年葬宋穆公九月螽義見桓五年冬十一月有星孛于東方高氏曰不言宿名者董仲舒劉向以為不加宿也文十四年有星孛于北斗昭十七年有星孛于大辰皆言所次而此獨不言則不加宿可知也蓋著人事所召也義又見文十四年盜殺陳夏區夫區苦侯切公羊作彄盜見襄十年高氏曰春秋之季世變之甚至於盜興而専殺國君及卿大夫則亂已極矣貫道王氏曰夏區夫徴舒之裔也徴舒為逆陳不能討而楚殺之且有後於陳而執國政陳無政矣未詳是否十有二月螽義見十二年及桓五年吕氏曰前年十二月螽此年九月又螽十二月又螽隂陽錯亂之甚當世君臣亦可以自省矣許氏曰自魯用田賦而比年三螽貪殘無已之應也見其民力已窮天命已去也十有四年春西狩獲麟蘇氏曰狩而不地為獲麟書略之也麟陸璣曰麕身牛尾黃色𤣥蹄角端有肉音中鍾吕行中規矩王者至仁則出左氏曰西狩於大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之愚謂聖王在上天下文明則麟出為祥聖王不作天下大亂則麟出為異出而見獲又異之甚者也隱桓春秋之始也諸侯㑹盟侵伐蕩然無主逮乎莊僖齊晉既伯天下知有伯主不知有王禮樂征伐自諸侯出矣文宣成襄政歸大夫禮樂征伐又自大夫出焉歷昭定哀陪臣柄國此君臣之大亂也外侮荐作亦始隱桓及乎莊公荆楚又盛桓文既沒其勢益張滅國殺君遂主夏盟晉悼引吳敵楚楚暫沮而吳復興此中外之大亂也故二百四十二年之閒弒逆戕殺入滅圍取兵戈相尋民無錯躬先王之紀綱法度遺風舊俗泯矣人事悖常則隂陽錯序故日食星隕地震山崩水旱霜雹螽螟麋􅈮靡所不見而春秋以獲麟終焉此天下後世之大異也夫春秋即始見終自微見著始之不慎而紊於終微之不戒而極於著遂至無可奈何聖人傷世之心至此極矣韓子曰麟之出必有聖人在乎位若麟之出不待聖人則其謂之不祥也亦宜而況於獲乎程子曰春秋感麟而作然麟不出春秋亦必作孔子之意蓋有素矣因是一事則有感而作故其書之成則以此終固必有發端者然也如伏羲畫八卦因於河圖設無河圖八卦寧不作乎春秋本義卷三十
