body:
  text: 春秋本義卷十二元程端學撰僖公十有六年春王正月戊申朔隕石于宋五是月六鷁退飛過宋都隕公羊作霣是公羊作提誤也鷁五歷切穀梁作鶂先石後五者猶書言牛一羊一豕一之意也杜氏曰是月隕石之月重言是月嫌同日鷁水鳥程子曰退飛倒逆飛必有氣驅之存耕趙氏曰石靜物也而隕自天鷁進物也而退飛異矣見於宋應在宋也康侯胡氏曰聖人因災異以明天人感應之理而著之於經垂戒後世如石隕于宋而書曰隕石此天應之也和氣致祥乖氣致異苟知其故恐懼修省變可消矣宋襄公亡國之餘欲圖伯業不自省其德也後有盂之執泓之戰天之示人顯矣聖人所書之義明矣可不察哉三月壬申公子季友卒此記三桓之始友之後季孫行父季孫宿季孫意如季孫斯皆執魯政至意如而逐昭公是以謹志其卒義又見閔元年季子來歸大意又見隱元年盆師卒劉氏曰春秋譏世卿莫甚於魯魯之大夫皆世卿然莫強於季氏仲氏季氏出昭公而仲氏弒子赤此皆世卿能成其禍者也是以春秋書之康侯胡氏曰大夫卒而書名則曷為書字聞諸師曰春秋時魯卿有生而賜氏者季友仲遂是也生而賜氏者何命之世為卿也季子在僖公有翼戴之勤襄仲弒逆在宣公有援立之力此二君者不勝私情欲以異賞報之也故皆生而賜氏俾世其官經於其卒各以氏書者志變法亂紀之端貽權臣竊命之禍其垂戒逺矣夏四月丙申鄫季姬卒鄫穀梁作繒髙氏曰季姬嫁於鄫才及八月而卒然其所以為鄫之禍甚酷故春秋詳志之以為後世之戒秋七月甲子公孫兹卒兹公羊作慈髙氏曰此公子牙之子也世秉魯政至春秋之終而猶未絶存耕趙氏曰以著三桓之子孫也大意又見隱元年益師卒冬十有二月公會齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮髙氏曰邢侯始與會而在鄭許之下者此齊次之也淮杜氏曰臨淮郡左右張氏曰後漢為下邳國後為泗州義見隱九年會于防朴鄉吕氏曰大要為淮夷而為此會其伯業既衰之時也十有七年春齊人徐人伐英氏張氏曰英氏臯陶後之封楚之與國左氏曰齊人為徐伐英氏以報婁林之役也邦衡胡氏曰楚人病徐齊桓不能服楚而伐其與國是遷戮也皆未詳信否義又見莊三十年齊伐山戎夏滅項杜氏曰項國即汝隂項縣張氏曰子爵漢屬汝南即陳州項城縣左氏曰淮之會公有諸侯之事未歸而取項程子曰滅人之國罪惡大矣在君則當諱故魯滅國書取滅項君在會季孫所為也故不諱愚謂先書滅項後書公至自會則大夫擅國政握兵權可知此亦昭公客死乾侯之權輿也故曰禮樂征伐自大夫出五世希不失矣春秋書此一見王綱大壞而大夫滅國二見魯君失政而三桓擅權三見齊桓未死而伯業已墜矣義又見莊十年齊滅談君舉陳氏曰滅項失兵權之漸也襄公在晉書邾庶其來奔昭公在晉書莒牟來奔春秋之季大夫不稟命者非但魯也鄭伯會於夷儀鄭公孫舍之帥師入陳蔡侯會於召陵蔡公孫姓帥師滅沈春秋必志之也秋夫人薑氏會齊侯于卞卞皮彥切公羊左氏作辨杜氏曰卞魯國卞縣張氏曰在襲慶府泗水縣義見十一年此則公在會而夫人自出會瀆亂極矣存耕趙氏曰夫人前與公會齊侯于陽榖矣今又獨會齊侯於卞失禮成俗習以為常姦與不姦未可知也聖人因其會而書之謹禮也懲惡也九月公至自會孫氏曰踰三時義見桓二年公至自唐此又見滅項會卞而公在會非特踰時而已冬十有二月乙亥齊侯小白卒義見隱三年宋公卒東萊吕氏曰桓公雖能用管仲攘荆蠻伯諸侯有一匡天下之功然仲木無正心誠意格君之學徙急於一時之功利卒致五子之亂其所以有始無終者家法不正也十有八年春王正月宋公曹伯衛人邾人伐齊公羊宋公下有會字左氏曰齊侯之夫人三王姬徐姬蔡姬皆無子齊侯好內多內寵內嬖如夫人者六人長衛姬生武孟少衛姬生惠公鄭姬生孝公葛嬴生昭公密姬生懿公宋華子生公子雍公與管仲屬孝公於宋襄公以為太子雍巫有寵於衛共姬因寺人貂以薦羞於公亦有寵公許之立武孟管仲卒五公子皆求立齊桓公卒易牙入與寺人貂因內寵以殺羣吏而立公子無虧孝公奔宋十八年春宋公以諸侯伐齊榖梁曰非伐喪也愚謂宋襄當齊桓盛時無役不從其事齊如此其謹也桓既卒而帥諸侯以伐喪者非特納孝公也急求伯也不度德不量力而求諸侯此其身見執國幾亡也齊桓帥諸侯尊天子攘僣竊生民息肩四十年宜其既沒而人益思之然死僅踰月而諸侯伐之者身不修而家不齊人不心服也吾觀齊宋舉可為永鑒矣義又見隱二年鄭伐衛張氏曰長幼有定分桓公管仲不能自制其尊卑正否之辨而輊屬幼少以為亂階公之君臣既失其制命之義矣今桓公未葬長子既立宋襄不能從宜因勢順其少長以撫定之使得以終桓公之喪乃成桓之私意帥四國之諸侯奉少奪長大亂齊國春秋深罪之也夏師救齊稱師將卑師衆也諸侯非王命不得擅興師然諸侯伐齊而魯救之猶為彼善於此但僖公之祖桓公見殺於齊為子孫者忍救之乎若桓公在時以伯事召則僅可耳五月戊寅宋師及齊師戰于甗齊師敗績甗魚免切劉氏曰戰而言及者主之者也猶曰宋師為志乎此戰也杜氏曰甗齊地莘老孫氏曰幸其喪乘其亂伐之以為利宋有罪矣愚謂可見宋之急於圖伯也義又見隱二年鄭伐衛狄救齊髙氏曰此非善狄之能救也所以甚惡中國之不知義也諸侯伐人之喪不義之甚而狄乃假義名以救之愚謂狄人而與中國之事則王綱之墜可知矣邦衡胡氏曰自狄伐邢齊桓救邢僅次聶北而已其後侵軼中國無嵗不有狄師齊桓未嘗一加兵焉至其卒而宋伐之中國莫與而狄乃救之其齊與狄交孚而相親乎秋八月丁亥葬齊桓公康侯胡氏曰桓公九合諸侯不以兵車威令加乎四海幾於改物雖名方伯實行天子之事不能慎終如始付託非人􅦮方在殯四鄰謀動其國家而莫之恤至於九月而後葬以此見功利之在人淺矣義又見隱三年葬宋穆公存耕趙氏曰五伯桓公為盛葬不及期何哉管仲既死而寺貂易牙乘時用事使桓公不能保其子以此見閹寺之為人國家害甚矣冬邢人狄人伐衛陸氏曰凡外域用兵唯舉國號如諸侯列序侵伐盟會則稱人以便文而君臣同辭愚謂邢既稱人則狄亦稱人以成文耳無他義也夫狄嘗伐邢邢至遷國則狄者邢之仇也今邢忘其仇而又偕之以伐同姓邢之罪大矣亦為其後衛伐邢滅邢起文也義又見隱三年鄭人伐衛及七年戎伐凡伯十有九年春王三月宋人執滕子嬰齊左氏曰宋人執滕宣公髙氏曰此宋求伯也莊十六年幽之會齊桓始伯滕子與焉既而背之至齊侯卒凡三十七年衣裳兵車之會未嘗列於其間宋襄既有求伯之心而首執滕子以令諸侯也然宋襄圖伯當以德懷徠之今乃肆已之強擅執國君以陵轢諸夏亦己甚矣孫氏曰五等之國皆諸侯也其或有罪方伯請於天子天子命之執則執之不得専執也存耕趙氏曰齊桓之伯執不及君已為薄矣宋襄效之而執虐人之君以是求伯難以免矣愚謂出乎爾者反乎爾故楚人效尤而執宋公矣夏六月宋公曹人邾人盟于曹南公公羊作人誤也范氏曰曹南曹之南鄙莘老孫氏曰曹南之盟蓋宋襄求伯而為之也曹邾皆稱人者宋襄威德未著曹邾但使其臣會之義又見隱元年盟於蔑鄫子會盟于邾己酉邾人執鄫子用之鄫榖梁作繒鄫子會盟于邾者鄫子往邾國為盟也趙氏曰上言會盟下言用之緣盟用之同於牲也愚謂以諸侯執諸侯而為牲用見王綱大壞諸侯暴虐而無人心甚於禽獸之吞齧矣胡氏曰諸侯相執猶不可況用之為牲乎天子視而不能誅周道陵遲甚矣愚謂齊桓既沒而諸侯悖亂如此孔子所以有一匡天下之言也然王者化及人心遺風餘澤久而未斬伯者使人革面骨未寒而亂作其禍有甚焉者王伯之效淺深逺近於斯可見秋宋人圍曹左氏曰宋人圍曹討不服也子魚言於宋公曰文王聞崇德亂而伐之軍三旬而不降退修教而復伐之因壘而降詩曰刑于寡妻至于兄弟以御于家邦今君德無乃猶有所闕而以伐人若之何盍姑內省德乎無闕而後動康侯胡氏曰盟于曹南口血未乾今復圍曹愛人不親反其仁治人不治反其知襄公不能內自省德急於令諸侯執嬰齊非伯討不足以示威盟曹南非同志不足以示信卒於兵敗身傷不知反求諸己欲速見小利之過也經書襄公不越數端而知其操心之若此者仲尼筆削如化工賦像并其情不得遁焉非特畫筆之肖其形耳愚謂諸侯之國天子所封以諸侯圍諸侯罪可知矣君舉陳氏曰諸夏之書圍國自此始衛人伐邢報去年之役也張氏曰衛不自省其從宋伐喪之罪而以報復為事罪也義又見隱二年鄭伐衛冬會陳人蔡人楚人鄭人盟于齊張氏曰公羊會上有公字以諸侯皆稱人考之當從左氏榖梁范氏曰會無主名內卑者四國稱人外卑者康侯胡氏曰楚之得與中國會盟自此始桓公既沒中國無伯鄭伯始朝於楚其後遂為此盟又二年復盟於鹿上至會於盂遂執宋公以伐宋而楚於是列於陳蔡之上矣聖人書此所以著楚人之強傷列國之衰莫能抗也愚謂齊桓為盟主者四十年既沒而魯陳蔡鄭引楚入以盟於齊其罪著矣義又見隱二年盟戎於唐邦衡胡氏曰夫逺人可正以法度不然則必啓其貪婪之心楚自晉文之後爭主夏盟至楚靈即位遂大求諸侯為會於申執徐子殺慶封誘滅陳蔡而戕殺其君臣其後吳越繼興效楚一轍中國遂橫潰幅裂無可奈何而春秋終焉本其由來皆諸侯有以啓之梁亡張氏曰梁嬴姓國伯爵虞伯翳之後梁地屬同州韓城縣左氏曰梁亡不書其主自取之也初梁伯好土功亟城而弗處民罷而弗堪則曰某寇將至乃溝公宫曰秦將襲我民懼而潰秦遂取梁公羊曰此未有伐者其言梁亡何自亡也其自亡奈何魚爛而亡也榖梁曰湎於酒淫於色心昏耳目塞上無正長之治大臣背叛民為寇盜梁亡自亡也梁亡鄭棄其師我無加損焉正名而已矣莘老孫氏曰左氏以梁好土功榖梁以梁為淫湎而亡然孔子書梁亡爾不曰所以亡蓋所取亡之道衆一惡不足以盡之為人之君而不志於仁危亡之來皆自取之其自取亡之迹不必論也陸氏聞於師曰秦人肆其強暴取人之國沒而不書其義安在曰乘人之危惡易見也滅人之國罪易知也自取滅亡其意微矣春秋之作聖人所以眀微也二十年春新作南門榖梁曰作為也有加其度也言新有故也非作也杜氏曰魯城南門也本名稷門僖公更髙大之今猶不與諸門同改名髙門左氏曰書不時也公羊曰門有古常也孫氏曰案新延廄不言作此言作改舊可知譏其奢泰妨農功改舊制也康侯胡氏曰譏用民力於所不當為也魯人為長府閔子騫曰仍舊貫何必改作孔子曰夫人不言言必有中春秋凡用民力得其時制者猶書以見勞民為重事而况輕用於所不當為者乎然僖公嘗修泮宫復閟宫矣奚斯董其役史克頌其事而經不書者宫廟以事其祖考學校以教國之子弟二者為國之先務雖用民力不可廢也其垂教之意深矣夏郜子來朝郜占報切穀梁作邾杜氏曰郜姬姓國後漢志濟隂成武有郜城義見隱十一年滕薛來朝五月乙巳西宫災薛氏曰西宫魯之二室也公羊曰小寢也有西宫則有東宫矣何以書記異也存耕趙氏曰必有獲譴於天也鄭人入滑左氏曰滑人叛鄭而服於衛夏鄭公子士泄堵寇帥師入滑未詳信否髙氏曰鄭伯與滑伯同等諸侯而入滑強陵弱也義見隱二年入向張氏曰記天王出居鄭之始釁也秋齊人狄人盟于邢狄稱人見十八年左氏曰齊狄盟於邢為邢謀衛難也於是衛方病邢莘老孫氏曰前年冬邢狄伐衛以救齊於是三國會盟於邢之國都愚謂狄嘗伐邢邢至遷國齊桓亦嘗帥曹宋以救邢矣齊孝不能繼志述事而偕狄以盟於邢邢侯忘宗廟社稷之怨而受盟於國都均不孝也且中外雜盟又為不義不孝不義原於齊德邢狄見救之小惠邢亦但知合黨伐衛以報私怨而忘其為不義矣其後齊之不振邢之見滅於衛皆不知大義之所致也春秋比事見義垂戒逺矣義又見隱二年盟戎於唐冬楚人伐隨陸氏曰隨姬姓侯爵義見莊十年荆敗蔡師二十有一年春狄侵衛張氏曰因邢之盟也存耕趙氏曰邢狄同救齊者也衛伐邢則狄侵衛雖曰患難相救而非狄之所得為也春秋所以嚴中外之辨也狄雖侵衛不足以存邢適以速邢之亡爾義又見隱七年戎伐凡伯張氏曰齊孝公不能嗣父之業楚狄皆因之以為中國患此齊邢之盟所以兩書而邢衛並受其禍也宋人齊人楚人盟于鹿上莘老孫氏曰三國皆微者爾宋實主之故序其上也杜氏曰鹿上宋地汝隂有原鹿縣左氏曰宋人為鹿上之盟以求諸侯於楚楚人許之公子目夷曰小國爭盟禍也宋其亡乎幸而後敗張氏曰欲伯諸侯而求之於暴橫亂常之楚此春秋所以著襄公之自取敗辱也義又見隱二年盟戎於唐存耕趙氏曰尊中國攘外裔伯者事也宋欲繼齊者也亦嘗思召陵之盟楚使屈完來盟于師之故乎今乃求諸侯於楚略不羞與楚伍適以啓爭長之暴莘老孫氏曰宋國小德薄而求諸侯至見執見敗幾亡其國自兹始焉夏大旱大者非常之辭左氏曰公欲焚巫尫臧文仲曰非旱備也修城郭貶食省用務穡勸分此其務也巫尫何為天欲殺之則如勿生若能為旱焚之滋甚公從之未詳信否公羊曰記災也莘老孫氏曰隂陽不和非常為災之辭也愚謂大意與不雨同而史氏所書詳略輕重或異耳義又見莊三十一年不雨獻可杜氏曰春秋書大旱者二此年及宣七年是也皇極不立五事不正而咎應之詳記災變所以示戒也秋宋公楚子陳侯蔡侯鄭伯許男曹伯會于盂執宋公以伐宋盂音于公羊作霍榖梁作雩葉氏曰楚子何以先諸侯宋襄欲圖伯而會楚子諸侯推先楚子也杜氏曰盂宋地左氏曰諸侯會宋公于盂子魚曰禍其在此乎君欲己甚其何以堪之於是楚執宋公以伐宋陳嶽氏曰聨諸侯之會書之眀與楚國共執之宋既服諸侯復盟於薄以釋之則共執之義顯矣愚謂五伯盟會皆罪也然齊桓猶有攘楚之功宋襄不度德量力以圖伯反躋楚人於諸侯之上其辱身害國固宜然五國諸侯畏楚從令共執伐同類罪可知矣彼楚子者南蠻之雄先王之所膺擊驅逐不與同中國者也尚何責哉春秋書此見中國之衰楚人之橫由諸侯之自取也冬公伐邾義見隱二年鄭伐衛楚人使宜申來獻捷王氏曰宜申閼氏子西也獻捷見莊三十一年杜氏曰獻宋捷也不言宋者秋伐宋冬來獻捷事不異年從可知也愚謂諸侯同伐宋而楚獨來獻捷者主謀者楚也劉氏曰中國於四夷則有捷諸侯於天子則有獻捷康侯胡氏曰諸侯從楚伐宋而魯獨不與故楚來獻捷以脅魯為魯者拒其使而不受可也請於天子而討之可也宋先代之後作賓王家方修盟會而伏兵車又以軍獲遺獻諸侯橫逆甚矣邦衡胡氏曰齊捷戎以內而捷外猶可言也楚捷宋以外而捷內不可言也十有二月癸丑公會諸侯盟于薄釋宋公髙氏曰書會諸侯者以諸侯皆在是故前目後凡且見公之續至也任氏曰薄史記作亳漢山陽薄縣湯所都也張氏曰案地譜拱州考城漢薄縣即湯都古字通用左氏曰會於薄以釋之子魚曰禍猶未也不足以懲君愚謂魯不能告天王眀大義以正諸侯與楚人執宋公之罪顧以一獻捷之威出為會盟求釋宋公魯既失義矣五國諸侯從楚之謀俟魯宋屈辱而後釋之則五國自損其中國之體矣宋公以諸侯而見釋於諸侯難以在人上矣况楚人主此謀哉宜楚之益無忌憚而中國之益衰也故張氏曰書公會諸侯於薄釋宋公蓋以為中國之大恥而罪魯與諸侯之無能為也康侯胡氏曰此正天下之大變春秋所謹也或以為嘉我公之救患誤矣二十有二年春公伐邾取須句權俱切公羊作朐後同莘老孫氏曰須句邾邑張氏曰東平府須城縣義見隱四年莒伐把亦為是年及邾戰於升陘起文也夏宋公衛侯許男滕子伐鄭左氏曰鄭伯如楚宋公伐鄭子魚曰所謂禍在此矣張氏曰襄公嘗困於楚矣疾疢雖甚而德慧術知未有以增益其所不能穀梁氏所謂不能反其知以治人過而不改而又甚之者也義又見隱二年鄭伐衛秋八月丁未及邾人戰于升陘音刑不言公大夫也杜氏曰升陘魯地髙氏曰邾來伐我而魯遽及邾人戰也公伐邾取須句以起此戰愚謂魯取邾邑而致寇僖公不反躬自責復其舊邑而驅民以戰始終皆有罪矣不書邾伐我書法與桓十七年戰於奚同義又見隱二年鄭伐衛冬十有一月己巳朔宋公及楚人戰于泓宋師敗績不書楚伐宋而書及楚人戰書法亦與桓十七年戰於奚同蓋宋公主乎此戰也戰稱公者君行師從師不待言也敗稱師者見師衆大敗紀實事也杜氏曰泓水名左氏曰楚人伐宋以救鄭宋公將戰大司馬固諫曰天之棄商久矣君將興之弗可赦也已弗聽宋公及楚人戰於泓宋人既成列楚人未既濟司馬曰彼衆我寡及其未既濟也請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績公傷股門官殱焉國人皆咎公公曰君子不重傷不禽二毛古之為軍也不以阻隘也寡人雖亡國之餘不鼓不成列子魚曰君未知戰勍敵之人隘而不列天贊我也阻而鼓之不亦可乎猶有懼焉且今之勍者皆吾敵也雖及胡耉獲則取之何有於二毛眀恥教戰求殺敵也傷未及死如何勿重若愛重傷則如勿傷愛其二毛則如服焉三軍以利用也金鼓以聲氣也利而用之阻隘可也聲盛致志鼓儳可也孫氏曰宋襄無齊桓之資而欲紹齊桓之烈帥諸侯而致強楚故盂之會見執受伐今復與楚爭鄭以起此戰師喪身傷七月而死為中國羞義又見莊十年荆敗蔡師榖梁曰泓之戰以為復雩之恥也雩之恥宋襄有以自取之也治人而不治則反其知過而不改又之是謂之過襄公之謂也劉氏曰宋襄不厄人於險不鼓不成列此至仁大義雖文王之戰不能過之春秋惡之以其好戰而不務本飾小名而妨大德此無異盜跖之分均為仁出後為義也二十有三年春齊侯伐宋圍緡緡亡巾切榖梁作閔杜氏曰緡宋邑髙平昌邑縣東南有東緡城漢志山陽郡東緡縣春秋時作緡張氏曰即濟州金鄉縣康侯胡氏曰齊伯國之餘業也宋襄既敗於泓荆楚之勢益張齊侯既無尊中國攘外裔恤患災畏簡書之意又乘其約而伐之此尤義之不得為者也義又見隱五年宋伐鄭榖梁曰不正其以惡報惡也夏五月庚寅宋公兹父卒左氏曰宋襄公卒傷於泓故也大意見隱七年滕侯卒此又以見宋襄之率意妄作窮困而死也秋楚人伐陳義見莊十年荆敗蔡師冬十有一月杞子卒杞稱子見桓二年滕子來朝髙氏曰不名者史逸之左氏曰杞成公卒大意見隱七年滕侯卒髙氏曰入春秋以來始書杞卒二十有四年春王正月夏狄伐鄭義見隱七年戎伐凡伯秋七月冬天王出居于鄭葉氏曰天子以畿內為國諸侯以封內為國諸侯不以其道去其封曰出奔天子不以其道去其畿內曰出居出之為言恥也若曰雖有其國而不能守焉爾天子無外雖去其國謂之居焉愚謂春秋非専以二字見義義在一句之間若論字義不得不如葉氏云爾左氏曰王將以狄女為后富辰諫曰不可狄固貪婪王又啓之女德無極婦怨無終狄必為患王弗聽初甘昭公有寵於惠后惠后將立之未及而卒昭公奔齊王復之又通於隗氏王替隗氏頽叔桃子遂奉大叔以狄師攻王王御士將禦之王曰先后其謂我何寧使諸侯圖之王遂出及坎欿國人納之頽叔桃子奉大叔以狄師伐周大敗周師獲周公忌父原伯毛伯富辰王出適鄭處于汜大叔以隗氏居溫王使來告難曰不榖不德得罪於母之寵子帶鄙在鄭地汜敢告叔父臧文仲對曰天子蒙塵於外敢不奔問官守王使簡師父告於晉使左鄢父告於秦康侯胡氏曰王者以天下為家京師為室四方歸往猶天之無不覆也東周降於列國既不能家天下矣又毁其室而不保則是寄生之君耳愚謂以天王而出居於鄭必有失其道而見逐於其臣者而以自出為文何哉孔子曰能治其國家誰敢侮之此春秋所以正本也鑒戒昭矣榖梁曰天王無出出失天下也髙氏曰且罪諸侯之不赴難也葉氏曰子帶之亂方其奔齊或放焉或封焉親愛之而勿殺可矣古之人有行之者舜也而王不能反召之使得終其惡及其以狄伐周則罪在可討古之人有行之者固公也而王不能反避之使得奪其位若惠王者可謂喪匕鬯矣有天下而不及此則亦何以王天下哉張氏曰天王出居於鄭王師敗績於茅戎皆言其自取之以見天難忱斯不易維王不可不戒也晉侯夷吾卒大意見隱七年滕侯卒及左方左氏曰晉惠公卒懷公命無從亡人期期而不至無赦狐突之子毛及偃從重耳在秦弗召乃殺狐突卜偃稱疾不出晉公子重耳之及於難也晉人伐諸蒲城重耳奔狄處狄十二年而行過衛及齊及曹及鄭及楚子玉請殺之楚子曰晉公子廣而儉文而有禮其從者肅而寬忠而能力晉侯無親內外惡之吾聞姬姓唐叔之後其後衰者也其將由晉公子乎乃送諸秦二十四年正月秦伯納之濟河圍令狐入桑泉取臼衰二月甲午晉師軍於廬栁秦伯使公子縶如晉師師退軍於郇辛丑狐偃及秦晉之大夫盟於郇壬寅公子入於晉師丙午入於曲沃丁未朝於武宫戊申使殺懷公於髙梁髙氏曰魯尚未與晉通而此書惠公卒者以見文公之入也惠公立十四年而卒懷公立秦人納文公而殺懷公焉然則文公篡立而不書其入者以晉獻既殺世子申生則文公自以次當立故也皆未詳信否二十有五年春王正月丙午衛侯燬滅邢朱子曰諸侯滅國未嘗書名今經文只隔夏四月癸酉一句便書衛侯燬卒恐是因而傳寫之誤左氏曰衛人將伐邢禮至曰不得其守國不可得也我請昆弟仕焉乃往得仕衛人伐邢二禮從國子巡城掖以赴外殺之禮至為銘曰余掖殺國子莫余敢止未詳信否髙氏曰始則邢連狄以伐衛固可罪矣今衛遂舉兵以滅之抑又甚焉義又見莊十年齊滅談此滅同姓甚矣夏四月癸酉衛侯燬卒義見隱三年宋公卒宋蕩伯姬來逆婦存耕趙氏曰伯姬公姊妹也杜氏曰伯姬魯女為宋大夫蕩氏妻自為其子來逆榖梁曰其曰婦何也緣姑言之之辭也莘老孫氏曰親迎之禮自諸侯達於士庶人未有姑而逆婦者宋蕩伯姬來逆婦非禮可知髙氏曰夫不親迎而姑來迎魯不能以禮正之是棄其親戚也宋殺其大夫義見莊二十六年曹殺大夫秋楚人圍陳義見莊十年荆敗蔡師納頓子于頓不言楚人者蒙上圍陳之文也胡氏曰楚人圍陳而回後乃納頓子于頓故不言遂也張氏曰頓姬姓國杜氏注汝隂南頓縣屬陳州愚謂廢置者天子大權而夷狄行之中夏之衰極矣康侯胡氏曰中國不能修方伯連帥之職而使楚人納之是外裔仗義正諸夏也其責中國深矣此亦正本自治之意也君舉陳氏曰齊桓公卒楚始與諸夏盟于齊盟于鹿上執宋公納頓子侈然欲廢置諸侯春秋之所懼也葬衛文公義見隱三年葬宋穆公冬十有二月癸亥公會衛子莒慶盟于洮陸氏曰衛子在喪之稱也莒慶莒國大夫杜氏曰洮魯地愚謂諸侯擅盟已無王矣况衛子居喪而出盟莒慶以大夫而盟諸侯尤非禮也義又見隱元年盟于蔑二十有六年春王正月己未公會莒子衛寧速盟于向速公羊作遫左氏曰公會莒兹丕公寧莊子盟于向存耕趙氏曰一事而屢盟不協也義見隱元年盟于蔑齊人侵我西鄙公追齊師至酅弗及酅户主切公羊榖梁作巂西鄙魯國之西邉也啖氏曰追者寇已去而躡之也陳嶽氏曰酅齊地杜氏曰濟北榖城縣西有地名酅下張氏曰後漢屬東郡後屬東平府東阿胡氏曰侵言人追言師者蓋不可言公追齊人也左氏曰討是二盟也趙氏曰寇至不知追而不及內之無警備也愚謂齊孝不能繼父之業而遣兵侵掠魯境固可罪矣魯僖無禦侮之術而致寇又輕身越逐亦可罪也夏齊人伐我北鄙義見隱二年鄭伐衛衛人伐齊左氏曰洮之盟故也義見隱二年鄭伐衛公子遂如楚乞師遂莊公子仲遂也即東門襄仲乞見八年孫氏曰齊再伐我故公子遂如楚乞師夫國之大小師之衆寡皆有王制不可乞也書者惡魯不能修戎備而外乞師於楚人髙氏曰是不有天子而道外寇以伐中國也康侯胡氏曰衛人報德以怨伐齊之喪助少陵長又遷怒於邢而滅其國不義甚矣公既與其君盟於洮又與其臣盟於向是黨衛也故齊人既侵其西又伐其北齊師固亦非義矣而僖公不能省德自反深思逺慮計安社稷乃乞楚師與齊為敵是昧於中外之辨也其書公子遂如楚乞師而惡自見矣葉氏曰召陵之盟桓公與我伐楚而楚服今我乃欲以楚伐齊而恃之以勝公之謀國可知矣愚謂自此至文公薨凡書公子遂之専政専兵亦為殺子赤起也秋楚人滅夔以夔子歸夔求歸切公羊作隈非是杜氏曰夔楚同姓國建平秭歸縣張氏曰宋之歸州秭歸及興平縣皆有夔子城程子曰不名者外域小國魯史有所不能知不可得而紀故也左氏曰夔子不祀祝融與鬻熊楚人讓之對曰我先王熊摯有疾鬼神勿赦而自竄於夔吾是以失楚又何祀焉秋楚成得臣鬬宜申帥師滅夔以夔子歸未詳信否劉氏曰貪而不義楚罪大矣聖王在上雖逺國各有限域不相侵奪今楚人滅同姓亦中夏之衰而然也義又見僖三年徐取舒冬楚人伐宋圍緡榖梁作閔緡見二十三年左氏曰宋以其善於晉侯也叛楚即晉冬楚令尹子玉司馬子西帥師伐宋圍緡義見莊十年荆敗蔡師公以楚師伐齊取榖以見桓十四年左氏曰公以楚師伐齊取榖置桓公子雍於穀易牙奉之以為魯援楚申公叔侯戍之未詳信否孫氏曰齊天子甥舅之國也公以楚師伐甥舅之國固己不可而又取邑公之惡可知髙氏曰齊人加兵於魯魯欲報之當請命於天子會諸侯以同討其罪夫楚豺狼也安可逺引其師來入華夏以伐親鄰之國乎公至自伐齊義見桓二年公至自唐二十有七年春杞子來朝杞稱子見桓二年義見隱二年滕薛來朝夏六月庚寅齊侯昭卒義見隱三年宋公卒秋八月乙未葬齊孝公杜氏曰三月而葬速義又見隱三年葬宋穆公乙巳公子遂帥師入杞髙氏曰弱國既來朝而用師以報之杞魯乃舅甥之國而伯姬在焉魯人不義甚矣義又見隱二年莒入向貫道王氏曰案公子遂自為一軍始此東門氏之惡胚胎於此用見魯之軍政自僖公以來已紊矣冬楚人陳侯蔡侯鄭伯許男圍宋楚人大夫也葉氏曰楚何以先諸侯主兵也髙氏曰宋不與楚宗諸侯且有先君之怨又自以為伯國故終不與楚楚人前年伐之今又圍焉夫楚以南蠻恣豺狼之強來犯中國而陳蔡鄭許皆中國之諸侯反會楚人同伐之伸楚人之強屈中國之義罪昭然可見矣義又見莊十年荆敗蔡師愚謂楚之強暴甚矣然諸侯之屈服於楚亦其有以自取之也齊桓雖沒其兵尚強諸侯苟能宗之其勢猶足以敵楚而宋曹衛邾首伐齊魯陳蔡鄭又引楚人以盟於齊魯又乞楚師以伐齊從約既解楚遂得以憑陵中國今宋之被圍陳蔡鄭許之服役於楚皆始謀之不臧也故春秋慎始比事見義焉十有二月甲戌公會諸侯盟于宋葉氏曰此前圍宋之諸侯也不序前目後凡也宋公猶在圍則何以地宋盟於宋國之外是亦宋矣髙氏曰公畏楚之強而來為此盟亦報乞師之役愚謂夷狄摟諸侯以圍諸侯僖公不念脣亡則齒寒方且來盟於宋其謀國可知矣其罪亦著矣義又見隱二年盟戎於唐葉氏曰楚之得交中國自陳蔡楚鄭盟於齊始後公雖不會於盂而為薄之盟以釋宋公後五年伐齊之役乃乞師於楚而楚援之遂以取榖則何以得於楚乎晉文公之興首伐衛以正楚而公為之戍衛又責公子買之不卒戍而刺之則公之附楚審矣圍宋之役初雖不與會而為盟豈有意於救宋哉殆亦若戍衛以成楚志爾楚子居申而後使子玉去宋是會圍非解圍也春秋本義卷十二
