body:
  text: 春秋本義卷十元程端學撰僖公名申莊公子閔公庶兄左氏曰成風聞成季之繇乃事之而屬僖公焉故成季立之不書即位義同莊公元年春王正月齊師宋師曹師次于聶北救邢夏六月邢遷于夷儀齊師宋師曹師城邢夷公羊作陳杜氏曰聶北夷儀皆邢地張氏曰輿地廣記河北邢州龍岡縣北一百五十里有夷儀嶺即所遷也愚謂再書齊師宋師曹師者不可以前目後凡也苟不再書則若邢自城與魯城之者矣皆文勢當然無他義也莘老孫氏曰春秋之義凡次皆譏未有次而言救者力能救之則救之可也邢與凡蔣胙祭俱為周公之胤而狄伐之則仗大義帥諸侯往救之爾乃次于聶北曰救邢焉師巳次矣其能救乎實次而名救也齊桓用師未有曰師者師次所以見挾強師而不能救邢深罪之也邢為狄人所逐至於奔亡遷都夷儀書邢遷邢自遷也齊桓閔邢之亡率諸侯之師而為之城得救患分災之道矣然方狄之伐邢齊桓早帥諸侯救之則不至於遷而夷儀不必為城也齊桓失救邢之義使邢至於遷也而為之城城邢未足以為功而不救之情益自顯也義又見莊二十八年救鄭愚案以三國之大衆正月救邢而六月邢遷蓋半嵗矣則無志於救可知也況先書次于聶北而後書救邢乎狄既去乃以三國之大衆城一邢焉所謂顚而不扶俟其既仆而以手撫之者也伯者假仁而無惻怛之心莫顯於此先儒乃謂次聶北為按兵觀釁城邢為救患分災失春秋之旨矣秋九月戊辰夫人薑氏薨于夷齊人以歸公羊曰夷者齊地左氏曰哀薑孫於邾齊人取而殺之于夷以其尸歸僖公請而葬之張氏曰書薨于夷諱國之惡也言齊人以歸則為魯誅其罪而以喪歸可知矣髙氏曰莊公欲娶薑氏汲汲唯恐不得既不正其夫婦之始不數年間卒成大惡幾危魯國此齊侯所親見也故召之至于夷殺之而以之歸齊侯殺之雖是然不當以歸繼書齊人以歸言齊人不當取其尸歸也而夫人又不當歸之于魯如之何則可曰即其死所而葬之可也張氏曰自文薑弒桓公得逃致辟而淫縱益甚使魯國三四十年之間濁亂昏迷卒成再弒其君之禍至此慶父哀薑皆死誅不赦然後三綱稍明人倫粗正此縱罪誅惡得失之明驗也楚人伐鄭張氏曰荆至是稱楚者蓋荆乃州之名也商頌稱奮伐荆楚則楚亦其國之舊名但自武文以來雖駸駸強盛而未暇正其國之號名故以州稱及熊頵即位令尹子文得政始定改號曰楚以交於中國前此獨來聘稱人其侵敗中國皆以州舉自此始稱號稱人則浸強矣然終齊桓世雖伐小國止稱人者以桓之力猶足以制之也及桓沒而宋襄伯然後始列於會盟晏然主諸侯而春秋有以爵書者矣愚謂此本魯史之辭辭隨世變不自覺也孔子因之以見春秋世變之一端耳左氏曰楚人伐鄭鄭即齊故也義見莊十年荆敗蔡師莘老孫氏曰荆楚之俗中國道明則逃遁莫敢內向至其衰陵而中國無人也則伐其小國執其諸侯無所不至矣邦衡胡氏曰周室衰微楚人始與中國交聘而諸侯不思所以防之遂起其爭強之心是諸侯有以啓之也其後與伯主敵僭號稱王迹由此爾八月公會齊侯宋公鄭伯曹伯邾人于柳敕呈切公羊作朾杜氏曰柳宋地陳國陳縣西北有柳城張氏曰即宛邱縣也孫氏曰公有母喪出會非禮也義見隱九年會于防九月公敗邾師于偃公羊作纓杜氏曰偃邾地未詳信否康侯胡氏曰柳之會公與邾人咸與焉則是志同而謀協也今既會邾人于柳又敗邾師于偃於此責公無攘外患安中國之誠矣凡此類書其事而義自見也愚謂公居喪而用兵又一罪也義又見莊十年公敗齊師于長勺吕氏曰公方會伯主而遽敗邾師君子以齊桓之服諸侯僅矣冬十月壬午公子友帥師敗莒師于酈獲莒拏酈力知切公羊作犂榖梁作麗拏女居切大夫帥師見隱二年杜氏曰酈魯地愚謂莒拏者莒大夫也公羊曰獲者生得也左氏曰莒人來求賂公子友敗諸酈公賜季友汶陽之田及費未詳信否康侯胡氏曰罪在莒也然抑鋒止鋭諭以辭命使自知不縮而引去則善矣今至於兵刃既接擒其主將則魯亦有罪矣愚謂以大夫專兵而獲大夫王綱之壞甚矣義又見隱二年鄭伐衛存耕趙氏曰季友有立僖之功竊靖難之名遂攘魯國之權而專主其師敗莒有功季氏專制之形始兆乾侯之禍由來漸矣十有二月丁巳夫人氏之喪至自齊杜氏曰不稱薑闕文劉氏曰哀薑與乎亂殺二子幾亡國齊桓討而誅之是也且哀薑安可復配宗廟臨羣臣哉魯以臣子不得討而齊以伯主得舉法故臣子可緣伯主之命以尊宗廟伯主亦可緣天子之法以絶魯私請今齊以公義而魯以私意請之是魯之不忍也而不可通於春秋張氏曰案古者兵死者尚不入於兆况得罪於先君見誅於方伯而配宗廟秩蒸嘗乎二年春王正月城楚丘楚丘以經文推之當是魯邑趙氏曰據城緣陵言諸侯此不言諸侯魯自城耳若諸侯城之如此為文魯自城之又何如分别乎且城小榖又是其證也義見隱七年城中丘莘老孫氏曰三傳皆以為楚丘衛邑齊桓率諸侯城之然案春秋之法諸侯城之者則書諸侯如城邢城緣陵城虎牢城成周是也未有與諸侯同城而不序諸侯者楚丘之城見於傳記者皆以為衛邑衛詩定之方中序亦曰衛楚丘而詩中無之但曰楚宫楚室耳楚丘之名見於春秋者二隱之八年曰戎伐凡伯于楚丘以歸當凡伯之來聘戎遂伐之以歸經不言衛楚丘安知非魯地乎於此城之又不言諸侯城楚丘益可疑也今地理楚丘屬宋則凡伯自周聘魯無緣更過宋也此蓋可疑之事且當闕之夏五月辛巳葬我小君哀薑薑氏淫逆得罪宗廟其死也不葬於其地而以歸魯魯人受之葬之以禮又别為之諡僖公知有母而不知有宗廟矣其十一月而葬非所論也黃氏曰春秋書哀薑終之以禮如此則上文薑氏偶闕薑字而指以貶者過矣虞師晉師滅下陽下公羊榖梁作夏陸氏曰據上陽下陽俱虢邑左氏是也陸氏曰虞姬姓公爵張氏曰周大王子仲雍所封其都亦在平陸之地晉成王弟唐叔之後國都在太原府杜氏曰下陽虢邑在河東大陽縣張氏曰虢文王弟虢叔之後下陽與上陽為對下陽虢之塞邑在陜州平陸縣上陽在陜縣虢所都也愚謂邑而言滅者毁其城殺其宰其與取為已邑者異也左氏曰晉荀息請以屈産之乘與垂棘之璧假道於虞以伐虢公曰是吾寶也對曰若得道於虞猶外府也公曰宫之竒存焉對曰宫之竒之為人也懦而不能強諫且少長於君君昵之雖諫將不聽乃使荀息假道於虞曰冀為不道入自顛軨伐鄍三門冀之既病則唯君故今虢為不道保於逆旅以侵敝邑之南鄙敢請假道以請罪於虢虞公許之且請先伐虢宫之竒諫不聽遂起師夏晉里克荀息帥師會虞師伐虢滅下陽榖梁曰虞先晉何也為主乎滅下陽也下陽者虞虢之塞邑也滅下陽而虞虢舉矣愚謂晉設詭計以滅同姓虞貪寶貨而自伐其國卒喪其身故於此書虞晉滅下陽而後書晉人執虞公有以為後世鑒矣秋九月齊侯宋公江人黃人盟于貫公羊作貫澤杜氏曰江國在汝南安陽縣張氏曰即蔡州新息縣之地黃嬴姓國在汝南弋陽縣即光州定城縣也杜氏曰貫宋地梁國蒙縣西北有貰城貰與貫字相似張氏曰興仁府濟隂縣有貫城左氏曰盟于貫服江黃也義見隱二年盟戎于唐又為十二年楚滅黃起文也存耕趙氏曰楚強於江漢若徐若舒蓼皆屬之江黃介其間以弱役強聞中國有伯而危者安亡者存故不逺而來願就盟焉桓公之伯亦盛矣惜乎其為德之不終也案管仲言曰江黃近楚楚為利之國也君必歸之若伐而不能救則亂自此始公曰諾然不能從再與會盟黃恃諸侯之好曰自郢及我九百里焉能害我齊終莫之救卒滅於楚亦可傷也齊亦病矣冬十月此一時無事書首月也不雨十月十一月十二月皆旱也愚案此書冬十月及次年春王正月夏四月自是一時無事書首月耳與下文三不雨不相干三不雨亦與上文書首月不相蒙公榖誤聨讀之又以文公時不雨凡例求之遂有勤雨閔雨之説先儒因之又為冬十月不雨則十一十二月有雨春正月夏四月不雨則二三五月有雨之説獨左氏謂自十月至於五月者得之蓋冬一時不雨春一時不雨夏則至於六月始得雨耳經旨本明讀之者誤也辨見或問楚人侵鄭義見莊十年荆敗蔡師三年春王正月此亦一時無事書首月也不雨正月二月三月皆旱也夏四月此亦一時無事書首月也不雨四月五月皆旱也左氏曰自十月不雨至於五月髙氏曰萬物須雨以生須雨以成一時亢旱猶有所損况不雨幾於彌年則其災可知愚謂人物不得其所則害隂陽之和而雨澤不降八月不雨則榖種不入土飢饉可知矣聖人畏天災憂民事莫甚於此故書之為後世有民土者之大戒也戒之者何敬吾身務民義以正天地之氣耳義又見莊三十一年徐人取舒杜氏曰徐國在下邳僮縣東南舒國廬江舒縣張氏曰即廬州舒城縣孫氏曰舒蓋羣舒舒庸舒蓼舒鳩之類趙氏曰凡得國而不書滅者不絶其祀也愚謂先王建國而諸侯取之罪不容誅矣但比之滅國為少間耳徐與舒非列國也明王慎德四夷咸賔彼皆各安其土不敢攻伐周德既衰諸侯侵伐然後其屬自相吞噬以肆馮凌矣春秋書之以為有天下者不可不慎德也豈徒紀徐舒之相並哉後倣此張氏曰齊桓方伯而不能戢諸侯之吞並小國亦降鄣遷陽等事有以教之無以令之也六月雨自去年十月不雨至此月始雨紀實事以見旱之久髙氏謂此記不雨之終者是也夫春耕夏耘而六月始雨則農不及事而民以困窮以至草木鳥獸咸不若其性矣康侯胡氏曰觀此義則春秋有懼天災恤民隱之意遇天災而不懼視民隱而不恤自樂其樂而不與民同也國之亡無日矣秋齊侯宋公江人黃人會于陽穀杜氏曰陽穀齊地在東平須昌縣北張氏曰即東平府須城縣北隋置陽穀縣愚謂書齊宋江黃盟于貫又書會于陽穀見齊桓伯業之成雖江黃為楚與國猶服從於齊也江黃服則楚可伐而有攘夷狄之功矣然他日楚滅黃而齊不見救則此盟此會不足恃也假仁者無誠心勤於前而怠於後類此義又見隱二年會戎于潛冬公子友如齊涖盟穀梁友上有季字涖音利公羊穀梁並作蒞孔氏曰涖臨也公羊曰涖盟者往盟乎彼也木訥趙氏曰聽伐楚之期也義見隱元年盟于蔑此又見友之專政也楚人伐鄭左氏曰楚人伐鄭鄭伯欲成孔叔不可曰齊方勤我棄德不祥義見莊十年荆敗蔡師四年春王正月公會齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘音刑潰者散也衆散流移若水之潰遂者繼事之辭杜氏曰陘楚地潁川召陵縣南有陘亭張氏曰即潁昌府郾城縣孫氏曰蔡楚與國故先侵蔡俟其兵震威行然後大舉蔡既潰遂次于敵境左氏曰楚子使與師言曰君處北海寡人處南海唯是風馬牛不相及也不虞君之涉吾地也何故管仲對曰昔召康公命我先君大公曰五侯九伯女實征之以夾輔周室賜我先君履東至於海西至於河南至於穆陵北至於無棣爾貢包茅不入王祭不共無以縮酒寡人是徴昭王南征而不復寡人是問對曰貢之不入寡君之罪也敢不供給昭王之不復君其問諸水濵師進次于陘張氏曰楚自魯桓二年蔡鄭會鄧已懼其為中國患大積五十年富強吞並之力今比年伐鄭氣陵中國所幸齊自桓公入國舉管仲以治民訓兵至此方能率諸侯之師正其罪而討之使其君臣震恐遣使如師可謂有功於中國矣然桓公本無湯武之學而管仲復未嘗有聞於君臣之大義故揆之天吏討罪之法則不奉天子之命未敢正其僭王之罪僅致屈完來師請服受盟不純屈服時出干紀滅弦救鄭故曽西得以鄙其功烈之卑愚案孔子曰桓公九合諸侯一匡天下民到于今受其賜微管仲吾其被髮左衽矣又曰管仲之器小哉孟子曰天子討而不伐諸侯伐而不討五霸者摟諸侯以伐諸侯者也三王之罪人也又曰以力假仁者霸孔孟論伯者之事即春秋所書之旨而邵子所謂五伯功之首罪之魁功過不相掩者備矣康侯胡氏曰桓公伐楚而楚人服罪孟氏何以獨言春秋無義戰也譬諸殺人者或曰人可殺歟曰可孰可以殺之曰為士師者則可以殺之矣國可伐歟曰可孰可以伐之曰為天吏則可以伐之矣楚雖暴橫憑陵上國齊不請命擅合諸侯豈所謂為天吏以伐之乎春秋以義正名則君臣之分嚴矣夏許男新臣卒新公羊作辛髙氏曰卒者卒於其國也蓋陘地近許許師雖已次於陘許男遇疾而歸矣義見隱三年宋公卒楚屈完來盟于師盟于召陵張氏曰屈完者楚大夫之名氏也杜氏曰召陵潁川縣也張氏曰在郾城縣漢之潁川郡召陵縣也愚謂不稱使者未前定也蓋完既來而求盟于師桓公則退軍于召陵而與之盟也與齊髙子來盟同意左氏曰夏楚子使屈完如師師退次于召陵齊侯陳諸侯之師與屈完乘而觀之齊侯曰豈不穀是為先君之好是繼與不穀同好如何對曰君惠徼福於敝邑之社稷辱收寡君寡君之願也齊侯曰以此衆戰誰能禦之以此攻城何城不克對曰君若以德綏諸侯誰敢不服君若以力楚國方城以為城漢水以為池雖衆無所用之屈完及諸侯盟存耕趙氏曰齊桓之於楚服之而已次陘壓境楚勢頓沮屈完來請盟桓公於是退召陵與之盟義見前伐楚愚謂盟者亂世之事况以中國諸侯之尊而下盟芋氏之大夫非禮之正也使有王者興必將正其疆土復其滅國一就吾區晝品制然後已非但草蕞補其罅漏而足也而後世以此為甚盛之舉則誠齊人而已然則孔子奚取焉曰彼善於此也周不能王列國吞齧楚人內侵向無齊桓將遂主盟中夏矣聖人之心寬宏惻怛與人為善取其所能而惜其未至故録其伐楚之事付後世公論然貴王賤伯尊內賊外之意昭然於筆削之間矣齊人執陳袁濤塗袁左氏作轅案釋文左氏亦作袁云本亦作轅杜氏曰袁濤塗陳大夫袁氏也左氏曰陳袁濤塗謂鄭申侯曰師出於陳鄭之間國必甚病若出於東方觀兵於東夷循海而歸其可也申侯曰善濤塗以告齊侯許之申侯見曰師老矣若出於東方而遇敵懼不可用也若出於陳鄭之間供其資糧屝屨其可也齊侯説與之虎牢執袁濤塗髙氏曰楚方受盟而退遽執同會之大夫齊侯之志驕矣是知齊侯之不可為周公而為三王之罪人也義又見莊十七年齊執鄭詹公羊曰古者周公東征則西國怨西征則東國怨桓公假塗於陳而伐楚則陳人不欲其反由己者師不正故也不修其師而執濤塗古人之討則不然也董子曰齊桓合諸侯其後矜功自足而不修德故楚人滅弦而志弗憂損人之國而執其大夫功未良成而志以溢矣故曰管仲之器小哉自是日衰九國叛矣秋及江人黃人伐陳髙氏曰非魯及之蒙上齊人執袁濤塗之文也杜氏曰魯受齊命討陳之罪未詳孰是髙氏曰陳侯方與諸侯同侵蔡同伐楚又同盟而齊侯遽執其大夫又率二國伐之不義莫大焉義又見隱二年鄭伐衛八月公至自伐楚張氏曰師出三時見久役之勞也義又見桓二年公至自唐愚案此亦可見諸侯已歸而齊復帥其師以侵陳勞民黷武之甚也葬許穆公穆公羊作繆義見隱三年葬宋穆公冬十有二月公孫兹帥師會齊人宋人衛人鄭人許人曹人侵陳兹公羊作慈公孫慈叔牙之子叔孫載伯也左氏曰叔孫戴伯帥師會諸侯之師侵陳陳成歸袁濤塗君舉陳氏曰公孫兹帥師見三家之專也邦衡胡氏曰濤塗誤軍則罪止濤塗耳何至伐其國哉豈有罪一臣而諸國合攻之也齊桓怒執其臣又伐之侵之甚矣義又見莊十年公侵宋康侯胡氏曰揚子作法言或問為政有幾曰思斁昔在周公征於東方四國是皇其思矣夫齊桓徑陳陳不果納執袁濤塗其斁矣夫桓公識明而量淺管仲器不足而才有餘方楚人未帖而齊以為憂也致勤於鄭振中夏之威會于陽穀惇逺國之信按兵于陘修文告之辭退舍召陵結會盟之禮何其念之深禮之謹也楚方受盟志已驕溢陳大夫一謀不協其身見執其國見伐見侵桓德於是乎衰矣五年春晉侯殺其世子申生左氏曰晉獻公娶于賈無子蒸於齊薑生秦穆夫人及太子申生又娶二女於戎大戎狐姬生重耳小戎子生夷吾晉伐驪戎驪戎男女以驪姬歸生奚齊其娣生卓子驪姬嬖欲立其子賂外嬖梁五與東關嬖五使言於公曰曲沃君之宗也蒲與二屈君之疆也不可以無主若使太子主曲沃而重耳夷吾主蒲與屈則可以威民而懼戎晉侯悅之夏使太子居曲沃重耳居蒲城夷吾居屈羣公子皆鄙唯二姬之子在絳二五卒與驪姬譖羣公子而立奚齊晉作二軍公將上軍太子申生將下軍以滅耿滅霍滅魏還為太子城曲沃士蒍曰太子不得立矣分之都城而位以卿先為之極又焉得立不如逃之無使罪至為吳太伯不亦可乎晉侯使太子申生伐東山臯落氏里克諌曰太子奉冢祀社稷之粢盛以朝夕視君膳者也故曰冢子君行則守有守則從從曰撫軍守曰監國古之制也夫帥師專行謀誓軍旅君與國政之所圖也非大子之事也師在制命而已稟命則不威專命則不孝故君之嗣適不可以帥師君失其官帥師不威將焉用之且臣聞臯落氏將戰君其舍之公曰寡人有子未知其誰立焉不對而退太子帥師公衣之偏衣佩之金玦狐突歎曰時事之徴也雖欲勉之狄可盡乎梁餘子養曰死而不孝不如逃之罕夷曰君有心矣狐突欲行羊舌大夫曰不可違命不孝棄事不忠子其死之太子將戰狐突諫曰不可昔辛伯諗周桓公云內寵並后外寵二政嬖子配適大都耦國亂之本也周公弗從故及於難今亂本成矣立可必乎孝而安民子其圖之與其危身以速罪也初晉獻公欲以驪姬為夫人卜人不可弗聽立之生奚齊其娣生卓子及將立奚齊既與中大夫成謀姬謂太子曰吾夢齊薑必速祭之太子祭於曲沃歸胙於公公田姬置諸宫六日公至毒而獻之公祭之地地墳與犬犬斃與小臣小臣亦斃姬泣曰賊由太子大子奔新城事又見國語公殺其傅杜原款或謂大子子辭君必辨焉太子曰君非姬氏居不安食不飽我辭姬必有罪君老矣吾又不樂曰子其行乎大子曰君實不察其罪被此名也以出人誰納我十二月戊申縊於新城姬遂譖二公子曰皆知之重耳奔蒲夷吾奔屈晉侯使以殺大子申生之故來告陸氏曰申生雖有愛父之心而乃陷父於不義俾讒人得志國以亂離古人云小仁大仁之賊也愚謂晉獻雖不操刃以殺申生然置之必死之地而不暇辨讒言之曲直非晉侯殺之而誰哉首惡之名不得辭矣此亦魯史之直筆而聖人録之以示教者也莘老孫氏曰申生之事見於傳記備矣晉侯之惡見矣然人子之道至於見殺則不為孝矣舜之事瞽瞍瞽瞍亦允若而卒免於禍申生之於獻公也獻公聽讒申生死之春秋舉重者言之斥言晉侯而申生未免有罪也朴鄉吕氏曰董子曰有國者不可以不知春秋前有讒而不見後有賊而不知為人臣者不可以不通春秋守經事而不知其宜遭變事而不知其權若獻公者其諸所謂前有讒而不見此所以蒙首惡之名若申生者其諸所謂遭變事而不知其權此所以陷父於不義康侯胡氏曰春秋端本澄源之書也尸此者其誰乎春秋書之使後世有欲紊妃妾之名亂適庶之位縱人欲滅天理以敗其家國者知所戒焉以此防民猶有以堯母名門使姦臣探逆其意有危皇太子之心以成巫蠱之禍者杞伯姬來朝其子伯姬僖公姑即莊二十五年歸杞者在莊公時已不得歸况僖公時乎張氏曰其子蓋年十餘嵗杞伯在而使其子隨母以來也榖梁曰諸侯相見曰朝伯姬為志乎朝其子則是杞伯失夫之道矣以待人父之道待人之子非正也故曰杞伯姬來朝其子參譏也愚案伯姬之子乃杞侯之冢嗣雖不行朝禮亦不當使之隨母以來杞侯之為家國可知矣夏公孫兹如牟牟見桓十五年凡魯聘他國皆言如此譏私相聘與三桓之用事耳義又見隱七年齊來聘公及齊侯宋公陳侯衛侯鄭伯許男曹伯會王世子于首止秋八月諸侯盟于首止止公羊榖梁作戴杜氏曰王世子惠王太子鄭也首止衛地陳留襄邑縣東南有首鄉張氏曰襄邑屬拱州公羊曰曷為殊會王世子世子貴也愚謂齊桓致世子于首止而諸侯往會之故説者因謂之殊會其書法蓋與會吳於善道之類同而非有他義也諸侯何以不序一事而再見者前目後凡也穀梁曰中無事而復舉諸侯何也尊王世子而不敢與盟也左氏曰會王太子鄭謀寧周也張氏曰初惠王娶陳媯為后生子鄭及叔帶愛叔帶欲立之齊桓以其廢長立幼將啓亂階遂率諸侯會王世子于首止示天下戴之以為天王之二揚氏曰惠王溺嬖寵諸侯苟欲正之貢以諫辭可也針於朝覲可也合衆國為會盟以正之則是以力制天子也於君臣之大義不亦戾哉愚謂惠王廢長立幼其惡可知然齊桓未嘗朝王而納諫亦未見王之拒諫也輒召諸侯會王世子又盟諸侯示天子以意是要君也世子儼然出會是制父也夫齊桓之意善矣一旦定國本絶亂階齊桓之功也惜其參之以權謀術數也至於制父要君則其罪大矣夫春秋正義不謀利明道不計功故蘇氏曰首止之會非王志也帥諸侯以定世子為義也然而諸侯不以王命而會世子世子不以父命而出會諸侯衰世之事也義又見隱元年盟于蔑鄭伯逃歸不盟左氏曰秋諸侯盟王使周公召鄭伯曰吾撫女以從楚輔之以晉可以少安鄭伯喜於王命而懼其不朝於齊也故逃歸不盟孔叔止之曰國君不可以輕輕則失親失親患必至病而乞盟所喪多矣君必悔之弗聽逃其師而歸獻可杜氏曰齊桓合諸侯以謀寧周室德雖不全亦有翼戴之名鄭伯與會而逃盟春秋書之著其為諸侯而行匹夫之行也愚謂齊桓之舉迹近尊王義實大悖鄭伯誠能明諭臣不要君子不制父之大義不會不盟縱未必齊桓之頓服然天下後世必有是鄭伯之言者矣今既會而逃之而其所以逃者非此之謂斯害義矣常山劉氏曰鄭伯逃盟故六年啓諸侯之伐致新城之圍七年有寧母之會不敢與盟而使世子聽命九年王人齊侯等盟于洮而鄭伯乞盟噫以諸侯之尊而始於逃歸終於乞盟甚乎鄭伯之罪也楚人滅弦弦子奔黃杜氏曰弦國在弋陽軑縣東南任氏曰地譜光州光山縣故弦國愚謂弦子不名史有不詳或闕文也左氏曰楚鬭穀於菟滅弦弦子奔黃於是江黃道柏方睦於齊皆弦姻也弦子恃之而不事楚又不設備故亡義見三年徐取舒此則滅國甚矣張氏曰桓公於此時率諸侯以討楚復弦豈不足以立中國之威而制楚之橫與不能救弦以啓救鄭圍許之紛紛楚之滅黃亦自此始矣愚案楚受盟一年復滅小國禍尤熾焉雖楚人暴橫亦齊桓有以致之也蓋伯者之術非已有之而求人以力故人不心服而其效施於力之所及桓非命伯摟諸侯以侵伐諸侯降鄣遷陽滅談與遂伐山戎而獻捷執大夫而伐陳首止之會力制天子鄭伯逃盟衛侯背約中國服從類可知矣舍近狄事逺戎而狄入衛救邢不力而邢遷其自為者如此諸侯歸順類可知矣宜其楚不心服而復窺中國也書曰東征西夷怨南征北狄怨又曰大邦畏其力小邦懷其德天下曷敢有越厥志方之王道何翅碔砆美玉哉書屈完受盟於前書楚滅弦圍許滅黃於後貴王賤伯鑒戒昭矣九月戊申朔日有食之義見隱三年冬晉人執虞公左氏曰晉侯復假道於虞以伐虢宫之竒諫曰虢虞之表也虢亡虞必從之晉不可啓冦不可玩一之謂甚其可再乎諺所謂輔車相依脣亡齒寒者其虞虢之謂也公曰晉吾宗也豈害我哉對曰太伯虞仲太王之昭也太伯不從是以不嗣虢仲虢叔王季之穆也為文王卿士勳在王室藏於盟府將虢是滅何愛於虞且虞能親於桓莊乎桓莊之族何罪而以為戮不唯逼乎親以寵逼猶尚害之况以國乎公曰吾享祀豐潔神必據我對曰臣聞之鬼神非人實親惟德是依故周書曰皇天無親惟德是輔又曰黍稷非馨明德惟馨又曰民不易物惟德繄物如是則非德民不和神不享矣神所憑依將在德矣若晉取虞而明德以薦馨香神其吐之乎弗聽許晉使宫之竒以其族行曰虞不臘矣在此行也晉不更舉矣八月甲午晉侯圍上陽冬十二月丙子朔晉滅虢虢公醜奔京師師還館於虞遂襲虞執虞公康侯胡氏曰書滅下陽於始而記執虞公於後可以見棄義趨利瀆貨無厭之能亡國敗家審矣愚謂諸侯天子所封又晉虞同姓虞固愚也然晉獻詭計執之惡不可掩矣劉氏曰春秋之紀事原始見終不失其實者也虞之滅自下陽始下陽滅則虞亡矣宫之竒舟之僑皆知之獨其君不知春秋書之使天下之為人君者從而省之可以戒於此矣故曰家有既亡國有既滅由别之不别也可不大哀乎人君莫不惡亡而好存莫能固亡而保存者是何也嗜欲之習近而憂患之未逺也凡書執諸侯者十有四六年春王正月夏公會齊侯宋公陳侯衛侯曹伯伐鄭圍新城杜氏曰新城鄭新密即滎陽密縣張氏曰屬鄭州左氏曰諸侯伐鄭以其逃首止之盟故也髙氏曰鄭伯逃歸不盟遂與楚通是啓諸侯之伐也義又見隱二年鄭伐衛秋楚人圍許諸侯遂救許葉氏曰圍鄭之諸侯不序一事再見也左氏曰楚子圍許以救鄭諸侯救許乃還愚謂春秋書此一以見中國衰而楚人橫二以見齊桓不能服楚之心三以見鄭伯背齊即楚以致此伐四以見猶幸齊桓之有此舉也圍許義又見莊十年荆敗蔡師救許義又見莊二十八年救鄭冬公至自伐鄭存耕趙氏曰兵以夏出以冬反歷三時以伐鄭出故以伐鄭至也義又見桓二年公至自唐邦衡胡氏曰不致故許而致伐鄭者伐鄭本志也救許遂事也髙氏曰救許因伐鄭也七年春齊人伐鄭左氏曰齊人伐鄭孔叔言於鄭伯曰諺有之曰心則不競何憚於病既不能強又不能弱所以斃也國危矣請下齊以救國公曰吾知其所由來矣姑少待我對曰朝不謀夕何以待君愚謂諸侯以救許而解鄭圍不得志於鄭故齊復伐之也夫齊桓以力服人未盡善也鄭伯背齊即楚亦冥頑不識所趨哉義又見隱二年鄭伐衛夏小邾子來朝小邾見莊五年倪黎來杜氏曰邾之别封故曰小邾未詳是否義見隱十一年滕薛來朝鄭殺其大夫申侯左氏曰初申侯申出也有寵於楚文王文王將死與之璧使行曰唯我知女女專利而不厭豫取豫求不女疵瑕也後之人將求多於女女必不免我死女必速行無適小國將不女容焉既葬出奔鄭又有寵於厲公子文聞其死也曰古人有言曰知臣莫若君弗可改也已未詳信否義見莊二十六年曹殺大夫秋七月公會齊侯宋公陳世子款鄭世子華盟于寧母寧穀梁作寧杜氏曰髙平方與縣東泥母亭音寧張氏曰魯地孫氏曰齊人伐鄭鄭伯懼欲求成於齊故先使世子華受盟于寧母也左氏曰盟于寧母謀鄭故也管仲言於齊侯曰臣聞之招携以禮懷逺以德德禮不易無人不懷齊侯修禮於諸侯諸侯官受方物未詳信否義見隱元年盟于蔑曹伯班卒班公羊作般義見隱三年宋公卒公子友如齊義見隱七年齊來聘木訥趙氏曰僖三年公子友如齊聽伐楚之期而蒞盟焉其後凡三年公不朝則季友聘終齊桓之世不怠也惟六年伐鄭自春徂冬不暇朝聘故七年公子友如齊自是十年公如齊十三年公子友如齊十五年公如齊十六年公子友卒十七年而齊桓即世當齊之伯公與公子友同心事齊三年一聘之節未嘗廢黃氏曰事伯主而不事王公與大夫更迭如齊皆春秋之習而魯不能自拔也冬葬曹昭公義見隱三年葬宋穆公八年春王正月公會王人齊侯宋公衛侯許男曹伯陳世子款盟于洮公羊陳世子款下有鄭世子華四字王人見莊六年公羊曰王人者何微者也曷為序乎諸侯之上先王命也杜氏曰洮曹地案莊二十七年杜氏以為魯地未詳啖氏曰王人與盟非禮也莘老孫氏曰春秋伯者多假王命以令諸侯名尊天子而實行其私齊桓是時致天王之命以會盟中國故王人而盟諸侯則王道之衰諸侯而盟王人則諸侯之伉盟者不信而後為之也義又見隱元年盟于蔑獻可杜氏曰案周禮邦國有疑諸侯會盟則為壇以盟之是諸侯從天子而受盟也末世列國專盟春秋譏之今不即會於周而盟于洮以見天子之弱就盟諸侯於下國也鄭伯乞盟趙氏曰乞者卑重之辭左氏曰請服也莘老孫氏曰鄭伯逃天下之盟主而附強暴之夷狄寧母之會雖嘗遣其世子又恐懼不安親來乞盟愚謂鄭伯以諸侯之尊始於逃終於乞自取悔辱故君子作事謀始垂戒逺矣夏狄伐晉義見隱七年戎伐凡伯存耕趙氏曰晉與狄鄰故有疆埸之警啓土以居羣公子又為采桑之役內釁頻仍狄安得不肆乎國必自伐而後人伐之晉之謂也秋七月禘于太廟用致夫人用者以也致者至自齊也趙氏曰夫人者時君之妻聲薑也因其至特設禘禮以為榮觀愚謂不言薑氏者義在禘以致夫人而不在姓氏又罪在僖公而不在聲薑又夫人之下書薑氏則不成文故省文耳夫人至而告廟魯有常禮魯以諸侯而僭天子之禘已失禮矣又以夫人之至而禘于太廟是失禮之中又失禮也冬十有二月丁未天王崩天王惠王也一見諸侯遇王喪而致宰周公以嘉禮盟於葵邱二見僖公不服喪而朝齊三見齊侯許男伐北戎義又見隱三年春秋本義卷十
