body:
  text: 春秋本義卷八元程端學撰莊公二十有二年春王正月肆大眚公羊作省趙氏曰肆放也眚過也孫氏曰肆大眚罪惡無不赦之辭也康侯胡氏曰舜典曰眚災肆赦易曰君子以赦過宥罪周官司刺掌赦宥之法一宥曰不識再宥曰過失三宥曰遺忘一赦曰孤弱再赦曰老耄三赦曰憃愚未聞肆大眚也大眚皆肆則廢天討虧國典縱有罪虐無辜惡人幸以免矣後有姑息為政數行恩宥惠姦宄賊良民而其斃益滋蓋流於此故諸葛孔明曰治世以大德不可以小惠其為政於蜀軍旅數興而赦不妄下蜀人久而歌思猶周人之思召公也斯得春秋之㫖矣胡氏曰眚災肆赦天子之制也罪無大小俱赦諸侯不得行莊公肆大眚亂法易常愚謂肆大眚天子猶不可況諸侯乎莘老孫氏曰莊公一切放縱姦惡有意於文姜之葬也莊公以文姜嘗得罪於魯而播於齊大惡無道魯人切齒之深者莊公欲備禮葬之乃先赦國中以悅人心然後舉葬故正月肆大眚而癸丑葬文姜愚案此意或有之比事可見然未可以此為本義也癸丑葬我小君文姜公羊曰文姜莊公之母也愚謂姜氏弒逆淫亂得罪宗廟國人所當誅也而得成禮而葬魯之典禮廢矣其不從夫諡與七月而葬乃其細事不暇論也陳人殺其公子禦寇禦左氏作御孫氏曰公子世子母弟也春秋之義非天子不得專殺此譏專殺也是故二百四十二年無天王殺大夫而書諸侯殺大夫者四十七古者諸侯之大夫皆命於天子諸侯不得專也大夫有罪則請於天子諸侯不得專殺也大夫猶不得專殺況世子母弟乎無王甚矣義又見後二十六年曹殺大夫康侯胡氏曰陳亂無政衆人擅殺之也莘老孫氏曰御寇以公子之貴而見殺於國人御寇有罪矣陳之君使公子而見殺焉亦未免乎有罪也愚案後二說從人字上取義未詳是否夏五月孫氏曰春秋未有以夏五月首時者此言五月蓋五月之下文有脫事爾髙氏曰非五月之下脫簡則是誤以四月為五月爾秋七月丙申及齊髙傒盟于防及之者內之微者也髙傒齊大夫也木訥趙氏曰謀婚也父讎不報母喪未除而求婚於齊非孝也義又見隱元年盟于蔑冬公如齊納幣孫氏曰案桓六年子同生公十四年即位二十四年如齊逆女三十有七嵗矣不得以時而婚故母喪未終如齊納幣圖婚之速也莘老孫氏曰婚禮有六惟親迎則諸侯自迎於境其他五禮皆使大夫莊公父弒於齊有不同戴天之讎文姜之死在去年七月至是之冬莊公猶在三年之喪也納幣大夫之事也而公親焉忘君父之讎娶讎人之子又在三年之喪而行大夫之職書公如齊納幣所以見公無恩於母不孝於父無廉恥而納幣一舉事而大惡者三也邦衡胡氏曰諸侯非朝王述職而擅越境以納幣無王甚矣不止其喪婚娶讎也二十有三年春公至自齊存耕趙氏曰莊公踰年而後反居喪告朔之禮俱廢焉張氏曰莊公忘父讎而娶其女冒母喪而往納幣以此告廟以為有人心者宜於此焉變矣此與他日書至不可同日語也比事屬辭示人之意顯矣義又見桓二年公至自唐祭叔來聘朴鄉吕氏曰祭采地叔字也劉氏曰曷為邑而字天子之下大夫也存耕趙氏曰祭有祭公祭伯祭叔意者叔其弟也猶蔡季許叔之類伯其爵也公其官也未詳是否戴氏曰親來聘魯祭叔之私交也非有王命故不稱使大意同隱元年祭伯來此則聘耳夏公如齊觀社朱子曰社者土神左氏曰公如齊觀社非禮也曹劌諫曰不可夫禮所以整民也故會以訓上下之則制財用之節朝以正班爵之義帥長幼之序征伐以討其不然諸侯有王王有巡守以大習之非是君不舉矣君舉必書書而不法後嗣何觀愚謂諸侯非王事不出境且諸侯各有其社舍所事而觀他國之社巳非禮矣况齊為讎國又有新婚之嫌於此見莊公之棄國政無君父壞禮法忘廉恥縱遊觀罪具見矣張氏曰社者古人祀地之名古制惟社事單出里惟為社田國人畢作東遷而後王制漸變祀事不存古意浸為美觀襄公二十四年齊社搜軍實使客觀之其廢祀典而夸愚俗兆於今矣外傳曹劌曰齊棄太公之法觀民於社君為是舉而往觀之非故業也天子祀上帝諸侯會之受命焉諸侯祀先公卿大夫佐之受命焉不聞諸侯之相會祀也愚案左氏魯語載曹劌一時之言不同而俱有義故附見焉獨觀民於社一語未詳是否公至自齊莊公非王事出境舍父讎忘亷恥事遊觀其何以告廟乎義又見桓二年公至自唐荆人來聘陸氏曰非列侯來聘稱人君臣同辭啖氏曰言荆來聘則似舉州皆來故加人字無他義髙氏曰是時楚頵方弒其君而自立中國不能治而反敢來聘凡受聘必於宗廟之中敬之重之也彼南蠻僣逆之人來聘中國中國當以禮義外之詩謂戎狄是膺荆舒是懲周公方且膺之後世子孫乃受其聘於宗廟之中此中國衰微無禮義之甚也獻可杜氏曰書云四夷來王周禮象胥掌其國使亦謂其來王也荆南蠻也亟病中國來聘魯而録之者懲其非來王來貢以荆蠻而行中國之禮魯亦不當受其聘也張氏曰楚自四五年來先加兵於蔡鄭而以聘至魯巳用逺交近攻之術聖人於此書其來聘中庸曰送往迎來嘉善而矜不能此三代柔逺人之道也然於此時以魯而受楚之聘非有德以懷來之彼以禮幣至亦當審所以待之之術如班彪述漢宣戒邊吏之言以為待遇得其情則却敵折衝應對入其數則反為輕欺觀春秋書荆人來聘亦可見矣公及齊侯遇于榖蕭叔朝公穀見七年杜氏曰蕭附庸國張氏曰徐州蕭縣朴鄉吕氏曰叔字也公羊曰其言朝公何於外也髙氏曰婚嫁猶未定故往見齊侯于榖此見公不恤國家之事唯婚姻之務公在穀遇齊侯巳無人君相見之禮蕭叔又從而朝之失其所矣遇又見隱四年遇于清朝又見隱十一年滕薛來朝康侯胡氏曰為禮必當其物與其所而後可以言禮大夫宗婦覿而用幣則非其物也蕭叔朝公于齊之榖則非其所也嘉禮不野合而朝公于外是委之於野矣故野非其所君子有不受必反之於正而後止此亦春秋撥亂之意也秋丹桓宫楹杜氏曰桓宫桓公廟也楹柱也存耕趙氏曰丹楹施丹雘也左氏曰丹桓宫之楹二十四年刻其桷皆非禮也御孫諫曰臣聞之儉德之共也侈惡之大也先君有共德而君納諸大惡無乃不可乎榖梁曰禮天子諸侯黝堊大夫倉士黈丹楹非禮也髙氏曰莊公不能為桓復讎而反娶其女以奉祭祀故丹楹刻桷以示孝甚矣莊公之行詐也夫宗廟之飾國有彝典而妄肆奢麗加於襧宫亂王制瀆先君不恭莫大焉聖人直書其事具文見意冬十有一月曹伯射姑卒義見隱三年宋公卒十有二月甲寅公會齊侯盟于扈杜氏曰扈鄭地在滎陽卷縣西北孫氏曰謀逆姜氏也公二年之中納幣觀社及齊侯遇于榖今又盟于扈甚矣義又見隱元年盟于蔑葉氏曰小白巳伯矣公復為離盟則非諸侯之政也以圖婚於我而固其好焉爾前髙傒為防之盟而後公如齊納幣今齊侯為扈之盟而後公如齊逆女康侯胡氏曰程子曰遇于榖盟于扈皆為要結姻好也傳稱男子二十而冠冠而列丈夫三十而不娶則非禮矣然天子諸侯十五而冠者以娶必先冠而國不可久無儲二欲人君早有繼體故因以為節也鰥者老而無妻之稱舜方三十未娶而師錫帝堯巳曰有鰥在下矣妻帝之二女則不告於父母以為告則不得娶而廢人之大倫堯亦不告而妻焉其欲及時而無過如此也今莊公生於桓公之六年至是三十有六載矣以世適之正諸侯之貴尚無內主同任社稷之事故莊公越禮不顧如此其急娶夫人奉祭祀為宗廟之主而不以大義裁之至於失時不孝甚矣春秋詳書於策為後戒也二十有四年春王三月刻桓宫桷杜氏曰刻鏤也桷椽也榖梁曰禮天子之桷斫之礱之加密石焉諸侯之桷斫之礱之大夫斫之士斫本刻桷非正也夫人所以崇宗廟也取非禮與非正而加之宗廟以飾夫人非正也康侯胡氏曰自常情觀之丹楹刻桷疑若小失而春秋詳書於策何也桓公見殺于齊則不能復而盛飾其宫夸示仇人之女廢人倫悖天道而不知正春秋謹禮於微正後世人主心術者也故詳書於策為後鑒也葉氏曰商人戒肜日曰典祀無豐于昵昵近也夫祀且不可豐而況宗廟之飾乎葬曹莊公義見隱三年葬宋穆公夏公如齊逆女秋公至自齊莘老孫氏曰其父見弒於齊而子婚讎女是無恩於父而盡禮於仇讎也公既親迎於齊當與夫人偕至夫人未至而莊公先還告至於廟春秋志其告廟之實且罪其先夫人而至也義又見桓二年公至自唐張氏曰諸侯無越境逆女之禮然則莊公無父之讎猶不可以親至齊廷也况躬君弒於齊而舍宗廟之守往受其女於廟乎昔晉王裒讀蓼莪之詩而哀痛終其身莊公思妃偶之合兩年之閒三至齊廷而念不及於其父春秋所以詳書而誅其心也愚案親迎之禮見隱二年紀履緰逆女此又見莊公三十七年而始娶其書公至自齊又為姜氏入起也君舉陳氏曰春秋之書夫人未有詳於此者也八月丁丑夫人姜氏入夫人哀姜也不曰至自齊而曰入者以莊公先至夫人後入故不復言至自齊也孫氏曰公親迎於齊不俟夫人而至失夫之道也婦人從夫者也夫人不從公而入失婦之道也夫不夫婦不婦非所以奉先公而紹後嗣也不亂何待康侯胡氏曰昏義以正始為先而公不與夫人皆至姜氏不從公而入巳失夫婦之正弒閔孫邾之亂兆矣莊公越禮踰時娶仇人之女薦舍於宗廟以成好合卒使宗嗣不立弒逆相仍幾至亡國故春秋詳書其事以著莊公不孝之罪為後戒也愚案先書公至自齊後書八月丁丑夫人姜氏入則公不俟夫人夫人不從公昭然可見春秋屬辭比事類多如此戊寅大夫宗婦覿用幣胡氏曰大夫宗婦者同宗大夫之婦非謂大夫與宗婦也覿者見夫人也左氏曰哀姜至公使宗婦覿用幣非禮也御孫曰男贄大者玉帛小者禽鳥以章物也女贄不過榛栗棗修以告䖍也今男女同贄是無别也男女之别國之大節也而由夫人亂之無乃不可乎戴氏曰莊公至是年三十七嵗矣求婚於齊如恐失之親如齊納幣再嵗而後逆親如齊逆女既歸而後入又使大夫之妻執幣以覿違越禮制以為媚恱無所不至甚矣莊公之庸繆也向也桓公娶於齊致文姜之淫亂桓公不免其身今也莊公娶於齊致哀姜之逆亂魯又幾亡其國春秋備書於冊辭煩而不殺為萬世永戒也大水義見桓元年戴氏曰莊公即位三十年書大水者三於羣公為最甚冬戎侵曹曹羈出奔陳赤歸于曹羈公羊作羈存耕趙氏曰此徐州之戎也趙氏曰羈非嫡也康侯胡氏曰赤者曹之庶子愚案踰年之君稱爵今羈不稱爵未詳蓋戎侵曹曹羈懼而出奔故赤歸而自立耳春秋書此見外域內侵而諸侯不能自存庶孽自立而不復請命於天子也然與鄭突之事有間矣王氏曰宋執祭仲立突而逐忽故先書突而後言忽明鄭有君突篡之也今後言赤而先書羈明曹無君赤乃國人所逆耳愚案逆與不逆未可知今以經文觀之王氏先後之說庶矣郭公杜氏曰經闕誤也莘老孫氏曰郭公之事三傳皆無義說公榖為曹赤理又不通案管子載郭亡之事以謂齊桓過郭問父老郭何以亡父老曰善善而惡惡也桓公曰善善而惡惡何至亡父老曰善善而不能用惡惡而不能去郭之所以亡也莊二十四年齊桓巳伯而管夷吾用事但見郭父老而問之不知在何時爾然則郭之事跡亦嘗見於傳記也春秋書梁亡言梁之自亡也管子載郭亡之跡蓋亦曰郭自亡爾公與亡字相近疑經書郭公為郭亡也然疑誤之事聖人闕之二十有五年春陳侯使女叔來聘杜氏曰女氏叔字榖梁曰其不名何也天子之命大夫也劉氏曰名也前說近是左氏曰始結陳好也義見七年齊來聘夏五月癸丑衛侯朔卒存耕趙氏曰朔拒王命而君衛竟以衛君卒春秋從而紀焉以著王命不勝黨惡也莘老孫氏曰不書葬者魯不往會爾六月辛未朔日有食之鼓用牲于社鼓用牲于社者鼓于社又用牲于社也文十五年左氏曰非禮也日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝以昭事神訓民事君示有等威古之道也葉氏曰天災有幣無牲諸侯而鼓于社僭也用牲于社非禮也康侯胡氏曰案禮諸侯旅見於天子入門不得終禮者四而日食與焉古者固以是為大變人君所當恐懼修省以答天意而不敢忽也故夏書曰乃季秋月朔辰弗集于房瞽奏鼓嗇夫馳庶人走周官鼓人救日月則詔王鼓大僕凡軍旅田役贊王鼓救日月亦如之諸侯用幣于社伐鼓于朝退而自責皆恐懼修省以答天意而不敢忽也然則鼓用牲于社何以書譏不鼓于朝而鼓于社又用牲則非禮矣張氏曰日食隂盛陽微之徴事關天下固不止為一魯而諸侯亦有臣民則因天變以自省如洪範五事敬謹於視聽言動思之間一失其正則咎必應之古人應天以實而不以文故髙宗肜日洪範之言乃古人之所先務至如𦙍征與周禮鼓人大僕所載乃禮文之末耳一時遭變禮文固不可廢然正其本而後末可理也今莊公於充陽之本蓋藐然矣鼓何益乎又用牲而欲以物求免書此以見本末之皆失也胡氏曰日食三十六書鼓用牲者三餘不言鼓得常也伯姬歸于杞存耕趙氏曰伯姬公姊妹也杜預以為公女誤矣凡公女伯姬叔姬則加以子字如子叔姬之類公姊妹則但稱伯叔如兄弟之辭是年始嫁過時矣愚謂又為二十七年公㑹伯姬與伯姬來起文也秋大水鼓用牲于社于門杜氏曰門國門也左氏曰鼓用牲于社于門亦非常也凡天災有幣無牲非日月之眚不鼓邦衡胡氏曰未聞大水而用牲者況伐鼓于門乎書者非惟惡為國之非禮惡其不務修政事以消患弭災而為是區區淫巫瞽史之見也張氏曰案比年大水隂盛陽微之變極矣莊公若思先王正厥事之意謹內外之防嚴夫婦之别使隂沴無浸長之漸則後日之禍猶可及止也鼓以充陽之事與後世減膳避寢之禮皆既其文而未必有正厥事之誠意實政也况徒以牲牷飲食求免乎書日食大水用牲等事以見莊公非惟不恐懼修省以正其本而禮文之末亦錯矣此魯之所以亂也冬公子友如陳公子友莊公之母弟即季子也杜氏曰諸魯出聘皆書如報女叔之聘也存耕趙氏曰大夫出聘自友始春秋書之以著交政之漸且以著三桓之所自始也義又見隱七年齊來聘莘老孫氏曰大夫之聘必書之於春秋者可以見其往來之國皆於其黨而其行多非禮也有以私行者有以强大行者皆非周制聘問之常故謹録之也二十有六年春公伐戎公羊無春字脫也戎為中國患諸侯伐之是也故伯禽征徐戎而孔子録之于書然必請命于天子方伯然後行事今莊公擅興師則無王矣况隱桓之際與戎會盟致有伐凡伯追戎濟西之事不能防微杜漸使恃强暴橫則勞民動衆角力非類春秋書之所以警後世君人者不可不謹其始也義又見二十年齊伐戎夏公至自伐戎義見桓二年公至自唐曹殺其大夫孫氏曰不書名氏者脫之愚謂義在專殺大夫而不繫乎名氏雖無名氏義亦著也康侯胡氏曰古者諸侯之卿大夫士命於天子而諸侯不敢專命也其有罪則請於天子而諸侯不敢專殺也及春秋時國無大小卿大夫士皆專命之而不以告於王朝有罪無罪皆專殺之而不以歸於司寇無王甚矣五伯三王之罪人而葵丘之會猶曰無專殺大夫故春秋明書於策備天子之禁也後倣此秋公會宋人齊人伐徐左氏古本無公字公羊榖梁有公字張氏日案齊宋皆卑者內亦當然左氏為正宋序齊上者宋本公爵齊桓未伯每序齊上既伯乃序齊下今齊宋之大夫伐徐故仍序齊上耳未必宋主兵也徐張氏曰嬴姓國近齊魯泗洲臨淮縣是也義見此年伐戎冬十有二月癸亥朔日有食之義見隱三年二十有七年春公會把伯姬于洮徒刀切杜氏曰洮魯地薛氏曰洮溝在濟州張氏曰濟南府是也愚案禮女子巳嫁父母在一嵗一歸寧父母沒使大夫歸寧所以别嫌也伯姬無父母則無可歸之理矣而莊公非王事棄國政會伯姬于洮非禮也陸氏曰參譏之公及杞侯伯姬俱失正矣莘老孫氏曰伯姬前年歸杞會公于洮三傳皆無淫惡之跡春秋書之與夫人姜氏會齊侯于禚文同而無異者蓋婦人無專行之道傅母不至不下堂伯姬無事而會公于洮安知其不為惡傳無其事而經書之文同者犯禮之迹無異也戴氏曰夫人會諸侯古無是事也文姜數會齊侯不以為異杞伯姬踵而行之莊公亦安而受之先儒謂伯姬為莊公女非也夏六月公會齊侯宋公陳侯鄭伯同盟于幽存耕趙氏曰距前盟十二年用殷同也義見十六年張氏曰再舉同盟之禮以申假令而一諸侯之心也魯宋陳鄭偕至而衛不來故明年伐衛秋公子友如陳葬原仲原仲稱字與單伯同左氏曰原仲季友之舊杜氏曰陳大夫原氏仲字季友違禮會外大夫葬康侯胡氏曰公子友私行也人臣之禮無私交大夫非君命不越境春秋端本之書也京師諸夏之表也祭伯以寰內諸侯而來魯祭叔以王朝大夫而來聘尹氏以天子三公來告其喪誣上行私表不正矣是故季子違王制委國事越境而會葬其後陳莊子死赴喪於魯魯人欲勿哭繆公召縣子而問焉曰古者大夫束修之問不出境雖欲哭焉得而哭諸今之大夫交政於中國雖欲勿哭焉得而勿哭末流可知矣劉氏曰君不行使乎大夫君行使乎大夫內之失正也大夫不交諸侯大夫交諸侯原氏失正也內失正原氏失正季子可以巳矣則是從命也參譏之此說未詳是否冬杞伯姬來莘老孫氏曰春秋內女適諸侯者多矣於其歸寧未嘗曰子某姬來歸寧常事不書也伯姬非莊公子義不當歸春秋以其歸之非禮故書曰杞伯姬來也愚謂公與伯姬春會于洮其冬又來踰禮甚矣而此又為杞伯來朝起文也莒慶來逆叔姬莒慶莒大夫髙氏曰叔姬者伯姬之妹非莊公女也朴鄉吕氏曰莒慶自為逆也叔姬何以稱字大夫逆則稱字為君逆則稱女公羊曰此何以書譏大夫越境逆女非禮也董子曰大夫無束修之餽無諸侯之交越竟逆女紀罪也莘老孫氏曰莒子為君不能制其臣而使之外交諸侯則不君矣莒慶莊公莒子皆有罪也杞伯來朝濟川何氏曰杞先代子孫也方東樓公始封之時與微子唘無異得用天子禮樂才入春秋巳失公爵降而曰侯或稱伯或稱子亦足以知其微弱與桓二年滕稱子同愚謂杞伯不朝王而朝魯巳失禮矣况為伯姬之來而來朝夫既不能間有家而復以身徇之宜其失禮之中又失禮也義又見隱十一年滕薛來朝公會齊侯于城濮音卜杜氏曰城濮衛地義見隱九年會于防二十有八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績齊衛稱人者將卑師少也及衛及之也不地於衛也曰衛人及齊人戰者齊人伐衛衛人不服而與齊戰也夫齊桓之盟諸侯定伯業雖非至公然以安中國攘夷狄為名則固可與矣十六年衛既與齊同盟二十七年之盟乃背而去之齊之來伐有辭矣衛能引躬自咎則齊當自退乃不反已遂與齊戰以至敗績使無辜之民肝腦塗地書曰衛人及齊人戰衛罪為大而齊為彼善於此也義又見隱二年鄭伐衛夏四月丁未邾子瑣卒黃氏曰瑣克之子也大意見隱七年滕侯卒秋荆伐鄭公會齊人宋人救鄭左氏曰楚令尹子元以車六百乘伐鄭入於桔柣之門衆車入自純門及逵市縣門不發楚言而出子元曰鄭有人焉諸侯救鄭楚師夜遁鄭人將奔桐丘諜告曰楚幕有烏乃止愚謂外裔內侵天子方伯不能治向非齊桓率諸侯以救之則中國被其毒幾何其不淪胥于敗也此其功也然桓非命伯且不請于王又其所以救鄭者不過仗大義為服諸侯計初無懇惻之誠心正孟子所謂非真有者此其過也春秋書之一以見中國衰微荆蠻暴橫二以見敝壞之餘賴有齊桓之舉三以見天子失御方伯失職使諸侯自為禮樂征伐雖粗拯一時之危然王綱之壞至此而極蓋聖人憂世之心樂善之誠並行而不相悖皆惻隱流行之實也黃氏曰楚與中國爭鄭自此始冬築郿公羊榖梁作微杜氏曰郿魯下邑築公羊曰造邑也莘老孫氏曰春秋書築者七其六皆臺囿也邑者惟一處耳今不謂之城而謂之築言城者城舊邑也言築者築新邑也蓋臺囿無舊新為之者必皆曰築然則築郿者新城而為邑也不曰新無舊也不曰城無所因也春秋之法興作皆書所以重民力謹天時也先書築郿而下書大無麥禾則公之興作不量力可知矣愚謂又見其違王制也大無麥禾大無者竭盡之辭冬書大無麥禾者夏悉無麥秋悉無禾至冬而總記之也莘老孫氏曰此書大無麥禾非常無之也無水旱蟲螟而大無者嵗不收也舉魯之國無收者焉服䖍曰隂陽不和土氣不養故禾麥不成愚謂政事乖繆則天地變常稼穡不成不可委之於數春秋書之所以戒有國者謹敕人事燮理隂陽而巳又為告糴起文也臧孫辰告糴于齊辰榖梁作臣臧孫辰魯大夫臧文仲哀伯子外傳曰文仲以鬯圭與玉磬如齊告糴曰不腆先君之敝器敢告滯積以紓執事齊人歸其玉而與之糴盧氏曰一不登而告糴鄰國責魯無儲蓄以擬凶災無恤民憂下之心兵革力役不息以致荒耗又明人君當謹積聚省財用以備凶年也莘老孫氏曰古之為國必有數嵗之備雖甚豐年民食之者不過四釜也君取之者不過什一也民之食有節君之取有度則為國三年而餘一年之蓄九年而餘三年之蓄二十七年而餘九年之蓄湯之旱七年堯之水九年而天下無飢者其蓄素具也水旱無常又無蓄以備之則是使民恃天而生也安得為民父母哉莊公在位二十八年雖九年之蓄可具也而於其無事奪民之力使不得盡力於耕耨又驅之戰鬭而傷之一年不登告糴於外春秋譏莊公在位之久蓄積無素也二十有九年春新延廏新者徹其舊而一新之也延馬廄名國雖無饑用民必在農隙去年大無麥禾告糴于齊上下困乏可知矣今春正當賑給勸耕惠鮮窮困而奪其力傷其財見莊公之無志於救荒而厲民以畜馬有國家者知所鑒矣劉氏曰春秋二百四十二年所興作修舊多矣不必書也而延廄南門蓋微耳何故獨書哉又新宫災魯公之廟也災與壞不能不修而經無修之之文雉門及兩觀災記新作焉吾以此數者參之修舊不足書其書者皆非禮之制不務公室者也夏鄭人侵許髙氏曰許鄭鄰也諸侯救鄭而許不至故侵之張氏曰許與鄭世讎也然自盟幽之後不與於齊桓之會鄭人侵之或齊之命歟自後許始從中國未詳孰是義見莊十年公侵宋秋有蜚扶味切蜚者臭惡之蟲山海經云蜚如牛白首一目蛭尾行水則竭行草則枯見則有兵疫劉氏曰曰有者所以明其無也公羊曰記異也愚謂此皆人事反常中國正氣衰耗故窮裔絶域惡氣駸駸入焉有國家者致中和則陽淑長而隂慝消矣此與有􅈮同義劉氏曰鸜鵒不踰濟而蜚非中國之物暫而一至故不可言多而言有麋者中國之所有也有之不足異而多則為異故不可言有而言多螽螟者中國所多也多不足怪而為災則書故不可言多而言災此製言之體也冬十有二月紀叔姬卒叔姬失節歸酅卒非其所也而魯亦不當卒之又為明年葬叔姬起文城諸及防杜氏曰諸防皆魯邑諸城陽諸縣張氏曰密州諸城縣縣又有故防城言及者别二邑也防見隱九年黃氏曰先諸及防也義見隱七年城中丘此則饑嵗勞民連城二邑甚矣髙氏曰前年冬築郿大饑告糴此年新延廄又城諸及防公不恤民而屢興役無君人之心矣愚謂屬辭比事此類是也三十年春王正月夏師次于成左氏無師字任氏曰當從公榖張氏曰成魯地地譜泰山巨平縣東南愚謂諸侯非王命不得擅興師况輕舉次止而無所用乎夫兵不得巳而用之今師出無名不惟干犯王法亦使人心渙散必敗之勢也秋七月齊人降鄣音章杜氏曰東平無鹽縣東北有鄣城張氏曰即東平府須城縣常山劉氏曰鄣微弱小國齊肆其强力脅而服之也不書鄣降而曰齊人降鄣者責齊之深也康侯胡氏曰伯者之政以强臨弱急事功也故曰五伯三王之罪人也莘老孫氏曰春秋書降者二降者降服之名也入年郕降于齊師不曰齊師降郕而曰郕降者是時齊魯之師相會圍郕郕不降於魯而自降齊耳今書齊人降鄣非鄣欲降也齊强降之耳吕氏曰管仲所以相其君者功業可見矣八月癸亥葬紀叔姬髙氏曰叔姬停殯於酅踰歷九月始克葬孫氏曰媵而卒葬者歸于酅卒于酅皆非其所也獻可杜氏曰叔姬者紀之媵耳紀既滅則當即歸於魯而又從紀季於酅非禮之甚卒葬固在於紀季矣九月庚午朔日有食之鼓用牲于社義見二十五年冬公及齊侯遇于魯濟杜氏曰濟水歷齊魯界在齊界為齊濟在魯界為魯濟蓋魯地義見隱四年遇于清齊人伐山戎朴鄉吕氏曰山戎北戎也其稱人以伐何非有大役也木訥趙氏曰山戎去中國逺在舜之營州古孤竹國之地東距遼北距燕康侯胡氏曰桓公不務德勤兵逺伐不正王法則將開後世之君勞中國而事開邊捨近政而貴逺略因吾民之力爭不毛之地其患有不勝言者故以為好武功而不修文德者之戒也義又見二十年齊伐戎髙氏曰桓公徒欲耀威武於山戎以誇示逺近耳三十有一年春築臺于郎郎見隱九年何氏曰四方而髙曰臺天子有靈臺以候天地諸侯有時臺以候四時登髙望逺人情所樂動而無益於民雖樂不為也愚謂春築則奪農時于郎則非其地從耳目之欲而不恤國事劉氏所謂厲民以自樂者也夏四月薛伯卒薛始稱伯見桓二年滕子來朝大意見隱七年滕侯卒築臺于薛杜氏曰薛魯地義見前莘老孫氏曰春築臺于郎夏築臺于薛莊公務一身之娛而勞民如此六月齊侯來獻戎捷孔氏曰獻者自下奉上之辭捷者勝也戰勝而有獲獻其獲無囚而獻其功亦稱捷也左氏曰非禮也凡諸侯有四裔之功則獻于王王以警不庭中國則否諸侯不相遺俘莘老孫氏曰齊桓伯者不務德以綏諸侯而專恃兵革逺以伐戎巳有過矣又以其伐戎之所得誇示諸侯以自矜大因使之威服焉春秋誅齊桓矜功威魯之罪也張氏曰齊桓恃功而不知禮魯不當納之其罪皆可見矣秋築臺于秦杜氏曰東平范縣西北有秦亭張氏曰案寰宇記范縣屬濮州亭尚存榖梁曰不正罷民三時財盡則怨力盡則懟君子危之故謹而志之也張氏曰莊公一嵗築三臺政所謂及是時般樂怠敖者則治國治家之當務荒廢多矣此所以踰年身死而蕭墻之禍至易世不能定也可不鑒哉義又見前髙氏曰公比年興役今又一嵗三時築臺又不在國中之地逺于于郎于薛于秦非所築而築既為失矣築而又築之抑又甚也管子曰臺榭相望者亡國之廡也當是時慶父執政而通乎夫人故數築臺于逺地以為公遊觀之娛公亦為其所惑而不自知也冬不雨公羊曰記異也存耕趙氏曰隂陽和則為雨不雨氣不和也魯莊勤民力役怨氣之所召也愚謂冬不雨不害禾稼而亦書者見聖人燮理隂陽無所不至不但為害稼書也蓋致中和則天地自位風雨以時萬物生育在其中矣莘老孫氏曰春秋書不雨者七隂陽不和之異也人物在天地閒皆仰隂陽以生隂陽不和則物必不遂故春秋之法一時不雨則書不以為災也異之大者不可不記也三十有二年春城小榖范氏曰小榖魯邑孫氏曰曲阜西北有小榖城義見隱七年城中丘此則饑饉之後屢興工役傷財害民甚矣薛氏曰莊公自六年之後大無麥禾無麥苗螟麋􅈮蜚相繼而有大水者三中君之性尚當少警而公之侈心日起丹楹刻桷告糴而有築郿之役次年新廏城諸防去年三築臺今春又城小榖平嵗猶曰不可况薦饑而輕用民力乎愚謂此皆屬辭比事為後日淫亂弒逆起文也夏宋公齊侯遇于梁丘杜氏曰梁丘在髙平昌邑縣西南張氏曰在濟州昌邑縣愚謂伐國先書主兵會盟先書主會主盟以遇禮見仍以爵為首義見隱四年遇于清秋七月癸巳公子牙卒公子牙慶父同母弟即僖叔也髙氏曰牙卒其子乃公孫兹兹之後則有叔孫得臣叔孫僑如叔孫豹叔孫婼叔孫不敢叔孫州仇皆執魯國之政者是以謹志其卒愚謂此記三桓之始與季友卒同義皆譏世卿也大意又見隱元年益師卒八月癸亥公薨于路寢榖梁曰路寢正寢也寢疾居正寢正也男子不絶於婦人之手以齊終也愚謂莊公薨于路寢得正矣正則為常事何以書乎為緩葬私諡起文也義又見隱三年宋公卒趙氏曰莊公正終而嗣禍興分位不明而閨帷不修也故宗嗣素定之兵權散主之閨闈嚴飭之小人女子不尸重任賢良受託鼎足交輔則篡弒之禍曷由而至哉冬十月已未子般卒公羊榖梁作乙未般莊公子也稱子般者因其卒而名也趙氏曰子般子赤以被弒故不書地與隱同子野正卒亦不地疑經闕之左氏曰初公築臺臨黨氏見孟任從之生子般焉雩講於梁氏女公子觀之圉人犖自牆外與之戲子般怒使鞭之公曰不如殺之是不可鞭犖有力焉子般即位次於黨氏共仲使圉人犖賊般於黨氏成季奔陳立閔公張氏曰莊公主魯之社稷而君道不立上不能正其母使出入淫縱配耦不早立是致冢嗣之位不足以自定內失間家之道而貽身後之患易曰間有家傳曰欲治其國者先齊其家莊公反此使淫亂肆行雖其身免篡弒之禍而及其二子春秋自夫人孫齊以來三十年間備載莊公內治之失而終之以此所以罪其為風教之本而不免於首惡也公子慶父如齊劉氏曰慶父雖殺子般未敢便取其國利閔公之幼而立焉其如齊直告立君也愚謂亦恐齊之見討故結納其君臣耳啖氏曰書公子慶父如齊見臣子之罪也此言弒君之賊臣子不能討之又非逐之而去明書如齊以見其罪陸氏曰齊為伯主而不能討又許其來惡可知也康侯胡氏曰子般之卒慶父弒也莊公幼年即位專以兵權授之慶父嵗月既久威行中外其流至此故於餘丘而書慶父帥師以志得兵之始而卒書公薨子般卒慶父如齊以見其出入自如無敢討之者其垂戒之義明且逺矣狄伐邢存耕趙氏曰此北狄也邢姬姓周公之𦙍杜氏曰國在廣平襄國縣張氏曰即邢州龍岡縣莘老孫氏曰春秋之時周室既卑邢為同姓之國而伐于狄書之所以見諸姬之失序而狄人之盛强也王政不行簡書莫畏於狄人何責哉高氏曰此為齊人救邢而書亦見中國之衰也義又見隱七年戎伐凡伯貫道王氏曰戎亂曹魯荆病蔡鄭狄禍邢衛三害之始也許氏曰春秋戎先見荆次之狄次之而荆暴於戎狄又暴於荆當惠王世戎狄荆楚交伐中夏使無齊桓攘服定之豈復有中國哉愚謂此聖人所以與其功而議其過也春秋本義卷八
