body:
  text: 春秋本義卷五元程端學撰桓公九年春紀季姜歸于京師吕氏曰史失季姜歸月春秋不得而增益也杜氏曰季字姜姓也前年祭公所逆王后也戴氏曰方其逆也稱曰王后自王命言之也及其歸也謂之季姜自父母家言之也歸見隱二年公羊曰京師者天子之居也京者大也師者衆也天子之居必以衆大之辭言之髙氏曰古者后夫人必取嫡女天子求后於諸侯對曰夫婦所生若而人若姑姊妹則曰先君之遺女若而人於諸侯則曰不腆先君之嫡若而人是以伯姬歸于紀則叔姬為之娣今曰季姜則非嫡矣不可以母天下春秋書之以防後人猶有卑人為后者愚謂王后為天下母必擇諸侯嫡女窈窕貞淑然後可以配至尊成內治為宗廟社稷主今紀以畏齊而謀納女魯以弒賊而主之桓王亦乘機而娶紀之姪娣上下皆非正義明道之舉嗚呼春秋之作所以為君子惻怛之心也夏四月秋七月冬曹伯使其世子射姑來朝射音亦又音夜康侯胡氏曰案周官典命凡諸侯嫡子誓於天子而攝其君則下其君之禮一等未誓則以皮帛繼子男世子固有出㑹朝聘之儀矣然攝其君繼子男者謂諸侯朝於天子有時而不敢後故老疾者使世子攝己事以見天子急述職也諸侯閒於王事則相朝其禮本無時曹伯既有疾何急於朝桓使世子攝哉大位姦之窺也危病邪之伺也世子君之二也君疾而儲副出啓窺伺之心危道也踰月而終生卒其有疾明矣而使世子來終生之過也世子將欲已乎則方命矣孝子盡道以事其親者也不盡道而苟焉以從命為孝又焉得為孝乎榖梁曰使世子伉諸侯之禮而來朝曹伯失正矣諸侯相見曰朝以待人父之道待其子以內為失正也內失正曹伯失正世子可以已矣則是放命也張氏曰春秋以討賊望諸侯今曹伯之使世子春秋所以直書而深責之戴氏曰使不幸未還而曹伯卒則國非其國也劉氏曰此後世所以多子禍也十年春王正月庚申曹伯終生卒義見隱三年宋公卒夏五月葬曹桓公義見隱三年葬宋穆公秋公會衛侯于桃丘弗遇公羊曰會者期辭也杜氏曰桃丘衛地濟北東阿縣東南有桃城衛侯與公為期中背公更與齊鄭故公獨往而不相遇也趙氏曰書不遇者見諸侯之無信朴鄉吕氏曰衛不信也吕氏曰春秋之世專計利害不顧義理如此髙氏曰在易屯之六三以隂居陽其身不正而輕躁妄動求應於五五應在二而弗見納聖人戒之曰君子幾不如舍往吝繫辭曰幾者動之微吉之先見者也君子安其身而後動易其心而後語定其交而後求夫桓公身負弒逆之罪而又輕躁妄動為人所棄正如屯之六三聖人為萬世戒也黃氏曰郎之戰兆此冬十有二月丙午齊侯衛侯鄭伯來戰于郎郎見隱九年程子曰來戰于郎三國為主劉氏曰外為志乎此戰也常山劉氏曰春秋之中諸侯加兵于魯者為不少矣未有書來戰者此不言侵伐而以來戰為文則彼曲我直其義坦然義又見隱二年鄭伐衛康侯胡氏曰魯桓弒立天下大惡人人所得討也鄭伯則首盟于越以定其位齊侯則繼會于稷以濟其姦曽不能修方伯之職駐師境上聲罪致討伸天下之大義也今特以私忿小怒親帥其師戰于魯境尚為知類也哉愚謂魯衛兄弟之國齊魯纍世之姻桓公又新娶于齊魯鄭嘗會盟假田以締交一有閒隙則忘親背盟興兵爭戰此春秋之時所以為大亂聖人比書其事為後世鑒十有一年春正月齊人衛人鄭人盟于惡曹三國稱人微者也吕氏曰盟我不與也其曰人不詳也未詳是否杜氏曰惡曹地闕愚謂諸侯專盟是無天子大夫專盟是無諸侯王綱之壞極矣聖人所尤惜也義又見隱元年盟于蔑劉氏曰齊衛鄭相與會盟而君不行委之大夫春秋正本謹始知其後必有大夫脅權交政之惡則又有陪臣執國干上之禍其勢相召也夏五月癸未鄭伯寤生卒義見隱三年宋公卒秋七月葬鄭莊公杜氏曰三月而葬速義見隱三年葬宋穆公九月宋人執鄭祭仲突歸于鄭鄭忽出奔衛陸氏曰執大夫例稱人愚謂義不在人而在執略之之辭也康侯胡氏曰祭仲鄭之命大夫祭氏仲字也蘇氏曰名也前說近是愚案突莊公庶子宋雍姞所出即厲公也忽莊公嫡子鄧曼所出即昭公也葉氏曰凡出奔者皆書名蓋迫逐者必有與之爭國者內一君外亦一君不名無以為辨後倣此邦衡胡氏曰未踰年不稱鄭伯愚案居喪未踰年之君稱子今不稱子未詳大凡出奔者多不書子與爵如曹羈之類是也左氏曰鄭昭公之敗北戎也齊人將妻之昭公辭祭仲曰必取之君多內寵子無大援將不立三公子皆君也弗從夏鄭莊公卒初祭封人仲足有寵於莊公莊公使為卿為公娶鄧曼生昭公故祭仲立之宋雍氏女於鄭莊公曰雍姞生厲公雍氏宗有寵於宋莊公故誘祭仲而執之曰不立突將死亦執厲公而求賂焉祭仲與宋人盟以厲公歸而立之秋九月丁亥昭公奔衛己亥厲公立榖梁曰權在祭仲也死君難臣道也今立惡而黜正惡祭仲也愚謂突以庶孽謀篡宋莊私突執祭仲奪嫡立庶祭仲執國柄不死節以輔正三者罪大惡極矣然鄭莊之多寵以遺後禍與鄭忽不能君舉朝無忠臣而廢置如反掌與天子方伯不修其職以致姦猾肆行而無所忌舉可見矣陳嶽氏曰忽太子也兄也正也突公子也弟也非正也忽既立則祭仲之君以君臣之義顛則扶之危則持之力不足則死之又知突在宋非會非聘為宋所誘其無謀甚矣往而被執不能死節歸立厲公柔會宋公陳侯蔡叔盟于折孫氏曰蔡叔蔡侯之弟叔字也諸侯母弟未命為大夫者皆字朴鄉吕氏曰折魯地義見隱元年盟于蔑張氏曰自去年魯與齊衛為仇敵至今年桓公欲合黨以敵之於是結宋與陳蔡要言歃血初無忠信誠慤相與之心又以再命大夫敵宋公陳侯故盟不足以恃矣公會宋公于夫鍾夫音扶鍾公羊作童杜氏曰夫鍾郕地義見隱九年會于防康侯胡氏曰臣與宋公盟于折君與宋公會于夫鍾于闞于虛于龜皆存而不削何其辭費歟曰盟者春秋之所惡而屢盟以長亂會者諸侯所不得專而數會以厚疑聖人皆存而不削於以見屢盟而卒叛數會以卒離其事可謂著明矣冬十有二月公會宋公于闞口暫切杜氏曰闞魯地在東平須昌縣東南義見隱九年會于防十有二年春正月夏六月壬寅公會紀侯莒子盟于曲池公羊作驅蛇紀左氏作杞公羊榖梁作紀今從程子所定作紀杜氏曰曲池魯地魯國汶陽縣北有曲水亭義見隱元年盟于蔑秋七月丁亥公會宋公燕人盟于榖丘張氏曰南燕姞姓國漢屬東郡今為滑州胙城縣存耕趙氏曰居宋鄭之間杜氏曰榖丘宋地張氏曰在應天府榖熟縣義見隱元年盟于蔑八月壬辰陳侯躍卒杜氏曰厲公也大意見隱七年滕侯卒張氏曰去年與柔盟于折不書葬魯不會不恤同盟也公會宋公于虛公羊作郯杜氏曰虛宋地義見隱九年會于防冬十有一月公會宋公于龜杜氏曰龜宋地義見隱九年會于防髙氏曰公委宗社人民而五出與宋會諸侯臨涖一國之民民不可一日不治則國不可一日去之故先王之法諸侯無事不得出其四境朝事天子則出境天子巡狩則出境方伯率諸侯以征伐則出境若無事而出境則誅葉氏曰公始以柔會宋未幾復自會于夫鍾于闞于榖丘夫鍾郕地闞魯地榖丘宋地也公之求宋亟矣及是復會于虛于龜皆宋地而公即之公之求宋益亟矣蓋自隱以來我之相與為厚為薄者惟宋與鄭黨鄭則伐宋善宋則伐鄭至郎之戰懼鄭之謀己故亟於求宋既而求鄭以為武父之盟而成伐宋之役明年再會又明年復會其求於鄭者亦如是其急鄭適有突之亂知其不足恃乃復從而伐之孰有立國如是而可久者乎暴戾則無親失道則寡援君子是以知桓之不終也丙戌公會鄭伯盟于武父音斧鄭伯突也東萊吕氏曰突篡位而以君書之不沒其實也杜氏曰武父鄭地陳留濟陽縣東北有武父城愚謂魯桓與宋兩盟四會不浹旬而背之以盟鄭反覆如是比事而觀其義自見義又見隱元年盟于蔑張氏曰與人交之道忠信誠慤本乎中則有不期合而合者其人非有是心則其相與也不過以利合一旦爭小利則相視忽如仇敵然公之會宋而盟鄭其離合正如是春秋詳書之以見王政不行魯桓宋莊鄭厲皆以篡國而立交相盟會紛紛離合惟利是視煩盟瀆信祗以長亂王法之所必誅而不以聽者也吕氏曰此年書盟會之數如此見諸侯無王放恣自若多事屢盟民不堪命如此之極也聖人傷之以為世戒後之人君有意於善者其知慎始守約愛民為急以合聖人之意乎丙戌衛侯晉卒孫氏曰丙戌羡文也此盟與卒同日耳經未有一日而再書者義見隱三年宋公卒十有二月及鄭師伐宋丁未戰于宋內不出主名微者也伐而言戰者宋不服而逆戰也言戰而不言敗績無大勝負也兩年之閒六盟會宋冝篤好也一與鄭比則連鄭伐宋鄭突亦忘其立已之私恩而與魯比此宋不服以至於戰殘民毒衆罪惡極矣義又見隱二年鄭伐衛張氏曰兵法爭恨小故不忍憤怒者謂之憤兵魯桓鄭突此役是也書及鄭師伐宋罪魯鄭也又書丁未戰于宋言魯鄭與宋亟爭尋常殘民暴骨兩罪之也康侯胡氏曰來戰者罪在彼戰于郎是也往戰者罪在內戰于宋是也存耕趙氏曰魯軌弒隱宋馮弒殤鄭突篡忽三者皆逆賊周有常刑皆戮餘也敢稱兵為戰見王法之不行也十有三年春二月公會紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績此魯侯來會紀鄭也及者三國及之也燕稱人微者也戰稱爵舉重也敗稱師君存而師敗也敗績者敗其軍功大敗也公羊曰其不地於紀也趙氏曰內兵以紀為主外兵以齊為主莘老孫氏曰紀為齊侵削志欲滅之舉宋衛燕三國之師往伐之紀於是要魯鄭之君以為之敵愚謂齊吞小國連諸侯以伐紀自取敗績罪不勝誅矣紀不量力又連魯鄭以戰雖僥幸一勝卒滅宗社其相從諸侯各逞私忿合黨報怨使無辜之民肝腦塗地皆罪也見王政不行諸侯縱恣甚矣杜氏曰衛宣公未葬惠公稱侯以接鄰國非禮也義又見隱二年鄭伐衛康侯胡氏曰齊為無道恃强陵弱此以紀為主何也彼為無道以加兵於己必有引咎責躬之事禮義辨喻之文猶不得免焉則亦固其封疆效死以守上訴天子下告方伯連帥與鄰國之諸侯不如是而憤然與戰豈己亂之道乎同力度德動則相時小國讎大國而幸勝焉禍之始也息伐鄭而亡鄭勝蔡而懼蔡敗楚而滅今紀人不度德不量力不徵詞輕與齊戰而為之援者弒君之賊篡國之人也不能保其國自此戰始矣三月葬衛宣公義見隱三年葬宋穆公夏大水義見元年存耕趙氏曰桓元年大水今又大水水天之所生以活人者也大而災焉隂沴之證也夏見則妨農矣髙氏曰自堯有洪水之患使禹治之禹能疆理天下正其經界有畎有澮有溝有洫有川有遂遂無水患但有其利故年之豐凶一係農力水旱不能為之害或天時久雨則由畎注澮由澮注溝由溝注洫由洫入川由川入遂以次疏導入河入江終至於海蓋以決而不為災也或天時久旱則於溝澮川遂之閒遞引其水以為灌溉又得其利焉春秋之時暴君汙吏壞其經界使畎澮溝洫之屬皆蕪而不治於是遇大水而無以決遇大旱而無以溉民為兵戰所驅無暇治田畝聖人書大水者上痛禹跡之亡下悼井田之廢生民受其患無以極濟之也秋七月冬十月十有四年春正月公會鄭伯于曹義見隱九年會于防髙氏曰公與鄭伯皆有篡逆之大惡天下所不容今相會于曹曹之容惡可知也無冰榖梁曰時燠也戴氏曰詩曰二之日鑿冰沖沖三之日納于凌隂二之日今之十二月三之日今正月也十二月取冰正月藏之今桓公春無冰無藏冰也去年十二月時燠無冰今年之春無冰可納春秋於是時而書之愚謂此年正月為公會鄭伯于曹而書若無冰則總繫之春耳藏冰出冰俱在其中與僖二年三年書不雨之法同義與成元年二月襄二十八年春書無冰同蓋無冰不可繫月故也康侯胡氏曰周官凌人之職頒冰於夏固隂沍寒於是乎取其出之也賔食喪祭於是乎用藏之周用之遍然亦理隂陽天地之一事也今燠而無冰則政治縱弛不明之所致也胡氏曰雨雹冰雪何以悉書天人一理也萬物一氣也觀於隂陽寒暑之變以察其消息盈虛此制治於未亂慎於微之事也每謹於微然後王德全矣黃氏曰諸家皆以周之正月為今之十一月十一月無冰為災故書然使果十一月無冰則尚有十二月尤寒冰之有無方於此決未可遽以十一月無冰為災而先書之也蓋至十二月無冰及春正月東風解凍終於無冰則無冰決矣始以災而書爾夏五鄭伯使其弟語來盟語榖梁作禦杜氏曰不書月闕文葉氏曰經成而後亡也愚謂此及宣七年孫良夫皆稱使來盟前定也使其弟見隱七年齊來聘此則盟以伉諸侯甚矣盟見隱元年盟于蔑此則篡賊之合黨甚矣莘老孫氏曰春秋諸侯使其弟來者皆罪其不當使也弟而可使則命而使之可也不命而使之徒曰弟焉罪之也來盟者盟於魯也春秋主我使自外而至盟者書曰來盟不言其地盟於我之國都也存耕趙氏曰請會矣又請盟焉突蓋德軌之排宋而黨己也來盟涖盟彼此之辭也秋八月壬申御廪災乙亥嘗廪刀錦切公羊曰御廪者粢盛委之所藏也杜氏曰藏公所親耕以奉粢盛之倉也嘗祭名公羊曰秋曰嘗愚謂災者火之也當嘗而火其粢盛之藏以桓公平日得罪於天不敬其祖之所致也不知省身改過以答天譴卒敢靦然草蕞即復祭之甚矣其忽天而慢祖也存耕趙氏曰御廪之災在致齊三日之前春秋書之蓋以嘗之不謹而災於齊之日也趙氏曰譏不改卜也獻可杜氏曰八年書再蒸見其瀆也此年書御廩災乙亥嘗見其慢也冬十有二月丁巳齊侯祿父卒義見隱三年宋公卒宋人以齊人蔡人衛人陳人伐鄭公羊衛人在蔡人上葉氏曰伐言以已不能敵假人以為用也愚謂宋怨突之背已又有丁未之戰己巳之敗績故用四國之兵以伐鄭康侯胡氏曰列國之兵皆統乎天子而敢私用之與私為之用以伐人國大亂之道也義又見隱二年鄭伐衛髙氏曰折之盟陳蔡在焉紀之戰齊衛在焉皆與宋同惡者也宋公不道執人之卿易人之君深怨突之背已而自量其力不足以加之於是復以齊蔡衛陳之兵伐鄭宋公之罪斯為尤重存耕趙氏曰是摟諸侯以伐諸侯也齊子猶在哀疚相與從宋以興戎木訥趙氏曰出忽立突者誰歟已立之而已疾之不仁哉宋莊也愚謂宋莊之罪著矣然鄭突忘立己之恩結魯以伐宋以致交怨報復殺戮無辜突真薄德哉十有五年春二月天王使家父來求車家父見八年孫氏曰諸侯貢賦不入周室財用不足也公羊曰王者無求求車非禮也常山劉氏曰世之治也天子命貢賦於天下而無敢不從無有求也諸侯奉貢賦於天子而無敢不恭不至於來求也世亂反此書此以見王室之微而著諸侯之罪也義又見隱三年求賻葉氏曰天子有賜無求諸侯有貢無與古者邦國九貢車有器貢用有貨貢諸侯不貢而伐之正也不能伐之又從而求之器不足而求車用不足而求金以是居人上非所以王天下也獻可杜氏曰桓公篡立天子未嘗討之反屢聘之今又有車服之求聖人所以甚之也張氏曰家父為大夫而無所正救奉使侯國自取辱命之罪三月乙未天王崩案此一見魯桓不奔王喪而會齊僖之葬二見魯桓以嘉禮會齊侯於艾會宋蔡衛於曹三見諸侯之伐國不已四見桓王崩於此年而葬於六年之後也所為屬辭比事為春秋教者皆此類也豈徒記其死生之變而已哉義又見隱三年夏四月己巳葬齊僖公髙氏曰魯不供天王之喪而會齊僖之葬其顛倒甚矣義又見隱三年葬宋穆公五月鄭伯突出奔蔡突書名見十一年鄭忽出奔左氏曰祭仲專鄭伯患之使其壻雍糾殺之將享諸郊雍姬知之謂其母曰父與夫孰親其母曰人盡夫也父一而已胡可比也遂告祭仲曰雍氏舍其室而將享子於郊吾惑之以告祭仲殺雍糾尸諸周氏之汪公載以出曰謀及婦人宜其死也夏厲公出奔蔡張氏曰突以庶孽奪嫡固不可以有國又初與權臣比而篡位又為反覆盜賊之計以自取亡陸氏曰逐君之臣其罪易知也君而見逐其惡甚矣聖人之教在乎端本清源故凡諸侯之奔皆不書所逐之臣而以自奔為名所以警乎人君康侯胡氏曰其說是也夫君實有國而出於臣乃自取焉耳本正而天下之事理矣鄭世子忽復歸于鄭葉氏曰忽何以稱世子言子則喪已除言爵則雖踰年而不居位所以别於突而明正也何以言復歸凡諸侯出奔言復歸諸侯世國者也雖失位不可絶也邦衡胡氏曰復歸者既絶於國今始復來已失國之辭也二說相須乃備然本義則不在此存耕趙氏曰突歸則忽出突出則忽歸突忽之逆順不難知而出入惟蔡仲之為聽權臣擅國命而廢置其君舉國之人莫之違祭仲之事不可以訓也愚謂春秋書此見天王失政而諸侯肆諸侯失權而庶孽亂嫡大夫執國命也許叔入于許杜氏曰許叔莊公弟也愚謂許叔入于許事無可考以書法觀之必乘許之亂而謀篡者也夫世子受國於先君誓於天子而後為諸侯許叔弟也乘許之亂竊入而為君罪可知矣公會齊侯于艾公羊作鄗榖梁作蒿艾見隱六年髙氏曰魯嘗與齊絶矣自僖公卒襄公新立至是復通好焉而齊襄居喪出會越禮畔道自是與文姜為鳥獸之行而桓公之禍兆於此矣義又見隱九年會于防邾人牟人葛人來朝牟亡侯切杜氏曰牟國泰山牟縣張氏曰後為登州牟平縣杜氏曰葛國在梁國寧陵縣東北張氏曰後為拱州寧陵縣愚謂言人則三國之臣也三國以臣而行朝禮魯以弒逆之賊而安受旅朝之儀見當時禮制之大壞矣秋九月鄭伯突入于櫟稱鄭伯嘗君鄭爾稱名已奔之君皆無他義也入于櫟竊入據邑也公羊曰櫟者鄭之邑也杜氏曰河南陽翟縣張氏曰後屬潁昌府左氏曰鄭伯因櫟人殺檀伯而遂居櫟愚謂突以庶孽奪嫡篡位五年天子方伯不治之又不能君而出奔既奔而又竊入據邑終始亂鄭舉動莫非穿窬之謀春秋直書其事而罪惡自見矣程子曰鄭伯突入于櫟突非正也存耕趙氏曰世子復歸于鄭突入于櫟兩辭之閒逆順見矣于櫟未得鄭也然櫟鄭之險邑猶制與京也突雖未得國其後卒君鄭實由櫟而入許氏曰此詩所謂五公子爭立兵革不息者也鄭亂如此春秋弗志志突入櫟而已語曰櫟人實使鄭子不得其位言國邑之大也忽失其政不能制突使斬鄭而居之以生民心此亂根也故君子略其枝葉使謹夫亂之所自生愚案莊二十一年書鄭伯突卒則突終復篡位比事而觀春秋之時亂可知矣冬十有一月公會宋公衛侯陳侯于袲伐鄭袲余支切公羊作侈杜氏曰袲宋地在沛國相縣西南先行會禮而後伐也左氏曰㑹于袲謀伐鄭將納厲公也弗克而還未詳信否義見隱三年鄭伐衛康侯胡氏曰昭公之與突其是非邪正亦明矣然昭公雖正其才不足以君一國之人復歸於鄭日以微弱厲公雖篡其智足以結四鄰之援既入于櫟日以盛强諸侯不顧是非而計其强弱相與連兵動衆納篡國之公子也存耕趙氏曰宋馮前年方以四國之師伐突未幾突出忽歸又以三國之師納突馮之無恆心可知矣未詳是否十有六年春正月公會宋公蔡侯衛侯于曹左氏曰會于曹謀伐鄭也義見隱九年會于防夏四月公會宋公衛侯陳侯蔡侯伐鄭黃氏曰冬伐鄭納突未克今再納突也未詳是否義見隱二年鄭伐衛吕氏曰會于曹蔡先衛伐鄭衛先蔡蓋當時諸侯皆以一切强弱目前利害為先後不復用周班春秋因事紀實以見當時之亂無復禮也王氏曰突之未出也宋欲有所責故嘗伐之突之既出宋懼無所得又欲納之始鄭不和魯嘗以鄭伐宋及突既出魯又與宋伐鄭反覆皆私也存耕趙氏曰突也馮也軌也均篡賊也背公死黨奪攘矯䖍此風一倡而奪嫡亂國之事相踵於世髙氏曰鄭國之亂宋公實為之宋為首惡未詳是否秋七月公至自伐鄭孫氏曰助篡伐正踰時而返義又見桓二年公至自唐冬城向孫氏曰下言十有一月則城向在十月矣髙氏曰春秋有二向此我之邑木訥趙氏曰隱二年莒所入之向也計其後為莒所滅地在魯莒境上故城之魯莒之爭自城向始未詳孰是義見隱七年城中丘此雖得時然違王制而勞民力故書存耕趙氏曰鄭之伐既疲民於鋒鏑向之城復役民於畚鍤終歲勤動民不得休息黃氏曰左氏曰書時也謂城以冬也自漢儒言三正而杜預謂周之冬今之秋諸家遂一變其說反以為譏非時不知周之改正不過以建子之月行朝饗之禮以示不沿商也天之四時豈可改也哉天豈以周建子而改冬為春也哉十有一月衛侯朔出奔齊左氏曰初衛宣公蒸於夷姜生急子屬諸右公子為之娶於齊而美公取之生壽及朔屬壽於左公子夷姜縊宣姜與公子朔搆急子公使諸齊使盜待諸莘將殺之壽子告之使行不可曰棄父之命惡用子矣有無父之國則可也及行飲以酒壽子載其旌以先盜殺之急子至曰我之求也此何罪請殺我乎又殺之二公子故怨惠公十一月左公子泄右公子職立公子黔牟惠公奔齊愚謂衛朔之奔兆於宣公鳥獸行殺二子之時而成於朔為諸侯之後蓋朔之君衛五年矣使能治其國家尚足以蓋前人之愆而父喪未葬伐紀伐鄭觀春秋所書莫非悖亂之事其失國也宜義又見十五年鄭突奔蔡君舉陳氏曰此衛人立公子黔牟而後出奔則其但書奔何以為自失國也春秋之法苟其道足以失國雖有篡公子亦以自致之文書之是故衛立黔牟而朔出蔡人立東國而邾出郕人立君而朱儒出書奔而已矣十有七年春正月丙辰公會齊侯紀侯盟于黃杜氏曰黃齊地左氏曰平齊紀也邦衡胡氏曰五年齊鄭如紀謀欲襲之十三年紀與齊戰齊紀之憾深矣公為黃之會以平之存耕趙氏曰魯不量己之力不足以敵齊而輕挾紀以為戰今不知己之力不足以平齊而輕會齊以為盟義又見隱元年盟于蔑髙氏曰紀懼齊之見圖每為之備而齊人多詐故為此盟示之以不疑俾之弛怠而不我慮是以尋盟既退魯遂與齊戰于奚二年齊遂遷紀之三邑足以知盟之無益而攻伐隨之矣二月丙午公及邾儀父盟于趡趡翠軌切及左氏作會陸氏曰或作及故知誤也杜氏曰趡魯地義見隱元年盟于蔑戴氏曰隱公初與邾盟于蔑其後躬自伐邾桓公今與邾盟于趡未數月即與宋衛伐邾夏五月丙午及齊師戰于奚榖梁作郎公羊無夏字闕文也杜氏曰奚魯地愚謂齊擅興師其惡可知矣然魯遽與戰則過矣故髙氏曰二國春方盟會而夏遽交戰彼與師而來則魯宜有以諭之凡戰由主人主人服罪則不戰矣此書及齊人戰于奚又罪魯也存耕趙氏曰春盟而夏戰盟非信盟戰非義戰也孫氏曰莊九年及齊師戰于乾時僖二十二年及邾人戰于升陘皆此義也六月丁丑蔡侯封人卒義見隱三年宋公卒秋八月蔡季自陳歸于蔡季杜氏曰封人弟即獻舞也何氏曰獻舞之兄前說近是榖梁曰自陳有奉焉爾愚謂封人有子無子弗可考今據經而論季以弟而倚陳歸國是不有天子與先君之命也癸巳葬蔡桓侯杜氏曰三月而葬速義見隱三年葬宋穆公此稱本爵為得正但為私諡書耳王氏曰隱八年經蔡侯考父卒葬稱宣公宣十七年蔡侯申卒葬稱文公其後書葬皆稱公者若葬景公靈公平公昭公唯封人卒葬稱桓侯案左氏桓侯而下有哀侯景侯靈侯平侯昭侯蓋蔡人諡其君或公或侯兩稱之耳邦衡胡氏曰生有黜陟沒有諡王者柄此以别臣下賢不肖而使人有勸懲也晉侯仇卒於平王之時諡曰文侯以諡加本爵足以知命於天子也是後周益衰諸侯沒者不復請諡於王五等一稱公乃臣子之自諡此稱侯者亦臣子自諡爾書者見其稱公稱侯皆臣子私為之也萬人傑問蔡桓侯文定以為蔡季之賢知請諡如何朱子曰只是文談及宋人衛人伐邾莘老孫氏曰邾前年來朝又此年盟于趡今遽帥二國之人伐親附者所以見會盟無信而朝事不暇强大縱橫而弱小見陵也義又見隱二年鄭伐衛張氏曰桓公春與齊邾盟既而皆背之戰奚伐邾並見於一年之中反顧前日刑牲詔神玉帛交錯如敝屣蓋其為人瀆信而好盟不仁而佳兵人理滅矣宜其不踰年而見殺於齊也冬十月朔日有食之趙氏曰不書曰或史有闕或傳寫誤義見隱三年十有八年春王正月公會齊侯于濼公與夫人姜氏遂如齊濼盧篤切又力角切公羊無與字蓋闕文杜氏曰濼水在濟南歷城縣西北入濟公本與夫人俱行至濼公與齊侯行會禮故先書㑹于濼既會而相隨至齊故曰遂左氏曰公將有行遂與姜氏如齊申繻曰女有家男有室無相瀆也謂之有禮易此必敗公會齊侯于濼遂及文姜如齊齊侯通焉公謫之以告孫氏曰易稱女正位乎內男正位乎外男女正天地之大義也今桓公不能內正夫人之位而與之外如强齊以致弒逆宜哉康侯胡氏曰案齊詩惡魯桓微弱不能防間文姜至使淫亂為二國患為亂者齊姜而春秋罪桓公治其本也易曰夫夫婦婦而家道正夫不夫則婦不婦矣乾者夫道也以乘御為才坤者婦道也以順承為事易著於乾坤述其理春秋施於桓公見其用夏四月丙子公薨于齊丁酉公之喪至自齊殺而書薨義同隱公杜氏曰不言戕諱之也榖梁曰其地於外也左氏曰丙子享公使公子彭生乘公公薨于車魯人告於齊曰寡人畏君之威不敢寧居來修舊好禮成而不反無所歸咎惡於諸侯請以彭生除之齊人殺彭生愚謂魯軌篡弒天子不征諸侯不討魯人戴之為君彼自恃其無誰何也於是黨亂賊淩小國背盟結怨黷武殘民不奔王喪怠忽宗祀成亂取賂儼朝同列身既不正家遂莫齊卒殄於淫婦之禍夫姜氏諸兒之惡不待言而著矣然自作孽者幸免王誅難違乎天矣春秋比書十八年之事而終之以此有以為永鑒哉張氏曰魯君見弒有二在內則不書地以存其實在外則不容不書其地而以上下文見之此先與夫人姜氏如齊而明年書夫人孫于齊又莊公不書即位雖不明書齊人戕公而桓公之不得其死已昭然矣蓋本國之事書之與他國同則非所以見尊君親上之意是以桓公見殺不得不諱又當不沒其實以示後世之傳信故曰婉而成章也愚謂此亦舊史之法仲尼因之云耳秋七月冬十有二月己丑葬我君桓公杜氏曰九月而葬緩也髙氏曰稱我君别外喪也稱我君而後舉諡臣子之敬辭也義同隱三年葬宋穆公獻可杜氏曰禮諸侯薨請於天子大夫卒諡於君大行受大名小行受小名所以懲惡勸善也周衰諸侯變古易常是以外諸侯書葬者九十三內書葬者九豈非謹其禮之失邪春秋本義卷五
