body:
  text: 春秋本義卷七元程端學撰莊公十年春王正月公敗齊師于長勺上酌切不書伐而書敗某師書法與隱十年公敗宋師于菅同後不復解杜氏曰長勺魯地左氏曰齊師伐我公將戰曹劌請見其鄉人曰肉食者謀之又何閒焉劌曰肉食者鄙未能逺謀乃入見問何以戰公曰衣食所安弗敢專也必以分人對曰小惠未徧民弗從也公曰犧牲玉帛弗敢加也必以信對曰小信未孚神弗福也公曰小大之獄雖不能察必以情對曰忠之屬也可以一戰戰則請從公與之乘戰于長勺公將鼓之劌曰未可齊人三鼔劌曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師既克公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之未詳信否存耕趙氏曰小白報乾時之役也魯師敗矣子糾殺矣亦可以已乎愚謂魯亦有以召之其幸而勝不足論也義又見隱二年鄭伐衞二月公侵宋侵者侵其疆界也康侯胡氏曰詩曰侵自阮疆書曰侵于之疆是也髙氏曰公既敗齊師又乘勝加兵於宋非義之甚也愚謂諸侯無王命而聲辠致討辠也況無王命以侵人之國殘民黷武不容誅矣義與隱二年鄭伐衞同榖梁曰深其怨於齊又退侵宋以衆其敵惡之貫道王氏曰所以啓次郎之師也春秋書侵五十八三月宋人遷宿遷國者奪其地利形勢而徙其國都於他所或又以為附庸也不言遷於某地者葉氏曰以遷人為辠義不在地也宿見隱元年孫氏曰宿微國天子封之宋人遷之其惡可知也義又見元年齊遷紀郱鄑郚此則遷國甚矣康侯胡氏曰遷宿者宿非欲遷為宋人之所遷也懐土常物之大情遷國重事也雖違害就利去危即安猶或恐沈於衆不肯率從而况廹於横逆非其所欲棄久宅之田里刈新徙之蓬藋道途之勤營築之勞起怨咨傷和氣豈不惻然有隱乎肆行莫之顧也其不仁亦甚矣凡書遷惡自見矣夏六月齊師宋師次于郎公敗宋師于乘丘杜氏曰乘丘魯地張氏曰興仁府乘氏縣愚案齊宋之師次于郎而獨敗宋師于乘丘豈宋師先進于乘丘邪左氏曰齊師宋師次于郎公子偃曰宋師不整可敗也宋敗齊必還請擊之大敗宋師于乘丘齊師乃還常山劉氏曰二國揚兵駐師而不名所伐欲闚利乘便快攻取之意魯又不能推忠信奉文告以止齊宋之師而覆敗其軍次者不以義勝者不以道交譏之也義又見隱二年鄭伐衞獻可杜氏曰公不能復讎而反納子糾以啓齊之寇又侵宋以衆其敵致二國同次于郎公雖敗宋不足為美秋九月荆敗蔡師于莘以蔡侯獻舞歸杜氏曰荆楚本號後改為楚莘蔡地張氏曰成王初封熊繹於丹陽江陵之枝江縣也自荆子熊通侵伐漢東諸侯其國始大僭號稱王今其子熊貲始敗蔡浸内侵矣左氏曰蔡哀侯娶于陳息侯亦娶焉息媯將歸過蔡蔡侯曰吾姨也止而見之弗賔息侯聞之怒使謂楚文王曰伐我吾求救於蔡而伐之楚子從之未詳信否張氏曰於此見王政不行楚盡漢陽諸姬之始陳氏曰春秋書之見王室之不匡也後倣此髙氏曰諸侯死社稷正也逃之辠也虜賤甚矣義又見隱七年戎伐凡伯愚案隱公會戎盟戎致凡伯見伐戎禍稍息而狄伐邢衛荆楚伐蔡皆由王法大壊諸侯自相侵伐列國勢分中外莫辨故荆楚内侵而近者首被其禍不可復制春秋之末漸主夏盟楚衰而吳繼之吳衰而越繼之蠻夷之盛至於越而春秋終矣王綱盡矣故君子常防患於未然而春秋比書其本末為履霜之戒也冬十月齊師滅譚譚子奔莒譚徒南切公羊作十一月杜氏曰譚國在濟南平陵縣西南張氏曰在濟南府歴城縣滅者夷其社稷覆宗絶祀也公羊曰何以不言出國已滅矣無所出也愚謂不名闕文也存耕趙氏曰譚雖小國先王所封王封之惟王滅之亦必當其辠也小白亦諸侯也可滅之乎胡氏曰言奔莒不死社稷也陳氏曰書滅始於此春秋之際滅國三十六五伯為之也微桓公則滅國之禍不接跡於天下薛氏曰五伯桓公為盛威陵諸侯以圖伯功首滅天子之建侯以肆威耳儒者之不道也宜哉十有一年春王正月夏五月戊寅公敗宋師于鄑子斯切杜氏曰鄑魯地愚謂齊遷紀鄑邑當為紀地豈偶同名邪左氏曰宋為乘丘之役故侵我公禦之敗諸鄑存耕趙氏曰宋報復之師也屢役不勝可以已矣莊公以兵始禍屢勝鄰國能無悔乎義又見隱二年鄭伐衞胡氏曰二年之中三敗齊宋之師以深其怨秋宋大水康侯胡氏曰凡外災告則書東萊吕氏曰其顯然為衆所知者亦不待告也義見桓元年康侯胡氏曰凡志災見春秋有謹天戒恤民隱之心東萊吕氏曰春秋之世災異多矣聖人不能盡書取其一二甚者以為後世戒冬王姬歸于齊劉氏曰我主之也孫氏曰羣公受命主王姬者多矣唯元年與此年書者惡公忘父之讎再與齊接婚也邦衡胡氏曰婚姻之道不正其始則終必亂齊再娶王姬婚姻不正莫甚焉非惟惡公忘讎而主婚亦以志小白篡立王不能正反薦女以結之也存耕趙氏曰二姬皆莊王女一為姑一為婦非倫也未詳是否十有二年春王三月紀叔姬歸于酅叔姬即隱七年歸于紀者也孫氏曰伯姬之媵也酅紀季以入齊之邑也啖氏曰稱紀言紀之婦也宋氏曰國滅夫死託身讎國書歸不當歸也獻可杜氏曰紀侯去國則叔姬歸父母之國可也愚謂國君死社稷其兄弟臣妾可知也紀國既亡叔姬死之可也而歸依於叛兄之叔失節甚矣孫氏曰歸于酅者歸于季也歸者嫁辭以伯姬之媵而歸于季非其所歸亂也未詳是否夏四月秋八月甲午宋萬弑其君捷及其大夫仇牧捷公羊作接張氏曰萬南宫長萬多力之士捷閔公名也左氏曰乘丘之役公以金僕姑射南宫長萬公右歂孫生搏之宋人請之宋公靳之曰始吾敬子今子魯囚也吾弗敬子矣病之秋宋萬弑閔公于蒙澤遇仇牧於門批而殺之遇太宰督於東宫之西又殺之立子游公羊曰萬嘗與莊公戰獲乎莊公莊公歸散舎諸宫中數日然後歸之反為大夫於宋與閔公博婦人皆在側萬曰甚矣魯侯之淑魯侯之美也天下諸侯宜為君者唯魯侯爾閔公矜此婦人妬其言顧曰此虜也爾虜焉故魯侯之美惡乎至萬怒搏閔公絶其脰仇牧聞君弑趨而至遇之於門手劒而叱之萬臂摋仇牧碎其首齒著乎門闔孫氏曰及其大夫仇牧甚之也劉氏曰仇牧之智則未仇牧之忠則盡矣疾其疾而忘其力憂其憂而忘其生仇牧可謂不畏强禦矣愚謂弑君之賊惡極辠大矣然宋湣逆王命納衞朔逼遷宿國次師取敗狎近宋萬皆足以殺其身者也義又見桓二年宋督事莘老孫氏曰春秋死難之臣三人而已孔子書之無異文孔子曰以道事君不可則止又曰既明且哲以保其身事君而至於殺身君子不為也事君之日久則君必信我而言必用也道不行言不信猶在其位苟禄也苟禄而事君固位而見殺孔子又何取乎三人者之謂善乃孔子為不能死者設耳非孔子之所謂善也冬十月宋萬出奔陳孫氏曰弑君之賊當急討之萬八月弑湣公十月出奔宋之臣子緩不討賊若此常山劉氏曰弑君叛國凡民罔不憝況均諸侯哉書所奔之國則受之之辠亦自見也十有三年春齊侯宋人陳人蔡人邾人會于北杏齊侯榖梁作齊人杜氏曰北杏齊地莘老孫氏曰齊侯稱爵而諸侯皆稱人者齊桓將伯諸侯未甚尊之但遣其臣往爾然齊方求諸侯亦不卑之而與之會也黄氏曰衣裳之會十有一北杏實為之首自周東遷諸侯紛紛若鬭獸今而後知尊周室矣故孔子曰九合諸侯一匡天下民到于今受其賜胡氏曰桓公徒有尊周之名無尊周之實觀其貪土地之廣恃甲兵之衆强制諸侯約之以會要之以盟臨之以兵其有不循者小則侵之伐之甚則執之滅之其實假尊周之名以自封殖耳孫氏曰案周禮九命作伯得專征諸侯若五伯者皆非命伯故孟子曰三王之辠人也愚案伯者之功過如此義又見隱九年會于防孫氏曰二十七年王使召伯賜齊侯命僖二十八年内史叔興父策命晉侯為侯伯此亂世之事非盛王意也康侯胡氏曰春秋之世以諸侯而主天下會盟之政自北杏始愚謂齊桓晉文盟會侵伐若有異於其他諸侯合黨報復貪利黷武之為然其相去蓋一閒耳孔子曰天下有道禮樂征伐自天子出天下無道禮樂征伐自諸侯出桓文既非命伯又不請命於天子其所令於諸侯者不過假大義以濟私欲三王之道其名似存其實己去春秋一切書之為後世鑒所謂其事則齊桓晉文其義則丘竊取之者也蓋自孟子而下知其意者惟董子焉故曰正其義不謀其利明其道不計其功或者乃謂聖人與之而無譏往往為説較伯業之大小而不及聖人之所指則誤矣故愚於桓文之會盟侵伐一切書之曰義見某年某事明其與其他諸侯之不甚相逺也若其事之近義者則各著其説於本文之下蓋孟子所謂彼善於此邵子所謂功過不相揜者在讀者詳焉夏六月齊人滅遂榖梁曰遂微國也存耕趙氏曰舜之後也杜氏曰遂國在濟北蛇丘縣東北髙氏曰北杏之會諸侯尚有未服者桓公於是滅遂以示威義見十年齊滅譚而此又為十七年齊人殱于遂起文也王氏曰桓公圖伯未為諸侯所附當崇禮義以懐來之而乃伐魯滅譚今又滅遂皆强力以報私憾張氏曰於此見其已亡惻隱之心故凡其合於仁者孟子皆以為假秋七月冬公會齊侯盟于柯古何切杜氏曰此柯濟北東阿齊之阿邑張氏曰東平府東阿縣左氏曰始及齊平也張氏曰莊公自齊桓入國屢與之戰雖一再勝而齊方修軍政以圖伯魯有見伐之虞至此始及齊平齊桓亦知魯未可取故不復以用於譚遂者待魯亦足以見桓公屈意和魯皆伯術也愚案伯者之盟諸侯始此但此則離盟耳義又見隱元年盟于蔑十有四年春齊人陳人曹人伐宋夏單伯㑹伐宋康侯胡氏曰稱人者將卑師少也劉氏曰伐宋之時魯本不與謀後聞乃遣大夫往耳左氏曰宋人背北杏之㑹春諸侯伐宋取成於宋而還程子曰齊自管仲為政莊十一年而後未嘗興大衆也其賦於諸侯亦寡矣終管仲之身息養天下厚矣至於秦晉使之不競而已不强致也是以功卑而易成邦衡胡氏曰齊桓非天王命而專伐亦春秋之所惡也孟子曰天子討而不伐五伯摟諸侯以伐諸侯三王之辠人也義又見隱元年鄭伐衞康侯胡氏曰齊蓋以節制用兵故能南摧强楚西抑秦晉或以為貶齊稱人誤矣秋七月荆入蔡義見莊十年荆敗蔡師髙氏曰十年荆敗蔡師執其君今又入其國夷狄輕中國如此冬單伯會齊侯宋公衞侯鄭伯于鄄音絹一音真孫氏曰經以單伯為文者凡盟會公或大夫皆以魯主其會為文春秋魯史故也存耕趙氏曰齊序宋上推齊伯也杜氏曰鄄衞地東郡鄄城也張氏曰濮州鄄城縣左氏曰宋服故也義見隱九年會于防胡氏曰夫禮别嫌明微制治于未亂自天子出者也列國之君自相會聚是禮自諸侯出矣以國君而降班以會大夫以大夫而出位以伉諸侯是禮自大夫出矣君若贅旒陪臣執命豈一朝一夕之故哉故易於坤之初六曰馴致其道至堅冰也易言其理春秋見諸行事若合符節可謂深切著明矣十有五年春齊侯宋公陳侯衞侯鄭伯會于鄄陳入春秋居衞下今先衞者杜氏曰陳侯介於齊楚之閒為三恪之客齊桓因而進之未詳是否左氏曰春復會焉齊始伯也義見隱九年會于防孫氏曰桓公帥諸侯尊周室其實帥諸侯以尊己假尊王之名以令諸侯約之以會要之以盟臨之以威制之以力也莘老孫氏曰齊桓欲成伯業故為鄄之會以帥諸侯然春秋書之與無事而會盟者等爾蓋春秋之意以謂齊桓公功則可取而道猶未也春秋王道之極致故桓文之功其辭無襃夏夫人姜氏如齊莘老孫氏曰姜氏但歸寜耳然經書之與齊襄之事等者蓋婦人以夫家為歸一適其夫則終身不返父母没雖兄弟不往所以預為之嫌而防逆亂之將萌也齊柦雖無齊襄之事蓋非禮之跡同也姜氏之惡不可勝誅矣然為齊桓者不能無辠張氏曰文姜播惡於齊襄之時桓公欲圖伯業則絶之於齊義也以欲求魯之故而不監覆車之轍豈非未聞行一不義雖得天下不為之法乎此孔門所以不道伯者也許氏曰鄄之會魯尚未從齊侯以為未能比近無以示逺務在求好於魯是以於此受文姜而不逆以昭親親而齊魯之交卒合然禮防一弛則夫人復啓越境之恣而遂有如莒之事秋宋人齊人邾人伐郳五兮切公羊作兒范氏曰宋主兵故序齊上也愚謂諸侯親伐則伯主序宋上今大夫主兵則宋仍序齊上耳左氏曰諸侯為宋伐郳未詳信否郳見五年義見隱二年鄭伐衞鄭人侵宋左氏曰諸侯伐郳鄭人閒之而侵宋張氏曰閒諸侯伐郳而侵宋不誠於服齊而背二鄄之會鄭之反覆於齊楚之閒蓋始於此義又見十年公侵宋冬十月十有六年春王正月夏宋人齊人衞人伐鄭宋序齊上與伐郳同左氏曰諸侯伐鄭宋故也愚謂鄭有辠矣齊桓此伐有名矣惜乎齊桓非受命之伯以王道正之猶有辠也所謂彼善於此者皆此類也義又見隱二年鄭伐衞秋荆伐鄭義見十年荆敗蔡師莘老孫氏曰前年荆嘗入蔡於是又伐鄭焉所以見荆蠻之强中國之衰也戴氏曰楚將憑陵中國蔡當其衝首罹其害自鄭從幽之盟楚不敢窺鄭者十有餘年齊桓之力也冬十有二月公會齊侯宋公陳侯衞侯鄭伯許男曹伯滑伯滕子同盟于幽左氏榖梁無公字陳岳氏曰闕文也左氏無曹伯二字杜氏曰滑國都費河南緱氏縣或曰今滑州也幽宋地髙氏曰許男先於滑伯滕子者是時伯主以意升降或諸國自以强弱相上下聖人因書之以見先王之制不復列於當時也劉氏曰同盟者殷同之盟也古者諸侯之於天子春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰會殷見曰同同盟之禮見於覲禮為壇祀方明方伯臨之古者六歳而會十二歳而盟桓非受命之伯假同盟之禮率諸侯以尊天子蓋自是始伯也張氏曰古者方嶽有同盟以示其考禮修德以尊天子之意桓公至此以諸侯既授以事而伯業定因舉是禮約束諸侯尊周以掩其無王命之事與伐楚而舉召康公之命相似自此欲制諸侯而脅從之者皆稱同盟其無王命假古誼以制與國一也而善惡則各繫於其事焉榖梁稱桓公未嘗有歃血之盟而孟子於葵丘之會亦曰諸侯束牲載書而不歃血夫子所謂桓公九合諸侯不以兵車此蓋其衣裳大會之始也揚雄以習亂為春秋不得已而與齊晉蓋得春秋之㫖矣君舉陳氏曰王者不作舉天下而聽命於一邦古未之有也存耕趙氏曰桓公無王命而稱伯儼然於列國之上諸侯不知有王也後倣此義又見隱元年盟于蔑葉氏曰有盟有同盟者周官曰時見曰會殷見曰同又曰時會以發四方之禁殷同以施天下之政二者非諸侯見王之節王合諸侯而見之者也朝覲宗遇以禮見王而已若有征伐以討不庭則命方伯連帥而諸侯從焉此之謂時會故曰發四方之禁王十二歳一廵狩諸侯會於方嶽之下而受命王不廵狩則合諸侯受命於王國此之謂殷同故曰施天下之政小白圖伯諸侯之從者日衆故假殷同之禮而行焉故此年同盟于幽至二十七年而再同盟歴十有二年用天子殷見之禮也邾子克卒莘老孫氏曰克者儀父之嗣君至是始稱子者嘗從齊桓會盟侵伐故進之為子也陸氏曰克儀父名齊桓請王命以為諸侯故曰子皆無所考竊謂邾本子爵隱元年稱邾儀父者大夫也大意見隱七年滕侯卒十有七年春齊人執鄭詹公羊作瞻不言何辠執之者義不在辜而在於執也後倣此胡氏曰前年同盟于幽今春執之安用盟邦衡胡氏曰況無王命而專執乎愚謂又為鄭詹逃來起文也康侯胡氏曰惡齊之辭也以責人之心責己則盡道以愛已之心愛人則盡仁張氏曰諸侯不服則修德以來之而執其大夫則小國之從齊者皆出於力不贍而非有心悦誠服之意可見矣夏齊人殱于遂殱子亷切公羊作瀐殱者滅之盡也左氏曰齊人滅遂而戍之夏遂因氏頜氏工婁氏須遂氏饗齊戍醉而殺之齊人殱焉啖氏曰不言遂人殱之言齊人自取其滅也張氏曰案十三年滅遂置戍今乃見殱於亡國之遺民蓋絶滅社稷以及其君慮其民之思舊主而以兵力强制之不知彼心不服吾力稍怠必有出於意料之外者蓋王者之道貴於興滅繼絶而齊人滅遂不止於殺一不辜而已以至於自殱其衆也康侯胡氏曰春秋書此見齊人滅遂恃强陵弱非伐辠弔民之師夫以亡國餘民能殱强齊之戍則申胥一身可以存楚楚雖三戸可以亡秦固有是理足為强而不義之戒而弱者亦可以省身而自立矣莘老孫氏曰春秋之義凡自取之者以自取為義齊人為遂所殺非遂人之辠齊自取之爾梁亡非人亡之梁自亡爾鄭棄其師非他國敗之鄭自棄爾殱于遂辠齊之深而憫遂之滅也秋鄭詹自齊逃來陸氏曰凡言逃者皆謂義當留而竊去者也康侯胡氏曰逃匹夫之事也詹效匹夫之行遁逃苟免不知命也同盟于幽而魯首叛盟受其逋逃虧信義矣邦衡胡氏曰齊桓無王而專執雖曰非義詹為大臣不能守死以紓國患而遁逃苟免非惟身之羞國之羞也劉氏曰譏逃也以為義死制云乎以為不義死道云乎君子不曰幸而免詹自以為有辠邪雖死之可矣自以為無辠邪尚何逃之有詹恐其無辠見殺因逃而苟免不足為大夫冬多麇張氏曰麋鹿之大者魯所常有多則為異山隂陸氏曰隂盛所感惡氣之應也公羊曰記異也莘老孫氏曰春秋以有為災則書有有􅈮是也以無為異則書無無冰是也至於麋者常有之物不可為異惟其多則書之康侯胡氏曰書此亦禹放龍蛇周公逺犀象之意也十有八年春王三月日有食之存耕趙氏曰不書日與朔舊史失之也義見隱三年莘老孫氏曰春秋日食有書日書朔者有書日而不書朔者有日與朔皆不書者書日書朔日食正朔舊史之詳備孔子因之以傳信也日而不朔者食不在朔或在晦或在二日也日朔皆不書者舊史所無孔子闕之以傳疑也春秋之閒日食不書朔與日者惟二而已亦足以知舊史所闕者少也愚謂或經成而後闕之亦不可知也夏公追戎于濟西杜氏曰戎來侵魯公逐之於濟水之西莘老孫氏曰禦戎之道來則拒之去則勿追啖氏曰去社稷逺追戎也秋有􅈮影逼切或作蜮康侯胡氏曰􅈮魯所無也故以有書陸璣曰􅈮短狐也一名射影如鼈三足在江淮水中人在岸上影見水中投人影則射故曰射影或謂含沙射人皮肌其瘡如疥公羊曰記異也左氏曰為災也山隂陸氏曰􅈮隂物也麋亦隂物也陽淑消而隂慝長此惡氣之應張氏曰是時文姜為亂其遺毒餘患至於哀姜卒成篡弑之禍物類之感天之示人顯矣冬十月十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟杜氏曰公子結魯大夫劉氏曰媵者送女也陳人者陳大夫公羊曰大夫無遂事莘老孫氏曰陳人娶姬姓之女魯使其臣公子結媵之結行至鄄遂盟齊侯宋公是時齊桓方伯而宋又强國公子結不終媵事而欲交歡伯主終之齊宋皆怒陳亦棄好是年之冬三國皆來伐我西鄙由公子結之遂事召之義又見隱元年盟于蔑啖氏曰凡媵常事不書為公子結遂事起本也東萊吕氏曰凡書大夫遂者四公子遂如京師遂如晉仲孫蔑會晉荀罃遂城虎牢季孫宿救台遂入鄆與此公子結媵婦遂及齊宋盟也夫人姜氏如莒杜氏曰非父母之國而往書姦莘老孫氏曰婦人無專行之禮故雖父母之國惟父母在得歸寧父母没雖兄弟不往況他國乎惡自見矣張氏曰文姜比年如莒春秋詳書蓋與詩之變風相應當時一反關睢麟趾之化而中國之俗於是大亂冬齊人宋人陳人伐我西鄙杜氏曰鄙邊邑常山劉氏曰諸侯來侵伐不至國都皆書某鄙髙氏曰公之事齊後於諸侯又受鄭詹而公子結又以私事取怒焉故齊連陳宋來討之愚謂齊人摟諸侯以伐諸侯固有辠也然魯之君臣亦有以召之義又見隱二年鄭伐衞存耕趙氏曰春秋書魯之被兵逺不及國則言鄙此類是也近國則書其地郎乗丘是也至言伐我則寇深矣二十年春王二月夫人姜氏如莒義見十九年康侯胡氏曰十五年姜氏如齊至是再如莒而春秋書者禮義天下之防也其禁亂之所由生猶防止水之所自來也衞女嫁於諸侯父母終思歸寧而不得故泉水賦許穆公夫人閔衞之亡思歸唁其兄而阻於義故載馳作聖人錄於國風以訓後世使知男女之别自逺於禽獸也今夫人如齊以寧其父母而父母已終以寧其兄弟又義不得宗國猶爾而況如莒乎婦人從人者也夫死從子而莊公失子之道不能防閑其母禁亂之所由生故初會于禚次享于祝丘又次如齊師又次會于防于榖又次如齊如莒又再如莒此以舊防為無所用而廢之者也是以至此極觀春秋所書之法則知防閑之道也夏齊大災災見桓十四年此書大則災之甚也人事不理則責見於天春秋書之使後世懼天威也懼天威則謹人事矣惡可曰適然而已乎莘老孫氏曰春秋之時皇極之道汨没不敘而天下災異不可勝紀故春秋但取其著者書之惟宋齊陳鄭三數大國而已蓋舉近可以明逺記大可以知小也秋七月冬齊人伐戎榖梁作我張氏曰戎在徐州之域最近齊魯故先治之許氏曰戎自春秋之初即見荆乃後起故攘中國之患宜莫先戎真氏曰案大災之餘不知恐懼修省而遽勤兵以伐戎愚謂戎為中國患天子方伯不能治而齊桓伐之中國以寧此其功也然桓非受命之伯不告於王而專伐之此其辠也二十有一年春王正月夏五月辛酉鄭伯突卒夾漈鄭氏曰厲公也立四年奔而昭公忽入立立二年遇弑而子亹立立一年齊人殺之而子儀立立十四年傅瑕殺之而納厲公厲公復入七年卒而文公捷立未詳信否張氏曰突鄭莊公之孽子莊公既卒即奪忽之位而篡之中閒雖為祭仲所逐旋入于櫟卒取鄭國故論者以為始終能君夫篡弑竊國之人而春秋終始君之且復記其卒於位豈真與之哉所以著小人肆志亂臣賊子得以終於其位王法不行而世之所由亂也義又見隱三年宋公卒秋七月戊戌夫人姜氏薨張氏曰文姜之行惡矣而卒以國君之母寵榮終身一用小君之禮此魯之禍所以未艾必至於莊公之終兩君弑哀姜慶父誅而後魯亂始息也黄氏曰文姜之惡極矣春秋終始以夫人之禮書之然則孰謂春秋奪人之爵或至貶及天王哉亦實書其事而善惡自見耳冬十有二月葬鄭厲公杜氏曰八月而葬緩慢也義見隱三年葬宋穆公春秋本義卷七
