body:
  text: 春秋本義卷一元程端學撰杜氏曰春秋者魯史記之名也史之所記必表年以首事年有四時故錯舉以為所記之名也隱公名息姑惠公之庶子隱私諡也魯侯爵而稱公者康侯胡氏曰臣子之辭春秋從周之文而不革者也啖氏曰西周紀傳皆以本爵春秋時則皆稱公夫子因而書之以明其僭也愚謂春秋魯史也在魯稱公為臣子之辭若書葬某國某公者皆僭稱公也後倣此程子曰夫子道既不行於天下於是因魯春秋立百王不易之大法平王東遷在位五十一年卒不能復興先王之業王道絶矣孟子曰王者之迹熄而詩亡詩亡然後春秋作適當隱公之初故始於隱公孫氏曰春秋之始於隱公者非他以平王之所終也平既不王東遷之後周室微弱諸侯強大朝覲不修貢職不奉號令無所束賞罰無所加壞法易紀變禮亂樂弒君戕父攘國竊號征伐四出蕩然不禁天下之政皆諸侯分裂之平王莫能中興逮隱而死故詩自黍離而降書自文侯之命而絶春秋自隱公而始也木訥趙氏曰凡諸儒欲以一事當春秋之始者皆妄也元年春王正月公羊曰元年者何君之始年也春者何歲之始也曷為先言王而後言正月王正月也何言乎王正月大一統也趙氏曰天子常以今年冬頒明年正朔於諸侯諸侯受之每月奉月朔甲子以告於廟所謂稟正朔也故曰王正月言王之所以班也葉氏曰王者以正朔一天下故協時月正日者天下無不同諸侯繼世而有其國故即位建始者各得稱元年以自異後倣此朱子曰三王之正不同周用天正矣而七月一詩又皆以人正為紀何也所謂改正朔者改歲首爾月不可易也愚案此朱子晚年之説以此推之則正月者建寅之月也凡事繫日日繫月月繫時時繫年古今紀事之常法也孔子因魯史之舊無所加損亦未嘗寓意於其間孟子曰其文則史敘事且然況敘年時日月乎凡言春王二字為孔子所加者求之過者也又案春秋凡一時無事必書首月以正四時惟此及莊元年三月雖有事而亦書正月者以一公之始也義又見六年秋七月王氏曰不書即位禮之不舉者也蓋隱公不行即位之禮魯史不書故孔子不得而益耳然未詳其所以不舉之故餘見辨疑或問三月公及邾儀父盟于蔑亡結切邾公羊作邾婁與禮記擅弓同蓋齊人語也後皆同蔑公羊穀梁作昧程子曰或不日因舊史也古史記事簡略日月或不備春秋因舊史有可損而不能益也愚謂或有闕文亦有事當繫月繫時如螟螽旱飢無冰無麥禾之類是也後倣此公羊曰及與也程子曰內為主稱及莘老孫氏曰及者以內而及外因此而及彼愚謂亦有直訓與者如公及宋公遇于清平莒及郯城邾及防之類是也後倣此范氏曰邾附庸國孔氏曰曹姓顓頊之後武王封其苗裔邾俠為附庸居邾王制曰不能五十里不合於天子附於諸侯曰附庸杜氏曰魯國鄒縣張氏曰後為襲慶府鄒縣公羊曰儀父者字也髙氏曰附庸稱字同命卿也少胡戴氏曰儀父邾大夫如慶父歸父行父丕鄭父陽處父之類愚謂後書邾子卒則邾本子爵小國一卿邾自當有大夫戴説近是周禮天官玉府職曰若合諸侯則共珠盤玉敦夏官戎右職曰盟則以玉敦辟盟遂役之贊牛耳桃茢秋官司盟職曰掌盟載之法凡邦國有疑會同則掌其盟約之載及其禮儀北面詔明神故春秋諸侯之盟倣此而損益耳杜氏曰蔑姑蔑魯地魯國卞縣南有姑城鄭樵云兖州瑕邱縣有姑蔑城獻可杜氏曰周禮司盟凡邦國有疑則掌其盟載之約蓋天子設諸侯會盟之禮而諸侯不得專之周衰會同禮廢列國擅相盟會而不務信孫氏曰盟者亂世之事故聖王在上闃無聞焉斯蓋周道陵遲衆心離二忠信殆絶譎詐交作于是列國始有歃血要盟之事凡書盟皆惡之也仲培戴氏曰隱公居父喪而講嘉禮廢王覲而崇私交後凡書盟倣此而此又為七年伐邾起文也髙氏曰諸侯各守疆域非有王事不得自出境邾與魯伉盟則能病魯故隱公屈已而與之盟趙氏曰王綱壞則諸侯恣而仇黨行故干戈以敵讐盟誓以固黨天下行之遂若恆焉若王政舉則諸侯莫敢相害君道立則信著而義逹盟何為焉觀春秋之盟有以見王政之不行而天下無賢侯也胡氏曰周禮珠盤玉敦之制皆妄言也大抵盟者亂世之事豈有天子與諸侯歃血為盟之事哉未詳是否夏五月鄭伯克段于鄢于晚切趙氏曰當作塢夏五月者凡一時無事書首月有事則書其事之月魯史常法也後倣此鄭伯莊公寤生也孔氏曰鄭國伯爵姬姓宣王封母弟桓公友於鄭京兆鄭縣是也杜氏曰在滎陽宛陵縣西南張氏曰後為鄭州新鄭縣朴鄉呂氏曰克勝其徒衆若敵國云爾公羊曰段鄭伯弟也愚謂段不稱公子再命大夫也杜氏曰鄢潁川鄢陵縣張氏曰後屬開封府左氏曰初鄭武公娶于申曰武薑生莊公及共叔段莊公寤生驚薑氏遂惡之愛共叔段欲立之亟請於武公公弗許及莊公即位為之請制公曰制巖邑也虢叔死焉他邑惟命請京使居之謂之京城太叔祭仲曰都城過百雉國之害也先王之制大都不過參國之一中五之一小九之一今京不度非制也君將不堪公曰薑氏欲之焉辟害對曰薑氏何厭之有不如早為之所無使滋蔓蔓難圗也蔓草猶不可除况君之寵弟乎公曰多行不義必自斃子姑待之既而大叔命西鄙北鄙二於已公子吕曰國不堪二君將若之何欲與大叔臣請事之若弗與則請除之無生民心公曰無庸將自及大叔又收二以為已邑至于廪延子封曰可矣厚將得衆公曰不義不昵厚將崩大叔完聚繕甲兵具卒乘將襲鄭夫人將啓之公聞其期曰可矣命子封帥車二百乘以伐京京叛大叔段段入于鄢公伐諸鄢孫氏曰段鄭伯弟以鄭伯之力始勝之者見段驕悍難制鄭伯至于用兵此鄭伯不兄段不弟交譏之張氏曰仁人之于弟不藏怒不宿怨親愛之而已矣其或不中不才亦必正之以義使不格姦厚之以恩使不離富貴令莊公之於叔段無念鞠子哀之心而懷其母偏愛欲奪巳位之恨授之大都而不為之所縱使失道以至于亂方其居京收邑之時可制而不制如鷙鳥將擊而匿形於未發之先稔其惡以待其成及其逆節已露然後以冦讐之法討之以力勝為事必誅為期莊公非特以段之不才棄之乃其心實欲養成其惡待以冦賊無復天倫之念書曰克段于鄢然後忮忍之心施於同氣者舉形見於筆削之間矣愚謂鄭伯克段于鄢之辭亦史氏立言之法孔子因事立教録之為後世鑒故曰其文則史其義則某竊取之矣秋七月天王使宰咺來歸惠公仲子之賵咺音烜吁阮切賵芳鳯切天王平王也程子曰王者奉若天道故稱天王愚謂此魯史舊法非孔子加天字也公羊曰宰士也咺者名也孔氏曰周禮宰夫職曰凡邦之弔事掌其戒令與其幣器財用鄭元云弔事弔諸侯諸臣幣所用賻也既掌弔事或即充使此蓋宰夫也劉氏曰何以名上士也愚謂來歸來魯歸賵也公羊曰仲子者何桓之母也程子曰惠公之仲子妾稱也君舉陳氏曰古者諸侯不再娶再娶亦妾也與公羊合穀梁曰母以子氏仲子者何惠公之母孝公之妾也劉氏曰妾母繫子與僖公成風同與穀梁合前説近是公羊曰喪事有賵賵者蓋以乘馬束帛車馬曰賵張氏曰士喪禮公賵玄纁束馬兩天子賵諸侯之制未聞康侯胡氏曰天王之尊下賵諸侯之妾加冠於屨人道之大經拂矣天王法紀之宗也賵諸侯之妾是壞法亂紀自王朝始也趙氏曰是啓僭也程子曰夫婦人倫之本最當先正春秋之時嫡妾僭亂聖人尤謹其名分男女之配終身不變者也故無再娶之禮大夫以下內無主則家道不立故不得巳而再娶天子諸侯內職具備后夫人亡可以攝治無再娶之禮春秋之始尚有疑焉故仲子羽數特異僖公而後無復辨矣春秋書之以志僭亂以夫人禮賵人之妾亂倫之甚也張氏曰天子於諸侯有賵禮所以褒有功德而厚其終也惠公牽於私愛寵庶妾之仲子而立為夫人正犯以妾為妻之戒瀆亂夫婦之綱乃天討所當加九伐之法所謂犯令陵政者蓋此類也平王不能正惠公之罪反厚其送終之禮九月及宋人盟于宿公羊曰孰及之內之微者也穀梁曰宋人外卑者也程子曰稱及稱人皆非卿也孫氏曰外稱人內稱及不可言魯人孔氏曰宋國子姓公爵商紂國滅周封微子于宋都商邱穆公和七年即隱之元年也杜氏曰宋梁國睢陽縣張氏曰後為應天府宋城縣杜氏曰宿小國東平無鹽縣凡盟以國地者國主亦與盟未詳是否左氏曰惠公之季年敗宋師于黃公立而求成焉及宋人盟于宿始通也未詳信否愚謂此與盟于蔑同義而此則大夫自盟其僭尤甚又為十年伐宋起文也張氏曰七年伐邾十年伐宋敗師取邑盟之不足恃斷可識矣冬十有二月祭伯來祭側界切祭伯孔氏曰周公之胤張氏曰祭周畿內采地伯爵也畿內諸侯為王卿士來來魯也左氏曰非王命也穀梁曰寰內諸侯非有天子之命不得出會諸侯聘弓鍭矢不出竟埸束修之肉不行竟中有至尊者不二之也張氏曰案內外之辨所以殊尊卑也朝必有玉帛聘必有幣篚諸侯可以相交而王臣之與侯甸不可以相授受所以絶人欲往來之私而嚴尊君事上之禮成周盛時防微杜漸之意殆必如穀梁氏之説矣經書祭伯來所以見周室法度至此蕩然程子曰當時諸侯不修朝覲之禮失人臣之義王所當治也祭伯為王臣不能輔王正典刑而反與之交康侯胡氏曰人臣無私交大夫非君命不越境所以然者杜朋黨之原為後世事君而有二心者之明戒也公子益師卒劉氏曰公之子曰公子公子之尊視大夫大夫三命然後氏後皆倣此益師名也字衆父孝公子此蓋譏諸侯之世卿也大意見左方孫氏曰春秋內大夫卒則書之豈徒記其嵗時著其名氏而已古者諸侯嵗貢于天子天子親命之使還其國為卿大夫故周禮公之孤四命卿三命大夫再命士一命侯伯之卿大夫士亦如之周室既東其禮遂廢故魯三桓子孫終于定哀之世並執其政不復請于天子故孔子書之也朴鄉吕氏曰大夫何以或卒或不卒其卒者必世卿也益師何以卒衆仲之先也公子彄何以卒臧氏之先也無駭何以卒展氏之先也愚案春秋內大夫之見于經者四十有七其書卒者三十或書氏或書名聖人因舊史書大夫卒而不少革者一則可通考春秋始終以觀世變二則可各考其事以見失禮古者諸侯之卿大夫受命于天子三命者氏再命者名隱桓之世猶有無駭翬俠柔溺之徒以名見者僖文以後諸侯專恣無復請命故皆自賜氏此可通考春秋始終以觀世變者也禮王為三公六卿錫衰諸侯緦衰大夫士疑衰首服皆辨絰諸侯為卿大夫服雖無明文然以義推之可知也如仲遂卒而猶繹則是不為服也其書公子牙公子友卒公子慶父奔莒以著三桓之始書公子彄卒以著臧氏之始書仲遂卒以著東門氏之始書叔肸卒以著叔氏之始其後連書仲孫叔孫季孫臧氏東門氏叔氏若子若孫之卒以著世卿之權隨事見義非一例可求此可各考其事以見失禮者也故曰屬辭比事春秋教也二年春公會戎于濳不書首月與繫事之月者此會失其月日故但書春而已若亦書首月則疑此會為正月事故并首月不書此亦魯史常法也後凡但書時者倣此會與之為會禮也劉氏曰西方曰戎啖氏曰戎雖大曰子無大夫會不書名杜氏曰陳留濟陽縣東南有戎城濳魯地左氏曰修惠公之好也戎請盟公辭程子曰周室既衰逺方殊屬有散居中國者方伯大國明大義而攘斥之義也其餘列國慎固封守可也若與之和好以免侵暴非所謂以固吾圉乃所以開其亂源也故春秋尤謹中外之辨公之會戎非義也孫氏曰諸侯非有天子之事不得出會諸侯況會戎乎凡書會皆惡之也高氏曰隱公居喪之際未會諸侯於王朝而先與戎會春會而秋與之盟故書此以見事始也及戎伐凡伯則知魯會盟戎適以貽王室之患耳吕氏曰周禮大宗伯之職曰時見曰會大行人之職曰時會以發四方之禁此言天子有事則合諸侯而命事曰會也曲禮言諸侯相見于隙地曰會此言諸侯將朝天子則先見於間隙之地以習禮儀也曹劌云會以訓上下之則制財用之節由是觀之諸侯無私會必有天子之事而後會焉凡以諸侯而會諸侯皆非正也况會戎乎會而不已必且盟盟而不信必至侵伐有潛之會乃有唐之盟有唐之盟乃有伐伯之事開亂源而召外侮自此一會始也是以春秋惡之夏五月莒人入向舒亮切孔氏曰譜云莒嬴姓少昊之後武王封兹輿期于莒世本自紀公以下為巳姓十一世兹丕公方見春秋杜氏曰莒國城陽莒縣張氏曰後為密州莒縣公羊曰將卑師少稱人程子曰不知衆寡將帥名氏亦曰某人愚謂亦有衆辭如衛人殺州吁之類是也亦有泛稱人如齊人執鄭詹之類是也各隨文見義不可執一例以求之希聲陸氏曰克內曰入後倣此孔氏曰向薑姓張氏曰炎帝之後杜氏曰小國也譙國龍亢縣東南有向城張氏曰漢志向屬沛郡寰宇記屬應天府穀熟縣左氏曰莒子娶于向向薑不安莒而歸夏莒人入向以薑氏還未詳信否程子曰天下有道禮樂征伐自天子出春秋之時諸侯擅相侵伐侵人之境且為暴況入人之國乎康侯胡氏曰非王命而入人國邑逞其私意見諸侯之不臣也擅興兵而征討不加焉見天王之不君也據事直書義自見矣程子曰春秋書其事而被侵伐者亦不免焉蓋彼加兵于已則當引咎或自辨諭之以禮義不得免焉則固其封疆告于天子方伯若忿而與戰則以與戰者為主處已絶亂之道也無駭帥師入極駭户楷切穀梁作賅後同帥公羊作率無駭魯大夫公羊曰展無駭也陸氏曰公子展之孫也劉氏曰何以不氏再命也諸侯大國三卿皆命于天子次國三卿二卿命于天子小國三卿一卿命于天子大國之卿三命次國再命小國一命二千五百人為師公羊曰凡將尊師衆曰某帥師康侯胡氏曰書帥師用大衆也王氏曰凡書帥師書其專也後皆倣此杜氏曰極附庸小國張氏曰擅興大衆陵蔑小國義與入向同愚案古者元侯之卿有軍作師以承天子諸侯之卿無軍教衛以聽元侯大夫帥師則大夫專兵亂王制撓君權國非其國矣故君舉陳氏曰諸侯專征而後千乘之國有弒其君者矣大夫專將而後百乘之家有弒其君者矣後凡書帥師義皆倣此孫氏曰外莒人入向內無駭帥師入極天子不能誅周室陵遲可知矣秋八月庚辰公及戎盟于唐此稱及與公及邾儀父之及同義後不復解范氏曰唐魯地杜氏曰髙平方與縣北有武唐亭張氏曰後為單州魚臺縣左氏曰戎請盟秋盟于唐復修戎好也程子曰戎人強而與之盟非義也孫氏曰公與中國盟猶曰不可與戎盟于唐甚矣張氏曰盟者刑牲以相示謂之神殛倍約者當如此牲同類為之尚以長亂徐戎薦居而與之詛一有間隙惟利是視則求小疵而責大信必肆強悍之暴為中國之大禍故春秋于唐之盟深罪隱公之失道而開其亂源也康侯胡氏曰春秋謹嚴外域而內侵則膺之與戎人歃血以約盟非義也後世乃有結外域以許婚而配偶非其類如西漢之于胸奴約外域以求援而華夏被其毒如肅宗之于回紇信外域以與盟而臣主蒙其恥如德宗之于尚結贊雖悔于終亦將奚及春秋謹唐之盟垂戒逺矣邦衡胡氏曰聖人不罪戎而罪致戎者先自治之道也愚謂隱公不能謹會戎于其始故不免盟戎于其終是以春秋慎始九月紀履緰來逆女陸氏曰履緰左氏作裂繻誤也孔氏曰紀薑姓侯爵杜氏曰紀在東莞劇縣張氏曰漢屬北海郡後屬青州夀光縣即益都府釋文曰逆迎也公羊曰履緰者紀大夫也不氏與無駭同程子曰在魯故稱女愚謂逆當使命卿不當使大夫紀以大夫逆國母魯亦不能以禮卻之故書以示戒張氏曰天子諸侯無出疆親迎之禮必使上卿往迎于其國至于館所然後親迎以入吕氏曰婚姻之禮男女之别見矣王政以此為本故春秋內女之歸其禮不備者必謹書之所以使天下知婚姻之禮為重古聖人之意也否則淫慝邪僻生焉冬十月伯姬歸于紀伯姬隱公姊妹也伯字姬姓葉氏曰以姓繫字婦人之通稱逆稱女别婦也歸稱伯姬别異姓也公羊曰婦人謂嫁曰歸愚謂逆非命卿魯又順其非禮即使伯姬隨其大夫以往非禮矣又為莊四年齊侯葬紀伯姬起文也紀子伯莒子盟于密伯左氏作帛公羊穀梁作伯程子從公穀曰闕文也當云紀侯某伯莒子盟于密左氏附會作帛杜預以為裂繻之字春秋無大夫在諸侯上者孫氏曰紀本侯爵此稱子伯闕文也杜氏曰密莒邑陽城淳于縣東有密鄉義見元年盟于蔑十有二月乙卯夫人子氏薨穀梁曰夫人者隱公之妻也胡氏曰子者宋姓也程子曰薨上墜之聲諸侯國內稱之小君同劉氏曰薨者臣子之辭此義未詳竊疑妾母與再娶者不得稱夫人而未有所考也穀梁曰夫人薨不地范氏曰夫人無出境之事薨有常處鄭人伐衛稱人見莒人入向陸氏曰聲罪致討曰伐趙氏曰凡侵伐不書勝敗殺掠而還也孔氏曰衛國侯爵姬姓文王子康叔封之後居殷墟桓公十三年隱之元年也杜氏曰衛在汲郡朝歌縣張氏曰濬州黎陽也左氏曰鄭共叔之亂公孫滑出奔衛衛人為之伐鄭取廪延鄭人以王師虢師伐衛南鄙二年鄭人伐衛討公孫滑之亂也未詳信否胡氏曰禮樂征伐者天下國家之大經天子失道而諸侯攘之諸侯錯命而大夫奪之東遷之後無諸侯無大夫皆專行之其無王甚矣後凡書伐倣此其罪之重輕則各見于後此則大夫伐人之國也莘老孫氏曰孟子曰春秋無義戰彼善于此則有之矣征者上伐下也敵國不相征也故春秋之時侵伐圍入一切書之以見罪焉春秋書伐二百一十三三年春王二月己巳日有食之程子曰月王月也事在二月則書王二月在三月則書王三月無事則書時書首月愚謂亦魯史常法也後倣此言日不言朔或食後朔後或史失之也朱子曰厯法周天三百六十五度四分度之一左旋于地一晝一夜則其行一周而又過一度日月皆右行于天一晝一夜則日行一度月行十三度十九分度之七故日一嵗而一周天月二十九日有竒而一周天又逐及于日而與之會一嵗凡十二會方會則月光都盡而為晦已會則月光復蘇而為朔朔後晦前各十五日日月相對則月光正滿而為望晦朔而日月之合東西同度南北同道則月掩日而日為之食望而日月之對同度同道則月亢日而月為之食是皆有常度矣然王者修德行政用賢去姦能使陽盛足以勝隂隂衰不能侵陽則日月之行雖或當食而月常避日故其遲速髙下必有參差而不正相合不正相對者所以當食而不食也若國無政不用善使臣子背君父妾婦乘其夫小人陵君子外域侵中國則隂盛陽微當食必食雖日行有常度而實為非常之變矣禮記曰男教不修陽事不得則謫見于天日為之食天子必素服修職以蕩滌天下之隂事康侯胡氏曰日者衆陽之宗人君之表而有食之災咎之象也克謹天戒則雖有其象而無其應弗克畏天災咎之來必矣春秋必書以戒人君不可忽天象也後倣此張氏曰唐歷志曰四序之中分同道至相過交而有食天道之常以歷推春秋日食大槩多入食限于歷應食而春秋不書者尚多則日食必在交限其入限者不必盡食若過至未分月或變行以避之或涉交數淺或在陽歷陽盛隂微則不食或德之休明而有小眚焉則雖交而不食此德之所生也今案歷家之言如此則凡日食者不可歸之常度而災之所生乃德之不修也明矣況象見乎上而災應于下自是而後王政日微夷狄僭竊禍亂滋起此春秋書之以啓人主恐懼修省之心庶幾乎以德消災而弭天下之禍亂也髙氏曰日月之食有常數焉此巧歷者所能推也而周官乃有救日月食之法至于春秋乃獨數日食何也日君道也而被侵害必有以也春秋書之必曰有食之者蓋歸咎于人事而不以為常數也是以人君遇其食則恐懼修省而百官修輔厥后更不推之于數也後世推求億度指陳某事之應則失之矣葉氏曰有一國之異有天下之異一國之異繫一國故大災可繫齊六鷁退飛可繫宋鸜鵒來巢可繫魯天下之異繫天下故梁山崩沙鹿崩皆晉也而不可繫晉日者有目之所共睹其繫非以天下歟春秋之時臣弒君子弒父妻弒夫外域侵中國則陽之傷也多矣謂其無以致之不可也三月庚戌天王崩天王平王也公羊曰天子曰崩程子曰崩上墜之形愚謂諸侯為天子喪斬衰裳苴經杖絞帶冠繩纓菅屨同軌畢至周衰禮廢諸侯不臣故春秋書天王崩一見魯不供職貢而武氏子求賻二見齊鄭以嘉禮盟石門三見莒宋陳蔡魯衛伐國不止四見魯宋以嘉禮遇于清五見隱公盤逰觀魚于棠三年之內凡諸侯有不居喪之事皆譏也以後凡書天王崩大略倣此其書葬者又為書葬起文也葉氏曰葬以義見天子七月而葬桓以七年則緩匡以四月簡以五月景以二月則速葬天子諸侯親之可也文公以叔孫得臣葬襄王昭公以叔鞅葬景王非其禮也故書崩書葬愚謂春秋歷十有三王其一崩在春秋之後平惠定靈志崩不志葬其志崩者諸侯不行喪禮如前五見之説其不志葬者或公自往會葬而葬得其時常事不書耳桓襄匡簡景志崩志葬其志崩者義同平惠定靈其志葬者如葉氏之説莊僖頃崩葬皆不志者或赴告不及于魯而魯不會葬或事偶得常而春秋不書無他常事不書非常則書之故也或謂死生人之大變而春秋必書者誤矣夏四月辛卯尹氏卒尹陸氏曰左氏作君誤也張氏曰當以公穀為正葉吕諸家同公羊曰尹氏者何天子之大夫也其稱尹氏何譏世卿也程子曰古者使以德爵以功世祿而不世官是以俊傑在位庶績咸熙及周之衰士皆世官政由是敗尹氏世為王官故于其卒書曰尹氏見其世繼也愚謂此譏天子之世卿也孫氏曰言氏者起其世也泰誓曰罪人以族官人以世夏商之亂政也周既失道其政亦然案節南山家父刺幽王之詩也稱尹氏太師維周之氐則尹氏世卿其來久矣康侯胡氏曰功臣之世世其祿世卿之官嗣其位祿以報功也故其世可延位以尊賢也故其官當擇官不擇人世授之柄黨與既衆威福下移大姦根據而莫除人主孤立而無助國不亡幸爾春秋于周書尹氏武氏仍叔之子于魯書季友仲遂皆志其非禮也厚齋王氏曰書尹氏卒此尹氏立王子朝之始書齊崔氏出奔衛此崔杼弒其君之始比事觀之履霜堅冰之戒明矣聖人絶惡于未萌必謹其微秋武氏子來求賻音附程子曰武氏王之卿士稱武氏見其世官貫道王氏曰武氏世卿也武氏子未命為卿也公羊曰何以不稱使當喪未君也穀梁曰歸死者曰賵歸生者曰賻歸之者正也求之者非正也周雖不求魯不可以不歸魯雖不歸周不可以求之交譏之程子曰天王崩諸侯不供其喪故武氏子徴求于四國書之以見天子失道諸侯不臣也存耕趙氏曰案禮凡君之喪臣致禭曰致廢衣于賈人不敢戚君也致賻曰納甸于有司不敢以貨取也今魯不供葬失臣子之禮貫道王氏曰周凡三求皆以喪故求賻以平王崩求車以桓王將崩求金以襄王崩其有所求者喪事之有闕也諸侯貢享之不至賻賵之不供也張氏曰入隱公三年間經書周室止四事爾而人亡政熄王道之不能復興蓋已具見此春秋所以為簡明也愚謂一見諸侯不供王事二見王失馭下之道三見官人以世四見不使其官而使其子一言而四義見春秋凡書子與弟者多子弟干政之漸八月庚辰宋公和卒宋以王者後故得稱公禮諸侯不生名死而名之者别其為何君也諸侯書卒正也書薨者臣子之辭也故內書薨而外書卒將書其葬不可不書其卒以見葬期之緩速將著其私諡與諸侯之僭稱公不可不書其本爵以見臣子之僭亂又因其卒而書之可以考其凡見于春秋者實為某侯又可見臣子居喪而會盟侵伐以瀆喪禮然其文則舊史所有而義則孔子所取後皆倣此餘見五年葬衛桓公案宋殤公居喪而與魯遇于清及與魯陳蔡衛兩伐鄭三年之喪廢矣比事而觀義自見也朱子曰魯君書薨外諸侯書卒劉原父答溫公書謂薨者臣子之辭溫公亦以為然以卒為貶辭者恐亦未然冬十有二月齊侯鄭伯盟于石門齊侯僖公祿父也孔氏曰齊國侯爵薑姓太公望之後成王封太公于營邱臨淄是也僖公九年即隱之元年也張氏曰齊國青州臨淄縣杜氏曰石門齊地或曰濟北盧縣故城西南濟水之門張氏曰在濟南府臨邑縣左氏曰尋盧之盟義見元年盟于蔑張氏曰隱公十一年間盟而不食言者惟此盟二君終身未嘗相伐蓋齊方強盛而鄭莊姦猾鄭之深仇專在于宋故恃齊以敵之二國好合宋與許紀諸國交受入伐春秋詳書于䇿將使後人考其本末而知鄭莊多詐齊僖不義而強王政不綱諸侯放恣二國相與之固列國並受其禍也君舉陳氏曰齊鄭合也齊鄭合天下始多故矣天下之無王鄭為之也天下之無伯齊為之也是故書齊鄭盟于石門以志諸侯之合書齊鄭盟于鹹以志諸侯之散是春秋之終始也癸未葬宋穆公穆公羊穀梁作繆不曰宋葬穆公而曰葬宋穆公者自魯書之也啖氏曰諸侯告喪魯往會葬則書愚謂穆諡也宋稱公本爵也他國稱公皆僭也胡氏曰諸侯薨則請諡于天子程子曰春秋之時皆不請而私諡稱私諡所以罪其臣子後倣此劉氏曰賤不誄貴幼不誄長天子崩誄于郊諸侯薨誄于王大夫卒誄于君孔子曰諸侯相誄非禮也程子曰送終大事也必就正寢不沒于婦人之手曾子易簀而沒豈苟然乎死而加之不正之諡知忠孝者肯為乎孫氏曰訃告弔會史策之常也直書見惡聖師之筆也春秋書諸侯之卒葬者豈徒紀其嵗時從其訃告弔會而已哉蓋以周室陵遲諸侯僭亂變古易常驕蹇不道故聖人書之也髙氏曰因魯往會葬而著其臣子私諡之罪春秋本義卷一
