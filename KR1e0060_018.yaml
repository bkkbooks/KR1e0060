body:
  text: 春秋本義卷十八元程端學撰成公名黑肱宣公子母穆薑元年春王正月公即位義見文公即位二月辛酉葬我君宣公義見葬桓公無冰義見桓十四年宋氏曰宣公末年三桓強盛成公年幼三桓得政故冬暖無冰也昔吳歸晉壽陽已東常雨已西常暘司馬宣王問摯虞對曰壽陽已東屬吳吳新破人民悲愁故常雨壽陽已西屬晉晉新得吳君臣喜樂故常暘春秋志災異際天人非所謂廣記備言也三月作丘甲作者始作也丘甲者每丘出甲士一人甲士者二十四步卒之長也增甲士則增步卒矣左氏曰為齊難故作丘甲杜氏曰周禮九夫為井四井為邑四邑為丘四丘為甸出長轂一乘甲士三人步卒七十二人康侯胡氏曰此司馬法一乘之賦也唐太宗問李靖楚廣與周兵制靖曰周制一乘步卒七十二人甲士三人以二十五人為一甲凡三甲共出七十五人然則一丘所出十有八人積四丘而具一乘耳今作丘甲者即丘出一甲是一甸之中共百人為兵矣其數增三之一益兵備敵重困農民非為國之道貫道王氏曰變亂王制竭用民力其後鄭有丘賦襄公作三軍哀公用田賦其來有漸休者少而役者多矣葉氏曰先王賦於民有二有國賦有軍賦國賦常賦也太宰所謂九賦斂財賄者是也軍賦非常賦也有軍旅之事則征之縣師所謂受法於司馬以作其衆庶及牛馬車輦使皆備旗鼓兵器而稍人作其同徒輂輦者是也然其為法不可得而詳矣學者所言自丘出牛馬至甸為一乘然後甲士步卒具焉者司馬穰苴之法也然而司馬法甸而後出車一乘甲士三人而周官或謂甸為乘自天子建國至於大夫皆以乘為差則甸固乘之所出司馬法蓋本於周特其損益不可知爾周制有言六畜車輦者則牛馬在焉有言六畜兵器者則甲士在焉劉氏曰魯不務廣德而務廣力不務益義而務益兵以王者之制論之則作丘甲之罪大矣王者之制諸侯不得擅稅賦其民稅為足食也賦為足兵也足食足兵民信之矣然而不得擅者先王之稅既足以食矣先王之賦既足以用矣今不循先王而以意為凖必亂之道也愚謂先王之制莫重於井田井田所出稅與賦而已宣公初稅畝而倍稅成公作丘甲而益兵倍稅則民困於財益兵則民困於力財力並困民乃死亡國以民為本宜魯之先亡也春秋書此為後世鑒而好事者猶以厚斂強兵為務悲夫夏臧孫許及晉侯盟于赤棘許臧文仲之子宣叔也杜氏曰赤棘晉地左氏曰聞齊將出楚師盟于赤棘未詳信否義見隱元年盟于蔑康侯胡氏曰季孫當國恨齊人之納歸父又懼晉侯之或見討也故往結此盟成公即位未有施舍已責逮鰥寡救困乏之事既作丘甲又逺與晉尋盟豈固本保邦之道乎書及晉侯盟非特備齊懼晉蓋三桓懷忿懟君父之心將有事於齊罪可見矣邦衡胡氏曰大夫及諸侯盟見大夫之強也自公子遂及齊侯盟後益甚故仲孫何忌及邾子又甚非惟惡大夫之強亦惡諸侯之失其御也秋王師敗績于茅戎茅公羊穀梁作貿杜氏曰茅戎戎别種也左氏曰晉侯使瑕嘉平戎于王單襄公如晉拜成劉康公徼戎將遂伐之叔服曰背盟而欺大國此必敗背盟不祥欺大國不義神人弗助將何以勝不聽遂伐茅戎敗績程子曰王師於諸侯不言戰諸侯不敢抗王也此理也其抗王道之失也聖人於此一編經世變存王道之意無不具常山劉氏曰王者不能以義征四方乃輕舉以致敗豈不曰自取之乎聖人立法以垂後世示之以意而已一書王師敗績于茅戎而尊王之義與王自取敗之道咸得而見矣髙氏曰此志王室衰弱之甚也王師敗績于茅戎而諸侯恬然莫之顧皆不臣也冬十月二年春齊侯伐我北鄙左氏曰元年冬臧宣叔令修賦繕完具守備曰齊楚結好我新與晉盟晉楚爭盟齊師必至雖晉人伐齊楚必救之是齊楚同我也知難而有備乃可以逞二年春齊侯伐我北鄙康侯胡氏曰初魯事齊謹甚雖易世而聘會不絶也及與晉侯盟于斷道而後怨隙成再盟于赤棘而後伐吾北鄙齊侯之興是役非義矣魯人為鞍之戰豈義乎同曰憤兵務相報復則罪自見矣貫道王氏曰春秋紀兵爭之所自成也義又見隱二年鄭伐衛夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績杜氏曰新築衛地左氏曰衛侯使孫良夫石稷寧相向禽將侵齊與齊師遇石子欲還孫子曰不可以師伐人遇其師而還將謂君何若知不能則如無出今既遇矣不如戰也石城子曰師敗矣子不少須衆懼盡子喪師徒何以復命皆不對又曰子國卿也隕子辱矣子以衆退我此乃止且告車來甚衆齊師乃止次於鞫居新築人仲叔于奚救孫桓子桓子是以免未詳信否愚謂書孫良夫帥師大夫專兵也書及齊師戰良夫主此戰也良夫專兵輕進以取敗辱國害民罪莫大焉衛侯使之戰以致敗亦罪也齊侯侵虐鄰國雖得勝於一時遂來鞍之敗績亦罪也義又見隱二年鄭伐衛康侯胡氏曰齊師侵虐而衛主此戰何也衛侯初與晉同盟於斷道矣又使世子臧與晉同伐齊矣又使孫良夫石稷將侵齊矣及與齊師遇石稷欲還良夫不可遂戰於新築故齊師雖侵虐而此戰則衛主之也春秋善解紛貴逺怨而惡以兵刃相接也君舉陳氏曰衛大夫帥師自此始大夫強也良夫為世卿至林父出其君入于戚以叛六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師會晉郤克衛孫良夫曹公子首及齊侯戰于鞍齊師敗績鞍音安首公羊穀梁作手僑如得臣之子宣伯也嬰齊叔肸之子子叔聲伯也杜氏曰鞍齊地穀梁曰鞍去齊五百里孔氏曰鞍與袁婁不知其處逺近無以驗左氏曰孫桓子還於新築不入遂如晉乞師臧宣叔亦如晉乞師皆主郤獻子晉侯許之七百乘郤子曰此城濮之賦也有先君之明與先大夫之肅故捷克於先大夫無能為役請八百乘許之郤克將中軍士燮佐上軍欒書將下軍韓厥為司馬以救魯衛臧宣叔逆晉師且道之季文子帥師會之師從齊師于莘六月壬申師至於靡笄之下齊侯使請戰曰子以君師辱於敝邑不腆敝賦詰朝請見對曰晉與魯衛兄弟也來告曰大國朝夕釋憾於敝邑之地寡君不忍使羣臣請於大國無令輿師淹於君地能進不能退君無所辱命齊侯曰大夫之許寡人之願也若其不許亦將相見也齊高固入晉師桀石以投人禽之而乘其車擊桑本焉以徇齊壘曰欲勇者賈余餘勇癸酉師陳于鞍邴夏御齊侯逢丑父為右晉解張御郤克鄭丘緩為右齊侯曰余姑翦滅此而朝食不介馬而馳之郤克傷於矢流血及屨未絶鼓音曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之緩曰自始合茍有險余必下推車子豈識之然子病矣張侯曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事若之何其以病敗君之大事也擐甲執兵固即死也病未及死吾子勉之左并轡右援枹而鼓馬逸不能止師從之齊師敗績逐之三周華不注韓厥夢子餘謂已曰且辟左右故中御而從齊侯邴夏曰射其御者君子也公曰謂之君子而射之非禮也射其左越於車下射其右斃於車中綦母張喪車從韓厥曰請寓乘從左右皆肘之使立於後韓厥俯定其右逢丑父與公易位將及華泉驂絓於木而止丑父寢於轏中蛇出於其下以肱擊之傷而匿之故不能推車而及韓厥執縶馬前再拜稽首奉觴加璧以進曰寡君使羣臣為魯衛請曰無令輿師陷入君地下臣不幸屬當戎行無所逃隱且懼奔辟而忝兩君臣辱戎士敢告不敏攝官承乏丑父使公下如華泉取飲鄭周父御佐車宛茷為右載齊侯以免韓厥獻丑父郤獻子將戮之呼曰自今無有代其君任患者有一於此將為戮乎郤子曰人不難以死免其君我戮之不祥赦之以勸事君者乃免之齊侯免求丑父三入三出每出齊師以帥退入於狄卒狄卒皆抽戈楯冒之以入於衛師衛師免之遂自徐關入齊侯見保者曰勉之齊師敗矣康侯胡氏曰大國三軍次國二軍此時魯之舊制猶存尺地一民皆屬公室成公初立主幼國危為季孫一怒掃境內興師四卿並出然後政自季氏出矣四卿皆書非詳內也堅冰之戒亦明矣貫道王氏曰齊伐魯敗衛合其爭也禍之所自起也其罪大矣然四國大夫逼齊侯以戰而敗其師大夫強矣魯創增軍制五卿分帥四卿出而一居守仲孫蔑也於是三家之勢成魯不可救矣四國敗齊而為盟七卿者卒皆亂國義又見隱二年鄭伐衛朴鄉吕氏曰使舉上介也而文公之末年書公子遂叔孫得臣如齊將稱元帥也而成公之二年書季孫行父臧孫許叔孫僑如公孫嬰齊帥師會戰何也曰用以見大夫之爭強也於是衛將書孫良夫曹書公子首晉於是有六軍韓厥趙括鞏朔韓穿荀騅趙旃皆為卿征伐皆在大夫矣董子曰齊頃公桓公之孫浸伯之餘尊故難使會同而易使驕奢即位九年未嘗一與會同之事有怒魯衛之志而不從諸侯於清丘斷道春往伐魯顧反伐衛當是時方乘勝而志廣大國往聘慢而弗敬晉魯俱怒內悉其衆外黨與好衛曹四國相輔大困之鞍大辱身幾亡國為天下笑張氏曰案兵法爭恨小故不忍忿怒者謂之忿兵今晉為盟主興師討齊非有救亂誅暴之名而起於一怒之憤書晉魯主戰見晉魯曹衛之大夫為志乎此戰雖得一朝之勝不足道也秋七月齊侯使國佐如師己酉及國佐盟于袁婁袁穀梁作爰榖梁曰袁婁去齊五十里未詳信否左氏曰晉師從齊師擊馬陘齊侯使賔媚人賂以紀甗玉磬與地不可則聽客之所為賔媚人致賂晉人不可曰必以蕭同叔子為質而使齊之封內盡東其畝對曰蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也吾子布大命於諸侯而曰必質其母以為信其若王命何且是以不孝令也詩曰孝子不匱永錫爾類若以不孝令於諸侯其無乃非德類也乎先王疆理天下物土之宜而布其利故詩曰我疆我理南東其畝今吾子疆理諸侯而曰盡東其畝而已唯吾子戎車是利無顧土宜其無乃非先王之命也乎反先王則不義何以為盟主其晉實有闕四王之王也樹德而濟同欲焉五伯之伯也勤而撫之以役王命今吾子求合諸侯以逞無疆之欲詩曰布政優優百祿是遒子實不優而棄百祿諸侯何害焉不然寡君之命使臣則有辭矣曰子以君師辱於敝邑不腆敝賦以犒從者畏君之震師徒撓敗吾子惠徼齊國之福不泯其社禝使繼舊好唯是先君之敝器土地不敢愛子又不許請收合餘燼背城借一敝邑之幸亦云從也況其不幸敢不唯命是聽魯衛諫曰齊疾我矣其死亡者皆親昵也子若不許讎我必甚唯子則又何求子得國寶我亦得地而紓於難其榮多矣齊晉亦惟天所授豈必晉晉人許之對曰羣臣率賦輿以為魯衛請若苟有以藉口而復於寡君君之惠也敢不唯命是聽禽鄭自師逆公秋七月晉師及齊國佐盟于袁婁使齊人歸我汶陽之田公會晉師於上鄍賜三帥先路三命之服司馬司空輿帥候正亞旅皆受一命之服孫氏曰齊頃數病諸侯以起此戰信不道矣然魯出四卿會晉衛曹敗齊侯于鞍盟國佐于袁婁此又甚焉愚謂齊侯使國佐如師賂以求免也齊侯自恃其強以伐人及其窮蹙則使重臣求免四國大夫專兵雪忿偶得一勝則逞無窮之欲二者皆足為永鑒矣案自宣十七年晉衛曹邾同盟于斷道而四國之黨成十八年歸父奔齊成元年臧孫許盟晉侯于赤棘魯復背齊而從晉黨與既衆加以私忿于是大起甲兵以伐齊蓋王道不明惟黨與力是崇是逞民不聊生故春秋詳書其始末如此其亦深切著明矣八月壬午宋公鮑卒義見隱三年宋公卒又為宋公盟蜀與三年稱宋公起文也庚寅衛侯速卒義見隱三年宋公卒又為楚鄭伐喪與衛人盟蜀及三年稱衛侯起文也取汶陽田汶陽漢志魯國汶鄉縣顔師古曰即汶陽田兖州泗水縣東南有汶陽故城孫氏曰汶陽田魯地也齊人侵之今齊從晉故復取之不言取之齊者明本非齊地左氏曰晉師及齊國佐盟于袁婁使齊人歸我汶陽之田公羊曰汶陽田者何鞍之賂也康侯胡氏曰取者得非其有之稱不曰復而曰取何也恃大國兵力一戰勝齊得其故壤而不請於天王以正疆理則取之不以其道與得非其有奚異乎若在封域之中則先王所錫先祖所受經界世守不可亂矣不然則侵小得之春秋固有興滅繼絶之義必有處也魯在戰國時地方五百里孟子語愼子曰如有王者作在所損乎在所益乎經於汶陽書取義可知矣義又見僖三十一年取濟西田張氏曰取汶陽田見疆埸之令不出於王矣冬楚師鄭師侵衛左氏曰宣公使求好於楚莊王卒宣公薨不克作好公即位求盟於晉會晉伐齊衛人不行使於楚而亦受盟於晉從於伐齊故楚令尹子重為陽橋之役以救齊將起師子重曰君弱羣臣不如先大夫師衆而後可且先君莊王屬之曰無德以及逺方莫如惠恤其民而善用之乃大户已責逮鰥救乏赦罪悉師王卒盡行冬楚師侵衛康侯胡氏曰二國稱師著其衆也貫道王氏曰楚師以救齊出侵衛以衛之謀伐齊也楚居喪而伐人之喪鄭棄諸姬用南蠻以伐同姓楚不足責也鄭罪甚矣義又見莊十年荆敗蔡師十有一月公會楚公子嬰齊于蜀杜氏曰蜀魯地泰山博縣西北有蜀亭康侯胡氏曰魯以姬姓降班失列與荆楚之大夫會危辱至此愚謂魯諸侯之望也首會嬰齊冝有丙申之盟也故黃氏曰是會也魯倡之楚主之義又見隱二年公會戎于潛存耕趙氏曰晉厚魯而魯首負晉又何責於列國之卿使魯不先會楚未遽至是也丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀鄫穀梁作繒會書公子嬰齊盟書楚人者亦前見之意又諸國皆稱人故書楚人因魯史之文無他義也高氏曰秦人序於諸國之上見楚之主盟也列齊於鄭下不以尊卑序之者齊以敗績勤楚故自貶抑於會如此也程子曰楚為強盛陵轢中國諸侯茍能保固疆圉要結鄰好豈有不能自存之理乃懼而服從與之盟約見其衰弱也愚謂宋衛之君未葬而宋人衛人即吉會盟亦非禮也葉氏曰共王立嬰齊欲以威脅中國而爭長故與鄭興侵衛之師公懼欲附楚於是先諸侯而與之會共王立而弱未知諸侯之復能從楚也而我與晉方為伐齊之役故嬰齊始以卿出悉師以侵衛方是時使中國有主嬰齊必為之所矣而魯之君十國之大夫方且拱手而不敢違則楚人幾何不橫行於天下乎此春秋之所以謹也蘇氏曰楚自城濮之敗不敢競於晉莊王雖入陳圍鄭及宋而未嘗合諸侯及蜀之盟諸侯從之者十一國晉不敢爭也其後四十三年晉趙武楚屈建合諸侯於宋然後晉楚之從得交相見又八年楚靈王求諸侯於晉晉人許之然後諸侯始得從楚皆蜀之盟啓之也義又見隱元年盟于蔑及二年公及戎盟于唐三年春王正月公會晉侯宋公衛侯曹伯伐鄭杜氏曰宋衛未葬而稱爵以接鄰國非禮也愚謂鄭從楚人以伐周之同姓晉得其伐矣然楚鄭伐衛而晉不救十一國盟楚而晉若不聞楚師既去而後伐鄭晉之過也魯宋衛曹從晉伐鄭是矣然其始也不堅事晉以敵楚盟楚未幾而復從晉伐鄭且楚為渠魁而鄭其脅從者也乃捨楚而事鄭魯宋衛曹之過也使楚復興問罪之師則四國無辭以對矣蓋是時弱者畏強諸侯但與其來者而不知夷夏之大義保國之大法故春秋比事見義為有國家者之深戒又以見王政不作而小國不能以自安也豈但訐人之過也哉木訥趙氏曰諸侯冬從楚而春從晉冬盟鄭而春伐鄭何諸侯之不自安不自信也伯主之不作也鄭之從楚久矣使晉有志於抗楚而服鄭曷若移鞍之役於今日乎移七大夫之勢以迫楚楚必怖移八百乘之兵以伐鄭鄭必服今兵力既盡於齊諸侯既屬於楚而區區摟諸侯以從楚之餘以伐鄭冝其不得鄭也辛亥葬衛穆公六月而葬緩也蓋衛侯從晉伐鄭故也義見隱三年葬宋穆公此則又見先君未葬而衛人會盟于蜀衛侯背殯出師不臨先君之喪也二月公至自伐鄭義見桓二年公至自唐甲子新宫災三日哭公羊曰新宫者宣公之宫也杜氏曰三年喪畢神主新入廟故謂之新宫崔氏曰稱新宫者當時之辭也髙氏曰宣公篡立之罪生不加誅死方立廟遽有火災春秋志此示有天道獻可杜氏曰三日哭非禮之正若以為禮則常事不書宫廟災臣子哀痛可矣三日之義豈正乎乙亥葬宋文公七月而葬僭天子之禮也義見隱三年葬宋穆公此又見先君未葬而宋人會盟于蜀宋公背殯出師不臨先君之喪也夏公如晉康侯胡氏曰宣公薨至是三年之喪畢矣冝入朝京師見天子受王命然後歸而即政可也嗣守社稷之重不朝於周而朝於晉其行事亦悖矣義又見僖十年公如齊鄭公子去疾帥師伐許左氏曰許恃楚而不事鄭鄭子良伐許未詳信否髙氏曰疲命於晉楚而以伐人君子是以惡鄭也義又見隱二年鄭伐衛木訥趙氏曰楚越許而後至鄭許弱不能抗楚折而歸之今鄭無謀亦折而從之又連年伐許是自徹藩籬以開楚寇也公至自晉義見桓二年公至自唐秋叔孫僑如帥師圍棘杜氏曰棘汶陽田之邑在濟北蛇丘縣張氏曰即兖州龔丘縣也左氏曰取汶陽之田棘不服故圍之康侯胡氏曰復故地而民不聽至命上將用大師環其邑何也魯於是初稅畝作丘甲稅役日益重棘雖復歸故國所以不願為之民也歟成公不知薄稅斂輕力役修德以來之而肆其兵力雖得之必失之矣俱未詳信否葉氏曰內邑未有言圍者至成三年始見僑如圍棘取汶陽之田不服猶之可也至昭之十三年叔弓帥師圍費吾大夫之邑而不能服則醜矣吾大夫之邑以一軍圍之猶之可也至定之十年叔孫州仇仲孫何忌圍郈以二軍圍之則醜矣吾大夫之邑以二軍圍之猶之可也至昭之二十六年定之十二年公圍成則國之為國者無幾醜不足言也大雩義見桓五年晉郤克衛孫良夫伐牆咎如牆在良切咎古刀切牆公羊作將穀梁作墻杜氏曰牆咎如赤狄别種左氏曰晉郤克衛孫良夫伐牆咎如討赤狄之餘焉牆咎如潰未詳信否愚謂晉不修德以綏諸侯攘強楚而斃斃焉惟狄之務摟與國以伐之其為國可知矣冬十有一月晉侯使荀庚來聘衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟左氏曰晉侯使荀庚來聘衛侯使孫良夫來聘公問諸臧宣叔曰中行伯之於晉也其位在三孫子之於衛也位為上卿將誰先對曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫上下如是古之制也衛在晉不得為次國晉為盟主其將先之丙午盟晉丁未盟衛邦衡胡氏曰先書晉衛來聘次書及二子盟二子奉命來聘而專為盟故於來聘言使孫氏曰二子來聘不能以信相結反要魯以盟非伉而何故言聘言盟愚謂諸侯未嘗朝聘天子而使大夫結同列之私黨已干先王之典况其君本使來聘而專盟二子之罪大矣魯不能以禮卻之魯之罪也政在大夫可知矣義又見隱七年齊來聘元年盟于蔑朴鄉吕氏曰魯要盟也未詳是否君舉陳氏曰聘而遂盟之於是始鄭伐許康侯胡氏曰一嵗之中而再動干戈於鄰國不既甚乎義又見隱二年鄭伐衛四年春宋公使華元來聘左氏曰通嗣君也愚謂宋共喪服未除而遣使交聘尤非禮也義又見隱七年齊來聘三月壬申鄭伯堅卒堅公羊作姬義見隱三年宋公卒此又見其冬鄭伯不服喪而伐許也杞伯來朝杞前稱子今稱伯未詳左氏曰歸叔姬故也未詳信否義見隱十一年滕薛來朝夏四月甲寅臧孫許卒譏世卿也大意見隱元年益師卒公如晉一嵗一朝伯國諸侯事天子之禮亦未之有也義又見僖十年公如齊髙氏曰公連嵗如晉者以嘗即楚故也葬鄭襄公貫道王氏曰未五月而葬速也鄭費將以伐許也義又見隱三年葬宋穆公秋公至自晉髙氏曰踰時而返義又見桓二年公至自唐冬城鄆公羊作運孔氏曰鄆有東鄆西鄆此西鄆也昭公所出居者東郡廪丘縣東有鄆城後漢志屬廪丘又見文十二年張氏曰即濟南府鄆城縣義見隱七年城中丘鄭伯伐許程子曰稱鄭伯見其不復為喪以吉禮從戎愚案鄭至此三伐許罪自見矣況居喪乎義又見隱二年鄭伐衛董子曰父卒未踰年即以喪舉師也春秋以薄恩且失其子心其先君襄公伐喪叛盟得罪諸侯繼其業者冝矜善以覆之今又重之父伐人喪子以喪伐人父不義於人子失恩於親也五年春王正月杞叔姬來歸叔姬宣公女成公姊妹也杜氏曰出也義見宣十六年郯伯姬來歸此又為八年叔姬卒而九年杞伯來逆喪起文也康侯胡氏曰春秋於內女其歸其出詳録之者男女居室人之大倫也男子生而願為之有室女子生而願為之有家父母之心人皆有之而不能為之擇家與室則夫婦之道苦淫僻之罪多矣王法所重人倫之本録之詳為後世戒也存耕趙氏曰郯伯姬杞叔姬易世皆出人倫之變也仲孫蔑如宋左氏曰報華元也義見隱七年齊來聘夏叔孫僑如會晉荀首于榖首公羊作秀榖見莊七年義見文十一年會于承筐梁山崩杜氏曰梁山在馮翊夏陽縣北張氏曰同州韓城縣有禹貢梁山爾雅云梁山晉望康侯胡氏曰詩奕奕梁山韓侯受命韓國之鎮也後為晉所滅而大夫韓氏以為邑焉義見僖十四年沙鹿崩秋大水義見桓元年冬十有一月己酉天王崩左氏曰定王崩愚謂書此為十二月盟于蟲牢六年取鄟衛侵宋邾來朝魯侵宋楚伐鄭嬰齊行父聘晉及七年魯三望諸侯同盟等事起文而蟲牢之盟又其甚者也義又見隱三年十有二月己丑公會晉侯齊侯宋公衛侯鄭伯曹伯邾子杞伯同盟于蟲牢獻可杜氏曰晉齊序於宋上杞伯序於諸侯之下者以強弱為大小也杜氏曰蟲牢鄭地陳留封丘縣北有桐牢左氏曰許靈公訴鄭伯于楚六月鄭悼公如楚訟不勝楚人執皇戌及子國故鄭伯歸使公子偃請成於晉八月鄭伯及晉趙同盟于垂棘冬同盟於蟲牢鄭服也未詳信否康侯胡氏曰天王崩赴告已及以所聞先後而奔喪禮也而九國諸侯會盟不廢見其皆不臣春秋惡盟誓於惡之中又有惡焉者此類是也義又見莊十六年同盟于幽六年春王正月公至自會非天子之事踰年而返則不得視正朔矣義又見桓二年公至自唐髙氏曰書公至自會者非奔天王之喪也二月辛巳立武宫公羊曰武宫者何武公之宫也髙氏曰武公乃伯禽九世孫獻公之子於公為十一世祖毁之已久而輒立者蓋武公敖在宣王時南征北伐佐王師有功而諡曰武焉至成公時季孫行父自多其功一旦出私意再為立宫同於世室與伯禽為二祧蓋僭天子之禮若文武之二祧也故明堂位曰魯公之廟文世室武公之廟武世室聖人於此書立武宫以著季氏僭亂妄作之由孫氏曰宗廟有常故不言立此言立武宫非禮可知也常山劉氏曰王制曰諸侯五廟二昭二穆與太祖之廟五祭法曰諸侯立五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止去祖為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠為鬼然則諸侯宗廟古有彝典過則毁之不可復立也武宫其毁之久矣而輒立之非禮明矣張氏曰觀春秋書法與癸法之論廟制則武宫之立與煬宫同於失禮違制斷為可知明堂位之言其為俗儒之論明矣甚矣其亂聖制而誤後學也取鄟音專又市臠切滅而書取見宣九年康侯胡氏曰鄟微國也義見莊十年齊滅談衛孫良夫帥師侵宋大夫專兵以侵同盟之國罪自見矣義又見莊十年公侵宋夏六月邾子來朝義見隱十一年滕薛來朝高氏曰魯取鄟而邾子遂來朝其強弱可知矣且天王新即位不朝而朝魯此可見惟陵我是畏也公孫嬰齊如晉左氏曰子叔聲伯如晉命伐宋未詳信否義見隱七年齊來聘壬申鄭伯費卒費音祕左氏曰鄭悼公卒大意見隱七年滕侯卒此又為楚伐喪起文也秋仲孫蔑叔孫僑如帥師侵宋左氏曰孟獻子叔孫宣伯侵宋晉命也未詳信否義見莊十年公侵宋朴鄉吕氏曰二卿並書與前四卿並書之意同當時大夫專擅各自帥師而公家微矣是故侵宋之事小而專權之患大楚公子嬰齊帥師伐鄭左氏曰楚子重伐鄭鄭從晉故也康侯胡氏曰鄭能去逆效順是改過遷善也嬰齊為是帥師又因其喪而伐之不義甚矣義又見莊十年荆敗蔡師愚案楚書大夫帥師始此見蠻荆之盛同於中國也然楚國之權亦在大夫而楚漸衰矣冬季孫行父如晉義見隱七年齊來聘許氏曰仲孫蔑叔孫僑如季孫行父有如必書相望於春秋者大夫強也晉欒書帥師救鄭救公羊作侵非也左氏曰晉欒書救鄭與楚師遇於繞角楚師還義見莊二十八年救鄭七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛鼷音兮李巡曰鼱鼩鼠一名鼷鼠説文云小鼠爾雅云有螫毒者或謂之甘口鼠愚聞有其誠則有其神故神不歆非類惟德馨香祀時成公幼弱三桓擅政兵煩稅重神怒人怨況僭郊乎鼷鼠食郊牛角天示譴也不知變懼而又食其角天譴深矣聖人書此為後世鑒與卜郊不從及郊牛傷大意略同吳伐郯音談陸氏曰吳姬姓子爵周太王之子太伯仲雍之後武王克商封其曽孫周章於吳為子至壽夢而僭稱王壽夢元年成公之六年也張氏曰其地為吳郡今平江也左氏曰吳伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤無弔者也夫有上不弔其誰不受亂吾亡無日矣黃氏曰吳郯相去本隔江淮二水而伐之者吳始大也初吳本受盟於楚自楚之申公巫臣自晉適吳通吳於晉教之射御戰陳以叛楚蠻夷之屬於楚者吳盡取之至是而又陵中國楚之患漸息而吳之擾方始許氏曰伐郯之役兵連上國於是始見於春秋志入州來著十五年之所以會于鍾離也義又見莊十年荆敗蔡師戴氏曰荆之始見也入蔡吳之始見也伐郯中國莫之問故駸駸焉交亂中國夏五月曹伯來朝左氏曰曹宣公來朝義見隱十一年滕薛來朝不郊猶三望高氏曰免牛則不郊矣復書不郊者以吳曹事隔其文故為三望起也義見僖三十一年秋楚公子嬰齊帥師伐鄭左氏曰楚子重伐鄭師於泛康侯胡氏曰楚軍旅數起頻年伐鄭所謂罪自見也義又見莊十年荆敗蔡師公會晉侯齊侯宋公衛侯曹伯莒子邾子杞伯救鄭公羊穀梁無齊侯二字左氏曰諸侯救鄭鄭共仲侯羽軍楚師囚鄖公鍾儀獻諸晉晉人以鍾儀歸囚諸軍府未詳信否義見莊二十八年救鄭八月戊辰同盟于馬陵杜氏曰馬陵衛地陽平元城縣東南有地名馬陵左氏曰尋蟲牢之盟且莒服故也未詳信否義見莊十六年公至自會義見桓二年公至自唐吳入州來公羊穀梁作萊孫氏曰州來微國杜氏曰楚邑淮南下蔡縣是也張氏曰屬壽州愚案楚始封不至淮南壽州本侵小得之非楚邑也特是時屬楚耳孫説是也左氏曰楚圍宋之役師還子重請取於申吕以為賞田王許之申公巫臣曰不可此申吕所以邑也是以為賦以御北方若取之是無申吕也晉鄭必至於漢王乃止子重是以怨巫臣子反欲取夏姬巫臣止之遂取以行子反亦怨之及共王即位子重子反殺巫臣之族子閻子蕩及清尹弗忌及襄老之子黑要而分其室子重取子閻之室使沈尹與王子罷分子蕩之室子反取黑要與清尹之室巫臣自晉遺二子書曰爾以讒慝貪婪事君而多殺不辜余必使爾罷於奔命以死巫臣請使於吳晉侯許之吳子壽夢説之乃通吳於晉以兩之一卒適吳舍偏兩之一焉與其射御教吳乘車教之戰陳教之叛楚置其子狐庸焉使為行人於吳吳始伐楚伐巢伐徐子重奔命馬陵之會吳入州來子重自鄭奔命子重子反於是乎一嵗七奔命蠻夷屬於楚者吳盡取之於是始大通吳於上國邦衡胡氏曰吳入春秋不踰一年而再伐國見強吳之莫制矣義又見吳伐郯東萊吕氏曰通吳誠足以病楚而紓晉之憂然楚病而晉亦病矣借助於強暴未有不貽其患者冬大雩義見桓五年衛孫林父出奔晉杜氏曰林父良夫之子也義見僖二十八年元咺奔晉又為十四年歸衛起文也八年春晉侯使韓穿來言汶陽之田歸之于齊杜氏曰齊服事晉故晉來語魯使還二年所取田左氏曰晉侯使韓穿來言汶陽之田歸之於齊季文子餞之私焉曰大國制義以為盟主是以諸侯懷德畏討無有二心謂汶陽之田敝邑之舊也而用師於齊使歸諸敝邑今有二命曰歸諸齊信以行義義以成命小國所望而懷也信不可知義無所立四方諸侯其誰不解體詩曰女也不爽士二其行士也罔極二三其德七年之中一與一奪二三孰甚焉士之二三猶喪妃耦而况霸主霸主將德是以而二三之其何以長有諸侯乎詩曰猶之未逺是用大諫行父懼晉之不逺猶而失諸侯也是以敢私言之孫氏曰魯之土地天子所封非晉侯可得而制也晉侯使歸之於齊是魯國之命制在晉也故曰晉侯使韓穿來言汶陽之田歸之於齊康侯胡氏曰汶陽之田本魯田也魯人恃大國之威以兵力脅齊得其故地而不正疆理於天王則取之不以其道也郤克戰勝令於齊曰反魯衛之侵地齊既從之今復有命俾歸諸齊則歸之不以其道也而齊人貪得晉有二命穿也列卿無所諫止皆罪矣晉欒書帥師侵蔡許氏曰侵蔡報伐鄭大國爭衡而小國受兵春秋矜焉義又見莊十年公侵宋公孫嬰齊如莒邦衡胡氏曰自宣四年公欲平郯莒之怨而莒不肯至是嬰齊如莒則魯與莒通好矣故是年之冬魯會晉伐郯也書者以見魯與郯則伐莒今與莒則伐郯惟利是嗜專恣之甚也義又見隱七年齊來聘宋公使華元來聘左氏曰宋華元來聘聘共姬也杜氏曰婚聘不使卿今華元將命故書之義又見隱七年齊來聘夏宋公使公孫夀來納幣杜氏曰壽蕩意諸之父東萊吕氏曰公子公孫乃同族兄弟而為君納幣豈所謂逺嫌邪康侯胡氏曰公孫壽卿也納幣使卿非禮也禮不可略亦不可過惟其稱而已略則輕大倫過則溺私愛宋公之請魯侯之嫁皆致其厚者也而不知越禮踰制豈所以重大婚之禮哉經悉書之為後法也義又見文二年公子遂納幣晉殺其大夫趙同趙括左氏曰晉趙嬰通於趙莊姬五年春原屏放諸齊嬰曰我在故欒氏不作我亡吾二昆其憂哉且人各有能不能舍我何害弗聽八年趙莊姬為趙嬰之亡故譖之於晉侯曰原屏將為亂欒郤為徴六月晉討趙同趙括武從姬氏畜於公宫以其田與祁奚韓厥言於晉侯曰成季之勳宣孟之忠而無後為善者其懼矣三代之令王皆數百年保天之祿夫豈無辟王賴前哲以免也周書曰不敢侮鰥寡所以明德也乃立武而反其田焉義見莊二十六年曹殺大夫秋七月天子使召伯來錫公命錫左氏作賜疑誤啖氏曰稱天子誤也公羊曰元年春王正月正也其餘皆通矣啖説近是蓋天子天王雖同然春秋二百四十二年之中惟此稱子爾故知誤也召伯見文五年此其後也錫賜也左氏曰召伯桓公康侯胡氏曰成公即位喪服已畢而不入見既更五服一朝之嵗矣而不如京師又未嘗敵王所愾而有功也何為來賜命乎罪邦君不王天子僭賞也義又見莊元年榮叔錫桓公命冬十月癸卯杞叔姬卒啖氏曰叔姬雖出猶書卒為喪歸杞故也愚謂又為明年二月伯姬歸宋起文也晉侯使士燮來聘左氏曰晉士燮來聘言伐郯也以其事吳故公賂之請緩師文子不可曰君命無二失信不立禮無加貨事無二成君後諸侯是寡君不得事君也燮將復之季孫懼使宣伯帥師會伐郯義見隱七年齊來聘叔孫僑如會晉士燮齊人邾人伐郯薛氏曰吳伐郯而不能救服吳則伐之諸侯無所措手足矣康侯胡氏曰晉之為盟主可見矣魯既知其不可而不敢違其不能立亦可知矣義又見隱二年鄭伐衛衛人來媵孫氏曰媵伯姬也唯王后三國媵此年衛人來媵九年晉人來媵十年齊人來媵康侯胡氏曰媵者何諸侯有三歸嫡夫人行則姪娣從二國來媵亦以姪娣從凡一娶九女所以廣繼嗣三國來媵非禮也夫以禮制欲則治以欲敗禮則亂而諸侯一娶十有二女備書三國以明踰制為後戒也九年春王正月杞伯來逆叔姬之喪以歸榖梁曰夫無逆出妻之喪而為之也陸氏曰禮有婦既練而反未練而出然則出婦有反歸之禮但女嫁未三月而死猶葬於女氏之黨今叔姬生未反於杞而死反葬故曰非禮也李氏曰禮婦人未廟見則歸葬於女之黨以未成婦於其祖者不可以祔其姑也叔姬既絶矣生不奉其祭祀死豈可成婦於祖宗乎是則魯不應使之也杞不應逆之也把魯之不正均也公會晉侯齊侯宋公衛侯鄭伯曹伯莒子杞伯同盟于蒲蒲見桓三年左氏曰為歸汶陽之田故諸侯二於晉晉人懼會于蒲以尋馬陵之盟季文子謂范文子曰德則不競尋盟何為范文子曰勤以撫之寬以待之堅強以御之明神以要之柔服而伐二德之次也義見莊十六年貫道王氏曰甚哉晉之無䇿也盟而可保諸侯蟲牢足矣何必馬陵馬陵足矣何必于蒲德不足以懷威不足以震惟恃區區歃血之信以為固人心其可厚誣邪盟之相要不足信久矣五年之中凡三為同不即人心甚矣張氏曰自此鄭魯皆有叛晉之心執鄭盟魯紛紛甚矣治人不治反其智同盟豈所以一諸侯哉公至自會義見桓二年公至自唐二月伯姬歸于宋書此為行父致女三國來媵起文又見伯姬有杞叔姬之服而嫁也夏季孫行父如宋致女劉氏曰致之者成之也何氏曰古者婦人三月而廟見祭於禰成婦之義也父母使人操禮致之孫氏曰使卿非禮也晉人來媵義見衛人來媵秋七月丙子齊侯無野卒義見隱三年宋公卒晉人執鄭伯晉欒書帥師伐鄭左氏曰楚人以重賂求鄭鄭伯會楚公子成於鄧秋鄭伯如晉晉人討其二於楚也執諸銅鞮欒書伐鄭貫道王氏曰既執其君又伐其國甚矣義又見隱二年鄭伐衛此則執諸侯以伐諸侯矣許氏曰使晉能制楚不致危鄭討鄭可也今楚潰莒入鄆晉不能救而禁鄭之二於楚春秋之義自反以盡其道而後責人矣高氏曰自邲之戰鄭之從楚者十年其後晉侯數伐鄭更蟲牢馬陵之會然後鄭伯受盟及蒲之會所以尋前日之盟也而晉人乃執辱鄭伯又使欒書伐之明年又使衛侵又會諸侯伐鄭方是時楚適備吳未暇爭鄭故鄭之在晉者亦五年及楚一求成於鄭而鄭伯甘心於楚者蓋追怒晉之不德弗恤小國之難而輕辱其君故與楚伐許侵宋同撓中國凡二十年間諸侯之師侵伐會盟曽無虛嵗是禍也實晉有以啓之蓋以不信蒲之盟故爾冬十有一月葬齊頃公頃音傾義見隱三年葬宋穆公楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆公羊作運劉氏曰鄆莒之附庸也任氏曰東鄆也杜氏曰城陽姑幕縣南有貟亭即鄆也張氏曰鄆州須城縣黃氏曰莒今密州在吳魯之東楚越吳魯而伐之國小而潰楚又乘勝入鄆左氏曰晉侯使申公巫臣如吳假道於莒與渠丘公立於池上曰城已惡莒子曰僻陋在夷其孰以我為虞對曰夫狡焉思啓封疆以利社稷者何國蔑有唯然故多大國矣唯或思或縱也勇夫重閉况國乎九年十一月楚伐莒圍渠丘渠丘城惡衆潰奔莒戊申楚入於渠丘莒人囚楚公子平楚人曰勿殺吾歸而俘莒人殺之楚師圍莒莒城亦惡庚申莒潰楚遂入鄆莒無備故也未詳信否愚案公子嬰齊專兵伐莒莒既潰又入鄆其罪大矣然莒能治其國家使民效死勿去則莒雖小猶未至於潰也楚一加兵而即潰則莒之為國亦可知矣若鄆之小其能支乎義又見莊十年荆敗蔡師秦人白狄伐晉左氏曰諸侯二故也康侯胡氏曰經所謹者中外之辨也晉嘗與白狄伐秦秦亦與白狄伐晉族類不復分矣武王伐商庸蜀微盧彭濮皆與焉豈亦不謹乎除天下之殘賊而出民於水火之中雖殊方絶域以義驅之可也中國友邦自相侵伐已為不義又與非我疏戚者共焉不亦甚乎晉殺其世臣而諸侯皆二秦狄交伐比事以觀可謂深切著明矣義又見隱七年伐凡伯鄭人圍許左氏曰鄭人圍許示晉不急君也是則公孫申謀之曰我出師以圍許為將改立君者而紓晉使晉必歸君未詳信否張氏曰君在外而興師以復怨大臣之罪也義又見隱二年鄭伐衛城中城中城葉氏曰內城也杜氏曰魯邑也在東海廪丘縣西南前説近是康侯胡氏曰經世安民視道之得失不倚城郭溝池以為固也城非春秋所貴而書城中城其為警守益微矣王公設險以守其國非歟曰百雉之城七里之郭設險之大端也謹於禮以為國辨尊卑分貴賤明等威異物采凡所以杜絶陵僭限隔上下者乃體險之大用也獨城郭溝池之足恃乎義又見隱七年城中丘春秋本義卷十八
