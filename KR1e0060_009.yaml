body:
  text: 春秋本義卷九元程端學撰閔公名開莊公子諡曰閔索隱曰系本名啓避漢景帝諱作開年八嵗元年春王正月義見隱元年不書即位義見莊公齊人救邢左氏曰狄人伐邢管仲言於齊侯曰戎狄豺狼不可厭也諸夏親昵不可棄也宴安鴆毒不可懷也詩云豈不懷歸畏此簡書簡書同惡相恤之謂也請救邢以從簡書齊人救邢義見莊二十八年救鄭夏六月辛酉葬我莊公十一月而葬左氏曰亂故是以緩義見葬桓公秋八月公及齊侯盟于落姑落公羊榖梁作洛杜氏曰落姑齊地義見隱元年盟于蔑葉氏曰小白方伯諸侯閔公雖立而慶父之惡不可以不除則假齊之重以定公位者實季子之意此所謂因陳援以訴於齊使夫人慶父之惡不得隱而後魯可為者也經所以書公及齊侯盟于落姑蓋齊侯與公即其地以為盟其謀出於齊非出於魯既盟而慶父之惡見其姦不得行則季子亦可挾齊以歸魯是盟固季子定公位非魯人納季子也愚以事勢考之此盟多季子倚齊為歸魯計耳故既盟而季子來歸季子來歸季字子者男子通稱孫氏曰莊公薨子般卒閔公幼沖慶父與夫人通勢傾公室不朝夕國人洶洶得季友以平內難故曰季子來歸朱子曰季子來歸如髙子來盟齊仲孫來之類當時魯國內亂得一季子歸國則國人皆有慰望之意故史喜而書之夫子直書史家之辭其實季子無狀觀成風之事可見一書季子來歸而季氏得政權去公室之漸皆由此起矣胡氏曰季子既不能平薑氏之亂誅慶父之惡致使二人卒弒其君故其次年慶父書奔莒夫人孫于邾以見季友之過也沈僩問季友之為人朱子曰此人亦多可疑諸家多言季子來歸為美之之詞據某看此一句正是聖人著季氏所以專國為禍之基又成風聞季氏之繇乃事之左氏記此數語亦有説話此等人皆是魯國之賊耳萬人傑又問成風事季友與敬嬴事襄仲一般春秋何故褒季友如書季子來歸是也人傑謂季子既歸而閔公被弒慶父出奔季子不能討賊是其意在立僖公也朱子曰縱失慶父之罪小季子自有大惡若春秋反褒之則不可曉蓋如髙子仲孫之徒只是舊史書之聖人因其文而不革所以書之者欲見當時事迹付諸後人公議耳冬齊仲孫來仲孫齊大夫名湫字者天子命大夫也左氏曰齊仲孫湫來省難仲孫歸曰不去慶父魯難未巳公曰若之何而去之對曰難不巳將自斃君其待之存耕趙氏曰有命可仗必書使矣朴鄉吕氏曰非盟也非聘也直書曰來其義見矣劉氏曰桓公不務修伯主之義討有罪扶微國而更使智計之士覘伺虛實令慶父極惡魯君再弒此由桓公仲孫謀不臧之故也春秋書之以見君使臣不以禮臣事君不以忠也田恆弒其君孔子沐浴而朝告於哀公請討之夫事君之義捨孔子無可為者矣二年春王正月齊人遷陽杜氏曰陽國名張氏曰陽國漢志東海郡陽都縣是蓋桓公之強力施於可取者如此非有興滅繼絶之誠心也愚謂陽國天子所封也桓公以尊王為名而遷天子所封之國則其所以尊王者假之而已義又見十年宋遷宿吕氏曰聖人作春秋功過不相掩齊人遷陽以兵力劫之罪之甚也夏五月乙酉吉禘于莊公趙氏曰禘王者之大祭也王者既立始祖之廟又推始祖所自出之帝祀之於始祖之廟而以始祖配之也葉氏曰何以言吉禘喪三年不祭惟天地社稷則越紼而行事莊公之喪二十二月矣未應吉而吉也禘祭於太祖之廟以其祖配之也君薨祔而作王特祀於寢三年升於廟莊公之主未升於廟即於寢而以莊公配之非所配而配也康侯胡氏曰程子曰天子禘諸侯祫大夫享庶人薦上下之殺也魯侯耳而有禘祭春秋之中所以言禘不言祫也孔子曰魯之郊禘非禮也周公其衰矣禘言吉者喪未三年行之大早也于莊公者方祀於寢非宫廟也一舉三失禮焉春秋之所謹也髙氏曰閔公幼何知焉聖人書此著季子之徒執國政者之罪也秋八月辛丑公薨丑公羊作酉左氏曰初公傅奪卜齮田公弗禁秋八月辛丑共仲使卜齮賊公於武闈公羊曰公薨何以不地隱之也何隱爾弒也孰弒之慶父也杜氏曰實殺書薨又不地者皆史策諱之邦衡胡氏曰於公薨之下書夫人孫邾慶父奔莒則弒君之迹自見矣黃氏曰莊公不能防間其母播其惡於衆又忘父事讎求婚於齊致哀薑通於慶父叔牙公沒而謀篡弒二世殱焉慶父之後為孟孫叔牙之後為叔孫季友之後為季孫三桓擅政祿去公室魯之衰自莊公始矣閔公生八嵗而慶父立之立二年而慶父弒之閔公蓋可閔而未有是非之可議也義又見隱四年衛州吁事九月夫人薑氏孫于邾公子慶父出奔莒薑氏哀薑莊公夫人也左氏曰成季以僖公適邾共仲奔莒乃入立之以賂求共仲于莒莒人歸之及密使公子魚請不許哭而往共仲曰奚斯之聲也乃縊閔公哀薑之娣叔薑之子也故齊人立之共仲通於哀薑哀薑欲立之閔公之死也哀薑與知之故孫于邾髙氏曰先書公薨而繼書此則知薑氏與慶父二人者實弒君也胡氏曰季子既歸獨執國命以魯之衆因齊之力取慶父弒君之賊而殺之其勢甚易也而季子不能以至復弒閔公今又不討使薑氏慶父得以出奔縱釋同惡之人故書存耕趙氏曰二國保姦之罪亦莫能掩矣愚案雖書慶父之奔亦以著三桓之始也葉氏曰子般之弒夫人與慶父矯立閔公而歸獄於鄧扈樂故夫人猶得安國中而慶父可以託君命以聘齊閔公之弒慶父篡而不得則夫人與慶父之計窮矣外已失齊援而惡暴於國人雖權在已亦無能為季子可誅而不誅猶使逃焉者以僖公為重而不遽討之也康侯胡氏曰莊公忘親釋怨無志復讎忘父子之恩絶君臣之義國人習而不察將以是為常事則亦不知有君之尊有父之親矣莊公行之而不疑大臣順之而不諫百姓安之而無憤疾之心也則人欲必肆天理必滅故慶父無君之心動圉人犖卜齮之刃交發于黨氏武闈之門哀薑以國君母與聞乎故而不忌也當是時魯君再弒幾至亡國不亦憯乎所謂治之於未亂保之於未危不可不察也冬齊髙子來盟杜氏曰髙傒也齊侯使來平魯亂僖公新立因遂結盟故不稱使也魯人貴之故不書名程子曰盟未前定也胡氏曰書法同屈完來盟義又見隱元年盟于蔑此則不討慶父之亂而但使傒來定僖公則桓公之情亦可見矣韓中甫曰子般弒閔公又弒夫人慶父奔為齊桓者宜具其事告諸天王討魯之賊命可立者立之則安危繼絶之義庶矣乃命髙子一來識者本其心不過仗義服諸侯成伯業耳僖公者莊公之庶子也上不受於天王下不承於先君內倚成風屬季子而立外邀大國之臣以定位擅王官之盟專廢置之權説者謂傒能因事制宜故夫子稱髙子以著其善者過矣蓋魯人當疑危之際幸傒來盟以自安故書之曰髙子云爾夫子因而不革付天下後世公論朱子以為如季子來歸之類是也浚南趙氏曰讀春秋者不可於細事上求程子亦曰後世以史視春秋褒善貶惡而巳至於經世大法則不知也其謂是歟十有二月狄入衛左氏曰狄人伐衛衛懿公好鶴鶴有乘軒者將戰國人受甲者皆曰使鶴鶴實有祿位余焉能戰公與石祁子玦與寧莊子矢使守曰以此贊國擇利而為之與夫人繡衣曰聼於二子及狄人戰於熒澤衛師敗績遂滅衛衛侯不去其旗是以甚敗狄入衛遂從之又敗諸河初惠公之即位也少齊人使昭伯蒸於宣薑不可強之生齊子戴公文公宋桓夫人許穆夫人文公為衛之多患也先適齊及敗宋桓公逆諸河宵濟衛之遺民男女七百三十有三人益之以共滕之民為五千人立戴公以廬於曹許穆夫人賦載馳齊侯使公子無虧帥車三百乘甲士三千人以城曹歸公乘馬祭服五稱牛羊豕雞狗皆三百與門材歸夫人魚軒重錦三十兩莘老孫氏曰案左氏以為衛滅而遷都然春秋但曰入蓋狄雖迫衛至於奔亡而未嘗居有其地其後衛復見於經非狄滅而取之故不曰滅爾皆未詳信否張氏曰衛非特懿公好鶴而失人心蓋自惠公即位宣薑淫恣耽樂忘政習實為常公又重之亡形已具故狄人一至而渙然離散以衛為春秋初之大國方與齊侯胥命才四十年而淪於滅亡所以治國必齊其家而淫亂之禍不篡必滅可不戒哉義又見隱七年戎伐凡伯鄭棄其師左氏曰鄭人惡髙克使帥師次於河上久而弗召師潰而歸髙克奔陳鄭人為之賦清人公羊曰鄭棄其師者何惡其將也鄭伯惡髙克使之將逐而不納棄師之道也康侯胡氏曰人君擅一國之名寵生殺豫奪惟我所制爾使克不臣之罪巳著按而誅之可也情狀未明黜而逺之可也愛惜其才以禮馭之可也惡有假以兵權委諸境上坐視其失伍離散而莫之恤乎陸氏聞於師曰人臣之義可則竭節而進否則奉身而退髙克進退違義見惡於民罪亦大矣常山劉氏曰鄭詩清人刺文公也髙克好利而不顧其君文公惡而欲逺之不能使髙克將兵而禦敵於竟陳其師旅翺翔河上久而不召衆散而歸髙克奔陳公子素惡髙克進之不以禮文公退之不以道危國亡師之本故作是詩也觀此詩序則鄭棄其師之道的然著矣春秋本義卷九
