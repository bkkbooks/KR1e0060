body:
  text: 春秋本義卷六元程端學撰莊公名同桓公子元年春王正月義見隱元年公羊曰公何以不言即位隱之也榖梁曰先君不以道終則子不忍即位也劉氏曰即位授受之道也先君不以道終而子即位是無恩於先君也莘老孫氏曰繼弑而不行即位者三莊之繼桓桓見弑於齊也閔之繼子般般見弑於慶父也僖之繼閔閔見弑於慶父也大意已見桓公即位三月夫人孫于齊夫人文姜莊公母也不稱姜氏闕文也朴鄉吕氏曰前書夫人姜氏遂如齊則今孫于齊者即如齊之姜氏前目後凡也未詳信否公羊曰内諱奔謂之孫杜氏曰猶孫讓而去康侯胡氏曰桓公之弑姜氏與焉為臣子者義不共戴天矣胡氏曰文姜之惡甚矣臣子雖不能討王法其可不誅乎愚謂魯不能討而縱之奔齊則魯無臣子莊公無政天王無法姜氏自此淫奔愈無忌憚矣趙氏曰婦人而有與弑其夫之嫌則子不得母之檀弓曰不為伋也妻者是不為白也母今姜氏失婦道矣子不得以為母臣不得以為君夏單伯逆王姬逆左氏作送公羊榖梁作逆葉氏曰左氏誤作送王姬遂以為王之卿如祭伯然果爾即當書天王使單伯送王姬杜預以為既命魯為主不言使非是不如公榖得經之正張氏曰築館在秋如單伯果以天子大夫送王姬必俟館成之後方至豈得預書之伯字也榖梁曰命大夫故不名也張氏曰逆迎也王姬桓王女莊王妹也公羊曰單伯者何吾大夫之命乎天子者也逆之者何使我主之也天子嫁女於諸侯必使同姓諸侯者主之榖梁曰其義不可受於京師也躬君弑於齊使之主婚姻與齊為禮其義固不可受也莘老孫氏曰魯主王姬之婚且使大夫者逆而為之主常事耳皆不當書而書者桓公見弑於齊仇讎未復而莊公又見在衰絰之中天子乃於此時使之主王姬之婚又與仇讎之國為禮書之以見天王不當使魯不當受而單伯不當逆也髙氏曰魯不能訴於天王已無臣子之道在諒闇之中而修嘉好之禮天下固多同姓之國矣何必在魯是魯人黙順王命䧟王於不義也張氏曰齊乃寢苫枕戈不可同天之讎而與之主婚見魯之君臣無復讎之心而三綱至是絶矣愚謂齊襄戕殺魯桓天王當絶其婚而討其辠既不能然又使魯主之周之不能令諸侯也宜哉秋築王姬之館于外張氏曰築館所以待王姬之舎以俟齊之逆也然魯主王姬非一前此必有其所今特築于外者知衰麻哭泣不可雜於吉事故築于外也然桓公弑于齊未及一年其創鉅痛深當百倍於先君正終之日又可以于外為安命國人以築齊王姬之館歟春秋所以著其忘父親讎之辠也莘老孫氏曰仇讎未復莊公之喪未除而天王遽使魯主婚天王則已失禮矣為莊公者當辭於天王期於得請而後已於是之時非無同姓之諸侯也非無無喪之鄰國也蓋莊公未之辭耳君父之讎未復儼然在衰絰之中遽釋怨解仇與之為婚姻之主聖人以莊公事君不盡其誠居喪不致其哀忘君父而交仇讎舎衰絰而親弁冕雖築館以示變然不能救其辠也葉氏曰知其不可而為之者也冬十月乙亥陳侯林卒義見隱三年宋公卒王使榮叔來錫桓公命孫氏曰不書天者脱之杜氏曰榮叔周大夫榮氏叔字錫賜也追命桓公襃稱其德蘇氏曰命之以策也孫氏曰賞以勸善罰以懲惡善不賞惡不罰天下所以亂桓弑逆之人莊王生不能討死又追錫之則莊王之為天子可知也趙氏曰寵篡弑以瀆三綱也髙氏曰禮諸侯嗣位三年喪畢以士服朝天子天子錫之黼冕圭璧然後歸以臨其民謂之受命桓以篡弑未嘗入朝未嘗受命今王命魯主婚故追錫桓公以寵之且魯桓已葬矣因魯之自諡而錫之尤為非禮葉氏曰魯諸公皆不聞免喪朝王之事而莊公書王使榮叔來錫桓公命文公書天王使凡伯來錫公命成公書天子使召伯來賜公命凡三見桓公未嘗朝王受命而追錫之文公未嘗終喪朝王而先錫之成公未有功德而加錫之皆有為而書周官典命上公九命侯伯七命子男五命其國家宫室車旗衣服禮儀皆視其命數為節此先王五等諸侯之辨也秦襄公當犬戎之難以兵佐周東遷平王賜之岐以西之地為諸侯受顯服其大夫作終南之詩以美之此始封為諸侯者也魯僖公能遵伯禽之法牧于坰野魯人尊之季孫行父請命而史克作頌此有功德而加命者也桓文成公皆見於經而僖公獨不見何也凡春秋合禮則以為常事不書桓文成公之命皆禮之不宜有也可見春秋之法王姬歸于齊康侯胡氏曰魯主王姬之嫁舊矣在他公時常事不書此獨書者以歸于齊故也逆于京師館于外書歸于齊而後忘親釋怨之辠著矣齊師遷紀郱鄑郚郱蒲丁切鄑子斯切郚音吾杜氏曰齊欲滅紀故徙其三邑之民而取其地郱在東莞臨朐縣東南郚在朱虛縣東南鄑北海都昌縣西有訾城康侯胡氏曰以師遷之者見紀民猶足與守而齊人强暴用大衆以廹之為已屬也愚謂邑者天子所封有故而遷民邑者天子之事也而諸侯僭之況非有辠而欲吞其國乎齊襄之惡大矣髙氏曰紀與齊乃同姓之國況天子娶后于紀而王姬又歸于齊豈無親親之愛今乃背黄之盟一舉而遷三邑蓋自是遂滅紀矣朴鄉吕氏曰經之書遷者九而義有二焉有强人而遷之者有欲自遷者若齊師遷紀郱鄑郚宋人遷宿齊人遷陽此强而遷之也邢遷于夷儀衞遷于帝丘許遷于葉于白羽于容城蔡遷于州來此其自欲遷者也凡書遷與書取異取者取其土地爾未若遷其民之酷也遷其民則父子兄弟離散而人失其常居恃衆以遷紀之民此聖人所以深疾之歟二年春王二月葬陳莊公義見隱三年葬宋穆公夏公子慶父帥師伐於餘丘慶父莊公庶兄共仲也孫氏曰於餘丘附庸國東萊吕氏曰夷國也若於越然未詳孰是張氏曰莊公是時年才十五慶父得政以制一國之權軍政之本既失而權移於下以成異日子般篡弑之禍故春秋詳書以譏之戴氏曰孟氏之孽基於此義又見隱二年鄭伐衞許氏曰當莊公初魯未有以勝齊則當休兵息民蓄德修政以俟有閒舎堂堂之讎國弗圖而用師伐於餘丘知莊公之無志康侯胡氏曰魯在春秋中見弑者三君其賊未有不得魯國之兵權者翬弑隱公慶父弑子般閔公公子遂殺惡及視夫豈一朝一夕之故哉秋七月齊王姬卒公羊曰曷為錄焉我主之也檀弓曰齊告王姬之喪魯莊公為之大功或曰由魯嫁故為之服姊妹之服孫氏曰莊公忘父之讎既主其嫁又主其卒不子之甚也康侯胡氏曰王姬何以書比内女為之服也莊公於齊王姬厚矣如不共戴天之念何此所謂不能三年之喪而緦小功之察也莘老孫氏曰魯與天王同姓天王之女下嫁諸侯者多魯主之然而十二公二百四十二年之久王姬之歸書之最備者齊王姬也單伯之逆築館于外王姬之歸王姬之卒見於春秋者凡四春秋常事不書而齊王姬之事書之備者所以見莊公盡禮於仇讎而無恩於先君也辠之大則書之備惡之積不可掩也冬十有二月夫人姜氏㑹齊侯于禚諸若切公羊作郜杜氏曰禚齊地左氏曰書姦也愚案周禮司馬九伐之法内外亂鳥獸行則滅之齊襄之惡不容誅矣姜氏與弑而淫縱如此則莊公之不能齊家治國王法之不行於天下舉可見矣趙氏曰姜氏齊侯之惡著矣亦所以病公也曰子可以制母乎夫死從子通乎其下況國君乎君者人神之主風教之本也不能正家如正國何若莊公者哀痛以思父誠敬以事母威刑以馭下車馬僕從莫不俟命夫人徒往乎夫人之往也則公哀敬之不至威命之不行也朱子曰詩南山雄狐前二章刺襄公居髙位而行邪行後二章刺魯桓娶妻使之得窮其欲載驅刺文姜乘此車而來會襄公敝笱比莊公不能防閑文姜猗嗟極道莊公威儀技藝之美而不能以禮防閑其母葉氏曰詩言其情春秋著其法乙酉宋公馮卒義見隱三年宋公卒三年春王正月溺會齊師伐衞莘老孫氏曰不言帥師師少也榖梁曰惡其會仇讎而伐同姓義又見隱二年鄭伐衞胡氏曰將納朔也何以知之桓十六年衞侯朔出奔齊莊五年冬公會齊宋陳蔡伐衞卒納朔焉夏四月葬宋莊公義見隱三年葬宋穆公五月葬桓王王氏曰緩也天子七月而葬同軌畢至杜氏曰桓公十五年三月王崩七年乃葬故曰緩髙氏曰平王之崩求賻於諸侯然後克葬至於桓王崩七年乃葬者蓋承諸侯背叛王師傷敗之後力益不足矣聖人書之以著天下臣子之辠黄氏曰周之事勢可知秋紀季以酅入于齊酅户圭切杜氏曰季紀侯弟酅紀邑在齊國東安平縣張氏曰鄆州之境左氏曰紀於是乎始判孫氏曰諸侯母弟未命者皆字蔡叔蔡季之類是也酅天子所封非紀季可得而有齊欲并紀季忘兄之親取兄之邑以事齊其惡可知也獻可杜氏曰古之邦國分授疆土小大相維協和親此一德以尊天子為之屏翰末世大偪小衆暴寡以至滅亡王不能正故春秋詳書之冬公次于滑乎八切公羊榖梁作郎榖梁曰次者止也杜氏曰滑鄭地在陳留襄邑縣西北張氏曰或曰滑州也常山劉氏曰諸侯非王命不出境卿大夫國政所屬兵師民命所係凡非王命遷延次舎必詳錄之以正非法劉氏曰曷為或以事書或不以事書以事書者止之以事者也不以事書者止之不以事者也君舉於政師舉於義止不以事者亂之道也四年春王二月夫人姜氏享齊侯于祝丘享公羊榖梁作饗杜氏曰享食也祝丘魯地兩君相見之禮非夫人所用義又見二年會于禚皆淫亂也享甚矣康侯胡氏曰享所以訓恭儉也兩君相見享于廟中禮也犧象不出門嘉樂不野合非兩君相見又去其國而享諸侯甚矣戴氏曰甚矣文姜之惡也始焉遜于齊猶有所媿中焉會齊侯已無所懼今焉享齊侯其無忌憚甚矣張氏曰假先王之禮為禽獸之行大亂之道也漢人有云淫亂之漸其變為篡魯人習之三十餘年至子般閔公兩君見弑聖人作易以閑有家為家人之始垂訓逺矣三月紀伯姬卒孫氏曰紀伯姬隱二年紀裂繻所逆内女也禮諸侯絶傍朞姑姊妹女子嫁於國君者尊與已同則為之服大功九月常事也故内女不卒之此書卒者為夏紀侯大去其國齊侯葬紀伯姬起胡氏曰内女不卒如郯伯姬紀兩伯姬宋兩伯姬不書卒惟此伯姬宋伯姬書蓋為齊侯葬紀伯姬起文也夏齊侯陳侯鄭伯遇于垂義見隱四年遇于清許氏曰齊與陳鄭遇垂蓋謀取紀是以紀侯見難而去也未詳是否紀侯大去其國常山劉氏曰大者紀侯之名生名之者失地也左氏曰違齊難也孫氏曰齊肆吞噬信不道矣紀侯守天子土有杜稷之重人民之衆暗懦齷齪不能死難畏齊强脅棄之而去此其可哉張氏曰案紀之本末自桓五年書齊鄭如紀以至莊之元年三年凡關紀之存亡者一一備書之以見齊鄭圖紀之淺深有漸而卒成於今年也紀之圖存雖其閒不能無失然而困於强暴之凌逼委宗社而去之所以責强大閔小弱而寓興滅繼絶之志於言意之表也愚謂齊襄貪肆殘忍辠不勝誅矣然助桀為虐者鄭伯也為紀侯者苟能修德任賢養民訓兵上下一心固守疆土齊人雖衆無能為也書曰大邦畏其力孔子曰能治其國家誰敢侮之乃不務此而求援弱魯結婚夷王邀戰為盟何益於國哉己而紀季先去國勢遂分兵未接境委宗社棄人民妻不及葬而為髙士之逃世大夫之去國致伯姬見葬於讎人叔姬寄死於齊境國君死社稷之義安在哉經曰紀侯大去其國聖人惻怛之心雖以憫時王之無政强暴之吞齧然紀侯不能為國之意在其中矣六月乙丑齊侯葬紀伯姬陸氏曰葬者臣子之事非由鄰國也齊侯并人之國而禮葬其妻是謂豺狼之行而為婦人之仁也愚謂齊侯之惡顯矣然齊兵未至紀侯與其臣子棄殯去國使伯姬葬於讎人之手夫婦之恩臣子之情薄矣哉康侯胡氏曰齊襄廹逐紀侯使之去國雖其夫人在殯而不及葬然後襄公之辠著矣髙氏曰齊襄以紀侯自去其國非我顯滅之故葬伯姬以示己之恩以泯其跡甚矣齊人之詐也存耕趙氏曰不惟紀無臣子亦以病魯不親親也獻可杜氏曰春秋之世法度無所禀强暴者恣其貪危亡者無所託紀為齊所滅而伯姬為齊所葬聖人書之惡齊而閔紀也東萊吕氏曰内女不書葬而書葬者三宋共姬紀伯姬與叔姬皆非常也秋七月冬公及齊人狩于禚禚公羊榖梁作郜狩見桓四年禚見莊二年孫氏曰父之讎不與共戴天莊公之父親為齊殺而逺與齊人狩杜氏曰公越境與微者狩失禮可知存耕趙氏曰狩以奉宗廟教兵守未有入他國而行之者也齊有望諸魯有大野禚非狩所也康侯胡氏曰莊公於齊無時可通也而與之狩是忘親釋怨非人子矣夫狩者馳騁田獵其為樂下主乎已一為乾豆其事上主乎宗廟以為有人心者宜於此焉變矣莘老孫氏曰莊公元年主其婚三年臣會其伐於是又親與其臣狩蓋公不孝而釋讎也於此為甚五年春王正月夏夫人姜氏如齊師杜氏曰書姦也戴氏曰齊侯出師在外姜氏往會之故書曰如齊師婦人在兵閒施面目於三軍之中豈容以人道責哉愚謂齊侯之惡亦著矣莘老孫氏曰姜氏會齊侯之惡春秋皆據實書之傳信後人也或會或享或如師一時之跡不侔而為行之惡則一康侯胡氏曰曰會曰享猶為之名也至是如齊師羞惡之心亡矣夫人之行不可復制矣春秋書此戒後世謹禮於微慮患於早之意深矣秋郳黎來來朝郳五兮切公羊作倪黎左氏作犂公羊曰黎來者何名也其名何微國也常山劉氏曰凡外附庸書名張氏曰案宋仲幾云滕薛郳吾役也則郳蓋宋之附庸以郳屬宋未知信否陸氏曰曹姓子爵挾之後也夷父顔有功於周其子友别封為附庸居於郳曽孫黎來始見春秋數從齊桓尊周室王命為小邾子未詳是否杜氏曰東海昌慮縣有郳城義見隱十一年滕薛來朝冬公會齊人宋人陳人蔡人伐衞左氏曰伐衞納惠公也葉氏曰朔雖宣姜所生然諸侯不得再娶則朔不得為嫡子况殺二公子乎義又見隱二年鄭伐衞六年春王正月王人子突救衞正月公羊榖梁作三月張氏曰王人下士也子突字也莘老孫氏曰衞侯朔譖殺二公子即位數年而見逐於黔牟黔牟在位八年矣去年冬齊帥諸侯之師伐衞而納朔天王於是使子突救之髙氏曰子突以辭直之師不能勝黨惡之諸侯見王命之不行也且王者有征而無救書救以見王室之微矣貫道王氏曰朔以狗彘之種盜天子土地周公之刑所謂内外亂鳥獸行則滅之者也既失天討矣及諸侯伐衞納朔而後出救師吁惜乎其失機也君舉陳氏曰救衞無功而後王命益不行於天下矣夏六月衞侯朔入于衞左氏曰衞侯入放公子黔牟于周放甯跪于秦殺左公子洩右公子職乃即位未詳信否劉氏曰為諸侯受之君君不命而自取之雖有鄰國之助大亂之道也存耕趙氏曰諸侯抗王命其逆可知矣胡氏曰前年諸侯伐衞今年卒納朔天子不克救朔卒為諸侯所納公與諸侯之辠不容誅矣孫氏曰天子之威命盡矣秋公至自伐衞義見桓二年公至自唐此又見俟納朔而後歸也存耕趙氏曰老師三時而朔卒入踰四時而告成事莊公之行十有九其致者五三至自齊以求婚於讎非所以告廟也一至自伐戎以逺伐戎也今至自伐衞以抗王命也胡氏曰凡公行一百七十三至者八十二悉書之煩不勝書止是出入踰時或釁深惡重即書此書者釁深惡重也螟義見隱五年冬齊人來歸衞俘芳夫切公羊榖梁作寶俘軍所獲也張氏曰衞俘衞朔所賂諸侯之貨寶齊人首惡故主衞之賂而分於黨惡助亂之國邦衡胡氏曰諸侯逆王而納朔志乃在於衞俘蓋志於利則叛其君矣春秋書齊人歸俘以見諸侯之逆王命蓋本志於利也康侯胡氏曰言歸衞俘則知四國皆受朔之賂矣夫以弟弑兄臣弑君篡居其位上逆天王之命人理所不容矣彼諸侯者豈其弗察而援之甚力則未有以驗其喪心失志迷惑之端也及書齊人歸俘然後知其有欲貨之心而後動於惡也世變道微暴行交作徇於貨寶賄賂公行使君臣父子兄弟終去仁義懷利以相與不至於篡弑攘奪則不厭也春秋書此垂戒明矣愚謂先書公會齊宋陳蔡伐衞次書王人救衞次書衞朔入衞次書公至自伐衞及此又書齊來歸俘屬辭比事雖無有傳其事豈不顯乎其惡豈不著乎七年春夫人姜氏會齊侯于防杜氏曰防見隱九年義見莊二年會于禚莘老孫氏曰姜氏齊侯辠均惡等夏四月辛卯夜恒星不見夜中星隕如雨見賢徧切夜榖梁作昔陸氏曰非也隕公羊作霣夜初昏以後也夜中夜半也公羊曰恒星者列星也孫氏曰星之常見者也星隕如雨謂隕墜者衆也啖氏曰奔流如雨之多也康侯胡氏曰人事感於下則天變應於上前此者五國連衡旅拒王命後此者齊桓晉文更伯中國政歸盟主王室遂虛其為法度廢絶威信陵遲之象著矣戴氏曰天者積氣所為日月星辰麗焉故常與是氣流轉於其閒今星隕之多如雨則氣之消散可知吕氏曰恒星不見星隕如雨變異之極而當世君臣莫能自省日趨於亂先王之道不復行於世矣堯舜禹湯文武之澤不復被於生民矣變異之極豈徒然哉秋大水無麥苗大水見桓元年黄氏曰麥苗麥之苗也凡植物始生曰苗康侯胡氏曰書大水畏天災也無麥苗重民命也畏天災重民命見王者之心矣忽天災而不懼輕民命而不圖國之亡無日矣黄氏曰案經文本明白天時無可改之理周雖建子無改夏為秋之事春秋所謂秋即今之秋麥種於秋始種為苗秋有大水故無麥苗耳家氏曰中原之地種麥最早故月令仲秋勸種麥是歲以大水之故種麥失時或已種而為水所溺故曰無麥苗非謂己熟之麥也冬夫人姜氏會齊侯于榖杜氏曰榖齊地濟北榖城縣張氏曰後屬鄆州東阿縣義見二年會于禚康侯胡氏曰初會于禚次享于祝丘又次如齊師又一歲而再會焉其為惡益逺矣明年無知弑諸兒其禍淫之明驗也八年春王正月師次于郎以俟陳人蔡人榖梁曰次止也俟待也杜氏曰期共伐郕陳蔡不至故駐師于郎以待之張氏曰不由王命妄興師衆久次于外期會莫應也莘老孫氏曰郕與魯為同姓之國莊公無親親之恩率諸侯以伐之春次于郎以俟陳蔡我俟之也及齊師以圍之我約之也其為志者皆我也所以見内之辠也甲午治兵治公羊作祠陸氏曰非也周禮有治兵康侯胡氏曰此治兵于郎也俟而不至暴師露衆役久不用則有失伍離次逃亡潰散之虞復申明軍法以整齊之譏黷武也張氏曰將以訓齊其衆而不知師出以律已失治兵之本矣雖欲治之其將能乎劉氏曰出曰治兵入曰振旅是以秋治兵春振旅今魯以春治兵非其時矣又曰魯先出兵而後治治又非其常地愚謂有文事者必有武備故治兵於閒暇之時而用之於不得已之際則師出以律矣今莊公輕次於外俟陳蔡而不應蹭蹬無聊衆心離貳然後治之末矣夏師及齊師圍郕郕降于齊師降户江切郕公羊作成康侯胡氏曰書及齊師者親仇讎也圍郕者伐同姓也郕降于齊師者伐國無義而不能服也於是莊公之惡著矣張氏曰魯與郕皆文王之昭蓋同姓兄弟之當親者莊公忘親而志於取郕始擇易制之陳蔡與之同事而陳蔡不來然後不得已而邀齊以圍之所以郕不服魯而寧降於齊春秋直書以見其從讎而貪利資人以虐小二國同役而不同心敵遂得以閒之魯師之出大無功也秋師還崔氏曰歴三時而師還春秋所以始終其事而見其惡索隱曰三時暴兵于外不修民政而奪其農時聖人因而書之以志莊公不臣之罪為後世黷武之戒常山劉氏曰春秋之世用師多矣未有所書如此之詳者何則莊公此師尤為非義上既不用天王之命無故而興師自正月次于郎以俟陳蔡而陳蔡不至可謂無名矣甲午治兵可謂黷武矣夏師及齊師圍郕郕又降于齊可謂無義矣歴三時而師還可謂害民矣夫逆天道親仇讎圍同姓𠞰民力與國不信伐國不服故聖人備書之冬十有一月癸未齊無知弑其君諸兒無知不氏與州吁同左氏曰齊侯使連稱管至父戍葵丘瓜時而往曰及瓜而代期戍公問不至請代弗許故謀作亂僖公之母弟曰夷仲年生公孫無知有寵於僖公衣服禮秩如適襄公絀之二人因之以作亂連稱有從妹在公宫無寵使閒公曰捷吾以女為夫人齊侯游于姑棼遂田于貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨反誅屨於徒人費弗得鞭之見血走出遇賊於門劫而束之費曰我奚御哉袒而示之背信之費請先入伏公而出鬬死於門中石之紛如死於階下遂入殺孟陽於牀曰非君也不類見公之足於户下遂弑之而立無知初襄公立無常鮑叔牙曰君使民慢亂將作矣奉公子小白出奔莒亂作管夷吾召忽奉公子糾來奔張氏曰齊襄之見弑以禍本言之則無知之配嫡己積漸於僖公之時而襄公之惡積不可掩如抗王伐衞殺魯桓公色荒禽荒暱比小人考襄公即位以至於今春秋所書齊事無一非亡國戕身之媒以至禍發蕭牆身殱賊手所謂積不善之餘殃者也義又見隱四年衞州吁事存耕趙氏曰連稱之徒盜賊之靡者因無知以作亂君弑而無知為君則主弑者無知也九年春齊人殺無知義見隱四年衞人殺州吁東萊吕氏曰無知踰年不稱爵蓋弑君之賊爾若不以罪討則亦不以討賊之辭加之猶謂之大夫如里克者是已蔡世子般則楚子誘而殺之齊商人則齊人弑而討之不以其罪故不加以討賊之辭公及齊大夫盟于蔇其器切公羊榖梁作暨大夫無名氏衆大夫也左氏公榖曰齊無君也杜氏曰蔇魯地琅邪繒縣北有蔇亭張氏曰後為沂州承縣榖梁曰盟納子糾也趙氏曰納讎人之子損禮而盟大夫義又見隱元年盟于蔑康侯胡氏曰德有輕重怨有淺深怨莫甚於父母之仇而德莫重於安定其國家而圖其後嗣也有父之讎而不知怨乃欲以重德報之則人倫廢天理滅矣然則如之何以直報怨以德報德夏公伐齊納子糾齊小白入于齊公羊榖梁無子字子糾小白皆襄公庶子孫氏曰小白弟也左氏曰公伐齊納子糾桓公自莒先入杜氏曰二公子各有黨故雖盟而迎子糾當須伐乃得入又出在小白之後公羊曰其言入何篡辭也邦衡胡氏曰齊不受子糾而公必納之故先書公伐齊見齊不受子糾也次書納糾見公黨仇人之子也齊小白曷書入蓋子糾稱子當立也小白不稱子不當立也不當立則為篡存耕趙氏曰魯莊之伐齊似矣惜乎其以納糾也使移此以為復讎之師魯其庶乎春秋書其故以其非讎齊而德齊也莘老孫氏曰莊公忘君父之大讎伐齊而納讎人之子書曰納者不宜納也公子糾雖非嫡長而桓公之庶兄莊公納之雖不得於義而宜嗣齊襄而為君者惟糾焉故曰子糾書納者見莊公納之之辠書子糾者言其宜為齊君秋七月丁酉葬齊襄公杜氏曰九月乃葬亂故義見隱三年葬宋穆公八月庚申及齊師戰于乾時我師敗績此戰公也不言公者蒙上公伐齊之文耳杜氏曰乾時齊地時水在樂安界岐流旱則竭涸故曰乾時左氏曰公喪戎路傳乗而歸秦子梁子以公旗避於下道是以皆止莘老孫氏曰齊為仇讎之國無時而通莊公受糾之來奔志欲納之已盟其大夫伐齊而納糾矣而小白先之既忘其讎矣又不量力而與齊戰焉至於師徒崩喪而糾不免於死為莊公者其辠如何也吕氏曰書我師敗績則凡例謂内不言敗者繆矣春秋無義戰凡相侵伐皆聖人所辠曽不是諱而諱敗乎九月齊人取子糾殺之齊人取子糾殺之者齊人取之於魯而殺之也孫氏曰子糾當立桓公爭國取而殺之甚矣所以重桓公之篡也康侯胡氏曰仁人之於兄弟不藏怒不宿怨親愛之而已矣糾雖爭立越在他國置而勿問可也齊必殺之然後快於心其不仁亦甚矣後世以傳讓為名而取國者必殺其主以為一人心防後患意與此同流毒豈不逺哉孟子曰五霸三王之辠人也仲尼之徒無道桓文之事者存耕趙氏曰小白不能容糾於魯必置之死小白辠也莊公欲納糾使齊得取而殺之莊公亦辠也經書之見小白器量之不宏病魯之無主而與之殺也愚聞之邵子曰五伯者功之首辠之魁也功過不相掩先定五伯之功過而學春秋則大意立矣桓公入齊首殺子糾絶滅天倫辠之尤大者也其與王者行一不義殺一不辜而得天下不為者異矣此後凡伯者之事必辨其功過如邵子云冬浚洙浚蘇俊切公羊曰浚之者何深之也曷為深之畏齊也杜氏曰洙水在魯城北下合泗康侯胡氏曰固國以保民為本輕用民力妄興大作邦本一揺雖有長江巨川限帶封域洞庭彭蠡河漢之險猶不足憑而況洙乎書浚洙見勞民於守國之末務而不知本為後戒也莘老孫氏曰春秋之義凡興作書之皆辠春秋本義卷六
