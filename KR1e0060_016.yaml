body:
  text: 春秋本義卷十六元程端學撰宣公名倭或作接文公庶子子赤庶兄襄仲殺嫡而立之元年春王正月公即位榖梁曰繼故而言即位與聞乎故也戴氏曰魯之桓宣皆繼故而立無所畏懼偃然行即位之禮春秋即其實而書之義同桓公即位公子遂如齊逆女莘老孫氏曰宣公弑子赤而立又在文公之喪也乃遽使大夫逆女於齊書逆所以見弑君之人得志而在位則無所不至也髙氏曰公子遂蓋公族之尊者尤不可也愚謂魯人殺齊之甥而姜氏歸矣復以其女即其喪而嫁弑逆之賊又使弑逆之賊來逆而不辭齊侯之惡亦不可掩矣康侯胡氏曰太子赤齊出也仲遂殺子赤及其母弟而立宣公懼於見討故結婚於齊為自安計越典禮以逆之如此其亟而不顧者必敬嬴仲遂請齊立接之始謀也其後滕文公定為三年喪父兄百官皆不欲曰吾宗國魯先君莫之行也喪禮寖廢夫豈一朝一夕之故自文宣莫之行矣此所謂辠惡自見者也三月遂以夫人婦姜至自齊公羊曰遂何以不稱公子一事而再見者卒名也稱婦姜見僖二十五年髙氏曰不直書夫人婦姜至自齊而稱遂以者明公子遂不當以夫人歸也石氏曰文公之喪未期而使公子遂逆女雖不譏喪娶辠惡自見矣公子翬弑隱公者也公子遂殺子赤者也桓公之立逆女使翬宣公之立逆女使遂斯二人者在國以為賊而桓宣以為忠也王氏曰文十八年書公子遂叔孫得臣如齊而不書其故已而十月子卒則遂及得臣如齊之意可見矣此年書季孫行父如齊而不書其故已而書公㑹齊侯于平州則行父如齊之意可見矣前年書夫人姜氏歸于齊以其子故也既而季孫如齊畏夫人之有所訴也宣公即位之初公子遂如齊逆女亦齊之甥也憂齊之有所黨故欲急婚於齊也公榖謂譏喪娶不知喪娶之不足辠可辠者喪娶之故也夏季孫行父如齊左氏曰季文子如齊納賂以請㑹髙氏曰公既婚矣然後季文子如齊納賂以請列於㑹蓋春秋時凡國君不以其道立苟得一預於諸侯之㑹則他國不得復討文子不憚自行者欲假大國之權以定宣公之位也文子舉動乖錯如此義又見隱七年齊來聘康侯胡氏曰經書行父如齊而不言其故謂納賂以請㑹者傳也經有不待傳而著者比事以觀斯得矣下書公㑹齊侯于平州則知行父請之也又書齊人取濟西田則知其請蓋以賂也雖微傳其事著矣晉放其大夫胥甲父于衛放逐也臣有辠宥之於逺也邦衡胡氏曰流放之刑惟天子得行之譏用天子之刑也木訥趙氏曰天子以四海為家大臣有辠而法不至死則放之于荒裔舜放驩兜于崇山是也晉諸侯耳越晉境而為他國安得荒裔而放之衞豈晉之荒服乎莘老孫氏曰古者諸侯大夫命於天子大夫有辠則請於天子天子命殺之可放之可春秋之時諸侯未嘗請於天子專命之專殺之專放之書曰放其大夫辠其命之專放之無禮也論語曰色斯舉矣為大夫而見放焉則亦非賢者矣公㑹齊侯于平州杜氏曰平州齊地在泰山牟縣西張氏曰後漢志琅邪國陽都故地有牟臺註平州在縣西後屬沂州沂水縣左氏曰㑹于平州以定公位康侯胡氏曰魯宣篡立踰年舉國臣子旣從之矣若之何位猶未定而有待於平州之㑹也春秋以來弑君篡國者已列於諸侯之㑹則不復致討故曹人以此請負芻於晉夫篡弑之賊毁滅天理無所容於天地之閒身無存沒時無古今其罪不得赦也已列於㑹而不復討是率中國為戎夷棄人類為禽獸此仲尼所為懼春秋所以作也義又見隱九年㑹于防張氏曰凡亂臣賊子之所以不敢縱其欲者以其猶有伯主大國能討之也齊乃魯之鄰其力足以正魯而惠公不明於義利邪正之辨㑹平州以定賊子之位則亂賊復何畏而不逞哉吕氏曰子赤卒夫人歸公即位即逆女于齊又㑹齊侯于平州齊人取濟西田雖欲不疑於人不可得也公子遂如齊左氏曰東門襄仲如齊拜成康侯胡氏曰宣公篡立之辠仲遂主謀為首惡初請於齊遂及行父則一再見于經矣如齊拜成雖削之可也又冉書于策者於以著其始終成就弑立之謀以戒後世人臣或内交宫禁以固其寵或外結藩鎮以為之援至於殺生廢置皆出其手而人主不悟者其慮深矣此皆直書於策而義自見者也義又見隱七年齊來聘六月齊人取濟西田濟西田即僖三十一年所復侵地也榖梁曰言取授之也左氏曰齊人取濟西田為立公故以賂齊也公羊曰曷為賂齊為弑子赤之賂也愚謂魯授之而書齊取者魯史之本文史諱國惡而但言齊取春秋因之以見義也康侯胡氏曰夫齊魯鄰國盟主之餘業也子赤弑出姜歸而宣公立不能聲罪致討務寧魯亂首與之㑹是利其為惡而助之也弑君篡國人道所不容者而貨賂公行免於諸侯之討則王章不可復問人類遂以淪胥其禍乃自不知以義為利而以利之可以為利而為之也孟子為梁王極言利國者必至於弑奪而後饜蓋得此意貫道王氏曰齊惠於出姜姊妹也姊妹出於逆臣外孫並戕於逆賊反因之以為利無人心矣許氏曰桓公既弑以許田賂鄭宣公既弑以濟田賂齊夫負不義於天下所藉以行者惟利而已凡非利不取者則亦何義之云擇至於弑父與君將無不合也是以桓宣之計若出一軌春秋志之以見世平則正與法皆勝世變則亂與賂俱行自然之符可不戒諸張氏曰使鄭莊齊惠不貪其利則桓宣亦不能以自立矣故春秋誅其貪利而成亂也秋邾子來朝義見桓二年滕子來朝楚子鄭人侵陳遂侵宋楚子猾夏其惡著矣而鄭師助之辠又甚焉義又見莊十年荆敗蔡師晉趙盾帥師救陳楚鄭侵陳而晉人救之善也然盾以大夫而專兵圖伯則天下禮樂征伐在大夫矣又以序晉靈見弑之漸義又見莊二十八年救鄭君舉陳氏曰南北之勢於是始也後十五年而宋楚平後五十年而晉趙武楚屈建同盟于宋諸夏之君分為晉楚之從矣宋公陳侯衛侯曹伯㑹晉師于棐林伐鄭棐芳尾切公羊作斐上言趙盾帥師而此言晉師者亦先目後凡無他義也杜氏曰棐林鄭地滎陽宛陵縣東南有林鄉葉氏曰地棐林見㑹而後伐也髙氏曰著諸侯為盾所致也夫征伐自天子出諸侯專猶不可況大夫乎自隱桓以來諸侯無大小皆專而行之棐林之㑹中國政在趙盾矣義又見隱二年鄭伐衞貫道王氏曰晉師救陳之後諸侯㑹之而後伐鄭爾怒鄭伯而同外楚諸侯猶可以義起惜盾不足以任其責也靈公立十三年僅盟扈一役與諸侯接餘皆以盾盾既專兵欲不逼得乎冬晉趙穿帥師侵崇崇公羊作栁杜氏曰崇秦之與國任氏曰案地譜商有崇國在京兆鄠縣甘亭左氏曰晉欲求成於秦趙穿曰我侵崇秦急崇必救之吾以求成焉冬趙穿侵崇秦弗與成未詳信否愚謂書此見大夫專兵侵伐亦以序晉靈見弑之漸義又見莊十年公侵宋貫道王氏曰侵崇趙穿得兵權之始也晉人宋人伐鄭康侯胡氏曰宋人弑君王法在所不赦也而晉人與之合兵伐鄭是謂以燕伐燕庸愈乎義又見隱二年鄭伐衛愚案鄭附楚以侵中國晉宋伐之有名矣然趙盾合四國諸侯而不能服鄭之心為晉宋者盍反已而思乎宋以弑逆而伐人晉以大夫而僭伯冝鄭之不心服也伐之不服而又伐之兵不以義其能振乎二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元華戸化切孔氏曰此華元歸生及哀二年趙鞅罕達客主各言帥師者皆是將尊師衆故並具其文何氏曰大棘宋地杜氏曰在陳留襄邑縣南張氏曰襄邑屬拱州左氏曰鄭公子歸生受命於楚伐宋宋華元樂吕禦之戰于大棘宋師敗績囚華元獲樂吕及甲車四百六十乗俘二百五十人馘百人愚案大棘宋地鄭伐宋可知也非前年冬晉宋伐鄭而鄭禦之也而稱宋華元及鄭歸生者華元志乎此戰也鄭附夷狄致晉之伐乃不自咎而帥師伐宋固有辠矣華元為逆賊之臣亦不自咎喻以辭命而妄興大衆以取敗績壞國喪民以及其身皆辠也大凡弑逆之賊戰而偶勝者僥倖耳此其不免者也後世可以鑒此矣義又見僖元年獲莒拏朴郷吕氏曰春秋未有書大夫帥師而戰者書大夫帥師而戰自此始自是而後戰皆書大夫故宋華元鄭公子歸生晉荀林父衞孫良夫魯季孫行父臧孫許叔孫僑如公孫嬰齊晉趙鞅鄭罕達齊國書凡皆大夫帥師而戰也戰不書大夫帥師者吳而已大夫之強可知矣春秋書戰三十四惟晉趙鞅鄭罕逹戰于鐵及此大棘之戰並稱帥師者其衆敵也春秋書獲者七惟齊國書及此宋華元書敗績者身見獲而師又敗也大夫生死皆言獲鄭獲宋華元生也吳獲陳夏齧獲齊國書死也蓋存之殺之皆在既獲之後爾秦師伐晉秦稱師者衆也亦魯史舊文猶楚始稱楚其後漸稱子稱師蓋漸與諸夏混矣左氏曰秦師伐晉以報崇也未詳信否愚謂此亦報復之師也義又見隱七年戎伐凡伯夏晉人宋人衛人陳人侵鄭義同元年伐鄭又見莊十年公侵宋朴郷吕氏曰新城之盟鄭既從晉是同於病楚也未㡬而鄭乃從楚以侵宋晉為是率諸侯之師以伐鄭又未㡬而鄭歸生戰于大棘以敗宋晉又為是率諸侯之師以侵鄭且一鄭也昔何病楚而今從之昔何從晉而今叛之哉蓋自文十七年伐宋一役始夫諸侯之從晉也謂晉之有可依也率諸侯以伐宋將以討賊也乃受其賂立公子鮑而還是立賊也鄭由是謂晉不足與而從楚以侵宋蓋有辭於宋也晉乃庇宋以伐鄭鄭復使歸生伐宋晉復黨宋以侵鄭一動之非義而與國叛之敵國侮之彼得以奉辭而我疲於奔命至一至再而未已也伯主之舉動詎可輕哉秋九月乙丑晉趙盾弑其君夷臯臯公羊作獋左氏曰晉靈公不君厚斂以彫牆從臺上彈人而觀其辟九也宰夫胹熊蹯不熟殺之寘諸畚使婦人載以過朝趙盾士季見其手問其故而患之將諫士季曰諫而不入則莫之繼也㑹請先不入則子繼之三進及溜而後視之曰吾知所過矣將改之稽首而對曰人誰無過過而能改善莫大焉君能有終則社稷之固也豈惟羣臣賴之猶不改宣子驟諫公患之使鉏麑賊之晨徃寢門闢矣盛服將朝尚早坐而假寐麑退歎而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死九月晉侯飲趙盾酒伏甲將攻之其右提彌明知之趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫獒焉明搏而殺之盾曰棄人用犬雖猛何為鬭且出提彌明死之初宣子田於首山舎于翳桑見靈輒餓問其病曰不食三日矣食之舎其半問之曰宦三年矣未知母之存否今近焉請以遺之使盡之而為之簞食與肉寘諸橐以與之既而與為公介倒㦸以禦公徒而免之問何故對曰翳桑之餓人也問其名居不告而退遂自亡也乙丑趙穿攻靈公於桃園宣子未出山而復太史書曰趙盾弑其君以示於朝宣子曰不然對曰子為正卿亡不越竟反不討賊非子而誰宣子曰烏呼我之懐矣自貽伊慼其我之謂矣宣子使趙穿逆公子黒臀於周而立之壬申朝于武宫邦衡胡氏曰易曰弑父與君其所由來者漸矣盾自文六年當國盟㑹侵伐皆盾專之不復有君其來漸矣愚謂春秋歴書趙盾之事而終之以此鑒戒昭矣義又見隱四年衞州吁事貫道王氏曰靈公之立非盾意也故君臣不相能而盾之無君之心乆矣盾狡而穿愚河曲之役委曲庇之將用之也且使為公壻則伏姦賊於君側有年矣靈公不君與盾為仇此盾之所以先事而發也使穿侵崇是與之以兵權也事成機熟委君於穿而宿留境上謂非其情可乎穿弑君而反使之迎成公而立之是庇穿弑而免穿於討也後人見傳徒以事成於穿而盾負弑逆亦惑矣康侯胡氏曰趙穿手弑其君董狐歸獄於盾其斷盾之獄詞曰子為正卿亡不越境反不討賊以是書斷而盾也受其惡而不敢辭仲尼因其法而不之革其義云何曰亡而越境謂去國而不還也然後君臣之義絶反而討賊謂之復讎而不釋也然後臣子之事終不然是盾偽出而實與聞乎故也假令不與聞者而縱賊不討是有今將之心而意欲穿之成乎弑矣惡莫慘乎意今以此辠盾乃閑人子之邪心而謹其漸也微夫子推見至隱垂法後世亂臣賊子皆以詭計獲免君臣父子不相夷以至於禽獸也㡬希冬十月乙亥天王崩書此為速𦵏及魯郊起文也義又見隱三年三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望張氏曰郊牛者本養以事天之牛也髙氏曰不言傷之者牛自傷也宣公弑君篡位無天道矣豈足以對越在天乎祭天之牛或傷或死此天示變以警公也康侯胡氏曰乃不郊為牛之口傷改卜牛而牛又死也不然郊矣禮為天王服斬衰周人告喪于魯史策已書而未𦵏也祀帝于郊夫豈其時而或謂不以王事廢天事禮乎春秋已來喪紀寖廢有不奔王喪而逺適他國有不修弔禮而自相聘問固將以是為可舉而不廢也卒至漢文以日易月後世不能復其所由來漸矣春秋備書其義自見魯郊與猶三望義並見僖三十一年趙氏曰魯之僭郊天不從而魯必為之卜而不從者四鼷䑕食牛者三牛口傷者一魯不自咎其僭必將用之凡郊之不從牲之變故皆非人力所能為也不郊而猶三望不得僭於天而僭於地天地豈有異理天所不享地安得享之𦵏匡王杜氏曰四月而𦵏速康侯胡氏曰四月而𦵏王室不君其禮略也楚子伐陸渾之戎渾戸門切又戸困切陸公羊作賁公榖無之字張氏曰陸渾子本允姓居瓜州僖二十二年秦晉遷之于伊川在唐為河南陸渾縣地宋河南府伊陽縣北二十里有陸渾縣故城康侯胡氏曰楚伐陸渾其志何也為陸渾在王都之側故書于策以謹中外之辨禁㓂亂之階愚謂陸渾在伊雒天子不能治諸侯不能驅而楚人得以伐之中國不振甚矣義又見僖三年徐取舒夏楚人侵鄭義見莊十年荆敗蔡師秋赤狄侵齊張氏曰赤狄狄之别種木訥趙氏曰隈姓潞甲及留吁皆赤狄也孔氏曰謂之赤狄白狄者俗尚赤衣白衣也地譜洛州春秋赤狄之地義見隱七年戎伐凡伯木訥趙氏曰僖文之世歲有狄患至文十一年叔孫得臣敗狄于鹹狄患頓息狄衰而赤狄興焉今其侵齊始見於經宋師圍曹邦衡胡氏曰宋文弑立已為亂而欲治人之亂春秋所甚惡也愚謂逆賊逞志以圍人之國見王政之壞極矣義又見僖十九年宋圍曺冬十月丙戌鄭伯蘭卒義見隱三年宋公卒𦵏鄭穆公木訥趙氏曰𦵏不月闕文也愚謂月日雖闕然冬卒而冬𦵏蓋在三月之内速也義又見隱三年𦵏宋穆公四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向郯音談向舒亮切張氏曰郯己姓國子爵秦有郯郡漢屬東海郡故城在淮陽軍下邳縣北杜氏曰莒郯二國相怨故公與齊侯共平之向莒邑東海承縣東南有向城左氏曰平國以禮不以亂以亂平亂何治之有劉氏曰平莒及郯義也莒人不肯吾有不義焉伐莒强也取向利也非君子之道也君子之道猶射射者正己而後發𤼵而不中不怨勝己者反求諸己而已矣張氏曰易曰貞吉悔亡憧憧徃來朋從爾思聖人所以感人心而天下和平者此心公正自足以感之也今以宣公而平二小國若出於公不必假齊一言而彼己服今挾齊為重而彼尚不肯伐莒而齊不與復取向以自益春秋深以著宣公此心之不公而終之以為利也秦伯稻卒張氏曰秦伯共公也存耕趙氏曰自秦康公罃卒書於經而秦同於中國矣於是書共公稻卒義見文十八年秦伯卒夏六月乙酉鄭公子歸生弑其君夷左氏曰歸生子家也愚案先書歸生帥師而終之以此見大夫專兵國之禍也鑒戒昭矣義又見隱四年衛州吁事赤狄侵齊義見三年秋公如齊義見僖十年但彼猶朝伯主此則朝其立己者耳公至自齊義見桓二年公至自唐冬楚子伐鄭左氏曰鄭未服也義見莊十年荆敗蔡師張氏曰案楚自去年至十年侵伐鄭者凡五至十一年盟鄭于辰陵而鄭又徼事晉於是十二年圍鄭入之遂敗晉于邲而後鄭服楚晉人之不振有自來矣五年春公如齊義見四年此則去秋與今春兩如齊甚矣夏公至自齊踰時而返也義又見桓二年公至自唐秋九月齊髙固來逆子叔姬張氏曰左氏無子字據髙固及子叔姬來有子字當從公羊榖梁子叔姬趙氏曰時君之女也左氏曰逆叔姬卿自逆也髙氏曰古者三十而娶五十而爵為大夫故大夫無出境親迎者髙固為齊正卿而始與魯為婚又越境逆女非禮可知義又見莊二十七年莒慶逆叔姬叔孫得臣卒張氏曰不日闕文也存耕趙氏曰謹三孫之世卿也大意又見隱元年益師卒冬齊髙固及子叔姬來啖氏曰大夫非公事與妻出境非禮也時叔姬始嫁未合歸寧假令合歸寧亦不當與髙固同來書之以明髙固之辠也康侯胡氏曰禮女子有行逺父母者歳一歸寧今見逆踰時未易歳也而叔姬亟來非禮也大夫適他國必有君命與公事否則禮法之所禁而可犯乎惠公許其臣越禮恣行而莫遏髙固委其君踰境自如而不忌則人欲己肆矣凡婚姻常事不書而書此者則以為非常為後世戒也楚人伐鄭義見莊十年荆敗蔡師六年春晉趙盾衛孫免侵陳左氏曰晉衞侵陳陳即楚故也髙氏曰趙盾弑君孫免為衞卿反與之比以兵加人之國因見當時習於悖亂不知君臣大義也義又見莊十年公侵宋貫道王氏曰向也楚嘗侵陳晉一救之陳遂從於侵鄭陳非忘晉也鄭以晉故三年三被楚師晉無一矢之救此陳所以畏而平楚也晉不自反偕衛以侵陳討貳晉可知矣木訥趙氏曰晉楚爭陳自此始夏四月秋八月螽公羊作􅏑義見桓五年康侯胡氏曰𫝊謂螽為穀災虐取於民之效也軍旅數起賦斂既繁戾氣應之矣善惡之感萌於心而災祥之應見於事宣公不知舎惡遷善以補前行之愆而用兵不息災異數見年榖不登國用空乏卒至於改助法而稅民蓋自此始矣經於螽螟一物之變必書于策以示天人感應之理不可誣當慎其所感也冬十月七年春衞侯使孫良夫來盟義見隱元年盟于蔑愚案外大夫來盟者五而稱使者二桓十四年鄭伯使其弟語及此孫良夫是也直書來盟者三閔二年齊髙子僖四年楚屈完文十五年宋司馬華孫是也凡書使前定也其君使之來盟也不書使未前定也大夫至其國隨冝以盟者也大略如此又當隨事見義不可執一而論夏公㑹齊侯伐萊杜氏曰萊國東萊黄縣張氏曰登州黄縣有萊山貫道王氏曰萊東方之國近於齊齊欲兼之而魯宣以兵助其虐康侯胡氏曰公與齊侯俱不務徳合黨連兵恃強陵弱是以為此舉也秋公至自伐萊踰時也義見桓二年公至自唐大旱義見僖二十一年張氏曰比年螽旱觀其所感可見矣冬公㑹晉侯宋公衞侯鄭伯曹伯于黒壤張氏曰黒壤晉地一名黄父義見隱九年㑹于防邦衡胡氏曰自文公以來中國無盟主終晉靈之世未嘗一合諸侯成立五年始有黒壤之㑹而大夫不與焉庶㡬桓文之事愚謂此㑹終不能以服楚不旋踵而滅舒蓼伐陳矣八年春公至自㑹冬㑹春至則正月告朔之禮廢矣義又見桓二年公至自唐髙氏曰古者國有凶荒則殺禮而不舉公夏㑹伐萊而秋至冬㑹黒壤而此年春至其間大旱之不恤而區區以侵伐期㑹為急夏六月公子遂如齊至黄乃復孔氏曰黄齊境公羊曰其言至黄乃復何有疾也何言乎有疾乃復譏大夫以君命出聞喪徐行而不反聘禮曰賔入竟而死遂也若賔死未將命則既斂于棺造于朝介將命孫氏曰至黄乃復廢君命也東萊吕氏曰昭公如晉亦有疾乃復矣今不云有疾人臣不當以疾廢君命昭公可以疾止仲遂不可以疾止也辛巳有事于大廟仲遂卒于垂壬午猶繹萬入去籥葉氏曰有事者四時之常祭也仲遂公子遂也稱仲遂見僖十六年季友卒垂見隱八年穀梁曰猶者可以己之辭康侯胡氏曰繹者祭之明日以賔尸也杜氏曰籥管也吕氏曰萬舞文武二舞之總名籥舞文武之别名也文舞又謂之羽舞蓋文舞吹籥秉翟羽也萬入去籥者文武二舞俱入於二舞中去羽舞之吹籥以其有聲也去其有聲而用其舞者以仲遂之卒知其不可而為之也此正祭之日仲遂卒于垂則次日已聞之股肱之痛賔尸之祭為可已也行吉禮於方聞喪之時雖用舞而僅去其有聲者是知其不可而猶為之也劉氏曰譏世卿言自是世仲氏也愚謂春秋有大義兼小義者此章本為猶繹書而因以見世卿之義而遂則東門氏之始也遂之後公孫歸父仲孫嬰齊亦執魯政故志之又案仲遂弑君之賊人所當討奉使未畢中道擅返宣公明正其罪不為之服可也既私其立己之恩一切容之俾為上卿矣則當以上卿之禮處之聞喪而廢繹可也今偃然行吉禮以賔尸用樂而僅去其管則宣公既失大義又失常禮正張氏所謂由其心之不正而施之宗廟朝廷者繆戾如此春秋書之將使後世識君臣之義禮樂之情豈徒攻宣公仲遂之惡哉又案周禮樂師敎國子舞羽吹籥然詩曰左手執籥右手秉翟孔氏曰籥雖吹器舞時與羽並執明此時舞者不得吹籥也吕氏吹籥之說豈即所執之籥歟抑别有所謂吹籥者而去之歟戊子夫人嬴氏薨嬴公羊穀梁作熊胡氏曰非也當從左氏嬴氏杜氏曰宣公母髙氏曰此文公妾也何以稱夫人援成風之例著其僭也義見文四年風氏薨葉氏曰魯之妾母仲子也成風也敬嬴也定姒也定弋也自仲子始見於隱公之世春秋猶書惠公仲子之賵考仲子之宫以見譏然仲子猶不為夫人魯之妾母為夫人自成風始貫道王氏曰敬嬴私事襄仲故仲弑二君立其子遂蓋有公子頑之辠也賊以仲卒淫嬖以夫人薨國無政也晉師白狄伐秦張氏曰白狄即丹州延州銀夏之地秦同壤之國也左氏曰春白狄及晉平夏㑹晉伐秦康侯胡氏曰晉主夏盟糾合諸侯靖㓂難安諸夏乃其職矣秦人之怨起自侵崇其曲在晉責己可也既不知自反釋怨修睦以補前過已可咎矣乃復興師動衆㑹白狄以伐之晉之罪不已甚乎愚謂摟諸侯以伐諸侯辠也况㑹白狄以伐秦以報私忿乎楚人滅舒蓼音了穀梁作鄝張氏曰或曰地譜上義陽之蓼不與羣舒近此即如舒鳩舒庸一國也木訥趙氏曰舒蓼一國也舒同宗而異國舒蓼舒庸舒鳩皆舒也亦猶狄均曰狄而異種舒蓋楚之黨而舒逼近中國舒滅中國失其南門矣左氏曰楚為羣舒畔故伐舒蓼滅之義見僖三年徐取舒髙氏曰自徐人取舒至是楚人滅舒蓼成十七年又滅舒庸襄二十五年又滅舒鳩其属自相攻滅而春秋書之者是時楚人勢横將為中國憂楚駸駸有狎主齊盟患矣秋七月甲子日有食之既義見桓三年冬十月己丑𦵏我小君敬嬴雨不克𦵏庚寅日中而克𦵏敬嬴公羊穀梁作頃熊趙氏曰頃惡諡也宣公追尊其母不應加惡諡也榖梁曰𦵏既有日不為雨止禮也雨不克𦵏喪不以制也孫氏曰譏無備也禮平旦而𦵏日中而虞此言庚寅日中而克𦵏𦵏之無備可知也其稱小君與私諡又見文五年𦵏成風康侯胡氏曰喪事即逺有進無退浴于中霤飯于牖下小斂于户内大斂于阼階殯于客位遷于廟祖于庭塴于墓以弔賔則其退有節以虞事則其祭有時不為雨止禮也潦車載蓑笠士喪禮也有國家者不能為雨備不亦薄乎城平陽杜氏曰泰山有平陽縣張氏曰襲慶府鄒縣有南平陽城許氏曰國有大喪始𦵏又動衆城邑非特不愛民力以公為忘親愛矣義又見隱七年城中丘楚師伐陳左氏曰陳及晉平楚師伐陳取成而還義見莊十年荆敗蔡師髙氏曰陳以晉衛見侵復棄楚而從晉故楚以為討所以譏其始謀之失然晉不能救陳遂復從楚晉之辱也九年春王正月公如齊公既以嫡母之禮處庶母則在喪服之中矣而以歲之首月逺朝強齊非特見公之無哀亦不知有天王矣義又見僖十年公至自齊存耕趙氏曰朝正於齊無新歳之戚尚可以告廟乎義又見桓二年公至自唐夏仲孫蔑如京師蔑榖之子孟獻子也胡氏曰歳首月公朝齊夏使大夫聘京師黄氏曰比事而觀則輕重先後倒置可知齊侯伐萊義見七年伐萊許氏曰狄比侵齊而齊不敢報萊不犯齊而齊亟伐之畏衆強而弱微弱如此於此可以觀惠公之政矣秋取根牟孫氏曰内滅國曰取諱之也劉氏曰根牟者附庸之國杜氏曰東夷國琅邪陽都縣東有牟郷張氏曰屬密州安丘縣義見莊十年齊滅譚竊疑此蒙上齊侯伐萊之文則根牟為萊邑而齊取之也但無所考耳八月滕子卒滕稱子見桓二年左氏曰滕昭公卒髙氏曰自隱七年書滕侯卒至此始書滕子卒者魯不㑹其𦵏而書卒為下圍滕起大意又見隱七年滕侯卒九月晉侯宋公衞侯鄭伯曹伯㑹于扈扈見文七年義見隱九年㑹于防邦衡胡氏曰鄭自晉靈以來服屬於楚至晉成繼立始叛楚而歸晉自宣三年至於是鄭無歳不有楚師然不敢叛晉者惟晉成是賴故黒壤及此扈之㑹鄭皆在焉黄氏曰晉自靈公不能繼文襄之業中國無與主盟㑹皆出於大夫至成公方㑹諸侯于黒壤又㑹于扈中國賴之愚案伯者之功過如此晉荀林父帥師伐陳邦衡胡氏曰文宣以來諸侯權移於大夫雖晉成銳意文襄之業再㑹諸侯卒不能收下移之權今荀林父帥師以見諸侯皆再㑹而大夫專伐爾髙氏曰陳不㑹即楚故也楚伐陳晉不能救今乃伐之晉之不義甚矣義又見隱二年鄭伐衛辛酉晉侯黒臀卒于扈臀徒門切杜氏曰卒於境外故書地髙氏曰不言卒于㑹者諸侯散而晉侯以疾留于扈也諸侯非王事不出境成公㑹于扈而卒非正也大意見隱七年滕侯卒莘老孫氏曰春秋諸侯卒皆不地外事則略也卒于外者八書地者三晉侯卒于扈鄭伯卒于鄵宋公卒于曲棘不言于師于㑹而以地言者在其封内也人君之卒必於正寢而諸侯非王命奔走於外以死國事無所寄託而宗社危殆者必謹志之晉鄭宋之君皆卒于封内而春秋猶辠之者辠其不卒于正寢也卒于封内書地卒于㑹書㑹卒于師書師以地為重則于㑹于師又可知也愚案公穀孫氏皆以扈為晉地未詳是否竊謂書地書㑹書師皆因魯史之舊要之皆非王事而不卒于正寢耳恐未可以地與㑹與師分優劣也冬十月癸酉衞侯鄭卒大意見隱七年滕侯卒胡氏曰晉成公衞成公皆不書𦵏魯不㑹也二國赴喪皆不往㑹以私怨廢禮忘親髙氏曰此所謂無其事闕其文者也皆未詳是否宋人圍滕左氏曰宋人圍滕因其喪也張氏曰不哀有喪用兵圍之比事以著其不仁也義又見僖十九年宋圍曹康侯胡氏曰圍非將卑師少所能何以不稱師闕疑愚謂程子謂不知衆寡將帥名氏亦曰某人者正指此類也益知春秋不可以凡例求矣楚子伐鄭髙氏曰楚子聞晉侯卒于扈來討鄭伯之貳義見莊十年荆敗秦師黄氏曰楚莊之立加兵於鄭凡四而兩書楚子說凡例者紛然蓋書楚子者君為將也書楚人者大夫為將也閒晉伐鄭何可襃而以書楚子曲生意義邪晉郤缺帥師救鄭義見莊二十八年救鄭陳殺其大夫泄冶泄息列切張氏曰左氏作洩今左傳本多因唐人諱世字雖偏傍亦然故改泄為洩也左氏曰陳靈公與孔寧儀行父通於夏姬皆衷其衵服以戲於朝洩冶諫曰公卿宣淫民無效焉且聞不令君其納之公曰吾能改矣公告二子二子請殺之公弗禁遂殺洩冶許氏曰書殺洩冶張陳亂之本也義又見莊二十六年曹殺大夫春秋本義卷十六
