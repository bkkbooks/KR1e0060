body:
  text: 春秋本義卷十四元程端學撰文公名興僖公子聲薑所生元年春王正月公即位康侯胡氏曰即位者告廟臨羣臣也國君嗣世定於初喪必踰年然後改元即位趙氏曰凡國君立必踰年乃即位不獨以一年不二君亦以告終稱嗣間容其請命以備禮也文公即位雖內受於先君而亦不請命於天子矣浚南趙氏曰周改正朔月數固未嘗改而大事必用建子之月魯用寅月即位是自改天子正朔也書之以懲専恣愚謂商以十二月建丑為嵗首故伊尹以十二月奉嗣王祗見厥祖秦以十月建亥為嵗首故秦史紀年始皇巡狩皆自十月朔則周諸侯之即位當在十一月建子之月今魯在寅月即位故曰自改天子正朔也然於周無實事可考未敢質言耳二月癸亥日有食之公羊亥下有朔字義見隱三年天王使叔服來會葬叔服字也杜氏曰叔氏服字未詳是否左氏曰內史叔服髙氏曰葬者臣子之事會葬者諸侯相送終之辭也天王唯有弔贈含禭之禮今使叔服來會葬是自同於諸侯也則天王之微弱可知矣胡氏曰案諸侯五月而葬僖公卒在前年十二月至此方三月而使叔服來會葬獻可杜氏曰諸侯奉上之節蔑聞焉而天王使大夫會僖公之葬夏四月丁巳葬我君僖公義見隱三年葬宋穆公天王使毛伯來錫公命杜氏曰毛國伯爵諸侯為王卿士者孫氏曰毛采地左氏曰毛伯衛也莘老孫氏曰天王有賜於下書曰錫命己薨之公則曰錫某公命當國之君但曰錫公命劉氏曰錫命者命為諸侯也髙氏曰凡諸侯之立世子必請命於天子及諸侯之薨也必告於天子天子命立其世子為諸侯世子喪畢乃朝於京師以士服見天子於廟而受命焉未受命不敢服其服己見天子錫之黻冕圭壁然後服之歸設奠於祖廟然後臨其臣民焉蓋諸侯不命於天子則不成為君故世子雖有世繼之義必待天子爵命乃得為君也今文公未畢喪而天王先使人即命之非禮甚矣愚謂文公在衰絰中安然受之而不辭毛伯不諌而從君之令皆非也義又見莊元年王錫桓公命康侯胡氏曰諸侯終喪入見則有錫嵗時來朝則有錫能敵王所愾則有錫黻冕圭壁因其終喪入見錫之者也禮所謂以士服見天子己見錫之黻冕圭壁然後歸是己車馬衮黼因其嵗來朝而錫之者也詩所謂君子來朝何錫豫之雖無豫之路車乘馬又何豫之玄衮及黼是已彤弓玈矢因其敵愾獻功而錫之者也詩所謂彤弓弨兮受言藏之我有嘉賔中心貺之鐘鼓既設一朝享之是已今文公繼世喪制未畢非初見繼朝而獻功也何為來錫命乎黃氏曰事勢陵夷上之每每屈己以就下如此晉侯伐衛義見隱二年鄭伐衛此則居喪伐人尤非也叔孫得臣如京師得臣叔牙之孫莊叔也左氏曰叔孫得臣如周拜髙氏曰公初即位在衰絰中未嘗朝王而王遽使卿來錫公命公於是使陪臣如周拜焉天王之使毛伯來錫文公之使叔孫得臣往拜皆非禮也所謂君不君臣不臣存耕趙氏曰文公踰年即位儼然喪服之中天王錫命安然受之己非禮矣使既受命亟拜王庭君子猶為不可今使大夫往拜是夷周於敵己矣若曰未終喪雖使大夫往可也獨不曰未終喪不敢當君命邪衛人伐晉晉襄居喪伐國固有罪矣然猶為承其父之業也衛人不連諸侯固中國之勢而以報復為事尤有罪矣義又見隱二年鄭伐衛東萊吕氏曰嘗聞以小事大者未聞以小而謀大者也以小而謀大滅亡之道也秋公孫敖會晉侯于戚杜氏曰戚衛邑在頓丘衛縣西未詳信否存耕趙氏曰文公即位元年容貌采章未接於列國而權臣擅命代君則失政之始也他日叛命而逃幸而客死此習已成矣愚謂諸侯非王命自為會罪也况魯國有喪以大夫而會伯主乎晉襄居喪而下會大夫亦非禮也義又見隱九年會于防戴氏曰孟氏自敖而専叔孫氏自得臣彭生而橫季孫氏自行父而侈東萊吕氏曰內之禮樂自大夫出由公孫敖會晉侯始外之禮樂自大夫出由陽處父救江始溴梁之盟則遍刺天下之大夫矣冬十月丁未楚世子商臣弒其君頵憂倫切又丘倫切公羊榖梁作髠左氏曰初楚子將以商臣為大子訪諸令尹子上子上曰君之齒未也而又多愛黜乃亂也楚國之舉常在少者且是人也蜂目而豺聲忍人也不可立也弗聽既又欲立王子職而黜大子商臣商臣聞之而未察告其師潘崇曰若之何而察之潘崇曰享江芉而勿敬也從之江芉怒曰呼役夫宜君王之欲殺女而立職也告潘崇曰信矣潘崇曰能事諸乎曰不能能行乎曰不能能行大事乎曰能十月以宫甲圍成王王請食熊蹯而死弗聽丁未王縊穆王立以其為太子之室與潘崇使為大師且掌環列之尹何氏曰言世子者所以明有父之親言君者所以眀有君之尊孫氏曰商臣之於君親盡矣義又見隱四年衛州吁事康侯胡氏曰世子而至於弒逆此天理大變人情之所深駭者春秋詳書其事欲後世察所由示懲戒也楚頵僣王憑陵中國戰勝諸侯毒被天下然昧於君臣父子之道禍發蕭牆而不之覺也不善之積可掩哉君不君而臣不臣父不父而子不子春秋書世子弒其君者推本其所由而著其首惡為萬世之大戒也黃氏曰唐大子宏授左氏春秋廢書而歎曰聖人何書此邪率更令郭瑜對曰春秋以善惡為勸戒故商臣千載而惡名不滅公孫敖如齊戴氏曰諸侯世相朝必三年喪畢今敖如齊非禮也専也文公即位一嵗之間朝會皆出於得臣與敖何以為國乎義又見僖七年齊來聘髙氏曰會晉歸而復聘齊魯人於是兩事齊晉且圖婚於齊故也二年春王二月甲子晉侯及秦師戰于彭衙秦師敗績書晉侯及之晉主乎此戰也杜氏曰馮翊郃陽縣西北有彭衙城張氏曰屬同州白水縣左氏曰秦孟明視帥師伐晉以報殽之役二月晉侯禦之先且居將中軍趙衰佐之王官無地御戎狐鞫居為右甲子及秦師戰于彭衙秦帥敗績晉人謂秦拜賜之師秦伯猶用孟眀孟眀增修國政重施於民趙成子言於諸大夫曰秦師又至將必辟之懼而增德不可當也愚謂秦穆行險邀利以取敗不自悔責而事報復又取敗績其罪著矣晉襄公忘喪而主乎此戰雖勝無足道矣義又見隱二年戎伐凡伯丁丑作僖公主康侯胡氏曰作主者造木主也胡氏曰主者神所憑依也公羊曰作僖公主者為僖公作主也主者曷用虞主用桑練主用栗用栗者藏主也作僖公主何以書譏不時也康侯胡氏曰慢而不敬甚矣吕氏曰過時作主文公孝心不至可知矣其能為國乎左氏曰緩作主非禮也存耕趙氏曰孝子之思親不見其形則為主以寓之作栗主埋桑主於兩階之間僖公之喪過練期矣故曰緩將大事而躋之也三月乙巳及晉處父盟孰及之魯之微者與隱元年及宋人盟之及同處父晉大夫左氏曰陽處父也邦衡胡氏曰處父盟於我之國都凡盟必地惟他國大夫來魯盟我大夫往他國盟不地蓋各於其國中故不地也義見隱元年盟于蔑夏六月公孫敖會宋公陳侯鄭伯晉士縠盟于垂隴縠户木切隴力勇切公羊榖梁作斂杜氏曰垂隴鄭地滎陽縣東有隴城邦衡胡氏曰垂隴之會譏政在大夫也晉襄紹伯主盟使大夫出會諸侯非禮之正愚謂諸侯非王事不得出會盟諸侯况以大夫而盟諸侯乎士縠以襄公之命盟諸侯則是大夫主盟也禮樂征伐自大夫出矣義又見隱元年盟于蔑愚案伯者之大夫盟自僖二十九年翟泉之盟始至此則士縠主諸侯矣自十有二月不雨至于秋七月義同僖二年八月丁卯大事于太廟躋僖公公羊曰大事者何大祫也大祫者何合祭也其合祭奈何毁廟之主陳於大祖未毁廟之主皆升合食於大祖躋者何升也何言乎升僖公譏逆祀也其逆祀奈何先禰而後祖也左氏曰逆祀也於是夏父弗忌為宗伯尊僖公且明見曰吾見新鬼大故鬼小先大後小順也躋聖賢明也明順禮也君子以為失禮禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先父食久矣髙氏曰僖公雖閔公之兄然閔實先立僖嘗北面而事之君臣之義已定矣及其傳繼則父子之義又定矣臣不可以先君子不可以先父今文公欲自尊其父而躋於閔公之上則紊亂宗廟顛倒禮經先親後祖昭穆失序謂之逆祀不亦宜乎愚謂文公居喪未大祥而吉祭於大廟非禮一也僖公之主未當入宫非禮二也躋僖公於閔公之上非禮三也榖梁曰先親而後祖也逆祀也逆祀則是無昭穆也無昭穆則是無祖也無祖則無天也君子不以親親害尊尊此春秋之義也康侯胡氏曰閔僖二公親則兄弟分則君臣以為逆祀者兄弟之不先君臣禮也夫有天下者事七世諸侯事五世説禮者曰世指父子非兄弟也然三傳同以閔公為祖而臣子一例是以僖公父視閔公為禮而父死子繼兄亡弟及名號雖不同其為世一矣冬晉人宋人陳人鄭人伐春程子曰秦以憤取敗晉可以已矣而復伐秦報復無已殘民結怨髙氏曰三國以伐秦再舉兵而過京師尤其惡之大者公子遂如齊納幣公羊曰此何以書譏喪娶也娶在三年之外則何譏乎喪娶三年之內不圖婚三年之恩疾矣非虛加之也以人心為皆有之娶者大吉也非常吉也其為吉者主乎已以為有人心焉者則宜於此焉變矣趙氏曰又譏使公子納幣也董子曰春秋譏文公以喪娶難者曰喪不過三年三年之喪二十五月文公四十一月乃娶何以為喪娶曰事莫重乎志納幣之月在喪內故曰喪娶也且文公以秋祫祭以冬納幣皆失於太早三年之喪肌膚之情也反在思念娶事春秋之所甚疾也髙氏曰婚禮有六曰納采曰問名曰請吉曰納徴曰請期曰親迎自有次第納幣者即納徴也公始祥而納幣則納采問名皆在三年之內矣夫三年之內不圖婚聖人於此譏之所以闡幽也先儒謂婚姻不可使公族而不述其所以蓋公子公孫於國皆當盡人子之義惟婚姻之禮則有家人尊卑之序俾尊者將命從事則非順矣卑者行之庶或其可也葉氏曰禮祥而縞是月禫徙月樂孟獻子禫縣而不樂比御而不入夫子曰獻子加於人一等矣禫而圖婚猶喪娶也康侯胡氏曰此皆使人私欲不行間邪復禮之意三年春王正月叔孫得臣會晉人宋人陳人衛人鄭人伐沈沈潰沈尸甚切貫道王氏曰不言帥師不成師也杜氏曰沈國名汝南平與縣北有沈亭張氏曰沈姬姓國漢志汝南治平與故沈子國屬蔡州左氏曰莊叔會諸侯之師伐沈以其服於楚也莘老孫氏曰沈者楚所與之國不忍楚之暴而侵漁諸夏也於是伐其所與之國將以懼之沈小國不勝而潰陵中國者楚爾沈何罪乎春秋之書以諸侯為失所伐矣髙氏曰中國不能明大義以討楚商臣弒君之賊乃興兵以問小國之罪可傷也已常山劉氏曰兵加而民潰君之不能治民可知矣義又見隱二年鄭伐衛髙氏曰文公三年之間書公子遂公孫敖叔孫得臣纍見於盟會則知魯之政刑盡在諸臣矣魯卒以是亡故春秋書以為戒邦衡胡氏曰春秋侵伐之柄下移於諸侯自是遂移於大夫矣夏五月王子虎卒公羊曰王子虎者天子之大夫也髙氏曰赴於諸侯而書其卒蓋著其交政於諸侯也康侯胡氏曰天子內臣無外交是以私情害公義矣存耕趙氏曰尹氏之後王臣書卒者王子虎劉卷也子虎書卒不書葬惟劉卷書葬此所謂今之大夫交政於中國焉得而勿哭者也秦人伐晉張氏曰秦穆公既歸自殽而作秦誓矣然彭衙及此役猶以報復為事豈非悔過之心不能勝其恥敗之心而至此乎愚謂秦罪著矣亦晉人既得志又思報復以致之也義又見隱七年戎伐凡伯秋楚人圍江江見僖二年義見僖三年徐取舒又為晉救江楚滅江起文也髙氏曰江近楚自齊桓貫澤之盟已服從於中國而楚自城濮之役亦不敢侵伐今復圍者蓋晉文既沒襄公不復討楚人弒逆之惡故楚輕視中國復有窺諸侯之意而先圍江以試之也雨螽于宋雨于付切莘老孫氏曰雨自上而下者也螽不見其所從來自上而下衆多如雨而在宋之四境故曰雨螽于宋也趙氏曰如雨血雨毛雨土之類愚謂螽生則害五榖况如雨之多害物甚矣災異極矣義又見桓五年冬公如晉髙氏曰公之如晉蓋朝也非為盟也三年喪畢乃朝於晉義又見僖十年公如齊十有二月己巳公及晉侯盟陸氏曰在晉都盟故不言地義見隱元年盟于蔑晉陽處父帥師伐楚以救江公羊穀梁無以字陽處父晉大夫髙氏曰晉國之師非不衆也處父帥之以伐楚豈果能討其弒君父之賊哉直為救江而已爾舍大罪不問而區區為小國解紛其亦不察於先後緩急之義矣伐不目事特繫之以救江者譏其徒取救患之名非仗大義之師也張氏曰楚商臣無父無君乃欲致患於江是禽獸逼人也以中國諸侯為己任者豈得安居而以伐楚之任付之大夫而已乎義又見莊二十八年救鄭四年春公至自晉公私出踰時不告正朔也義又見桓二年公至自唐孫氏曰自是公朝強國皆至者見其輕去宗廟逺朝強國也夏逆婦薑于齊稱婦薑見僖二十五年程子曰納幣在喪與喪娶同未詳是否劉氏曰娶婦正始之道也始之不正故夫人不以其位終國亂子弒強臣擅命幾於亡矣文公非不欲存妻子傳世者也暗弱惰慢不能率禮而行以謂茍若而可故卒至於禍也夫婦之際人倫之首可不慎哉故鑒末以原本因微以知著又非獨文公之罪也夫人預有罪矣當是之時夫人不能早避喪娶之辱冒大禮以往國人皆賤之遂無所據依以危其身而亡其子由本不正故也禮之於人大矣是存則存是亡則亡文公之不能保其後嗣者由無以刑其妻也夫人之不能安其位者由無以謹於禮也此正始之道也東萊吕氏曰凡書婦薑者三而至書婦薑者二宣元年遂以夫人婦薑至自齊成十四年僑如以夫人婦薑至自齊是也逆書婦薑者一此年逆婦薑於齊是也狄侵齊義見隱七年戎伐凡伯髙氏曰自箕之役至是侵齊間晉有秦楚之難也以齊之強而狄再侵之則狄之強可知秋楚人滅江左氏曰楚人滅江秦伯為之降服出次不舉過數大夫諌公曰同盟滅雖不能救敢不自矜乎吾自懼也髙氏曰江終為楚所滅則知楚之復強而處父之帥師無益於救適所以堅其敵耳義又見僖三年徐取舒愚案楚頵弒君父中國不能討而反敢滅國則王綱之壞中國之衰伯業之墮荆蠻之橫至是甚矣晉侯伐秦報三年夏之役也二國不自訟而事報復今晉又伐秦比事直書惡自見矣案楚人滅江不恤而躬伐秦伐楚則遣大夫晉侯之報復情不可掩矣衛侯使寧俞來聘義見隱七年齊來聘冬十有一月壬寅夫人風氏薨康侯胡氏曰風氏僖公之母莊公妾也與左氏合木訥趙氏曰風氏僖公之妾以秦人來歸僖公成風之禭為證謂成風繫之僖公猶以仲子繫之惠公前説近是程子曰仲子始僣尚未敢同嫡也自成風已後妾母稱夫人嫡妾亂矣啖氏曰自成風僣用夫人之禮故亦書薨著其非禮也愚謂又為葬成風王歸含賵起文也康侯胡氏曰語曰邦君之妻邦人稱之曰君夫人稱諸異邦曰寡小君蓋敵體之稱也若夫妾媵則非敵矣其生亦以夫人之名稱號之其沒亦以夫人之禮卒葬之非所以正其分也蓋徒欲尊寵其所愛而不虞卑其身以妾母為夫人徒欲崇貴其所生而不虞賤其父卑其身則失位賤其父則無本夫禮庶子為君為其母無服不敢二尊者也春秋於成風記其卒葬各以實書者謹禮之所由變也髙氏曰再娶不得稱夫人而况妾乎魯禮之變自此始聖人實書以示僣亂之由且見其無君父之惡後世乃有母以子貴之説凡妾母皆稱太后甚至妾死而加以皇后之諡此皆不知春秋之旨者也東萊吕氏曰宣之母嬴哀之母姒薨附稱號迄無所異由成風始存耕趙氏曰成風之為夫人自僖公始非文公之罪愚謂文公雖不忍傷父之志然以義斷之可改而不改則亦不可謂無罪矣五年春王正月王使榮叔歸含且賵不曰天王闕文也胡氏曰榮叔天子大夫公羊曰含者口實也賵見隱元年孫氏曰成風僣夫人襄王不能正死又使榮叔含之賵之非禮可知也程子曰天王成妾母為夫人亂倫甚矣君舉陳氏曰以成風之喪訃京師也賵常事不書惟賵仲子成風書之劉氏曰春秋正人倫也君臣也父子也夫婦也道莫先焉桓以臣弒君而王命之成風以妾僣嫡而王成之於三綱廢矣三月辛亥葬我小君成風小君者嫡夫人之稱而妾母稱之又私諡焉亂禮甚矣康侯胡氏曰仲子雖聘非惠公之嫡也春秋之初尚以為疑故别為立宫而羽數特異雖非禮之正然不祔於姑猶有辨焉至是成風葬乃有二夫人祔廟而亂倫易紀無復辨矣故禮之失自成風始也髙氏曰以妾敵父則卑君父之體以妾並配則黷嫡母之尊禮曰妾不得體君又曰妾之事女君與婦之事舅姑等禮有君之母非夫人者又庶子為父後為其母緦蓋尊者為一體不敢服其私親也然則母以子貴非禮甚眀愚謂庶子為父後為其母緦者卿大夫士庶之禮耳若庶子為君為其母無服王使召伯來會葬召穀梁作毛不書天亦闕文也杜氏曰召伯天子之卿召采地伯爵也左氏曰召昭公獻可杜氏曰賵含尚不可况天子之尊使卿會葬乎康侯胡氏曰含賵而會葬其事益隆亂人倫廢王法甚矣許氏曰喪服傳曰庶子為父後者為其母可以緦也與尊為一體不敢私其親也喪服母問曰君之母非夫人也則羣臣無服惟近臣及僕驂乘服唯君所服也此禮正也李氏曰天子之見於經者三十有二稱天王者二十有五稱王者六稱天子者一三稱並行故知王者之通稱而史辭之異爾未詳是否然愚直以為闕文衍字耳夏公孫敖如晉義見隱七年齊來聘髙氏曰聘也王含且賵矣又來會葬矣捨天王而謹事晉罪自見矣秦人入鄀音若鄀張氏曰襄陽宜城縣地有故城髙氏曰秦人入之後為楚邑楚昭王復國之後去郢都鄀左氏曰初鄀叛楚即秦又二於楚秦人入鄀未詳信否義見隱七年戎伐凡伯秋楚人滅六杜氏曰六國廬江六縣任氏曰地譜夀州安豐縣有六國故城張氏曰臯陶之後屬安豐軍左氏曰六人叛楚即東夷秋楚成大心仲歸帥師滅六臧文仲曰臯陶不祀忽諸德之不建民之無援哀哉義見莊十年荆敗蔡師髙氏曰楚人往年滅江今年滅六敢肆其惡逆如此者以中國不正其弒逆之罪故也冬十月甲申許男業卒義見隱三年宋公卒六年春葬許僖公義見隱三年葬宋穆公夏季孫行父如陳行父公子友之孫公孫佚之子也以王父字為氏左氏曰臧文仲以陳衛之睦也欲求好於陳夏季文子聘於陳且娶焉義見隱七年齊來聘秋季孫行父如晉木訥趙氏曰敖嘗如晉行父如晉仲氏季孫爭交於晉三家之張自文公始義見隱七年齊來聘八月乙亥晉侯歡卒歡公羊作歡義見隱三年宋公卒冬十月公子遂如晉葬晉襄公髙氏曰卿供喪事非禮也杜氏曰三月而葬速義又見隱三年葬宋穆公莘老孫氏曰古者大國不過三卿而諸侯之葬一卿輒往則國家之事無闕乎故春秋之法葬諸侯使微者則無譏卿行則譏之以為強者脅弱而弱者畏強也晉殺其大夫陽處父義見莊二十六年曹殺大夫案三傳載處父事舉無足信然經書處父帥師會盟其擅晉之權而不以其道者歟當晉國擾攘之際正元臣秉節之時而首見殺焉夫専殺大夫罪也若處父者其道足以殺其身者歟晉狐射姑出奔狄射音亦一音夜穀梁作夜義見僖二十八年元咺奔晉邦衡胡氏曰狐射姑之罪三傳之言未足為據是必處父之黨處父既死故遂奔耳然又即狄則其惡可知也閏月不告月猶朝于廟告姑沃切又如字髙氏曰閏月曰告月常月曰告朔者閏月雖有晦朔而無時令可察唯朝廟告月而已朴鄉吕氏曰告月即告朔也趙氏曰天子常以今年冬班眀年正朔於諸侯諸侯受之每月奉月朔甲子以告於廟所謂稟正朔也文公以閏非正不行告朔之禮而以其朔日至廟拜謁而已故曰猶朝于廟左氏曰閏以正時時以作事事以厚生生民之道於是乎在矣不告閏朔棄時政也何以為民康侯胡氏曰迎日推策則有其數轉璣觀衡則有其象歸竒於扐以象閏數也斗指兩辰之間象也象數者天理也非人所能為也故以定時成嵗者唐典也以詔王居門終月者周制也班告朔於邦國不以是為附月之餘而弗之數也莘老孫氏曰朝廟之禮為告月而設閏月不告月而但朝廟故曰猶朝于廟告月之禮廢於文公於是閏不告月至於十六年而朔之不視凡四諸公相因而告朔之禮漸廢故孔子於其廢禮之始正其法也愚謂朝廟禮也朝廟而不告朔非禮也非謂既不告朔并朝廟可去之也使文公於閏告月而朝于廟則得禮矣此文意與猶三望似同而實異七年春公伐邾三月甲戌取須句遂城郚句權俱切公羊作朐郚音吾須句見僖二十二年蓋春伐邾至此而取其邑趙氏曰不復繫於邾者省文也杜氏曰郚魯邑卞縣南有郚城張氏曰屬襲慶府泗水縣胡氏曰案僖二十二年冬公伐邾取須句此又取須句者蓋須句為魯所取其後復入於邾今又伐取之其惡可知黃氏曰郚魯下邑因伐邾之師而遂城之以備邾其陵虐小國不恤民力直書自見義又見隱四年莒伐杞及七年城中丘張氏曰僖公伐邾取須句旋敗於升陘邾復取之愚案升陘不書敗績未詳信否夏四月宋公王臣卒王穀梁作壬蓋傳寫之誤也左氏曰宋成公愚謂此為宋殺其大夫司馬及來奔諸事起文也宋人殺其大夫書宋人見莊二十二年左氏曰宋成公卒於是公子成為右師公孫友為左師樂豫為司馬鱗矔為司徒公子蕩為司城華御事為司寇昭公將去羣公子樂豫曰不可公族公室之枝葉也若去之則本根無所庇廕矣葛藟猶能庇其本根故君子以為比况國君乎此諺所謂庇焉而縱尋斧焉者也必不可君其圖之親之以德皆股肱也誰敢攜二若之何去之不聼穆襄之族率國人以攻公殺公孫固公孫鄭於公宫六卿和公室樂豫舍司馬以讓公子卬昭公即位而葬未詳信否義見莊二十六年曹殺大夫愚案自此歷敘宋大夫之見殺出奔來盟以著昭公見弒之由蓋臣者君之股肱股肱既亂則腹心傷自然之勢也故春秋比事為後世有國家者之戒戊子晉人及秦人戰於令狐令力呈切劉氏曰戰而言及之者主之者也猶曰晉人為志乎此戰也云爾公羊曰何以不言師敗績敵也張氏曰令狐晉地河中府猗氏縣有令狐城莘老孫氏曰秦晉自殽之敗數年之間交兵者無虛嵗秦兵加晉不已者以殽之戰未復也主殽之役者晉襄也晉襄死晉之嗣君何負於秦而秦乘其喪求與之戰邪木訥趙氏曰秦晉自殽凡五戰今晉襄秦穆皆即世晉靈秦康之立可以一洗舊憾趙盾乃修先君之怨以為是戰義又見隱七年戎伐凡伯晉先蔑奔秦公羊作先昧以師奔秦張氏曰其説無據當從左氏穀梁先蔑晉大夫孫氏曰不言出者眀自軍中去穀梁曰輟戰而奔秦以是為逃軍也義又見僖二十八年元咺奔晉此則秦晉方交兵又秦為晉世仇而奔之其罪大矣狄侵我西鄙義見隱七年戎伐凡伯黃氏曰間秦晉之爭也木訥趙氏曰魯有戎患未嘗有狄患狄蓋逺於魯今狄越齊衛而侵魯其患深矣秋八月公會諸侯晉大夫盟于扈諸侯不序未詳或曰因魯史之略也然義繫於大夫主盟諸侯而不繫諸侯之列序也大夫無名氏亦然杜氏曰扈鄭地滎陽卷縣西北有扈亭張氏曰卷縣即鄭州原武縣也愚謂晉自文襄世主夏盟諸侯莫敢擅焉今晉復盟諸侯而靈公幼大夫専之則是大夫主諸侯盟也義與二年垂隴之盟同至此則其専甚矣義又見隱元年盟于蔑冬徐伐莒義見隱七年戎伐凡伯髙氏曰徐本戎也厥後自進於中國數與中國諸侯盟會僖十五年楚伐徐齊桓為之大合中國諸侯以救之為其能去逆效順不復侵犯中國故也今輒興兵以伐莒必以中國無盟主是以敢爾公孫敖如莒涖盟涖公羊穀梁作蒞涖盟見僖三年左氏曰徐伐莒莒人來請盟穆伯如莒涖盟義見隱三年盟于蔑髙氏曰敖之奔莒夲此八年春王正月夏四月秋八月戊申天王崩書此為魯晉雒戎之盟及敖與得臣如京師毛伯求金等事起文也義又見隱三年冬十月壬午公子遂會晉趙盾盟于衡雍盾杜本切雍於容切孔氏曰衡雍鄭地張氏曰後漢河南卷縣有垣雍城古衡雍也與扈相近髙氏曰天王崩諸侯不奔赴其喪而趙盾與遂皆國之正卿乃自相會盟于王畿之內惡莫大焉義又見隱元年盟于蔑張氏曰自晉翟泉之盟付之諸大夫文公復以國事付之公子遂而不知一國之禮樂征伐皆自公子遂出此敬嬴所以得窺伺間隙私事之以胚胎殺適立庶之禍也愚謂趙盾弒靈公其不以此也哉故春秋屢書盾遂之事其為履霜之戒深矣乙酉公子遂會雒戎盟于暴雒音洛公羊會下有伊字雒戎戎居雒水間者髙氏曰暴亦王畿之采邑雒戎雜處於王畿之內而中國至與之盟則其于中國甚矣貫道王氏曰大夫専盟而雒戎與於會亂之極也聖人之作春秋也所以明君臣懲僣竊也公子遂為魯大夫而盟晉于衡雍盟戎于暴無君甚矣襄仲既沒東門氏雖以殺嫡立庶見逐于國而公室亦因此而遂衰有天下國家之責者觀乎此亦有以知春秋之不可不學矣公孫敖如京師不至而復丙戌奔莒公羊無而字左氏曰穆伯娶于莒曰戴已生文伯其娣聲已生惠叔戴已卒又聘于莒莒人以聲已辭則為襄仲聘焉穆伯如莒涖盟且為仲逆及鄢陵登城見之美自為娶之仲請攻之公止之惠伯成之使仲舍之公孫敖反之復為兄弟如初從之穆伯如周弔喪不至以幣奔莒從己氏焉未詳信否葉氏曰言日者别其復而後奔也孫氏曰敖如京師弔喪也不至而復中道反也丙戌奔莒文公不能誅敖得以自恣也公子遂如齊以疾而還義猶不可况敖如京師弔喪中道而反乎此敖之罪固不容誅矣而反使之自恣而奔文公之不能君可以見矣宋氏曰天子崩諸侯奔喪會葬臣子之通義也今公不奔喪而卿行是諸侯不有天子也敖如京師不至而復奔是大夫不有諸侯也貫道王氏曰諸侯不臣故大夫亦不君其君也螽義見桓五年宋人殺其大夫司馬宋司城來奔稱宋人見莊二十二年不名闕之也張氏曰司城司空也宋以武公名司空諱之曰司城程子曰宋王者後得自命官故獨宋卿書官左氏曰宋襄夫人襄王之姊也襄公不禮焉夫人因戴氏之族以殺襄公之孫孔叔公孫鍾離及大司馬公子卬司城蕩意諸來奔未詳信否黎氏曰司馬典兵之官而殺之司城扞禦之任而來盟則主勢孤矣宜昭公卒死於弒義又見莊二十六年曹殺大夫及僖二十八年元咺奔晉九年春毛伯來求金公羊曰毛伯者天子之大夫也何以不稱使當喪未君也左氏曰毛伯衛來求金非禮也張氏曰天王崩百官總已以聽於冡宰之時所以謹君臣之分而明其責之所歸也王喪未葬喪紀所當令於諸侯者有常禮非其道則為政者不當使出使者不當承喪事求金徴索非禮莘老孫氏曰天王崩喪事不具而求金於魯魯為人臣而使君父有求于己焉魯之罪可知矣義又見隱三年求賻夫人薑氏如齊夫人出薑也趙氏曰無父母而歸寧譏之也愚謂婦人從夫者也文公當為天子服斬衰三年而夫人當喪出入自如非禮也木訥趙氏曰文公並妃匹嫡嬖於敬嬴生倭嬴寵而倭將貴夫人如齊謀於父母其歸寧蓋有故存焉聖人書之為十八年歸齊張夲未詳是否二月叔孫得臣如京師辛丑葬襄王莘老孫氏曰天王之葬君不自往而使臣焉則是無君父之恩而廢臣子之禮髙氏曰天子所以七月而葬者欲使諸侯畢來會也劉氏曰諸侯為天子喪三年禮無卿共葬之文使卿共葬周末之陵替也葉氏曰此何以書不正其無故以大夫會葬也春秋固有禮所不見而可以情度之者葬天子親者也有不能親焉故也天王崩見經者九其四不書葬書葬而見大夫者惟此與叔鞅而已考之襄王前年八月崩冬十月公孫敖如京師不至以幣奔莒此弔也明年書毛伯來求金則貨貝賵賻蓋遂闕而不供此文公之怠也其於葬慢而不親往非故也大夫將事禮之所得通親往或有故不往而合禮所以四不書則無故不親往而違禮此所以二書歟愚案四不書葬不特有故不往而合禮也别見隱三年晉人殺其大夫先都稱晉人見莊二十二年義見莊二十六年曹殺大夫三月夫人薑氏至自齊此見夫人非禮而動至三月之久而無名以告廟也意與書公至同朴鄉吕氏曰録紀叔姬之歸者為歸于酅起也録薑氏之至者為歸于齊起也是聖人之微意也然則出薑之不安于魯也舊矣聖人詳録其往來豈特為其告至不告至哉未詳是否晉人殺其大夫士縠及箕鄭父稱晉人見莊二十二年義見莊二十六年曹殺大夫楚人伐鄭公子遂會晉人宋人衛人許人救鄭左氏曰范山言於楚子曰晉君少不在諸侯北方可圖也楚子師于狼淵以伐鄭未詳信否愚謂楚人伐鄭五國救之善矣然天子方伯不能治外寇而諸侯救之已為禮樂征伐自諸侯出況五國大夫救鄭則禮樂征伐自大夫出矣春秋書之見權柄下移之甚也義又見莊二十八年救鄭髙氏曰楚不伐鄭久矣今晉文襄既沒而靈公年少中國無盟主楚雖負弒逆之罪而中國莫敢誰何益無所顧忌至是遂伐鄭欲與中國爭盟也然舉五國之兵不能討楚國弒君父之賊乃奔走以救鄭亦見中夏之衰矣夏狄侵齊義見隱七年戎伐凡伯秋八月曹伯襄卒義見隱三年宋公卒九月癸酉地震榖梁曰震動孔朝曰陽氣伏於隂下見迫於隂故不能升以至地動杜氏曰地道安靜以動為異也任氏曰前此踰百年未有書地震也而自此至哀公書地震者五地道以靜為體以順為正安以承天者也逆其常理而不得其節焉則震而不安其所承矣於此足以見諸侯變而不承天子大夫變而不承諸侯陪臣變而不承大夫之象也冬楚子使椒來聘椒穀梁作萩椒不氏義與隱元年無駭同公羊曰椒楚大夫杜氏曰令尹子文從子義見莊二十三年荆人來聘張氏曰代鄭而聘魯亦逺交近攻之意黃氏曰諸家皆謂書椒以其禮交中國而進之也木訥獨曰楚執宋公以伐宋春秋亦書楚子豈進其虐中國邪宜申謀為不道而見殺春秋亦書宜申豈進其謀逆邪書楚子書椒從其國之稱書其實而已愚謂楚始書荆後書荆人後書臣名又書楚子使之者以時世愈降芊氏漸同上國魯史膠於見聞比加詳焉聖人雖不進之然因而不革亦可見晉霸日衰楚氛日盛之一端也秦人來歸僖公成風之禭僖公成風僖公之成風也見四年風氏薨杜氏曰衣服曰禭莘老孫氏曰成風僣稱夫人而春秋書葬書薨天王賵且含之又會其葬蓋皆用夫人之禮矣於是秦人歸禭春秋正其法曰僖公成風猶曰成風之所以為夫人者以其子僖公也故仲子繫之惠公失禮者惠公也成風繫之僖公失禮者僖公也成風之死至是六年而秦人始歸其禭蓋亦不及事矣禭所以送死者而成風已葬禭將焉用乎髙氏曰魯不能以非禮却之過也張氏曰當是時秦楚交病中國秦欲伐晉而歸禭於魯猶楚欲圖北方而使椒來聘也豈古者眀王慎德足以賔之之比哉葬曹共公共音恭義見隱三年葬宋穆公十年春王三月辛卯臧孫辰卒辰哀伯之子臧文仲也大意見隱元年益師卒夏秦伐晉此則秦之罪也義又見隱七年戎伐凡伯楚殺其大夫宜申宜申子西也左氏曰初楚范巫矞似謂成王與子玉子西曰三君皆將強死城濮之役王思之故使止子玉曰母死不及止子西縊而縣絶王使適至遂止之使為商公沿漢泝江將入郢王在渚宫下見之懼而辭曰臣免於死又有讒言謂臣將逃臣歸死於司敗也王使為工尹又與子家謀弒穆王穆王聞之殺鬬宜申及仲歸未詳信否義見莊二十六年曹殺大夫自正月不雨至于秋七月義見莊三十一年及蘇子盟于女栗杜氏曰蘇子周卿士女栗地名闕孫氏曰內不出主名微者文公使微者盟天子之卿其惡可知劉氏曰古者內諸侯不外交外諸侯不內交有至尊在不二之也案春秋書及盟而不出主名者四隱元年及宋人盟于宿莊二十二年及齊髙傒盟于防文二年及晉處父盟與此及蘇子盟是也冬狄侵宋義見隱七年戎伐凡伯楚子蔡侯次于厥貉曷各切公羊作屈貉杜氏曰厥貉地名闕朴鄉吕氏曰凡書次必有兵楚子蔡侯之次蓋亦兵次也然不書伐不書師則其兵之未加乎中國也其書次則有窺中國之志矣愚謂商臣楚國弒逆之賊中國不能治其無忌憚固宜蔡為中國諸侯而同次焉迫於強令豈非始謀之不謹乎然王政不綱同姓不能自立之概亦可見矣春秋夲義卷十四
