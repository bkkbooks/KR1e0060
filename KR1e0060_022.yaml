body:
  text: 春秋本義卷二十二元程端學撰襄公十有七年春王二月庚午邾子牼卒牼苦耕切公羊榖梁作瞷邾子宣公也大意見隱七年滕侯卒此又為其冬邾人伐我南鄙起文也孫氏曰前年晉人執邾子以歸此書邾子卒者晉人尋赦之也宋人伐陳義見隱二年鄭伐衛夏衛石買帥師伐曹左氏曰衛孫蒯田于曹隧飲馬於重丘毁其瓶重丘人閉門而詬之曰親逐而君爾父為厲是之不憂而何以田為夏衛石買孫蒯伐曹曹人訴於晉未詳信否義見隱二年鄭伐衛又為十八年晉執石買起文也秋齊侯伐我北鄙圍桃齊髙厚帥師伐我北鄙圍防桃公羊作洮左氏無齊字杜氏曰桃辨縣東南有桃墟左氏曰齊人以其未得志於我故秋齊侯伐我北鄙圍桃髙厚圍臧紇于防師自陽關逆臧孫至於旅松聊叔紇臧疇臧賈帥甲三百宵犯齊師送之而復齊師去之髙氏曰齊為二師以交攻魯其恃衆暴寡如此況齊魯仍世昏姻之國也數年之間見伐不已見魯政之衰矣義又見隱二年鄭伐衛亦為諸侯同圍齊起文也九月大雩義見桓五年宋華臣出奔陳義見僖二十八年元咺奔晉冬邾人伐我南鄙左氏曰為齊故也愚謂邾宣公卒未踰年悼公居喪興兵以伐魯其罪著矣義又見隱二年鄭伐衛高氏曰邾之先君以伐魯而為晉所執既歸而卒嗣子在喪而復興兵伐我者叛晉與齊也齊人使之修先君之怨此祝柯之會所以復見執也十有八年春白狄來義見僖二十九年介葛盧來髙氏曰罪中國不當與之交接也且宣八年晉師白狄伐秦是晉強而附晉伐秦也成九年秦人白狄伐晉是秦強而附秦伐晉也劉氏曰蕃服於中國無事焉其於天子世一見則諸侯雖善其交際不得而通也是以春秋不與者所以懲淫慝一內外也周公致太平越裳氏九譯而獻白雉公曰君子德不及焉不享其贄此乃天子而讓也況列國之君守藩之臣乎夏晉人執衛行人石買左氏曰晉人執衛行人石買於長子為曹故也黃氏曰為石買無故伐曹而執之也然不當因其為行人而執之張氏曰案石買之執有三失焉舍大而治小一也行人非所執二也不歸於京師三也義又見莊二十七年齊執鄭詹劉氏曰假晉欲明天子之禁修方伯之義黜叛夫而誅亂臣者則莫如正孫蒯之惡而諸侯服矣今置所先而收所後急所輕而緩所重伯者之討固有若是乎夫賞不當其功罰不當其罪不祥莫大焉大惡不舉小過必察猶不當其罪也秋齊侯伐我北鄙侯公羊作師左氏或作師許氏曰齊人四年之間六伐我鄙而四圍邑又從邾莒以助其虐雖魯有以取之然諸侯相陵未有若是者也是以動天下之兵幾亡其國義又見隱二年鄭伐衛亦為諸侯同圍齊起文也冬十月公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子同圍齊同圍者共圍也諸不言同而此言同者因舊史之文而不革也劉氏曰同圍之者猶曰環之也左氏曰齊侯伐我北鄙晉侯伐齊將濟河獻子以朱絲係玉二瑴而禱曰齊環怙恃其險負其衆庶棄好背盟陵虐神主曾臣彪將率諸侯以討焉其官臣偃實先後之苟捷有功無作神羞官臣偃無敢復濟惟爾有神裁之沈玉而齊冬十月會於魯濟尋湨梁之言同伐齊齊侯禦諸平隂塹防門而守之廣里夙沙衛曰不能戰莫如守險弗聽諸侯之士門焉齊人多死范宣子告析文子曰吾知子敢匿情乎魯人莒人皆請以車千乘自其鄉入既許之矣若入君必失國子盍圖之子家以告公公恐晏嬰聞之曰君固無勇而又聞是弗能久矣齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而疏陳之使乘車者左實右偽以斾先與曳柴而從之齊侯見之畏其衆也乃脫歸丙寅晦齊師夜遁十一月丁卯朔入平隂遂從齊師夙沙衛連大車以塞隧而殿殖綽郭最曰子殿國師齊之辱也子姑先乎乃代之殿衛殺馬於隘以塞道晉州綽及之射殖綽中肩兩矢夾脰曰止將為三軍獲不止將取其衷顧曰為私誓州綽曰有如日乃弛弓而自後縛之其右具丙亦舍兵而縛郭最皆襟甲面縛坐於中軍之鼓下晉人欲逐歸者魯衛請攻險己卯荀偃士丐以中軍克京兹乙酉魏絳欒盈以下軍克邿趙武韓起以上軍圍盧弗克十二月戊戌及秦周伐雍門之萩范鞅門於雍門其御追喜以戈殺犬於門中孟莊子斬其槆以為公琴己亥焚雍門及西郭南郭劉難士弱率諸侯之師焚申池之竹木壬寅焚東郭北郭范鞅門於揚門州綽門於東閭左驂迫還於東門中以枚數闔齊侯駕將走郵棠大子與郭榮扣馬曰師速而疾略也將退矣君何懼焉且社稷之主不可以輕輕則失衆君必待之將犯之大子抽劒斷鞅乃止甲辰東侵及濰南及沂葉氏曰靈公以十五年伐我北鄙至是連伐我者五嵗再圍成又圍桃圍防我之虐於諸侯未有甚於齊也故嘗以叔孫豹請於晉於是荀偃從之而諸侯之師無不盡其力則是雖以魯出而所以圍齊不以魯也故圍齊之城周其四門非共惡之能若是乎周公封蔡曰睦乃四鄰夫不能睦其鄰亦不能睦其國也國何以守義又見僖十九年宋圍曹曹伯負芻卒于師此亦紀實事以起葬曹成公之文耳義見隱三年宋公卒楚公子午帥師伐鄭左氏曰鄭子孔欲去諸大夫將叛晉而起楚師以去之使告子庚子庚弗許楚子聞之使楊豚尹冝告子庚曰國人謂不榖主社稷而不出師死不從禮不榖即位於今五年師徒不出人其以不榖為自逸而忘先君之業矣大夫圖之其若之何子庚歎曰君王其謂午懷安乎吾以利社稷也見使者稽首而對曰諸侯方睦於晉臣請嘗之若可君而繼之不可收師而退可以無害君亦無辱子庚帥師治兵於汾於是子蟜伯有子張從鄭伯伐齊子孔子展子西守二子知子孔之謀完守入保子孔不敢會楚師楚師伐鄭次於魚陵右師城上棘遂涉潁次於旃然蒍子馮公子格率鋭師侵費滑胥靡獻於雍梁右回梅山侵鄭東北至於蟲牢而反子庚門於純門信於城下而還涉於魚齒之下甚雨及之楚師多凍役徒幾盡晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競多死聲楚必無功董叔曰天道多在西北南師不時必無功叔向曰在其君之德也義見莊十年荆敗蔡師髙氏曰楚於是復爭鄭十有九年春王正月諸侯盟于祝柯公羊作阿杜氏曰前年圍齊之諸侯也祝柯縣屬濟南郡即督揚張氏曰後漢志平原郡祝柯地譜齊州禹城縣齊邑左氏曰諸侯還自沂上盟于督揚曰大毋侵小髙氏曰盟者何平公修伯也雖盟焉楚窺於南齊易於後吳人且張一邾之微面從而背睽之盟奚益哉義又見隱元年盟于蔑晉人執邾子左氏曰執邾悼公以其伐我故張氏曰前年執邾子以其伐魯故也邾人冝有所懲戒而伐魯無忌劉氏曰邾人伐魯晉人疾之執其君以劫其地不言以歸釋之也未得其地故劫之已得其地故釋之執君取地不以王命何以服人心而正其罪乎髙氏曰既來同會又與同盟而乃執之非伯討也下書取邾田自漷水則知脅人之君而奪其地此平公之伯政也公至自伐齊貫道王氏曰此圍齊也何以致伐蓋以伐齊出而終之以圍也劉氏曰圍而以伐致者以伐告也義見桓二年公至自唐案此與僖二十九年圍許致圍不同者蓋彼以會出而遂圍許故以圍許告此以伐齊出而歸以伐齊告圍乃伐之一事耳皆魯史之舊無他義也取邾田自漷水漷好虢切杜氏曰取邾田以漷水為界也漷水出東北合鄉縣西南經魯國至髙平湖陸縣入泗左氏曰遂次於泗上疆我田取邾田自漷水歸之於我張氏曰言取邾田則非魯之舊可知異於濟西汶陽之取而恃伯威以強取明矣髙氏曰邾之病魯信有罪矣魯以諸侯之力既執其先君又執其嗣君亦可已矣又取其田蓋已甚矣晉劫邾使與魯豈伯者之舉哉但書取邾田足矣又云自漷水者隨漷水以為界言其取之多也又罪其亂先王之疆理也愚案邾屢伐魯信不道矣為魯者上告天王下告方伯正名其罪以伐之可也因伐齊之舉倚晉以執其君取其田則是挾詐以為利也何以服人心哉春秋先書邾魯之盟繼之以執邾子又終之以取邾田則晉魯過惡著矣後世鑒戒昭矣季孫宿如晉左氏曰季武子如晉拜師黃氏曰拜其為魯伐齊且取邾田以與魯也義見僖七年齊來聘葬曹成公義見隱三年葬宋穆公夏衛孫林父帥師伐齊義見隱二年鄭伐衛案伐齊左氏以為晉命也張氏曰討強暴之罪而使逐君之大夫尸其事則晉何以服齊皆未詳信否秋七月辛卯齊侯環卒環公羊作瑗義見隱三年宋公卒此又為齊殺髙厚及二十年齊侯澶淵之盟起文也晉士丐帥師侵齊至榖聞齊侯卒乃還邦衡胡氏曰襄昭之際大夫專權凡帥師而專伐者多非君命春秋無義戰彼善於此則有之士丐引師而還亦庶乎彼善於此之義矣愚謂諸侯非王命而侵伐人之國皆惡也況大夫帥師哉士丐聞齊侯卒而還其惡大其善小春秋紀其實以戒後世非獨善之而已八月丙辰仲孫蔑卒譏世卿也蓋慶父為三桓之始以奔莒不書卒其子公孫敖亦奔莒至蔑而始書卒蔑之後仲孫速仲孫羯仲孫貜仲孫何忌皆執魯政是以謹志其卒以見父卒而子繼也大意又見隱元年益師卒又為二十年仲孫速居喪盟莒伐邾起文也齊殺其大夫髙厚左氏曰齊侯娶於魯曰顔懿姬無子其姪鬷聲姬生光以為大子諸子仲子戎子戎子嬖仲子生牙屬諸戎子戎子請以為大子許之仲子曰不可廢常不祥間諸侯難光之立也列於諸侯矣今無故而廢之是專黜諸侯而以難犯不祥也君必悔之公曰在我而已遂東大子光使髙厚傅牙以為大子夙沙衛為少傅齊侯疾崔杼微逆光疾病而立之齊靈公卒莊公即位執公子牙於句瀆之丘以夙沙衛易已衛奔髙唐以叛齊崔杼殺髙厚於灑藍而兼其室愚案此必齊光既立之後崔杼與光共殺之故以國殺而又曰殺其大夫也義見莊二十六年曹殺大夫朩訥趙氏曰齊之權臣崔與髙也髙既誅齊之權在崔而已故不旋踵而有崔杼之逆髙之殺崔之幸齊之不幸也鄭殺其大夫公子嘉公羊作喜左氏曰鄭子孔之為政也專國人患之乃討西宫之難與純門之師子孔當罪以其甲及子革子良氏之甲守甲辰子展子西率國人伐之殺子孔而分其室未詳信否義見莊二十六年曹殺大夫冬葬齊靈公義見隱三年葬宋穆公城西郛左氏曰懼齊也義見隱七年城中丘邦衡胡氏曰西郛國之內城夫懼齊而城其內城則魯之弱滋甚矣書此以戒為國家者修其政刑雖大國必畏之何區區勞民而城哉叔孫豹會晉士丐于柯杜氏曰魏郡內黃縣東北有柯城愚案此柯非莊十三年之柯義見文十一年會于承筐許氏曰宣十五年書仲孫蔑會齊髙固于無婁成五年書叔孫僑如會晉荀首于榖此書叔孫豹會晉士丐于柯以見政在大夫列國之事如此故屢書之城武城杜氏曰泰山南武城縣左氏曰穆叔歸曰齊猶未也不可以不懼乃城武城義見隱七年城中丘髙氏曰襄公四書城邑非本務也使民飢而散雖城之孰與守之二十年春王正月辛亥仲孫速會莒人盟于向速公羊作遫速仲孫蔑之子莊子也杜氏曰向莒邑左氏曰春及莒平孟莊子會莒人盟于向督揚之盟故也髙氏曰向本屬莒宣四年取之莒是以數伐魯前年諸侯盟于祝柯故二國復自盟以結好自是二十年莒魯不交兵速代父為卿未練而從政無復三年之喪此罪惡可見者也義又見隱元年盟于蔑夏六月庚申公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子盟于澶淵澶市然切杜氏曰澶淵在頓丘縣南今名繁汚衛地張氏曰唐置澶州後屬開德府臨河縣左氏曰盟于澶淵齊成故也髙氏曰齊以晉不伐喪而感服居喪而出盟蓋亦越禮畔道矣義又見隱元年盟于蔑秋公至自會髙氏曰踰時而返義又見桓二年公至自唐仲孫速帥師伐邾速公羊作遫許氏曰祝柯之會執邾子又取其田報亦足矣而復伐之譏已甚也且澶淵在彼何以盟為義又見隱二年鄭伐衛蔡殺其大夫公子變蔡公子履出奔楚夑榖梁作濕左氏曰蔡公子燮欲以蔡之晉蔡人殺之公子履其母弟也故出奔楚初蔡文侯欲事晉曰先君與於踐土之盟晉不可棄且兄弟也畏楚不能行而卒楚人使蔡無常公子燮求從先君以利蔡不能而死未詳信否義見莊二十六年曹殺大夫僖二十八年元咺奔晉此出奔楚尤辱爾陳侯之弟黃出奔楚黃公羊榖梁作光後同邦衡胡氏曰陳侯之弟而出奔甚其叛兄而失守也楚南蠻而即之惡又甚矣夫兄兄弟弟而家道正弟而出奔固可罪矣兄亦未為得也譏千乘之國不能容其親也愚案異姓大夫不得於君有可去之義同姓無可去之道況兄弟乎為人弟而出奔天倫絶矣叔老如齊齊與魯平於是通聘義見隱七年齊來聘冬十月丙辰朔日有食之義見隱三年季孫宿如宋義見隱七年齊來聘二十有一年春王正月公如晉義見僖十年公如齊邾庶其以漆閭丘來奔葉氏曰以漆閭來奔者據其邑叛而歸我也杜氏曰二邑在髙平南平陽縣東北有漆鄉西北有顯閭亭任氏曰兖州鄒縣即南平陽也後漢山陽南平鄉有漆亭山陽南平陽有閭丘亭左氏曰邾庶其以漆閭丘來奔季武子以公姑姊妻之皆有賜於其從者於是魯多盜季孫謂臧武仲曰子盍詰盜武仲曰不可詰也紇又不能季孫曰我有四封而詰其盜何故不可子為司冦將盜是務去若之何不能武仲曰子召外盜而大禮焉何以止吾盜子為正卿而來外盜使紇去之將何以能庶其竊邑於邾以來子以姬氏妻之而與之邑其從者皆有賜焉若大盜禮焉以君之姑姊與其大邑其次皂牧輿馬其小者衣裳劔帶是賞盜也賞而去之其或難焉紇也聞之在上位者灑濯其心一以待人軌度其信可明徴也而後可以治人夫上之所為民之歸也上所不為而民或為之是以加刑罰焉而莫敢不懲若上之所為而民亦為之乃其所也又何禁乎髙氏曰庶其叛其君又盜其土地來奔於魯其罪大矣時公在晉而季氏遂納其邑受其叛臣是之謂以利主逋逃惡自見也木訥趙氏曰今一受庶其之叛其後莒牟夷邾黑肱接踵而至曲阜之地匯為賊淵黃氏曰此所謂春秋三叛臣者也然魯受之皆非君命襄公如晉而庶其以漆閭丘來昭公如晉而牟夷以牟婁防兹來昭公在乾侯而黑肱以濫來然則實為賊淵者惟季氏與夏公至自晉義見桓二年公至自唐秋晉欒盈出奔楚欒盈晉大夫懷子也左氏曰欒桓子娶於范宣子生懷子范鞅以其亡也怨欒氏故與變盈為公族大夫而不相能桓子卒欒祈與老州賔通幾亡室矣懷子患之祈懼其討也訴諸宣子曰盈將為亂以范氏為死桓主而專政矣曰吾父逐鞅也不怒而以寵報之又與吾同官而專之吾父死而益富死吾父而專於國有死而已吾蔑從之矣其謀如是懼害吾主吾不敢不言范鞅為之徴懷子好施士多歸之宣子畏其多士也信之懷子為下卿宣子使城著而遂逐之欒盈出奔楚髙氏曰盈既取奔亡復有作亂之志故特奔於楚焉以楚強大今日可恃以逃難他日可挾以復歸也義見僖二十八年元咺奔晉又為二十三年欒盈入於晉起文也邦衡胡氏曰凡書出奔楚者惡其失守出奔而又即安於蠻荆也當是時衛侯鄭蔡公子履陳侯之弟黃陳針冝咎蔡侯朱宋華亥向寧華定王子朝徐子章羽皆奔楚者也此非特傷中國之衰日入於強楚蓋深戒後世有國家者不可即安以貽悔也九月庚戌朔日有食之冬十月庚辰朔日有食之許氏曰比年食今又比月食蓋此八年之間而日七食禍變重矣郭綱曰此不入食限而食焉政教之失然也義又見隱三年髙氏曰連食兩月變之大者厯家推步之術皆一百七十三日始一交會去度逺則日食漸少無頻食之理而此年九月十月二十四年七月八月頻食下至漢晉以來亦或有之不可委之天數之常故聖人必以為譴異而書之以警人君之或怠後世任數而不修德德不修而禍未至益以為天無心而數有定也惟天之仁又出災異以申勸之且曰前既無驗此奚為哉亦數而已矣目習於見耳習於聞而不復思上帝之怒不足獨當而下延禍於衆庶於是斯民皆怨其上而民心離矣孟子曰王無罪歲斯天下之民至焉為人君者可不戒哉曹伯來朝曹伯負芻之子左氏曰曹武公來朝始見也義見隱十一年滕薛來朝公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任音壬杜氏曰商任地闕邦衡胡氏曰會于商任沙隨齊平故也自諸侯圍齊至澶淵之會而齊始平故商任沙隨齊侯與焉義見隱九年會于防二十有二年春王正月公至自會髙氏曰著不朝正於廟義又見桓二年公至自唐夏四月秋七月辛酉叔老卒譏世卿也大意又見隱元年益師卒冬公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子於沙隨公羊穀梁薛伯上有滕子二字沙隨見成十六年義見隱九年會于防公至自會義見桓二年公至自唐楚殺其大夫公子追舒追舒令尹子南也義見莊二十六年曹殺大夫二十有三年春王二月癸酉朔日有食之義見隱三年三月己巳把伯丐卒丐古害切義見隱三年宋公卒夏邾畀我來奔畀必利切公羊作鼻孫氏曰此言邾畀我來奔者惡內也惡卿受邾叛人邑今又納叛人也義又見僖二十八年元咺奔晉葬把孝公把伯三月卒而葬於夏非二月而葬則三月四月耳可以見其速矣義又見隱三年葬宋穆公陳殺其大夫慶虎及慶寅義見莊二十六年曹殺大夫案晉殺趙同趙括蔡殺公孫姓公孫霍皆不言及而此言及吕氏以為慶虎慶寅之罪不等故言及愚謂此亦舊史之文耳不必執彼以例此也陳侯之弟黃自楚歸于陳言自楚有奉也夫為人弟而奔異國又倚異國而歸陳其罪著矣晉欒盈復入于晉入于曲沃康侯胡氏曰曲沃者欒盈所食之地張氏曰在河東聞喜縣左氏曰晉將嫁女於吳齊侯使析歸父媵之以藩載欒盈及其士納諸曲沃欒盈夜見胥午而告之對曰不可天之所廢誰能興之子必不免吾非愛死也知不集也盈曰雖然因子而死吾無悔矣我實不天子無咎焉許諾伏之而觴曲沃人樂作午言曰今也得欒孺子何如對曰得主而為之死猶不死也皆歎有泣者爵行又言皆曰得主何二之有盈出遍拜之四月欒盈帥曲沃之甲因魏獻子以晝入絳初欒盈佐魏莊子於下軍獻子私焉故因之趙氏以原屏之難怨欒氏韓趙方睦中行氏以伐秦之役怨欒氏而固與范氏和親知悼子少而聽於中行氏程鄭嬖於公唯魏氏及七輿大夫與之樂王鮒侍坐於范宣子或告曰欒氏至矣宣子懼桓子曰奉君以走固宫必無害也且欒氏多怨子為政欒氏自外子在位其利多矣既有利權又執民柄將何懼焉欒氏所得其惟魏氏乎而可強取也夫克亂在權子無懈矣公有姻喪王鮒使宣子墨衰冒絰二婦人輦以如公奉公以如固宫范鞅逆魏舒則成列既乘將逆欒氏矣趨進曰欒氏帥賊以入鞅之父與二三子在君所矣使鞅逆吾子鞅請驂乘持帶遂超乘右撫劒左援帶命驅之出僕請鞅曰之公宣子逆諸階執其手賂之以曲沃初斐豹隸也著於丹書欒氏之力臣曰督戎國人懼之斐豹謂宣子曰苟焚丹書我殺督戎宣子喜曰而殺之所不請於君焚丹書者有如曰乃出豹而閉之督戎從之踰隱而待之督戎踰入豹自後擊而殺之范氏之徒在臺後變氏乘公門宣子謂鞅曰矢及君屋死之鞅用劒以帥卒欒氏退攝車從之遇欒樂曰樂免之死將訟女於天樂射之不中又注則乘槐本而覆或以戟鉤之斷肘而死變魴傷欒盈奔曲沃晉人圍之孫氏曰此欒盈以曲沃之甲入晉敗而奔曲沃也經言欒盈復入于晉入于曲沃者欒盈復入于晉犯君當誅曲沃大夫不可納也入于曲沃明曲沃大夫納之劉氏曰曷為不言叛非叛者也劫衆以敵君直亂而已矣髙氏曰昔昭公分國以封沃沃盛強昭公微弱國將叛而歸沃故詩人作揚之水椒聊杕杜之詩以見意然則沃者晉之繁衍強盛必叛之邑也愚案宋魚石入於彭城將引楚作亂也晉欒盈入于晉自作亂也皆亂賊也春秋書之不特為人臣之戒亦所以著君人者不能正身治國防微杜漸而封邑踰制假臣以權卒之亂國矣秋齊侯伐衛遂伐晉左氏曰秋齊侯伐衛自衛將遂伐晉晏平仲曰君恃勇力以伐盟主若不濟國之福也不德而有功憂必及君崔杼諫曰不可臣聞之小國間大國之敗而毁焉必受其咎君其圖之弗聽陳文子見崔武子曰將如君何武子曰吾言於君君弗聽也以為盟主而利其難羣臣若急君於何有子姑止之文子退告其人曰崔子將死乎謂君甚而又過之不得其死過君以義猶自抑也況以惡乎齊侯遂伐晉取朝歌為二隊入孟門登大行張武軍於熒庭戍郫邵封少水以報平隂之役乃還趙勝帥東陽之師以追之獲晏氂髙氏曰齊侯因晉有欒氏之難而助之以報十八年之役也十八年諸侯同圍齊者魯之故也齊之所以數伐魯者衛之故也故先伐衛晉不之問於是遂伐晉晉為盟主而衛其同盟也既伐同盟又伐盟主禍亂成於此矣義又見隱二年鄭伐衛八月叔孫豹帥師救晉次于雍榆公羊榖梁作俞杜氏曰雍榆晉地汲郡朝歌縣東有雍城莘老孫氏曰不救則懼晉之討往救則畏齊之強常山劉氏曰晉有欒盈之難重以齊侯之伐魯命豹救之義也豹怠棄君命不恤同姓之憂次于雍榆卒不能救豹罪明矣愚謂亦見三家之專而魯君威命之不行也己卯仲孫速卒速公羊榖梁作遫此譏世卿與次年叔孫羯侵齊起文也大意又見隱元年益師卒冬十月乙亥臧孫紇出奔邾紇臧孫許之子臧武仲也左氏曰季武子無適子公彌長而愛悼子欲立之訪於申豐申豐趨退訪於臧紇臧紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客既獻臧孫命北面重席新樽潔之召悼子降逆之大夫皆起及旅而召公鉏使與之齒季孫失色季氏以公鉏為馬正孟孫惡臧孫季孫愛之孟氏之御騶豐點好羯也曰從余言必為孟孫孟莊子疾豐點謂公鉏茍立羯請讎臧氏公鉏謂季孫曰孺子秩固其所也若羯立則季氏信有力於臧氏矣弗應己卯孟孫卒公鉏奉羯立於戶側季孫至入哭而出曰秩焉在公鉏曰羯在此矣季孫曰孺子長公鉏曰何長之有唯其才也且夫子之命也遂立羯秩奔邾臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫若死其若之何臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石夫石猶生我疢之美其毒滋多孟孫死吾亡無日矣孟氏閉門告於季孫曰臧氏將為亂不使我葬季孫不信臧孫聞之戒冬十月孟氏將辟藉除於臧氏臧孫使正夫助之除於東門甲從已而視之孟氏又告季孫季孫怒命攻臧氏乙亥臧紇斬鹿門之關以出奔邾蘧伯玉曰不以道事其君其出乎義又見僖二十八年元咺奔晉杜氏曰阿順季孫為廢長立少以取奔亡晉人殺欒盈左氏曰晉人克欒盈于曲沃盡殺變氏之族黨欒魴出奔宋愚謂凡言殺其大夫者譏其專殺也欒盈作亂人所當討故以討賊之辭書之與鄭良霄同亦衛州吁齊無知之類也可為亂臣之戒矣齊侯襲莒輕行掩其不備曰襲左氏曰齊侯還自晉不入遂襲莒門於且于傷股而退明日將復戰期於壽舒杞殖華還載甲夜入且于之隊宿於莒郊明日先遇莒子於蒲侯氏莒子重賂之使無死曰請有盟華周對曰貪貨棄命亦君所惡也昏而受命日未中而棄之何以事君莒子親鼓之從而伐之獲把梁莒人行成莘老孫氏曰莒小國齊諸侯之強而世為盟主以強攻弱又掩其不備書曰齊侯襲莒蓋侵伐之中罪之尤大者也黎氏曰春秋用兵雖多無書襲者此獨曰襲譏諸侯行盜賊之事臧武仲於其伐晉亦云聞晉亂而後作抑君似鼠鼠晝伏夜動二十有四年春叔孫豹如晉左氏曰穆叔如晉杜氏曰賀克欒氏義見僖七年齊來聘仲孫羯帥師侵齊羯仲孫速之次子孝伯也左氏曰孟孝伯侵齊晉故也髙氏曰齊之伐晉也魯使叔孫豹救之無功故仲孫羯於是乎侵齊羯代速為卿未練而從政無復三年之喪罪自見矣義又見莊十年公侵宋戴氏曰豹之如晉賀克欒氏羯之侵齊為晉復怨夫當事而救不致力既事而聘何益於晉當齊伐晉不能擊齊既退而侵何損於齊君子是以知其為文具也夏楚子伐吳左氏曰焚子為舟師以伐吳不為軍政無功而還義見僖三年徐取舒朩訥趙氏曰楚怨吳之與晉雖吳與晉不交者已十年至是凡三伐吳矣髙氏曰於此見楚弱而吳強也自襄公言之十一年失鄭十四年伐吳自是舍鄭而不取置欒盈而不事又十年而一再伐吳以是而知楚弱而勢分於吳方急吳而緩中國也秋七月甲子朔日有食之既義見二十一年及隱三年齊崔杼帥師伐莒左氏曰齊侯聞將有晉師使陳無宇從薳啓強如楚辭且乞師崔杼帥師送之遂伐莒侵介根未詳信否朩訥趙氏曰齊以盜竊之計襲莒無得故崔杼復伐莒成君之惡而已得行其姦義見隱二年鄭伐衛邦衡胡氏曰自古姦臣篡弒之禍未有不本於其君假之以權之重而任之久也趙盾崔杼在春秋時姦惡最甚然非一日之積也皆假威弄權盟會侵伐無所不至其君信之深任之篤一旦變生肘腋而猶弗悟故聖人詳録其漸凡一侵一伐必謹而志之以明兵柄倒持積而為篡弒之禍故趙盾之將弒則先書其侵崇侵鄭之漸崔杼之將弒則先書其伐莒伐魯之漸易曰其所由來者漸矣可不鑒哉大水義見桓元年八月癸巳朔日有食之兩月連食異之大者也義見二十一年及隱三年公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀夷公羊作陳夷儀見僖元年杜氏曰夷儀本邢地衛滅邢而為衛邑左氏曰會于夷儀將以伐齊水不克葉氏曰晉之再會皆為謀衛未詳孰是髙氏曰把伯居喪出會覩文見義義又見隱九年會于防髙氏曰自盟柯陵之後齊有輕晉之心齊侯環卒而光新立乃受盟於澶淵及商任沙隨之會晉失其令齊於是不賔明年乃伐衛遂伐晉又加兵於莒晉侯為是為夷儀之會帥十二國諸侯之師將以討齊然會而不伐是有畏也國勢不競衆志不一也未詳是否冬楚子蔡侯陳侯許男伐鄭三國附楚人以伐中國罪也義又見莊十年荆敗蔡師公至自會義見桓二年公至自唐陳針冝咎出奔楚針其廉切義見僖二十八年元咺奔晉叔孫豹如京師左氏曰齊人城郟穆叔如周聘且賀城王嘉其有禮也賜之大路未詳信否愚謂襄公即位未嘗朝京師而使大夫往聘大不敬也大飢榖梁曰五榖不升為大飢謂之大侵大侵之禮君食不兼味臺榭不塗弛侯廷道不除百官布而不制鬼神禱而不祀此大侵之禮也康侯胡氏曰古者救災之政若國凶荒或發廩以賑之或移粟以通用或徙民以就食或為粥溢以救餓莩或興工作以聚失業之人緩刑舍禁弛力薄征索鬼神除盜賊弛射侯而不燕置廷道而不修殺禮物而不備雖有旱乾水溢民無菜色所以備之者如此其至是年秋有隂沴之災而冬大飢蓋所以賑業之者有不備矣故書之以為戒義又見宣十年飢春秋本義卷二十二
