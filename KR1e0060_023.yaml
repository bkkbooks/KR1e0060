body:
  text: 春秋本義卷二十三元程端學撰襄公二十有五年春齊崔杼帥師伐我北鄙左氏曰齊崔杼帥師伐我北鄙以報孝伯之師也公患之使告於晉孟公綽曰崔子將有大志不在病我必速歸何患焉其來也不冦使民不嚴異於他日齊師徒歸存耕趙氏曰兵凶器也弗戢必自焚齊莊連歲用兵伐衛伐晉伐莒伐魯三年之閒曾弗之戢而又授兵於好亂之夫蛟虯作於隂虎兕出於柙冝其終不免於禍也義又見隱二年鄭伐衛葉氏曰自襄以前莊僖文成之伐我者各一皆齊而已至文而邾復見於伐襄而莒復見伐是終其世三國見伐者十有三甚乎襄之不能為國也齊伐其北莒伐其東邾伐其南齊侯之師遂至圍成圍桃圍防莒亦進而圍台則非特及其鄙而已我雖城防城西郛城武城曾不足以自守而區區方託晉為雍榆之救固已兆怨矣又從而侵之豈吾所得已哉皆晉之故也此其所以訖不能振也春秋固志之矣夏五月乙亥齊崔杼弒其君光左氏曰齊棠公之妻東郭偃之姊也東郭偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之使偃取之偃曰男女辨姓今君出自丁臣出自桓不可武子筮之遇困之大過史皆曰吉示陳文子文子曰夫從風風隕妻不可娶也且其繇曰困于石據于蒺䔧入于其宫不見其妻凶困于石往不濟也據于蒺䔧所恃傷也入于其宫不見其妻凶無所歸也崔子曰嫠也何害先夫當之矣遂取之莊公通焉驟如崔氏以崔子之冠賜人侍者曰不可公曰不為崔子其無冠乎崔子因是又以其閒伐晉也曰晉必將報欲弒公以恱於晉而不獲閒公鞭侍人賈舉而又近之乃為崔子閒公夏五月莒為且于之役故莒子朝於齊甲戌饗諸北郭崔子稱疾不視事乙亥公問崔子遂從姜氏姜入於室與崔子自側戶出公拊楹而歌侍人賈舉止衆從者而入閉門甲興公登臺而請弗許請盟弗許請自刃於廟弗許皆曰君之臣杼疾病不能聽命近於公宫陪臣干掫有淫者不知二命公踰牆又射之中股反隊遂弒之賈舉州綽邴師公孫敖封具鐸父襄伊僂堙皆死祝他父祭於髙唐至復命不說辨而死於崔氏申蒯侍漁者退謂其宰曰爾以帑免我將死其宰曰免是反子之義也與之皆死崔氏殺鬷蔑於平隂晏子立於崔氏之門外其人曰死乎曰獨吾君也乎哉吾死也曰行乎曰吾罪也乎哉吾亡也曰歸乎曰君死安歸君民者豈以陵民社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之若為已死而為已亡非其私昵誰敢任之且人有君而弒之吾焉得死之而焉得亡之將庸何歸門啓而入枕尸股而哭興三踊而出人謂崔子必殺之崔子曰民之望也舍之得民盧蒲癸奔晉王何奔莒叔孫宣伯之在齊也叔孫還納其女於靈公嬖生景公丁丑崔杼立而相之慶封為左相盟國人於大宫曰所不與崔慶者晏子仰天歎曰嬰所不唯忠於君利社稷者是與有如上帝乃歃辛巳公與大夫及莒子盟大史書曰崔杼弒其君崔子殺之其弟嗣書而死者二人其弟又書乃舍之南史氏聞大史盡死執簡以往聞既書矣乃還崔氏側莊公于北郭丁亥葬諸士孫之里四翣不蹕下車七乘不以兵甲邦衡胡氏曰崔杼之弒其處心積慮蓋二十有五年而後發其始也同盟于虛朾代君而盟次于鄫代君而會則專盟會之權矣其漸也會荀罃而城虎牢其益恣也帥師而伐莒伐魯則竊威福之柄矣一旦動於惡而人始知其弒君不知其非一日之積也易之㫖微矣愚謂齊光自為世子而出與會盟侵伐或驕蹇序於諸侯之上及其即位則背喪出盟違盟伐衛遂伐盟主襲莒伐魯莫非悖亂之舉春秋厯書崔氏之世卿崔杼之專權又書齊光之悖亂而終之以此亂臣賊子懼矣人君鑒戒昭矣義又見隱四年衛州吁事又案崔杼弒君而後無討賊之文則春秋之時亂可知矣公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀夷公羊作陳下同義見隱九年會于防六月壬子鄭公孫舍之帥師入陳左氏曰初陳侯會楚子伐鄭當陳隧者井堙朩刋鄭人怨之六月鄭子展子産帥車七百乘伐陳宵突陳城遂入之陳侯扶其大子偃師奔墓愚謂鄭伯出會而舍之入陳不特無王亦無其君也義又見隱元年莒入向秋八月己巳諸侯同盟于重丘杜氏曰夷儀之諸侯也重丘齊地張氏曰曹州乘氏縣有故城愚謂齊桓之盟一明天子之禁晉侯為夷儀之會重丘之盟齊有弒君之賊而不能討冝其六卿分晉諸侯解體蠻夷日熾而不支也然則此會此盟又齊桓之罪人矣義又見莊十六年公至自會義見桓二年公至自唐衛侯入于夷儀衛侯衎也不名闕文也愚謂衛國者衎之國也不能治其國而見逐於賊臣則既不君矣猶當上告天子下告方伯以復之天子不能討方伯不能正乃旋入夷儀以求復位無足道也然王政不綱而諸侯失位諸侯不君而庶孽篡竊大夫專恣冠屨倒置皆可為後世鑒此當與次年寧喜弒其君剽衛侯衎復歸于衛兼考可也楚屈建帥師滅舒鳩舒鳩見宣八年左氏曰二十四年吳人為楚舟師之役故召舒鳩人舒鳩人叛楚楚子師於荒浦使沈尹壽與師祈犂讓之舒鳩子敬逆二子而告無之且請受盟二子復命王欲伐之薳子曰不可彼告不叛且請受盟而又伐之伐無罪也姑歸息民以待其卒卒而不二吾又何求若猶叛我無辭有庸乃還二十五年舒鳩人卒叛楚令尹子朩伐之及離城吳人救之子朩遽以右師先子疆息桓子捷子駢子孟帥左師以退吳人居其閒七日子疆曰久將墊隘隘乃禽也不如速戰請以其私卒誘之簡師陳以待我我克則進奔則亦視之乃可以免不然必為吳禽從之五人以其私卒先擊吳師吳師奔登山以望見楚師不繼復逐之傅諸其軍簡師會之吳師大敗遂圍舒鳩舒鳩潰八月楚滅舒鳩義見僖三年徐取舒朩訥趙氏曰羣舒其先本與楚俱張荆舒是懲是也因其近楚為楚蠶食至是盡矣宣八年滅舒蓼成十七年滅舒庸及是滅舒鳩冬鄭公孫夏帥師伐陳夏公羊作蠆左氏曰鄭子産獻捷於晉受之十月子展相鄭伯如晉拜陳之功子西復伐陳陳及鄭平愚謂陳從楚伐鄭信有罪矣然猶迫於强楚而不得已也鄭舍之入陳報之過矣至是而復伐之則又甚焉義又見隱二年鄭伐衛十有二月吳子遏伐楚門于巢卒遏公羊榖梁作謁杜氏曰遏諸樊也門于巢攻巢門也貫道王氏曰巢門楚外城門也葉氏曰諸侯不生名吳子何以名吳子卒矣不可再見舉卒之名加之伐楚之上無嫌也趙氏曰此與鄭髠頑如會卒於鄵文義正同皆以便文爾莘老孫氏曰吳子攻巢之門而卒故曰門于巢卒也義見僖三年徐取舒二十有六年春王二月辛卯衛寧喜弒其君剽匹妙切剽公孫剽也十四年衛侯衎奔齊衛人立剽左氏曰二十年衛寧惠子疾召悼子曰吾得罪於君悔而無及也名藏在諸侯之策曰孫林父寧殖出其君君入則掩之若能掩之則吾子也若不能猶有鬼神吾有餒而已不來食矣悼子許諾惠子遂卒二十五年冬衛獻公自夷儀使與寧喜言寧喜許之大叔文子聞之曰烏呼詩曰夙夜匪懈以事一人今寧子視君不如奕棊其何以免乎奕者舉棊不定不勝其偶而況置君而弗定乎必不免矣九世之卿族一舉而滅之可哀也哉二十六年衛獻公使子鮮為復辭敬姒强命之對曰君無信臣懼不免敬姒曰雖然以吾故也許諾初獻公使與寧喜言寧喜曰必子鮮在不然必敗故公使子鮮子鮮不獲命於敬姒以公命與寧喜言曰苟反政由寧氏祭則寡人寧喜告蘧伯玉伯玉曰瑗不得聞君之出敢聞其入遂行從近關出告右宰榖右宰榖曰不可獲罪於兩君天下誰畜之悼子曰吾受命於先人不可以二榖曰我請使焉而觀之遂見公於夷儀反曰君淹恤在外十二年矣而無憂色亦無寬言猶夫人也若不已死無日矣悼子曰子鮮在右宰榖曰子鮮在何益多而能亡於我何為悼子曰雖然弗可以已孫文子在戚孫嘉聘於齊孫襄居守二月庚寅寧喜右宰榖伐孫氏不克伯國傷寧子出舍於郊伯國死孫氏夜哭國人召寧子寧子復攻孫氏克之辛卯殺子叔及大子角黃氏曰剽本篡立而書寧喜弒其君者喜嘗事之為君十三年也許氏曰君臣之分一正不可復易此聖人所以定天下之經也義又見隱四年衛州吁事葉氏曰剽之與衎蓋不兩立以衎之歸為正則剽不得為正矣何以名喜曰弒哉此剽與衎之說非喜與剽之說也夫所謂君臣者一日北面而事之皆君也方孫林父之逐衎殖以為不然則去而違之既與之立則殖之君也喜者受命於殖者也孰有北面事之十三年而不以為君者乎為衎則可以殺剽為喜則不可以殺剽此喜與衎之說也喜受命而殺之非弒君而何以衎言之則公孫剽而已矣别嫌明微非春秋不能辨愚案此與文十八年齊人弒其君商人同意衛孫林父入于戚以叛戚見文元年趙氏曰據土背君曰叛髙氏曰獻公之奔也林父實逐之今寧喜弒剽將納獻公故林父懼而入于戚以叛愚謂人臣而叛其君罪惡自見矣君舉陳氏曰春秋之季家有藏甲邑有百雉之城矣故書叛始於此甲午衛侯衎復歸于衛黃氏曰衛侯歸書名者剽弒衎歸衛有二君名以别之也孫氏曰衛侯前年入于夷儀今喜弒剽四日而復歸于衛此待弒而歸也愚謂衛侯先入夷儀使寧喜弒其君而復歸于衛夫國雖其國然其歸也非正義明道之舉也夫王法不行邪正莫辨勢力詐謀強者得之如奕棊然此春秋所以作也夏晉侯使荀吳來聘杜氏曰荀吳偃子義見僖七年齊來聘公會晉人鄭良霄宋人曹人于澶淵澶市延切晉宋曹稱人微者也鄭加宋上者鄭以卿也澶淵見二十年義見隱九年會于防秋宋公殺其世子痤才何切公羊作座左氏曰初宋芮司徒生女子赤而毛棄諸堤下共姬之妾取以入名之曰棄長而美平公入夕共姬與之食公見棄也而視之尤姬納諸御嬖生佐惡而婉大子痤美而很合左師畏而惡之寺人惠牆伊戾為大子內師而無寵秋楚客聘於晉過宋大子知之請野享之公使往伊戾請從之公曰夫不惡女乎對曰小人之事君子也惡之不敢逺好之不敢近敬以待命敢有二心乎縱有共其外莫共其內臣請往也遣之至則歃用牲加書徴之而騁告公曰大子將為亂既與楚客盟矣公曰為我子又何求對曰欲速公使視之則信有焉問諸夫人與左師則皆曰固聞之公囚大子大子曰惟佐也能免我召而使請曰日中不來吾知死矣左師聞之聒而與之語過期乃縊而死佐為大子公徐聞其無罪也乃亨伊戾康侯胡氏曰賊世子者寺人矣而獨罪宋公何哉譖言之得行也必有嬖妾配適以惑其心又有小人欲結內援者以為之助然後愛惡一移父子夫婦之閒不能相保者衆矣尸此者其誰乎直稱君春秋正其本之意義又見僖五年晉侯殺世子髙氏曰晉獻公惑驪姬之讒而殺申生宋平公聽伊戾之詐而殺痤春秋以晉侯宋公殺之直罪君之不明惑於讒慝為後世戒漢武帝唐明皇猶蹈之蓋晉宋不足道也嗚呼自古讒人為國患雖其君之父子不能相保況臣下乎春秋書此當三復其言晉人執衛寧喜公羊曰不以其罪執之也愚謂寧喜弒君之賊晉不之討乃因其來而執之則既失刑矣況既執而不殺又使還衛次年書衛殺其大夫寧喜則知其舍之矣故曰不以其罪執之也八月壬午許男寧卒于楚左氏曰許靈公如楚請伐鄭曰師不興孤不歸矣八月卒於楚髙氏曰以中國諸侯而死於蠻荆死非其所矣義又見隱三年宋公卒貫道王氏曰君守宗廟出入必告不幸而死於道路猶為棄社稷也許男死於楚是以四嶽伯夷之血祀而委之蠻荆矣冬楚子蔡侯陳侯伐鄭左氏曰楚子曰不伐鄭何以求諸侯楚子伐鄭鄭人將禦之子産曰晉楚將平諸侯將和楚王是故昧於一來不如使逞而歸乃易成也夫小人之性釁於勇嗇於禍以足其性而求名焉者非國家之利也若何從之子展說不禦寇十二月乙酉入南里墮其城涉於樂氏門于師之梁縣門發獲九人焉涉於汜而歸而後葬許靈公愚謂佳兵求伯楚罪大矣而陳蔡從之抑又甚焉義又見莊十年荆敗蔡師葬許靈公義見隱三年葬宋穆公二十有七年春齊侯使慶封來聘杜氏曰景公即位通嗣君也義見僖七年齊來聘夏叔孫豹會晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋奐公羊作瑗不序宋大夫者在宋故也在宋則宋與會可知後盟同左氏曰宋向戌善於趙文子又善於令尹子木欲弭諸侯之兵以為名如晉告趙孟趙孟謀於諸大夫韓宣子曰兵民之殘也財用之蠧小國之大菑也將或弭之雖曰不可必將許之弗許楚將許之以召諸侯則我失為盟主矣晉人許之如楚楚亦許之皆告於小國為會於宋五月甲辰晉趙武至於宋丙午鄭良霄至戊申叔孫豹衛石惡至楚公子黑肱先至成言於晉宋向戌如陳從子木成言於楚子木謂向戌請晉楚之從交相見也陳孔奐蔡公孫歸生曹許之大夫皆至以藩為軍晉楚各處其偏孫氏曰隱桓之際天子失道諸侯擅權宣成之閒諸侯錯命大夫專國至宋之會則又甚矣何哉宋之會諸侯日微天下之政中國之事皆大夫專持之也故二十九年城把三十年會澶淵昭元年會虢諸侯莫有見者此天下之政中國之事皆大夫專持之可知也君舉陳氏曰晉楚初同主夏盟也以諸侯分為晉楚之從於是始則是南北二伯也天下之大變也於溴梁而無君臣之分於宋而無夷夏之辨昭定哀之春秋將以終於吳越焉爾矣邦衡胡氏曰諸侯之大夫會屈建欲以弭兵是以兵為可弭而楚人可以信結乎愚亦甚矣自後三四年楚子大合諸侯于申伐吳滅賴執中國之君殺中國之大夫則弭兵之說果可信邪楚人果可以久處邪髙氏曰此事利害甚重不可輕舉也而諸侯大夫不詳其故始循其弭兵之名遂會于宋而與之盟自是大啓戎心干盟逼好晉楚之從請交相見而諸侯亦俯首兩事晉楚嗟乎桓文數十年之功業一朝而壞之天下之勢遂大潰而不可收矣彼豈知天下之大計哉衛殺其大夫寧喜左氏曰衛寧喜專公患之公孫免餘請殺之公曰微寧子不及此吾與之言矣事未可知祇成惡名止也對曰臣殺之君勿與知乃與公孫無地公孫臣謀使攻寧氏弗克皆死公曰臣也無罪父子死余矣夏免餘復攻寧氏殺寧喜及右宰榖尸諸門莘老孫氏曰寧喜弒賊也弒剽而歸衎衛侯衎德喜之迎已反國復用之為大夫未嘗奪其位喜既見執而歸衛侯乃以其私殺之喜雖有罪然衛侯殺之不以其罪故曰殺其大夫也晉里克殺奚齊弒卓子而立夷吾夷吾殺之晉侯夷吾衛侯衎之殺大夫皆以其私而不以其罪故春秋皆曰殺其大夫也義又見莊十六年曹殺大夫衛侯之弟鱄出奔晉鱄市轉切又音專榖梁作專鱄子鮮也左氏曰免餘殺寧喜子鮮曰逐我者出納我者死賞罰無章何以沮勸君失其信而國無刑不亦難乎且鱄實使之遂出奔晉公使止之不可及河又使止之止使者而盟于河託於木門不向衛國而坐木門大夫勸之仕不可曰仕而廢其事罪也從之昭吾所以出也將誰訴乎吾不可立於人之朝矣終身不仕公喪之如稅服終身未詳信否義見二十年陳侯弟奔楚秋七月辛巳豹及諸侯之大夫盟于宋豹不氏前見也諸侯之大夫亦前目後凡也再言于宋者會之後閒喜與鱄之事不得不再言宋無他義也左氏曰辛巳將盟於宋西門之外楚人衷甲伯州犂曰合諸侯之師以為不信無乃不可乎夫諸侯望信於楚是以來服若不信是棄其信以服諸侯也固請釋甲子木曰晉楚無信久矣事利而已苟得志焉焉用有信趙孟患楚衷甲以告叔向叔向曰何害也匹夫一為不信猶不可單斃其死若合諸侯之卿以為不信必不捷矣食言者不病非子之患也夫以信召人而以僭濟之必莫之與也安能害我且吾因宋以守病則夫能致死與宋致死雖倍楚可也子何懼焉又不及是曰弭兵以召諸侯而稱兵以害我吾庸多矣非所患也晉楚爭先晉人曰晉固為諸侯盟主未有先晉者也楚人曰子言晉楚匹也若晉常先是楚弱也且晉楚狎主諸侯之盟也久矣豈專在晉叔向謂趙孟曰諸侯歸晉之德只非歸其尸盟也子務德無爭先且諸侯盟小國固必有尸盟者楚為晉細不亦可乎乃先楚人未詳信否義與前會同此則因會而盟又甚焉者也君舉陳氏曰晉之不足以主夏盟自宋始宋之盟趙孟之偷也孔子曰庭燎之百由齊桓公始大夫之奏肆夏由趙文子始也是王伯所以興衰也愚謂齊桓攘楚晉文繼之有城濮之師襄悼嗣伯雖事有優劣然皆以攘楚為義孔子作春秋於齊桓晉文多與詞意蓋如此魯襄以來楚未有勝中國之勢趙武使屈建同主夏盟分中國之諸侯以朝楚而中外於是乎莫辨趙武之罪不可勝誅也而說者以為趙武之力豈不悖哉冬十有二月乙亥朔日有食之義見隱三年二十有八年春無冰義見桓十四年夏衛石惡出奔晉左氏曰衛人討寧氏之黨故石惡出奔晉義見僖七年元咺奔晉邾子來朝邾悼公也義見隱十一年滕薛來朝秋八月大雩左氏曰旱也義見桓五年仲孫羯如晉羯居謁切義見僖七年齊來聘冬齊慶封來奔左氏曰齊崔杼生成及彊而寡娶東郭姜生明東郭姜以孤入曰棠無咎與東郭偃相崔氏崔成有疾而廢之而立明成請老於崔崔子許之偃與無咎弗豫曰崔宗邑也必在宗主成與彊怒將殺之告慶封曰夫子之身亦子所知也惟無咎與偃是從父兄莫得進矣大恐害夫子敢以告慶封曰子姑退吾圖之告盧蒲嫳盧蒲嫳曰彼君之讎也天或者將棄彼矣彼實家亂子何病焉崔之薄慶之厚也他日又告慶封曰苟利夫子必去之難吾助女九月庚辰崔成崔彊殺東郭偃棠無咎於崔氏之朝崔子怒而出其衆皆逃求人使駕不得使圉人駕寺人御而出且曰崔氏有禍止余猶可遂見慶封慶封曰崔慶一也是何敢然請為子討之使盧蒲嫳帥甲以攻崔氏崔氏堞其宫而守之弗克使國人助之遂滅崔氏殺成與彊而盡俘其家其妻縊嫳復命於崔子且御而歸之至則無歸矣乃縊崔明夜辟諸大墓辛巳崔明來奔慶封當國二十八年慶封好田而耆酒與慶舍政則以其內實遷於盧蒲嫳氏易內而飲酒數日國遷朝焉使諸亡人得賊者以告而反之故反盧蒲癸癸臣子之有寵妻之癸言王何而反之二子皆嬖使執寢戈而先後之十月慶封田於萊十一月乙亥嘗於大公之廟慶舍涖事盧蒲癸王何執寢戈慶氏以其甲環公宫欒髙陳鮑之徒介慶氏之甲子尾抽桷擊扉三盧蒲癸自後刺子之王何以戈擊之死遂殺慶繩麻嬰公懼陳無須以公歸稅服而如內宫慶封歸遇告亂者丁亥伐西門弗克還伐北門克之入伐內宫弗克反陳於嶽請戰弗許遂來奔既而齊人來讓奔吳義見僖七年元咺奔晉貫道王氏曰崔杼弒君慶封與之為比乃乘其家亂而滅之以當國欲不亡得乎魯敢受亂是召亂也十有一月公如楚左氏曰為宋之盟故公及宋公陳侯鄭伯許男如楚存耕趙氏曰楚雖強非魯所當朝有周不事而如齊如晉春秋猶書之矧如楚乎以中國之諸侯奔走於荆蠻之庭曾無一人言其不可者是春秋之又一變也孟軻有言今之諸侯五伯之罪人也其此之謂乎邦衡胡氏曰王綱既衰中國無伯迫于强令故公逺朝于楚以息肩而聖人必書戒後世不可屈身于異國也其後唐髙祖稱臣於突厥倚以為助石晉父事契丹欲以保國而卒被害有不可勝言者春秋之戒微矣十有二月甲寅天王崩天王靈王也一見王崩而公在楚不奔喪二見明年晉會十一國之大夫城把及會於澶淵三見晉士鞅吳子楚薳罷來聘仲孫羯聘晉把子來盟四見景王居喪而殺其弟凡三年之內居喪而行吉禮者皆罪也義又見隱二年乙未楚子昭卒乙未距甲寅四十二日俱屬十二月者范氏以為閏月之日繫前月之下史策常體也左氏曰楚康王義見文十八年秦伯卒二十有九年春王正月公在楚孫氏曰案成十年七月公如晉十一年三月公至自晉昭十五年冬公如晉十六年夏公至自晉皆不書所在晉國猶可在楚又甚矣故詳録之愚謂公當奉正朔朝廟退而聽政之始而猶在楚故於此書公之所左而其義自見矣髙氏曰公在齊晉多矣闕朝正之禮亦不少矣但書公如晉如齊則義自見矣今書公在楚則聖人之㫖深矣案二十八年十一月公如楚十二月天王崩乙未楚子昭卒不篤君臣之義以奔天王之喪而徇强大之令以俟楚子之葬待夏乃歸故於朝正之時書公所在與昭公失國而在乾侯同夏五月公至自楚義見桓二年公至自唐此兼見公朝荆蠻踰時而返不奔王喪也庚午衛侯衎卒義見隱三年宋公卒閽弒吳子餘祭石氏曰書閽又賤乎盜也左氏曰吳人伐越獲俘焉以為閽公羊曰閽者何門人也刑人也君子不近刑人近刑人則輕死之道也榖梁曰不稱名姓閽不得齊於人不稱其君閽不得君其君也禮君不使無恥不近刑人不狎敵不邇怨賤人非所貴也貴人非所刑也刑人非所近也舉至賤而加之吳子吳子近刑人也閽弒吳子餘祭仇之也義又見隱四年衛州吁事邦衡胡氏曰人君如堂人臣如陛衆隸如地等級遼絶而賤微之隸得弒之者君狎而近之也其曰閽門者至賤乎賤者也舉至賤而加之吳子惡吳子之自禍也孫氏曰則知為人君者雖一介不可慢也仲孫羯會晉荀盈齊髙止宋華定衛世叔儀鄭公孫段曹人莒人邾人滕人薛人小邾人城把儀公羊作齊左氏無邾人左氏曰晉平公杞出也故治杞知悼子合諸侯之大夫以城杞孟孝伯會之鄭子大叔與伯石往子大叔見大叔文子與之語文子曰甚乎其城把也子大叔曰若之何哉晉國不恤宗周之闕而夏肄是屏其棄諸姬亦可知也已諸姬是棄其誰歸之吉也聞之棄同即異是謂離德詩曰協比其鄰昏姻孔云晉不鄰矣其誰云之未詳信否孫氏曰把微弱不能自城故諸侯之大夫相與城把者政在大夫故也邦衡胡氏曰天子在上諸侯各守封域非其所守而擅興力役以城之況大夫乎愚謂況奪農時以役人乎此亦放伯者之事而不成乎伯者也晉侯使士鞅來聘左氏曰范獻子來聘拜城把也未詳信否義見僖七年齊來聘把子來盟把子杞文公把稱子見桓二年盟見隱元年盟于蔑吳子使札來聘札不氏康侯胡氏曰楚椒秦術之流也木訥趙氏曰彼其來聘豈情也哉窺中國而已義見文九年椒來聘秋九月葬衛獻公義見隱三年葬宋穆公齊髙止出奔北燕杜氏曰止髙厚之子陸氏曰北燕姬姓伯爵召公奭之後武王封之於燕居鹿陽蒯縣自召公至簡公二十九世始見春秋張氏曰燕國薊縣左氏曰齊髙子容與宋司徒見知伯女齊相禮賔出司馬侯言於知伯曰二子皆將不免子容專司徒侈皆亡家之主也知伯曰何如對曰專則速及侈將以其力斃專則人實斃之將及矣義見僖二十年元咺奔晉木訥趙氏曰自髙止奔燕而燕以亂燕伯奔齊齊侯伐燕皆基於髙止冬仲孫羯如晉左氏曰冬孟孝伯如晉報范叔也義見僖七年齊來聘三十年春王正月楚子使薳罷來聘薳為彼切罷音皮公羊作頗下同左氏曰通嗣君也張氏曰魯以君朝而楚以大夫聘此齊桓晉文所以行乎列國者故自宋之盟而夷夏不辨楚人行伯主之禮於中國義又見文九年楚椒來聘邦衡胡氏曰經書楚子始末不同如殺大夫始不言氏但曰得臣而已其後則書殺公子側大夫盟會始不言氏但曰楚人而已其後則書公子嬰齊大夫帥師始不言氏但曰楚師而已其後則書公子嬰齊公子壬夫大夫來聘始不言氏但曰使椒而已至此則書薳罷兼舉大夫姓氏與中國一同愚謂此皆魯史之文聖人因之以見外裔漸與中國混同之一端也夏四月蔡世子般弒其君固孫氏曰不日者脫之左氏曰二十八年蔡侯歸自晉入于鄭鄭伯享之不敬子産曰蔡侯其不免乎日其過此也君使子展廷勞於東門之外而傲吾曰猶將更之今還受享而惰乃其心也君小國事大國而惰傲以為己心將得死乎若不免必由其子其為君也淫而不父僑聞之如是者恆有子禍三十年蔡景侯為大子般娶於楚通焉大夫弒景侯義見文元年楚商臣事此則中國之人為之人道之壞極矣五月甲午宋災義見僖二十年西宫災此則一國之災甚矣又為其冬會於澶淵起文也宋伯姬卒公羊榖梁無宋字脫之也伯姬成九年歸宋者也此為七月叔弓如宋葬共姬起文也天王殺其弟佞夫佞公羊作年非也孫氏曰書稱帝堯克明俊德以親九族而景王不能容一母弟且諸侯有失教及不能友愛其弟而出奔者孔子猶詳録之譏其失兄之道況景王尊為天子富有四海乎吕氏曰言殺其弟無親親之恩也愚案為天子弟而至於見殺其為弟可知矣為天子而至於殺其弟其為兄亦可知矣然春秋書曰天王殺其弟者蓋為人兄而不以舜之所以處象者處其弟則未足以盡為兄之義其㫖深哉王子瑕奔晉王子者王之子也瑕其名也為人子而至於奔子道盡矣然景王為天下主而致其子之奔父道盡矣既殺其弟又奔其子比事屬辭所謂父不父子不子兄不兄弟不弟京師王化之本而大亂若此王綱之不振有以哉秋七月叔弓如宋葬宋共姬榖梁葬字下無宋字弓叔老之子子叔子也孫氏曰內女不葬者也其書葬皆非常也共姬婦人也襄王景王天子也魯皆使卿會惡孰甚焉然內女葬當有恩禮使卿則不可也愚謂共姬不從夫之諡而别為諡又不謂於王而自諡又三月而葬皆非禮也髙氏曰使卿葬內女非禮也始終之禮皆過於厚成八年夏宋公使公孫壽十月衛人來媵九年二月伯姬歸於宋夏季孫行父如宋致女晉人來媵十年齊人來媵皆非禮也鄭良霄出奔許自許入于鄭鄭人殺良霄存耕趙氏曰許與鄭世仇言自許許有奉也劉氏曰何為不言殺其大夫也討賊之辭也左氏曰二十九年鄭伯有使公孫黑如楚辭曰楚鄭方惡而使余往是殺余也伯有曰世行也子晳曰可則往難則已何世之有伯有將強使之子晳怒將伐伯有氏大夫和之十二月己巳鄭大夫盟於伯有氏三十年伯有耆酒為窟室而夜飲酒擊鐘焉朝至未巳朝者曰公焉在其人曰吾公在壑谷皆自朝布路而罷既而朝則又將使子晳如楚歸而飲酒庚子子晳以駟氏之甲伐而焚之伯有奔雍梁醒而後知之遂奔許乙巳鄭伯及其大夫盟於大宫盟國人於師之梁之外伯有聞鄭人之盟已也怒聞子皮之甲不與攻已也喜曰子皮與我矣癸丑晨自墓門之瀆入因馬師頡介於襄庫以伐舊北門駟帶率國人以伐之伯有死於羊肆子産襚之枕之股而哭之斂而殯諸伯有之臣在市側者既而葬諸斗城愚謂為人臣而至於出奔既得罪矣又不自反而復入作亂其見殺也冝許奉叛臣以入亦罪也義又見襄二十二年晉人殺欒盈此言復彼言復入者史氏之辭不同耳初無異義也張氏曰良霄之出公孫黑蓋有罪焉春秋舍公孫黑專伐之罪而罪良霄何也曰耆酒而不恤政汰侈而好爭伯有之所為有喪家亡身之道焉雖微公孫黑其能免於死乎既亡而不自省又入伐君而大亂其國此春秋所以正名討賊之辭也春秋於喪國失家者皆不書所逐之人以明其身之有罪使有國有家者皆兢兢自謹而求所以保身也知保身則奔亡之禍逺矣春秋之義也冬十月葬蔡景公諸侯不討亂臣賊子而但會其葬髙氏所謂皆無父無君者也七月方葬又其失禮之細者義又見隱三年葬宋穆公案蔡般不討而景公書葬則傳所謂賊不討不書葬者妄也晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人把人小邾人會于澶淵宋災故十二國稱人皆微者也不稱魯會魯不會也宋災故為宋災之故也澶淵見二十年劉氏曰晉人與諸侯之大夫凡為宋災故謀之也非務也何言乎非務蔡侯弒其君而不謀宋災而謀之微矣君子慮所逺而小人恤所近夫災雖諸侯所當救然而一時之變一國之禍也財足以周其乏粟足以濟其用則已矣非所以為天下之憂也彼天下之憂者臣弒其君一子弒其父二如是則禽獸矣故孔子論天下之信則曰寧去食論陳恆之變則曰請討之其察於道之輕重緩急也審矣豈以姑息愛人哉康侯胡氏曰蔡之亂猶人有腹心之疾而宋之災譬如桐梓雞犬之亡失也故言會之所為以垂戒欲人自審于輕重之等也可謂深切著明矣三十有一年春王正月夏六月辛巳公薨于楚宫左氏曰公作楚宫穆叔曰君欲楚也夫故作其宫若不復適楚必死是宫也公薨于楚宫杜氏曰公適楚好其宫歸而作之不居先君之路寢而安所樂失其所也許氏曰公還自楚不能增修德政而反勤民傷財務作楚宫公之志亦荒矣其何振之有又況忘本樂異亂國經常所以為不祥之道也義又見僖公薨吕氏曰若襄公者可謂安其危而利其災樂其所以亡者矣秋九月癸巳子野卒孫氏曰子野襄公大子未踰年之君也不薨不地降成君也趙氏曰子野非被弒不書地闕文也愚案書卒之義未詳左氏曰立胡女敬歸之子子野次於季氏癸巳卒毁也康侯胡氏曰般赤弒而書卒子野亦書卒何以辨乎曰閔公不書即位則般之弒可知下書夫人姜氏歸于齊上書公子遂叔孫得臣如齊則子赤之弒可知與子野異矣存耕趙氏曰襄公之庶長也傳云毁也案經書癸巳子野卒辭同子般然子般云弒以傳詳之子野立次於季氏卒不於他所而於季氏此疑以傳疑之辭子野卒而季氏必欲立裯是也俱未詳是否己亥仲孫羯卒譏世卿也大意見隱元年益師卒冬十月滕子來會葬許氏曰子大叔曰先王之制諸侯之喪士弔大夫送葬滕子會葬非禮也髙氏曰此僭天子之禮也愚謂魯不拒之以禮而受之皆非也君舉陳氏曰諸侯來會葬於是始改葬惠公也衛侯來會葬隱公不見春秋之初魯猶秉禮也晉景公之喪成公弔焉亦已卑矣晉於是止公使送葬諸侯莫在魯人辱之楚康王之喪公及陳侯鄭伯許男送於西門之外則天下諸侯有會葬於楚者矣於是滕會葬於魯是春秋之季也癸酉葬我君襄公義見隱三年葬宋穆公十有一月莒人弒其君密州稱人見文十六年密州左氏曰犂比公也義見隱四年衛州吁事案此又為次年去疾入莒展輿奔莒起文也春秋本義卷二十三
