body:
  text: 春秋本義卷十九元程端學撰成公十年春衞侯之弟黒背帥師侵鄭左氏曰衛子叔黒背侵鄭晉命也未詳信否康侯胡氏曰其曰弟者子叔黒背生公孫剽孫林父甯殖出衛侯衎而立剽亦以其父有寵愛之私故得立耳此與齊之夷仲年無異其為後戒可謂深切著明矣義又見莊十年公侵宋夏四月五卜郊不從乃不郊公羊曰其言乃不郊何不免牲故言乃不郊也陳岳氏曰不郊則是免牲也其文雖殊其㫖無異前說近是師氏曰卜至於五其瀆甚矣皇天饗道果可以僭而徼其吉邪義見僖三十一年但彼加三望之失此加五卜之瀆耳案郊言三卜者一襄之七年是也四卜者二僖三十一年與襄之十一年是也五卜者一此是也五月公㑹晉侯齊侯宋公衛侯曹伯伐鄭案二年之中執鄭伯欒書伐鄭衞黒背侵鄭今復㑹五國伐鄭不能服鄭之心而以力焉冝其徒困生民也比事而觀義自見矣義又見隱二年鄭伐衞齊人來媵髙氏曰伯姬嫁已久而諸侯猶來媵之晉衛已備其數豈可復加乎義又見衛人來媵丙午晉侯獳卒獳乃侯切此為公如晉起文也秋七月公如晉孫氏曰奔喪也左氏曰公如晉晉人止公使送𦵏於是糴茷未反冬𦵏晉景公公送葬諸侯莫在魯人辱之劉氏曰天子之喪動天下屬諸侯諸侯之喪動通國屬大夫大夫之喪動一國屬修士士之喪動一鄉屬朋友庶人之喪動州里屬黨族公之行也非禮也以謂唯天子之事焉可也冬十月公羊無此蓋闕文也十有一年春王三月公至自晉左氏曰晉人以公為貳於楚故止公公請受盟而後使歸愚謂公留晉九月始得歸魯正朔不視宗社不享民事不親蓋不能謹禮於其始故不免追悔於其終春秋書此為後世鑒義又見桓二年公至自唐晉侯使郤犫來聘己丑及郤犫盟犫尺由切公羊作州晉侯厲公也杜氏曰郤犫郤克之從父兄弟愚謂晉厲在喪不使卿總已而稱晉侯使郤犫斬然衰絰之中而以吉禮來聘見當時禮壞至此況大夫本受命來聘而遂專盟魯不能以禮郤之而與之盟皆禮之壞者也義又見三年荀庚來聘邦衡胡氏曰晉魯受疑屢盟不已誠不足故也文宣以前大夫來聘未有盟者至此大夫專權雖奉命來聘而與我盟故荀庚來聘旣專盟於前郤犫來聘復專盟於後夏季孫行父如晉報郤犫之聘也義見隱七年齊來聘秋叔孫僑如如齊左氏曰宣伯聘于齊以修前好髙氏曰自鞌之役而齊魯絶交至是乃復通義見隱七年齊來聘冬十月十有二年春周公出奔晉公羊曰周公者天子之三公也左氏曰周公惡惠襄之偪也且與伯與爭政不勝怒而出及陽樊王使劉子復之盟于鄄而入三日復出奔晉愚謂周公為天子三公而出奔辠不待言矣然三公至於出奔周之無政亦可知也晉厲為諸侯且居喪次首受逋逃之臣晉之辠著矣宋氏曰王臣出奔諸侯當執以歸京師晉納亡命而主逋逃無所畏避天子夷諸侯京師同列國也夏公㑹晉侯衛侯于瑣澤瑣公羊作沙陸氏曰瑣澤鄭地朴鄉吕氏曰此㑹為伐秦爾義見隱九年㑹于防髙氏曰晉厲之㑹實始乎此略諸國而致魯衛則以見厲公之徳不能謹始諸侯多解體矣秋晉人敗狄于交剛陸氏曰交剛鄭地義見莊二十年齊伐戎冬十月十有三年春晉侯使郤錡來乞師錡魚倚切張氏曰自齊桓以來召兵侵伐雖不出於王命然戡亂討辠為中國舉猶足以令諸侯也今晉以私怨報秦則其義不足以令諸侯矣故懼其不從而卑詞以乞之聖人直書以見其舉事不公自貶伯體也康侯胡氏曰晉若誅亂臣討賊子請於天王以大義驅之誰不拱手以聽命何至於乞哉三月公如京師夏五月公自京師遂㑹晉侯齊侯宋公衞侯鄭伯曹伯邾人滕人伐秦孫氏曰公朝京師禮也因㑹諸侯伐秦過京師而朝非禮也周官六年五服一朝王乃時廵諸侯朝于方岳未有因諸侯伐國過京師朝王之事故書公如京師自京師遂㑹伐秦高氏曰諸侯擅興兵報怨而兵過京師此其辠之大者朴鄉吕氏曰僖公朝王為㑹晉爾成公如京師為伐秦爾非其尊周之本心也僖公書曰公㑹諸侯盟于踐土公朝于王所此書公如京師公自京師遂㑹諸侯伐秦可謂微而顯矣康侯胡氏曰古者諸侯即位服喪畢則朝小聘大聘終則朝廵狩于方岳則朝此年書公如京師不成朝禮不敬莫大焉君臣之大倫至於此極于是天子當陽諸侯用命之義遂蕩然無有存者故孔子懼作春秋以明君臣之義者至矣其義得行則臣必敬於君子必敬於父天理必存人欲必消大倫必正豈曰小補之哉曹伯廬卒于師廬陸徳明云左氏本亦作盧劉氏曰卒于師曰師卒于㑹曰㑹愚謂此記實事以起𦵏曹宣公之文無他義也義見隱三年宋公卒秋七月公至自伐秦髙氏曰以伐秦至著公此行實非朝也書曰爾其敬識百辟享亦識其有不享惟不役志于享凡民惟曰不享此春秋之意也義又見桓二年公至自唐冬𦵏曹宣公義見隠三年葬宋穆公十有四年春王正月莒子朱卒張氏曰莒子季佗也大意見隠七年滕侯卒夏衞孫林父自晉歸于衛左氏曰衞侯如晉晉侯强見孫林父焉定公不可夏衛侯既歸晉侯使郤犫送孫林父而見之衛侯欲辭定姜曰不可是先君宗卿之嗣也大國又以為請不許將亡雖惡之不猶愈於亡乎君其忍之安民而宥宗卿不亦可乎衞侯見而復之貫道王氏曰衛定惡林父知所惡矣晉為盟主不去其惡而封殖之書曰自晉晉奉之也衛元咺以臣抗君皆晉為之也今林父復自晉歸衞不得君其君臣其臣矣許氏曰人臣不唯義之即安而介恃大國使之反已此能為逐君之惡者也唯其辨之不早是以衛獻至於出奔禍兆此矣愚謂林父之辠著矣晉厲之惡顯矣衛定不能辭以大義而受之其不能君亦可知矣義又見僖二十八年元咺歸衛張氏曰非特衞之不早辨晉之政在大夫亦自此矣秋叔孫僑如如齊逆女髙氏曰公即位十有四年矣國家無事迄今方娶又使同姓之卿逆之故書以為戒義又見宣元年公子遂逆女但彼則弑逆之賊與喪娶耳鄭公子喜帥師伐許左氏曰公子喜子罕也鄭至此四伐許辠自見矣義又見隠二年鄭伐衞髙氏曰此著許之所以遷也許氏曰鄭逼許楚困鄭以國大小力强弱更相吞噬夷夏一道而人理盡矣九月僑如以夫人婦姜氏至自齊劉氏曰僑如不氏一事而再見者卒名也石氏曰稱婦宣公夫人穆姜尚存故也見僖二十五年義見宣元年遂以婦姜至自齊此稱氏者或傳寫之誤無他義也冬十月庚寅衛侯臧卒義見隠三年宋公卒此又為次年衞侯居喪出盟起文也秦伯卒秦伯桓公也不名闕之義見文十八年秦伯罃卒十有五年春王二月𦵏衛定公義見隱三年𦵏宋穆公三月乙巳仲嬰齊卒仲嬰齊杜氏曰襄仲子公孫歸父弟宣十八年逐東門氏既而又使嬰齊紹其後曰仲氏劉炫曰仲遂受賜為仲氏故其子孫稱仲氏貫道王氏曰公子遂卒稱仲遂是生而賜氏矣故嬰齊卒亦以仲用見亂臣如遂雖已逐之而亦得以世卿也大意又見隠元年益師卒孫氏曰仲嬰齊歸父之子孫以王父字為氏公之子曰公子公子之子曰公孫公孫之子以王父字為氏也未詳是否癸丑公㑹晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚晉侯執曹伯歸于京師髙氏曰欲討曹伯勿與之盟可也假他事相㑹而與之盟既盟而執之非也而衛侯居喪出盟則覩文可見同盟義見莊十六年執曹伯義見僖二十八年晉執衞侯又為十六年曹伯歸自京師起文而曹伯之有辠無辠則不可知也事見辨疑或問公至自㑹義見桓二年公至自唐夏六月宋公固卒義見隱三年宋公卒楚子伐鄭義見莊十年荆敗蔡師木訥趙氏曰前年鄭公子喜無故伐許許楚之與也鄭昔嘗伐許而楚不問以鄭亦在楚耳今鄭從晉而伐楚之與國楚能不惡鄭乎故楚子伐鄭為許也鄭有以招之也秋八月庚辰葬宋共公髙氏曰三月遽葬亂也義又見隠三年𦵏宋穆公宋華元出奔晉宋華元自晉歸于宋宋殺其大夫山宋魚石出奔楚左氏曰蕩子山也髙氏曰先書華元自晉歸于宋而繼書殺山則知其為華元殺之矣愚案左氏所載與經不合今據經求義一時之事而四稱宋者各為一事各為一義也統而論之卿大夫不以道事君君死而爭權故華元倚晉而殺山而魚石者山之黨故出奔强者勝而弱者死且奔耳分而論之華元擅一國之權用事既乆不能同寅協恭以濟公室君死而至於出奔復倚晉以殺山再持國柄其惡著矣山為大夫而至於見殺亦不足論魚石奔楚復倚楚而據邑以叛辠之尤大者也是皆政在大夫之弊其所由來漸矣然共公之為國從可知也冬十有一月叔孫僑如㑹晉士燮齊高無咎宋華元衛孫林父鄭公子鰌邾人㑹呉于鍾離燮息協切鰌音秋上書㑹者魯㑹外大夫也下書㑹吳于鍾離者諸侯之大夫往與呉㑹也無他義也杜氏曰鍾離淮南縣張氏曰濠州城下縣故鍾離國嬴姓後為楚邊邑左氏曰始通呉也程子曰呉益强大求㑹諸侯諸大夫往而從之書之以見諸侯之無以自立也時中國病楚故與呉親許氏曰㑹列書卿始此君道微而臣行彰義又見隐二年公㑹戎于潛此則大夫㑹吳又甚矣常山劉氏曰此年㑹呉于鍾離襄五年㑹呉于善道又為㑹于戚十年㑹呉于柤十四年㑹呉于向五書㑹呉者春秋辠諸侯而賤吳人也蓋天子失政而諸侯亂中國無伯雖齊晉大國亦皆俛首以與吳楚㑹且呉之暴横憑陵上國尤非昔日比至哀十二年黄池之㑹書公㑹晉侯及呉子又非㑹鍾離柤向之可擬也葉氏曰春秋齊晉而外莫大於呉楚小白一起而正之重耳繼敗城濮楚不得肆蓋齊與晉猶有與之敵者也故申之㑹晉與魯雖不能拒亦不復從成公之末呉驟强夫所恃以主盟者晉而已厲公之暴悼公之賢皆不能少振反率諸侯而從之一㑹而合七國再㑹而合十三國三㑹而合十二國我皆與之俱無不聽於呉焉而其伐郯伐陳入州來無不如志及其久也破楚柏舉而入楚敗頓沈陳蔡之師殺二國君我遂舍中國而從之昭公不恥同姓而與之昏哀公始以叔還離㑹于柤已而身為鄫與橐臯之好其逼于强臣而有遜越之辱宜矣孫氏曰春秋於楚呉越書之有漸焉非進之也三國日强而天下無伯春秋所以傷中國之衰也許遷于葉舒涉切杜氏曰葉南陽葉縣也張氏曰即汝州葉縣左氏曰許靈公畏偪于鄭請遷于楚辛丑楚公子申遷許于葉杜氏曰許畏鄭南依楚故以自遷為文皆未詳信否髙氏曰許㣲弱之國鄰於鄭鄭亟加兵自三年去疾伐許四年鄭伯伐許九年鄭人圍許十四年公子喜伐許今遂遷焉畏鄭而南依楚而鄭人之辠著矣愚謂王綱之壞與許之不能治其國家亦可見矣張氏曰許遷之以近楚中國盟主不能安小國而使之昵近楚人以求安春秋深以著小國之失所也十有六年春王正月雨木冰雨如字雨木冰者榖梁曰雨而木冰也范氏曰雨著木而成冰也朴鄉吕氏曰上温下冷也愚案月令正月東風解凍蟄蟲始振天氣下降地氣上騰天地和同草木萌動今雨著木而成冰則寒極矣在季冬猶為極備之凶况正月乎害物多矣隂盛伉陽臣强君弱之象著矣夏四月辛未滕子卒滕稱子見桓二年不名闕文也大意見隱七年滕侯卒鄭公子喜帥師侵宋左氏曰楚子自武城使公子成以汝隂之田求成于鄭鄭叛晉子駟從楚子盟于武城鄭子罕伐宋宋將鉏樂懼敗諸汋陂退舍於夫渠不儆鄭人覆之敗諸汋陵獲將鉏樂懼未詳信否貫道王氏曰宋於鄭無惡也今鄭一與楚為成首興侵宋之師是自攻其類也義又見莊十年公侵宋髙氏曰鄭服中國五年矣至是始叛晉附楚加兵中國自是與楚同害中國諸侯之兵無復寧嵗矣六月丙寅朔日有食之義見隠三年晉侯使欒黶來乞師黶於斬切左氏曰晉侯將伐鄭范文子曰若逞吾願諸侯皆叛晉可以逞若唯鄭叛晉國之憂可立俟也欒武子曰不可以當吾世而失諸侯必伐鄭乃興師郤犫如衛遂如齊皆乞師焉欒黶來乞師義見十三年郤錡乞師此比伐秦為有名耳高氏曰鄭之叛晉實晉有以致之以其失伯主之義不足令諸侯故也特使卿來乞師甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績鄢謁晩切又於建切楊氏曰上六月丙寅朔日食則此甲午晦是二十九日也髙氏曰晉將伐鄭鄭告於楚楚子遽引師而來於是晉不暇俟諸侯之兵先與之合戰而大敗之我既未致伐於彼彼志非來伐於我故直書戰而已稱晉之及晉為主也杜氏曰鄢陵鄭地屬潁川郡後漢郡國志潁川鄢陵晉敗楚之地張氏曰即東京開封府鄢陵縣榖梁曰楚不言師君重於師也莘老孫氏曰韓之戰實獲晉侯不言晉師之敗君獲則師敗矣鄢陵之戰楚師敗績而楚子傷焉不曰楚師君傷則師敗也左氏曰戊寅晉師起鄭人聞有晉師使告於楚姚句耳與往楚子救鄭司馬將中軍令尹將左右尹子辛將右過申子反入見申叔時曰師其何如對曰徳刑詳義禮信戰之器也徳以施惠刑以正邪詳以事神義以建利禮以順時信以守物民生厚而徳正用利而事節時順而物成上下和睦周旋不逆求無不具各知其極故詩曰立我烝民莫匪爾極是以神降之福時無災害民生敦龎和同以聽莫不盡力以從上命致死以補其闕此戰之所由克也今楚内棄其民而外絶其好瀆齊盟而食話言奸時以動而疲民以逞民不知信進退辠也人恤所底其誰致死子其勉之吾不復見子矣姚句耳先歸子駟問焉對曰其行速過險而不整速則失志不整喪列志失列喪將何以戰楚懼不可用也五月晉師濟河聞楚師將至范文子欲返曰我偽逃楚可以紓憂夫合諸侯非吾所能也以遺能者我若羣臣輯睦以事君多矣武子曰不可六月晉楚遇于鄢陵范文子不欲戰郤至曰韓之戰惠公不振旅箕之役先軫不反命邲之師荀伯不復從皆晉之恥也子亦見先君之事矣今我辟楚又益恥也文子曰吾先君之亟戰也有故秦狄齊楚皆强不盡力子孫將弱今三强服矣敵楚而已唯聖人能内外無患自非聖人外寧必有内憂盍釋楚以為外懼乎甲午晦楚晨壓晉軍而陳軍吏患之范匄趨進曰塞井夷竈陳於軍中而疏行首晉楚唯天所授何患焉文子執戈逐之曰國之存亡天也童子何知焉欒書曰楚師輕窕固壘而待之三日必退退而擊之必獲勝焉郤至曰楚有六間不可失也其二卿相惡王卒以舊鄭陳而不整蠻軍而不陳陳不違晦在陳而囂合而加嚻各顧其後莫有鬭心舊不必良以犯天忌戒必克之伯州犁以公卒告王苗賁皇在晉侯之側亦以王卒告皆曰國士在且厚不可當也苗賁皇言於晉侯曰楚之良在其中軍王族而已請分良以擊其左右而三軍萃於王卒必大敗之公筮之史曰吉其卦遇復曰南國䠞射其元王中厥目國䠞王傷不敗何待公從之步毅御晉厲公欒鍼為右彭名御楚共王潘黨為右石首御鄭成公唐苟為右欒范以其族夾公行癸巳潘尫之黨與養由基蹲甲而射之徹七札焉以示王曰君有二臣如此何憂於戰王怒曰大辱國詰朝爾死藝及戰吕錡射共王中目王召養由基與之兩矢使射吕錡中項伏弢以一矢復命楚師薄於險叔山冉謂養由基曰雖君有命為國故子必射乃射再發盡殪叔山冉搏人以投中車折軾晉師乃止囚楚公子茷子重復鼓旦而戰見星未巳子反命軍吏察夷傷補卒乗繕甲兵展車馬雞鳴而食唯命是聽晉人患之苗賁皇徇曰蒐乗補卒秣馬利兵修陳固列蓐食申禱明日復戰乃逸楚囚王聞之召子反謀榖陽豎獻飲於子反子反醉而不能見王曰天敗楚也夫余不可以待乃宵遁晉入楚軍三日榖范文子立於戎馬之前曰君幼諸臣不佞何以及此君其戒之周書曰惟命不于常有徳之謂愚謂楚子黷武取敗不足責也鄭伯背晉即楚以致喪師恥辱甚矣義又見僖二十八年戰于城濮戴氏曰鄢陵之戰與城濮同然厲公所以異於文公者一勝之後無以居之觀沙隨之不見公行父之見執厲公之志驕矣楚殺其大夫公子側側子反也左氏曰楚師還及瑕王使謂子反曰先大夫之覆師徒者君不在子無以為過不榖之辠也子反再拜稽首曰君賜臣死死且不朽臣之卒實奔臣之辠也子重使謂子反曰初隕師徒者而亦聞之矣盍圖之對曰雖微先大夫有之大夫命側側敢不義側亡君師敢忘其死王使止之弗及而卒義見莊二十六年曹殺大夫秋公㑹晉侯齊侯衛侯宋華元邾人于沙隨不見公杜氏曰沙隨宋地梁國寧陵縣北有沙隨亭張氏曰寧陵宋熈寧間撥屬拱州左氏曰戰之日齊國佐髙無咎至於師衛侯出於衛公出於壞隤宣伯通於穆姜欲去季孟而取其室將行穆姜送公而使逐二子公以晉難告曰請反而聽命姜怒公子偃公子鉏趨過指之曰女不可是皆君也公待於壞隤申宫儆備設守而後行是以後使孟獻子守於公宫秋㑹於沙隨謀伐鄭也宣伯使告郤犫曰魯侯待於壞隤以待勝者郤犫將新軍且為公族大夫以主東諸侯取貨於宣伯而訴公於晉侯晉侯不見公榖梁曰不見公者可以見也可以見而不見譏在諸侵也程子曰晉侯怒公之後期故不見公君子正已而無恤乎人魯之後期國難故也晉不見為非矣彼曲我直不足為恥也愚謂晉厲勝楚而驕於此可見矣然孔子有曰能治其國家誰敢侮之不見公雖諸侯之辠而成公之為君又可知矣公至自㑹義見桓二年公至自唐公㑹尹子晉侯齊國佐邾人伐鄭杜氏曰尹子王卿士子爵左氏曰尹武公君舉陳氏曰㑹伐未有書王人者此其書尹子何初以王卿士與伐也春秋不以諸侯用王師於是厲公恣矣髙氏曰楚鄭既敗而鄭猶不服見晉政之斁久矣愚謂鄭之堅於背晉而即楚辠亦不可掩也常山劉氏曰尹子單子與諸侯伐鄭正乎曰不正也然是時楚人方强鄭附於楚晉假天子之命致王卿士以伐之所謂彼善於此則有之矣曹伯歸自京師曹伯不名闕文也黄氏曰突忽爭立故出入必書名以為别曹成之位已定三年不待書名為别耳未詳是否愚謂使曹伯有辠天王治之易其位可也如其無辠正晉侯之非即歸之可也今執之二年是非不辨無故使歸則是其執其歸因晉侯之喜怒而姑假手於天王天王亦唯晉命是聽而刑賞不由於已不惟禮樂征伐自諸侯出又見晉侯得使天王也王綱倒置莫甚於此九月晉人執季孫行父舍之于苕丘舍舊音去聲今當作上聲苕公羊作招葉氏曰舍之猶言釋之也左氏曰宣伯使告郤犫曰魯之有季孟猶晉之有欒范也政令於是乎成今其謀曰晉政多門不可從也寧事齊楚有亡而已蔑從晉矣若欲得志於魯請止行父而殺之我斃蔑也而事晉蔑有貳矣魯不貳小國必睦不然歸必叛矣九月晉人執季文子于苕丘公還待於鄆使子叔聲伯請季孫於晉郤犫曰茍去仲孫蔑而止季孫行父吾與子國親於公室對曰僑如之情子必聞之矣若去蔑與行父是大棄魯國而辠寡君也若猶不棄而惠徼周公之福使寡君得事晉君則夫二人者魯國社稷之臣也若朝亡之魯必夕亡以魯之宻邇仇讎亡而為讎治之何及郤犫曰吾為子請邑對曰嬰齊魯之常𨽻也敢介大國以求厚焉承寡君之命以請若得所請吾子之賜多矣又何求范文子謂欒武子曰季孫於魯相二君矣妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何子叔嬰齊奉君命無私謀國家不貳圖其身不忘其君若虛其請是棄善人也子其圖之乃許魯平赦季孫孫氏曰沙隨之㑹晉侯既不見公今又執季孫行父晉再辱魯其惡可知也愚謂沙隨之㑹晉侯不見公既辱其君矣今成公㑹晉侯伐鄭又無故而執魯卿且無故而舍之輕躁縱恣如此何以服諸侯之心哉然成公不能辨之於早至再辱國後世人君舉動可以鑒此矣義又見莊十七年齊執鄭詹葉氏曰傳見行父以九月執十二月方盟意此三月之間猶未得釋故以舍之為處之云爾不知僑如在魯十月已奔齊若非知晉悟僑如之譖而釋行父則何由遽奔若晉人執叔孫婼傳言乃館諸箕此乃傳所謂舎者而經自不書矣愚案葉氏之說是也與劉氏陳岳氏同然左氏載執行父事首尾頗悉獨舍之一義少誤耳故録左氏傳而附見葉氏之說云冬十月乙亥叔孫僑如出奔齊貫道王氏曰僑如挾君母之寵既辱其君又辱正卿魯有政皆僇餘也晉從魯請而赦行父僑如知其謀不遂故不敢容而奔齊受亂人齊亦辠也愚謂僑如造釁成公不明之所致也以僑如之惡魯不即誅於不見公之時至再辱國又不能誅而縱之奔魯國無政可知也世卿之禍一至於此後世可以鑒此矣義又見僖二十八年元咺奔晉十有二月乙丑季孫行父及晉郤犫盟于扈犫公羊作州晉執季孫既舍之而懼其貳也盟以結之執之舍之盟之晉之舉動可知矣大夫自為盟晉魯之政又可知矣公至自㑹踰時也葉氏曰此伐鄭也何以言公至自㑹㑹而後伐以㑹告也凡因伐而㑹伐在㑹前則致伐㑹而謀伐伐在㑹後則致㑹以所告者書也義見桓二年公至自唐乙酉刺公子偃刺見僖二十八年左氏曰季孫及郤犫盟于扈歸刺公子偃召叔孫豹于齊而立之義見莊二十六年曹殺大夫貫道王氏曰偃與鉏公之庶弟也皆穆姜所指以代公者也獨刺偃刑之頗也僑如亂國容其奔乃以嫌而殺偃毋亦吐剛而茹柔乎愚謂魯殺偃又傷骨肉之恩不特專殺大夫之辠矣但左氏所載未可盡信耳十有七年春衛北宫括帥師侵鄭括公羊作結誤髙氏曰衛侵鄭晉命也義又見莊十年公侵宋夏公㑹尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭葉氏曰單子王之中大夫左氏曰鄭太子髠頑侯獳為質於楚楚公子成公子寅戌鄭公㑹尹武公單襄公及諸侯伐鄭自戲童至於曲洧楚子重救鄭師於首止諸侯還未詳信否葉氏曰王大夫前未有二人臨諸侯者此何以言尹子單子鄭恃楚而不服晉復請於王而益之也王命而行使方伯可矣雖益何補晉為伯主不能服鄭而假王人以臨諸侯不能使鄭服而益大夫交失也義又見十六年六月乙酉同盟于柯陵杜氏曰柯陵鄭西地左氏曰同盟於柯陵尋戚之盟也陸氏曰不重言諸侯見尹子單子與盟蘇氏曰齊晉之盛天子之大夫㑹而不盟猶尊周也柯陵之㑹尹子單子始與諸侯之盟自是習以為常非禮也義又見莊十六年張氏曰晉厲公憤鄭之不服而假同盟之禮以約束諸侯然不知其無益於鄭之叛而自取盟王官之辠秋公至自㑹伐而致㑹與十六年同義見桓二年公至自唐齊髙無咎出奔莒左氏曰齊慶克通於聲孟子與婦人蒙衣乗輦而入於閎鮑牽見之以告國武子武子召慶克而謂之慶克久不出而告夫人曰國子謫我夫人怒國子相靈公以㑹髙鮑處守及還將至閉門而索客孟子訴之曰髙鮑將不納君而立公子角國子知之刖鮑牽而逐髙無咎無咎奔莒髙弱以盧叛未詳信否義見僖二十八年元咺奔晉九月辛丑用郊公榖曰用者不宜用也指掌碎玉曰猶用幣于社因史之文也愚謂魯郊已非禮況不時乎是非禮之中又非禮也髙氏曰魯自每嵗僭郊之後春秋不書其書之者或因卜不從或因牛傷死有變則書耳今無他變故而書之者以其自出已意非時之郊而不之卜不宜用而用之是無天也其不宜用未有甚於此者故書晉侯使荀罃來乞師罃公羊作嬰義見十六年欒黶乞師師氏曰請王命以討有辠宜糾合諸侯以尊王命奉辭以往無敢或後可也乃使大夫乞師於魯邪以盟主而乞師已為卑辱况以王之卿士主兵乃言乞師其卑王室以誤寵諸侯也甚矣夫欲仗天子威以討叛伐貳乃先為此卑辱欲鄭畏威得乎冬公㑹單子晉侯宋公衞侯曹伯齊人邾人伐鄭孫氏曰鄭與楚比周晉侯再假王命三合諸侯伐之不能服中國不振可知也義又見十六年愚案諸侯以王命伐背華之鄭其名正其事順名正事順常事也春秋冝不書而亦書焉者晉厲假之也天理人欲同行而異情厲公之舉挾天子以令諸侯者也古者諸侯有辠大國討之不服則方伯討之又不服則天子親討之晉厲既非方伯又非真為天子討有辠者不過假伐鄭以行吾伯及其不服然後摟天子之卿以伐之其名似正其事似順而其情則不然也桓文之事皆然而晉厲獨無功者何也信義不行於諸侯諸侯解體民心不附故桓文得以濟其欲而晉厲卒勞百姓無桓文之功而有桓文之辠為人君者可以鑒此矣十有一月公至自伐鄭前以㑹致此以伐鄭致者葉氏以為因伐而㑹出以伐告歸亦以伐告也義見桓二年公至自唐壬申公孫嬰齊卒于貍脤貍力之切脤市軫切公羊作軫榖梁作蜃李氏曰下有十二月丁巳朔則知此壬申在十月十六也經誤愚謂或書丁巳者誤也杜氏曰貍脤地闕蘇氏曰嬰齊從於伐鄭還而道卒大夫卒不地其地在外也竊謂此亦譏世卿耳十有二月丁巳朔日有食之義見隱三年邾子貜且卒且子餘切此為十八年邾子同盟于虚朾起文也大意又見隱七年滕侯卒晉殺其大夫郤錡郤犫郤至犫公羊作州左氏曰晉厲公多外嬖反自鄢陵欲盡去羣大夫而立其左右胥童以胥克之廢也怨郤氏而嬖於厲公郤錡奪夷陽五田五亦嬖於厲公郤犫與長魚矯爭田執而梏之與其父母妻子同一轅既矯亦嬖於厲公欒書怨郤至以其不從已而敗楚師也欲廢之使楚公子茷告公曰此戰也郤至實召寡君以東師之未至也與軍帥之不具也曰此必敗吾因奉孫周以事君公告欒書書曰其有焉不然豈其死之不恤而受敵使乎君盍嘗使諸周而察之郤至聘于周欒書使孫周見公使覘之信遂怨郤至厲公田與婦人先殺而飲酒後使大夫殺郤至奉豕寺人孟張奪之郤至射而殺之公曰季子欺余厲公將作難胥童曰必先三郤族大多怨去大族不偪敵多怨有庸公曰然郤氏聞之郤錡欲攻公曰雖死君必危郤至曰人所以立信知勇也信不叛君知不害民勇不作亂失兹三者其誰與我死而多怨將安用之君實有臣而殺之其謂君何我之有辠吾死後矣若殺不辜將失其民欲安得乎待命而已受君之禄是以聚黨有黨而爭命辠孰大焉壬午胥童夷陽五帥甲八百將攻郤氏長魚矯請無用衆公使清沸魋助之抽戈結衽而偽訟者三郤將謀於榭矯以戈殺駒伯苦成叔於其位温季曰逃威也遂趨矯及諸其車以戈殺之皆尸諸朝胥童以甲劫欒書中行偃於朝矯曰不殺二子憂必及君公曰一朝而尸三卿余不忍益也對曰人將忍君臣聞亂在外為姦在内為軌御姦以徳御軌以刑不施而殺不可謂徳臣偪而不討不可謂刑徳刑不立姦軌並至臣請行遂出奔狄公使辭於二子曰寡人有討於郤氏郤氏既伏其辜矣大夫無辱其復職位皆再拜稽首曰君討有辠而免臣於死君之惠也二臣雖死敢忘君徳乃皆歸公使胥童為卿榖梁曰自禍於是起矣孫氏曰君之卿佐是謂股肱厲公不道一日而殺三卿此自禍之道也誰與處矣故列數之以著其惡明年弑州蒲義又見莊二十六年曹殺大夫髙氏曰又見晉之用人不求賢徳唯取世族而已張氏曰或曰晉至此時六卿之勢已成矣厲公之討將以强公室也縱而不治則臣强君弱將若之何不知事有機括政有要領正君道以御其臣初不在多殺也宋太祖舉五代總兵專國之强臣使之辭兵柄解重權於一夕指麾之間蓋得其機據其要而彼之心恱誠服自不容已也何乃以多殺立威而求安乎春秋辠厲公之殺三卿而卒以自及其示後世御臣之法至矣楚人滅舒庸任氏曰舒庸東夷偃姓之國地譜廬州城下舒城左氏曰舒庸人以楚師之敗也道呉人圍巢伐駕圍釐虺遂恃呉而不設備楚公子橐師襲舒庸滅之未詳信否義見僖三年徐取舒十有八年春王正月晉殺其大夫胥童髙氏曰胥童胥甲之孫胥克之子義見莊二十六年曹殺大夫庚申晉弑其君州蒲高氏曰漢應劭作舊君諱議周穆王名蒲晉厲名州蒲又有子孫蒲是同名不諱然則州蒲乃蒲字之誤也未詳是否不言弑君之賊見文十八年存耕趙氏曰晉厲本無大惡徒以志驕意盈遂至君臣疑間以及此禍愚謂厲公合諸侯攘强暴未為無功也敗狄伐秦鄢陵得志驕侈既生殺戮近臣遂不得其死夫不矜不伐剛之則也有天下者可以鑒此矣義又見隐四年衞州吁事張氏問胡氏傳欒書弑晉厲公事若許欒書之弑何也朱子曰舊亦嘗疑之愚謂晉字下有弑君賊名而闕之耳不然則左氏不可信也厲公之過特在戰勝而驕遽殺四大夫耳非若陳靈晉靈不仁之甚也陳靈見弑猶書夏徴舒晉靈見弑猶書趙盾豈有欒書中行偃弑君而春秋反匿其名而為衆弑之辭哉父雖不慈子不可以不孝君雖不仁臣不可以不忠若欒書中行偃弑其君而與之不可以訓齊殺其大夫國佐義見莊二十六年曹殺大夫吕氏曰屬辭比事春秋敎也比其事則時可知十七年晉殺三郤十八年殺胥童而晉弑其君齊殺其大夫國佐兩月之間諸國君臣上下相殘殺如此則仁義不施而禮樂絶滅之效也後之君臣欲思患預防者覩此亦可以少戒矣公如晉左氏曰晉悼公即位公如晉朝嗣君也貫道王氏曰朝嗣君事天子之禮也義又見僖十年公如齊夏楚子鄭伯伐宋宋魚石復入于彭城杜氏曰彭城宋邑即彭城縣張氏曰即徐州彭城縣左氏曰宋人患之西鉏吾曰何也若楚人與吾同惡以徳於我吾固事之不敢貳矣大國無厭鄙我猶憾不然而收吾憎使賛其政以間吾釁亦吾患也今將崇諸侯之姦而披其地以塞夷庚逞姦而攜服毒諸侯而懼呉晉吾庸多矣非吾憂也且事晉何為晉必恤之貫道王氏曰魚石奔楚故楚納之伐宋納魚石也不言自楚伐重於有奉也鄭亦同伐鄭惡甚矣彭城宋之要邑也伐彭城而納魚石楚欲以絶呉晉往來之道也愚謂又為襄元年諸侯之大夫圍宋彭城起文蘇氏曰公孫寧儀行父言納而魚石不言納魚石之書復入而先言楚鄭之伐已著其納亂臣也故不言自楚而書復入然不言叛者復入而將以亂國非直叛君而已故魚石欒盈之辠重於趙鞅宋辰也朴鄉吕氏曰納公孫寧儀行父於陳則納之者楚子爾非公孫寧儀行父之能為也今曰宋魚石復入于彭城則納之者雖楚子而復入則魚石也其諸晉欒盈之儔乎公至自晉義見桓二年公至自唐晉侯使士匄來聘晉侯悼公也諸侯為之後者為之服則悼公之於厲公子也悼公之入不先討賊又居喪次未朝天子而先聘魯失禮甚矣以悼公之賢而為此其亦年之幼而狃於習俗之陋歟原其心急於求諸侯以圖伯也五伯為三王之辠人急功利故也秋杞伯來朝八月邾子來朝杞伯杞桓公左氏曰邾宣公來朝即位而來見也義見隐十一年滕薛來朝築鹿囿音又鹿囿囿名公羊曰何以書譏有囿矣又為也葉氏曰又以八月役民也許氏曰大夫擅國威福日去而公務自虞於鳥獸草木是謂𠖇豫在上何可長也髙氏曰前此未有書築囿者自此之後昭九年築郎囿定十三年築蛇淵囿人君之示子孫可不戒哉己丑公薨于路寢義見莊公薨冬楚人鄭人侵宋楚鄭既使魚石據彭城於此又侵宋焉其志將以取宋也義見莊十年荆敗蔡師晉侯使士魴來乞師魴音房公羊作彭士魴晉大夫左氏曰晉士魴來乞師季文子問師數於臧武仲對曰伐鄭之役知伯實來下軍之佐也今彘季亦佐下軍如伐鄭可也事大國無失班爵而加敬焉禮也從之義見十六年欒黶乞師十二月仲孫蔑㑹晉侯宋公衞侯邾子齊崔杼同盟于虚朾虚起居切朾他丁切髙氏曰襄公不㑹當喪故也杜氏曰虚朾地闕左氏曰孟獻子㑹于虚朾謀救宋也宋人辭諸侯而請師以圍彭城孟獻子請於諸侯而先歸㑹葬愚謂晉侯當喪而㑹盟諸侯蓋當時之伯習若王者則行一不義雖得天下不為義又見莊十六年丁未葬我君成公義見葬桓公春秋本義卷十九
