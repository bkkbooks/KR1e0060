body:
  text: 春秋本義卷二十元程端學撰襄公名午成公子定姒所出貫道王氏曰成公庶子四嵗即位元年春王正月公即位義見文公即位仲孫蔑㑹晉欒黶宋華元衞甯殖曹人莒人邾人滕人薜人圍宋彭城曰宋彭城者魯史之筆而孔子因之非孔子加宋字也夫彭城雖為魚石所據亦宋之彭城耳木訥趙氏曰伐叛討賊伯主事也悼公之興首合諸侯之大夫為宋圍彭城討魚石得其職矣冝列國和㑹願奉其職也愚謂悼公此舉其功過與召陵城濮之師同此又足以正君臣之義然諸侯不親而大夫為之則大夫張矣夏晉韓厥帥師伐鄭仲孫蔑㑹齊崔杼曹人邾人杞人次于鄫厥公羊作屈下同鄫公羊榖梁作合杜氏曰鄫鄭地在陳留襄邑縣東南戴氏曰韓厥身伐鄭而諸侯不與焉亦見悼公圖伯之初使大夫身親其勞不敢勤諸侯之師也黄氏曰鄭從楚者也晉既救宋矣故以次伐鄭諸侯之師次于鄫為之援也康侯胡氏曰楚人釋君而臣是助事已悖矣晉於是乎降彭城遂伐鄭而諸侯次于鄫此皆放於義而行者也愚謂此伐功過亦與召陵城濮同義又見隠二年鄭伐衞木訥趙氏曰中國伐鄭屢矣必連諸侯之師今悼公之圖鄭亦可謂有謀矣以韓厥獨攻其前以五國之兵援其後楚兵不出則一韓厥足以敵鄭而有餘楚兵出則五國之師足以鬭楚而不懾此皆所以慎用諸侯而不忍輕鬭其民也秋楚公子壬夫帥師侵宋義見莊十年荆敗蔡師貫道王氏曰晉既降彭城矣遂問辠於鄭師有名也楚失彭城欲救鄭而不敢師以侵宋勢窮也九月辛酉天王崩此為速葬及邾子來朝衞晉來聘及諸侯侵伐盟㑹等事起文也邾子來朝杜氏曰邾子宣公也愚案襄公在喪已不可朝况天子方崩乃不奔喪而遂朝魯其辠著矣魯亦不顧君父之喪而偃然受之其辠等也冬衛侯使公孫剽來聘晉侯使荀罃來聘杜氏曰剽子叔黒背子髙氏曰二國來聘以公新即位故也凡聘必以禮樂相見公在喪中又遭天王之喪晉衛二國不廢聘好則諸侯之辠大矣魯亦豈可晏然受之乎愚謂二臣不能諫止而為之使是亦從君於昏者也義又見隱七年齊來聘康侯胡氏曰滕定公薨世子定為三年之喪父兄百官皆不欲曰吾宗國魯先君莫之行也喪紀益廢民習於耳目而不察後世以日易月人子安而行之不知春秋之義無君臣之禮豈不惜哉二年春王正月𦵏簡王髙氏曰五月而葬諸侯之禮也可以見同軌之不至矣鄭師伐宋左氏曰楚令也許氏曰書伐宋者積鄭之疚義又見隠二年鄭伐衛木訥趙氏曰鄭成公固而不知機彼鄭文鄭襄不幸無伯主楚兵脅之姑從楚以紓國患而已成公之初堅附中華一折而從楚則至死不變晉厲敗楚師三以諸侯伐鄭鄭可歸矣反受役於楚以叛中國黄氏曰晉厲猶以力服之也今楚納宋之叛臣悼公伐而取之義聲震天下逆順曉然矣尚為楚伐宋邪夏五月庚寅夫人姜氏薨髙氏曰此成公夫人也於襄公為母愚謂此為速葬與葬齊姜起文也義又見文十六年姜氏薨六月庚辰鄭伯睔卒睔古囷切髙氏曰不書葬者以成公背中華故諸侯不㑹其𦵏也大意見隠七年滕侯卒晉師宋師衛甯殖侵鄭杜氏曰宋雖非卿師重故序衞上愚謂當時亦以國之大小强弱為次也吕氏曰衛不稱師將尊師少也蘇氏曰鄭雖以叛中國為辠而伐其喪非禮也愚謂此其為伯者師也但知乗機以求志不知伐喪之非禮若三王則行一不義而得天下弗為義又見莊十年公侵宋秋七月仲孫蔑㑹晉荀罃宋華元衛孫林父曹人邾人于戚戚見文元年左氏曰鄭成公疾子駟請息肩於晉公曰楚君以鄭故親集矢於其目非異人任寡人也若背之是棄力與言其誰暱我免寡人唯二三子鄭伯睔卒於是子罕當國子駟為政子國為司馬晉師侵鄭諸大夫欲從晉子駟曰官命未改㑹于戚謀鄭故也孟獻子曰請城虎牢以偪鄭知武子曰善鄫之㑹吾子聞崔子之言今不來矣滕薛小邾之不至皆齊故也寡君之憂不唯鄭罃將復於寡君而請於齊得請而告吾子之功也若不得請事將在齊吾子之請諸侯之福也豈唯寡君頼之木訥趙氏曰合六國之大夫而不加侵伐求所以服之之術而已晉所以皇皇然速於得鄭者蓋鄭僖初立儻一為楚所羈則未可以文告致是機㑹之不容失者不然一嵗之間三合兵車何諸侯之不憚煩哉髙氏曰大夫而謀諸侯之事專恣可知矣又為下文起也愚謂伯者功過如此義又見隱九年㑹于防此則大夫自為㑹甚矣己丑葬我小君齊姜杜氏曰三月而葬速義又見文十七年葬聲姜叔孫豹如宋豹得臣之次子也僑如之弟亦稱穆子左氏曰穆叔聘于宋通嗣君也義見隠七年齊來聘此又見僑如得辠於魯而復世卿也木訥趙氏曰叔孫氏自公孫兹叔孫得臣再世為卿至叔孫僑如其横滋甚反譖成公及季孫行父於晉事敗奔齊叔孫氏之黨沮矣今襄公即位幼未能君盟㑹征伐專於仲孫蔑蔑者孟獻子而季孫行父為正卿則耄矣故叔孫氏復出而任聘問之事冬仲孫蔑㑹晉荀罃齊崔杼宋華元衞孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢遂城虎牢者先㑹謀于戚而後城虎牢也張氏曰虎牢故東虢之邑鄭滅虢為制邑秦漢為成臯東有氾水今孟州汜水縣有故虎牢城吕氏曰城虎牢所以服鄭而拒楚鄭服則楚自逺荀罃城之非取其地而有之也故不繫之鄭愚謂鄭既滅虢而據虎牢則虎牢非鄭封内之邑諸侯本城亡國之虎牢故不繫之鄭然此亦魯史之文耳左氏曰冬復㑹于戚齊崔武子及滕薛小邾之大夫皆㑹知武子之言故也遂城虎牢鄭人乃成木訥趙氏曰晉楚爭鄭五十年乍叛乍服唯强是從鄭成一叛入楚而終身不復反以一鄭不服天下諸侯為之不寧兵車之㑹無日而置今晉悼謀制鄭之䇿而城虎牢虎牢巖險聞於天下楚鄭倚之以抗中國今晉帥十國之大夫取而城之虎牢既非鄭有鄭何恃以抗中國哉故雞澤之盟鄭不伐而自至天下無兵者六年則城虎牢誠有功於天下也愚謂城虎牢而中國安晉悼之功也然非天子命又使大夫城之以逼鄭之喪則過也此亦同於召陵城濮之功過矣楚殺其大夫公子申左氏曰楚公子申為右司馬多受小國之賂以偪子重子辛楚人殺之許氏曰嬰齊壬夫躬執楚政惡申之偪以政殺之皆未詳信否義見莊二十六年曹殺大夫三年春楚公子嬰齊帥師伐呉左氏曰楚子重伐呉為簡之師克鳩兹至於衡山使鄧廖帥組甲三百被練三千以侵呉呉人要而擊之獲鄧廖其能免者組甲八十被練三百而已子重歸旣飲至三日呉人伐楚取駕駕良邑也鄧瘳亦楚之良也君子謂子重於是役也所獲不如所亡楚人以是咎子重子重病之遂遇心疾而卒愚謂春秋為中國害莫大於呉楚此其相為盛衰之由亦見王政不綱而方國自相攻伐也義又見僖三年徐取舒公如晉左氏曰始朝也高氏曰童子侯不朝王蓋不可接以成人之禮也豈可反朝同列乎義又見僖十年公如齊夏四月壬戌公及晉侯盟于長樗張氏曰長樗近晉之地髙氏曰凡盟者必為壇於國外故晉侯出其國都以與公盟左氏曰盟于長樗孟獻子相公稽首知武子曰天子在而君辱稽首寡君懼矣孟獻子曰以敝邑介在東表密邇仇讎寡君將君是望敢不稽首義見隱元年盟于蔑貫道王氏曰襄公在幼安知朝晉之為禮其臣挾之以如晉欲媚事晉耳兩君㑹盟少長不侔歃血詛神果由衷乎公至自晉盟于長樗而至自晉者蓋公如晉則朝晉矣長樗之盟乃朝後之事故東萊吕氏曰本謀如晉而以如晉為重故不以長樗至義見桓二年公至自唐六月公㑹單子晉侯宋公衞侯鄭伯莒子邾子齊世子光己未同盟于雞澤單子下同列國盟蓋襲柯陵之舊弊也杜氏曰雞澤在廣平曲梁縣西南任氏曰地譜一名雞丘張氏曰即洺州永平縣左氏曰晉為鄭服故且欲修呉好將合諸侯使士匄告於齊曰寡君使匄以嵗之不易與不虞之不戒寡君願與一二兄弟相見以謀不協請君臨之使匄乞盟齊侯欲勿許而難為不協乃盟於耏外六月公㑹單頃公及諸侯己未同盟于雞澤晉侯使荀㑹逆呉子於淮上呉子不至康侯胡氏曰王臣將命必惇信明義而後可以表正乎天下諸侯守邦必尊主奉法而後可以保其社稷今王臣下與諸侯約誓諸侯亦敢上與王臣要言斯大亂之道也義又見莊十六年陳侯使袁僑如㑹戊寅叔孫豹及諸侯之大夫及陳袁僑盟書叔孫豹及之者自魯言之也啖氏曰諸侯既盟而袁僑乃至故大夫别與之為盟也左氏曰楚子辛為令尹侵欲於小國陳成公使袁僑如㑹求成晉侯使和組父告於諸侯秋叔孫豹及諸侯之大夫及陳袁僑盟陳請服也君舉陳氏曰以大夫盟袁僑晉侯不欲袁僑詘諸侯也雖然有諸侯在而大夫盟於是始晉悼公為之也諸侯在而大夫自為盟而後大夫專盟矣康侯胡氏曰悼公盍亦増修徳政而謂袁僑曰諸侯之盟事畢矣而吾子始來若再刑牲歃血要質鬼神是瀆之也且吾子以帝王之胄習於禮義害楚之政背夷即華此諸侯之願寡君之欲也雖㣲盟誓天地鬼神實照臨之其惟同心糾逖王慝厚禮遣之使往報焉足矣奚必汲汲使大夫盟哉孫氏曰諸侯盟大夫又盟是大夫强而諸侯始失政也故十六年溴梁之㑹戊寅大夫自盟政在大夫也孔子曰禄之去公室五世矣政逮於大夫四世矣非獨魯也滔滔者天下皆是也吕氏曰言君臣上下之失其所也秋公至自㑹義見桓二年公至自唐冬晉荀罃帥師伐許左氏曰許靈公事楚不㑹于雞澤冬知武子帥師伐許貫道王氏曰許自新城以來不與中國盟㑹四十餘年困於鄭而安於楚也荀罃輔晉苟能存陳芘鄭則許必慕徳而歸之矣何為一狃於陳之如㑹而遽求多於許邪義又見隱二年鄭伐衛四年春王三月己酉陳侯午卒義見隱三年宋公卒此又為陳人圍頓起文也夏叔孫豹如晉左氏曰穆叔如晉報知武子之聘也義見隠七年齊來聘秋七月戊子夫人弋氏薨弋左氏榖梁作姒下同葉氏曰左氏榖梁不能辨二定乃以定姒之事言之遂誤以弋氏為姒氏愚案此既稱定姒不應哀公時復稱定姒當以公羊為正葉氏曰定弋襄公之妾母貫道王氏曰自成風以來魯以廟祔二母為常矣魯之宗廟不肅失禮不經甚矣義又見文四年風氏薨此又為公如晉起文也葬陳成公義見隱三年葬宋穆公貫道王氏曰鄭睔書卒不書葬以其從於楚而中國諸侯不㑹其𦵏也陳午卒而書葬以其從於中國而諸侯遣大夫㑹其葬也八月辛亥葬我小君定弋公羊作弋今從之髙氏曰死才三十二日遽以夫人之禮𦵏之又别為之諡時公方七嵗耳愚謂童子侯何知當國大臣之罪也義見文五年葬成風冬公如晉左氏曰公如晉聽政義見僖十年公如齊陳人圍頓左氏曰楚人使頓間陳而侵伐之故陳人圍頓髙氏曰僖二十五年楚人圍陳納頓子于頓陳侯畏楚而不敢討頓子恃楚而不事陳今陳復從中國而頓為楚間故圍之皆未詳信否愚謂陳侯居喪且方歸中國不修徳敎民外禦强楚而越喪興師圍楚之與國以致宼比事而觀辠自見也義又見隠二年鄭伐衛五年春公至自晉存耕趙氏曰居衰絰之中廢朝正之禮也義又見桓二年公至自唐夏鄭伯使公子發來聘左氏曰鄭子國來聘通嗣君也義見桓三年齊來聘叔孫豹鄫世子巫如晉鄫榖梁作繒公羊曰此何以書為叔孫豹率而與之俱也莒將滅之故相與往殆乎晉也愚謂莒有滅鄫之勢故鄫託魯以依晉其秋鄫人遂㑹于戚此為莒滅鄫起文也仲孫蔑衛孫林父㑹呉于善道公羊榖梁作稻許氏曰凡序呉者㑹我也殊呉者往㑹之也又見成十五年善道范氏曰呉地左氏曰呉子使壽越如晉辭不㑹于雞澤之故且請聽諸侯之好晉人將謂之合諸侯使魯衞先㑹呉且告㑹期故孟獻子孫文子㑹呉于善道貫道王氏曰晉悼復伯挾中國之諸侯以制楚不患其力之不足也乃命魯衛之大夫先㑹呉于善道又徧告於諸侯而㑹之是使中國胥為吳之從也夫楚則攘之呉則㑹之是猶外抗大盗而内延小竊也意者悼公患楚之方强急於攘之故不暇為吳慮歟孔子曰人無逺慮必有近憂悼公之㑹吳無逺慮矣義又見成十五年㑹呉于鍾離貫道王氏曰晉自景公始通吳然教之叛楚而未與之接也厲公鍾離之㑹以六國之卿禮賔之則襲矣今悼公將欲㑹吳使魯衛二卿先告㑹期不且變而加厲吳爲封豕長蛇以薦食上國悼唘之矣秋大雩左氏曰旱也義見桓五年楚殺其大夫公子壬夫左氏曰楚人討陳叛故曰由令尹子辛實侵欲焉乃殺之未詳信否義見莊二十六年曹殺大夫公㑹晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吴人鄫人于戚鄫榖梁作繒呉稱人㣲者也或曰呉楚大夫多稱人鄫序吳下者鄫與吳皆子爵意伯主尊吳而忘其中外之别也戚見文元年左氏曰㑹呉且命戍陳也髙氏曰此吳人來㑹中國非若鍾離善道相向皆中國往㑹呉也夫呉與楚類今中國諸侯屑與之㑹者為其能病楚也殊不知彼能病楚則亦能病中國矣此中國之誤計也觀呉自敗楚之後伐齊伐魯伐衛伐陳以至與晉爭盟則其病中國可知矣義又見隠九年㑹于防及隠二年㑹戎于潛公至自㑹義見桓二年公至自唐冬戍陳啖氏曰戍者以兵守之也榖梁曰戍陳内辭也貫道王氏曰先書諸侯㑹于戚下又書諸侯救陳知諸侯之戍不疑也左氏曰楚子囊為令尹范宣子曰我喪陳矣楚人討貳而立子囊必改行而疾討陳陳近於楚民朝夕急能無往乎有陳非吾事也無之而後可冬諸侯戍陳張氏曰自桓文以來所以服陳者未聞以兵守之也晉為安陳之計如此何以能保陳乎愚謂於此見楚人之强中國之勞而不能支也君舉陳氏曰君子以悼公之伯業桓文之所不屑為也桓公不戰而屈楚文公戰而屈楚自悼公通吳以制楚矣㑹于戚于向于柤皆東境也而又戍陳以守之楚誠强而晉誠下䇿也楚公子貞帥師伐陳左氏曰子囊伐陳義見莊十年荆敗蔡師公㑹晉侯宋公衛侯鄭伯曹伯齊世子光救陳穀梁曹伯下有莒子邾子滕子薛伯八字左氏曰㑹于城棣以救之義見莊二十八年救鄭十有二月公至自救陳以救陳出故以救陳至義見桓二年公至自唐辛未季孫行父卒譏世卿也大意又見隱元年益師卒六年春王三月壬午杞伯姑容卒左氏曰杞桓公卒義見隱三年宋公卒夏宋華弱來奔弱公羊作溺義見僖二十八年元咺奔晉秋𦵏杞桓公義見隠三年葬宋穆公滕子來朝左氏曰滕成公義見隠十一年滕薛來朝莒人滅鄫義見莊十年齊滅譚案鄫懼莒而求庇於晉晉與之為戚之㑹矣坐視其滅而不問此伯業之所以卑也吕氏曰是時禮義衰絶滅國弑君皆目見之熟不為甚異故雖晉悼號為賢君亦莫能正也冬叔孫豹如邾左氏曰穆叔如邾聘且修平義見僖七年齊來聘季孫宿如晉宿行父之子武子也木訥趙氏曰宿父喪未期而執使命知世卿以固位而已襄公幼弱蓋非公意宿自為之義又見隠七年齊來聘十有二月齊侯滅萊左氏曰二年春齊侯伐萊萊人使正輿子賂夙沙衛以索牛馬皆百匹齊師乃還齊姜薨齊侯使諸姜婦來送葬召萊子萊子不㑹故晏弱城東陽以逼之六年齊侯滅萊萊恃謀也於鄭子國之來聘也四月晏弱城東陽而遂圍萊甲寅堙之環城傳於堞及杞桓公卒之月乙未王湫帥師及正輿子棠人軍齊師齊師大敗之丁未入萊萊共公浮柔奔棠正輿子王湫奔莒莒人殺之四月陳無宇獻萊宗器於襄宫晏弱圍棠丙辰而滅之未詳信否邦衡胡氏曰齊之謀萊久矣自宣七年公㑹齊侯伐萊至九年又伐之及是凡四十年乃滅萊則齊侯處心積慮豈不可甚辠歟義又見莊十年齊滅譚公羊曰曷為不言萊君出奔國滅君死之正也七年春郯子來朝義見隠十一年滕薛來朝夏四月三卜郊不從乃免牲義見僖三十一年此但三卜少殊耳小邾子來朝左氏曰小邾穆公義見隠十一年滕薛來朝城費費張氏曰沂州費縣左氏曰南遺為費宰叔仲昭伯為隧正欲善季氏而求媚於南遺謂遺請城費吾多與而役故季氏城費貫道王氏曰天子有分土無分民諸侯則無分土矣大夫食禄於其邑未有城而守者也故曰家不藏甲邑無百雉之城夫是以上下相保莫敢覬覦季孫固有無君之心而城費則魯襄之失政可知矣邦衡胡氏曰春秋邑而城者多矣費為季氏邑則見季氏之强而設險以自固也其後南蒯以費叛而季孫帥師墮費則知邑不可以設險矣書者非但譏不時勞民而已蓋為恃險者戒也義又見隱七年城中丘存耕趙氏曰先是季友立僖公於是賜以汶陽之田及費季氏有費以來更三世傳七十五年未嘗欲城也行父死未畢喪而費城於夏四月非時非制始有以張公室之意也禄去公室自城費始康侯胡氏曰書城費乃履霜堅冰之戒用人不惟其賢惟其世豈不殆哉君舉陳氏曰經至定十二年墮費蓋始見於此秋季孫宿如衞存耕趙氏曰宿代父為政甫兹用事不俟免喪而如衛如晉殆無虚嵗何汲汲如此蓋以締私交而固其執政之柄義又見隠七年齊來聘八月螽公羊榖梁作􅏑義見桓五年冬十月衛侯使孫林父來聘壬戌及孫林父盟左氏曰衛孫文子來聘且拜武子之言而尋孫桓子之盟公登亦登叔孫穆子相趨進曰諸侯之㑹寡君未嘗後衛君今吾子不後寡君寡君未知所過吾子其少安孫子無辭亦無悛容穆叔曰孫子必亡為臣而君過而不悛亡之本也義見成三年荀庚來聘楚公子貞帥師圍陳邦衡胡氏曰前書伐陳未足以克陳也此書圍陳則以兵合而守之書此以見楚之憑陵中國極矣屢書公子貞帥師亦見貞之專楚也義又見莊十年荆敗蔡師十有二月公㑹晉侯宋公陳侯衞侯曹伯莒子邾子于鄬于軌切穀梁或作䧦左氏曰楚子囊圍陳㑹于鄬以救之杜氏曰鄬鄭地謀救陳陳侯逃歸故不書救也愚謂書此以見晉之救陳而為陳侯逃歸起文也鄭伯髠頑如㑹未見諸侯丙戌卒于鄵七報切又采南切頑公羊榖梁作原鄵作操公羊曰鄵者何鄭之邑也趙氏曰諸侯死書名此則為上文言鄭伯如㑹下不可又言鄭伯髠頑卒又不可上言鄭伯如㑹下但言髠頑卒所以於如㑹時書名以便文也義見隐三年宋公卒陳侯逃歸左氏曰陳人患楚慶虎慶寅謂楚人曰吾使公子黄往而執之楚人從之二慶告陳侯於㑹曰楚人執公子黄矣君若不來羣臣不忍社稷宗廟懼有二圖陳侯逃歸康侯胡氏曰上二年諸侯戍陳今楚來伐諸侯又救之亦既勤矣為陳侯計者下令國中大申儆備立太子以固守親聽命於諸侯謀禦敵之䇿當是時晉君方明八卿和睦諸侯聽命必能致力於陳矣不此之顧棄儀衛而逃歸此匹夫之事耳夫義路也禮門也輕棄中國惟强者之懼是不能由是路出入是門其曰逃歸可謂深切著明矣義又見僖五年鄭伯逃歸八年春王正月公如晉左氏曰公如晉朝且聽朝聘之數義見僖十年公如齊孫氏曰公前年㑹諸侯于鄬不至者公自鄬朝晉也未詳信否夏葬鄭僖公義見隱三年葬宋穆公鄭人侵蔡獲蔡公子燮息協切榖梁作濕左氏曰鄭子國子耳侵蔡獲司馬公子燮鄭人皆喜唯子産不順曰小國無文徳而有武功禍莫大焉楚人來討能無從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗得寧矣子國怒之曰爾何知國有大命而有正卿童子言焉將為戮矣愚謂鄭伯居喪而遣兵侵蔡又獲其大夫辠自著矣義又見僖元年獲莒挐黄氏曰僖公方葬鄭乃侵楚之與國以挑釁此子産所以獨憂而不旋踵致楚之師髙氏曰師未嘗敗績而遽獲其大夫有以見民不親上而委之於敵矣季孫宿㑹晉侯鄭伯齊人宋人衞人邾人于邢丘任氏曰邢丘故邢國河内平臯縣也邢自邢丘遷襄國又遷夷儀左氏曰㑹于邢丘以命朝聘之數使諸侯之大夫聽命劉氏曰公在也曷為大夫㑹晉侯公反矣未至也公正月如晉反未至國令季孫宿復往㑹耳孫氏曰邢丘之㑹公在晉也晉侯不與公㑹而與季孫宿㑹者襄公幼弱政在季氏故也晉為盟主棄其君而與其臣何以宗諸侯晉侯之惡亦可見矣前說近是義又見隱九年㑹于防公至自晉義見桓二年公至自唐莒人伐我東鄙左氏曰莒人伐我東鄙以疆鄫田未詳信否義見隠二年鄭人伐衛張氏曰莒人滅鄫而魯不問伯主不討所以興伐魯之師也秋九月大雩左氏曰旱也義見桓五年冬楚公子貞帥師伐鄭左氏曰楚子囊伐鄭討其侵蔡也子駟子國子耳欲從楚子孔子蟜子展欲待晉子駟曰周詩有之曰俟河之清人壽幾何兆云詢多職競作羅謀之多族民之多違事滋無成民急矣姑從楚以紓吾民晉師至吾又從之敬恭幣帛以待來者小國之道也犧牲玉帛待於二竟以待强者而庇民焉宼不為害民不罷病不亦可乎子展曰小所以事大信也小國無信兵亂日至亡無日矣五㑹之信今將背之雖楚救我將安用之親我無成鄙我是欲不可從也不如待晉晉君方明四軍無闕八卿和睦必不棄鄭楚師遼逺糧食將盡必將速歸何患焉舍之聞之杖莫如信完守以老楚杖信以待晉不亦可乎子駟曰詩云謀夫孔多是用不集發言盈庭誰敢執其咎如匪行邁謀是用不得于道請從楚騑也受其咎乃及楚平使王子伯騈告於晉曰君命敝邑修而車賦儆而師徒以討亂略蔡人不從敝邑之人不敢寧處悉索敝賦以討於蔡獲司馬燮獻於邢丘今楚來討曰汝何故稱兵於蔡焚我郊保憑陵我城郭敝邑之衆夫婦男女不皇啟處以相救也剪焉傾覆無所控告民死亡者非其父兄即其子弟夫人愁痛不知所庇民知窮困而受盟於楚孤也與其二三臣不能禁止不敢不告知武子使行人子員對之曰君有楚命亦不使一介行李告於寡君而即安於楚君之所欲也誰敢違君寡君將帥諸侯以見於城下唯君圖之康侯胡氏曰鄭介大國之間困强楚之令欲息肩於晉若能信任仁賢以禮法自守而親比四鄰必能保其封境楚雖大何畏焉而加兵於蔡無故怒楚所謂不修文徳而有武功者也楚人來討不從則力不敵從之則晉師必至晉楚争鄭自兹弗得寧矣義又見莊十年荆敗蔡師晉侯使士匄來聘左氏曰晉范宣子來聘且拜公之辱告將用師於鄭義見隱七年齊來聘九年春宋災公羊作火非也左氏曰宋災樂喜為司城以為政使伯氏司里火所未至徹小屋塗大屋陳畚挶具綆缶備水器量輕重蓄水潦積土塗廵丈城繕守備表火道使華臣具正徒令隧正納郊保奔火所使華閱討右官庀其司向戍討左亦如之使樂遄庀刑器亦如之使皇鄖命校正出馬工正出車備甲兵庀武守使西鉏吾庀府守令司宫巷伯儆宫未詳信否義見莊二十年髙氏曰宋自昭文以來亂敗相屬三書宋災見人事之不修舉近可以知逺言小可以知大也夏季孫宿如晉左氏曰季武子如晉報宣子之聘也義見僖七年齊來聘五月辛酉夫人姜氏薨杜氏曰姜氏成公母義見文十六年姜氏薨秋八月癸未葬我小君穆姜杜氏曰四月而𦵏速義又見文十七年𦵏聲姜冬公㑹晉侯宋公衞侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭十二月己亥同盟于戲杜氏曰戲鄭地左氏曰諸侯伐鄭庚午季武子齊崔杼宋皇鄖從荀罃士匄門於鄟門衞北宫括曹人邾人從荀偃韓起門於師之梁滕人薛人從欒黶士魴門於北門把人郳人從趙武魏絳斬行栗甲戌師於汜令於諸侯曰修器備盛餱糧歸老幼居疾於虎牢肆眚圍鄭鄭人恐乃行成中行獻子曰遂圍之以待楚人之救也而與之戰不然無成知武子曰許之盟而還師以敝楚人吾三分四軍與諸侯之銳以逆來者於我未病楚不能矣猶愈於戰暴骨以逞不可以争大勞未艾君子勞心小人勞力先王之制也諸侯皆不欲戰乃許鄭成十一月己亥同盟于戲鄭服也將盟鄭六卿公子騑公子發公子嘉公孫輒公孫蠆公孫舍之及其大夫門子皆從鄭伯晉士莊子為載書曰自今日既盟之後鄭國不唯晉命是聽而或有異志者有如此盟公子騑趨進曰天禍鄭國使介居二大國之間大國不加徳音而亂以要之使其鬼神不獲歆其禋祀其民人不獲享其土利夫婦辛苦墊隘無所厎告自今日既盟之後鄭國不唯有禮與强可以庇民者是從而敢有異志者亦如之荀偃曰改載書公孫舍之曰昭大神要言焉若可改也大國亦可叛也知武子謂獻子曰我實不徳而要人以盟豈禮也哉非禮何以主盟姑盟而退修徳息師而來終必獲鄭何必今日我之不徳民將棄我豈唯鄭若能休和逺人將至何恃於鄭乃盟而還存耕趙氏曰襄公有祖母之喪而同於㑹伐罪自見矣愚謂此亦伯者功過之事也義又見莊十六年楚子伐鄭左氏曰楚子伐鄭子駟將及楚平子孔子蟜曰與大國盟口血未乾而背之可乎子駟子展曰吾盟固云唯强是從今楚師至晉不我救則楚强矣盟誓之言豈敢背之且要盟無質神弗臨也所臨唯信信者言之瑞也善之主也是故臨之神明不蠲要盟背之可也乃及楚平公子罷戎入盟同盟於中分楚莊夫人卒王未能定鄭而歸晉侯歸謀所以息民魏絳請施舍輸積聚以貸自公以下茍有積者盡出之國無滯積亦無困人公無禁利亦無貪民祈以幣更賔以特牲器用不作車服從給行之期年國乃有節三駕而楚不能與爭存耕趙氏曰鄭從楚則晉伐從晉則楚伐兩面受師實自取也不曰晉中國也吾宗也楚南蠻也異姓也但曰大國曽無中外之辨愚謂可見王道既壞中外混淆小役大弱役强而已矣義又見莊十年荆敗蔡師春秋本義卷二十
