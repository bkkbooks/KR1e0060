body:
  text: 春秋本義卷二元程端學撰隱公四年春王二月莒人伐杞取牟婁杞音起牟亡侯切孔氏曰杞姒姓公爵夏禹之苗裔武王克殷求禹之後得東樓公而封之扵杞九世成公遷陵此年杞國未知定是何君當是成公父祖也杜氏曰杞國本都陳留雍邱縣張氏曰周之三恪國在開封府雍邱縣趙氏曰凡力得之曰取不當取也不是其專奪雖復本邑亦無異詞葉氏曰凡國曰滅邑曰取無宗廟社稷君長屬之以為巳有謂之取公羊曰牟婁者杞之邑也張氏曰征伐天子之權土地諸侯所受之封莒人擅興兵以伐人又取其地王法所當誅也後倣此穀梁曰諸侯相伐取地扵是始孫氏曰二年莒人入向天子不能誅故肆然伐杞取牟婁甚之也存耕趙氏曰莒雖小國東夷之雄者也為諸侯害不減扵荆呉自入春秋未有入人之國者而莒入向未有取人之地者而莒取杞牟婁上無天子下無方伯使莒恣焉而無忌莘老孫氏曰伐而後言取者先聲其辠以伐之又奪取其邑以為已有也諸侯受天子之地以為國失徳扵民得辠扵君則有黜地之罰降爵之責非天子雖方伯不得擅黜諸侯之地擅易諸侯之封諸侯能有其國不能以其國與人以國與人者猶以為辠況不義而取之乎凡書取者皆辠其擅取諸侯之地以入扵已也又曰春秋強者侮弱大者加小率然不顧時王之命是故二百四十二年之間其志襲者一侵者六十六取者二十一滅者三十一皆所以示後世王法也戊申衛州吁弑其君完州穀梁作祝州吁不氏與二年無駭同弑下殺上之名完衛桓公名也左氏曰衛莊公娶扵齊東宫得臣之妹曰莊姜美而無子其娣戴媯生桓公莊姜以為已子公子州吁嬖人之子也有寵而好兵公弗禁莊姜惡之石碏諌曰臣聞愛子教之以義方弗納扵邪驕奢淫泆所自邪也四者之來寵祿過也夫寵而不驕驕而能降降而不憾憾而能眕者鮮矣且夫賤妨貴少陵長逺間親新間舊小加大淫破義所謂六逆也君義臣行父慈子孝兄愛弟敬所謂六順也去順效逆所以速禍也君人者将禍是務去而速之無乃不可乎弗聴其子厚與州吁逰禁之不可桓公立乃老州吁弑桓公而立張氏曰弑逆之事人道之大變聖人扵易坤之初六言其理以為臣子而至扵弑君父非一朝一夕之故其所由來者漸矣由辯之不早辯也衛國之禍始扵莊公之寵州吁縦其好兵而不知禁公存之時妾上僭夫人失位見扵衛詩則亂根之萌久矣殖之滋長以致篡弑成扵桓公既立之後春秋據事直書亦将使讀者原禍敗之所由起而嚴履霜之戒也夫君臣父子夫婦之分一失其正貽禍後嗣可謂慘矣愚謂君雖不君臣不可以不忠父雖不父子不可以不孝人而至扵弑君不言而辠惡極矣故董子曰為人君父而不通扵春秋之義者必蒙首惡之名為人臣子而不通扵春秋之義者必陷篡弑誅死之罪其實皆以善為之而不知其義此弑君之賊人人得而殺之也後倣此康侯胡氏曰春秋在扵端本清源以衛緑衣諸篇考之所謂前有讒而不見後有賊而不知者莊公是也夏公及宋公遇于清此及猶與也後倣此宋公殤公也遇杜氏曰草次之期二國各簡其禮若道路相逢遇也程子曰非周禮冬見曰遇之遇杜氏曰清衛邑濟北東阿縣有清亭存耕趙氏曰清水界齊衛之間張氏曰古者諸侯出疆朝天子若罷朝卒然相遇則近者為主逺者為客稱先君以相接所以崇禮讓絶慢易也春秋諸侯雖非相遇而欲從簡易則以遇禮相見而不行朝㑹之禮故亦曰遇春秋因事而書以譏其非王事出境無國君之禮愚案禮父母之喪斬衰不脱絰帶不與人坐宋公居父喪未及期而出境㑹遇諸侯隠公亦不以其居喪而與之遇皆辠也康侯胡氏曰古有遇禮不期而㑹以明造次亦有恭肅之心春秋書遇私為之約自比扵不期而遇者直欲簡其禮耳簡畧慢易莫適主矣常山劉氏曰王室衰微典法廢壊諸侯各逞其欲盟㑹紛然舎此又簡易其事若道路相逢遇春秋書遇者七宋公陳侯蔡人衛人伐鄭孔氏曰陳國媯姓虞舜之後武王封有虞遏父之子滿扵陳賜姓媯號胡公桓公二十三年即隠之元年也杜氏曰陳國陳縣張氏曰即陳州宛邱縣孔氏曰蔡國侯爵姬姓文王子叔度武王封為蔡侯作亂失國其子蔡仲成王復封之宣侯二十八年即隠之元年也杜氏曰蔡汝南上蔡縣張氏曰縣屬蔡州胡氏曰蔡衛稱人微者也後不復解左氏曰宋殤公之即位也公子馮出奔鄭鄭人欲納之及衛州吁立将修先君之怨扵鄭而求寵扵諸侯以和其民使告扵宋曰君若伐鄭以除君害君為主敝邑以賦與陳蔡從則衛國之願也宋人許之扵是陳蔡方睦扵衛故宋公陳侯蔡人衛人伐鄭程子曰摟諸侯以伐鄭固為辠矣而衛弑其君天下所當誅也乃與修好而同伐人其惡甚矣義又見隠二年鄭伐衛此則諸侯與大夫伐人之國也張氏曰州吁弑逆内懐見討之懼而欲納交殤公苟能拒其邪説告扵王而討之則一舉而父子君臣之倫定中國之禍未至如後日之慘今乃怵扵州吁之邪説合陳蔡以助逆賊之黨而首修怨扵鄰國扵是馮得以自固扵鄭而宋國之人不復知君臣逆順之正理自是日從事扵兵而弑逆之事卒及其身皆殤公不能早辯扵此役也秋翬帥師㑹宋公陳侯蔡人衛人伐鄭翬許歸切翬羽父也不氏與二年無駭同大夫帥師見二年後不復解劉氏曰㑹者聚辭也程子曰宋虐用其民衛當誅之賊而與之伐人其罪大矣二國搆怨而他國與之同伐其辠均也張氏曰宋殤陳蔡黨亂賊以虐無辜視弑君之大變不知夷狄禽獸所不為者而以為可親魯隠又從而翼之遂使中國之人視之為常事宋魯陳衛淪胥繼亂學者扵此當知聖人傷世變扶天理之深旨九月衛人殺州吁于濮音卜公羊曰其稱人何討賊之辭也程子曰稱衛人衆辭也舉國殺之也杜氏曰濮陳地水名張氏曰濮在曹衛之間穀梁曰于濮譏失賊也左氏曰州吁未能和其民厚問定君扵石子石子曰王覲為可曰何以得覲曰陳桓公方有寵扵王陳衛方睦若朝陳使請必可得也厚從州吁如陳石碏使告扵陳曰衛國褊小老夫耄矣無能為也此二人者實弑寡君敢即圖之陳人執之而請涖扵衛九月衛人使右宰醜涖殺州吁于濮石碏使其宰獳羊肩涖殺石厚于陳陸氏曰凡作亂自立為君而國人殺之者皆稱人以殺言衆所共棄不君之也且無所累也禮記曰臣弑君凡在官者殺無赦殺其人壊其室汙其宫而豬焉莘老孫氏曰春秋之法雖弑君自立者有人焉以弑君之賊討則雖君不謂君也殺之雖臣不謂臣也于濮者譏逺地又以責衛之臣子也康侯胡氏曰于濮者不但記地而已亦憫衛國之人著諸侯之辠也夫州吁二月弑君而不能即討者由四國連兵欲定其位故久然後殺之于濮耳夫以討賊許衆人而以失賊辠鄰國與賊者寡矣故曰春秋成而亂臣賊子懼存耕趙氏曰州吁弑君而立已踰三時㡬免扵討矣雖奉五國以伐鄭而不能定其位未能和其民是國人不與也董子曰衛人殺州吁齊人殺無知明君臣之義守國之政也冬十有二月衛人立晉公羊曰稱人衆立之辭也葉氏曰晉桓公弟也左氏曰衛人逆公子晉于邢宣公即位孫氏曰嗣子有常位故不言立言立非正也州吁既死衛國無君故國人取公子晉而立之諸侯受國乎天子非國人得立也故曰衛人立晉莘老孫氏曰晉國人衆立冝其有得立之理春秋扵疑似之間衆人以為功一時以為善者聖人必立大辨以正之所以示皇極著王法也愚謂諸侯之立必嫡長子受命扵天子與先君衛桓之後未聞嫡長晉為桓弟使天子詢可立之君則晉在其選況衛桓已死不可責其不受命扵先君也但立君之權在天子職在方伯司冦擇當立之君而請扵天子天子命之則正也若衛人自立之則天下無復有共主而君不得為臣綱矣衛人立晉猶曰衛人自立晉矣不辭費而聖人傷世尊王之心昭然可見五年春公觀魚于棠朱子曰左氏矢魚是將弓矢去射之如漢武帝射江中鮫之類張氏曰左氏作矢非也孫氏曰棠魯地杜氏曰髙平方與縣北有武唐亭魯侯觀魚臺張氏曰在單州魚臺縣左氏曰公將如棠觀魚者臧僖伯諫曰凡物不足以講大事其材不足以備器用則君不舉焉君將納民扵軌物者也故講事以度軌量謂之軌取材以章物采謂之物不軌不物謂之亂政亂政亟行所以敗也故春蒐夏苗秋獮冬狩皆扵農隙以講事也三年而治兵入而振旅歸而飲至以數軍實昭文章明貴賤辨等列順少長習威儀也鳥獸之肉不登扵俎皮革齒牙骨角毛羽不登扵器則公不射古之制也若夫山林川澤之實器用之資皁隷之事官司之守非君所及也公曰吾將略地焉遂往僖伯稱疾不従程子曰諸侯非王事民事不逺出逺出觀魚非道也莘老孫氏曰去治所而逺至于棠以觀魚公之動不以禮而從耳目之娯也穀梁曰禮尊不親小事卑不尸大功魚卑者之事也公觀之非正也孫氏曰觀魚非諸侯之事也天子諸侯無非事者動必有為也故孟子曰天子適諸侯曰廵狩廵狩者廵所守也諸侯朝扵天子曰述職述職者述所職也是故春省耕而補不足秋省斂而助不給隠公怠棄國政觀魚于棠可謂非事者矣啖氏曰凡公行書其事者皆非常也夏四月葬衛桓公桓諡也衛侯爵而稱公者僭也左氏曰衛亂是以緩獻可杜氏曰衛桓十四月而葬不得五月之正康侯胡氏曰諡者行之跡所以紀實徳垂勸戒也名之曰幽厲雖孝子慈孫不能改也失位見弑何以為桓衛本侯爵何以稱公義又見三年葬宋穆公周持敬曰案春秋見弑之君二十五有書葬者有不書葬者自公穀倡賊討書葬之説而諸儒從之然竟不可通至蔡般許買書葬則又以為聖人宥其辠夫賊討書葬惟衛桓齊襄陳靈賊不討不書葬惟魯隠閔二公竊謂内不書葬則左氏不成喪之説近之外則或不来赴或内不㑹葬耳秋衛師入郕音成公羊作盛公羊曰將卑師衆稱師郕孔氏曰史記管蔡世家稱郕叔武文王子武王之母弟無世家不知其君號諡文十二年書郕伯來奔則伯爵也杜氏曰東平剛父縣西南有郕鄉張氏曰單州任城縣也左氏曰衛之亂也郕人侵衛故衛師入郕未詳信否程子曰衛晉乘亂得立不思安國保民之道以尊王為先居喪為重乃興戎修怨入人之國書其失道也義又見二年莒入向公羊曰曷為或言帥師或不言帥師将尊師衆稱某帥師将尊師少稱將將卑師衆稱師將卑師少稱人君將不言帥師書其重者也愚謂此舊史之法大畧如此然此事本義則在入人之國其他亦各有本義後倣此九月考仲子之宫初獻六羽張氏曰考猶考室之考成也仲子見元年康侯胡氏曰存則以氏繫姓以姓繫號沒則以諡繫號以姓繫諡者夫人也存不稱號沒不稱諡單舉姓字者妾也諸侯不再娶扵禮無二嫡孟子入惠公之廟仲子無祭享之所為别立宫以祀之非禮也初獻六羽者始用六佾也不謂之佾而曰羽者佾干羽之總稱也羽以象文徳干以象武功婦人無外事則獨奏文樂故謂之羽而不曰佾也君舉陳氏曰古者妾祔扵妾祖姑無妾祖姑則易牲而祔扵女君别廟非禮也隠改築而用備樂焉禮未之有也是故書初公羊曰初者何始也六羽者何舞也初獻六羽書始僭諸公也天子八諸公六諸侯四愚謂以諸侯夫人用六羽猶為僭今妾用之聖人所以傷周禮之大壊也堯俞李氏曰禮喪服小記云妾母不世祭鄭氏釋之曰扵子祭扵孫止是則妾母之冝祭者由子之為也君既死則廢之況未為君而有廟乎言仲子正其賤也主書者所以譏隠也孫氏曰天王歸仲子之賵非禮也此又考仲子之宫祭之甚矣夫宗廟有常故公夫人之廟皆不書考仲子之宫立武宫立煬宫皆變常也邾人鄭人伐宋杜氏曰邾主兵故序鄭上蘇氏曰凡班序上下以國之大小而盟㑹侵伐以主者先獻可杜氏曰兵者古人不得已而用之春秋諸侯專之不問乎得已不得已故主兵者首專伐之辠義又見二年鄭伐衛螟杜氏曰螟蟲食苗心者公羊曰記災也康侯胡氏曰國以民為本民以食為天聖人以是為國之大事也故書後倣此莘老孫氏曰春秋之時天下人物皆失其所人倫之逆則至扵君篡父弑物理之繆則至扵焚邱獲麟悖戾不和之氣上千隂陽天行失其度而日為之食星為之隕地道反其常而地為之震山為之崩四時失其和而大旱不雨無冰雨雹五行錯其性而大災大水雨木冰以至禽魚草木為怪為災則螽螟生蜚􅈮有李梅冬實鸜鵒來巢書之所以見人道亂扵下而天辰錯扵上物理失其常則災異為之出當時之亂已不可救後世之君尚足為戒也冬十有二月辛巳公子彄卒彄苦侯切彄名字子臧孝公之子隠公之叔父僖伯也髙氏曰其子臧孫達嗣是為哀伯自是至春秋末臧氏世預魯國之政愚謂此記臧氏之始彄之後臧孫逹臧孫辰臧孫許臧孫紇魯史記其卒聖人因録之以見世卿之始也大意又見元年益師卒宋人伐鄭圍長葛康侯胡氏曰圍環其城也莘老孫氏曰守而取之後倣此長葛鄭邑杜氏曰潁川長社縣北有長葛城張氏曰潁昌府長葛縣程子曰伐國而圍邑肆其暴也存耕趙氏曰邾鄭伐宋宋伐鄭圍邑不能懲忿扵一時而互為報復奚有窮已康侯胡氏曰書圍扵此而書取扵後宋人之惡彰矣春秋志圍四十三伐國而圍邑者四六年春鄭人來輸平輸舂朱切左氏作渝康侯胡氏曰輸者納也平者成也孫氏曰平者釋怨之辭平四年翬㑹諸侯伐鄭之怨也愚謂聖王在上諸侯無怨可平春秋之時列國兵爭互為讎隙故鄭有來魯輸平之事然其輸平又非有繼好息民之本心不過為合黨相傾之詭計黨合則天下愈多事矣康侯胡氏曰鄭人曷為納成扵魯以利相結解怨釋仇離宋魯之黨也公之未立與鄭人戰于狐壤止焉元年及宋盟于宿四年遇于清其秋㑹師伐鄭即宋魯為黨與鄭有舊怨明矣五年鄭人伐宋入其郛宋來告命魯欲救之使者失辭公怒而止其冬宋人伐鄭圍長葛鄭伯知其適有用間可乘之隙也是以來納成爾然則善之乎曰平者解怨釋仇固所善也輸平者以利相結也曷為知其相結之以利也後此鄭伯使宛來歸祊而魯入其地㑹鄭人伐宋得郜及防而魯又取其二邑是知輸平者以利相結也諸侯修睦以蕃王室所主者義爾苟為以利不至扵篡弑奪攘則不厭矣故稱輸平以明有國者必正其義不謀其利杜亡國敗家之本也張氏曰鄭莊不憚屈已求和扵魯所以為敗宋入許之權輿魯隠亦入扵其術而不悟也君舉陳氏曰書鄭輸平以志諸侯之合書及鄭平以志諸侯之散是春秋之所終始也夏五月辛酉公㑹齊侯盟于艾五盖切外為主稱㑹若此之類是也後倣此杜氏曰泰山牟縣東南有艾山張氏曰襲慶府奉符縣也左氏曰始平于齊也義見元年盟于蔑存耕趙氏曰齊與鄭為好宋與魯相睦鄭未合魯故魯無齊好也莊公以隠絶宋使而亟與為平惟恐失其歡心也故託齊為艾之盟以固魯之好魯既平鄭又盟齊則宋之交分矣鄭莊之計行矣未詳是否秋七月一時無事必書首月者黄氏曰備四時也程子曰天時王月備而後成嵗也愚謂亦魯史之常法聖人因之耳後凡書四時倣此存耕趙氏曰春秋無事書首月五十有九莊二十二年書夏五月昭十二年書十有二月意者其脱誤歟黄氏曰或不書者傳授脱之愚謂凡夏秋冬無事必書首月本與春無事書首月同義但春以一嵗之始王所頒之正朔而多一王字耳冬宋人取長葛杜氏曰上有伐鄭圍長葛鄭邑可知故不言鄭也孫氏曰天子所封非宋可得取也程子曰宋人之圍長葛嵗且周矣其虐民無道之甚而天子弗治方伯弗征鄭視其民之危困不能保有赴訴卒喪其邑皆辠也宋人强取不可勝誅矣康侯胡氏曰宋人恃强圍邑久役大衆取非所有其辠著矣以王法言不可勝誅以天理言不善之積著矣初穆公屬國扵與夷使其子馮出居扵鄭殤公既立忌馮而伐鄭不亦逆天理乎其見弑扵亂臣豈一朝一夕之故哉案其行事而善惡之應可考而知天理之不誣也張氏曰自圍長葛經年不解志扵必取鄭莊不赴扵天子方伯同列以求保其土地人民反結交扵魯以為後日報復之計而委長葛扵宋稔禍長惡宋殤雖若得志而後日終受鄭莊報復蹙國喪師以及其身春秋所深誅也春秋本義卷二
