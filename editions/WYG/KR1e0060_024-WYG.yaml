body:
  text: 春秋本義卷二十四元程端學撰昭公名稠襄公之子齊歸所生元年春王正月公即位義見文元年叔孫豹㑹晉趙武楚公子圍齊國弱宋向戍衞石惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢公羊弱作酌左氏榖梁石惡作齊惡罕虎作軒虎後及罕逹同虢作漷榖梁作郭公子招者陳侯之弟也康侯胡氏曰公子者其本當稱者也曰弟者因事而稱之也髙氏曰衛石惡在陳蔡之上者上卿也宋之盟齊人不預焉今齊又從楚矣中國微弱可知也義見襄二十七年㑹于宋葉氏曰自襄以來晉主夏盟齊楚皆未入㑹宋未嘗不先諸侯雞澤之㑹齊始以世子光來猶在邾下至邢丘而齊人居宋人上則齊已亢矣澶淵之㑹齊侯始入㑹遂居宋公上宋之㑹楚始入㑹屈建遂居蔡衛上至是楚公子圍先國弱而向戍在三楚人愈強雖齊亦為屈而二王之後㣲矣三月取鄆公羊作運後同滅而言取見宣九年鄆東鄆也見成九年義見莊十年齊滅譚夏秦伯之弟鍼出奔晉義見襄二十年陳侯弟奔楚六月丁巳邾子華卒義見隱三年宋穆公卒晉荀吳帥師敗狄于大鹵音魯左氏經作鹵傳作原公羊榖梁經作原傳作鹵箕與交剛皆書晉人而此書卿帥師者將尊師衆也杜氏曰大鹵大原晉陽縣張氏曰公羊䟽云古文及晉陽人皆謂之大鹵而今經及師讀皆謂之大原說文西方謂之鹵易曰兊為剛鹵西方之澤也春秋大原為大鹵亦西方也義見莊二十年齊伐戎秋莒去疾自齊入于莒莒展輿出奔吳公羊榖梁無輿字陸德明注左傳云一本無輿字葉氏曰自齊有奉也言入逆辭也左氏曰莒展輿立而奪群公子秩公子召去疾於齊秋公子鉏納去疾展輿奔吳未詳信否愚謂展輿去疾皆庶孽也展輿不稱子與莊二十四年曹羈同其事與桓十一年突歸於鄭鄭忽奔衛同但鄭忽為嫡展輿為庶耳書之以見展輿君弑不討賊既立踰年而出奔其不能君可知若去疾之篡辠不容誅齊又奉之惡亦可見然天子方伯不能正而庶孽得以容其篡三綱不立又益以顯矣叔弓帥師疆鄆田杜氏曰春取鄆今正其封疆劉氏曰疆之者溝封之也曷為溝封之别乎莒也愚謂取人之國而以兵力疆田惡可見矣蓋叔弓為季氏黨欲强其私家耳任氏曰春取鄆而秋疆其田汲汲乎利其土地之甚也帥師而疆之豈獨有虞於莒乎雖鄆人亦不服所以必欲疆之也取鄆為不善矣疆田又不善也疆田為不善矣帥師而疆之尤為不喜也葬邾悼公邾始書葬魯㑹之也義見隱三年葬宋穆公髙氏曰入春秋來邾始書葬蓋邾滕薛皆小國也秦逺國也皆至昭公而書葬是時魯衰甚矣小國如大國逺國如近國愚案此說與隠七年滕侯卒相表裏參考可也冬十有二月己酉楚子麇卒麇九倫切公羊榖梁作卷義見文十八年秦伯卒楚公子比出奔晉比左氏曰右尹子干也義見僖二十八年元咺奔晉朴郷吕氏曰楚䖍立而比出奔意者其與䖍爭國者乎木訥趙氏曰楚子卒而比出奔則比者必麇之孚有所不容於嗣君耳皆未詳是否二年春晉侯使韓起來聘起韓宣子韓厥次子也義見隱七年齊來聘夏叔弓如晉左氏曰叔弓聘於晉報宣子也義見隠七年齊來聘秋鄭殺其大夫公孫黑黑子晳也左氏曰元年鄭徐吾犯之妹美公孫楚聘之矣公孫黑又使強委禽焉犯懼告子産子產曰是國無政非子之患也唯所欲與犯請於二子請使女擇焉皆許之子晳盛飾入布幣而出子南戎服入左右射超乗而出女自房觀之曰子晳信美矣抑子南夫也夫夫婦婦所謂順也適子南氏子晳怒既而櫜甲以見子南欲殺之而取其妻子南知之執戈逐之及衝擊之以戈子晳傷而歸告大夫曰我好見之不知其有異志也故傷大夫皆謀之子產曰直鈞幼賤有辠辠在楚也乃執子南而數之曰國之大節有五女皆奸之畏君之威聽其政尊其貴事其長養其親五者所以為國也今君在國女用兵焉不畏威也奸國之紀不聽政也子晳上大夫女嬖大夫而弗下之不尊貴也幼而不忌不事長也兵其從兄不養親也君曰予不忍女殺宥女以逺勉速行乎無重而辠五月庚辰鄭放游楚於吳将行子南子産咨於大叔大叔曰吉不能亢身焉能亢宗彼國政也非私難也子圖鄭國利則行之又何疑焉周公殺管叔而蔡蔡叔夫豈不愛王室故也吉若獲戾子将行之何有於諸游二年秋鄭公孫黑将作亂欲去游氏而代其位傷疾作而不果駟氏與諸大夫欲殺之子産在鄙聞之懼弗及乗遽而至使吏數之曰伯有之亂以大國之事而未爾討也爾有亂心無厭國不女堪專伐伯有而辠一也昆弟爭室而辠二也薰隧之盟女矯君位而辠三也有死辠三何以堪之不速死大刑将至再拜稽首辭曰死在朝夕無助天為虐子産曰人誰不死凶人不終命也作凶事為凶人不助天其助凶人乎請以印為褚師子産曰印也若材君將任之不才將朝夕從女女辠之不恤而又何請焉不速死司寇将至七月壬寅縊尸諸周氏之衢加木焉未詳信否義見莊二十六年曹殺大夫冬公如晉至河乃復季孫宿如晉左氏曰晉少姜卒公如晉及河晉侯使士文伯來辭曰非伉儷也請君無辱公還季孫宿遂致服焉常山劉氏曰凡人君動止有度豈可非禮而行無故而乃復哉葢進退皆非禮義也康侯胡氏曰經書公如晉至河乃復季孫宿如晉而昭公失國之因季孫逐君之漸晉人下比之跡皆見矣莘老孫氏曰公如晉朝而晉不納至河乃復以公之自復爲文者臣子之心不欲其君見拒於人而公自復也昭公四如晉四至河而復又二十三年冬至河乃復書有疾焉公雖不見納於晉然有疾而復猶可爾葉氏曰公自即位三十二年之間朝於晉者五唯其末言疾外此皆非公之自復晉辭公也晉豈得以辱公哉葢公嘗為少姜卒而徃弔矣為季孫意如執而徃請矣以千乗之君弔嬖妾且為臣而親行則晉人不得不易公也故或以莒人之愬而辭公或以鮮虞之伐而辭公使公知恭之不忘禮則一辭公固可以止何待至於再三而不已乎如是而流離於外不得志於齊猶有望於晉以為寄彷徨乎乾侯卒至於死而不悟此春秋所以屢書不少殺獨以有疾一著其實者所以志公之媿也劉氏曰為國以禮者處勝人之地矣三年春王正月丁未滕子原卒原公羊作泉義見隱三年宋公卒又為叔弓如滕起文也夏叔弓如滕五月葬滕成公髙氏曰入春秋來滕始書𦵏夫以卿共其葬非禮也以我襄公之葬滕子來㑹故魯報之然與二十三年葬景王無辨矣義又見隠三年葬宋穆公秋小邾子來朝左氏曰穆公也義見隱十一年滕薛來朝八月大雩義見桓五年冬大雨雹髙氏曰為災故書秋旱冬雹皆人事所召且為四年起也義見僖二十九年張子曰雹戾氣也此中國不振而吳楚㑹諸侯之兆也北燕伯款出奔齊北燕見襄二十九年左氏曰燕簡公多嬖寵欲去諸大夫而立其寵人冬燕大夫比以殺公之外嬖公懼奔齊未詳信否義見襄十四年衛侯奔齊四年春王正月大雨雹公羊穀梁作雪范氏云或作雹葉氏曰當從左氏義見僖二十九年存耕趙氏曰自冬歴春大雹者二陽氣不得達陰錮之也由魯而論則臣干君季氏逼君之應也由中國而論則吳楚強而爭伯之驗也夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷㑹于申杜氏曰胡國汝隂縣西北有胡城淮夷孔氏曰淮浦之夷也後漢志下邳國有淮浦縣張氏曰申姜姓之國杜氏曰在南陽宛縣愚謂宋世子在小邾子下者世子不敢敵諸侯與齊世子光同淮夷不殊㑹者非諸侯㑹淮夷淮夷來與㑹耳俱無他義左氏曰許男如楚楚子止之遂止鄭伯復田江南許男與焉使椒舉如晉求諸侯二君待之椒舉致命曰寡君使舉曰日君有惠賜盟於宋曰晉楚之從交相見也以嵗之不易寡君願結驩於二三君使舉請閒君若苟無四方之虞則願假寵以請於諸侯晉侯欲勿許司馬侯曰不可楚王方侈天或者欲逞其心以厚其毒而降之罰未可知也其使能終亦未可知也晉楚唯天所相不可與爭君其許之乃許楚使使叔向對曰寡君有社稷之事是以不獲春秋時見諸侯君實有之何辱命焉楚子問於子產曰晉其許我諸侯乎對曰許君晉君少安不在諸侯其大夫多求莫匡其君在宋之盟又曰如一若不許君将焉用之王曰諸侯其來乎對曰必來從宋之盟承君之歡不畏大國何敢不來不來者其魯衛曹邾乎曹畏宋邾畏魯魯衛偪於齊而親於晉唯是不來其餘君之所及也誰敢不至王曰然則吾所求者無不可乎對曰求逞於人不可與人同欲盡濟夏諸侯如楚魯衛曹邾不㑹曹邾辭以難公辭以時祭衛侯辭以疾鄭伯先待於申楚子合諸侯於申椒舉言於楚子曰臣聞諸侯無歸禮以為歸今君始得諸侯其慎禮矣霸之濟否在此㑹也夏啓有鈞臺之享商湯有景亳之命周武有孟津之誓成有岐陽之蒐康有酆宫之朝穆有塗山之㑹齊桓有召陵之師晉文有踐土之盟君其何用宋向戍鄭公孫僑在諸侯之良也君其選焉王曰吾用齊桓王使問禮於左師與子産左師曰小國習之大國用之敢不薦聞獻公合諸侯之禮六子産曰小國共職敢不薦守獻伯子男㑹公之禮六楚子示諸侯侈椒舉曰夫六王二公之事皆所以示諸侯禮也諸侯所由用命也夏桀為仍之㑹有緡叛之商紂為黎之蒐東夷叛之周幽王為太室之盟戎狄叛之皆所以示諸侯汰也諸侯所由棄命也今君以汰無乃不濟乎王弗聽孫氏曰中國自宋之㑹諸侯不見者十年矣此書㑹於申楚子大合諸侯於此也桓文死中國不振喪亂日甚幅裂横潰制在楚人故也自是中國之事皆楚人制之至於平丘召陵之㑹諸侯雖云再出尋復叛去事無所救不足道也程子曰晉平不在諸侯楚於是强為伯者之事葉氏曰楚子始欲求諸侯而未定問於子産曰晉其許我乎諸侯其來乎則楚子固自以為不足服諸侯也當是時使晉稍強諸侯聽之則楚亦不得肆志而晉侯方溺於嬖寵豈復有志於中國哉楚偃然專諸侯諸侯舍晉無所附則亦不得已而從楚晉雖不㑹自胡沈小國至淮夷無不在楚於是伐吳滅陳滅蔡殺干徴師楚之得志於中國未有盛於此時非楚所能為也黄池之㑹以夫差之强定公一數之不敢不聽公不能行之於申所以見中國之無伯憫諸侯之無能為也君舉陳氏曰齊桓卒楚宋嘗爭長矣敗於城濮楚師不出者八年晉志不在諸侯而後楚莊盟于辰陵以荘王之賢從之者陳鄭焉爾申之㑹合十有二國楚之得志於中國未有甚於此時者也吕氏曰自襄公三年雞澤之㑹諸侯同盟矣而叔孫豹始及諸侯之大夫及陳袁僑盟襄十六年溴梁之㑹獨大夫盟諸侯不與也至襄二十七年宋之㑹大夫自㑹爾諸侯不在也此嵗㑹于申諸侯始復㑹而楚子主之淮夷與焉天下之事可知矣楚人執徐子左氏曰徐子吳出也以為貳焉故執諸申未詳信否劉氏曰不言以歸申楚地也愚謂楚圍一得志於諸侯而執其國君見暴横之不可縱也邦衡胡氏曰盂之盟楚人執宋公申之㑹楚人執徐子平涼之㑹尚結賛刼盟異域豈可以信義結哉秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳執齊慶封殺之遂滅賴公羊榖梁作厲張氏曰賴國蔡州褒信縣有賴亭蘇氏曰申之諸侯有不與伐吳者故復序愚謂執齊慶封殺之者先執而後殺也左氏曰楚子以諸侯伐吳宋太子鄭伯先歸使屈申圍朱方克之執齊慶封而盡滅其族髙氏曰申之㑹楚靈不脩德而求諸侯諸侯畏楚之强守宋之盟而從之然猶不敢致魯衛曹薛邾把至伐吳之役中國諸侯皆去惟楚屬從之耳伐吳而執慶封殺之者以慶封在吳故為齊討之假中國仁義以重其㑹所謂盗亦有道也彼以南蠻既㑹中國之諸侯又帥之以伐吳專殺中國之大夫以諸侯之兵滅人之國流毒如此葢出於宋向戍弭兵之謀也愚謂楚殺慶封以其從吳且示威也非真為齊討也義又見僖三年徐取舒君舉陳氏曰申之㑹春秋之大變也宋虢之事猶曰二伯至是而楚始合諸侯執齊慶封放陳招殺蔡般假討賊之義以號令於天下由是而滅賴滅陳蔡矣黄氏曰晉主夏盟正以抗楚也楚日以強而晉通呉於㑹正結之以犄楚也自宋向戌謀弭兵合晉楚之成有宋之盟至今申之㑹晉不敢復出而盡遜之楚矣皆宋之盟啟之也楚昔之所仇者在晉今晉既遜之為盟主則所仇者吴耳故一出而執徐子者以徐子為吳之出也伐吳而殺慶封以慶封吳所封也而又滅賴亦以示威於吳也春秋之有伯主正以楚之害中國今反遜楚為中國伯主此莫大之變也九月取鄫榖梁作繒滅而言取見宣九年案襄六年書莒人滅鄫矣豈鄫嘗見滅於莒而後得復國今復見滅於魯歟定六年書鄭滅許而哀元年許復見於經說者亦云許依楚而得復國鄫之事類此然不可考矣義見莊十年齊滅譚冬十二月乙卯叔孫豹卒此譏世卿又為舍中軍起文也大意又見隱元年益師卒五年春王正月舍中軍左氏曰季孫謀去中軍豎牛曰夫子固欲去之正月舍中軍卑公室也毁中軍於施氏成諸臧氏初作中軍三分公室而各有其一季氏盡征之叔孫臣其子弟孟氏取其半焉及其舍之也四分公室季氏擇二二子各一皆盡征之而貢於公以書使杜洩告於殯曰子固欲毁中軍既毁之矣故告杜洩曰夫子惟不欲毁也故盟諸僖閎詛諸五父之衢受其書而投之帥士而哭之孔氏曰初作中軍季氏盡征之並不入公室也叔孫氏臣其子弟以一家之内有父子兄弟四品以父兄之稅入公子弟之稅入已大率半屬公半入已孟氏則於子弟中取其半或取子或取弟大率三分歸公一分入已十二分其國民三家得七公得五國民不盡屬公公室已卑矣今舍中軍四分公室三家自取其稅而各貢於公公室彌卑矣初云作三軍今不云舍三軍者初作時舊有二軍今更增一軍人數不足故各毁其乗足成三軍今此則惟舍中軍分中軍之衆屬上下二軍其上下軍依舊故云舍中軍也季氏因叔孫家禍退之使同孟孫獨取其半為專已甚又擇取善者是專之極故傳言擇二以見之康侯胡氏曰三軍作舍皆自三家公不與焉公室益卑而魯國之兵權悉歸於季氏矣兵權有國之司命三綱兵政之本原書其作舍而公孫於齊薨於乾侯定公無政必至之理也已則不臣三綱淪替南遺叛陽虎專季斯囚而三桓之子孫微矣亦能免乎書曰舍中軍微辭以著其辠也楚殺其大夫屈申左氏曰楚子以屈申為貳於呉乃殺之未詳信否義見莊二十六年曹殺大夫公如晉義見僖十年公如齊夏莒牟夷以牟婁及防兹來奔牟婁即隠四年莒所取把邑也防兹杜氏曰城陽平昌縣西南有防亭姑幕縣東北有兹亭地譜宻州安丘縣有平昌故城莒縣有姑幕故城愚謂稱及者别二邑文法當然無他義也髙氏曰公如晉未反而受莒邑惡季氏專且見莒益弱矣莒牟以利接我而我入其利故兩譏之義又見襄二十一年邾庶其來奔秋七月公至自晉義見桓二年公至自唐此又見公未還而季氏自受叛人也戊辰叔弓帥師敗莒師于蚡泉蚡公羊作漬榖梁作賁杜氏曰蚡泉魯地孫氏曰魯既受莒叛人邑又敗莒師其惡可知也義又見隱二年鄭伐衛秦伯卒存耕趙氏曰卒不名史失之義見文十八年秦伯卒冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳陸氏曰越姒姓夏后少康之庶子封於㑹稽左氏曰四年冬吳伐楚入棘櫟麻以報朱方之役五年冬楚子以諸侯及東夷伐吳以報棘櫟麻之役薳射以繁揚之師㑹於夏汭越大夫常夀過帥師㑹楚子於𤨏聞吳師出薳啓彊帥師從之遽不設備吳人敗諸鵲岸楚子以驛至於羅汭吳子使其弟蹶由犒師楚人執之楚師濟於羅汭沈尹赤㑹楚子次於萊山薳射帥繁揚之師先入南懐楚師從之及汝清吳不可入楚子遂觀兵於坻箕之山是行也吳早設備楚無功而還以蹶由歸楚子懼吳使沈尹射待命於巢薳啓彊待命於雩婁義見四年伐吳及僖三年徐取舒六年春王正月把伯益姑卒髙氏曰即襄二十九年所書把子是也至是復稱伯者豈其後復振歟把稱伯見桓二年滕子來朝義見隱三年宋公卒葬秦景公七月而葬僭天子之禮也秦入春秋至是始書葬見秦人遂同中國矣義見隱三年葬宋穆公此又見諸侯不當㑹葬而㑹葬也夏季孫宿如晉義見隠七年齊來聘葬把文公義見隠三年葬宋穆公宋華合比出奔衛左氏曰宋寺人柳有寵大子佐惡之華合比曰我殺之柳聞之乃坎用牲埋書而告公曰合比將納亡人之族既盟於北郭矣公使視之有焉遂逐華合比合比奔衛未詳信否義見僖二十八年元喧奔晉秋九月大雩左氏曰九月大雩旱也義見桓五年楚薳罷帥師伐吳罷公羊作頗義見四年伐吳及僖三年徐取舒髙氏曰三書伐吳者見楚終不得志於吳也冬叔弓如楚諸侯不朝聘天子而聘伯主至此則兼聘于楚見中國之益衰而楚人之益張也木訥趙氏曰諸侯兩事晉楚季孫宿如晉則不得不以叔弓如楚黄氏曰叔弓即宿私人兩事晉楚皆季孫專之此時公已無預乎魯政也齊侯伐北燕左氏曰伐北燕将納簡公未詳信否義見隱二年鄭伐衛七年春王正月暨齊平暨及也髙氏曰齊魯世為婚姻至襄公時齊靈數侵伐魯自是盟好中絶及景公一使慶封來聘魯方附楚而齊亦方與楚睦是以與之平齊欲平而我與之之辭也愚謂王道大行諸侯講信脩睦無所事平春秋之世諸侯乍離乍合聖人志其平者所以志諸侯之亂也至定十年復書及齊平則其乍離乍合之情亦可見矣大意與宋人及楚平鄭人來渝平及鄭平同三月公如楚左氏曰楚子成章華之臺願與諸侯落之大宰薳啓彊曰臣能得魯侯薳啓彊來召公辭曰昔先君成公命我先大夫嬰齊曰吾不㤀先君之好将使衡父照臨楚國鎮撫其社稷以輯寧爾民嬰齊受命於蜀奉承以來弗敢失隕而致諸宗祧曰我先君共王引領北望日月以冀傳序相授於今四王矣嘉惠未至唯襄公之辱臨我喪今君若歩玉趾辱見寡君寵靈楚國以信蜀之役致君之嘉惠是寡君既受貺矣何蜀之敢望君若不來使臣請問行期寡君将承質幣而見於蜀以請先君之貺三月公如楚義見襄二十八年叔孫婼如齊涖盟婼公羊作舍後同涖公羊榖梁作莅婼叔孫豹之庶子昭子也髙氏曰以暨齊平故婼徃涖盟也昭公自是遂以善齊故孫於揚州卒於齊為寄公義又見隱元年盟于蔑夏四月甲辰朔日有食之義見隠三年秋八月戊辰衛侯惡卒義見隱三年宋公卒九月公至自楚義見襄二十八年公至自楚冬十有一月癸未季孫宿卒貫道王氏曰宿代父為卿三十年而卒季氏自友受費而始封及行父而始大至宿而廣土取邑侔封君矣宿卒而意如繼之魯國不得寧矣愚謂此譏世卿也大意又見隠元年益師卒許氏曰季武子相魯作三軍舍中軍改革公室唯已所利取鄆瀆盟敗諸侯約幾䧟名卿以為國憂則知昭公乾侯之禍此其專欲不忌之習非一日也十有二月癸亥葬衛襄公義見隱三年葬宋穆公八年春陳侯之弟招殺陳世子偃師左氏曰陳哀公元妃鄭姬生悼大子偃師二妃生公子留下妃生公子勝二妃嬖留有寵屬諸司徒招與公子過哀公有廢疾公子招公子過殺悼大子偃師而立公子留髙氏曰此陳公子招其曰陳侯之弟招殺世子偃師者正其天倫所以甚招之辠且見陳侯寵其弟假之以權致此禍也孫氏曰以叔父之親不顧宗社之重殞其冡嗣致楚滅陳招之辠也康侯胡氏曰此公子招而以弟稱者著招憑寵稔惡而陳侯失親親之道也招以公子為司徒乃貴戚之卿親則介弟尊則叔父號令廢立自己而出莫敢干之者也不能援立嫡冡安靖國家而戕殺偃師以致大寇宗社覆没辠固大矣陳侯信愛其弟何以為失親親乎尊賢者親親之本不能擇親之賢者厚加尊寵以表儀公族而徇其私愛施於不令之人以至亡國敗家豈不失親親之道乎其曰陳侯之弟招殺陳世子偃師交責之也夏四月辛丑陳侯溺卒義見隠三年宋公卒叔弓如晉左氏曰晉侯方築虒祁之宫叔弓如晉賀虒祁也未詳信否義見隱七年齊來聘楚人執陳行人干徵師殺之陳公子留出奔鄭吕氏曰楚既殺干徴師公子留即出奔未成乎君也故不曰子左氏曰干徵師赴於楚且告有立君公子勝愬之於楚楚人執而殺之公子留奔鄭書曰楚人執陳行人干徴師殺之辠不在行人也劉氏曰楚人惡公子招而殺干徵師非其辠也古者兵交使在其閒可也莘老孫氏曰楚不能討公子招而殺其行人是冬楚滅陳而放公子招足明楚之倒施也義又見莊十年荆敗楚師髙氏曰干徵師為告喪之使不告於天王反赴於强楚雖楚人不當執而殺之然其死也宜哉留既為君矣不曰陳留者立非其正位未定也且偃師曰世子留曰公子别嫡庶也春秋明㣲大率如此秋蒐于紅蒐見桓二年狩于郎紅杜氏曰魯地沛國蕭縣西有紅亭逺疑劉氏曰蒐春事也秋興之非正也蒐有常地矣于紅亦非正也紅之蒐見其反天時矣易地理矣義又見桓四年公狩於郎孫氏曰惟不稱大之為正爾莘老孫氏曰春秋書蒐者五皆曰大蒐未嘗曰蒐者於是蒐于紅獨不言大春秋以其蒐田之不時故書以譏之也陳人殺其大夫公子過稱陳人見莊二十二年左氏曰陳公子招歸辠於公子過而殺之未詳信否義見莊二十七年曹殺大夫邦衡胡氏曰公子留已出奔則陳無君矣其言陳人殺其大夫衆殺之也生殺一人之柄而衆得專之此陳之所以滅也未詳是否大雩義見桓五年冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奐葬陳哀公奐公羊作瑗執陳公子招放之于越者先執而後放也黎氏曰葬哀公楚葬之也陳已滅矣楚據其國豈魯使臣徃㑹其葬而書蓋楚師入陳陳君在殯因取而葬之與齊侯葬紀伯姬同彼上無齊侯滅紀之文故下目齊侯此已書楚師滅陳則下云執公子招殺孔奐葬哀公皆蒙上文爾左氏曰楚公子棄疾帥師奉孫吳圍陳冬滅陳葉氏曰楚為偃師討而滅陳非討賊也滅國而已孫氏曰招殺世子之賊也楚執而放之陳孔奐無辠之人也楚則殺之吁楚靈暴虐無道滅人之國又為淫刑也如此愚謂流放者天子之權諸侯不得專之况以楚人放三恪之大夫亂之極矣若其葬哀公則又盗賊之仁也此與楚人入陳殺陳夏徵舒之意同皆楚人借討賊之名為盗賊之計也髙氏曰春秋之書滅者惡之甚也稱師者見其恃衆也楚恃其强而興師以滅中國之諸侯者實由骨肉相殘以致然耳嗟乎陳背中國而即楚人乃卒為楚人所滅深可為後世之戒然而陳國之亂中國不能正之遂使楚人藉口以為討而滅之如公子招死有餘辠夫楚乗人之亂滅人之國如此豈暇以禮義責之哉辠中國不自正而致楚人之恣耳春秋書殺他國大夫者四皆楚人殺之而中國未有書殺之者此皆蠻荆暴虐之甚張氏曰孔奐自宋之盟見於經執陳國之政久矣視君之亂從君於昏而無所正救蓋不能為有無者也雖有辠必不加於招矣錄楚之放招而殺奐見楚滅人之國而私意放殺其臣初不問辠之輕重愚謂陳侯未卒而骨肉相殘既卒而其國大亂使楚人假討賊之名以滅其國而其身以三恪之後卒見𦵏於楚人之手而其私謚曰哀亦出於楚春秋比書其事一以見陳哀不能脩身齊家以治其國致羣公子作亂以底滅亡二以見王政不行楚人暴横中國不能自存而壊潰至此可以為永鑒矣九年春叔弓㑹楚子于陳許氏曰楚既滅陳威振諸夏是以無所號召而魯之大夫徃㑹之髙氏曰夫中國諸侯而為夷狄所滅中國既不能救亦宜同心疾之奈何反徃聘問邪書㑹于陳與宣十五年㑹於宋意同許遷于夷此與邢遷於夷儀同皆自遷也存耕趙氏曰許逼於鄭嘗遷於葉矣今又遷於夷再世再遷其生聚之計亦末矣愚謂王綱不振諸侯吞噬不安厥居至於再遷雖許男不能治其國家然可以觀世變矣義又見成十五年夏四月陳災公榖作火趙氏曰案前後未有書外火者小事若一一書之固不勝紀諸侯亦不當告也惟宣榭火書之耳當依左氏為災也莘老孫氏曰春秋火不書災則書耳愚案宣榭火公榖亦作災康侯胡氏曰楚已滅陳必不遣使告於諸侯言亡國之有天災也何以書於魯國之策乎當時叔弓與楚子㑹於陳則目擊其事矣叔弓使畢而歸語陳災魯史遂書之耳莘老孫氏曰楚已滅陳復言陳災者蓋陳滅不久而國復災也前説近是愚謂陳見滅於楚人而天復災之所謂天降喪亂者也其君臣獲辠於天者多矣義又見莊二十年秋仲孫貜如齊貜俱縛切貜仲孫速之子孟僖子也義見隠七年齊来聘髙氏曰自叔老聘齊至今二十年復修舊好此暨齊平之故也冬築郎囿築郎囿者于郎築囿即其地而名之也左氏曰築郎囿季平子欲其速成也叔孫昭子曰詩曰經始勿亟庶民子來焉用速成其以勦民也無囿猶可無民其可乎髙氏曰文王之囿方七十里何可築也公内制於强臣不此之念而逺築郎囿非特勦民也芻蕘雉兎皆不得徃怨有所歸矣義又見成十八年築鹿囿葉氏曰古者諸侯一囿成公築鹿囿已過矣今又于郎以築焉其為民則俱已殆矣張氏曰以左傳觀之有以見季孫意如逢其君以耳目之娛而日竊其權昭公安之而不悟也人君於此可不戒哉春秋本義卷二十四
