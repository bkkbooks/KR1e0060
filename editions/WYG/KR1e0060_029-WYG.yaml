body:
  text: 春秋本義卷二十九元程端學撰哀公名蔣定公庶子定姒所生元年春王正月公即位義見文公即位楚子陳侯隨侯許男圍蔡杜氏曰定六年鄭滅許此復見者葢楚封之左氏曰楚子圍蔡報柏舉也里而栽廣丈髙倍夫屯書夜九日如子西之素蔡人男女以辨使疆於江汝之閒而還蔡於是乎請遷於吳未詳信否義見荘十年荆敗蔡師鼷鼠食郊牛改卜牛夏四月辛巳郊榖梁郊牛下有角字任氏曰不知僭禮之致災而改牛違時以從事亦已妄矣愚謂此亦與成七年事雖少異而義則同也髙氏曰定末年哀元年連書鼷鼠食牛之變則知魯之郊歳一行之秋齊侯衞侯伐晉石氏曰吳楚爭強内侮中國之政日以不逞晉雖不能主盟猶中國也齊衞二君既不同心盟主以禦外㓂又結盟固黨以自攻伐惡自見矣義又見隱二年鄭伐衞君舉陳氏曰春秋之初諸侯無王者齊鄭宋魯衞為之也春秋之季諸侯無伯者亦齊鄭宋魯衞為之也冬仲孫何忌帥師伐邾髙氏曰定之末年邾之事魯至矣去歳邾子來奔喪今踰年而遽伐之葢魯人謀邾久矣利取其田不知有禮義也義又見隱二年鄭伐衞貫道王氏曰邾自庶其後魯多納其叛臣邾知魯必欲兼之也盟焉朝焉㑹蒐奔喪凡可以求免者無不為也而魯終不置邾愚謂邾不能自強於徳而區區以求魯固無足道然王綱壊強陵弱大併小微國不支亦可悲也二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田漷大虢切又音郭左氏曰伐邾将伐絞邾人愛其土故賂以漷沂之田而受盟任氏曰三大夫同伐可謂暴矣師氏曰前此嘗伐邾取其田自漷水矣今又取其漷東之田猶為未足故又取沂西之田則其貪欲無厭必至於盡取而後己以區區之邾國而魯兩納其叛人邑三取其田時無王伯強陵弱之亂至於如此義又見隱四年莒伐杞取牟婁癸巳叔孫州仇仲孫何忌及邾子盟于句繹句古注切杜氏曰句繹邾地劉氏曰曷為三人伐而二人盟季孫臨之叔仲成之季孫之汰也葢自謂猶君矣邦衡胡氏曰季氏所以不盟豈非貪得無厭必欲滅邾而後己未詳孰是義又見隱元年盟于蔑康侯胡氏曰曷為列書三卿哀公得國不張公室三卿並将魯衆悉行伐國取地以盟其君而己不與焉適越之辱兆矣定公薨邾子來奔喪事魯恭矣而不免於見伐徒自辱焉不知以禮為國之故也邾在邦域之中不加矜恤而諸卿相繼伐之既取其田又強與之盟不知以義睦鄰之故也故詳書以著其辠石氏曰定哀之世吳楚爭強越又寖起中國諸侯見伐者數四也晉衞齊又數侵伐魯既叛晉又結怨於齊所與厚者邾滕杞而已魯公之立邾未嘗廢朝薨未嘗無㑹而前年仲孫何忌帥師伐邾今又三大夫取其田要之盟又四年而公又親入以其君來此邾人所以弗堪致吳之伐我齊取我田也内之惡見矣時政皆在三子不由公出夏四月丙子衞侯元卒義見隱三年宋公卒滕子來朝義見隱十一年滕薛來朝晉趙鞅帥師納衞世子蒯瞶于戚公羊曰戚者何衞之邑也左氏曰初衞侯遊於郊子南僕公曰余無子将立女不對他日又謂之對曰郢不足以辱社稷君其改圖君夫人在堂三揖在下君命祗辱夏衞靈公卒夫人曰命公子郢為大子君命也對曰郢異於他子且君没於吾手若有之郢必聞之且亡人之子輒在乃立輒六月乙酉晉趙鞅納衞大子于戚宵迷陽虎曰右河而南必至焉使大子絻八人衰絰偽自衞逆者告於門哭而入遂居之莘老孫氏曰聵輒爭立父子仇敵而孔子請先正名孔子之意可知矣使蒯聵事其親孝必不至於見逐靈公教其子以道亦不至於逐之書曰衞世子出奔宋見蒯聵得辠於父見逐出奔父没不喪求反其國以與子爭則蒯聵之辠也輒為人子而父逐於外不能號慕毁瘠以感動靈公而復之位靈公死夫人立之不辭以父亡未復而即位為君蒯聵在外且入以兵拒之又圍之焉則輒之辠也使靈公得父之道不至於逐聵使聵得事父之禮則聵不至於見逐使輒得子孫之義則能感動王父以復瞶之位或權立屏位以須父之入葢靈公蒯瞶不父而輒不子是以至於蒯聵出奔趙鞅納蒯而石曼姑圍戚書曰納衞世子則輒之拒之為不得其正顯矣愚謂又以大夫帥師而謀諸侯廢立之事見春秋之世父不父子不子君不君臣不臣至此極矣事又見定十四年君舉陳氏曰于戚納弗受也後十二年而蒯聵自戚入于衞衞侯輒來奔則是輒拒父也屬辭比事則輒萬世不可掩矣康侯胡氏曰父雖不父子不可以不子輒乃據國以與之爭可乎然靈公與衞國大臣不能早正國家之本以致禍亂其辠亦可見矣秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰于鐵鄭師敗績鐵公羊或作栗或作秩杜氏曰罕達子皮孫鐵在戚城南劉氏曰戰而言及之者主之者也猶曰趙鞅為志乎此戰也云爾愚謂並言帥師者譏大夫専兵也大夫専兵而至於戰黷武甚矣義又見隱二年鄭伐衞冬十月葬衞靈公杜氏曰七月而葬緩義又見隱三年葬宋穆公十有一月蔡遷于州來州來見昭十四年義見僖三十一年衞遷帝丘蔡殺其大夫公子駟義見荘二十六年曹殺大夫三年春齊國夏衞石曼姑帥師圍戚齊國夏序衞石曼姑上者衞請乎齊推齊主兵也且齊嘗為盟主自當序衞上無他義也黎氏曰凡書邑必繫國若經己見其繋某國而後邑復有事當書則但舉邑而已葢避繁文也前年已書納世子蒯聵于戚言納者見入衞境也云于戚者見戚為衞邑也故今但書圍戚而不云衞戚焉如先書紀季以酅入于齊後但書叔姬歸于酅不復繫之齊也冉有曰夫子為衞君乎子貢曰諾吾将問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不為也孫氏曰國夏助輒圍父逆亂人理莫甚於此故曰齊國夏衛石曼姑帥師圍戚事又見二年許氏曰觀乎蒯聵之亂則齊景之不伯可知矣衞以父子爭國而齊助子圍父以是令於諸侯君子是以知齊之将亂也劉氏曰為曼姑之義宜明言於其君曰子無討父之道臣不足以為三軍将也輒之義亦宜明言於其國曰臣無敵君之禮我不可以為千乗主也若是上讓下競而兵偃不用矣又何必紛紛哉故昔者子路問於仲尼曰衞君待子而為政子将奚先子曰必也正名乎所謂正名君君臣臣父父子子也君不君臣不臣父不父子不子此輒與曼姑之事也不其然歟夏四月甲午地震義見文九年五月辛卯桓宫僖宫災髙氏曰不言及者不嫌乎一處也若雉門兩觀則不可不書及矣左氏曰司鐸火火踰公宫桓僖災孔子在陳聞火曰其桓僖乎莘老孫氏曰桓公者哀公之十世祖也僖公者哀公之七世祖也諸侯五廟而十世之廟猶存葢非禮矣義又見成三年新宫災石氏曰武宫煬宫不當立而立桓宫僖宫當毁而不毁然皆出於强臣之私意爾季孫斯叔孫州仇帥師城啓陽啓公羊作開陸徳明曰避漢景諱也杜氏曰啓陽琅邪開陽縣許氏曰所城近敵故帥師焉地震廟災變異弗圖而取田城邑兵役相繼可謂不畏天命矣中失而外鋌本亡而末務此魯之季世也貫道王氏曰夏而城城而用大師惡可知矣義又見隱七年城中丘葉氏曰定公城中城矣又城莒父及宵城漆哀公城啓陽矣又城西郛城毗城邾城瑕葢荘宣書城者各一隱桓書城者四魯未有如是數也及定哀之閒而書城者九則定哀之守其國者可知矣宋樂髠帥師伐曹貫道王氏曰樂髠伐曹以曹受樂大心之叛也義見隱二年鄭伐衞許氏曰樂始闚曹曹不量力而奸強國不修徳而圖大功則適足以取亡而已秋七月丙子季孫斯卒譏世卿也大意又見隱元年益師卒蔡人放其大夫公孫獵于吳義見宣元年晉放胥甲父冬十月癸卯秦伯卒不名闕之也義見文十八年叔孫州仇仲孫何忌帥師圍邾許氏曰句繹之盟踰年而渝之師圍其國雖云邾政不修有以致寇魯之棄信亦已甚矣義又見僖十九年宋圍曹此則大夫帥師欲取邾以自肥則又甚焉四年春王二月庚戌盜殺蔡侯申二月公羊作三月殺公羊榖梁作弑愚謂不稱其君當作殺髙氏曰宣十七年蔡侯申卒此為曽孫豈有曽孫與曽祖同名者乎必有一誤王氏曰傳之謬也莘老孫氏曰春秋弑君未有曰盜者不知其來且何國人也其君見殺而不知殺者之名是以曰盜為人君而見殺於盜則其所以為君者可知也石氏曰一國之君行有軍從居有衞兵而為賊所殺蔡之無臣子甚矣蔡公孫辰出奔吳義見僖二十八年元咺奔晉葬秦惠公義見定九年葬秦哀公宋人執小邾子以諸侯執諸侯天下之亂可知矣不言以歸専辠宋也夏蔡殺其大夫公孫姓公孫霍公羊作公孫歸姓義見荘二十六年曹殺大夫晉人執戎蠻子赤歸于楚蠻公羊作曼戎蠻子見昭十六年邦衡胡氏曰名者以别於執中國之君也左氏曰夏楚人既克夷虎乃謀北方左司馬眅申公夀餘葉公諸梁致蔡於負函致方城之外於繒關曰吳将泝江入郢将奔命焉為一昔之期襲梁及霍單浮餘圍蠻氏蠻氏潰蠻子赤奔晉隂地司馬起豐析與狄戎以臨上雒左師軍於菟和右師軍於倉野使謂隂地之命大夫士蔑曰晉楚有盟好惡同之若将不廢寡君之願也不然将通於少習以聽命士蔑請諸趙孟趙孟曰晉國未寧安能惡於楚必速與之士蔑乃致九州之戎将裂田以與蠻子而城之且将為之卜蠻子聽卜遂執之與其五大夫以畀楚師于三户司馬致邑立宗焉以誘其遺民而盡俘以歸師氏曰以中國之伯主而歸荆楚之俘其不道甚矣髙氏曰諸侯有辠方伯請命於天子問辠然後執歸于京師正也諸侯有辠不請王命而執之歸于京師辠尚可容若晉人執衞侯歸之于京師是也諸侯執諸侯以畀諸侯其辠尤重若晉人入曹執曹伯畀宋人是也今晉為盟主而執戎蠻苟得其辠則獻之天子猶可也今不知其辠既専執之反歸於楚舎周事楚不足主中國之諸侯矣此晉之所以不足與而諸侯皆棄之也愚案左氏載此事甚悉然春秋不書楚伐戎蠻子而但書晉執戎蠻子歸于楚者書其甚者也夫楚爲不道吞齧小國不足責也然興滅繼絶王者之事當是時王綱盡矣晉能為之猶足主中夏今反執之以歸于楚則是伯主助暴亂為虐也春秋安得不書其甚者哉城西郛杜氏曰魯西郭義見隱七年城中丘六月辛丑亳社災亳公羊作蒲范氏曰亳即殷也殷都於亳高氏曰周自克商之後凡封建諸侯皆使之立亳社顔師古曰存其社者欲使人君常思敬慎懼危亡也董仲舒劉向亦云亡國之社所以示戒也左氏曰閒於兩社為公室輔社預謂二社者周社亳社災見不知戒程子曰湯既勝夏欲遷其社不可作夏社國既亡則社自當遷湯存之以為後戒故但屋之記曰喪國之社屋之不受天陽也又曰亳社北牖使隂明也然則魯有亳社屋之故有災此制計之必始於湯也秋八月甲寅滕子結卒義見隱三年宋公卒冬十有二月葬蔡昭公杜氏曰亂故是以緩義見隱三年葬宋穆公葬滕頃公義見隱三年葬宋穆公五年春城毗頻移切公羊作比陸氏釋文云本又作芘孫氏曰毗魯邑也義見隱七年城中丘師氏曰魯以千乗之國不能親仁善鄰鎮撫民庶既無威强之可畏又無徳禮之可懐乃區區屢奪民力以興土功故往年城莒父及霄又城啓陽又城毗六年又城邾瑕一叛於晉而畏攝自備之不暇又安能為國而無弊邪夏齊侯伐宋義見隱二年鄭伐衞晉趙鞅帥師伐衞助蒯瞶耳義見隱二年鄭伐衞秋九月癸酉齊侯杵臼卒杵公羊作處義見隱三年宋公卒冬叔還如齊高氏曰使卿弔且㑹葬非禮也閏月葬齊景公義見隱三年葬宋穆公六年春城邾瑕音遐公羊作葭劉氏曰邾瑕者何或曰邾之瑕也或曰内邑杜氏曰任城亢父縣有邾婁城張氏曰濟州任城縣地是也高氏曰魯未嘗取於邾而遽城之者見魯之迫邾也是年冬伐邾明年遂入邾則知邾益微弱魯以不義強城之也未詳是否義又見隱七年城中丘晉趙鞅帥師伐鮮虞義見隱二年鄭伐衞吳伐陳左氏曰元年吳之入楚也使召陳懐公懐公朝國人而問焉逢滑曰臣聞國之興也視民如傷其亡也以民為土芥吳日敝於兵暴骨如莽而未見徳焉禍之適吳其何日之有陳侯從之及夫差克越乃修先君之怨義見荘十年荆敗蔡師夏齊國夏及高張來奔左氏曰齊陳乞偽事高國者毎朝必驂乗焉所從必言諸大夫曰彼皆偃蹇将棄子之命皆曰高國得君必偪我盍去諸固将謀子子早圖之圖之莫如盡滅之需事之下也及朝則曰彼虎狼也見我在子之側殺我無日矣請就之位又謂諸大夫曰二子者禍矣将得君而欲謀二三子曰國之多難貴寵之由盡去之而後君定既成謀矣盍及其未作也先諸作而後悔亦無及也大夫從之夏六月戊辰陳乞鮑牧及諸大夫以甲入於公宫昭子聞之與惠子乗如公戰於荘敗國人追之國夏奔莒遂及高張來奔貫道王氏曰景公寄國於高國使其非義則當正諫以絶景公之私如以為是則主在與在主亡與亡可也及奔亡以免禍則託孤之寄有負於景公矣陳乞欲易君而去其大臣齊其為陳氏見於此矣義又見僖二十八年元咺奔晉君舉陳氏曰齊殺其大夫高厚齊崔杼弑其君光齊國夏及高張來奔齊陳乞弑其君荼聖人之垂戒深矣叔還㑹吳于柤荘加切柤見襄十年許氏曰叔還以吳在柤故往㑹之始結吳好也夫呉可以強盛服難以衰弱御以魯政之不修務與吳親以資其力君子志柤之㑹於此知魯之将有吳患矣義又見成十五年㑹吳于鍾離秋七月庚寅楚子軫卒義見文十八年秦伯卒齊陽生入于齊齊陳乞弑其君荼公羊作舎陸氏曰誤也左氏曰五年齊燕姬生子不成而死諸子鬻姒之子荼嬖諸大夫恐其為大子也言於公曰君之齒長矣未有大子若之何公曰二三子閒於憂虞則有疾疢亦姑謀樂何憂於無君公疾使國惠子高昭子立荼寘羣公子於萊秋齊景公卒冬十月公子嘉公子駒公子黔奔衞公子鉏公子陽生來奔六年陳僖子使召公子陽生陽生駕而見南郭且于曰嘗獻馬於季孫不入於上乗故又獻此請與子乗之出萊門而告之故闞止知之先待諸外公子曰事未可知反與壬也處戒之遂行逮夜至於齊國人知之僖子使子士之母養之與饋者皆入立之将盟鮑子醉而往其臣差車鮑㸃曰此誰之命也陳子曰受命於鮑子遂誣鮑子曰子之命也鮑子曰女忘君之為孺子牛而折其齒乎而背之也悼公稽首曰吾子奉義而行者也若我可不必亡一大夫若我不可不必亡一公子義則進否則退敢不唯子是從廢興無以亂則所願也鮑子曰誰非君之子乃受盟使胡姬以安孺子如賴去鬻姒殺王甲拘江說囚王豹於句竇之丘公使朱毛告於陳子曰微子則不及此然君異於器不可以二器二不匱君二多難敢布諸大夫僖子不對而泣曰君舉不信羣臣乎以齊國之困困又有憂少君不可以訪是以求長君庶亦能容羣臣乎不然夫孺子何辠毛復命公悔之毛曰君大訪於陳子而圖其小可也使毛遷孺子於駘不至殺諸野幕之下葬諸殳冒淳黄氏曰陽生雖長而荼少然荼己受景公之命為君矣陳乞乃召陽生立之而弑荼君舉陳氏曰衞侯入于夷儀衞甯喜弑其君剽則喜為衞侯弑也齊陽生入于齊齊陳乞弑其君荼則乞為陽生弑也義又見隱四年衞州吁事莘老孫氏曰陽生入齊而陳乞弑君則是陽生與聞乎弑也不以陽生首惡者陽生之入陳乞召之荼之弑陳乞為之加陽生以弑君之辠則陳乞之辠不明書陽生之入而陳乞弑君則陳乞之惡著而陽生與有辠也葉氏曰陽生景公長子也何以言入逆辭也景公欲廢陽生而立荼陳乞不能爭既偽許之而立荼矣景公死陳乞復詐國人立陽生而弑荼陽生雖得立而立之之道則逆弑荼者朱毛也曷以為陳乞主弑荼陳乞之所君也既召陽生則荼雖欲存而不可是以陳乞之辠不可以不正也愚案左氏載僖子不對而泣以下等語與經不合孫葉二說微信今以經考之本陳乞召陽生而弑其君荼耳陽生不免篡逆之辠而陳乞為弑君之賊然左氏叙前事頗詳而孫葉多所發明不得盡廢在讀者詳焉冬仲孫何忌帥師伐邾高氏曰魯人必欲滅邾而後已自公即位以來四書邾役積明年入邾之亂也義又見隱二年鄭伐衞宋向巢帥師伐曹高氏曰樂髠伐之猶未服且為入曹起也義見隱二年鄭伐衞七年春宋皇瑗帥師侵鄭瑗于眷切義見荘十年公侵宋許氏曰定十五年鄭伐宋始搆怨至是侵鄭九年取鄭師于雍丘十三年取宋師于嵒晉魏曼多帥師侵衞左氏曰晉師侵衞衞不服也高氏曰衞侯棄其父今六年矣猶未納也晉不以此致討而侵衞義又見荘十年公侵宋夏公㑹吳于鄫張氏曰鄫即舊鄫國左氏曰公㑹吳于鄫吳來徴百牢子服景伯對曰先王未之有也吳人曰宋百牢我魯不可以後宋且魯牢晉大夫過十吳王百牢不亦可乎景伯曰晉范鞅貪而棄禮以大國懼敝邑故敝邑十一牢之君若以禮命於諸侯則有數矣若亦棄禮則有淫者矣周之王也制禮上物不過十二以為天之大數也今棄周禮而曰必百牢亦唯執事吳人弗聽景伯曰吳将亡矣棄天而背本不與必棄疾於我乃與之大宰嚭召季康子康子使子貢辭大宰嚭曰國君道長而大夫不出門此何禮也對曰豈以為禮畏大國也大國不以禮命於諸侯苟不以禮豈可量也寡君既共命焉其老豈敢棄其國大伯端委以治周禮仲雍嗣之斷髮文身臝以為飾豈禮也哉有由然也反自鄫以吳為無能為也義見成十五年㑹吳于鍾離張氏曰比年書㑹吳所以著哀公之失謀而始遺患於後日也邦衡胡氏曰前書叔還㑹呉惡大臣不能衞社稷而邇呉人也此書公㑹吳惡國君不能守社稷而狎呉人也秋公伐邾八月己酉入邾以邾子益來程子曰不曰歸者以我而言内外異辭文體然也左氏曰季康子欲伐邾乃饗大夫以謀之子服景伯曰小所以事大信也大所以保小仁也背大國不信伐小國不仁民保於城城保於徳失二徳者危将焉保孟孫曰二三子以我為何如惡賢而逆之對曰禹合諸侯於塗山執玉帛者萬國今其存者無數十焉唯大不字小小不事大也知必危何故不言魯徳如邾而以衆加之可乎不樂而出秋伐邾及范門猶聞鐘聲大夫諫不聽茅成子請告於吳不許曰魯擊柝聞於邾吳二千里不三月不至何及於我且國内豈不足成子以茅叛師遂入邾處其公宫衆師晝掠邾衆保於繹師宵掠以邾子益來獻于亳社囚諸負瑕康侯胡氏曰恃強凌弱無故伐人而入其國以其君來此天下之大惡也吳師為是伐我齊人為是取魯二邑辱國亦甚矣義又見隱二年莒入向及荘十年以蔡侯歸宋人圍曹義見僖十九年宋圍曹冬鄭駟𢎞帥師救曹左氏曰宋人圍曹鄭桓子思曰宋人有曹鄭之患也不可以不救冬鄭師救曹侵宋木訥趙氏曰鄭於曹無隻介之好今據救之報宋之役也亦非為義也春秋本義卷二十九
