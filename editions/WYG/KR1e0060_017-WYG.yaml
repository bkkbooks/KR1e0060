body:
  text: 春秋本義卷十七元程端學撰宣公十年春公如齊不書月日闕文也貫道王氏曰比年朝正事齊如事君使移此事周君子猶為過六年一朝之制也曽謂朝正於齊可為禮乎義又見僖十年公至自齊義見桓二年公至自唐齊人歸我濟西田歸我歸魯也内辭耳不言來者既曰歸我而復曰來則其文複矣故但言歸我而不言來皆無他義濟西田即元年賂齊者左氏曰公如齊齊侯以我服故歸濟西之田獻可杜氏曰天子所封之地而諸侯取之歸之皆專恣也康侯胡氏曰宣公於齊順其所欲既以女妻其臣又以兵㑹伐萊又每歲往朝于齊廷雖諸侯事天子無是禮也故惠公恱其順事已而以所取濟西田歸之也以柔弱卑屈事人不以其道而得地與恱人之柔巽卑屈事已不以其道而歸其地皆人欲之私而非義矣夏四月丙辰日有食之義見隱三年己巳齊侯元卒書此為崔氏出奔及公如齊歸父𦵏惠公起文也義又見隱三年宋公卒齊崔氏出奔衛公羊曰崔氏者何齊大夫也其稱崔氏何譏世卿也義又見隱三年尹氏卒及僖二十八年元咺奔晉木訥趙氏曰惠公卒而崔氏奔則崔氏寵於惠而不容於國人矣孫氏曰言氏者起其世也東遷之後天子諸侯之大夫皆世書尹氏卒譏天子大夫書崔氏奔譏諸侯大夫公如齊左氏曰公如齊奔喪髙氏曰齊侯卒而奔其喪是以事天子之禮事齊也五月公至自齊義見桓二年公至自唐癸巳陳夏徵舒弑其君平國髙氏曰徴舒者夏姬之子也左氏曰陳靈公與孔寧儀行父飲酒於夏氏公謂行父曰徴舒似女對曰亦似君徴舒病之公出自其廄射而殺之二子奔楚康侯胡氏曰禍莫大於拒諫而殺直臣洩冶不憚盡言正謂靈公君臣淫縱恐其及禍不忍坐觀靈公不能納又從而殺之卒以見弑而亡其國此萬世之大戒也胡氏曰書夏徴舒弑其君者明君雖不君臣不可以不臣也義又見隱四年衛州吁事張氏曰考之國語前年單子如楚過陳時洩冶未死也單子歸而告王以陳侯帥其卿佐南冠以淫於夏氏陳侯不有大咎國必亡已見於三年之前矣能無及乎觀春秋之所書弑君如陳平國齊光蔡固以千乗之主而自儕於閭巷小人所不為者心術之惑可不戒哉六月宋師伐滕前年伐滕之喪今又伐之強陵弱衆暴寡也無王甚矣義又見桓二年鄭伐衛木訥趙氏曰滕之小安能事二國事魯則宋伐之事宋則魯伐之宋成才免晉楚之虐曷不以己處晉楚之心為心乎康侯胡氏曰稱師用衆也鄰有弑逆不能聲辠致討乃用大衆以伐當恤之小邦公孫歸父如齊𦵏齊惠公歸父襄仲之子子家歸父也張氏曰春秋書此深著亂臣賊子不復明送終之正禮故缺於天子而厚於強國豈非九伐之威不行專征之討不加以至此與存耕趙氏曰三月而𦵏速也義又見隱三年𦵏宋穆公邦衡胡氏曰先書公如齊見公不奔天王之喪而奔齊之喪此書歸父如齊𦵏齊惠公見公不㑹天王之𦵏而㑹齊之𦵏無王甚矣晉人宋人衛人曹人伐鄭左氏曰鄭及楚平諸侯之師伐鄭取成而還存耕趙氏曰前此楚伐鄭晉救之使晉能庇鄭鄭何至與楚平哉兵不足以制楚徳不足以服鄭彼此交戰鄭何辠焉晉於是不可以伯矣義又見隱二年鄭伐衛髙氏曰陳有弑君之亂曽不是圖而有事於鄭秋天王使王季子來聘葉氏曰王季子王之季子也髙氏曰天王不推至公選賢與能而使幼稚之子居大夫之任以交政於諸侯是示天下以私也貫道王氏曰周於魯有君臣之分魯宣篡立當討朝齊者五聘齊者六於周則使蔑聘之周公之制三不朝則六師移之既不能行九伐之法乃汲汲焉有季子之報是周以列國自處惟恐有失名分既夷矣公孫歸父帥師伐邾取繹音亦公羊作蘱杜氏曰繹邾邑魯國鄒縣北有繹山夾漈鄭氏曰繹山多矣邾文公遷于繹是邾都也非此繹也黄氏曰歸父蓋自廣其邑也未詳是否義見隱四年莒伐杞取牟婁康侯胡氏曰用貴卿主將舉大衆出征伐不施於亂臣賊子奉天討辠而陵弱侵小近在邦域之中附庸之國是為盜也當此之時陳有弑君之亂曽不是圖有事於邾不亦傎乎大水義見桓元年季孫行父如齊冬公孫歸父如齊左氏曰季文子初聘于齊冬子家如齊伐邾故也未詳信否康侯胡氏曰齊侯嗣立宣公親往奔其父喪又使貴卿㑹𦵏矣修聘未晩也而季孫亟行歸父繼往則以宣公君臣不知為國以禮而謂妄說取人之可以免討也義又見隱七年齊來聘黄氏曰不特宣公若行父歸父之往亦自結於齊耳齊侯使國佐來聘左氏曰國武子來報聘東萊吕氏曰頃公未踰年而不稱子邦衡胡氏曰當凶釁而行吉禮忘哀思而結昏好義又見隱七年齊來聘饑葉氏曰饑者何食不足也一榖不登曰嗛二榖不登曰饑三榖不登曰饉四榖不登曰康五榖不登曰大饑古者三年耕必有一年之畜故凶年可以補敗是為敎民之道二榖不登而饑其為民者病矣何以於冬焉書五榖畢登之時也公羊曰以重書也劉氏曰曷為或言饑或言大饑凶年補敗不足曰饑死傷流亡曰大饑張氏曰王政以食為重故積貯天下之大命也前此百有餘年水旱螟螽之災多矣不以饑書今大水之後書饑者著宣公煩於外事國用無節上下用竭故一遇水旱遂致乏食耳荀卿論本末源流賈誼論蓄積皆明於為民而知春秋書饑之意者也愚案春秋凡書饑者四大饑者一莊二十八年大無麥禾臧孫辰告糴于齊亦一饑也楚子伐鄭義見莊十年荆敗蔡師木訥趙氏曰鄭一身餌楚五受楚兵從楚者六歸晉者五乍晉乍楚不幸而處晉楚之閒不能自立也東萊吕氏曰自宣四年以後晉楚爭欲服鄭鄭遂南北屬此可見晉鄭兩國盛衰鄭用子良之言兩屬晉楚子良曰與其來者可也鄭始終謀策只出於此子産所謂玉帛以待於二境惟其強者從之與此一般十有一年春王正月夏楚子陳侯鄭伯盟于辰陵辰穀梁作夷楚子序於陳鄭之上者陳鄭屈服楚子主盟也杜氏曰辰陵陳地潁川長平縣東南有辰亭張氏曰即淮寧府西華縣左氏曰楚子伐鄭及櫟子良曰晉楚不務徳而兵爭與其來者可也晉楚無信我焉得有信乃從楚夏楚盟于辰陵陳鄭服也存耕趙氏曰楚洊伐鄭鄭之從楚猶可言也師不至陳陳亦受盟先聲震也楚自是遂伯矣有辰陵之盟而有邲之戰有邲之戰而後有蜀之㑹盟是變端之大者矣春秋所謹也髙氏曰所以閔中國之衰也義又見莊十年荆敗蔡師公孫歸父㑹齊人伐莒髙氏曰自四年公及齊侯平莒莒人不肯公伐莒取向至是齊魯同討之夫辰陵之盟中國所冝震也而齊方務窮兵於莒黄氏曰此又見歸父之横而附齊之固也義又見隱二年鄭伐衛秋晉侯㑹狄于櫕函櫕才端切函音涵㑹者往㑹之也杜氏曰櫕函狄地左氏曰晉郤成子求成於衆狄衆狄疾赤狄之役遂服於晉秋㑹于櫕函衆狄服也是行也諸大夫欲召狄郤成子曰吾聞之非徳莫如勤非勤何以求人能勤有繼其從之也木訥趙氏曰楚子盟陳鄭于辰陵而晉侯㑹狄于櫕函内失陳鄭而外求狄得狄何益於晉國哉義又見隱二年公㑹戎于潛康侯胡氏曰春秋正法親内而逖外以逺亂也今中國有亂天王不能討則方伯之責也又不能討則四鄰諸侯冝有請矣而魯方㑹齊伐莒晉方求成于狄不亦傎乎直書其事而義自見也冬十月楚人殺陳夏徴舒丁亥楚子入陳納公孫寧儀行父于陳寧公羊作寗先書楚人而後書楚子者楚子先使兵殺徴舒而後楚子入陳紀實事也書丁亥之日可見也左氏曰楚子為陳夏氏亂故伐陳謂陳人無動將討於少西氏遂入陳殺夏徴舒轘諸栗門因縣陳陳侯在晉申叔時使於齊反復命而退王使讓之曰夏徴舒為不道弑其君寡人以諸侯討而戮之諸侯縣公皆慶寡人女獨不慶寡人何故對曰猶可辭乎王曰可哉曰夏徴舒弑其君其辠大矣討而戮之君之義也抑人亦有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有辠矣而奪之牛罰已重矣諸侯之從也曰討有辠也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎王曰善哉吾未之聞也反之可乎對曰可哉吾儕小人所謂取諸其懐而與之也乃復封陳鄉取一人焉以歸謂之夏州愚案此傳與經少不合未詳信否康侯胡氏曰公孫寧儀行父此二臣者從君於昏宣淫於朝誅殺諫臣使其君見弑蓋致亂之臣肆諸市朝與衆同棄然後快於人心今乃詭詞奔楚託於討賊復讐以自脫其辠楚莊不能察其反覆又使陳人用之猶人有飲毒而死者幸而復生又強以毒飲之可乎愚謂陳有弑君之賊天子諸侯與陳之臣子不能討而楚莊討之據跡而觀人情所許也然視其所以者當觀其所由楚莊之殺徴舒似義而其心之所由來者非義經書楚殺徴舒於前書入陳納寧儀行父於後蓋不待察其微而其心之所由來者顯矣說者謂楚得竊義舉以逞志可謂善誅心矣夫中國不自正而楚人假之以逞志君子能不傷乎黄氏曰諸家多以討賊譽楚案楚子初謂陳人無動將討於少西氏已乃入陳是以盜賊之行紿而取之也徴舒弑陳靈者也公孫寧儀行父與陳靈昏淫致陳靈之弑者也以法則徴舒之辠重以情則公孫寧儀行父之辠重今殺徴舒而納公孫寧儀行父討賊如是乎善乎張氏之言曰孔寧儀行父必因奔楚誘楚子以利故楚子殺徴舒而入陳愚因張氏之說而推之則楚子受孔寧儀行父之奔故殺徴舒為二子報私忿欲因而利之耳諸家與楚討賊過矣十有二年春𦵏陳靈公黄氏曰靈公昏淫見弑今二十有二月而𦵏蓋其同為淫亂之臣孔寧儀行父方歸自楚而𦵏之前此國人不𦵏也愚謂諸侯五月而𦵏陳靈淫亂不得其死三年始克𦵏又得惡諡焉春秋直書其事為後世大戒也義又見隱三年𦵏宋穆公楚子圍鄭義見莊十年荆敗蔡師髙氏曰陳鄭之始即楚人是乃召楚人以自伐國也夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績邲扶必切音弼杜氏曰邲鄭地地譜鄭州城下管城縣有邲城在縣南左氏曰晉師救鄭愚謂晉之救鄭意則善矣使晉景上告天子下帥列國親伐楚以救鄭雖敗於楚未失義也今書荀林父帥師及楚子戰則是林父主乎此戰也以大夫專兵主戰而敗其軍於蠻夷中外之勢自此倒置則晉景之任林父林父之專兵輕敵其辠大矣彼楚人之横何足責哉義又見莊十年荆敗蔡師張氏曰晉不能討陳亂已失三綱軍政之本乃欲恃力以爭鄭則知晉之所以敗秋七月冬十有二月戊寅楚子滅蕭蕭見莊二十三年義見莊十年荆敗蔡師晉人宋人衛人曹人同盟于清丘同盟見莊十六年杜氏曰清丘衛地在濮陽縣東南張氏曰地譜濮州臨濮縣東南有清丘程子曰晉為楚敗諸侯懼而同盟既而皆渝愚謂諸侯同盟已得辠於天子況大夫同盟僭孰甚焉大夫同盟自此始且盟不旋踵宋伐陳而衛救之楚伐宋而三國不恤則僭禮之盟無益也尚矣義又見隱元年盟于蔑康侯胡氏曰楚既入陳圍鄭敗晉滅蕭憑陵中國甚矣為諸侯計者冝信任仁賢修明政事自強於為善則可以保其國耳曽不是圖而刑牲歃血要質鬼神蘄以禦楚謀之不臧孰大於是宋師伐陳衛人救陳左氏曰宋為盟故伐陳衛人救之孔達曰先君有約言焉若大國討我則死之未詳信否康侯胡氏曰陳有弑君之亂宋不能討而楚討之宋人不能内自省德遽以大衆伐之非義舉矣若衛叛盟則惡自見義又見隱二年鄭伐衛十有三年春齊師伐莒莒公羊作衛左氏曰莒恃晉而不事齊故也未詳信否義見隱二年鄭伐衞夏楚子伐宋黄氏曰陳叛中國而從楚清丘之盟陳不至而宋伐之故楚子伐宋蓋為陳伐之也義見莊十年荆敗蔡師貫道王氏曰前此楚侵之今又伐之繼又圍之晉不一動心焉宋雖為晉而晉則莫宋庇也則終於為平而已愚案清丘之盟不足恃也如此秋螽公羊作􅏑義見桓五年冬晉殺其大夫先縠義見莊二十六年曹殺大夫十有四年春衞殺其大夫孔達義見莊二十六年曹殺大夫夏五月曹伯壽卒義見隱三年宋公卒晉侯伐鄭左氏曰夏晉侯伐鄭為邲故也告於諸侯蒐焉而還中行桓子之謀也曰示之以整使謀而來康侯胡氏曰比事而觀知其為報怨復讐之兵直書其事而義自見矣義又見隱二年鄭伐衛邦衡胡氏曰鄭之從楚畏楚而叛晉也晉景不能攘楚而區區伐鄭是中國自相殘賊而楚人愈得志矣張氏曰屈而知伸敗而能改可以興矣晉所以敗由大義不明而爭與國也今敗未兩歳而復興爭鄭之師秋九月楚子圍宋左氏曰楚子使申舟聘於齊曰無假道于宋亦使公子馮聘于晉不假道于鄭申舟以孟諸之役惡宋曰鄭昭宋聾晉使不害我則必死王曰殺女我伐之見犀而行及宋宋人止之華元曰過我而不假道鄙我也鄙我亡也殺其使者必伐我伐我亦亡也亡一也乃殺之楚子聞之投袂而起屨及於窒皇劒及於寢門之外車及於蒲胥之市秋九月楚子圍宋木訥趙氏曰伐宋而宋不屈繼之以圍其必宋之服也審矣楚將横行中夏許蔡已從陳鄭已服則次及於宋宋中國之門户也得宋則齊魯以之所以必服宋歴三時而圍不解卒得宋平而後已義見莊十年荆敗蔡師康侯胡氏曰宋人要結盟誓欲以禦楚已非持國之道輕舉大衆以伐陳見伐之由也國必自伐然後人伐之凡事其作始也簡其將畢也必巨易於訟曰君子以作事謀始始而不謀必至於訟訟而不竟必至於師若宋是矣若楚人之圍宋則亦明矣𦵏曹文公義見隱三年𦵏宋穆公冬公孫歸父㑹齊侯于榖義見莊十四年單伯㑹諸侯于鄄夾漈鄭氏曰公子遂雖卒而魯國之政猶在其子故歸父今年㑹齊侯明年㑹楚子十有五年春公孫歸父㑹楚子于宋左氏曰孟獻子言於公曰臣聞小國之免於大國也聘而獻物於是有庭實旅百朝而獻功於是有容貌采章嘉淑而有加貨謀其不免也誅而薦賄則無及也今楚在宋君其圖之公說康侯胡氏曰楚圍宋陵蔑中華甚矣諸侯縱不能畏簡書攘外㓂存先代之後嚴兵固圉以為聲援猶云可也乃以周公之裔千乗之國謀其不免不亦鄙乎比事以觀則知當時列國盛衰之由春秋經世之略矣愚案此與僖二十七年楚及諸侯圍宋公㑹盟于宋同夏五月宋人及楚人平二國稱人者各以大夫為平而君不相見也左氏曰宋人使樂嬰齊告急於晉晉侯欲救之伯宗曰不可古人有言曰雖鞭之長不及馬腹天方授楚未可與爭雖晉之強能違天乎諺曰髙下在心川澤納汙山藪藏疾瑾瑜匿瑕國君含垢天之道也君其待之乃止使解揚如宋使無䧏楚曰晉師悉起將至矣鄭人囚而獻諸楚楚子厚賂之使反其言不許三而許之登諸樓車使呼宋人而告之遂致其君命楚子將殺之使與之言曰爾既許不榖而反之何故非我無信女則棄之速即爾刑對曰臣聞之君能制命為義臣能承命為信信載義而行之為利謀不失利以衛社稷民之主也義無二信信無二命君之賂臣不知命也受命以出有死無霣又可賂乎臣之許君以成命也死而成命臣之禄也寡君有信臣下臣獲考死又何求楚子舎之以歸夏五月楚師將去宋申犀稽首於王之馬前曰無畏知死而不敢廢王命王棄言焉王不能答申叔時僕曰築室反耕者宋必聽命從之宋人懼使華元夜入楚師登子反之牀起之曰寡君使元以病告曰敝邑易子而食析骸以爨雖然城下之盟有以國斃不能從也去我三十里唯命是聽子反懼與之盟而告王退三十里宋及楚平華元為質盟曰我無爾詐爾無我虞愚謂宋先代之後國雖小中夏之望也諸侯之門户也楚圍三時諸侯莫敢救者宋勢殫力竭而與之平則楚人横而中夏衰也甚矣案楚頓兵三時財耗民罷使晉救之宋攻其内晉擊其外一舉而伯業定矣師不敢出則晉之不振而有蜀之盟也惜哉六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸稱師用大衆也杜氏曰潞赤狄之别種潞氏國故稱氏子爵也葉氏曰赤狄狄之總名也其别為潞氏及甲氏留吁見於經者自三種各以其别言之故皆冠以赤狄張氏曰潞氏即潞州潞城縣左氏曰潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目晉侯將伐之諸大夫皆曰不可酆舒有三雋才不如待後之人伯宗曰必伐之狄有五辠焉雋才雖多何補焉不祀一也耆酒二也棄仲章而奪黎氏地三也虐我伯姬四也傷其君目五也怙其雋才而不以茂徳滋益辠也後之人或者將敬奉徳義以事神人而申固其命若之何待之不討有辠曰將待後後有辭而討焉毋乃不可乎夫恃才與衆亡之道也商紂由之故滅天反時為災地反物為妖民反徳為亂亂則妖災生故文反正為乏盡在狄矣晉侯從之六月癸卯晉荀林父敗赤狄於曲梁辛亥滅潞酆舒奔衞衞人歸諸晉晉人殺之未詳信否孫氏曰豐舒弑逆晉人討正之可也滅則甚矣莘老孫氏曰潞氏之辠在可滅而晉專滅之猶無王也潞氏之辠在不可滅而晉滅之則晉亦狄也愚謂況虜其君以歸乎啖氏曰凡滅國直書滅辠滅者不責見滅者也言其力屈而亡且能死社稷也若自致滅亡之道則異其文梁亡是也凡書滅又書其君奔者則兩辠之責其不死社稷也凡書滅又書以歸者責其不死位又無興復之志也貫道王氏曰楚燄莫撲諉之天授狄無晉虞而兼其土是養一指而失肩背也秦人伐晉此亦報復之師也義又見隱七年戎伐凡伯案僖三十三年殽之戰迄今三十餘年晉秦凡十一戰其始也二國背義以徼利僥倖以求功其終也惟報復是務忘其自責之心上干王法下毒生民財窮力耗然後已易曰作事謀始不其然乎王札子殺召伯毛伯札則八切杜氏曰王札子王子札也蓋經文倒札字木訥趙氏曰王氏札子字也食采於王城而因以為氏者也前說近是毛伯見文元年召伯見文五年孫氏曰生殺之柄天子所持非天子不專殺王札子人臣也殺召伯毛伯於朝定王不能禁專孰甚焉邦衡胡氏曰天子在上而子弟敢以私怨專殺則生殺之柄下移於姦臣矣許氏曰拓跋魏世髙歡覩張彞之變而生亂心梁武在位王侯專殺政法不施遂以亂亡無惑乎周之無以令天下也秋螽義見桓五年康侯胡氏曰人事感於此則物變應於彼宣公為國虛内以事外去實而務華煩於朝㑹聘問賂遺之末而不知務本者也故戾氣應之六年螽七年旱十年大水十有三年又螽十有五年復螽府庫匱倉廩竭調度不給而言利剋民之事起矣許氏曰稅畝之法蓋積貪虐之習而後能至者也觀乎災異則見政事觀乎政事以知災異是謂念用庶徵仲孫蔑㑹齊髙固于無婁張氏曰無公羊作牟恐當從之聲之誤也杜氏曰無婁杞邑義見文十一年㑹于承筐初稅畝杜氏曰公田之法十取其一今又履其餘畝復十收其一故哀公曰二吾猶不足遂以為常故曰初公羊曰初者何始也稅畝者何履畝而稅也譏始履畝而稅古者什一而藉什一者天下之中正也多乎什一大桀小桀寡乎什一大貉小貉陸氏曰賦稅者國之所治亂民國之本也取之甚則流亡國必危矣左氏曰初稅畝非禮也榖出不過藉以豐財也葉氏曰魯國有藉矣而又稅焉藉者取井田之名所謂八家為井借其力以治公田者也稅者取國中使人所治田之名所謂什一使自賦者也藉取九一稅取什一蓋既藉矣而取國中之稅而畝加之其為法自是始非謂以稅易畝也冬蝝生蝝悅全切字林尹絹切蝝董子曰蝗子杜氏曰螽子蓋蝗即螽也康侯胡氏曰始生曰蝝既大曰螽秋螽未息冬又生子災重及民也詳志之者急民事謹天災仁人之心王者之務也遇天災而不懼忽民事而不修又為繁政重賦以感之國之危無日矣義又見桓五年螽饑公羊無此經義見十年康侯胡氏曰春秋書饑者三而宣公獨有其二是歳雖螽蝝而遽至於饑者宣公為國務華去實虛内事外煩於朝㑹聘問賂遺之末府庫竭矣倉廩匱矣水旱螽蝝天降饑饉亦無以振業貪乏矣經兩書饑以示後世為國之不可不敦本也張氏曰宣兩書饑一在大水之後一在螽蝝之後甚言國無蓄積而民無以生也十有六年春晉人滅赤狄甲氏及留吁杜氏曰甲氏留吁赤狄别種晉既滅潞氏今又并盡其餘黨髙氏曰稱及者所以别言二族也惡其窮兵荒服無復顧中國之念也義又見十五年滅潞氏康侯胡氏曰春秋於外域攘斥之不使侵上國則止矣伯禽征徐夷東郊既開而止宣王伐玁狁至於太原而止武侯征戎瀘服其渠帥而止必欲盡殄滅之無遺種豈仁人之心王者之事乎貫道王氏曰楚禍逼人中國無安處晉乃貪拓地於狄以自肥規模如此其何能伯夏成周宣榭災榭音謝公羊作謝災左氏作火案經未有書火者當依公穀劉氏曰成周周之東都東萊吕氏曰洛陽周公營下都以遷殷頑民是為成周洛誥所謂我又卜澗水東亦惟洛食者也爾雅曰無室曰榭杜氏曰宣榭講武屋别在洛陽者張氏曰宣王南征北伐講武於此詩所謂復㑹諸侯於東都者也康侯胡氏曰王室不復中興矣天所以見戒乎或曰宣榭宣王之廟也啖氏曰宣王之廟久已毁縱不毁止當在王城不當在成周也然則宣榭不過宣王講武之屋耳非廟也秋郯伯姬來歸郯音談伯姬文公女宣公姊妹也左氏曰郯伯姬來歸出也榖梁曰婦人之義嫁曰歸反曰來歸髙氏曰不能事乎舅姑之國而為夫所黜此辠伯姬者乃所以辠其父母失敎也君子之道造端乎夫婦是以春秋於内女夫人皆詳志之康侯胡氏曰詩記男女之際易敘咸恒為下經首春秋内女出夫人歸詳書於策所以使有國者謹於齊家之道正人倫之本也案内女出者二此與成五年杞叔姬是也冬大有年榖梁曰五榖大熟為大有年義見桓三年有年十有七年春王正月庚子許男錫我卒丁未蔡侯申卒義並見隱三年宋公卒夏𦵏許昭公𦵏蔡文公義並見隱三年𦵏宋穆公六月癸卯日有食之義見隱三年貫道王氏曰自宣公八年至此十嵗之閒日食者三豈可諉之常數哉用見中外君臣強弱之分隂陽消長之故矣己未公㑹晉侯衛侯曹伯邾子同盟于斷道斷直管切一音短杜氏曰斷道晉地義見莊十六年黄氏曰時宋為楚得中國危甚幸而衛復反為中國晉恐曹衛復背而南嚮故為是盟以固魯衛曹邾之心秋公至自㑹義見桓二年公至自唐冬十有一月壬午公弟叔肸卒叔肸字也稱弟未為大夫而用事者也此記叔氏之始也肸文公子惠伯也肸之子公孫嬰齊嬰齊之子叔老老之子叔弓弓之子叔輒叔鞅輒之子叔詣叔弓之曽孫叔還皆世卿此亦譏世卿而肸其始也亦書公子牙公子季友卒之意也十有八年春晉侯衛世子臧伐齊左氏曰十七年春晉侯使郤克徴㑹于齊齊頃公帷婦人使觀之郤子登婦人笑於房獻子怒出而誓曰所不此報無能涉河獻子先歸使欒京廬待命於齊曰不得齊事無復命矣郤子至請伐齊十八年春晉侯衞太子臧伐齊至於陽穀齊侯㑹晉侯盟于繒以公子疆為質於晉師還未詳信否邦衡胡氏曰以世子而專伐則見衛侯之失威義見隱二年鄭伐衛康侯胡氏曰保國以禮為本者也齊頃公不謹於禮自已致宼所謂國必自伐而後人伐之矣諸侯上卿皆執國命取必於君以行其克伐怨欲之私故大戰於鞌逞其志而後止春秋詳書於策見受伐與伐者之辠公伐杞義見隱二年鄭伐衛木訥趙氏曰杞世婚於魯杞桓公魯出而且娶魯僖文之世各一來朝宣公殺惡及視以自立把伯未嘗來朝宣公憾之故躬伐之歟未詳是否夏四月秋七月邾人戕鄫子于鄫戕在良切鄫穀梁作繒戕搶也他國人來弑君之名左氏曰自外曰戕孫氏曰僖十九年邾人執鄫子用之天子不能誅故此肆然復戕鄫子于鄫也髙氏曰邾人肆無道之強戕同等之君辠惡大矣鄫子為國君而見戕於人必有以致之也楊氏曰于鄫惡臣子不能拒難康侯胡氏曰塞外無城郭宫室百官有司單車使者直造其廬帳虜其君長者則有之矣中國則重門擊柝廉陛等威侍衛守禦之嚴奚至坐使其君為邾人殘賊殺之而莫禦乎邾人蓋嘗執鄫子用之則不共戴天之世讎也既不能復又使邾人得造其國都戕殺其君深責臣子至此極也木訥趙氏曰鄫未嘗有一日之隙於邾徒以邾鄫為鄰邾欲滅之以自廣爾以邾之小而肆毒于鄫曽無一人詆訶之信乎其為春秋之世也愚謂王法不明其禍至此聖人之所以拳拳於斯世也甲戌楚子旅卒旅穀梁作吕左氏曰楚莊王卒劉氏曰楚至莊王國益大俗益變始以赴告與中國通是以其卒見於春秋愚謂春秋至此不特蠻夷横而已諸姬且日衰矣義又見文十八年秦伯卒公孫歸父如晉左氏曰公孫歸父以襄仲之立公也有寵欲去三桓以張公室與公謀而聘於晉欲以晉人去之康侯胡氏曰宣公因齊得國故刻意事之雖易世未怠也及頃公不能謹禮怒晉魯上卿而郤克當國決策討之晉方強盛齊少懦矣於是背齊而事晉其於邦交以利為向背無忠信誠慤之心者也況欲以晉人去三桓夫輕於背與國易於謀大家而不知其本未有能成而無悔也義又見隱七年齊來聘而此又為歸父奔齊起文也冬十月壬戌公薨于路寢義見莊公薨歸父還自晉至笙遂奔齊笙公羊榖梁作㮒孫氏曰不言公孫前見也榖梁曰自晉事畢也杜氏曰笙魯境也左氏曰公薨季文子言於朝曰使我殺嫡立庶以失大援者仲也夫臧宣叔怒曰當其時不能治也後之人何辠子欲去之許請去之遂逐東門氏子家還及笙壇帷復命於介既復命袒括髮即位哭三踊而出遂奔齊髙氏曰先君未殯而逐其臣是死其君而忘其父也雖然人臣之正受命而出雖君薨猶當致命於殯前若其有辠待命於新君可也今歸父還自晉及魯境遽即奔齊則有惡於新君矣故書以著其逃刑之辠義又見僖二十八年元咺奔晉榖梁曰捐殯而奔其父之使者謂歸父是亦奔父也康侯胡氏曰仲尼稱孟莊子之孝其不改父之臣與父之政是難能也又曰三年無改於父之道可謂孝矣夫仁人孝子於其父之臣非有大不可如晉悼公於夷羊五之屬必存終始進退之禮而不遽也歸父以君命出使未返而君薨在聘禮有執圭復命於殯之文升自西階子臣皆哭情亦戚矣宣公猶未殯而東門氏逐忍乎哉春秋本義卷十七
