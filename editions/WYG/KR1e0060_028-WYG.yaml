body:
  text: 春秋本義卷二十八元程端學撰定公八年春王正月公侵齊公至自侵齊二月公侵齊三月公至自侵齊杜氏曰報前年伐我西鄙左氏曰公侵齊門於陽州士皆坐列曰顔高之弓六鈞皆取而傳觀之陽州人出顔高奪人弱弓籍丘子鉏擊之與一人俱斃偃且射子鉏中頰殪顔息射人中眉退曰我無勇吾志其目也師退冉猛偽傷足而先其兄㑹乃呼曰猛也殿高氏曰魯政不在公矣而三家者實使公春秋因見公之舉動故未踰時而致之且為下復侵齊起也前此未得志故踰月之閒再出侵齊雖三家之所為然乍往乍來不得休息見公之進退益不自専矣任氏曰三月之閒而兩侵鄰國無尺寸之功而重丘山之怨輕用其忿而不恤其民甚矣義又見荘十年公侵宋曹伯露卒義見隱三年宋公卒夏齊國夏帥師伐我西鄙報上二侵也易曰自我致寇魯之謂矣義又見隱二年鄭伐衞公㑹晉侯于瓦杜氏曰瓦衞地東郡燕縣東北有瓦亭張氏曰即滑州白馬縣愚謂義在公㑹晉師故不書晉卿名以諸侯之尊越國㑹諸侯之師一見魯之微弱二見當時惟知附勢而不顧理之不可也公至自瓦義見桓二年公至自唐秋七月戊辰陳侯柳卒義見隱三年宋公卒晉士鞅帥師侵鄭遂侵衞士公羊作趙石氏曰二國叛晉故士鞅帥師侵鄭遂侵衞義見荘十年公侵宋葬曹靖公義見隱三年葬宋穆公九月葬陳懐公杜氏曰三月而葬速義又見隱三年葬宋穆公季孫斯仲孫何忌帥師侵衞義見荘十年公侵宋冬衞侯鄭伯盟于曲濮杜氏曰曲濮衞地義見隱元年盟于蔑從祀先公馮氏曰從祀者言隨而祭之也盤庚曰兹于大享于先王爾祖其從與享之曾子問曰祫于太廟羣主皆從歴代宗廟郊社之址皆有五帝山川功臣從祀之址詳其事殆新主入廟之意始昭公為季氏所逐而卒祀於外定之初其喪雖歸季氏尚欲溝絶其地域不使與先君同既而止葬於墓道南而己以是而觀則昭公未嘗得入廟也五年意如卒六年陽虎欲去三桓尚厭魯人之心始置昭公於先公之廟而祀焉爾不言昭公者内諱也康侯胡氏曰昭公之主雖久未得從昭穆而祔祭陽貨始以昭公之主從祀太廟蓋欲著季氏之辠以取媚於國人然其事雖順其情則逆春秋原情制法故曰從祀先公其亦深切著明矣愚謂從祀先公者凡已祧之主皆得隨而祭之蓋不當祫而祫也祫而不言大事于太廟者非時而祫将以是為常焉者也故不言大事而言從祀先公以寓意焉爾然無所考不敢質言之盜竊寳玉大弓陸氏曰陽虎家臣也其名不合登於史䇿故書曰盜寳玉大弓杜氏曰夏后氏之璜封父之繁弱榖梁曰寳玉者封圭也大弓者武王之戎弓也周公受賜藏之魯未詳孰是左氏曰陽虎将享季氏于蒲圃而殺之戒都車曰癸巳至成宰公斂處父告孟孫曰季氏戒都車何故孟孫曰吾弗聞處父曰然則亂也必及於子先備諸與孟孫以壬辰為期陽虎前驅林楚御桓子虞人以鈹盾夾之陽越殿将如蒲圃桓子咋謂林楚曰而先皆季氏之良也爾以是繼之對曰臣聞命後陽虎為政魯國服焉違之徴死死無益於主桓子曰何後之有而能以我適孟氏乎對曰不敢愛死懼不免主桓子曰往也孟氏選圉人之壮者三百人以為公期築室於門外林楚怒馬及衢而騁陽越射之不中築者闔門有自門閒射陽越殺之陽虎刼公與武叔以伐孟氏公斂處父帥成人自上東門入與陽氏戰於南門之内弗勝又戰於棘下陽氏敗陽虎說甲如公宫取寳玉大弓以出舍於五父之衢寝而為食其徒曰追其将至虎曰魯人聞余出喜於徴死何暇追余從者曰嘻速駕公斂陽在公斂陽請追之孟孫弗許陽欲殺桓子孟孫懼而歸之子言辨舍爵於季氏之廟而出陽虎入於讙陽關以叛未詳信否常山劉氏曰寳玉大弓天子所賜先君之分器藏之於國子孫世世保之不可失墜而為盜所竊國慢無政可知矣志其不恭之大也高氏曰明堂位以大璜為天子之器大弓為天子之戎器蓋成王以是賜魯是先君之分器也周官天府之職掌祖廟之守藏與其禁令凡國之玉鎮與其大寳器藏焉若有大祭則出而陳之既事藏之然則寳玉大弓宜藏之祖廟有禁令焉今因從祀先公出而陳之遂為盜所竊是時公室卑三桓弱陽虎以陪臣執國命将殺季氏不勝而出故因從祀先公竊取寳玉大弓以行莫有抗之者則國亂無政可知矣九年春王正月夏四月戊申鄭伯蠆卒蠆勅邁切公羊作囆義見隱三年宋公卒得寳玉大弓左氏曰陽虎歸寳玉大弓六月伐陽關陽虎使焚南門師驚犯之而出奔齊齊侯執陽虎逃奔宋遂奔晉未詳信否康侯胡氏曰寳玉大弓子孫罔敢失墜以昭先祖之徳存肅敬之心耳古者告終易代𢎞璧琬琰天球夷玉兌之戈和之弓垂之竹矢莫不陳列非直為美觀也先王所寳傳及其身能全而歸之則可以免矣魯失其政陪臣擅權雖先公分器猶不能守而盜得竊諸公宫其能國乎故失之書得之書所以譏公與執政之臣見不恭之大也此義行則有天下國家者各知所守之職不敢忽矣高氏曰書得寳玉大弓以見器之空還而不獲盜者以正典刑則亦幸而得之爾盜竊之辠於誰責而可乎愚謂經書盜竊寳玉大弓又書得寳玉大弓若為穿窬所竊而今復獲之未見陽虎竊之歸之者在來者考焉六月葬鄭獻公杜氏曰三月而葬速義又見隱三年葬宋穆公秋齊侯衞侯次于五氏杜氏曰五氏晉地未詳是否義見荘三年公次于滑邦衡胡氏曰春秋有書師次者有書君次者書師次惡其勞師徒也書君次惡其逺民社也國君無王命而逺民社危可知矣秦伯卒不名關文也義見文十八年秦伯卒冬葬秦哀公秦不書卒卒之且不可況㑹其葬乎蓋至是與中國無閒矣十年春王三月及齊平平前八年公再侵齊及齊伐我西鄙之怨也義見昭七年暨齊平或曰暨齊平齊欲之而魯與平也及齊平魯欲之而齊與平也未詳是否夏公㑹齊侯于夾谷夾古洽切又古協切公羊榖梁作頰孫氏曰夾谷齊地張氏曰魯地漢東海祝其縣有夾山即海州懐仁縣未詳孰是義見隱九年㑹于防公至自夾谷義見桓二年公至自㑹晉趙鞅帥師圍衞義見僖十九年宋圍曹齊人來歸鄆讙龜隂田鄆公羊作運穀梁田上有之字來歸來魯歸田也與宰咺來歸仲子之賵齊人來歸衞俘同杜氏曰三邑皆汶陽田也泰山博縣北有龜山隂田在其北也任氏曰鄆即昭公時齊取以歸公者至是并以還魯二邑與龜隂俱在汶水北龜山今在泗水東北七十里讙見桓三年孫氏曰三月及齊平夏㑹于夾谷故齊人來歸鄆讙龜隂田愚謂土地天子所封齊人侵之齊人歸之其無王可知矣葉氏曰鄆前見圍蓋叛而附齊矣讙陽虎之邑也虎挾之以入齊龜山之在邦内者龜隂其山之隂也三田皆齊之所侵既與齊平而㑹故反而來歸三田之歸左氏榖梁皆謂孔子相夾谷之㑹退萊兵而謝過非也夾谷之事匹夫之勇智者之所不為而謂孔子為之乎叔孫州仇仲孫何忌帥師圍郈秋叔孫州仇仲孫何忌帥師圍郈郈音后又去聲公羊作費誤也州仇叔孫不敢之子武叔也杜氏曰郈叔孫氏邑任氏曰地譜東平無鹽縣東南有郈鄉無鹽在鄆州須城縣東左氏曰初叔孫成子欲立武叔公若藐固諫曰不可成子立之而卒公南使賊射之不能殺公南為馬正使公若為郈宰武叔既定使郈馬正侯犯殺公若弗能其圉人曰吾以劒過朝公若必曰誰之劒也吾稱子以告必觀之吾偽固而授之末則可殺也使如之公若曰爾欲吳王我乎遂殺公若侯犯以郈叛武叔懿子圍郈弗克秋二子復圍郈弗克叔孫謂郈工師駟赤曰郈非唯叔孫氏之憂社稷之患也将若之何對曰臣之業在揚之水卒章之四言矣叔孫稽首駟赤謂侯犯曰居齊魯之際而無事必不可矣子盍求事於齊以臨民不然将叛侯犯從之齊使至駟赤與郈人為之宣言於郈中曰侯犯将以郈易於齊齊人将遷郈氏衆兇懼駟赤謂侯犯曰衆言異矣子不如易於齊與其死也猶是郈也而得紓焉何必此齊人欲以此偪魯必倍與子地且盍多舍甲於子之門以備不虞侯犯曰諾乃多舍甲焉侯犯請易於齊齊有司觀郈将至駟赤使周走呼曰齊師至矣郈人大駭介侯犯之門甲以圍侯犯駟赤将射之侯犯止之曰謀免我侯犯請行許之駟赤先如宿侯犯殿每出一門郈人閉之及郭門止之曰子以叔孫氏之甲出有司若誅之羣臣懼死駟赤曰叔孫氏之甲有物吾未敢以出犯謂駟赤曰子止而與之數駟赤止而納魯人侯犯奔齊齊人乃致郈未詳信否康侯胡氏曰侯犯以郈叛不書於䇿書圍郈則叛可知矣再書二卿帥師圍郈則强亦可知矣天子失道征伐自諸侯出而後大夫强諸侯失道征伐自大夫出而後家臣强其逆彌甚則其失彌速故自諸侯出十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣三家専魯為日已久至是家臣爭叛亦其理宜矣春秋制法本忠恕施諸已而不願亦勿施諸人故所惡於上不以使下所惡於下不以事上二三子知傾公室以自張而不知家𨽻之擬其後也凡此皆據事直書深切著明矣義又見昭十三年圍費愚謂凡大夫以邑叛必書此家臣以邑叛而不書者非與其叛也義不在於家臣之叛而在於大夫教家臣之叛也諸侯僭天子則大夫僭諸侯是諸侯教大夫之僭也大夫僭諸侯則家臣叛大夫是大夫教家臣之叛也家臣而至於叛大夫則極矣此所以不書家臣之叛而書大夫之圍其私邑此春秋所以為謹嚴而防微杜漸之義著矣宋樂大心出奔曹左氏曰九年宋公使樂大心盟於晉且逆樂祁之尸辭偽有疾乃使向巢如晉盟且逆子良之尸子明謂桐門右師出曰吾猶衰絰而子擊鐘何也曰喪不在此故也既而告人曰已衰絰而生子奈何故舍鐘子明聞之怒言於公曰右師将不利戴氏不肯適晉将作亂也不然無疾乃逐桐門右師未詳信否義見僖二十八年元咺奔晉又為次年入蕭起文也宋公子地出奔陳地公羊作池下同杜氏曰地宋景公弟辰之兄也左氏曰宋公子地嬖蘧富獵十一分其室而以五與之公子地有白馬四公嬖向魋魋欲之公取而朱其尾鬛以與之地怒使其徒抶魋而奪之魋懼将走公閉門而泣之目盡腫母弟辰曰子分室以與獵也而獨卑魋亦有頗焉子為君禮不過出竟君必止子公子地出奔陳公弗止辰為之請弗聽辰曰是我延吾兄也吾以國人出君誰與處冬母弟辰既仲佗石彄出奔陳未詳信否義見僖二十八年元咺奔晉又為次年入蕭以叛起文也冬齊侯衞侯鄭游速㑹于安甫速公羊作遫安甫公羊作鞌父張氏曰安甫齊地地譜今屬鄆州平隂縣義見隱九年㑹于防叔孫州仇如齊義見隱七年齊來聘宋公之弟辰暨仲佗石彄出奔陳彄苦侯切公羊榖梁暨下有宋字左氏見上弟奔義見襄二十年大夫奔義見僖二十八年元咺奔晉又為次年入蕭以叛起文也高氏曰國君必有左右大臣以輔其政今宋卿大夫數日之閒五人逃去君誰與處乎十有一年春宋公之弟辰及仲佗石彄公子地自陳入于蕭以叛杜氏曰蕭宋邑義見襄二十六年孫林父事辰以弟叛其兄其辠尤著夏四月秋宋樂大心自曹入于蕭康侯胡氏曰四卿在蕭以叛而大心自曹從之其叛可知矣故不書叛而曰入于蕭逆辭也書自陳自曹者結鄰國以入叛陳與曹之辠亦著矣冬及鄭平平六年侵鄭之怨也義見昭七年暨齊平叔還如鄭莅盟叔還叔弓曾孫成子也義見僖三年公子友莅盟十有三年春薛伯定卒義見隱三年宋公卒夏葬薛襄公義見隱三年葬宋穆公叔孫州仇帥師墮郈壊城阜曰墮莘老孫氏曰是時三桓之邑皆為城以自固故其家臣因之以叛昭十三年叔弓圍費去年夏秋郈凡再圍於是一墮毁之愚謂城郭所以禦外患今内難作而毁其城其必有由矣夫三桓踰制以城其邑者為僭諸侯計也而不知家臣效尤卒不可制然則前日之城乃自毁之道也可為永鑒矣劉氏曰季康子患盜問於孔子子曰苟子之不欲雖賞之不竊今諸侯僭天子而大夫强大夫執國命而陪臣叛事勢則然矣不務以所望乎下者事其上則治奚由順哉故師行邦域之中而書之若異國然此孔子所謂不在顓臾而在蕭牆之内之意也愚謂春秋先書城費次書圍費圍郈次書墮郈墮費所謂屬辭比事不辭費而義自見矣衞公孟彄帥師伐曹彄苦侯切杜氏曰彄孟縶子義見隱二年鄭伐衞季孫斯仲孫何忌帥師墮費義見墮郈師氏曰郈費二邑數叛不能制故皆墮之葢前此者公城中城以畏三家之張今此三家墮邑城以畏家臣之叛春秋至此亂可謂極矣秋大雩義見桓五年冬十月癸亥公㑹齊侯盟于黄齊公羊作晉誤也張氏曰黄齊地義見隱元年盟于蔑十有一月丙寅朔日有食之義見隱三年公至自黄義見桓二年公至自唐十有二月公圍成義見昭二十六年莘老孫氏曰天子有天下諸侯有一國天下有逆命者則天子命諸侯伐之一國之邑有叛者則諸侯命其臣伐之故天子無伐其諸侯諸侯無討於邑春秋之時天下無王而諸侯逆命者衆故有王而伐鄭者陪臣擅命而權在私家諸侯不得為政故有公而圍成者成魯邑而魯圍之書曰公圍成以見諸侯之失道也公至自圍成義見桓二年公至自唐十有三年春齊侯衞侯次于垂葭公羊作瑕榖梁無衞侯二字左氏曰垂葭實郹氏杜氏曰高平鉅野縣西南有郹亭張氏曰屬濟州皆未詳是否義見荘三年公次于滑夏築蛇淵囿音又許氏曰魯政不修而非時勤民築囿奉己而已不及國也夫圍成弗克而力此何振之有義又見成十八年築鹿囿大蒐于比蒲比音毗義見昭十一年存耕趙氏曰三家分軍私斂蒐閱軍實以自固也非時非制不足言也衞公孟彄帥師伐曹高氏曰衞比伐曹靈公志在軍旅之事不知以禮為國故亟戰如此義又見隱二年鄭伐衞秋晉趙鞅入于晉陽以叛張氏曰晉陽唐曰太原府宋為并州義見襄二十六年孫林父事冬晉荀寅士吉射入于朝歌以叛射食亦切公羊寅下有及字杜氏曰士射士鞅子張氏曰朝歌晉地衞州衞縣有朝歌城南有牧野義見襄二十六年孫林父事任氏曰未閱三時而三大夫以邑叛晉之君臣失道之甚也邦衡胡氏曰晉主夏盟威制海内反不能禁其臣之叛已不正也已帥以叛則下莫不叛矣天王在上晉侯不能帥諸侯以朝至於王室有難又不能勤王述職而使大夫城之又執人於天子之側非叛王而何帥天下而叛故臣亦相帥以叛君以為亂臣賊子之戒不可一日而不臣也晉趙鞅歸于晉左氏曰韓魏以趙氏為請十二月辛未趙鞅入於絳盟於公宫常山劉氏曰趙氏晉之強宗鞅叛當誅晉侯不能治而許之歸國亂無刑矣愚謂見晉之衰而迫於強臣也邦衡胡氏曰先書晉趙鞅入於晉陽以叛見鞅據地舉兵以拒晉也次書晉趙鞅歸于晉見君許之還也大夫出奔書歸者君受之也書入者臣自入也今鞅大惡已著但以君許之歸故書歸責在君也吕氏曰春秋之世大義不明據城以要其君者皆叛也而不自知其為大惡臧武仲以防求後於魯則亦叛而已矣晉獻公使寺人披伐蒲重耳曰君父之命不校乃徇曰校者吾讎也踰牆而走其亦可以免於戾矣趙鞅歸于晉以叛而歸言其自如亂之甚也存耕趙氏曰三晉之形成於此矣薛弑其君比不書弑君之賊見文十八年義見隱四年衞州吁事十有四年春衞公叔戍來奔衞趙陽出奔宋衞公羊榖梁作晉左氏曰初衞公叔文子朝而請享靈公退見史鰌而告之史鰌曰子必禍矣子富而君貪辠其及子乎文子曰然吾不先告子是吾辠也君既許我矣其若之何史鰌曰無害子臣可以免富而能臣必免於難上下同之戍也驕其亡乎富而不驕者鮮吾唯子之見驕而不亡者未之有也戍必與焉及文子卒衞侯始惡於公叔戍以其富也公叔戍又将去夫人之黨夫人愬之曰戍将為亂十四年春衞侯逐公叔戍與其黨故趙陽奔宋戍來奔未詳信否義見僖二十八年元咺奔晉二月辛巳楚公子結陳公孫佗人帥師滅頓以頓子牂歸牂子郎切二月公羊作三月公孫作公子牂作牄葉氏曰不别以歸何國時楚強且主兵歸楚可知左氏曰頓子牂欲事晉背楚而絶陳好二月楚滅頓未詳信否任氏曰以中國諸侯大夫而從楚人以滅國豈特自強哉實有以資之耳愚謂以頓子歸不死社稷也義又見荘十年荆敗蔡師夏衞北宫結來奔左氏曰北宫結來奔公叔戍故也未詳信否義見僖二十八年元咺奔晉愚謂一國而三大夫出奔其為國可知矣五月於越敗吳于檇李檇音醉公羊作醉杜氏曰檇李吳郡嘉興縣南醉李城張氏曰吳地今為秀州治所石氏曰不言爵不言師不書戰非内地略之也義見僖三年徐取舒吳子光卒義見文十八年秦伯卒公㑹齊侯衞侯于牽公羊作堅牽杜氏曰魏郡黎陽縣東北有牽城義見隱九年㑹于防公至自㑹義見桓二年公至自㑹秋齊侯宋公㑹于洮吐刀切洮見僖八年義見隱九年㑹于防天王使石尚來歸脤市軫切公羊曰石尚者何天子之士也脤者何俎實也腥曰脤熟曰燔說文社肉也盛以蜃器故曰脤劉氏曰脤膰以親兄弟之國受脤禮也歸脤非禮也孫氏曰天子祭社稷宗廟有與諸侯共福之禮此謂助祭諸侯也魯未嘗助祭天王使石尚來歸非禮也東萊吕氏曰春秋録相朝見則見述職之本廢矣書交聘則見閒問時見之禮缺矣詳盟㑹則見㑹同之制壊矣書來賜命則見告命之道絶矣書歸田假田則見廵狩之法替矣今歸脤而復書之則法度之壊己甚諸侯不助祭以受脤天子而天子從遣士以歸脤矣衞世子蒯瞶出奔宋左氏曰衞侯為夫人南子召宋朝㑹於洮大子蒯瞶獻盂於齊過宋野野人歌之曰既定爾婁豬盍歸吾艾豭大子羞之謂戲陽速曰從我而朝少君少君見我我顧乃殺之速曰諾乃朝夫人夫人見大子大子三顧速不進夫人見其色啼而走曰蒯瞶将殺余公執其手以登臺大子奔宋盡逐其黨故公孟彄出奔鄭自鄭奔齊劉氏曰葢蒯瞶聞野人之歌其心慙焉則以謂夫人夫人惡其斥已淫則嗁而走言大子将殺余以誣之靈公惑於南子言必聽從故外則召宋朝内則逐公孫戍趙陽彼不恥召宋朝固亦不難逐蒯瞶矣此其真也不當如左氏所記又蒯瞶出乃奔宋宋南子家也蒯瞶負殺南子之名而走又入其家使真有此事者敢乎哉此亦一證也與常山劉氏張氏同任氏曰既曰世子而出奔父子不相安而天倫滅矣石氏曰孟子稱小弁為親親詩人傷二子乗舟爭相為死為非義衞靈公失道南子嬖大子蒯聵不得於父又與伋夀逺矣書其出奔以見滅天性也衞公孟彄出奔鄭事見上愚案春秋歴書彄帥師而繼以出奔以見君假臣以兵權禍之所由起也未必皆以蒯瞶之黨而見逐也義又見僖二十八年元咺奔晉髙氏曰蒯瞶為南子所譖而出奔靈公信其譖言不亦蔽乎雖然蒯瞶則不能無辠者也人子處頑嚚則有道矣不至於以嫌見誣也而非蒯瞶之事也比年志公孟彄帥師此衞國用事之卿大夫況出奔者五人而衞侯獨與南子處此靈公之無道也宋公之弟辰自蕭來奔邦衡胡氏曰書公弟見宋公失兄之道也書自蕭辠辰據邑以叛也書來奔辠魯納叛臣也義又見僖二十八年元咺奔晉大蒐于比蒲義見昭十一年邾子來㑹公邾子左氏曰邾隱公石氏曰諸侯相見於郤地曰㑹考禮正刑一徳以尊天子春秋㑹禮非復如古之制也今公蒐國内而邾子就㑹之非禮甚矣遇非所朝之地而蕭叔朝公於榖蒐非所㑹之處而邾子㑹公於蒐㑹者既非受者亦失交譏之也城莒父及霄張氏曰皆魯邑義見隱七年城中丘石氏曰一時而城二邑書以譏之此年與桓七年無冬四年無秋冬昭十年無冬皆闕文也十有五年春王正月邾子來朝邾去年來㑹公而今年來朝見邾之衰而屢求於魯皆非禮也義又見隱十一年滕薛來朝鼷䑕食郊牛牛死改卜牛鼷音兮范氏曰不言所食食非一處也趙氏曰嘗旅於㑹稽時小䑕噬牛纔傷皮膚輒死愚謂此與成七年事雖少異而義則同也二月辛丑楚子滅胡以胡子豹歸楚滅人國辠不容誅矣然以胡子歸又責其不死社稷也義又見僖三年徐取舒夏五月辛亥郊石氏曰五月非郊之時葢以改卜牛至此而後能郊也有言用郊有言郊用者不宜用也直言郊者以上之不能郊也義見成十七年用郊壬申公薨于髙寝杜氏曰髙寝宫名不於路寝失其所義又見僖公薨許氏曰春秋所大正始與終禮卒以正終也内卒凡十四公得正而薨者惟荘宣成是以君子務力於禮而順命之變又何求焉鄭罕達帥師伐宋罕公羊作軒義見隱二年鄭伐衞齊侯衞侯次于蕖蒢公羊作籧篨義見荘三年次于滑邾子來奔喪葉氏曰喪何以言奔急事也禮非天子父母之喪不奔見日而行見星而舍日行百里謂之奔諸侯而奔喪非禮也常山劉氏曰當周之衰諸侯皆無奔喪㑹葬之事而邾滕始行於強大之國非禮明矣吕氏曰諸侯相為奔喪専以強弱利害為國禮義消亡可知矣秋七月壬申姒氏卒姒榖梁作弋非也下同孫氏曰姒氏把姓哀公妾母榖梁曰妾辭也愚謂此為葬定姒起文也八月庚辰朔日有食之義見隱三年九月滕子來㑹葬邦衡胡氏曰邾滕奔喪㑹葬以天子之禮待魯也禮天子崩諸侯奔喪㑹葬供臣子之職邾滕以是行之於魯其無王甚矣任氏曰以見大國恃力而小國因事以求悅也吕氏曰邾子來奔喪畏魯甚也滕差逺而大於邾故但來㑹葬此専以強弱利害為國者也丁巳葬我君定公雨不克葬戊午日下昊乃克葬昊榖梁作稷乃古昊字乃猶始也宣八年葬敬嬴言而而此言乃者彼以日中此以次日日昊甚於日中故命辭有輕重耳孫氏曰雨不克葬譏不能葬也葬不為雨止戊午日下昊乃克葬言無備之甚也愚謂義與宣八年葬敬嬴同而此則失禮甚矣其私諡又見葬桓公髙氏曰日下昊則失虞之時甚矣君子之於親不忍一日離也故葬日虞者所以寧親也乃克葬所以重孝子之情也辛已葬定姒髙氏曰春秋自成風後妾母皆僭稱夫人譏不正也此不稱小君以子未成君故母亦不敢稱夫人而以夫人之禮葬爾此妾也而加以其君之諡非禮之甚也況襄五年葬我小君定弋是襄公之母也又豈可同諡乎義又見文五年葬成風愚案哀公未成君故僅免夫人小君之稱然原其情則亦以夫人之禮卒葬之矣又案曾子問並有喪則如之何子曰葬先輕而後重其奠也其虞也先重而後輕今定公葬居定姒之前是先重而後輕也又失禮矣冬城漆髙氏曰漆非魯邑邾庶其以之來奔者魯受叛人而以其地今将伐邾故又勞民城之以為備譏其非所城而城也夫前年城二邑國再大喪又勞民如此所謂不待言而惡自見者也張氏曰定公之喪邾子來奔事魯謹矣哀公初立不務善鄰而以土地之故勞民力啓鄰怨二年取其田七年俘其君卒使吳人乗閒以伐其國齊人問辠而取讙闡利未得而害隨之謀國如此其不終也宜哉春秋本義卷二十八
