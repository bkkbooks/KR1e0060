body:
  text: 春秋本義卷二十五元程端學撰昭公十年春王正月夏齊欒施來奔齊公羊作晉左氏曰齊惠欒髙氏皆耆酒信内多怨彊於陳鮑氏而惡之夏有告陳桓子曰子旗子良將攻陳鮑亦告鮑氏桓子授甲而如鮑氏遭子良醉而騁遂見文子則亦授甲矣使視二子則皆將飲酒桓子曰彼雖不信聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒髙氏子良曰先得公陳鮑焉徃遂伐虎門公使王黑以靈姑鉟率吉請斷三尺焉而用之戰於稷欒髙敗又敗諸莊國人追之又敗諸鹿門欒施髙彊來奔未詳信否義見僖二十八年元咺奔晉秋七月季孫意如叔弓仲孫貜帥師伐莒意公羊作隠誤也後同意如季孫宿之孫紇之子平子也木訥趙氏曰魯乗莒亂取鄆田納牟夷而取牟婁及防兹無怪莒有蚡泉之師也叔弓且敗之矣今又三大夫並出此固皆意如之為也義又見隠二年鄭伐衛戊子晉侯彪卒義見隠三年宋公卒又為叔孫婼葬平公起文也九月叔孫婼如晉葬晉平公三月而葬又魯以卿㑹葬皆非禮也義又見隠三年葬宋穆公十有二月甲子宋公成卒成公羊作戌杜氏曰無冬闕文義見隠三年宋公卒十有一年春王二月叔弓如宋葬宋平公公羊作正月三月而葬速髙氏曰卿共同列之葬非禮甚矣義又見隠三年葬宋穆公夏四月丁巳楚子䖍誘蔡侯般殺之於申楚公子棄疾帥師圍蔡䖍榖梁作乾朴鄉吕氏曰楚子名衍字爾左氏曰楚子在申召蔡靈侯靈侯將徃蔡大夫曰王貪而無信惟蔡於憾今幣重而言甘誘我也不如無徃蔡侯不可三月丙申楚子伏甲而饗蔡侯於申醉而執之夏四月丁巳殺之刑其士七十人公子棄疾帥師圍蔡韓宣子問於叔向曰楚其克乎對曰克哉蔡侯獲辠於其君而不能其民天將假手於楚以斃之何故不克然肸聞之不信以幸不可再也楚王奉孫吳以討於陳曰將定而國陳人聽命而遂縣之今又誘蔡而殺其君以圍其國雖幸而克必受其咎弗能久矣莘老孫氏曰蔡侯般弑君父之賊楚子以義討之則無不可乃詐誘而殺之又滅其國而有之春秋以楚子之志不在於討賊徒殺人之君而利人之國故書楚子誘蔡侯般殺之啖氏曰蔡侯之辠自不容誅楚子惡已甚矣棄疾不能諫止又帥師圍蔡從君於昏此亦不待言而辠惡自見者也義又見莊十年荆敗蔡師康侯胡氏曰蔡世子般弑其君諸侯與通㑹盟十有三年矣是人類胥為禽獸而莫之覺也楚子若以大義唱天下奉詞致討執般於蔡討其弑君父之辠而在官者無赦焉殘其身瀦其宫室雖古之征暴亂者不越此矣又何惡乎今楚子本心欲圖其國不為討賊舉也而又挾欺毁信詐誘其君執而殺之肆行無道貪得一時聖人深惡之也五月甲申夫人歸氏薨歸氏杜氏曰昭公母胡女歸姓愚謂妾稱夫人僭也又為大蒐與葬齊歸起文義又見文四年風氏薨大蒐于比蒲比音毗蒐見桓二年狩于郎大蒐僭天子之禮也于比蒲非常所也比蒲地譜云魯南鄙地孫氏曰蒐春田也五月不時也劉氏曰大蒐者大比也大比之禮均土地閱老幼物六畜㑹車馬齊貢賦治器械三年而修之者也此何以書譏喪不二事夫人歸氏薨大蒐于比蒲非禮也羊舌肸曰君有三年之喪而無一日之慼存耕趙氏曰公有母喪而不廢蒐意如無君也無事而蒐閱强家自練其兵也民皆三家之民兵皆三家之兵昭公孤矣康侯胡氏曰三綱君政之本君執此以御其下臣執此以事其上政之大本於是乎在君有三年之慼國不廢一日之蒐則無本矣乃有身從金革而無避者獨何歟有門庭之寇而宗廟社稷存亡係焉必従權制而無避伯禽服喪徐戎並興至於東郊出戰之師興築城之役同日並舉度緩急輕重蓋有不得已焉者也仲孫貜㑹邾子盟于祲祥公羊作侵羊祲祥地闕君有母喪未葬而貜儼然與邾子盟非禮矣義又見隠元年盟于蔑髙氏曰始也公及邾儀父盟于蔑盟于趡是魯侯親與之盟㑹也今公雖以夫人之喪使仲孫貜㑹邾子盟然自是仲孫何忌及邾子盟于抜叔孫州仇仲孫何忌及邾子盟于句繹是吾大夫與其君盟㑹耳然則魯邾之更為强弱斷可知矣雖與邾盟以修好然而魯人之志必欲滅邾而後已此盟豈可信邪秋季孫意如㑹晉韓起齊國弱宋華亥衛北宫佗鄭罕虎曹人杞人于厥憖魚覲切厥憖公羊作屈銀厥憖地闕晉既失伯楚圍蔡而莫之恤八國之大夫自為㑹天下之勢可知矣義又見文十二年㑹于承筐九月己亥葬我小君齊歸齊私諡也髙氏曰妾母而以夫人之禮薨葬又别為之諡義又見文五年葬成風冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之有榖梁作友啖氏曰稱執者囚繫之也孫氏曰諸侯當稱子此言世子者有未立也杜氏曰用之殺以祭也趙氏曰與僖十九年邾用鄫子同左氏曰楚子滅蔡用隠太子於岡山申無宇曰不祥五牲不相為用況用諸侯乎王必悔之髙氏曰楚子誘人之君而殺之滅其國執其嫡嗣而歸用之不道之其聖人詳錄之所以閔吾中國王綱既墜伯統又絶諸侯莫能救致楚人之自恣一至此也不言以世子歸者有不從楚故也愚謂蔡般弑君父以篡位人所得討幸不見殺於當時而假手於强楚身殄國滅及其嗣子夫楚子之惡不容誅也然蔡般之事可為亂臣賊子之大鑒矣義又見莊十年荆敗蔡師存耕趙氏曰楚䖍滅陳誘殺蔡君而圍蔡頓兵八月蔡城守不下則以世子有不肯為之服也城陷就執䖍忿其淹楚師也執歸用之經詳其事窮楚惡以病中國也黄氏曰滅人之國執其人以代牲豈有人道而可責也哉十有二年春齊髙偃帥師納北燕伯于陽左氏有欵字杜氏曰髙偃髙傒𤣥孫陽即唐燕别邑中山有唐縣三年燕伯出奔齊不言於燕未得國都也邦衡胡氏曰燕已有君不受燕欵而齊必納之故納于陽而未得國愚謂燕伯不能治國至於出奔今倚大國之力十年始克入其邑其為君可知矣然諸侯出入廢置自如又以大夫而納諸侯王綱不振甚矣三月壬申鄭伯嘉卒義見隠三年宋公卒夏宋公使華定來聘左氏曰華定來聘通嗣君也義見隠七年齊來聘公如晉至河乃復義見二年五月葬鄭簡公杜氏曰三月而葬速義見隠三年葬宋穆公楚殺其大夫成熊公羊作然榖梁作虎杜氏曰成虎令尹子玉之孫與鬭氏同出於若敖左氏曰楚子謂成虎若敖之餘也遂殺之或譖成虎於楚子成虎知之而不能行未詳信否義見莊二十六年曹殺大夫秋七月冬十月公子憖出奔齊憖魚覲切公羊作整字誤也憖字子仲義見僖二十八年元咺奔晉楚子伐徐左氏曰楚子狩于州來次于潁尾使蕩侯潘子司馬督嚻尹午陵尹喜帥師圍徐以懼吳楚子次于乾谿以為之援未詳信否髙氏曰徐吳姻國也楚人疾吳故遷怒於徐既執其君又伐其國也義見僖三年徐取舒晉伐鮮虞稱國史有詳略也杜氏曰鮮虞白狄别種在中山新示縣未詳信否地譜中山在戰國為中山國新樂縣漢志新市縣也古鮮虞國子姓孫氏曰姬姓未詳孰是愚謂晉既失伯楚滅中國淫殺諸侯皆莫之恤而有事於鮮虞其無能為可知矣義又見莊十二年齊伐戎十有三年春叔弓帥師圍費費見襄七年杜氏曰南蒯以費畔左氏曰叔弓圍費弗克敗焉平子怒令見費人執之以為囚俘冶區夫曰非也若見費人寒者衣之飢者食之為之令主而共其乏困費來如歸南氏亡矣民將叛之誰與居邑若憚之以威懼之以怒民疾而叛為之聚也若諸侯皆然費人無歸不親南氏將焉入矣平子從之費人叛南氏陸氏曰家臣以邑叛不書叛但書大夫圍之則邑叛可知矣康侯胡氏曰費内邑也命正卿為主將舉大衆圍其城若敵國然者家臣强大夫弱也夫所惡於下者無以事上所惡於上者無以使下季孫意如以所惡於下者事其上而不忠於其君以所惡於上者使其下而不禮於其臣出乎爾者反乎爾宜南蒯之及此也春秋之法不書内叛反求諸已而已矣存耕趙氏曰費自友受賜以來日闢侔封君至意如極矣物盈而反天之道也劉氏曰周之王必無廢文武之法無過天之道諸侯雖大國孰敢慢其上諸侯必無僭天子其大夫孰敢陵大夫必無脅其君其陪臣孰敢叛愚案孔子曰天下有道禮樂征伐自天子出天下無道禮樂征伐自諸侯出自諸侯出十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣春秋之初諸侯僭天子春秋之中大夫僭諸侯春秋之末陪臣執國命有國家者至於陪臣執國命則國非其國矣故春秋至昭定哀終焉夏四月楚公子比自晉歸于楚弑其君䖍于乾谿榖梁作溪比奔晉在元年杜氏曰乾谿在譙國城父縣東境左氏曰楚子之為令尹也殺大司馬薳掩而取其室及即位奪薳居田遷許而質許圍蔡洧有寵於王王之滅蔡也其父死焉王使與守而行申之㑹越大夫戮焉王奪鬭韋龜中犫又奪成然邑而使為郊尹蔓成然故事蔡公故薳氏之族及薳居許圍蔡洧蔓成然皆王所不禮也因羣喪職之族啓越大夫常夀過作亂圍固城克息舟城而居之觀起之死也其子従在蔡事朝吳曰今不封蔡蔡不封矣我請弑之以蔡公之命召子干子晳及郊而告之情强與之盟入襲蔡蔡公將食見之而逃觀従使子干食坎用牲加書而速行已徇於蔡曰蔡公召二子將納之與之盟而遣之矣將師而従之蔡人聚將執之辭曰失賊成軍而殺余何益乃釋之朝吳曰二三子若能死亡則如違之以待所濟若求安定則如與之以濟所欲且違上何適而可衆曰與之乃奉蔡公召二子而盟于鄧依陳蔡人以國楚公子比公子黑肱公子棄疾蔓成然蔡朝吳帥陳蔡不羮許葉之師因四族之徒以入楚及郊陳蔡欲為名故請為武軍蔡公知之曰欲速且役病矣請藩而已乃藩為軍蔡公使須務牟與史猈先入因正僕人殺太子祿及公子罷敵公子比為王公子黑肱為令尹次於魚陂公子棄疾為司馬先除王宫使觀從從師于乾谿而遂告之且曰先歸復所後者劓師及訾梁而潰王聞羣公子之死也自投於車下曰人之愛其子也亦如余乎侍者曰甚焉小人老而無子知擠於溝壑矣王曰余殺人子多矣能無及此乎右尹子革曰請待於郊以聽國人王曰衆怒不可犯也曰若入於大都而乞師於諸侯王曰皆叛矣曰若亡於諸侯以聽大國之圖君也王曰大福不再祇取辱焉然丹乃歸於楚王㳂夏將欲入鄢芋尹無宇之子申亥曰吾父再奸王命王弗誅惠孰大焉君不可忍惠不可棄吾其従王乃求王遇諸棘闈以歸王縊於芉尹申亥氏申亥氏以其二女殉而葬之莘老孫氏曰公子比晉奉之以歸因國人之不恱其君殺而篡之也左氏公羊皆以比自晉歸脅楚子而死故書曰弑比誠不親刃但脅之使縊則亦弑之爾愚謂人而弑君辠大惡極不待言矣然楚䖍得國脅盟中國執徐子滅賴伐吳滅陳滅蔡殺徴師孔奐誘殺蔡侯用蔡世子非人類也春秋比書其惡而終之以見弑鑒戒昭矣義又見隠四年衛州吁事董子曰賦斂無度以奪民財多發徭役以奪民時作事無極以奪民力百姓愁苦叛去其國楚靈作乾谿之臺三年不成百姓罷敝是其身弑康侯胡氏曰昭元年楚䖍立比出奔晉十三年比歸而䖍縊於棘闈則比未嘗一日北面事䖍為之臣䖍固非比之君矣而書曰比弑其君何也曰若去國雖久而爵祿有列於朝出入有詔於國不埽其墳墓不收其田里不係纍其宗族即君臣之分猶在也比雖奔晉而晉人以伯待比以國底祿固楚之亡公子也安得以為比非楚臣而䖍非比之君乎春秋書比弑其君䖍明君臣之義也愚謂先儒多信左氏以䖍為弑君篡位故以比出奔而非臣殊不知䖍未嘗弑君䖍雖不賢然君楚十有三年矣比雖出亡非䖍之臣而何哉楚公子棄疾殺公子比殺公羊作弑案經但書公子不曰其君不可言弑也左氏曰觀從謂子干曰不殺棄疾雖得國猶受禍也子干曰余不忍也子玉曰人將忍子吾不忍俟也乃行國每夜駭曰王入矣乙卯夜棄疾使周走而呼曰王至矣國人大驚使蔓成然走告於子干子晳曰王至矣國人殺君司馬將來矣君若早自圖也可以無辱衆怒如水火焉不可為謀又有呼而走至者曰衆至矣二子皆自殺丙辰棄疾即位貫道王氏曰比立矣不曰弑其君比篡立非其君也比弑君而棄疾殺之經不以討賊書棄疾本意在於代比而非討之也先書公子比弑君後書棄疾殺比則棄疾謀弑而假比以為之驅除不可掩矣秋公㑹劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于平丘杜氏曰劉子劉獻公王卿士孫氏曰平丘晉地杜氏曰在陳留長垣縣西南張氏曰開封府封丘縣在東漢志尚為平丘縣左氏曰晉成虒祁諸侯朝而歸者皆有二心為取郠故晉將以諸侯來討叔向曰諸侯不可以不示威乃並徴㑹告於吳秋晉侯㑹吳子於良水道不可吳子辭乃還七月丙寅治兵於邾南甲車四千乗羊舌鮒攝司馬遂合諸侯于平丘晉人將尋盟齊人不可晉侯使叔向告劉獻公曰抑齊人不盟若之何對曰盟以底信君苟有信諸侯不貳何患焉告之以文辭董之以武師雖齊不許君庸多矣天子之老請帥王賦元戎十乗以先啓行遲速唯君叔向告於齊曰諸侯求盟已在此矣今君弗利寡君以為請對曰諸侯討貳則有尋盟若皆用命何盟之尋叔向曰明王之制使諸侯歲聘以志業閒朝以講禮再朝而㑹以示威再㑹而盟以顯昭明志業於好講禮於等示威於衆昭明於神自古以來未之或失也存亡之道恒由是興晉禮主盟懼有不治奉承齊犧而布諸君求終事也君曰余必廢之何齊之有惟君圖之寡君聞命矣齊人懼對曰小國言之大國制之敢不聽従叔向曰諸侯有閒矣不可以不示衆八月辛未治兵建而不斾壬申復斾之諸侯畏之張氏曰當時晉平主盟内寵嬖妾蠱其心外建宫室誇諸侯故楚䖍盡召諸侯而肆為宗主吞滅親姻坐視不救及平公卒昭公立而楚䖍死乃幸楚亂欲立威以服諸侯而不知大勢已去徒治親昵本末倒置内外離心諸侯益貳此平丘之㑹所以益墜伯業也愚案以天子之卿而下㑹盟諸侯以諸侯而上㑹盟天子之卿義同僖八年洮之盟及九年葵丘之㑹然葵丘之㑹宰周公與㑹而不與盟今則劉子與㑹而復與盟矣至其伯業之盛衰人心之離合又有大不同者焉故君舉陳氏曰晉之合諸侯止此鄟陵之後參盟復作晉非盟主矣八月甲戌同盟于平丘甲榖梁作庚書同盟于平丘者先目後凡又以見劉子與盟也再言平丘者先㑹于平丘復盟于平丘不得不地與葵丘同義見上又見莊十六年同盟于幽公不與盟左氏曰邾人莒人愬於晉曰魯朝夕伐我我㡬亡矣我之不共魯故之以晉侯不見公使叔向來辭曰諸侯將以甲戌盟寡君知不得事君矣請君無勤子服惠伯對曰君信蠻夷之訴以絶兄弟之國棄周公之後亦惟君寡君聞命矣叔向曰寡君有甲車四千乗在雖以無道行之必可畏也况其率道其何敵之有牛雖瘠僨於豚上其畏不死南蒯子仲之憂其庸可棄乎若奉晉之衆用諸侯之師因邾莒杞鄫之怒以討魯辠閒其二憂何求而弗克魯人懼聴命愚謂平丘之役王臣下臨諸侯大合雖非正道然晉侯猶有主中夏合諸侯之機不能協比崇奨王室乃離魯君而自為盟其何以服衆心哉然魯以千乗之君而不得與盟其亦有取辱之道歟孫氏曰自襄二十七年宋之㑹諸侯不出大夫専盟㑹者十年至昭四年申之㑹則又甚矣楚子恃两廣之衆横行中國戕滅陳蔡以厭其欲諸侯莫敢抗楚専盟㑹者又十年矣今晉昭一旦與劉子合諸侯同盟於此者其能與楚子抗乎不能與楚子抗也乗楚靈弑逆之禍爾乗楚靈弑逆之禍與劉子合諸侯同盟於此何所為哉公不與盟者晉侯不與公盟也晉侯與公同事而不同盟非所以宗諸侯也天下孰不解體故自定四年訖㑹于召陵諸侯復不出者二十四年至如昭二十六年鄢陵之㑹晉自不出此不足宗諸侯可知也晉人執季孫意如以歸左氏曰晉人執季孫意如以幕蒙之使狄人守之晉人以平子歸子服湫従康侯胡氏曰自文公以來公室微三家専而季氏辠之首也宿及意如尤為强偪元年伐莒疆鄆十年又伐莒中分魯國以自封殖而使其君食於其家其不臣甚矣晉人若告於諸侯以其辠執之請於天子以大義廢之收私邑為公室之民使政令在君大夫臣順則方伯之職修矣而徒以邾莒之言曰我之不共魯故之以遂辭魯君而執意如則是重在貨財而不責其無君臣之分也何得為伯討乎義又見莊十七年齊執鄭詹公至自㑹義見桓二年公至自唐蔡侯盧歸于蔡陳侯吳歸于陳左氏曰楚之滅蔡也靈王遷許胡沈道房申於荆焉平王即位既封陳蔡而皆復之隠大子之子盧歸于蔡悼大子之子吳歸于陳愚案陳蔡國滅身死世子俱亡今經直書蔡侯廬歸于蔡陳侯吳歸于陳者非不許楚封諸侯而為此自歸之文也考之左氏十三年四月楚比弑楚子之時觀従曰今不封蔡蔡不封矣又曰依陳蔡人以國又曰陳蔡欲為名故請為武軍乃藩為軍於時陳蔡蓋已立矣非至此始立也經不書者或魯史所無或義見於此而不書其立爾今此則蔡侯廬陳侯吳各歸其國也其名者别其為何君也不書自楚者不譏其有奉也其書歸者一見陳蔡復國於强楚二見王不能理而諸侯乗機自復三見楚人制中夏興滅之大柄皆聖人側怛之心也孫氏曰楚靈暴滅二國楚平既立故復二國之後然則楚平復之喜與非善也聖王不作諸侯不振二國之命制在楚人故也劉氏曰陳蔡復國於仇讎之楚忘其宗廟之辱社稷之恥殆匹夫所不為其道雖可復其行不可復惡足以君國子民哉是其禍亂相繼至於滅亡而莫之振也豈不哀哉冬十月葬蔡靈公靈公蔡侯般也自楚䖍殺般三十有一月蔡侯廬歸國而始得葬雖弑逆之賊人所不恤然王政不行蠻夷肆虐弱國無以自存亦可見矣義又見隠三年宋公卒公如晉至河乃復左氏曰公如晉荀吳謂韓宣子曰諸侯相朝講舊好也執其卿而朝其君有不好焉不如辭之乃使士景伯辭公於河髙氏曰晉不與公盟今又執吾卿而公復朝之無恥甚矣愚謂晉之辠亦可見矣義又見二年吳滅州來蘇氏曰州來楚之附庸趙氏曰近楚國自此見吳之强而滅國矣義見僖三年徐取舒十有四年春意如至自晉陳氏曰意如不稱氏前見也左氏曰十三年季孫猶在晉子服惠伯私於中行穆子曰魯事晉何以不如夷之小國魯兄弟也土地猶大所命能具若為夷棄之使事齊楚其何瘳於晉穆子告韓宣子且曰楚滅陳蔡不能救而為夷執親將焉用之乃歸季孫惠伯曰寡君未知其辠合諸侯而執其老若猶有辠死命可也若曰無辠而惠免之諸侯不聞是逃命也何免之為請従君惠於㑹宣子患之使叔魚見季孫曰鮒也聞諸吏將為子除館於西河且泣平子懼先歸惠伯待禮愚謂晉執意如不以其辠今又舎之亦無所為不惟晉之無王命且見其執其舎皆出於私喜怒而非有公天下之心也三月曹伯滕卒義見隠三年宋公卒夏四月秋葬曹武公義見隠三年葬宋穆公八月莒子去疾卒左氏曰著丘公大意見隠七年滕侯卒冬莒殺其公子意恢莒子卒而莒亂殺其君之親則莒之無政可知矣不曰殺其大夫而曰殺其公子者義不在於専殺大夫而在於殺君之親也十有五年春王正月吳子夷末卒末公羊作昧義見文十八年秦伯卒二月癸酉有事于武宫籥入叔弓卒去樂卒事武宫即成六年所立者也籥見宣八年左氏曰叔弓涖事籥入而卒孫氏曰非禮也宗廟之祭羽籥既陳雖有卿佐之喪不可去也然卿佐之喪當有恩禮去樂則太甚故為之廢繹是故宣八年書有事于大廟仲遂卒于垂壬午猶繹孔子譏其繹爾愚謂二月有事常禮也有事于武宫則失禮矣叔弓卒而去樂卒事是失禮之中又失禮也啖氏曰宗廟大事大夫卒小事以理言之應待祭畢又禮記稱衛侯曰柳莊者非寡人之臣也社稷之臣也如其卒雖當祭必告據此則明常禮不當告愚謂若如左氏說叔弓涖事而卒則不用告而知之矣啖氏之說施之卿卒在外告而後知者可也然左氏之說未知其實然否也夏蔡朝吳出奔鄭朝公羊作昭無出字左氏曰楚費無極害朝吳之在蔡也欲去之乃謂之曰王唯信子故處子於蔡子亦長矣而在下位辱必求之吾助子請又謂其上之人曰王唯信吳故處諸蔡二三子莫之如也而在其上不亦難乎弗圖必及於難夏蔡人逐朝吳朝吳出奔鄭王怒曰余唯信吳故寘諸蔡且微吳吾不及此女何故去之無極對曰臣豈不欲吳然而前知其為人之異也吳在蔡蔡必速飛去吳所以翦其翼也未詳信否義見僖二十八年元咺奔晉朴鄉吕氏曰蔡侯復國而朝吳出奔意者蔡侯不能容之而出邪六月丁巳朔日有食之義見隠三年秋晉荀吳帥師伐鮮虞義見十二年此則兼見大夫帥師爾朴鄉吕氏曰十二年伐之矣今又遣命卿帥師以伐之晉不能加於楚則従事於鮮虞而已冬公如晉左氏曰平丘之㑹故也愚案公屢見辭於晉而復徃畏晉甚矣非君國之道也義又見僖十年公如齊十有六年春齊侯伐徐左氏曰齊師至於蒲隧徐人行成徐子及郯人莒人㑹齊侯盟於蒲隧賂以甲父之鼎叔孫昭子曰諸侯之無伯害哉齊君之無道也興師而伐逺方㑹之有成而還莫之亢也無伯也夫未詳信否義見莊二十年齊伐戎楚子誘戎蠻子殺之蠻公羊作曼杜氏曰河南新城縣有蠻城張氏曰伊闕縣即新城也左氏曰楚子聞蠻氏之亂也與蠻子之無質也使然丹誘戎蠻子嘉殺之朴鄉吕氏曰誘人而殺之前此未有也而楚君再為之夏公至自晉義見桓二年公至自唐秋八月己亥晉侯夷卒亥公羊作丑義見隠三年宋公卒九月大雩義見桓五年季孫意如如晉冬十月葬晉昭公公羊作十一月杜氏曰三月而葬速髙氏曰卿共喪事非禮也義又見隠三年葬宋穆公十有七年春小邾子來朝左氏曰小邾穆公義見隠十一年滕薛來朝夏六月甲戌朔日有食之義見隠三年秋郯子來朝義見隠十一年滕薛來朝八月晉荀吳帥師滅陸渾之戎陸渾戎見宣三年左氏曰晉侯使屠蒯如周請有事於雒與三塗萇𢎞謂劉子曰客容猛非祭也其伐戎乎陸渾氏甚睦於楚必是故也君其備之乃警戎備晉荀吳帥師涉自棘津使祭史先用牲於雒陸渾人弗知師從之遂滅陸渾數之以其貳於楚也陸渾子奔楚其衆奔甘鹿周大獲宣子夢文公攜荀吳而授之陸渾故使穆子帥師獻俘於文宫木訥趙氏曰陸渾之戎逼近成周然俘而投之海外可也滅之亦酷矣義又見莊二十年齊伐戎冬有星孛于大辰孛見文十四年公羊曰其言于大辰何在大辰也大辰者何大火也大火為大辰伐為大辰北辰亦為大辰何以書記異也愚案冬月大火沒於西矣伐即參也見於東方北辰長見不隠所謂大辰豈伐與北辰歟吕氏曰日月星辰謫見乎天霜雪風雨之不時以為民害皆政事之失有以取之也故君觀其變以思戒察其詳以改行則災害可息而無危亡之禍其晏然不以為意則禍及之非不幸也聖人詳書為世戒為人君者觀春秋所書其可不致懼乎楚人及吳戰于長岸杜氏曰長岸楚地地譜曰水戰也康侯胡氏曰言戰不言敗勝負敵也左氏曰吳伐楚戰于長岸子魚先死楚師繼之大敗吳師獲其乗舟吳公子光請於衆曰喪先王之乗舟豈惟光之辠衆亦有焉請藉取之以救死衆許之使長鬛者三人潛伏於舟側曰我呼餘皇則對師夜從之三呼皆迭對楚人從而殺之楚師亂吳人大敗之取餘皇以歸愚謂吳伐楚楚主乎此戰也獻可杜氏曰吳楚爭强交亂中國無能制也義又見僖三年徐取舒木訥趙氏曰此後楚日削而吳日張矣十有八年春王三月曹伯須卒義見隠三年宋公卒夏五月壬午宋衛陳鄭災公羊曰同日而俱災為天下記異也義又見莊二十年齊大災六月邾人入鄅音禹或音矩杜氏曰鄅妘姓國在琅邪開陽縣張氏曰屬沂州臨沂縣左氏曰鄅人藉稻邾人襲鄅鄅人將閉門邾人羊羅攝其首遂入之盡俘以歸義見隠二年莒入向黄氏曰案左氏稱六月藉稻則春秋用夏正也若改四月稱六月則四月安有稻之可藉秋葬曹平公義見隠三年葬宋穆公冬許遷于白羽張氏曰白羽一名析楚邑也即鄧州内鄉縣愚按許一遷于葉再遷于夷三遷于白羽迫於强國靡有寧宇王綱不振小國窮困如此義又見成十五年十有九年春宋公伐邾左氏曰鄅夫人宋向戍之女也故向寧請師宋公伐邾義見隠二年鄭伐衛夏五月戊辰許世子止弑其君買左氏曰許悼公瘧飲大子止之藥卒愚謂凡弑君父者不必親加刃於其身據左氏飲止藥而卒則是毒殺之耳非弑君而何哉三傳得其事而不得其意故妄為之說義見襄三十年蔡般事朴鄉吕氏曰許悼公瘧飲止之藥而卒則是與聞乎故也使世子止之辠而止於不嘗藥也聖人不加之以弑名加之以弑名則非不嘗藥也明矣愚謂飲止藥而卒不止乎與聞乎故而己巳卯地震義見文九年秋齊髙發帥師伐莒義見隠二年鄭伐衛存耕趙氏曰齊不伐莒乆矣景公乗晉楚之弱有代興之志故侵欲小國也未詳是否冬葬許悼公義見隠三年葬宋穆公案許止不討而悼公書葬則傳所謂賊不討不書葬者妄也二十年春王正月夏曹公孫㑹自鄸出奔宋鄸榖梁作夢張氏曰鄸興仁府乗氏縣有大饗城古老云古鄸城也貫道王氏曰經書自某出奔者宋華亥自南里宋公之弟辰自蕭及公孫㑹自鄸也華亥辰先書入書叛㑹無見焉則非據邑叛君者也鄸㑹之食邑也得辠而出由邑而奔也義見僖二十八年元咺奔晉秋盗殺衛侯之兄縶公榖作輒陸氏曰案衛侯之孫名輒故宜為縶左氏曰公孟縶也孫氏曰盜者微賤之稱以衛侯之兄而盗得殺之衛侯之無刑政也如此冬十月宋華亥向寧華定出奔陳寧公羊作寗後皆同朴鄉吕氏曰一宋國也而大夫同出奔以見君之不能待其臣而臣之不能事其君也義又見僖二十八年元咺奔晉十有一月辛卯蔡侯廬卒義見隠三年宋公卒二十有一年春王三月葬蔡平公義見隠三年葬宋穆公夏晉侯使士鞅來聘義見隠七年齊來聘宋華亥向寧華定自陳入于宋南里以叛公羊作畔杜氏曰自外而至故曰入南里宋城内里名左氏曰宋華費遂生華貙華多僚華登貙為少司馬多僚為御士與貙相惡乃譖諸公曰貙將納亡人公懼使告司馬司馬歎曰必多僚也吾有讒子而弗能殺吾又不死抑君有命可若何乃與公謀逐華貙子皮殺多僚劫司馬以叛而召亡人壬寅華向入樂大心豐愆華牼禦諸横華氏居廬門以南里叛宋城舊鄘及桑林之門而守之冬十月華登以吳師救華氏齊師宋師敗吳師於鴻口華登帥其餘以敗宋師公欲出廚人濮曰吾小人可藉死而不能送亡君請待之齊烏枝鳴曰用少莫如齊致死齊致死莫如去備彼多兵矣請皆用劒従之華氏北復即之遂敗華氏於新里十一月公子城以晉師至曹翰胡㑹晉荀吳齊苑何忌衛公子朝救宋丙戌與華氏戰於赭丘大敗華氏圍諸南里楚薳越帥師逆華氏未詳信否榖梁曰自陳陳有奉焉爾邦衡胡氏曰經書入邑以叛者四戚不言衛朝歌不言晉蕭不言宋此再言宋者彼但入于所食私邑而此則入于都城之内也入都城之内則逼君已甚三臣之惡不容誅矣然宋公不能立國使叛臣得投隙而逼都城則國之削亦甚矣義又見僖二十六年孫林父事黄氏曰王伯兩微叛臣横行如此秋七月壬午朔日有食之義見隠三年八月乙亥叔輒卒輒公羊作痤輒叔弓之子伯張也譏世卿也大意又見隠元年益師卒冬蔡侯朱出奔楚朱榖梁作東邦衡胡氏曰楚䖍誘殺蔡般執用蔡有蓋蔡君不共戴天之讎朱乃奔而親之惡何可言哉義又見桓十五年鄭伯奔蔡公如晉至河乃復許氏曰公失其重久矣故晉得輕進退之義又見二年戴氏曰宜乎季氏之强昭公之弱晉助其臣而不有其君久矣二十有二年春齊侯伐莒左氏曰齊北郭啓帥師伐莒莒子將戰苑羊牧之諫曰齊帥賤其求不多不如下之大國不可怒也弗聴敗齊師於夀餘齊侯伐莒莒子行成司馬竈如莒涖盟莒子如齊涖盟未詳信否髙氏曰齊景矜而貪功如此安能及逺哉義又見隠二年鄭伐衛宋華亥向寧華定自宋南里出奔楚朴鄉吕氏曰其言自宋南里何以其嘗據此而叛也左氏曰楚薳越使告於宋曰寡君聞君有不令之臣為君憂無寧以為宗羞寡君請受而戮之對曰孤不佞不能媚於父兄以為君憂拜命之辱抑君臣日戰君曰余必臣是助亦惟命人有言曰唯亂門之無過君若惠保敝邑無亢不衷以奬亂人孤之望也唯君圖之楚人患之諸侯之戍謀曰若華氏知困而致死楚恥無功而疾戰非吾利也不如出之以為楚功其亦無能為也已救宋而除其害又何求乃固請出之宋人從之宋華亥向寧華定華貙華登皇奄傷省臧士平出奔楚未詳信否愚謂三叛奔陳又自陳入宋據國以叛復出奔楚徃來三年出入自如無能討之者三叛之辠著矣陳楚之惡明矣然宋公之為國亦可知也義又見僖二十八年元咺奔晉大蒐于昌閒公羊作姦後同陸氏曰昌閒魯地義見十一年許氏曰八年秋蒐十一年夏蒐以為書不時也今此春蒐時矣而書則凡昭公書蒐為大夫咸强公失其政兵戎是務而禮防不興上下相與以樂滔憂也文王之時人倫既正而後軍旅以律朝廷既治而後田野即功是以詩歌庶類蕃殖而蒐田以時當魯昭之季朝廷人倫逆亂極矣而唯蒐田之是務是以屢書之夏四月乙丑天王崩此為景王三月而葬與王室亂等事起也義又見隠三年六月叔鞅如京師葬景王叔鞅叔弓次子穆伯也三月而葬亂故也義見文九年得臣葬襄王王室亂左氏曰王子朝賓起有寵於景王王與賓孟說之欲立之劉獻公之庶子伯蚠事單穆公惡賓孟之為人也願殺之又惡王子朝之言以為亂願去之賓孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也遽歸告王且曰雞其憚為人用乎人異於是犧者實用人人犧實難已犧何害王弗應夏四月王田北山使公卿皆從將殺單子劉子王有心疾乙丑崩於榮錡氏戊辰劉子摯卒無子單子立劉蚠五月庚辰見王遂攻賓起殺之盟羣王子於單氏六月丁巳葬景王王子朝因舊官百工之喪職秩者與靈景之族以作亂帥郊要餞之甲以逐劉子壬戌劉子奔揚單子逆悼王於莊宫以歸王子還夜取王以如莊宫癸亥單子出王子還與召莊公謀曰不殺單旗不捷與之重盟必來背盟而克者多矣從之樊頃子曰非言也必不克遂奉王以追單子及領大盟而復殺摯荒以說劉子如劉單子亡乙丑奔於平畤羣王子追之單子殺還姑發弱鬷延定稠子朝奔京丙寅伐之京人奔山劉子入於王城辛未鞏簡公敗績於京乙亥甘平公亦敗焉叔鞅至自京師言王室之亂也閔馬父曰子朝必不克其所與者天所廢也劉氏曰何言乎王室亂亂自内作者也吕氏曰不言京師亂而言王室亂者言京師則通乎上下言王室則其父子兄弟自亂之耳康侯胡氏曰景王寵愛子朝使孽子配嫡以本亂者其言王室譏國本之不正也髙氏曰春秋紀事必指其實前此者王室衰微猶未至於亂也景王不能正家而致諸子之爭立於是尹氏召伯毛伯欲立子朝而劉子單子欲立王猛二子相逐遂以干戈相向迭勝迭負五年之間國無定主王室之亂莫此為甚夫天下不可一日無君而二子爭立五年始定嗚呼王室者諸夏之本也枝葉未有害本實先撥詩人尚以為戒况枝葉已彫瘁而本又蠧壊若此乎書之深悼周之不復興且辠諸侯之不救也愚案傳曰身脩而后家齊家齊而后國治國治而后天下平王室亂家不齊之極也家既不齊其何以治其國以平天下哉然家之不齊由乎身之不脩後世人君而知此義必躬行以教其家早定冡嗣禮訓庶孽偏愛不萌窺伺不作此春秋所以為克己復禮之書也劉子單子以王猛居于皇劉子名蚠單子名旗天子之卿也髙氏曰皇者畿内邑也杜氏曰河南鞏縣西南有皇亭東漢志鞏有皇亭西北有湟水左氏曰單子欲告急於晉以王如平畤遂如圃車次于皇劉子如劉單子使王子處守於王城盟百工於平宫鄩肸伐皇大敗獲鄩肸焚諸王城之市八月司徒醜以王師敗績於前城百工叛伐單氏之宫敗焉反伐之伐東圉劉氏曰王猛乃王矣未踰年是以不可稱天王而又不可以諸侯例稱子也冠王於子又與他王子相亂故稱王繫猛者乃王者在喪之常稱朴鄉吕氏曰其名之何未成君之辭且以别於子朝也其言劉子單子以何猛制在劉單也愚謂此亦據實書之爾嗣王繼位居喪有常所而劉單以之居于皇非其所矣見王室之亂也自此以後皆王室亂之事葉氏曰猛太子夀之母弟所得立者也必無嫡而後可以立庶朝雖長所不得立也而朝之言曰王后無嫡則立長是謂太子為嫡而欲以長奪猛夫安知太子母弟亦嫡哉此固朝之所以絶於春秋也秋劉子單子以王猛入于王城杜氏曰王城郟鄏今河南縣東萊吕氏曰洛誥我乃卜澗水東瀍水西惟洛食先儒以為今河南城所謂王城也成王定鼎於郟鄏是也平王東遷定都于王城左氏曰晉籍談荀躒帥九州之戎及焦瑕温原之師以納王于王城庚申單子劉蚠以王師敗績於郊前城人敗陸渾於社愚謂劉子單子所輔者正而王又入于城常事也春秋之義所不書者也然以天王之尊依劉單居于皇又依劉單至是始得入于王城王室之亂如此故書以見義焉又為王子猛卒及天王居于翟泉起文也朴鄉吕氏曰其再言劉子單子何二事也居于皇一事也入于王城一事也一出一入是以兩言之劉子單子以王猛居以王猛入劉單得無辠乎曰先書王室亂後書二子以劉單可以免辠矣繼書曰尹氏立王子朝尹氏之辠可免乎冬十月王子猛卒左氏曰王子猛卒不成喪也敬王即位館於子旅氏孫氏曰王猛卒其曰王子猛者言王所以明當嗣之人也言子所以見未踰年之君也不曰崩降成君也愚謂前兩書王猛而此書王子猛者因其卒而書子皆所以明其為嫡也又以别居于翟泉者非王猛也葉氏曰朝書尹氏立而敬王立不書敬王正也今猛立亦不言與敬王同猛亦正也猛之得立其辭與義固已具矣十有二月癸酉朔日有食之義見隠三年春秋本義卷二十五
