body:
  text: 春秋本義卷十三元程端學撰僖公二十有八年春晉侯侵曹晉侯伐衛趙氏曰曷為不言遂非因曹而伐衛異乎侵蔡而伐楚也此侵曹既返而後伐衛也朴鄉吕氏曰晉侯伐衛所以解宋之圍怒楚而致其師也左氏曰楚及諸侯圍宋宋公孫固如晉告急先軫曰報施救患取威定伯於是乎在矣狐偃曰楚始得曹而新昏於衛若伐曹衛楚必救之則齊宋免矣於是乎蒐于被廬作三軍謀元帥乃使郤縠將中軍狐偃將上軍欒枝將下軍二十八年春晉侯將伐曹假道於衛衛人弗許還自南河濟侵曹伐衛晉侯齊侯盟於斂盂衛侯請盟晉人弗許莘老孫氏曰晉文之興於兹五年一朝强兵侵曹伐衛夫强楚之侵陵久矣晉文而有志於中國當大會諸侯合心并力以從簡書奨王室為義諸侯有不從者然後以師伐之曹衛附楚誠有辠矣然晉文未嘗盟㑹而號令之遽以侵伐亦與齊桓異矣愚謂晉文侵曹伐衛致楚取勝正孔子所謂譎而不正者也義又見莊十年公侵宋隠二年鄭伐衛張氏曰案報施救患取威定伯者文公君臣之規模也故先侵曹伐衛若以大義興師則當先於乞師伐齊從楚圍宋之辠而魯與陳蔡宜首加伐曹衛之新附豈侵伐所當先哉公子買戍衛不卒戍刺之杜氏曰公子買魯大夫子叢也公羊曰刺之者殺之也内諱殺大夫謂之刺也杜氏曰義取於周禮三刺之法邦衡胡氏曰魯殺大夫皆言刺無王命而専殺等耳衛以附楚晉侯伐之魯乃戍衛惡亦甚矣故經言戍衛著魯黨衛附楚背華即夷之辠也義又見莊二十六年曹殺大夫孫氏曰公叛晉與楚故公子買戍衛且以晉兵力非公子買所能抗也故買不卒戍而歸公懼楚之見討乃殺買以説焉公内殘骨肉外以説强楚故書以著其惡愚謂買之戍衛以勢則不敵以義則不可買不諍於戍衛之時而從君令以往既受命而不卒戍辠也僖公不自責其戍衛之過而専殺同姓大夫以説於夷亦辠也君臣胥失之矣楚人救衛髙氏曰此書救者非善之也著衛國附楚之辠晉文果能致楚師之出也楚師既出故有城濮之戰三月丙午晉侯入曹執曹伯畀宋人公羊曰畀者與也左氏曰晉侯圍曹門焉多死曹人尸諸城上晉侯患之聽輿人之謀曰稱舍於墓師遷焉曹人兇懼為其所得者棺而出之因其兇也而攻之三月丙午入曹數之以其不用僖負羈而乘軒者三百人也且曰獻状令無入僖負羈之宫而免其族宋人使門尹般如晉師告急公曰宋人告急舍之則絶告楚不許我欲戰矣齊秦未可若之何先軫曰使宋舍我而賂齊秦藉之告楚我執曹君以畀宋人楚愛曹衛必不許也喜賂怒頑能無戰乎公説執曹伯以畀宋人杜氏曰執諸侯當歸京師晉欲怒楚使戰故以與宋康侯胡氏曰曹未狎晉政莫知所承晉文不修詞令遽入其國執其君暴矣欲致楚師與之戰而以曹伯畀宋人譎矣雖一戰勝楚遂主夏盟舉動不中於禮徒亂人上下之分無君臣之禮其功雖髙道不足尚也故曰五霸者三王之辠人也仲尼之徒無道桓文之事者義見隠二年莒入向張氏曰自晉侯侵曹至此皆春秋著文公致楚與戰之由也吕氏曰晉文公舉動如此有意於為善乎夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績書晉齊宋秦及之者四國主乎此戰也書法與桓十七年戰於奚同城濮見二十七年左氏曰楚子入居於申使申叔去榖使子玉去宋曰無從晉師晉侯在外十九年矣而果得晉國險阻艱難備嘗之矣民之情偽盡知之矣天假之年而除其害天之所置其可廢乎子玉使伯棼請戰曰非敢必有功也願以間執讒慝之口王怒少與之師唯西廣東宫與若敖之六卒實從之子玉使宛春告於晉師曰請復衛侯而封曹臣亦釋宋之圍子犯曰子玉無禮哉君取一臣取二不可失矣先軫曰子與之定人謂之禮楚一言而定三國我一言而亡之我則無禮何以戰乎不許楚言是棄宋也救而棄之謂諸侯何楚有三施我有三怨怨讎已多將何以戰不如私許復曹衛以攜之執宛春以怒楚既戰而後圖之公説乃拘宛春於衛且私許復曹衛曹衛告絶於楚子玉怒從晉師晉師退軍吏曰以君避臣辱也且楚師老矣何故退子犯曰師直為壮曲為老豈在久乎微楚之恵不及此退三舍避之所以報也背恵食言以亢其讎我曲楚直其衆素飽不可謂老我退而楚還我將何求若其不還君退臣犯曲在彼矣退三舍楚衆欲止子玉不可夏四月戊辰晉侯宋公齊國歸父崔夭秦小子憖次於城濮楚師背酅而舍晉侯患之聽輿人之誦曰原田每每舍其舊而新是謀公疑焉子犯曰戰也戰而捷必得諸侯戰而不捷表裏山河必無害也公曰若楚恵何欒貞子曰漢陽諸姬楚實盡之思小恵而忘大恥不如戰也子玉使鬭勃請戰晉車七百乘韅靷鞅靽晉侯登有莘之虛以觀師曰少長有禮其可用也遂伐其木以益其兵己巳晉師陳於莘北胥臣以下軍之佐當陳蔡子玉以若敖之六卒將中軍曰今日必無晉矣子西將左子上將右胥臣蒙馬以虎皮先犯陳蔡陳蔡奔楚右師潰狐毛設二斾而退之欒枝使輿曳柴而偽遁楚師馳之原軫郤溱以中軍公族横擊之狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉收其卒而止故不敗晉師三日館榖及癸酉而還康侯胡氏曰荆楚恃强憑陵諸夏滅黄敗徐戍榖逼齊合兵圍宋戰勝中國威動天下非有城濮之敗則其狎主齊盟必矣而春秋所書如此何也仁人明其道不計其功正其義不謀其利文公一戰勝而主夏盟以功利言則髙矣語道義則三王之辠人也愚謂正邵子所謂功過不相掩也義又見僖四年伐楚張氏曰齊桓伐楚致屈完於召陵楚未大創也故次年即滅弦誘鄭終桓公之伯楚為患而不能制文公欲伯天下以為楚不大創不足以定伯故欲戰而勝楚以取威而後伯業定當是時楚為齊宋二國患救之宜也然文公致楚與戰以取威乃不許衛盟執曹伯以快宋人之心因激楚人之怒而使之不得不戰以取一勝之功其救患取威皆譎而不正之事雖楚自是大創而行不義殺不辜亦已多矣胡氏曰若春秋桓文不作何以為中國然召陵城濮雖迭勝强楚不能絶其僣號以尊天子故知一時之功耳向使有能興起王道如宣王者則豈有齊桓晉文之事哉朴鄉吕氏曰左氏載子玉告晉師曰請復衛侯而封曹臣亦釋宋之圍以經攷之則宋圍之釋己在楚人救衛之時矣使楚方圍宋則所謂畀宋人何也城濮之戰宋公與焉又何也今以左氏敘此事頗詳録之而附見朴鄉之説云楚殺其大夫得臣得臣子玉也左氏曰楚子玉既敗王使謂之曰大夫若入其若申息之老何子西孫伯曰得臣將死二臣止之曰君其将以為戮及連榖而死晉侯聞之而後喜可知也曰莫余毒也已蒍吕臣實為令尹奉己而已不在民矣張氏曰楚子自得臣伐陳立為令尹授以兵柄令其圍陳圍宋所以導之無非佳兵狃勝之事師敗而不能自反其平日求勝無厭之辠而輙殺之義又見莊二十六年曹殺大夫愚謂楚殺得臣雖過然其窮兵黷武而卒喪其身可以為人臣之永鑒矣衛侯出奔楚不名者史失之或闕文也左氏曰衛侯聞楚師敗懼出奔楚莘老孫氏曰衛侯之背晉之楚也辠眀矣然而晉文外假尊王之名内以私智逐衛侯晉之辠也五月癸丑公㑹晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土陳侯如㑹衛子未詳何人左氏作公子瑕非是朴鄉吕氏曰蓋叔武也髙氏曰不以成君之禮故稱子而在鄭伯之下杜氏曰踐土鄭地劉氏曰如㑹者赴㑹也孫氏曰來不及盟故曰如㑹陳侯與楚楚敗故歸中國髙氏曰楚自齊桓沒為中國害晉一戰敗之威震諸侯向之附㑹楚者皆㑹踐土而請盟焉晉於是遂伯諸侯也義見隠元年盟于蔑及莊十六年同盟于幽此但不假同盟之禮為少異耳邦衡胡氏曰二十四年天王出居於鄭至是尚在鄭也故晉文㑹盟踐土以謀納王踐土鄭地以天王在鄭故就鄭地以盟非自京師致天王來也是年天王方入於京師故下云晉人執衛侯歸之於京師見晉侯踐土之盟謀納王也愚謂納王者人臣職分所當為既所當為則為常事故不書耳公朝于王所趙氏曰王所即王之所在耳孫氏曰非禮也書曰六年五服一朝又六年王乃時廵諸侯各朝於方岳公朝於王所非禮可知也髙氏曰諸侯非王事不出境今因出盟遇王而朝此為何禮愚案天王出居於鄭至是猶未復也踐土在鄭之境僖公既已㑹盟遂一朝焉其視天下共主不啻若列國之君不敬之辠著矣其平日之不以時朝亦可見矣獨言公者據魯史之文耳然諸侯之不王與天王威令之不行舉可知也六月衛侯鄭自楚復歸于衛朴鄉吕氏曰此書自楚非有奉也蓋著其自楚也言歸自楚則棄親取侮之辠可見矣愚謂衛侯為千乘之君不能守其社稷而奔竄荆蠻雖曰畏晉必有失其道者矣又自奔竄而復歸其國何以治其臣民哉眀王在上皆不得復者也雖然楚人之猾夏晉侯之不正亦可見矣衛元咺出奔晉元咺為衛大夫君歸而咺出奔事雖不可盡考必其執一國之權而不容其君者也觀晉人執衛侯與其君一出一入而卒至於見殺益可見矣故凡為臣而至於出奔皆不臣者也若元咺之辠抑又甚焉晉受逋逃之臣亦辠也又案大夫之於國有見幾而作以道去國者矣有義不當去見危授命者矣至於持禄固位厄於利害之私而出奔皆其不道者也若元咺之訟君又不與焉後凡書奔者倣此陳侯款卒大意見隠七年滕侯卒又為陳子㑹於温起文也秋杞伯姬來杜氏曰伯姬莊公女葉氏曰父母沒矣伯姬不得來而來也義又見莊二十七年杞伯姬來公子遂如齊許氏曰齊自孝公立與魯好絶比相侵伐昭公復與公同踐土之盟故公遣大夫聘之義見隠七年齊來聘冬公㑹晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于温榖梁無齊侯二字陳稱子居䘮也榖梁曰温河陽也存耕趙氏曰温去京師百里義見隠九年㑹於防或曰莊十三年北杏為衣裳之㑹此則兵車之㑹也未詳是否邦衡胡氏曰踐土之盟謀納天王矣復㑹於温者何蓋自踐土隨天王至温將納王於京師故㑹以膠固諸侯爾且温去周朝百餘里諸侯既至温豈有不朝王而召王出狩者此理之必不然也故知天王自二十四年出居於鄭至是晉侯方帥諸侯納王故天王自鄭至河陽將入於周也然河陽與温止是一地不云狩於温而云狩於河陽嫌與諸侯同處於温故别言於河陽愚謂此亦當時史法之常非孔子異其名也天王狩于河陽狩榖梁作守杜氏曰河陽晉地張氏曰古孟津地今懐州河陽縣存耕趙氏曰温即河陽也地名有二義以封域所至之地言温以方域係山川言河陽天子有所指必以方域故言河陽諸侯之㑹不言河陽河之陽非一所也愚謂襄王失道播遷於鄭諸侯納之正當感激奮勵遷善改過之時今未入京師未謝宗廟而事遊獵焉且河陽非其常狩之所故春秋書之又為公朝王所起文也壬申公朝于王所孫氏曰日繫乎月此不月者脱之愚案此義同前但前以諸侯盟于踐土因王在鄭而遂一朝此以諸侯㑹於温因王狩河陽而遂一朝耳晉人執衛侯歸之于京師左氏曰衛侯與元咺訟衛侯不勝執衛侯歸之於京師寘諸深室程子曰君臣無獄而文公使衛侯與元咺辨曲直衛侯不勝遂執其君其聽頗矣雖歸於王實强致之胡氏曰晉文既勝强楚宜招攜懐貳以眀大徳何助臣而執其君非所以伯諸侯也衛元咺自晉復歸于衛胡氏曰衛侯出奔之時元咺主其國事衛侯歸而元咺奔晉今又執衛侯歸于京師元咺即自晉復歸于衛蓋晉侯聽臣子之譖執其君却使元咺復歸于衛此見晉文之不正存耕趙氏曰臣無訟君之理君虜而臣反國逆之甚也陳洙氏曰君臣之理滅矣書曰自晉參治之也髙氏曰為人臣而訟其君雖直亦曲矣君舉陳氏曰元咺復歸孫林父歸衛宋魚石晉欒盈復入皆伉辭也諸侯遂圍許張氏曰㑹温之諸侯也榖梁曰遂繼事也康侯胡氏曰諸侯比再㑹而許獨不㑹故諸侯圍許許距河陽近矣而可以不㑹乎愚謂晉文既興諸侯有盟主矣而許猶不歸中國其辠著矣然晉文不告於王而圍之所謂摟諸侯以伐諸侯彼善于此者也其功其辠皆可見矣曹伯襄復歸于曹遂㑹諸侯圍許左氏曰晉侯有疾曹伯之豎侯獳貨筮史使曰以曹為解齊桓公為㑹而封異姓今君為㑹而滅同姓曹叔振鐸文之昭也先君唐叔武之穆也且合諸侯而滅兄弟非禮也與衛偕命而不與偕復非信也同辠異罰非刑也禮以行義信以守禮刑以正邪舍此三者君將若之何公説復曹伯遂㑹諸侯于許孫氏曰三月晉侯入曹執曹伯畀宋人此言復歸於曹者晉文赦之也春秋亂世强侯執辱小國之君無復王命執之赦之自我而已存耕趙氏曰曹伯脱身俘囚未事鬼神即驅之從干戈之役伯令迫人諸侯無寧居矣二十有九年春介葛盧來介居隘切杜氏曰介東方國在城陽黔陬縣葛盧介君名張氏曰介即宻州膠西縣地趙氏曰葛盧但為事而來本非來朝所以不廟受故直來耳髙氏曰介葛盧來朝外之可也凡書外域之來皆辠中國不自正而輕受之爾君舉陳氏曰其後介人侵蕭蓋有以來之也邦衡胡氏曰春秋書外域來者二葛盧白狄是也介則先來而後侵中國白狄則先伐中國而後來然則外域來中國必有所窺伺而為害未有但已者也公至自圍許胡氏曰公自二十八年㑹諸侯圍許至今年春方回師出踰時義又見桓二年公至自唐愚案公以㑹温出未知圍許也而以圍許致未詳豈其事不一而當時止以圍許告廟歟夏六月㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉公羊榖梁㑹上有公字諸國皆稱人當從左氏翟公羊作狄内不書名氏外稱人皆微者也王人見莊六年杜氏曰翟泉即洛陽城内大倉西南池水也東萊吕氏曰陪臣而敢伉天子之士以歃血要言其不臣甚矣王人亦與諸侯之大夫同盟失禮亦甚矣程子曰晉文連年㑹盟皆在王畿之側而此盟復迫王城又與王人盟强逼甚矣義又見隠元年盟于蔑君舉陳氏曰大夫之交政於是始文公為之也秋大雨雹雨于付切雹溥學切大者非常之辭范氏曰陽氣在水雨則温熱隂氣薄而脅之不相入轉而成雹雹者隂脅陽臣侵君之象左氏曰大雨雹為災也獻可杜氏曰春秋書大雨雹者三此年及昭三年四年也隂陽不調之所致耳必録之者所以警人君之戒也髙氏曰劉向以為盛陽雨水温暖而濕熱隂氣脅之不相入則轉而為雹盛隂雨雪凝滯而冰寒陽氣蕩之不相入則散而為霰故雹者隂脅陽也霰者陽薄隂也春秋不書霰猶不書月食也冬介葛盧來存耕趙氏曰葛盧春來矣再至何為哉是為假道侵蕭計也魯獨無以察其情何哉義又見前三十年春王正月夏狄侵齊義見隠七年戎伐凡伯康侯胡氏曰詩不云乎用戒戎作用逷蠻方四裔交侵所當攘斥晉文若移圍鄭之師以伐之則方伯連帥之職修矣上書狄侵齊下書圍鄭皆直書其事而義自見者也秋衛殺其大夫元咺及公子瑕左氏曰晉侯使醫衍酖衛侯甯俞貨醫使薄其酖不死公為之請納玉於王與晉侯皆十瑴王許之秋乃釋衛侯衛侯使賂周歂冶厪曰苟能納我吾使爾為卿周冶殺元咺及子適子儀愚謂瑕之辠不可考豈咺之黨歟若元咺則可殺矣咺入則君出咺出則君入大逆之道也元咺可殺而書曰殺其大夫何也不正名其辠以殺之也况生殺者天子之權豈諸侯所得専乎為衛侯者具其事告於天王而誅之可也告於天王能誅之乎告於天王未必能誅之也天王不能誅之而春秋必以専殺大夫言者正義不謀利明道不計功也義又見莊二十六年曹殺大夫衛侯鄭歸于衛前書晉人執衛侯歸之京師此當書歸自京師而但曰歸于衛者當時執之歸之皆晉文之權襄王擁虛器以聽命而已故不曰歸自京師紀實跡也衛侯與元咺相為出入君臣之道廢矣自晉侯伐衛至此凡八書可見伯權盛而王綱隳故諸侯大夫縱恣如此故曰尊君抑臣貴王賤伯春秋之大義也晉人秦人圍鄭此稱人程子所謂不知衆寡將帥名氏曰某人者也蓋圍鄭之國其兵衆矣不可以將卑師少言也使鄭果貳於楚晉猶不免無王命而摟諸侯伐諸侯之辠如以私怨而圍人之國則晉文之辠大矣王氏曰晉侯為盟主用兵以報私怨秦人踰晉越周千里而助晉圍鄭皆勞民危國之道介人侵蕭蕭見莊二十三年髙氏曰介人數來我不能以禮義正之致敢稱兵犯附庸之國義又見隠七年戎伐凡伯張氏曰介再來魯而次年遂侵蕭求援而後舉兵也與荆人秦術之聘同冬天王使宰周公來聘宰周公見九年左氏曰王使周公閲來聘貫道王氏曰冡宰總百官以輔一人者也承命以聘諸侯王失命閱失職莘老孫氏曰見周之衰而諸侯强盛也愚案禮雖有天子聘諸侯之文然魯未嘗朝王不過因㑹盟晉侯朝於王所而已襄王不能正王法而下聘焉已失道矣况遣冡宰乎陵遲甚矣又為下書遂如京師起文也朴鄉吕氏曰王臣來聘者八隠七年凡伯九年南季桓四年宰渠伯糾五年仍叔之子八年家父莊二十三年祭叔僖三十年宰周公宣十年王季子來聘桓王之聘於魯者五自隠七年至桓八年家父之聘是也在恵襄定之世各一自定以下則王臣無下聘者矣蓋桓王在位不能自强屢遣王臣下聘列國此周室之所以衰也定王而下則周室浸微王臣之聘不足以為列國之輕重而王臣下聘之文亦復不見於經此周室之極衰也始也使凡伯宰渠伯糾之屬皆以畿内諸侯或大夫爾至於僖三十年之聘書宰周公則已尊矣至於宣十年之聘書王季子則益尊矣王室日衰諸侯日横顧如此哉公子遂如京師遂如晉孫氏曰天子至尊非諸侯可得伉僖與襄王交聘伉孰甚焉故書天王使宰周公來聘公子遂如京師焉康侯胡氏曰魯侯既不朝京師而使公子遂往又以二事出夷周室於列國此大不㳟之辠在法當誅而不以聽者也康侯胡氏曰大夫出疆有以二事出者有以一事出而専繼事者其書皆曰遂公子遂如周及晉與祭公自魯逆王后皆所謂以二事出者也公子結往媵而及齊宋盟則専繼事者也是非得失則存乎其事矣愚謂以二事出者辠在其君以一事出而専繼事者辠在其臣辠各有所歸也三十有一年春取濟西田康侯胡氏曰不繫國者吾故田也髙氏曰嘗為鄰國所奪今復取之常山劉氏曰凡力得之曰取不是其専奪雖復取本邑亦無異辭以其不能申眀直辭請於王而正疆理但専自用兵争奪不得正道故悉同辭言之此與成二年取汶陽田先本魯地而皆書取蓋春秋之意以治易亂不以亂易亂所正者本而已常山劉氏曰凡取人之有其惡易見而取己之有不以其道者其惡難知春秋亦正名曰取以顯微也公子遂如晉義見隠七年齊來聘髙氏曰晉未嘗來聘而公子遂去冬往聘之今春又聘焉何厚於晉而薄於周也愚謂可見當時諸侯舉動皆不以義惟視强弱為趨舍而已然東門氏之専政亦不可掩也夏四月四卜郊不從乃免牲猶三望孫氏曰郊者祭天之名也劉氏曰卜郊者卜其日吉否也榖梁曰四月不時也郊自正月至於三月郊之時也我以十二月下辛卜正月上辛如不從則以正月下辛卜二月上辛如不從則以二月下辛卜三月上辛如不從則不郊矣杜氏曰免猶縱也朴鄉吕氏曰卜而養之曰牛養成而將用曰牲公羊曰三卜禮也四卜非禮也求吉之道三魯郊非禮也天子祭天諸侯祭土天子有方望之事無所不通諸侯山川有不在其封内者則不祭也三望者何望祭也然則曷祭祭泰山河海猶者何通可以已也何以書譏不郊而望祭也愚謂魯以諸侯僣天子之郊大失禮矣而失禮之中又四失禮焉四月不時一失禮也四卜則瀆二失禮也望祭則僣三失禮也既免牲而猶三望四失禮也聖人與天地合徳卜郊何有不從所以必設卜者誠之至義之盡也今四卜而不從則神不歆非類眀矣且猶望焉山川其饗諸董子曰魯曷為郊周公故也不於日之至避王室也比旬而卜之逺怠慢也必更三旬禮盡於三也孫氏曰天子祭天地無所不通諸侯祭其境内山川魯諸侯也以諸侯而用天子之祭僣孰甚焉故或因其黷亂不時或從其災異示變以著其僣天子之惡也朱長文曰魯當祭泰山魯之境也禮所得祭故不書三望僣天子之禮東萊吕氏曰凡書郊祭者九其八非卜不從則郊牛有傷獨成十七年九月用郊非二者而書魯之有郊非禮獨於僖公始書縁其變而録之爾愚案公羊以三望為泰山河海未詳是否秋七月冬杞伯姬來求婦杞伯姬見二十八年稱婦見二十五年劉氏曰姑無自求婦者也非禮也愚謂此與二十五年宋蕩伯姬來逆婦同義但彼則逆而此則求爾康侯胡氏曰婦人不可預國事也王后之詔命不施於天下夫人之教令不施於境中婚姻大事也杞獨無君乎為夫人主之也故書以為婦人亂政之戒母為子求婦猶曰不可况於他乎此義行無吕武之禍矣張氏曰易曰歸妹天地之大義人之終始也征㓙位不當也无攸利柔乗剛也杞伯姬求婦而踰境是杞伯之不能正其家也僖公容其來求是使柔乗剛而國事制於婦人也春秋閑有家之道嚴矣狄圍衛十有二月衛遷于帝丘杜氏曰帝丘東郡濮陽縣故帝顓頊之墟故曰帝丘張氏曰屬開徳府康侯胡氏曰遷於帝丘避狄難也而衛國衰微狄人强盛成公不能自强於政治晉文公無敵王愾安諸侯之功莫不見矣莘老孫氏曰春秋書之又見其勞民擾衆去先君之土宇雖云避難而行然不能使難不加已而舉國以避之其為勞且擾亦甚矣張氏曰齊桓即世衛從宋襄伐齊於是狄人始假義以伐衛啟狄之宼蓋始於此今復圍衛衛迫於狄而遷都也三十有二年春王正月夏四月己丑鄭伯㨗卒㨗公羊作接杜氏曰文公也大意見隠七年滕侯卒衛人侵狄秋衛人及狄盟杜氏曰不地者就狄廬帳盟左氏曰夏狄有亂衛人侵狄狄請平焉秋衛人及狄盟義見隠二年盟戎於唐康侯胡氏曰盟㑹中國諸侯衰世之事己非春秋所貴况乗人之亂刑牲歃血以要之哉冬十有二月己卯晉侯重耳卒義見隠三年宋公卒貫道王氏曰重耳定伯功儕齊桓而聖人譎之借曹衛以致楚使宋舍晉而賂齊秦皆譎也然未嘗滅人之國則猶賢於桓此所以身死而伯業不失也髙氏曰或問春秋孰賢曰東遷之後土疆不守職貢不奉朝覲之禮盡廢征伐之事専出皆辠人也曰不有齊桓晉文乎周室既衰諸侯既熾以大吞小以强暴弱外域乘之横乎中國天子所存位與號耳是時二伯奮起齊桓仗大義倡之於前晉文眀大順和之於後内率諸侯以尊王室外攘荒服以尊中國而皆謂辠人可乎曰齊桓晉文徒有尊周之名而無尊周之實雖曰内率諸侯以尊王室其實内率諸侯以尊己也假尊王室之名以令諸侯耳孔子作春秋以明王道以撥亂世故召陵之盟城濮之戰與其攘楚人救中國一時之權也故孟子曰仲尼之徒無道桓文之事者又曰五霸三王之辠人也三十有三年春王二月秦人入滑滑見莊十六年義見隠七年戎伐凡伯齊侯使國歸父來聘左氏曰齊國莊子來聘義見隠七年齊來聘夏四月辛巳晉人及姜戎敗秦師于殽公羊無師字杜氏曰姜戎姜姓之戎居晉南鄙戎子駒支之先也左氏曰三十二年冬杞子自鄭告於秦曰鄭人使我掌其北門之管若潛師以來國可得也穆公訪諸蹇叔蹇叔曰勞師以襲逺非所聞也師勞力竭逺主備之無乃不可乎師之所為鄭必知之勤而無所必有悖心且行千里其誰不知公辭焉召孟眀西乞白乙使出師於東門之外蹇叔哭之曰孟子吾見師之出而不見其入也公使謂之曰爾何知中壽爾墓之木拱矣蹇叔之子與師哭而送之曰晉人禦師必於殽殽有二陵焉其南陵夏后臯之墓也其北陵文王之所辟風雨也必死是間余收爾骨焉秦師遂東三十三年秦師過周北門左右免胄而下超乘者三百乘王孫滿尚㓜觀之言於王曰秦師輕而無禮必敗輕則寡謀無禮則脱入險而脱又不能謀能無敗乎及滑鄭商人弦髙將市於周遇之以乘韋先牛十二犒師曰寡君聞吾子將步師出於敝邑敢犒從者不腆敝邑為從者之淹居則具一日之積行則備一夕之衛且使遽告於鄭鄭穆公使視客館則束載厲兵秣馬矣使皇武子辭焉曰吾子淹久於敝邑唯是脯資餼牽竭矣為吾子之將行也鄭之有原圃猶秦之有具囿也吾子取其麋鹿以間敝邑若何杞子奔齊逢孫楊孫奔宋孟眀曰鄭有備矣不可冀也攻之不克圍之不繼吾其還也晉原軫曰秦違蹇叔而以貪勤民天奉我也奉不可失敵不可縱縱敵患生違天不祥必伐秦師欒枝曰未報秦施而伐秦師其為死君乎先軫曰秦不哀吾䘮而伐吾同姓秦則無禮何施之為吾聞之一日縱敵數世之患也謀及子孫可謂死君乎遂發命遽興姜戎敗秦師於殽獲百里孟眀視西乞術白乙丙以歸文嬴請三帥曰彼實構吾二君寡君若得而食之不厭君何辱討焉使歸就戮於秦以逞寡君之志若何公許之秦伯素服郊次鄉師而哭曰孤違蹇叔以辱二三子孤之辠也不替孟眀孤之過也大夫何辠且吾不以一眚掩大徳劉氏曰秦與人之臣而謀其君利人之喪而襲其國弱人之孤而死其親貪得其地而棄其師者也孫氏曰晉襄公厄人於險非仁也却䘮用兵非孝也邦衡胡氏曰春秋書及姜戎夫姜戎者文公與之南鄙之田君子己非之乃與之共敗秦惡可知矣愚謂諸侯相侵伐治之是也然必視吾國之無故然後請於王而擊之可也若居喪而見伐不得已而應之可也秦雖不道本伐鄭耳不及晉也乃背殯從戎雖獲一時之勝然比之行一不義殺一不辜而得天下不為者何啻天壤之殊春秋正義不謀利眀道不計功不以一時有勝秦之功而取之也義又見莊二十年齊伐戎君舉陳氏曰秦晉之構怨自是始更五君交兵無虛嵗曾不十年晉遂不競而楚伯康侯胡氏曰杞子先軫之謀偷見一時之利徼幸其成自以為功者也二君皆過聽焉而貪其利是使為人臣者懐利以事其君為人子者懐利以事其父利之所在則從之矣何有於君父文公之喪五月耳墨經從戎而大倫滅矣春秋所以立人道存天理也癸巳𦵏晉文公髙氏曰此見襄公父死未𦵏而尋干戈也義又見隠三年𦵏宋穆公狄侵齊左氏曰狄侵齊因晉䘮也義見隠七年戎伐凡伯公伐邾取訾婁訾子思切訾婁公羊作叢榖梁作訾樓左氏曰以報升陘之役義見隠四年莒伐杞秋公子遂帥師伐邾帥公羊作率康侯胡氏曰此皆不勝忿慾報怨貪得恃强陵弱不義之兵也直書其事而辠自見矣義又見隠二年鄭伐衛存耕趙氏曰取訾婁已甚矣復伐焉君臣同惡也遂専一軍於是再見兵不戢而佳其不為亂階乎晉人敗狄于箕范氏曰箕晉地杜氏曰太原陽邑縣南有箕城義見莊二十年齊伐戎許氏曰自三十年狄始侵齊晉未暇討自是中國嵗有狄患至敗於此而後懲艾不復犯略冬十月公如齊左氏曰齊國莊子來聘自郊勞至於贈賄禮成而加之以敏臧文仲言於公曰國子為政齊猶有禮君其朝焉臣聞之服於有禮社稷之衛也冬公如齊朝且弔有狄師也義見僖十年髙氏曰公本事齊逮晉文伯而受盟焉至是晉文已卒齊侯一使卿來聘而公遂往朝之蓋魯因晉喪既伐邾矣故懼晉而改事齊也公之季年所為若是十有二月公至自齊貫道王氏曰公嘗如齊矣未嘗至也此何為至哉公反自齊而薨嫌以齊故也義又見桓二年公至自唐乙巳公薨于小寢杜氏曰小寢内寢也左氏曰公如齊反薨於小寢即安也榖梁曰非正也義又見隠三年宋公卒東萊吕氏曰古人正終事甚重凡諸侯薨當在路寝雖病於小寢其甚危之時不可不勉强出就路寢故男子不死於婦人之手髙氏曰生不請天子之命而自立既不正其始死又不於正寢是不正其終也春狄所以詳著之康侯胡氏曰周制王宫六寢路寢一小寢五君日出而眡朝退適路寢聽政使人眡大夫退然後適小寢釋服是路寢治事之所也而小寢燕息之地公羊以西宫為小寢魯子以諸侯有三宫則列國之治蓋降於王其以路寢為正則是君終不於路寢則非正矣曽子曰吾得正而斃又何求哉古人貴於得正乃如此直書而義自見矣許氏曰君子自治常使心熟於仁而體安於禮則正勝於死生之際終不可亂矣隕霜不殺草李梅實公羊曰記異也何異爾不時也存耕趙氏曰霜隕矣草宜殺而不殺木宜萎而李梅實異也康侯胡氏曰哀公問於仲尼曰春秋記隕霜不殺草何為記之也曰此言可殺也夫宜殺而不殺則李梅冬實天失其道草木猶干犯之而況君乎是故以天道言四時失其序則其施必悖無以統萬象矣以君道言五刑失其用則其權必喪無以服萬民矣蓋除惡於微慮患於早之意也莘老孫氏曰隂陽四時之氣天地所以生殺萬物者也雨露生之雪霜殺之天地自然之氣而四時之常也皇極之道行而和氣塞於天地之間則隂陽有常而生殺以時彞倫攸斁天遏於隂陽則當生者不生當殺者不殺京房氏曰君假臣權隕霜不殺草蓋草小人之類也霜不能殺猶人君威不能制小人矣許氏曰僖公寛仁過厚其失也豫而文公以暗弱繼之三桓之盛自僖公始卒以専魯咎證著矣獻可杜氏曰春秋詳記災異不遺微細所以謹人君之戒也家氏曰嚴冬不殺氣燠也若謂此十二月為建亥月則夏時之十月草未盡殺猶或有之春秋何以遽書為異乎杜氏以其長厯而推謂此十二月乃周之十一月今九月也指此為舊史記録之誤春秋因之若九月之霜不能殺草尤未足為異春秋何以動色而書之此夏正之冬何疑晉人陳人鄭人伐許左氏曰討其貳於楚也張氏曰許自文公所不能致襄公今年敗秦敗狄又伐先世所不致之許孔子曰逺人不服則修文徳以來之今襄公承業之志自以為勤然不知忘喪毒民失道甚矣義又見隠二年鄭伐衛春秋本義卷十三
