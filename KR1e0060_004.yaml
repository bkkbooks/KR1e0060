body:
  text: 春秋本義卷四元程端學撰桓公名軌史記又名允惠公庶子隱公弟元年春王正月公即位杜氏曰嗣子定位於初喪而改元必須踰年者繼父之業成父之志不忍有變於中年也諸侯每嵗首必有禮於廟諸侯遭喪繼位者因此而改元正位百官以序故國史亦書即位之事於策桓公篡立而用常禮欲自同于遭喪繼位者戴氏曰桓公志在得國諱其故而晏然行即位之禮春秋即其實而書之張氏曰桓公弒君而立在周禮九伐之法當伏賊殺其親之罪今書公即位見周王之無政與魯之臣子忘不共戴天之讎而推戴弒君之賊辨冕南面立乎其位也穀梁曰繼故不言即位正也先君不以道終則子弟不忍即位也繼故而言即位則是與聞乎弒也先君不以其道終已正即位之道而即位是無恩於先君也愚案十二公或書即位或不書即位因舊史也豈徒因舊史哉各以見義焉耳夫諸侯嗣位必受于先君請于天子然後即位以奉天子正朔文成襄昭哀五君書即位者受于先君也定公不受于先君亦書即位者為季氏所立而行即位之禮也莊閔僖不書即位以繼故不行即位之禮也隱公非繼故亦不書即位者亦以不行即位之禮也若其所以不行即位之禮則不可得而知矣桓宣雖繼故而亦書即位者桓宣事與莊閔僖異矣莊閔僖之先君見弒于他人桓宣則弒君自立肆然行即位之禮舊史安得不書即位哉聖人安得不書即位以見義哉故十二公不問書即位不書即位皆有不請命天王之罪惟桓宣有罪之中重有罪焉聖人雖因舊史而其罪惡自不可掩所以戒後世者深矣餘見僖公即位三月公會鄭伯于垂杜氏曰垂犬邱衛地張氏曰軌篡立而懼諸侯之討已欲外結好以自固鄭亦欲乘此機以求許田故會于垂篡弒之人凡民罔不憝而鄭莊首與為會罪鄭伯也義又見隱九年會于防莘老孫氏曰桓公弒君之賊天地所不容人人所同誅者鄭與魯同好往來之國不能舉大義誅凶逆以正王道以明諸侯討賊之義而規規于尺寸之土分毫之利親去南面之尊而會弒君之賊鄭伯之罪不容誅矣葉氏曰隱公初齊晉猶未強鄭莊公獨雄諸侯及使宛來歸祊之後隱遂舍宋而事鄭伐宋入許無不與之同者此桓之所畏也是其首求于鄭者歟鄭既得賂然後始同好而為越之盟三傳蔽于易祊之言而不知許田之為賂是以并垂之事而失之鄭伯以璧假許田假借也璧瑞玉環也公羊曰許田者魯朝宿之邑也劉氏曰周公之邑也詩云居常與許復周公之宇蓋非方伯不得有湯沐之邑非周公不得世享其地愚謂鄭莊以璧歸魯以假為名實求許田朴鄉吕氏所謂鄭將以要魯而為之辭者也孫氏曰天子所封不可假也擅假天子之田自恣若此髙氏曰先言會于垂而繼言假許田見鄭伯貪利忘義之甚也夏四月丁未公及鄭伯盟于越杜氏曰越近垂地名程子曰桓公欲結鄭好以自安故既與許田又為盟也弒君之人凡民罔弗憝而鄭與之盟以定之其罪大矣康侯胡氏曰是肆人欲而滅天理等倫紀于辨髦化人類為禽獸聖人所為懼春秋所以作也義又見隱元年盟于蔑愚案春秋先書隱公薨而不地以著其見弒繼書桓公晏然行即位之禮繼書公會鄭伯于垂繼書鄭伯以璧假許田繼書公及鄭伯盟于越于是桓公弒逆篡立鄭伯貪利黨惡之罪顯如日星所謂屬辭比事春秋教也何俟一字褒貶哉秋大水公羊曰記災也莘老孫氏曰大者非常之辭水非常而為災或害禾稼敗廬舍凡為災則書之也水者隂也隂之盛至于大水而為災則陽不勝隂而隂專盛矣聖人既著其為災之迹又以見當時天下有召災之實春秋之間一魯國之小而大水者八天下之災又可勝紀乎董子曰水者隂滅陽也隂滅陽者卑勝尊也日食亦然皆下犯上賤傷貴逆節也孫氏曰水不潤下也昔者聖王在上五事修而彞倫敘則休徴應之聖王不作五事廢而彞倫斁則咎徴應之春秋之世多災異者聖王不作故也然自隱迄哀聖王不作久矣天下之災多矣悉書之則不勝書是故孔子惟日食與內災則書之外災則或舉一二則天下之異從可知矣康侯胡氏曰大水者隂逆而與怨氣并也桓行逆德而致隂沴冝矣或問堯之時而曰洚水警豫者何也曰堯開闢以來水之行未得其歸故堯有憂焉使禹治之然後人得平土而居之耳是知天非為堯有洪水之災至禹而後水由地中行耳後世有人為不善感動天變召水災者必引堯為解惑矣冬十月二年春王正月戊申宋督弒其君與夷及其大夫孔父督大宰華父名也與夷殤公名也髙氏曰案宋世系正考父生嘉字孔父孫氏曰字者命大夫也劉氏曰名也前説近是左氏曰隱三年宋穆公疾召大司馬孔父而屬殤公焉曰先君舍與夷而立寡人寡人不敢忘苟以大夫之靈得保首領以沒先君若問與夷其將何辭以對請子奉之以主社稷寡人雖死亦無悔焉對曰羣臣願奉馮也公曰不可先君以寡人為賢使主社稷若棄德不讓是廢先君之舉也豈曰能賢光昭先君之令德可不務乎吾子其無廢先君之功使公子馮居于鄭宋穆公卒殤公即位桓二年宋殤公立十年十一戰民不堪命孔父嘉為司馬督為大宰故因民之不堪命先宣言曰司馬則然已殺孔父而弒殤公召莊公于鄭而立之以親鄭張氏曰華督蓋馮之黨也將弒與夷而憚孔父故先殺孔父穀梁曰孔父先死其曰及何也書尊及卑也康侯胡氏曰孔父為司馬無能改于其德非所謂格君心之非者然君弒死于其難處命不渝亦可無愧矣愚謂殤公見弒已兆于宣公舍殤公而立穆公穆公又舍馮而立殤公之日而成于殤公不務修政以實其國而比比焉以伐鄭殺馮為心故及此禍義見隱四年衛州吁事莘老孫氏曰春秋之時見弒之君二十四死難之臣三人而已孔父仇牧荀息當是時天下之為人臣者或亡國以自存或賣君而苟位滔滔是也三人者或投萬死以赴君之難或持大義以障君之賊事既不果以死繼之君存則與之俱存君死則與之俱死食君之祿立君之朝義不忍與姦臣賊子並生于時冒白刃投死地以同君之禍皎然不欺其心而自得其死所孔子安得不與之乎然而三人之中其節最髙者孔父也劉氏曰孔父之智則未孔父之忠則盡矣託六尺之孤寄百里之命可謂處命不渝矣君舉陳氏曰死節人臣之極致也誼與其君存亡者也苟不然則不書故晉欒書中行偃先殺胥童而後弒君不言及楚商臣先殺鬬勃而後弒君不言及愚謂春秋書及其大夫孔父非褒孔父也傷世變也何傷世變也名不正而作亂也君不仁而纍其臣也賊弒其君又及其臣也孫氏所謂甚之者是也而説春秋者但褒孔父之賢而不及臣弒君賊賢之大變則是論其末而遺其本矣不可以不辨後仇牧荀息事倣此滕子來朝滕本侯爵而稱子者戴氏曰小國爵尊而貢重者多自貶以從其卑春秋從而書之不沒其實也存耕趙氏曰春秋諸侯放恣小國往往自卑貶以求容覲禮廢而班爵不得其正滕杞之類是也愚謂二説相兼其義乃備來朝見隱十一年康侯胡氏曰春秋為誅亂臣討賊子而作使人人知亂臣賊子之為大惡而莫之與則無以立于世莫敢動于為惡而篡弒之禍止矣今桓公以臣弒君為天下之大惡凡民罔弗憝也巳不能討又先鄰國而朝之是反天理肆人欲春秋之所深惡也義又見隱十一年滕薛來朝朱子曰程沙隨作春秋解説滕子來朝處最好如隱公十一年方書滕侯薛侯來朝如何到桓二年便書滕子來朝先儒為説甚多或以為時王所黜故降而稱子不知是時時王已不能行黜陟之典就使能黜陟諸侯當時亦不止一滕之可黜或以春秋惡其朝桓特削而書子自此之後滕一向書子豈春秋惡其朝桓而并後代子孫削之乎或以當喪未君前又不見滕侯卒皆不通之論沙隨則謂此見得春秋時小國事大國其朝聘貢賦之多寡隨其爵之崇卑滕子之事魯以侯禮見則所供者多故自貶降而以子禮見庶得貢賦省少易供之也恐是如此緣後面鄭朝晉云鄭國男也而使從公侯之賦見得鄭本是男爵後襲用侯禮以交於大國初焉不覺其貢賦之難辦後來益困於此方説出此等話非獨是鄭想當時小國多是如此孫氏曰杞公爵也滕薛侯爵也春秋時杞稱公正也稱伯稱子降也滕薛稱侯正也稱伯稱子降也此蓋周道陵遲諸侯自恣朝覲不常此三國來朝禮多不備或以侯禮而朝或以伯禮而朝孔子從而録之以著亂也三月公會齊侯陳侯鄭伯于稷以成宋亂杜氏曰稷宋地成平也宋有弒君之亂故為會欲以平之愚謂諸侯當討宋亂不當平宋亂宋有弒君之賊諸侯上告天子下告方伯殺華督詢可立之君而立之天下庶乎其可理也今不討賊而後書取鼎則是平宋亂乃黨亂賊也四國之惡著矣聖人據實録之為後世有天下國家者之大戒也君舉陳氏曰弒君之禍接迹于天下于是焉始也向也立五國之君大夫以定州吁而州吁訖于討今也合四國之君以立華督遂相宋莊弒君之禍接迹于天下四君為之也陸氏曰上言伐衛次言王人救衛下言衛侯朔入于衛則知逆王命上言成宋亂下言納鼎則知貪賂縱罪凡此類上下相應而見其理愚謂陸氏之論即春秋屬辭比事之法非區區一字褒貶之謂讀者詳之夏四月取郜大鼎于宋戊申納于大廟郜古報切大廟之大音泰杜氏曰濟隂城武縣東南有北郜城張氏曰郜大鼎郜所造器也莘老孫氏曰鼎自宋得之謂之郜大鼎者鼎之成自郜也若和氏之璧雲和之琴瑟之類是也穀梁曰曰宋取之宋也張氏曰大廟周公之廟也左氏曰會于稷以成宋亂為賂故立華氏也以郜大鼎賂公齊陳鄭皆有賂故遂相宋公取郜大鼎于宋納于大廟非禮也臧哀伯諫曰君人者將昭德塞違以臨照百官猶懼或失之故昭令德以示子孫是以清廟茅屋大路越席大羮不致粢食不鑿昭其儉也衮冕黻珽他頂切帶裳幅舄衡紞多敢切紘獲耕切綖音延昭其度也藻率音律鞞補頂切鞛布孔切鞶厲遊纓昭其數也火龍黼黻昭其文也五色比象昭其物也鍚鸞和鈴昭其聲也三辰旗旗昭其明也夫德儉而有度登降有數文物以紀之聲明以發之以臨照百官百官于是乎戒懼而不敢易紀律今滅德立違而置其賂器于大廟以明示百官百官象之其又何誅焉國家之敗由官邪也官之失德寵賂章也郜鼎在廟章孰甚焉武王克商遷九鼎于洛邑義士猶或非之而況將昭違亂之賂器于大廟其若之何公不聽孫氏曰甚之也桓弒逆之人受督弒逆之賂以事于周公之廟可謂甚矣葉氏曰廟之有器所以尊德不義薦之是之謂瀆其祖邦衡胡氏曰納于大廟足以知公無亷恥畏憚猶欲誇神以為功也康侯胡氏曰弒逆之賊不能致討而受其賂置于大廟以明示百官是教之習為弒逆叛亂之行也公子牙慶父仲遂之惡又何誅焉聖人為此懼而作春秋其垂訓後世使知寵賂之行保邪廢正能敗人之國家也亦或知戒矣戴氏曰書成亂于前書取鼎于後惡自見矣秋七月紀侯來朝紀左氏作杞程子曰凡杞稱侯者當為紀杞時爵已非侯文誤也及紀侯大去其國之後杞不復稱侯矣義見滕子來朝蔡侯鄭伯會于鄧杜氏曰潁川召陵縣西南有鄧城孔氏曰賈服以鄧為國言蔡鄭會于鄧之國都釋例以此潁川鄧城為蔡地其鄧國則義陽鄧縣是也以鄧是小國去蔡路逺蔡鄭不冝逺會其都且蔡鄭懼楚始為此會何當反求近楚小國而與之結援故知非鄧國也左氏曰始懼楚也莘老孫氏曰是時楚方僭號欲伯中國蔡鄭國小而逼于楚懼而謀自安之計孔子書之所以見中國衰而荆蠻盛小國恐懼而盟會不暇也義又見隱九年會于防康侯胡氏曰楚自西周已為中國患宣王蓋嘗命將南征矣及周東遷僭號稱王憑陵江漢其後卒虜蔡侯而鄭以王室懿親為之服役終春秋之世聖人蓋傷之也夫天下莫大于理莫強于信義循天理惇信義以自守其國家荆楚雖大何懼焉不知本此事醜德齊莫能相尚則以地之大小力之強弱分勝負矣觀諸侯會盟離合之迹而夷夏盛衰之由可考也九月入杞榖梁曰我入之也程子曰將卑師少稱人內則止云入某伐某義見隱二年入向此則弒逆之賊入人之國見王政之不行而無忌憚之甚也髙氏曰此年入杞八年入邾其辭雖略而罪有餘也夫桓弒君莫入莫伐而已乃入人伐人是使天下共蒙其恥也公及戎盟于唐義見隱二年盟于唐冬公至自唐康侯胡氏曰凡為人子者出必告反必面事亡如事存故君出必告廟反必奠而後入禮也出必告行反而告至常事爾何以書志其去國踰時之久也常山劉氏曰君行其至必書于法當然也古之諸侯朝會有常節出入有常期周衰以後無法妄行征伐會盟紛紛四出棄社稷委人民往往越月踰嵗而後得返觀其所書而其亂自著矣愚謂亦有未踰時而書至者蓋諸侯動必以正然後有以告于宗廟而書至今會盟侵伐莫非不正而亦以告廟則非所以事其祖也後倣此莘老孫氏曰春秋書至者皆致其所出之事以地至者四而已此年公至自唐文十七年公至自榖定八年公至自瓦十年夏公至自夾谷四處爾朴鄉吕氏曰其或不書者史闕之也一出而二事致或致其前或致其後致其重者也三年春正月公會齊侯于嬴音盈杜氏曰嬴齊邑泰山嬴縣張氏曰所謂嬴博之間蓋齊之東南邑左氏曰成婚于齊也杜氏曰公不由介紹自與齊侯會而成婚非禮也張氏曰亂臣賊子與會而為婚著齊侯之罪也義又見隱九年會于祊莘老孫氏曰秋七月遂有公子翬如齊逆女之事是于未婚之前而為此會也婚禮有六皆稱父兄之命以遣使者所以養廉逺恥示萬世之嗣不可輕也今桓公不由介紹之命媒妁之言身至齊境以與齊謀己之婚醜惡見矣存耕趙氏曰桓畏不義之誅申好于齊以遂終篡夫婦人倫之大而請婚其始也動不顧義取輕于齊終之以文薑之禍不能謹其始也夏齊侯衛侯胥命于蒲君舉陳氏曰胥命者交相命也宋氏曰莫相下也杜氏曰蒲衛地在陳留長垣縣西南張氏曰開封府長垣縣古蒲邑劉氏曰齊太公之後東州之侯也衛康叔之後北州之侯也以事相命也古者有方伯有州牧有連帥命于天子正也自相命非正也存耕趙氏曰王言作命臣下稟令命自上出者也以諸侯而命諸侯世道之變也周室雖衰天命未改齊祿父衛晉不能作周孚先朝京師以聽王命乃胥命于蒲六月公會紀侯于郕音成紀左氏榖梁作杞公羊作紀今依程子作紀郕左氏榖梁作郕公羊作盛今從左榖作郕郕見隱五年范氏曰郕魯地恐非張氏曰紀與魯親而求援于魯以抗齊鄭故桓公因其二年來朝而與之會也義見隱九年會于防程子曰自桓公篡立無嵗不與諸侯盟會結外援以自固也許氏曰姻大國服小國著得意也天下無王而亂人得意如此秋七月壬辰朔日有食之既榖梁曰言日言朔食正朔也既者盡也義見隱三年此則食之既天變尤大耳杜氏曰厯家謂日光以望時遙奪月光故月食日月同會月掩日故日食食有上下者行有髙下日光輪存而中食者相掩密故日光溢出皆既者正相當而相掩間疏也公子翬如齊逆女髙氏曰翬至此稱公子者桓公命為卿故也張氏曰或曰王命也陸氏曰女文薑也啖氏曰翬以公子而行婚禮尤不可也葉氏曰魯諸公十有二見逆女者四皆以違禮失常也莊書公如齊逆女不正公親逆也桓書公子翬逆女宣書公子遂逆女翬桓公之弟惠公之子遂宣公之弟文公之子不正其以叔逆嫂也成書叔孫僑如逆女僑如成公之族叔父叔孫得臣之子不正其以尊逆卑也古者天子嫁女乎諸侯以諸侯同姓者主之諸侯嫁女乎大夫以大夫同姓者主之主之以敵大夫可也逆之于他國不可也天下之本在國國之本在家父父子子夫夫婦婦兄兄弟弟而家道正魯之亂有如慶父仲遂之殺嫡者有如僑如之譖其君于伯主而止之者皆自其家失之九月齊侯送薑氏于歡公會齊侯于歡呼端切杜氏曰歡魯地濟北蛇邱縣西有下歡亭榖梁曰禮送女父不下堂母不出祭門諸母兄弟不出闕門父戒之曰謹慎從爾舅之言母戒之曰謹慎從爾姑之言諸母般申之曰謹慎從爾父母之言送女踰竟非禮也康侯胡氏曰為齊侯來乃逆而會之于歡是公之行其重在齊侯而不在薑氏豈禮也哉邦衡胡氏曰公果親逆自當書逆女必不曰會齊侯也此直曰會見公因會齊侯而受薑氏耳張氏曰聖人制禮不可過不可不及僖公之送桓公之會皆非所以正大婚而正人倫之始春秋所以書之也存耕趙氏曰觀薑氏會歡之書則知薑氏失行之所由實桓公有以啓之夫人薑氏至自齊邦衡胡氏曰易曰漸女歸待男行也女歸必待男乃行夫人薑氏不與公俱至故先書公會齊侯于歡次書薑氏至自齊以見公會于歡本非親迎非易待男之義也榖梁曰不言翬之以來何也公親受于齊侯也康侯胡氏曰禮者所以别嫌明微制治于未亂不可不謹也娶夫人國之大事故詳之愚案先書公會齊侯于嬴次書公子翬逆女次書齊侯送薑氏于歡次書公會齊侯于歡又書夫人至自齊雖各有失禮之譏實為後日文薑淫亂桓公見殺起也蓋齊家之道不一正其始終必有莫大之禍屬辭比事履霜之戒深矣冬齊侯使其弟年來聘義見隱七年有年榖梁曰五榖皆熟為有年孫氏曰桓十八年惟此言有年者是未嘗有年也書者所以見桓公為國不能勤民務農若是也康侯胡氏曰桓宣享國十八年獨此二年書有年他年之歉可知也愚謂至治之世人事順隂陽和四時序風雨節未有無年者也中庸所謂天地位萬物育洪範所謂五事修而休徴應也春秋之時人事亂常隂陽乖戾四時錯令風雨不時洪範所謂五事不修而咎徴應詩所謂天降喪亂降此蟊賊稼穯卒癢者也故五榖傷耗荒涼鮮薄觀夫大旱大水螽螟蝝􅈮無冰木冰殺菽李梅實可見矣故此書有年以見其餘未嘗有年五榖間熟而無全熟也豈特桓宣而已哉四年春正月公狩于郎公羊曰狩者何田狩也冬曰狩郎見隱九年木訥趙氏曰郎今之單父魯臺地近宋愚謂春搜夏苗秋獮冬狩各以其時見于周禮爾雅左氏者詳矣春月禽獸生育當擇取之故搜冬物既成可圍守取之故狩且狩有常所今當春而狩不時也逺狩于郎非所也不時非所害物多矣不仁甚矣聖人書此為後世戒啖氏曰搜狩合禮者常事不書非時及越禮而為之則書以示譏也李氏曰田狩之地須有常者古者民多地狹惟在山澤之間乃有不植之地故天子諸侯必于封內擇隙地而為之如鄭之原圃秦之具囿是其諸國各有常狩之處也違其常處則犯害居民故書地以譏之存耕趙氏曰狩必有藪澤魯有咸邱狩之常處也舍之而于郎非地也孫氏曰狩冬田也天子諸侯四時必田者蓋安不忘危治不忘亂講武經而教民戰也豈徒肆盤逰逐禽獸而已哉然禽獸多則五榖傷不可不捕也故田以捕之上以供宗廟之事次以除稼穡之害下以訓軍旅之事故田必以時殺必由禮田不以時謂之荒殺不由禮謂之暴惟荒也妨于農惟暴也殄于物此聖人之深戒也莘老孫氏曰春謂之搜者方春之時禽獸孳尾生育之際不可盡殺搜言其擇取之也夏謂之苗夏之時田苗盛長有禽獸害苗則田焉言其為苗而田也秋謂之獮時方肅殺可以順天時而殺物也冬謂之狩狩猶守也冬物畢成可以圍守而取之也天子諸侯無事則嵗田焉田者用民以訓軍旅也取物以祭宗廟也然而用民不以制則傷乎農取物不以禮則物害乎性故在田之以時也中春教振旅遂以搜中夏教茇舍遂以苗中秋教治兵遂以獮中冬教大閲遂以狩所謂四時之田不傷民不害物以示天下之孝與武也周室既衰斯禮不講既不以時又不以禮其傷民害物莫此為甚故春秋于魯五書其搜三書其狩皆譏不時不禮也康侯胡氏曰春秋必書謹于微之意也夏天王使宰渠伯糾來聘杜氏曰宰官渠氏范氏曰伯糾字也康侯胡氏曰天子大夫例稱字邦衡胡氏曰案周有六官大者曰冢宰小者曰小宰曰宰夫小宰爵大夫宰夫則大夫士兼有之咺稱名者以士也伯糾稱字者大夫也程子曰桓公弒其君而立天子不能治天下莫能討而王使其宰聘之示加尊寵天理滅矣人道亡矣義又見隱七年凡伯來聘莘老孫氏曰桓公弒君自立天下大惡之人然常恐懼見討于當時今天王之宰聘之則是成桓公弒君之罪而使孤臣孽子含憤忍痛于君父之讎窮天而不報也木訥趙氏曰王臣下聘者八聘允者獨三允之罪尤著而周之聘尤亟以是知周之自取微弱也朴鄉吕氏曰不書秋冬闕文也西疇崔氏曰桓四年七年無秋冬定十四年無冬桓十四年書夏五而闕其月莊二十二年書夏五月而闕其事僖二十八年書壬申而不繫之月桓十年書五月而不繫之夏昭十二年書十二月而不繫之冬郭公仲孫忌與凡日食而不繫日者皆闕文也五年春正月甲戌孫氏曰闕文也蓋甲戌之下有脫事爾陸氏曰傳云公疾難作此文亦據陳國史而記之驗此則甲戌下當記陳他作亂之事全簡脫之爾劉氏曰或曰陳侯之弟他殺陳世子免云爾未詳是否已丑陳侯鮑卒義見隱三年宋公卒夏齊侯鄭伯如紀陸希聲曰自此適彼曰如愚謂如往也齊鄭欲滅紀故往窺其形勢虛實也程子曰齊為諸侯而欲為賊于鄰國不道之甚鄭伯助之其罪均矣莘老孫氏曰春秋之時齊鄭強大而紀最小不能當齊鄭百分之一此紀侯之朝事不暇者而齊鄭往焉有以窺之也故桓十三年之戰而莊元年遷其郱鄑郚三年以酅入齊而紀亡矣張氏曰春秋之時齊鄭合謀以吞噬小國為事自隱三年石門之盟至桓十一年惡曹之盟二十年之間二國為一伐宋取郜防入郕入許今又相與謀紀自二君謀紀之後紀侯多為計以謀自免于難而卒不能止齊鄭貪噬之心至莊三年以酅入于齊四年紀侯去國然後快于心故春秋之初小國困于強暴者二君之罪居多春秋詳其相與之迹所以深誅之也康侯胡氏曰小國恃大國之安靖已乃包藏禍心以圗之亦異于興滅國繼絶世之義矣故夫子存而不削以著齊人滅紀之罪明紀侯去國之由天王使仍叔之子來聘仍榖梁作任莘老孫氏曰仍叔天子之大夫仍姓叔字也君舉陳氏曰仍叔之子非見大夫也愚謂使仍叔之子者仍叔為大夫因使其子為使也聘使不使大夫而使大夫之子子弟預國事敗其政矣況聘弒逆之賊乎義又見隱七年凡伯來聘髙氏曰不稱氏者世權不重于尹武也康侯胡氏曰卿大夫子弟以父兄故而見使則非公選而政由是敗矣周之衰小人得政視朝廷官爵為己私援引親黨分據要塗施及童稚賢者退處于蓽門身老而不用公道不行然後外寇侵陵國家傾覆雖有智者不能善其後矣春秋書武氏仍叔之子云者戒後世人主徇大臣私意用其子弟居公選之地以敗亂其國家欲其深省之也存耕趙氏曰渠伯糾來聘矣仍叔之子復來何王室之不憚煩蓋王綱解紐侯度放紛周望魯以夾輔之舊職故頻年而加禮焉桓逆賊非可望以大義也用見王室威柄既去惟有區區之恩意爾愚謂此事大旨在下聘弒逆之賊其使仍叔之子則一事而兼見者也蓋子弟預國政其禍遲寵弒逆之賊其禍速子弟預國政政之弊也以漸寵弒逆之賊則亂臣賊子不旋踵而接迹于天下矣葬陳桓公髙氏曰不書月史失之義見隱三年葬宋穆公城祝丘孫氏曰祝邱魯邑義見隱七年城中邱髙氏曰莊三十年夫人會齊侯于祝邱是齊魯兩境上邑也齊將襲紀公欲助紀畏齊之來討故非時城此以備之以桓之暴逆奪民之力則旱蝗應矣未詳是否秋蔡人衛人陳人從王伐鄭東萊吕氏曰天子得用諸侯之師故不曰以而曰從王臣聽君之辭也隱三年左氏曰鄭武公莊公為平王卿士王二于虢鄭伯怨王王曰無之故王子狐為質于鄭公子忽為質于周王崩周人將畀虢公政四月鄭蔡足帥師取溫之麥秋又取成周之禾六年鄭伯如周始朝桓王王不禮焉八年虢公忌父始作卿士于周桓五年王奪鄭伯政鄭伯不朝秋王以諸侯伐鄭未詳信否陸氏曰三國之君不行而使微者從王不待辨而罪見者也葉氏曰古者諸侯有罪方伯征之方伯不能服二伯征之二伯不能服而後王親征之諸侯而至于王親征之無以立于天下矣然則王無罪乎天下有道諸侯六年五服一朝莫敢不來享莫敢不來王諸侯不能服而王親征王亦病矣康侯胡氏曰桓公弒君而自立宋督弒君而得政天下大惡人理所不容也則遣使來聘而莫之討鄭伯不朝貶其爵可也何為憤怒自將以攻之也移此師以加宋魯誰曰非天討乎大雩公羊曰大雩者何旱祭也然則何以不言旱言雩則旱見記災也存耕趙氏曰孟夏建已之雩祈榖之常也他月之雩以旱而祭也程子曰大雩雩于上帝用盛樂也胡氏曰案禮天子雩于上帝諸侯雩于山川今魯為諸侯而雩于上帝僭孰甚焉後倣此孫氏曰建已之月常祀也常祀不書故二百四十二年無書四月而大雩者建午甲申之月旱祭則書故書大雩者二十一諸侯旱而雩禮也大雩于上帝非禮也賈氏曰言大别山川之雩諸侯雩上帝于是季氏旅泰山矣螽公羊作􅏑後同程子曰螽蝗也夾漈鄭氏曰古曰螽今曰蝗公羊曰記災也愚謂螽者乖戾之氣所生也生則害五榖大意與書螟同程子曰既旱又蝗飢不在書也春秋書螽十一冬州公如曹葉氏曰州公寰內諸侯王之上大夫也天子三公曰公嘗為公而食其邑者亦曰公州公嘗為公而食其邑者也孔氏曰曹國伯爵姬姓文王子叔振鐸之後也武王封之陶邱杜氏曰曹國濟隂定陶縣張氏曰在唐為曹州宋為興仁府濟隂縣趙氏曰州公者王臣也譏其外交故書之大意與隱元年祭伯來同葉氏曰二君也六年春正月實來實來孫氏曰闕文也夏四月公會紀侯于成榖梁作郕未詳孰是杜氏曰成魯地在泰山巨平縣東南左氏曰紀來咨謀齊難也黃氏曰齊欲圗紀紀魯甥也以魯婚于齊故求魯而公會之莘老孫氏曰其後齊終并紀會盟侵伐自此無已經書之所以見強國暴恣而小國微弱奔走不暇以救其危者也義又見隱九年會于防張氏曰此與二年書其朝三年會于郕同旨秋八月壬午大閲左氏曰簡車馬也戴氏曰仲冬教兵名曰大閲大閲非諸侯之所得為也況以秋八月行之康侯胡氏曰書八月不時矣書大閲非禮矣孫氏曰天子殺則下大綏諸侯殺則下小綏王執路鼓諸侯執賁鼓天子諸侯之田其禮異矣周室既微諸侯不道故書大閲大搜皆譏其僭天子之田也舉魯則諸侯之僭可知矣莘老孫氏曰周禮大司馬之職中春教振旅中夏教茇舍中秋教治兵中冬教大閲又因以行田獵之禮蓋王者一事不兼數者不為也然而大閲之禮比于三時最為盛大蓋當中冬之月田事已畢農功間隙之際又禽獸盛長取而無擇故也天子有天下諸侯有一國雖尊卑大小之不同軍旅之事皆不可忘宗廟之事皆不可忽故田獵以四時皆以習兵教戰取禽獸以供祭祀也但諸侯而行天子之禮又非其時則非也劉氏曰大閲之禮虞人萊野百步一表以旗致民選車徒命旗物辨鼓鐸會器械三鼓而行三鼓而趨三鼓而走不用命者殺無赦置旗以為左右和車徒敘和表貉獲禽不越逐不面傷大獸公之小獸私之冬事也秋興之非正也厲農甚矣邦衡胡氏曰古大閲必以狩今不言狩則知非古矣桓以兵革不足大合國人而閲之籍其不可用者以補卒乘之闕故曰大閲明年焚咸邱又明年伐邾平時不教民戰至于倉卒之間乃欲驅市人以戰爾殘民毒衆于是為甚此説未詳是否蔡人殺陳他左氏曰陳厲公蔡出也故蔡人殺五父而立之五父即陳他也孫氏曰稱人以殺討亂賊也先儒言陳侯鮑卒他殺太子自立蔡人誘而殺之經無所見程子曰他殺太子自立不能有其國故書曰陳他他天下之惡人皆得而誅之書蔡人見殺賊者衆人之公也未詳是否愚謂春秋有一事見一義者不必兼首尾其餘有首必有尾有尾必有首所謂屬辭比事者也蔡人殺陳他事之尾也而首不經見五年正月甲戌之下趙氏謂當記陳他作亂事豈其然乎然不可強解矣九月丁卯子同生子桓公子文薑所出即莊公同其名也榖梁曰疑故志之竹隱趙氏曰生子不書此何以書榖梁所謂疑故志之者得其説矣蓋方是時皆以子同為齊侯之子也猗嗟所謂展我甥兮者亦詩人據時人之言也故聖人因其生也正其名而書之髙氏曰齊襄文薑之淫亂蓋在同生之後當同之生齊魯未嘗亂也莊公母子夫婦男女之分慙德多矣不書其生則事不見愚謂自此可考莊公三十七嵗而始得娶則此又為莊二十四年公如齊逆女起文也案朱子釋詩展我甥兮有曰姊妹之子曰甥稱其為齊侯之甥又以明非齊侯之子此詩人之微辭也案春秋桓三年夫人薑氏至自齊六年九月子同生十八年桓公乃與夫人如齊則莊公誠非齊侯之子亦榖梁之意也冬紀侯來朝程子曰紀侯懼齊侯來朝以求助不能上訴于天子近赴于賢侯和輯人民效死以守而欲求援于魯桓不能保其國宜矣義又見隱十一年滕薛來朝七年春二月己亥焚咸丘杜氏曰咸邱魯地髙平巨野縣南有咸亭朱子曰咸邱魯地之近齊者貫道王氏曰咸邱即巨野郎之近地康侯胡氏曰焚咸邱焚林而田也月令曰仲春毋焚山林程子曰古者昆蟲蟄而後火田去莽翳以逐禽獸非竭山林而焚之也云焚咸邱如盡焚其地見其廣之甚矣戴氏曰仲春之月蟄蟲已啓萬物孳生豈容焚林而田邪康侯胡氏曰易稱王用三驅在禮天子不合圍諸侯不掩羣夫子釣而不綱弋不射宿皆愛物之意也推此心以及物至于鳥獸若草木裕無淫獵之過矣夏榖伯綏來朝鄧侯吾離來朝孔氏曰世本鄧曼姓榖不知何姓杜氏曰榖國在南鄉築陽縣北張氏曰後屬襄陽府榖城縣鄧即鄧州愚案二君書名未詳疑羡文義見隱十一年滕薛來朝或謂榖鄧見逼于楚而朝魯所謂小國附從不暇以救其危者比之無故而朝篡弒者其罪為輕曰二國苟見逼于楚宜莫如孟子告滕文公之法而朝篡弒之賊以覬免難難以為智矣宜其不旋踵而卒滅于楚也不書秋冬與四年同八年春正月已卯蒸公羊曰蒸冬祭也春曰祠夏曰礿秋曰嘗冬曰蒸榖梁曰蒸冬事也春興之志不時也康侯胡氏曰周官大司馬蒸以仲冬吕氏曰宗廟之禮有常非大皆不書惟失時及失禮之大乃書存耕趙氏曰魯之郊禘非禮也其他有事者二大事者一從祀者一皆非祀禮之正也桓之蒸者再嘗者一皆瀆禮不敬之大者祀者國之大事君臣上下狎而用之欲人知孝敬之實篤君親之義難矣黃氏曰榖梁曰蒸冬事也春興之志不時也趙氏曰周雖以建子為正至于祭祀則用夏時本月以行四時之祭胡氏曰夏數得天百王所同其商周革命改正示不相沿至于敬授民時巡狩蒸享猶自夏焉蓋無可改之禮聖人無謂冬為春之事商之建丑以異于夏周之建子以異於商皆以革命欲整一人心故以此月為嵗首受朝饗耳其建首之為十二月建子之為十一月固自若也建丑建子之為冬建寅而後為春固自若也聖人作春秋書春王正月夏四月秋七月冬十月正以順天時正人事所謂行夏之時見之行事者也周實未嘗改天時孔子亦初非改周制也自漢儒有三正之説杜氏有周正月今十一月之説諸儒遂以春秋之春為今日之冬每于繫時繫月之事隨事生説以為非時而譏之今以夏時參之未見其有非時者若此所謂正月蒸正以蒸乃冬祭春正月行之非禮爾春秋非夏正而何哉天王使家父來聘杜氏曰家父天子大夫家氏父字何氏曰家采地也天子中大夫氏采故稱字不稱伯仲也未詳孰是莘老孫氏曰桓公大惡之人也而五年之間來聘者三春秋一切書之所以見不能討惡而王道之衰遂使篡人得志也存耕趙氏曰五年之中周三聘魯古者七年一聘周則過矣六年一朝自隱至桓未嘗一至天子之庭魯之罪將焉逃春秋書之傷周責魯之意隱然矣夏五月丁丑蒸榖梁曰蒸冬事也春夏興之黷祀也志不敬也公羊曰常事不書此何以書譏亟也亟則黷黷則不敬君子之祭也敬而不黷戴氏曰正月蒸巳非時況五月而又蒸乎存耕趙氏曰夏而礿禮也蒸非其時也嵗再蒸焉祭之瀆也而桓公行之將以事神適以慢神將以寧神適以瀆神莘老孫氏曰祖父至尊神明至幽而以非禮瀆之聖人所以深罪也秋伐邾莘老孫氏曰不言帥師微者伐之也義見隱二年鄭伐衛此則弒逆之賊而以伐人見王政之益衰也髙氏曰桓自弒立恃其強惡以陵小國小國皆畏而從之故紀郕鄧榖滕杞或朝或會惟邾恃舊好而不顧至是遂伐之其曰伐邾必有辭焉邾不能奉辭以討桓公弒逆之罪冝乎其反見伐也冬十月雨雪雨于付切戴氏曰孟冬之月隂氣始凝而驟雨雪隂氣盛也黃氏曰諸家多以冬十月為今之八月雨雪非時今戴氏以夏正冬十月言理亦未嘗不明嘻果八月也聖人恐未必誣天而易秋為冬也存耕趙氏曰人事病乎天然後天變示乎人桓之惡德上干天和未雪而雪所謂乖氣致異也祭公來遂逆王后于紀公羊曰祭公者天子之三公也莘老孫氏曰天子三公食采于祭者也榖梁曰遂繼事之辭也存耕趙氏曰因而成事也公羊曰大夫無遂事程子曰祭公受命逆后而至魯先行私禮故書來以逆后為遂事責其不虔王命而輕天下之母也張氏曰天子雖無親迎之禮然祭公謀于魯則當復命于王然後遣于宗廟以明逆后之重今使魯為媒而因是往輕褻王配如此何以示正始之道哉二説未詳孰是若當時天子使之來魯而又使之遂逆后則過在桓王祭公特有從命之罪耳胡氏曰案禮天子不親迎使上公逆之何以書以遂事書之也劉氏曰三公者父師之任也坐而論道使之逆女非正也葉氏曰天子逆后以卿而公臨之祭公逆后非矣與劉氏同胡劉二説亦未詳孰是春秋本義卷四
